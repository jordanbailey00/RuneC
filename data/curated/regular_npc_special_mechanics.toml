# Regular combat NPC families that need mechanics beyond generic autos.
# This is a data ownership list, not an implementation plan.

schema_version = 1

[[families]]
key = "dragonfire_users"
status = "missing_runtime"
examples = ["Green dragon", "Blue dragon", "Red dragon", "Black dragon", "Metal dragons", "King Black Dragon"]
mechanics = ["dragonfire attack", "antifire mitigation", "dragonfire shield mitigation", "Protect from Magic interaction"]

