# Thermonuclear Smoke Devil — slayer boss. Simple smoke attacker with
# facemask requirement for damage mitigation.

name = "Thermonuclear Smoke Devil"
slug = "thermonuclear_smoke_devil"
npc_ids = [494]
source_pages = ["Thermonuclear smoke devil",
                "Thermonuclear smoke devil/Strategies"]

[[attacks]]
