# General Graardor — GWD Bandos boss. Tests: GWD-pattern bodyguard
# group (all-die-together), AoE ranged shockwave (hits everyone in
# room), empty-room hp+stat reset.
#
# Template for the three other GWD bosses (Commander Zilyana, K'ril
# Tsutsaroth, Kree'arra) — same structure, different styles +
# bodyguards. Each gets its own TOML when authored.

name = "General Graardor"
slug = "general_graardor"
npc_ids = [2215]
source_pages = ["General Graardor", "General Graardor/Strategies"]

# ---- Bandos boss + 3 bodyguards --------------------------------------
# Each bodyguard is its own NPC. Shared-aggression: entering the
# chamber pulls all four onto the player.

[[bosses]]
name = "General Graardor"
npc_id = 2215
is_primary = true

[[bosses.attacks]]
name = "Melee Punch"
style = "melee"
accuracy_roll = "crush"
max_hit = 60
warning_ticks = 0

[[bosses.attacks]]
name = "Shockwave Slam"
# Wiki: "slams the ground to emit shockwaves to all players inside
# his chamber, dealing between 15 and 35 damage. Despite being
# Ranged, Graardor can only use it within melee range."
style = "ranged_aoe_room"
max_hit = 35
min_hit = 15                       # uniform distribution 15-35
warning_ticks = 1
requires_player_in_melee_range = true
hits_all_players_in_room = true

[[bosses]]
name = "Sergeant Strongstack"
npc_id = 2216
is_bodyguard = true

[[bosses.attacks]]
name = "Melee"
style = "melee"
accuracy_roll = "crush"
max_hit = 16
warning_ticks = 0

[[bosses]]
name = "Sergeant Steelwill"
npc_id = 2217
is_bodyguard = true

[[bosses.attacks]]
name = "Magic Bolt"
style = "magic"
max_hit = 20
warning_ticks = 2

[[bosses]]
name = "Sergeant Grimspike"
npc_id = 2218
is_bodyguard = true

[[bosses.attacks]]
name = "Ranged Spear"
style = "ranged"
max_hit = 20
warning_ticks = 2

# ---- Phases ------------------------------------------------------------
# All four NPCs attack simultaneously from fight start. No phase
# transitions — fight ends when all four dead within respawn window.

[[phases]]
id = "default"
enter_at_hp_pct = 100
# Graardor attack selection: 2/3 Melee Punch, 1/3 Shockwave Slam.
style_weights = { melee = 2, shockwave = 1 }

# ---- Mechanics --------------------------------------------------------

[[mechanics]]
name = "Bodyguard Respawn Cycle"
primitive = "periodic_respawn_if_dead"
# Bodyguards respawn if any of the group remains alive. All four must
# die within the respawn window to complete the encounter.
params.respawn_cooldown_ticks = 75
params.applies_to_npc_ids = [2215, 2216, 2217, 2218]

[[mechanics]]
name = "Group Kill Required"
primitive = "group_kill_required"
# Drops rolled only when all four dead simultaneously (from
# Graardor's drop table; bodyguards don't roll their own rare drops).
params.required_npc_ids = [2215, 2216, 2217, 2218]
params.grant_drops_for = [2215]

[[mechanics]]
name = "Empty-Room Reset"
primitive = "regen_when_no_player"
# Wiki: "If there are no players in his chamber, his health and
# stats will be reset."
params.heal_to_full = true
params.reset_all_npcs = true
params.reset_stat_drains = true

# ---- Entry requirement (bookkeeping) ----------------------------------
# GWD killcount gate: 40 Bandos-alignment kills to enter. Not an
# encounter mechanic — belongs to world-room gating. Documented here
# for reference; runtime enforces via varbit check.
[entry_requirement]
bandos_killcount = 40
