# Fortis Colosseum — 12-wave gladiatorial arena with player-selected
# modifiers stacked per wave. Each wave introduces a new enemy type;
# wave 12 = Sol Heredit solo.

name = "Fortis Colosseum"
slug = "colosseum"
# Sol Heredit + wave-enemy ids.
npc_ids = [12819, 12821, 12818]
source_pages = ["Fortis Colosseum", "Fortis Colosseum/Strategies",
                "Sol Heredit"]

# ---- 12-wave progression ----------------------------------------------
# After each wave the player picks 1 of 3 modifiers that apply for
# the rest of the run. Modifier pool:
#   DOOM, SOLARFLARE, MYOPIA, BLASPHEMY, RED FLAG, BEES, REENTRY,
#   DYNAMIC DUO, FROZEN WELLSPRING, VOLATILITY, MANTIMAYHEM,
#   TOTEMIC, QUARTET.
# Modifiers affect enemy behavior + stats for all subsequent waves.

[[waves]]
id = "wave_1"
enemies = [{ npc = "Fremennik warband", count = 2 }]
post_wave_modifier_choice = true

