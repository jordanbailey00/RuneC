# Vet'ion (wilderness multi-way) + Calvar'ion (solo variant). Skeletal
# hell-hound boss with 2-phase encounter, hellhound minion spawns.

name = "Vet'ion / Calvar'ion"
slug = "vetion_calvarion"
npc_ids = [6611, 6612, 11995, 11996]
source_pages = ["Vet'ion", "Calvar'ion", "Vet'ion/Strategies"]

[[attacks]]
name = "Melee Swipe"
style = "melee"
accuracy_roll = "slash"
max_hit = 33
warning_ticks = 0

[[attacks]]
name = "Magic Bolt"
style = "magic"
max_hit = 30
warning_ticks = 2

[[attacks]]
name = "Lightning Strike"
