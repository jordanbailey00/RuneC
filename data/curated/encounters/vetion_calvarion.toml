period_ticks = 20
params.npc_name = "Skeleton Hellhound"
params.count = 3
params.distribution = "around_boss"

[[mechanics]]
name = "Empty-Room Reset"
primitive = "regen_when_no_player"
params.heal_to_full = true
params.reset_all_npcs = true

[variant_override]
applies_to_npc_id_range = [11995, 11996]
