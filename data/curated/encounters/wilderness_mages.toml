# AoE bomb attack on telegraph tiles.
style = "magic"
max_hit = 25
warning_ticks = 3
aoe_shape = "3x3"
targets_tile_not_entity = true

[[phases]]
id = "default"
enter_at_hp_pct = 100

[[mechanics]]
name = "Empty-Room Reset"
primitive = "regen_when_no_player"
