[[nodes]]
id = 87
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "Thirty years ago, Crandor was a thriving community with a great tradition of mages and adventurers. Many Crandorians even earned the right to be part of the Champions' Guild!"
parent = 79

[[nodes]]
id = 88
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "One of their adventurers went too far, however. He descended into the volcano in the centre of Crandor and woke the dragon Elvarg."
parent = 79

[[nodes]]
id = 89
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "He must have fought valiantly against the dragon because they say that, to this day, she has a scar down her side,"
parent = 79

[[nodes]]
id = 90
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "but the dragon still won the fight. She emerged and laid waste to the whole of Crandor with her fire breath!"
parent = 79

[[nodes]]
id = 91
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "Some refugees managed to escape in fishing boats. They landed on the coast, north of Rimmington, and set up camp but the dragon followed them and burned the camp to the ground."
parent = 79

[[nodes]]
id = 92
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "Out of all the people of Crandor there were only three survivors: a trio of wizards who used magic to escape. Their names were Thalzar, Lozar and Melzar."
parent = 79

[[nodes]]
id = 93
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "If you're serious about taking on Elvarg, first you'll need to get to Crandor, and to my knowledge, the only way to do that is by sea."
parent = 79

[[nodes]]
id = 94
depth = 2
kind = "speaker"
speaker = "Player"
text = "So I just sail over there? Seems easy enough."
parent = 79

[[nodes]]
id = 95
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "If only that were true. The island is surrounded by dangerous underwater reefs. You'll need a map to guide you through them and a ship capable of doing so."
parent = 79

[[nodes]]
id = 96
depth = 2
kind = "speaker"
speaker = "Guildmaster"
text = "And then of course there's the dragon herself. Once you reach Crandor, you'll need some kind of protection against her breath."
parent = 79

