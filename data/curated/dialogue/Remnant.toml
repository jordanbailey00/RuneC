[[nodes]]
id = 58
depth = 1
kind = "speaker"
speaker = "Mysterious Voice 1"
text = "Chromium lies at the heart of Lassar. It is in our golems, our lights, even our walls. We have invested a lot to make producing it 'easy'. It was not always this way..."
parent = -1

[[nodes]]
id = 59
depth = 1
kind = "speaker"
speaker = "Player"
text = "Rune, adamant and a furnace that can regulate air intake... The Blast Furnace in Keldagrim could work..."
