depth = 2
kind = "speaker"
speaker = "Player"
text = "Isn't there?"
parent = 9

[[nodes]]
id = 22
depth = 2
kind = "speaker"
speaker = "Dondakan the Dwarf"
text = "Until we had a look further down the stream, around the rock... no, there's no treasure there, just a dead end."
parent = 9

[[nodes]]
id = 23
depth = 2
kind = "speaker"
speaker = "Player"
text = "Okay... so why were you trying to get through the rock again?"
parent = 9

[[nodes]]
