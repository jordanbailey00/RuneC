depth = 2
kind = "speaker"
speaker = "Dondakan the Dwarf"
text = "Of course I have, I'm holding this rune pickaxe, aren't I? We've been trying to mine through it for years!"
parent = 9

[[nodes]]
id = 18
depth = 2
kind = "speaker"
speaker = "Player"
text = "We? I don't see anyone else."
parent = 9

[[nodes]]
id = 19
depth = 2
kind = "speaker"
speaker = "Dondakan the Dwarf"
text = "Well, I'm the only one left... all the others gave up. Said it wasn't worth their while anymore. Wouldn't have a good return profit on their time investment."
parent = 9

[[nodes]]
id = 20
depth = 2
kind = "speaker"
speaker = "Dondakan the Dwarf"
text = "At first we thought there might be a huge treasure behind the rock, you see."
parent = 9

[[nodes]]
