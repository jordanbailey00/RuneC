[[nodes]]
id = 58
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "As you are likely aware, when we cast spells, we do so using the power of runes."
parent = 56

[[nodes]]
id = 59
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "These runes are crafted from a highly unique material, and then imbued with magical power from various runic altars. Different altars create different runes with different magical effects."
parent = 56

[[nodes]]
id = 60
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "The process of imbuing runes is called runecrafting. Legend has it that this was once a common art, but the secrets of how to do it were lost until just under two hundred years ago."
parent = 56

[[nodes]]
id = 61
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = """
The rediscovery of runecrafting had such a large impact on the world, that it marked the dawn of the Fifth Age. It also resulted in the birth of our order, and the construction of the first Wizards' Tower.
"""
parent = 56

[[nodes]]
id = 62
depth = 4
kind = "speaker"
speaker = "Player"
text = "If it was the first tower, I'm guessing it doesn't exist anymore? What happened?"
parent = 56

[[nodes]]
id = 63
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "It was burnt down by traitorous members of our own order. They followed the evil god of chaos, Zamorak, and they wished to claim our magical discoveries in his name."
parent = 56

[[nodes]]
id = 64
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "When the tower burnt down, much was lost, including an important incantation. A spell that could be used to teleport to a hidden essence mine."
parent = 56

[[nodes]]
id = 65
depth = 4
kind = "speaker"
speaker = "Player"
text = "The essence mine you mentioned earlier, I assume?"
parent = 56

[[nodes]]
id = 66
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "Precisely. Rune essence is the material used to make runes, but it is incredibly rare. That essence mine was the only place it could be found that our order knew of."
parent = 56

[[nodes]]
id = 67
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "Since the incantation was lost, we have struggled to maintain our stocks of rune essence."
parent = 56

[[nodes]]
id = 68
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "There are seemingly those out there that still know where to find some, but while they have been willing to sell essence to us, they have refused to share knowledge on how to find it ourselves."
parent = 56

[[nodes]]
id = 69
depth = 4
kind = "speaker"
speaker = "Player"
text = "I'm starting to see why this is so important. So you think this talisman can help you rediscover that incantation?"
parent = 56

[[nodes]]
id = 70
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "I do! All magic leaves traces, and from what I can tell, this talisman was used heavily during the time of the first tower."
parent = 56

[[nodes]]
id = 71
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "It would have been taken to the essence mine many times, and the magical energies there will have left an imprint on it. To think that it was hidden in Lumbridge all this time!"
parent = 56

[[nodes]]
id = 72
depth = 4
kind = "speaker"
speaker = "Player"
text = "So what happens now?"
parent = 56

[[nodes]]
id = 73
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "It is critical I share this discovery with my associate, Aubury, as soon as possible. He's not much of a wizard, but he's an expert on runecrafting, and his insight will be essential."
parent = 56

[[nodes]]
id = 74
depth = 4
kind = "speaker"
speaker = "Archmage Sedridor"
text = "Would you be willing to visit him for me? I would go myself, but I wish to study this talisman some more."
parent = 56

