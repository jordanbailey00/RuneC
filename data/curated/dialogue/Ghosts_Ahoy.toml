text = "What happened to the folk of this town?"
parent = 567

[[nodes]]
id = 569
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "That's a long story, my friend, but you look like you have the time..."
parent = 567

[[nodes]]
id = 570
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "Do you know why ghosts exist?"
parent = 567

[[nodes]]
id = 571
depth = 2
kind = "speaker"
speaker = "Player"
text = "A ghost is a soul left in limbo, unable to pass over to the next world; they might have something left to do in this world that torments them, or they might just have died in a state of confusion."
parent = 567

[[nodes]]
id = 572
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "Yes, that is normally the case. But here in Port Phasmatys, we of this town once chose freely to become ghosts!"
parent = 567

[[nodes]]
id = 573
depth = 2
kind = "speaker"
speaker = "Player"
text = "Why on earth would you do such a thing?"
parent = 567

[[nodes]]
id = 574
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "It is a long story. Many years ago, this was a thriving port, a trading centre to the eastern lands of Gielinor. We became rich on the profits made from the traders that came across the eastern seas."
parent = 567

[[nodes]]
id = 575
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "We were very happy... until Lord Drakan noticed us."
parent = 567

[[nodes]]
id = 576
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "He sent unholy creatures to demand that a blood-tithe be paid to the Lord Vampyre, as is required from all in the domain of Morytania. We had no choice but to agree to his demands."
parent = 567

[[nodes]]
id = 577
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "As the years went by, our numbers dwindled and many spoke of abandoning the town for safer lands. Then, Necrovarus came to us."
parent = 567

[[nodes]]
id = 578
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = """
He came from the eastern lands, but of more than that, little is known. Some say he was once a mage, some say a priest. Either way, he was in possession of knowledge totally unknown to even the most learned among us.
"""
parent = 567

[[nodes]]
id = 579
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "Necrovarus told us that he had been brought by a vision he'd had of an underground source of power. He inspired us to delve beneath the town, promising us the power to repel the vampyres."
parent = 567

[[nodes]]
id = 580
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "Deep underneath Phasmatys, we found a pool of green slime that Necrovarus called ectoplasm. He showed us how to build the Ectofuntus, which would turn the ectoplasm into the power he had promised us."
parent = 567

[[nodes]]
id = 581
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "Indeed, this Ectopower did repel the vampyres; they would not enter Phasmatys once the Ectofuntus began working. But little did we know that we had exchanged one evil for yet another - Ectopower."
parent = 567

[[nodes]]
id = 582
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "Little by little, we began to lose any desire for food or water, and our desire for the Ectopower grew until it dominated our thoughts entirely. Our bodies shrivelled and, one by one, we died."
parent = 567

[[nodes]]
id = 583
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "The Ectofuntus and the power it emanates keeps us here as ghosts - some, like myself, content to remain in this world; some becoming tortured souls who we do not allow to pass our gates."
parent = 567

[[nodes]]
id = 584
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "We would be able to pass over into the next world but Necrovarus has used his power to create a psychic barrier, preventing us."
parent = 567

[[nodes]]
id = 585
depth = 2
kind = "speaker"
speaker = "Ghost innkeeper"
text = "We must remain here for all eternity, even unto the very end of the world."
parent = 567

[[nodes]]
id = 586
depth = 2
kind = "act"
text = "end"
parent = 567
is_terminal = true

