kind = "speaker"
speaker = "Mysterious Stranger"
text = "Yes. As you're aware, of all those that go into the Theatre, the vast majority never come out. That said, some have managed to succeed. Of course, the vampyres would never let the citizens know this."
parent = 18

[[nodes]]
id = 25
depth = 3
