[[nodes]]
id = 55
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = """
My kind have the ability to relive our memories as if they are happening again. We can also relive the memories of others if we are able to make physical contact with them. I could show you if you want?
"""
parent = 18

[[nodes]]
id = 56
depth = 3
kind = "speaker"
speaker = "Player"
text = "Please don't go poking through my memories. Also, what do you mean by 'your kind'?"
parent = 18

[[nodes]]
id = 57
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "I am not at liberty to say."
parent = 18

[[nodes]]
id = 58
depth = 3
kind = "speaker"
speaker = "Player"
text = "Of course. How silly of me. And you want to relive Ranis' memories I'm guessing? Will that even work now that he's dead?"
parent = 18

[[nodes]]
id = 59
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "We are lucky that vampyre corpses deteriorate slower than many other species. Enough of his brain should still be intact for me to work with."
parent = 18

[[nodes]]
id = 60
depth = 3
kind = "speaker"
speaker = "Player"
text = "Err... Nice. What's he got to do with these eggs though?"
parent = 18

[[nodes]]
id = 61
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "Ranis and Verzik were close friends. He interacted with her more than anyone else did. Getting close enough to Verzik to observe her own memories will be... problematic. He is the next best option."
parent = 18

[[nodes]]
id = 62
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "Within his memories we can hopefully learn more about Verzik and her abilities. As for the eggs, they are our catalyst."
parent = 18

[[nodes]]
id = 63
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "It would take years to search through all of Ranis' mind, but I can use these eggs to help us find relevant memories much faster."
parent = 18

[[nodes]]
id = 64
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "Now, I must remain here. That means you will need to recover Ranis for us."
parent = 18

[[nodes]]
id = 65
depth = 3
kind = "speaker"
speaker = "Player"
text = "And where can I find him?"
parent = 18

[[nodes]]
id = 66
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "Luckily for us, Ranis always loved the Theatre. As such, he is actually buried deep below it. You can use the staircase to the north east to access his crypt."
parent = 18

[[nodes]]
id = 67
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "Be careful, it's well guarded. Even other vampyres are not allowed in. I suggest you take that flail of yours."
parent = 18

[[nodes]]
id = 68
depth = 3
kind = "speaker"
speaker = "Mysterious Stranger"
text = "Also, you don't need to bring his whole body back of course. That wouldn't be very subtle. We only need his brain."
parent = 18

