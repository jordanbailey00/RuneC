speaker = "Ranis Drakan"
text = "And you Verzik."
parent = 149

[[nodes]]
id = 173
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "I see you've wasted no time in introducing our new guest to the Theatre."
parent = 149

[[nodes]]
id = 174
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "I must say, I find the name you've given her to be quite interesting. Not the kind of thing I'd have expected from you."
parent = 149

[[nodes]]
id = 175
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "Well I thought it would be quite humorous."
parent = 149

[[nodes]]
id = 176
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "I see. So you intend to use her as a new challenge?"
parent = 149

[[nodes]]
id = 177
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "It seemed an ironically fitting role for her, given that fun little narrative you came up with. Besides, with all the work you put in, it would have felt wrong to just abandon her."
parent = 149

[[nodes]]
id = 178
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "You should not have worried about that. The things we learnt from her down in the labs more than made up for the effort."
parent = 149

[[nodes]]
id = 179
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "Well either way, I'm glad she's here. I've found her to be quite the inspiration. Thanks to her, I've decided to give the whole place a bit of a sprucing up."
parent = 149

[[nodes]]
id = 180
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "You're replacing all the challenges?"
parent = 149

[[nodes]]
id = 181
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "Absolutely! Those old ones were getting dull. It's time for some fresh excitement in this place."
parent = 149

[[nodes]]
id = 182
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "Well perhaps I have something that can help with that. I have a gift for you."
parent = 149

[[nodes]]
id = 183
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "A gift? Oh Ranis you do spoil me!"
parent = 149

[[nodes]]
id = 184
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "You can thank Lowerniel for this one. He found these eggs in an arachnid nest north of Darkmeyer. He thought you might be able to use them in your nylocas breeding program."
parent = 149

[[nodes]]
id = 185
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "How exciting! Do pass on my thanks. He is always welcome to come and pay me a visit himself, of course."
parent = 149

[[nodes]]
id = 186
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "The Theatre has never really been his thing."
parent = 149

[[nodes]]
id = 187
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "Oh Ranis, I do love your brother, but he is such a bore! He needs to learn to live a little!"
parent = 149

[[nodes]]
id = 188
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "Anyway, tell me more about this nest."
parent = 149

[[nodes]]
id = 189
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "The arachnids there are highly unique. Lowerniel thinks their queen might be of a higher power."
parent = 149

[[nodes]]
id = 190
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "A higher power? He doesn't think that silly stone he used to have is involved, does he?"
parent = 149

[[nodes]]
id = 191
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "No, he suspects something more natural."
parent = 149

[[nodes]]
id = 192
depth = 2
kind = "speaker"
speaker = "Verzik Vitur"
text = "Really? Well either way, if he's right, these eggs could be key to some very exciting new nylocas."
parent = 149

[[nodes]]
id = 193
depth = 2
kind = "speaker"
speaker = "Ranis Drakan"
text = "I look forward to seeing the results."
parent = 149

[[nodes]]
