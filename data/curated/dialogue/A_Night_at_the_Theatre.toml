[[nodes]]
id = 199
depth = 2
kind = "speaker"
speaker = "Player"
text = "I see. So what's our next step?"
parent = 149

[[nodes]]
id = 200
depth = 2
kind = "speaker"
speaker = "Mysterious Stranger"
text = "The eggs in that memory were very similar to the ones in my possession, but they were not identical. It sounded like Verzik intended to use them to breed new nylocas."
parent = 149

[[nodes]]
id = 201
depth = 2
kind = "speaker"
speaker = "Player"
text = "Perhaps that breeding is what led to the eggs you have."
parent = 149

[[nodes]]
