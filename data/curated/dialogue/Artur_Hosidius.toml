kind = "speaker"
speaker = "Player"
text = "What makes you say the Council have done a bad job?"
parent = 10

[[nodes]]
id = 12
depth = 3
kind = "speaker"
speaker = "Artur Hosidius"
text = "More crime. Fewer homes. More illness. Loss of jobs. The list goes on."
parent = 10

[[nodes]]
id = 13
depth = 3
kind = "speaker"
speaker = "Player"
text = "But aren't the five houses partially to blame as well? They rule the cities."
parent = 10

[[nodes]]
id = 14
depth = 3
kind = "speaker"
speaker = "Artur Hosidius"
text = "The Council sets the laws and the Council sets the budgets. We have to do as they say, just like everyone else."
parent = 10

