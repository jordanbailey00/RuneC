[[nodes]]
id = 5
depth = 2
kind = "speaker"
speaker = "Artur Hosidius"
text = "The signing of the Accord marked the start of a golden age. Once the Royal Lords replaced the Council of Elders, Kourend prospered like never before."
parent = 3

[[nodes]]
id = 6
depth = 2
kind = "speaker"
speaker = "Player"
text = "But that was a long time ago. Why does it matter now?"
parent = 3

[[nodes]]
id = 7
depth = 2
kind = "speaker"
speaker = "Artur Hosidius"
text = "Because I think it's time for another golden age. The Kourend Council, like the Council of Elders before them, have failed to do a good job in running this kingdom."
parent = 3

[[nodes]]
id = 8
depth = 2
kind = "speaker"
speaker = "Player"
text = "And you think the five houses would do a better job?"
parent = 3

[[nodes]]
id = 9
