depth = 2
kind = "speaker"
speaker = "Kit Breaker"
text = "I thought Sir Kit Breaker had a nice ring to it. The 'Sir' commands respect and sounds quite manly. I want people to think when they look at me: this man has it together."
parent = 7

[[nodes]]
id = 11
depth = 2
kind = "speaker"
speaker = "Kit Breaker"
text = "Yet I've hardly set out and I'm already falling at the first obstacle. I have no equipment to call my own. I just dragged some heavy chests for hours and I'm puffed-out."
