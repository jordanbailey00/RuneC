[[nodes]]
id = 460
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "Nice to meet you, young Kit! What brings you to my meadow?"
parent = -1

[[nodes]]
id = 461
depth = 1
kind = "speaker"
speaker = "Kit Breaker"
text = "I'm an aspiring White Knight, but that dream is on hold until I can perform a truly heroic feat. Except I'm not that heroic. I don't really know who I am."
parent = -1

[[nodes]]
id = 462
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "I think the answer to one's existence is a difficult one to answer for anyone. Without a goal or a drive, one can lose oneself."
parent = -1

[[nodes]]
id = 463
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "I have personally done a lot of soul-searching before realising that my purpose was here, in bringing colour to this world."
parent = -1

[[nodes]]
id = 464
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "My latest project, for example, is to try and create a refuge where people can rest, ponder life and find themselves."
parent = -1

[[nodes]]
id = 465
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "I want a place people can visit in peace and calm, without fear of judgement. Right now, I am in talks with some leprechauns for a piece of land."
parent = -1

[[nodes]]
id = 466
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "If everything goes well, I should be able to start working on it in the next year. It won't be a quick job."
parent = -1

[[nodes]]
id = 467
depth = 1
kind = "speaker"
speaker = "Kit Breaker"
text = "Sounds like a beautiful vision. I wish such a place existed a few years ago when I was less in control of my life."
parent = -1

[[nodes]]
id = 468
depth = 1
kind = "speaker"
speaker = "Kit Breaker"
text = "Back then I would have loved having someone understanding like you to talk to. This project needs to happen, and I want to help you make it come true."
parent = -1

[[nodes]]
id = 469
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "Actually, I think the future Glade would greatly benefit from a knight protector, and I think you would be perfect for the job."
parent = -1

[[nodes]]
id = 470
depth = 1
kind = "speaker"
speaker = "Kit Breaker"
text = "Me? Are you sure? I am not actually a knight, you know?"
parent = -1

[[nodes]]
id = 471
depth = 1
kind = "speaker"
speaker = "Gilbert"
text = "When there is a will, there is a way. For me, you already embody everything a knight stands for!"
parent = -1

