speaker = "Prince Itzla Arkan"
text = "I guess we will find out soon enough."
parent = -1

[[nodes]]
id = 813
depth = 1
kind = "speaker"
speaker = "Player"
text = "Should we not leave? We know the cult is guilty now, and we know Metzli, Furia and Ennius are part of it. We have everything we need."
