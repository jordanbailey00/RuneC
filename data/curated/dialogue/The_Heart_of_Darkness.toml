kind = "speaker"
speaker = "Player"
text = "What happens if they try to attack Servius again?"
parent = 150

[[nodes]]
id = 152
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "He's in the capital now, where I wanted him to be from the start. He should be much safer there."
parent = 150

[[nodes]]
id = 153
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Still, safer is not safe, especially if we do have traitors in our midst. At any moment we risk someone showing some basic competence and actually managing to kill him properly."
parent = 150

[[nodes]]
id = 154
depth = 2
kind = "speaker"
speaker = "Player"
text = "So you don't consider the enemy to be competent?"
parent = 150

[[nodes]]
id = 155
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "All I'm saying is that if I'd have been the one trying to assassinate my father, I'd probably have done a half- decent job."
parent = 150

[[nodes]]
id = 156
depth = 2
kind = "speaker"
speaker = "Player"
text = "But if the enemy isn't a threat, why are you here?"
parent = 150

[[nodes]]
id = 157
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "What do you mean, iknami?"
parent = 150

[[nodes]]
id = 158
depth = 2
kind = "speaker"
speaker = "Player"
text = "If this isn't an enemy to be taken seriously, why do you feel you yourself need to be the one to deal with them? If they're incompetent, shouldn't anyone be able to handle them?"
parent = 150

[[nodes]]
id = 159
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "So you challenge me, iknami? I'm wounded. However, as I said before, I do not feel we can trust many people while we have potential traitors around us."
parent = 150

[[nodes]]
id = 160
depth = 2
kind = "speaker"
speaker = "Player"
text = "But if they've managed to position some of their members in very important roles, surely they can't be completely incompetent?"
parent = 150

[[nodes]]
id = 161
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "We do not need to do this dance, [player name]. I understand that where you come from, there is a certain art to holding a conversation. We do not bother with that here. You may be direct."
parent = 150

[[nodes]]
id = 162
depth = 2
kind = "speaker"
speaker = "Player"
text = "I guess I just still don't know you that well. If we're about to infiltrate this cult together, I'd like to understand why you think it's important you do this yourself."
parent = 150

[[nodes]]
id = 163
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "I see. I understand your doubts, my friend. I suppose I have a few reasons for wanting to be here."
parent = 150

[[nodes]]
id = 164
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = """
First, I do truly believe this mission has the highest chance of success if fewer people know about it. While I am not convinced on the competence of our foe, I still do not intend to underestimate them.
"""
parent = 150

[[nodes]]
id = 165
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Second, I suppose I feel a certain level of responsibility. My father was attacked on my watch. When someone falters, it is their duty to fix it, especially when they hold a position like mine."
parent = 150

[[nodes]]
id = 166
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "After all, a leader who sits by and lets others deal with his mistakes is not someone to have faith in."
parent = 150

[[nodes]]
id = 167
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Finally, Servius is my father. Our relationship is not a simple one, but he is my father all the same. I would see to it personally that his attackers face justice."
parent = 150

[[nodes]]
id = 168
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "I hope that satisfies you, iknami."
parent = 150

[[nodes]]
id = 169
