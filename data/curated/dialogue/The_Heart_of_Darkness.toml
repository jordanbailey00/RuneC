[[nodes]]
id = 136
depth = 2
kind = "speaker"
speaker = "Player"
text = "Do you really think Metzli, Furia and Ennius are traitors?"
parent = 135

[[nodes]]
id = 137
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Metzli has always been an odd one. Everyone was always quick to dismiss it as just a little side effect of spending a lot of time with dead people. Now I wonder if she used that to her advantage."
parent = 135

[[nodes]]
id = 138
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "No one cared to pay close attention to her. No one wanted to spend much time around her. She probably got away with all sorts of things without anyone even noticing."
parent = 135

[[nodes]]
id = 139
depth = 2
kind = "speaker"
speaker = "Player"
text = "But a traitor?"
parent = 135

[[nodes]]
id = 140
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "The evidence seems to suggest so. Why else would she have disappeared after the attack?"
parent = 135

[[nodes]]
id = 141
depth = 2
kind = "speaker"
speaker = "Player"
text = "Maybe they captured her?"
parent = 135

[[nodes]]
id = 142
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Maybe, but surely someone would have noticed. People generally don't go quietly when captured."
parent = 135

[[nodes]]
id = 143
depth = 2
kind = "speaker"
speaker = "Player"
text = "What about Furia and Ennius?"
parent = 135

[[nodes]]
id = 144
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Well their family has of course produced traitors before, but they've never seemed to have much love for old Imafore."
parent = 135

[[nodes]]
id = 145
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "By the end of the war, I think he'd ended up killing more of his own family members than he left alive. Amazing what paranoia will do to a man."
parent = 135

[[nodes]]
id = 146
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Still, even if they never cared for him, his blood still runs in their veins, and they've never been short on ambition themselves."
parent = 135

[[nodes]]
id = 147
depth = 2
kind = "speaker"
speaker = "Player"
text = "If they are guilty... what will you do to them?"
parent = 135

[[nodes]]
id = 148
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "The same thing we do to all traitors in Varlamore."
parent = 135

[[nodes]]
id = 149
depth = 2
kind = "act"
text = "above"
parent = 135

[[nodes]]
