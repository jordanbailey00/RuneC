[[nodes]]
id = 104
depth = 1
kind = "speaker"
speaker = "Player"
text = "Okay..."
parent = -1

[[nodes]]
id = 105
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "I can see you're still not convinced, so let me be frank. I wasn't lying when I spoke to mother. The number of people we can trust is concerningly low."
parent = -1

[[nodes]]
id = 106
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Metzli, one of the most important people in the entire kingdom, has seemingly betrayed us. If your suspicions are right, Furia and Ennius are guilty as well. For all we know, there could be even more."
parent = -1

[[nodes]]
id = 107
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "At this point, the fewer people who know about our mission, the better."
parent = -1

[[nodes]]
id = 108
depth = 1
kind = "speaker"
speaker = "Player"
text = "But you trust me?"
parent = -1

[[nodes]]
id = 109
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "The irony is, my friend, that as an outsider, you're actually far more trustworthy than any Varlamorian now. You almost certainly can't be part of this conspiracy."
parent = -1

[[nodes]]
id = 110
depth = 1
kind = "speaker"
speaker = "Player"
text = "Okay, I'm still not sure if I like this plan, but I see your point. What's our next move?"
parent = -1

[[nodes]]
id = 111
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "We need to infiltrate the Twilight Emissaries and confirm their guilt. I've done some digging, and rumour has it that they're on a bit of a recruitment spree at the moment. That's our way in."
parent = -1

[[nodes]]
id = 112
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "The cult makes their home in the Twilight Temple, east of here. I suspect they won't take kindly to us just walking in, but the local shopkeeper here might be able to help us out."
parent = -1

[[nodes]]
id = 113
depth = 1
kind = "speaker"
speaker = "Player"
text = "How so?"
parent = -1

[[nodes]]
id = 114
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "He's been engaging in many a charitable undertaking recently. Food for the poor, potions for the sick, that sort of thing. You'd be mistaken for thinking him to actually be a reasonable person."
parent = -1

[[nodes]]
id = 115
depth = 1
kind = "speaker"
speaker = "Player"
text = "But he's not?"
parent = -1

[[nodes]]
id = 116
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Sadly not in this case. The Emissaries accept members from all walks of life, but the vast majority of their recruits are those from more unfortunate backgrounds."
parent = -1

[[nodes]]
id = 117
depth = 1
kind = "speaker"
speaker = "Player"
text = "Ah I see. They have people like this shopkeeper using charity to attract people to their cause."
parent = -1

[[nodes]]
id = 118
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Exactly. It is... unfortunate. The War of Betrayal was over a lifetime ago, but many still feel the impacts, especially in this part of the kingdom."
parent = -1

[[nodes]]
id = 119
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "I'd like to think we have made great improvements over the years, but this is a clear reminder that far more needs to be done."
parent = -1

[[nodes]]
id = 120
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Anyway, it's not something to dwell on now. Let us get back to the more pressing matter of joining a dangerous cult."
parent = -1

[[nodes]]
id = 121
depth = 1
kind = "speaker"
speaker = "Player"
text = "Right. So this shopkeeper... If I go to him and pose as a potential recruit, your hope is that he'll contact the Emissaries?"
parent = -1

[[nodes]]
id = 122
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Exactly! Return to me here once you've hopefully been successful and we can discuss the next steps."
parent = -1

