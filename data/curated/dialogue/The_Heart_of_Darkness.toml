[[nodes]]
id = 804
depth = 1
kind = "speaker"
speaker = "Player"
text = "They think Ennius and Furia are Ralos and Ranul reborn..."
parent = -1

[[nodes]]
id = 805
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Like I say, complete insanity! Metzli has twisted the minds of everyone here. They eagerly lap up her outlandish claims without ever stopping to consider how ludicrous they are."
parent = -1

[[nodes]]
id = 806
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "In some ways, I pity them, but alas, there is only one cure for this sort of thing. This cult must be eradicated, especially Metzli, Furia and Ennius."
parent = -1

[[nodes]]
id = 807
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm still confused over what their plan is... They want to reach Mokhaiotl, but why would they need to kill Servius to do that? And why the whole set up with that Knight of Varlamore?"
parent = -1

[[nodes]]
id = 808
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "What do you mean, iknami?"
parent = -1

[[nodes]]
id = 809
depth = 1
kind = "speaker"
speaker = "Player"
text = "When Furia and Ennius set that knight up, it was so obvious. It's like they wanted us to know it was them."
parent = -1

[[nodes]]
id = 810
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Hmm... A very good point. Could be this cult has just addled their brains, but it may be that they wanted us here."
parent = -1

[[nodes]]
id = 811
depth = 1
kind = "speaker"
speaker = "Player"
text = "A trap?"
parent = -1

[[nodes]]
id = 812
