[[nodes]]
id = 826
depth = 1
kind = "speaker"
speaker = "Forebearer Fides"
text = """
After the Augur was blessed with glorious purpose, she felt a calling to this place. She came to this fallen temple and built us a home. However, it was not the temple that called to her, but what lies below.
"""
parent = -1

[[nodes]]
id = 827
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Below?"
parent = -1

[[nodes]]
id = 828
depth = 1
kind = "speaker"
speaker = "Forebearer Fides"
text = """
This temple was built atop Tapoyauik, a ruined fortress of the Old Ones. They walked the world during the last cycle, and when the time came for their cycle to end, they embraced their destiny willingly.
"""
parent = -1

[[nodes]]
id = 829
depth = 1
kind = "speaker"
speaker = "Player"
text = "Willingly?"
parent = -1

[[nodes]]
id = 830
depth = 1
kind = "speaker"
speaker = "Forebearer Fides"
text = "Of course! They basked in the glory of Ralos and Ranul and united with them as one, but before they did, they left behind the secrets needed to ensure that we too could fulfil our purpose."
parent = -1

[[nodes]]
id = 831
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "And the Augur? She found those secrets below?"
parent = -1

[[nodes]]
id = 832
depth = 1
kind = "speaker"
speaker = "Forebearer Fides"
text = "She did, but there is more to be uncovered. That is where you come in. Tapoyauik is a hostile environment and the passage into the ruins has been blocked."
