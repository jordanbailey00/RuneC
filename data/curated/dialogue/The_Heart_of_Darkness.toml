[[nodes]]
id = 780
depth = 1
kind = "speaker"
speaker = "Forebearer Fides"
text = """
Welcome, friends. You chosen few stand here because you have proven yourselves to be worthy. Here, you will not just find a home, you will find a family. Together, this family will bring about the Final Dawn.
"""
parent = -1

[[nodes]]
id = 781
depth = 1
kind = "speaker"
speaker = "Forebearer Fides"
text = "No doubt you are wondering how we will achieve our destiny. I call upon our glorious leader, the Augur, to explain our holy mission."
parent = -1

[[nodes]]
id = 782
depth = 1
kind = "other"
text = "{{qact|Augur Metzli walks onto the stage.}}"
parent = -1

[[nodes]]
id = 783
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "This morning, you were nothing more than ants, scrambling to find purpose amongst the dirt. Now though... now you have achieved ascension."
parent = -1

[[nodes]]
id = 784
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Once, I was just the same. Like so many of you, I started my life with nothing. I would wake each morning and pray that I would find enough food to last through the day."
parent = -1

[[nodes]]
id = 785
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "All the while, those above me treated me worse than a common criminal. I was a villain to them! Why? Simply because they were born with privilege, and I was not."
parent = -1

[[nodes]]
id = 786
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Eventually, I looked to the Sect of Ranul for guidance. I thought they might have shown me my path, but I was wrong."
parent = -1

[[nodes]]
id = 787
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Before long, I was their leader and it was instead me who was being looked to for guidance, for purpose. In truth though, even then I had nothing I could offer. I was as blind as I had always been."
parent = -1

[[nodes]]
id = 788
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "But the day came when I finally saw my purpose, for I was blessed with a vision, granted to me by Ralos and Ranul themselves! I will share now with you what they shared with me."
parent = -1

[[nodes]]
id = 789
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Thirty one years ago, the moon eclipsed the sun and a false night fell across the land. That day marked a beginning, for it saw the birth of a pair of twins."
parent = -1

[[nodes]]
id = 790
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "To most, they were children like any other, but I was shown the truth of their birth, for as the sun and moon combined, Ralos and Ranul were born in mortal forms!"
parent = -1

[[nodes]]
id = 791
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Now, they seek Mokhaiotl. There, they will unite us all as one, and a new world will be born. My purpose, which I now share with you, is to lead them there."
parent = -1

[[nodes]]
id = 792
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Blasphemy! Deceit! That is what people cry when they hear the truth. The Church of Ralos teaches that our work is false, and our royal leaders lap up their every word!"
parent = -1

[[nodes]]
id = 793
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Perhaps you still harbour doubts yourselves. I do not judge you. We have all been lied to our entire lives, and in truth, even after I was blessed by our gods, I held many doubts myself."
parent = -1

[[nodes]]
id = 794
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "But you have all been chosen. You have all achieved ascension. I know that you are among the few who will understand. You are among the few who can see the truth!"
parent = -1

[[nodes]]
id = 795
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "And see it you will! You do not need to take the word of a mere herald. Instead, bask in the glory of our gods reborn!"
parent = -1

[[nodes]]
id = 796
depth = 1
kind = "other"
text = "{{qact|Ennius and Furia Tullus walk onto the stage. The new Emissaries, including the player and Prince Itzla, kneel.}}"
parent = -1

[[nodes]]
id = 797
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "You may recognise these faces as Ennius and Furia Tullus, but now I give you the truth. Before you stand our gods! Ralos and Ranul!"
parent = -1

[[nodes]]
id = 798
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Together, we will accompany them on their glorious journey! We will guide them to Mokhaiotl and bring about the Final Dawn! This is our purpose! This is our destiny! This is Twilight's Promise!"
parent = -1

[[nodes]]
id = 799
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "You all have a part to play in what is to come. Forebearer Fides will assign you your duties. Speak with her and then go forth. Go forth and serve our gods!"
parent = -1

