[[nodes]]
id = 602
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "When my father was king, he ruled over a united Ardougne. But on his deathbed, he could not decide which of his sons should succeed him, so he had the city split into two."
parent = -1

[[nodes]]
id = 603
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "I became king of East Ardougne while my brother, Tyras, ruled over West Ardougne. My brother was a good man and was great at many things. Being a king was not one of them."
parent = -1

[[nodes]]
id = 604
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "Rather than looking after his people, he went on numerous expeditions to the lands west of here. On one of these expeditions, he was captured by the forces of the Dark Lord."
parent = -1

[[nodes]]
id = 605
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "The Dark Lord agreed to spare his life, but only on one condition... That he would drink from the Chalice of Eternity."
parent = -1

[[nodes]]
id = 606
depth = 1
kind = "speaker"
speaker = "Player"
text = "So what happened?"
parent = -1

[[nodes]]
id = 607
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "The chalice corrupted him. He joined forces with the Dark Lord, the embodiment of pure evil..."
parent = -1

[[nodes]]
id = 608
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = """
And so I erected the wall, not just to protect my people, but to protect all the people of Gielinor. Tyras is king of West Ardougne, sealing off the city was the only way to stop him and the Dark Lord.
"""
parent = -1

[[nodes]]
id = 609
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "I knew people would never believe the truth, so I had the plague made up as an excuse for the cordon. I'm not proud of it, but it was the only way to keep people safe."
parent = -1

[[nodes]]
id = 610
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. Well at least I know now."
parent = -1

[[nodes]]
id = 611
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "While my brother is still at large, I must ask that you keep this secret. We can't bring the wall down until we know he is no longer a danger."
parent = -1

[[nodes]]
id = 612
depth = 1
kind = "speaker"
speaker = "Player"
text = "But how do we stop him?"
parent = -1

[[nodes]]
id = 613
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "You're willing to help? Gods be praised!"
parent = -1

[[nodes]]
id = 614
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = """
My brother is currently gathering strength in the lands to the west. If we are to stop him, we must find a way through the mountains. There is an underground pass that should lead through but it is full of danger.
"""
parent = -1

[[nodes]]
id = 615
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = "Return to me when you are ready to face this peril. Until then, I give you permission to use my training area. It's located just to the north west of the city."
parent = -1

[[nodes]]
id = 616
depth = 1
kind = "speaker"
speaker = "King Lathas"
text = """
I'll also let the mourners know that you are a friend to Ardougne. You will be allowed to pass through the gates to West Ardougne whenever you please. Now, you'd better be off. You have much to prepare for.
"""
parent = -1

