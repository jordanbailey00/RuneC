depth = 1
kind = "speaker"
speaker = "Galana"
text = "For many years after the Accord was signed, the Royal Lords took it in turns to rule the kingdom. Each of them ruled for ten years in turn."
parent = -1

[[nodes]]
id = 78
depth = 1
kind = "speaker"
speaker = "Galana"
text = "Those practices have long since been abolished though and Kourend is now ruled by the Kourend Council. The original Accord has since been lost, but copies still exist in this library."
parent = -1

