text = "You will? That is excellent news! Head to the enclosure we have set up on Farmer Brumty's land to the north of the city; the four infected sheep should still be somewhere in that vicinity."
parent = 14

[[nodes]]
id = 17
depth = 3
kind = "speaker"
speaker = "Councillor Halgrive"
text = "Before you will be allowed to enter the enclosure, however, you must ensure you have some kind of protective clothing to prevent contagion."
parent = 14

