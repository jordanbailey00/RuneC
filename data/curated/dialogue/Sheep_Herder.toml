[[nodes]]
id = 5
depth = 2
kind = "speaker"
speaker = "Councillor Halgrive"
text = "You may or may not be aware, but a plague has spread across West Ardougne. Now, so far, our efforts to contain it have been largely successful, for the most part."
parent = 3

[[nodes]]
id = 6
depth = 2
kind = "speaker"
speaker = "Councillor Halgrive"
text = "However, some sheep recently escaped from a farm near the city. When they were found, we noticed that they were strangely discoloured, so we asked the mourners to examine them."
parent = 3

[[nodes]]
id = 7
depth = 2
kind = "speaker"
speaker = "Councillor Halgrive"
text = "They believe that the sheep have become infected with the plague."
parent = 3

[[nodes]]
id = 8
depth = 2
kind = "speaker"
speaker = "Player"
text = "Are you sure it's the plague?"
parent = 3

[[nodes]]
id = 9
depth = 2
kind = "speaker"
speaker = "Councillor Halgrive"
text = "Well the mourners seemed convinced and they're the experts. Even if it's not though, the sheep are clearly diseased in some way."
parent = 3

[[nodes]]
id = 10
depth = 2
kind = "speaker"
speaker = "Councillor Halgrive"
text = "As the councillor responsible for public health and safety here in East Ardougne, I am in charge of dealing with this problem."
parent = 3

[[nodes]]
id = 11
depth = 2
kind = "speaker"
speaker = "Councillor Halgrive"
text = "We need someone to herd these sheep into a safe enclosure, kill them quickly and cleanly and then dispose of the remains hygienically in a special incinerator."
parent = 3

[[nodes]]
id = 12
depth = 2
kind = "speaker"
speaker = "Councillor Halgrive"
text = "Unfortunately, nobody wants to risk catching the plague, and I am unable to find someone willing to undertake this mission for me."
parent = 3

