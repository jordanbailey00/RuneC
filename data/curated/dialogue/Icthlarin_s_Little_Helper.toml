speaker = "Player"
text = "Can you tell me more about the plagues."
parent = 417

[[nodes]]
id = 419
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "They started a few days ago. We have locusts in the east of the city and frogs in the west. The cows have started to produce sour milk, and all of us have become infected with some sort of pox."
parent = 417

[[nodes]]
id = 420
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Once it became clear how bad it was, Menaphos, our neighbouring city, closed their gates to us and everyone else. We closed our own gates soon after."
parent = 417

[[nodes]]
id = 421
depth = 2
kind = "speaker"
speaker = "Player"
text = "That can't have been an easy choice to make."
parent = 417

[[nodes]]
id = 422
depth = 2
kind = "speaker"
speaker = "High Priest"
text = """
I didn't want to, but the other priests insisted. We had to stop the plagues from spreading. It seems that our choice was the right one. So far, the plagues have remained contained, but at a great cost.
"""
parent = 417

[[nodes]]
id = 423
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Many of our citizens are trapped outside the city. Some are stuck in Menaphos, with more in other parts of the desert."
parent = 417

[[nodes]]
id = 424
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "However, that may well be for the best. Without trade from other settlements, we've been struggling to even feed the few of us left in the city."
parent = 417

[[nodes]]
id = 425
depth = 2
kind = "speaker"
speaker = "Player"
text = "How much longer do you think you can last?"
parent = 417

[[nodes]]
id = 426
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Not long. We need to find a way to stop the plagues soon."
parent = 417

