speaker = "High Priest"
text = "I don't think so... No wait! There is something important."
parent = 352

[[nodes]]
id = 372
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "As with many of our tombs, the pyramid has magical seals to protect it from the Devourer, the goddess of destruction. The fact that you were able to get in before means that you must have a cat."
parent = 352

[[nodes]]
id = 373
depth = 2
kind = "speaker"
speaker = "Player"
text = "Well... yes. But how did you know that?"
parent = 352

[[nodes]]
id = 374
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Cats act as guardians against the Devourer. I'm surprised the Sphinx didn't tell you this. As such, only a cat can open the pyramid door."
