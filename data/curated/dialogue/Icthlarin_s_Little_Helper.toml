[[nodes]]
id = 429
depth = 2
kind = "speaker"
speaker = "Player"
text = "Can you tell me more about Icthlarin."
parent = 428

[[nodes]]
id = 430
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Icthlarin is the son of Tumeken and Elidinis and brother to the Devourer. He is the Menaphite god of the dead. He is responsible for ensuring the safe passage of all souls from this life to the next."
parent = 428

[[nodes]]
id = 431
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Here in Sophanem, we support Icthlarin in his role by making sure the dead are suitably prepared for their journey."
parent = 428

[[nodes]]
id = 432
depth = 2
kind = "speaker"
speaker = "Player"
text = "So is Icthlarin only responsible for those that die in the desert?"
parent = 428

[[nodes]]
id = 433
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "No. While Icthlarin is only worshipped here, his responsibilities stretch across all of Gielinor. He cares not for an individual's beliefs. All who pass on, enter his care."
parent = 428

[[nodes]]
id = 434
depth = 2
kind = "speaker"
speaker = "Player"
text = "I imagine there are plenty of people out there who have a different take on things."
parent = 428

[[nodes]]
id = 435
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Which they are welcome to. It does not change the facts."
parent = 428

[[nodes]]
id = 436
depth = 2
kind = "speaker"
speaker = "Player"
text = "You seem very sure in these 'facts'."
parent = 428

[[nodes]]
id = 437
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "While most of the gods, Tumeken and Elidinis included, may be long gone from Gielinor, Icthlarin remains. His important role in caring for the dead means that he is still able to interact with us."
parent = 428

[[nodes]]
id = 438
depth = 2
kind = "speaker"
speaker = "Player"
text = "So you've met him?"
parent = 428

[[nodes]]
id = 439
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Well... no. While he is able to walk among us if he desires, he chooses not to so as to respect our way of life. Not to mention, his role requires his constant attention."
parent = 428

[[nodes]]
id = 440
depth = 2
kind = "speaker"
speaker = "Player"
text = "I see. Fair enough."
parent = 428

