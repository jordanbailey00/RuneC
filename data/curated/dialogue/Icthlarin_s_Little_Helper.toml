[[nodes]]
id = 405
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Well those jars are a key part of our burial practices. To remove one is to directly insult not just Icthlarin, but all those that have passed on to the next life."
parent = 403

[[nodes]]
id = 406
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Not to mention, it wasn't just any jar you took. You stole a jar from the tomb of our former High Priest! Why do you think his ghost is now wandering the city once more?"
parent = 403

[[nodes]]
id = 407
depth = 2
kind = "speaker"
speaker = "Player"
text = "But what will happen if I don't return the jar?"
parent = 403

[[nodes]]
id = 408
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Have you not noticed the plagues already filling our city? How long before Klenter calls upon Icthlarin to send a few more?"
parent = 403

[[nodes]]
id = 409
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "For all we know, the plagues we already have could be punishment for your grave robbing!"
parent = 403

[[nodes]]
id = 410
depth = 2
kind = "speaker"
speaker = "Player"
text = "Hey, don't go blaming me for that. Those plagues were here before I even met that wanderer!"
parent = 403

[[nodes]]
id = 411
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Perhaps Icthlarin foresaw what would happen and sent the plagues as a pre-emptive punishment?"
parent = 403

[[nodes]]
