[[nodes]]
id = 365
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "This is all a disaster! The plagues were bad enough, but now we've got hypnotised adventurers plundering tombs! I've only just started this job as well!"
parent = 352

[[nodes]]
id = 366
depth = 2
kind = "speaker"
speaker = "Player"
text = "You do seem to be going through a rough patch. Do you know what caused the plagues?"
parent = 352

[[nodes]]
id = 367
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "We fear they are a punishment sent by the gods. Perhaps we have displeased Icthlarin in some way. Maybe I am to blame. All this only started after I became High Priest."
parent = 352

[[nodes]]
id = 368
depth = 2
kind = "speaker"
speaker = "Player"
text = "Well I'm not sure if I can help with your plagues, but I need to fix whatever mess I caused in that pyramid. Can you help me?"
parent = 352

[[nodes]]
id = 369
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Oh, er... I suppose the burial jar you took must be returned as soon as possible. That will allow my predecessor to rest once more."
parent = 352

[[nodes]]
id = 370
depth = 2
kind = "speaker"
speaker = "Player"
text = "I can do that. Do you have any advice for me when it comes to the pyramid?"
parent = 352

[[nodes]]
