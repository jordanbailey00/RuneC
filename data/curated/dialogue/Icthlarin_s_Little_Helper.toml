kind = "speaker"
speaker = "Player"
text = "Can you tell me more about the Devourer."
parent = 442

[[nodes]]
id = 444
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Long ago, back when Tumeken and Elidinis still walked these lands, they had two children. Icthlarin, god of the dead, was one. The other was Amascut, the goddess of rebirth."
parent = 442

[[nodes]]
id = 445
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "For a time, Icthlarin and Amascut worked together in harmony. Icthlarin would ensure most souls are safely guided to the next life, while Amascut would select a small number to be reborn."
parent = 442

[[nodes]]
id = 446
depth = 2
kind = "speaker"
speaker = "Player"
text = "But something happened?"
parent = 442

[[nodes]]
id = 447
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Yes. During a great war over these lands, Amascut became corrupted. She was warped into the Devourer, becoming the goddess of destruction."
parent = 442

[[nodes]]
id = 448
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Since then, her only goal has been to devour every soul in existence, both living and dead."
parent = 442

[[nodes]]
id = 449
depth = 2
kind = "speaker"
speaker = "Player"
text = "The Sphinx told me something similar, but her interpretation was a bit different."
parent = 442

[[nodes]]
id = 450
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "We here have a lot of respect for the Sphinx. However, you should be careful of her words. She does not know the gods like we priests do."
parent = 442

[[nodes]]
id = 451
depth = 2
kind = "speaker"
speaker = "Player"
text = "So is the Devourer still around?"
parent = 442

[[nodes]]
id = 452
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Unfortunately so. Most gods have long since left this world. However, the Devourer was able to find a way to remain."
parent = 442

[[nodes]]
id = 453
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Luckily for us, some of her former priestesses were able to weaken her, but she still poses a great threat."
parent = 442

