speaker = "Player"
text = "Tell me more about Jatizso."
parent = 26

[[nodes]]
id = 28
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Well now, the history of the isles is a bloody tale. When told in its intended form it takes 9 days and 9 nights. However, I will give you the abridged version."
parent = 26

[[nodes]]
id = 29
depth = 2
kind = "speaker"
speaker = "Player"
text = "Phew!"
parent = 26

[[nodes]]
id = 30
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Four generations ago there was a mighty king who ruled wisely and was loved by all."
parent = 26

[[nodes]]
id = 31
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "He had many sons, most of whom proved themselves in the usual Fremennik ways of fighting, sailing, drinking and so on."
parent = 26

[[nodes]]
id = 32
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "His youngest two sons, however, were a problem. Ever since they were old enough to hit one another they had bickered and fought."
parent = 26

[[nodes]]
id = 33
depth = 2
kind = "speaker"
speaker = "Maria Gunnars"
text = "Their names were Jatizso and Neitiznot."
parent = 26

[[nodes]]
id = 34
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Hey! Who's telling this story?"
parent = 26

[[nodes]]
id = 35
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Ahem. At the time it was customary for the Kings' sons to claim a prize from his treasury when they came of age."
parent = 26

[[nodes]]
id = 36
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Each brother rallied support and strode out to confront the other on the field of battle to claim the same prize."
parent = 26

[[nodes]]
id = 37
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "The brothers met on the field, limbs were bruised, bones were crushed and heads clashed."
parent = 26

[[nodes]]
id = 38
depth = 2
kind = "speaker"
speaker = "Maria Gunnars"
text = "They probably didn't notice the head-clashing bit. Too thick skulled!"
parent = 26

[[nodes]]
id = 39
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Can I finish the story without interruptions?"
parent = 26

[[nodes]]
id = 40
depth = 2
kind = "speaker"
speaker = "Maria Gunnars"
text = "Carry on dear."
parent = 26

[[nodes]]
id = 41
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Anyway, long into the night they fought, until they stood alone, facing each other."
parent = 26

[[nodes]]
id = 42
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "On the second day the old king, whose patience was exhausted, strode out onto the field and demanded to know who had claimed his prize."
parent = 26

[[nodes]]
id = 43
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Jatizso looked at his father and told him yes, it was his, to which the other called out 'No! It's not'."
parent = 26

[[nodes]]
id = 44
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "And so, the argument continued through to the third day, with the sounds of 'Jah! 'tis so!', 'Ne! It's not!' echoing over the field, becoming more hoarse as the darkness enveloped the brothers."
parent = 26

[[nodes]]
id = 45
depth = 2
kind = "speaker"
speaker = "Maria Gunnars"
text = "Bah! What they needed was a good clip round the ear."
parent = 26

[[nodes]]
id = 46
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "At the end of the third day, when the brothers lay unable to move, let alone stand, the King stood between them in shame."
parent = 26

[[nodes]]
id = 47
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "As punishment for their squabbling he banished his sons from his realm, ordering that neither should return until they had conquered lands of their own."
parent = 26

[[nodes]]
id = 48
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Jatizso set sail with a band of loyal followers, sailing into the east, while Neitiznot went west."
parent = 26

[[nodes]]
id = 49
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Jatizso ventured far into uncharted oceans, his crew dwindling as the trials of sailing and sea monsters took them."
parent = 26

[[nodes]]
id = 50
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Jatizso's ship limped through the frozen wastes, in need of repairs, fighting off pirates who thought them easy pickings."
parent = 26

[[nodes]]
id = 51
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "At last a promising land was sighted, a land rich in minerals, deep fjords and sweeping mountains."
parent = 26

[[nodes]]
id = 52
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Jatizso claimed the land and named it after himself."
parent = 26

[[nodes]]
id = 53
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "A mighty citadel was constructed to protect his land; then Jatizso set forth to explore his new kingdom."
parent = 26

[[nodes]]
id = 54
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Crossing a few fjords, Jatizso spied an island which remained green and fertile, even at such latitude."
parent = 26

[[nodes]]
id = 55
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "With a mighty cheer Jatizso and his men marched on the island. Upon reaching the island, however, they discovered a wooden stockade."
parent = 26

[[nodes]]
id = 56
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Determined to be master of all the land, Jatizso stood in front of the gates. He looked up and demanded that those within the stockade surrendered."
parent = 26

[[nodes]]
id = 57
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Jatizso was horrified when his brother appeared on the battlements and cried 'This is my land! Go find yer own'. To which his brother replied 'No it's not!', throwing some rocks for good measure."
parent = 26

[[nodes]]
id = 58
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "And so the blood feud continued."
parent = 26

[[nodes]]
id = 59
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "The fighting between the towns has continued for generations with little sign of improvement."
parent = 26

[[nodes]]
id = 60
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Quite recently a massive troll army seized one of the islands to the north, while our townships' militias were busy fighting one another."
parent = 26

[[nodes]]
id = 61
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "They marched down and razed Neitiznot to the ground while Neitiznot's troops laid siege to Jatizso."
parent = 26

[[nodes]]
id = 62
depth = 2
kind = "speaker"
speaker = "Maria Gunnars"
text = "The smoke damage was atrocious, I had to replace my entire wardrobe."
parent = 26

[[nodes]]
id = 63
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Yes, dear."
parent = 26

[[nodes]]
id = 64
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "Anyway, a hasty sort of peace has been agreed until the trolls are dealt with."
parent = 26

[[nodes]]
id = 65
depth = 2
kind = "speaker"
speaker = "Mord Gunnars"
text = "But you can still see the bitter rivalry as guards hurl insults between the towns."
parent = 26

