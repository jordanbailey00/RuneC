[[nodes]]
id = 1043
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Right, now that we're all here, let's get started."
parent = -1

[[nodes]]
id = 1044
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "So, as I'm sure you've all heard, King Lathas of Ardougne is dead. He was overthrown by his subjects and executed soon afterwards."
parent = -1

[[nodes]]
id = 1045
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "That's not all though, the mourners of West Ardougne have been driven out of the city. Lord Iorwerth no longer has any presence in Ardougne."
parent = -1

[[nodes]]
id = 1046
depth = 1
kind = "speaker"
speaker = "Ysgawyn"
text = "Let's not ignore the obvious, Arianwyn. Our supposed ally, [player name], helped lead the uprising. His actions may well have endangered us all."
parent = -1

[[nodes]]
id = 1047
depth = 1
kind = "speaker"
speaker = "Ilfeen"
text = "But surely this is a good thing? With Ardougne lost to him, Lord Iorwerth no longer has access to the Temple of Light. Without that, he has no way to summon the Dark Lord."
parent = -1

[[nodes]]
id = 1048
depth = 1
kind = "speaker"
speaker = "Ysgawyn"
text = "The temple was already secure. All this uprising has achieved is to anger the enemy."
parent = -1

[[nodes]]
id = 1049
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "You say that like it's a bad thing, Ysgawyn. Last time I checked, we didn't care about upsetting our foe."
parent = -1

[[nodes]]
id = 1050
depth = 1
kind = "speaker"
speaker = "Ysgawyn"
text = "I care about keeping our people alive, Islwyn!"
parent = -1

[[nodes]]
id = 1051
depth = 1
kind = "speaker"
speaker = "Elena"
text = "And what about our people? While you sat here in your secure little village, we took action! We saved lives! But I guess you're too selfish to care about us."
parent = -1

[[nodes]]
id = 1052
depth = 1
kind = "speaker"
speaker = "Ysgawyn"
text = "Selfish? How dare you! You know nothing of the plight of the elves, girl. You'd do well to keep your mouth shut!"
parent = -1

[[nodes]]
id = 1053
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "That's enough Ysgawyn. We can debate what's happened for days and still reach no conclusion. That is not why I called you all here. Instead, we need to plan what happens next."
parent = -1

[[nodes]]
id = 1054
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Now, while freeing [player name] and Elena from the Iorwerth camp, we were confronted by Lord Iorwerth. He could have killed us all, but he let us go."
parent = -1

[[nodes]]
id = 1055
depth = 1
kind = "speaker"
speaker = "Eluned"
text = "He let you go? Why?"
parent = -1

[[nodes]]
id = 1056
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "His reasoning was disturbing. For a long time now, we've believed that Lord Iorwerth has been trying to summon Zamorak, the Dark Lord. However, he claimed otherwise."
parent = -1

[[nodes]]
id = 1057
depth = 1
kind = "speaker"
speaker = "Ilfeen"
text = "But if not Zamorak, then who?"
parent = -1

[[nodes]]
id = 1058
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Seren."
parent = -1

[[nodes]]
id = 1059
depth = 1
kind = "speaker"
speaker = "Eluned"
text = "Seren? But that's impossible, Seren is gone."
parent = -1

[[nodes]]
id = 1060
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "He seems to think otherwise. He claimed that a part of Seren still lives, trapped within the Temple of Light. Apparently, he discovered this by breaking one of the nine seals within the Grand Library."
parent = -1

[[nodes]]
id = 1061
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "That's impossible. He must be lying."
parent = -1

[[nodes]]
id = 1062
depth = 1
kind = "speaker"
speaker = "Elena"
text = "Sorry, but I don't understand what you mean by all of this. Who's Seren? What library?"
parent = -1

[[nodes]]
id = 1063
depth = 1
kind = "speaker"
speaker = "Eluned"
text = "Seren was our goddess, our guardian and our teacher. Everything we have, we owe to her. She helped us build the great city of Prifddinas, a place where all elves could live in harmony."
parent = -1

[[nodes]]
id = 1064
depth = 1
kind = "speaker"
speaker = "Ilfeen"
text = """
At the end of the God Wars, the gods were banished from this world. Seren didn't want to leave us though, she couldn't. She shattered herself into thousands of crystals. Those crystals are all we have left of her now.
"""
parent = -1

[[nodes]]
id = 1065
depth = 1
kind = "speaker"
speaker = "Elena"
text = "I see, I'm sorry to hear that."
parent = -1

[[nodes]]
id = 1066
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "As for the Grand Library, it was a great archive of knowledge beneath Prifddinas. Pretty much everything there was open to all of elven kind."
parent = -1

[[nodes]]
id = 1067
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "There was an exception to that though, the nine seals of Seren. The seals guarded the forbidden knowledge, that which only Seren herself could access."
parent = -1

[[nodes]]
id = 1068
depth = 1
kind = "speaker"
speaker = "Player"
text = "And Lord Iorwerth managed to break one of these seals."
parent = -1

[[nodes]]
id = 1069
depth = 1
kind = "speaker"
speaker = "Ysgawyn"
text = "So he claims..."
parent = -1

[[nodes]]
id = 1070
depth = 1
kind = "speaker"
speaker = "Elena"
text = "Is there no way we can check?"
parent = -1

[[nodes]]
id = 1071
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "No. Prifddinas was lost to us. When Lord Iorwerth first took control of the city, my grandfather, Baxtorian, led an army to try and stop him."
parent = -1

[[nodes]]
id = 1072
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "When that failed, Baxtorian and the other clan elders made one final ditch attempt to save Prifddinas. They sung the song of inversion to revert the entire city to a crystal seed."
parent = -1

[[nodes]]
id = 1073
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Their plan worked, and the city was lost to Lord Iorwerth. However, it was lost to the rest of us as well, the Grand Library with it."
parent = -1

[[nodes]]
id = 1074
depth = 1
kind = "speaker"
speaker = "Elena"
text = "What happened to Baxtorian?"
parent = -1

[[nodes]]
id = 1075
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "While he was fighting Lord Iorwerth, invaders took control of our kingdom to the east. They kidnapped Glarial, Baxtorian's wife."
parent = -1

[[nodes]]
id = 1076
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "Unable to find her, he sealed himself beneath the waterfall where they lived, never to be seen again."
parent = -1

[[nodes]]
id = 1077
depth = 1
kind = "speaker"
speaker = "Player"
text = "Baxtorian was king of the elves back then. Do you think he had access to the forbidden knowledge?"
parent = -1

[[nodes]]
id = 1078
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "It's not impossible I suppose. If anyone, it would have been him. Baxtorian was closer to Seren than any other elf, it's one of the reasons he was chosen to become king."
parent = -1

[[nodes]]
id = 1079
depth = 1
kind = "speaker"
speaker = "Ysgawyn"
text = "Baxtorian is gone though, even if he knew something, he can't help us now."
parent = -1

[[nodes]]
id = 1080
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = """
Don't be so sure. I never knew my grandfather, but my mother always told me that he wasn't the type for taking chances. If he knew something important, he'd have made sure it wouldn't have been lost with him.
"""
parent = -1

[[nodes]]
id = 1081
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "We can't possibly make a plan without knowing Lord Iorwerth's intentions. While unlikely to be true, this stuff about the library is all we have to go on."
parent = -1

[[nodes]]
id = 1082
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "If Baxtorian left behind anything that could help us, we should try to find it."
parent = -1

[[nodes]]
id = 1083
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "Baxtorian kept everything of importance to him at his home within Baxtorian Falls. If we're going to find anything, it's probably there."
parent = -1

[[nodes]]
id = 1084
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "[player name], you've been to Baxtorian Falls multiple times. You're the best person to take the lead on this."
parent = -1

[[nodes]]
id = 1085
depth = 1
kind = "speaker"
speaker = "Ysgawyn"
text = "You trust the human with this?"
parent = -1

[[nodes]]
id = 1086
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "Let go of your pride, Ysgawyn. [player name] has proven his worth to us."
parent = -1

[[nodes]]
id = 1087
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "I'd like to accompany you on this one [player name], it might be useful to have an elf with you."
parent = -1

[[nodes]]
id = 1088
depth = 1
kind = "speaker"
speaker = "Player"
text = "Sounds good to me."
parent = -1

[[nodes]]
id = 1089
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "Before her death, my mother passed down a book to me. It was written by my grandfather for his wife. You should take it with you. It might contain something of use."
parent = -1

[[nodes]]
id = 1090
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Thank you Islwyn. While we're gone, the rest of you should focus on Lord Iorwerth. See if you can get any idea on what he's planning now that he's lost Ardougne. Just be careful."
parent = -1

[[nodes]]
id = 1091
depth = 1
kind = "speaker"
speaker = "Eluned"
text = "We always are. Good luck to you both."
parent = -1

[[nodes]]
id = 1092
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "And you. Let's get started."
parent = -1

[[nodes]]
