[[nodes]]
id = 1571
depth = 1
kind = "speaker"
speaker = "Lord Ieuan Amlodd"
text = "No, but it is all you have. Now, when you are ready, I can teleport you into the crystal seed. I have the potion that you made earlier, it will ensure you survive the journey."
parent = -1

[[nodes]]
