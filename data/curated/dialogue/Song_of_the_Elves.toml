[[nodes]]
id = 2912
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "Speaking of which, myself and the other elders have come to an agreement. For too long, we've been afraid of outsiders, showing them mistrust while our own kind plot against us."
parent = -1

[[nodes]]
id = 2913
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "After all that's happened, we've decided that from now on, that will no longer be the case. We will open our city up to the other races, letting them walk among us for the first time."
parent = -1

[[nodes]]
id = 2914
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "As a thank you for all that you've done, we'd like the two of you to be the first to enter Prifddinas."
parent = -1

[[nodes]]
id = 2915
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, that's quite the honour."
