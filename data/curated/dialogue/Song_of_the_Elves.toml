[[nodes]]
id = 1364
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "It was the Amlodd clan who created the Prifddinas defences. Their clan should have the knowledge needed to overcome them. And of all the Amlodd clan, none know more than Lord Ieuan Amlodd himself."
