text = "The others leave the meeting."
parent = -1

[[nodes]]
id = 1094
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Thank you for agreeing to help us, [player name]. We owe a lot to you, even if some of us don't show it very well."
parent = -1

[[nodes]]
id = 1095
depth = 1
kind = "speaker"
speaker = "Player"
text = "You mean Ysgawyn? He is a bit rude."
parent = -1

[[nodes]]
id = 1096
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Try not to be too judgemental. Ysgawyn's husband was killed by Essyllt, one of Lord Iorwerth's henchmen. Ysgawyn's never really been the same since."
parent = -1

[[nodes]]
id = 1097
depth = 1
kind = "speaker"
speaker = "Player"
text = "I've met Essyllt, he was the one in charge of the mourners in West Ardougne."
parent = -1

[[nodes]]
id = 1098
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "He's a nasty piece of work. If you try hard enough, you can find something redeemable about most elves, even those that serve Lord Iorwerth."
parent = -1

[[nodes]]
id = 1099
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "But Essyllt... He seems to take joy in the suffering of others, especially those unable to defend themselves."
parent = -1

[[nodes]]
id = 1100
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Enough about him though, we need to focus on Baxtorian Falls. I suggest we travel seperately, we can't be too careful at the moment."
parent = -1

[[nodes]]
id = 1101
depth = 1
kind = "speaker"
speaker = "Player"
text = "Makes sense, will you be okay getting there on your own?"
parent = -1

[[nodes]]
id = 1102
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "I'm no expert on your lands but I should be fine. I just have a few things to gather before I depart."
parent = -1

[[nodes]]
id = 1103
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well in that case, I'll meet you there."
