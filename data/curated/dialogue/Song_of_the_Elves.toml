[[nodes]]
id = 319
depth = 1
kind = "speaker"
speaker = "Councillor Halgrive"
text = "It's no surprise, really. The king has created a clever lie with the plague, one that's easy for people to believe."
parent = -1

[[nodes]]
id = 320
depth = 1
kind = "speaker"
speaker = "Elena"
text = "Councillor Halgrive has come up with an alternative way to gather support. I can't pretend I totally approve of it, but it seems to be our only option."
