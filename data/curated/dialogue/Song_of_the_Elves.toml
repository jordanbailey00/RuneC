[[nodes]]
id = 1305
depth = 2
kind = "speaker"
speaker = "Elena"
text = "A long time ago, there were two brothers living in Avarrocka. They lived a simple life, farming the land and selling the produce to people in the city."
parent = 1303

[[nodes]]
id = 1306
depth = 2
kind = "speaker"
speaker = "Elena"
text = "When war came to the city, the king ordered that every able-bodied man take up arms against the enemy. The two brothers had to leave their home behind, to fight for a king they'd never met."
parent = 1303

[[nodes]]
id = 1307
depth = 2
kind = "speaker"
speaker = "Elena"
text = "Like everyone else, they were given basic weapons and basic training. Enough to give them a chance, but not a big one. When the fighting started, they were poorly equipped and poorly prepared."
parent = 1303

[[nodes]]
id = 1308
depth = 2
kind = "speaker"
speaker = "Elena"
text = """
They fought in many battles. Battles in strange places against strange people. As the war dragged on, they saw more and more horrors, from both sides. The only thing that kept them going was each other.
"""
parent = 1303

[[nodes]]
id = 1309
depth = 2
kind = "speaker"
speaker = "Elena"
text = "As the war drew to a close, they were called to one final battle. The enemy knew they were losing, and they fought more ferociously than ever before."
parent = 1303

[[nodes]]
id = 1310
depth = 2
kind = "speaker"
speaker = "Elena"
text = "That was where it happened. One of the brothers was cut off and surrounded. He tried to fight back, but he didn't stand a chance."
parent = 1303

[[nodes]]
id = 1311
depth = 2
kind = "speaker"
speaker = "Elena"
text = "Eventually the fighting stopped, and the war was over. The other brother could finally go home. But the truth is, he had nothing to go home to."
parent = 1303

[[nodes]]
id = 1312
depth = 2
kind = "speaker"
speaker = "Elena"
text = "It wasn't the farm that mattered, not really. The thing that mattered to him was gone."
parent = 1303

[[nodes]]
id = 1313
depth = 2
kind = "speaker"
speaker = "Elena"
text = "In a way, he'd died back on the battlefield alongside his brother. Left in his place was just a broken man, with nothing left to live for."
parent = 1303

