[[nodes]]
id = 1128
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "I was one of the elves born in Baxtorian's new kingdom. My family were close relations of Baxtorian, he invited us here a few times."
parent = -1

[[nodes]]
id = 1129
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = """
Those were simpler times, happier times. After Baxtorian left to try and retake Prifddinas, my parents were among those who joined him. They never returned. I was still just a child at the time, alone and afraid.
"""
parent = -1

[[nodes]]
id = 1130
depth = 1
