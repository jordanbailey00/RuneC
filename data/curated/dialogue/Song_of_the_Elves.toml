[[nodes]]
id = 313
depth = 1
kind = "speaker"
speaker = "Councillor Halgrive"
text = "So unluckily for us, the king has total control over the Paladins and the Knights of Ardougne. With them, he has a large army at his disposal, one we cannot hope to stand against."
