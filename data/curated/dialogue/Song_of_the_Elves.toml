[[nodes]]
id = 2389
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "What happened? Tell us."
parent = -1

[[nodes]]
id = 2390
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I..."
parent = -1

[[nodes]]
id = 2391
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = """
It was after we were defeated by Lord Iorwerth. With Prifddinas lost to us, we returned to our kingdom in the east. We'd been gone for years by then, and in our absence, the kingdom had fallen to our other foes.
"""
parent = -1

[[nodes]]
id = 2392
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "So many dead... my people, the ones I was meant to protect. But that wasn't the worst of it. Glarial, my beloved, she was taken from me."
parent = -1

[[nodes]]
id = 2393
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "We searched far and wide, desperate to find her. At times it felt like we were close, but the enemy always managed to elude us."
parent = -1

[[nodes]]
id = 2394
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "Eventually, we managed to track her captors to some caves south of our ruined kingdom. It was clearly a trap, but I was a fool. I was so blind in my desire to find her, I didn't consider the obvious."
parent = -1

[[nodes]]
id = 2395
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I sent my soldiers in, the few that I still had. They fought the best they could, but it was hopeless. They were massacred."
parent = -1

[[nodes]]
id = 2396
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "After that, I knew I couldn't carry on. I was alone and powerless. So I sealed myself away, in the hope that one day she would come back to me."
parent = -1

[[nodes]]
id = 2397
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "You... you killed them? You killed them all?"
parent = -1

[[nodes]]
id = 2398
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I did. But you don't understand, I loved my wife. If there was a chance of freeing her, I had to take it."
parent = -1

[[nodes]]
id = 2399
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "You think I don't understand love? I knew love, for Eirlys! My mother! Your daughter! She died in your war, while you hid away!"
parent = -1

[[nodes]]
id = 2400
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "Lord Iorwerth was right! You're just a coward!"
parent = -1

[[nodes]]
id = 2401
depth = 1
kind = "speaker"
speaker = "Eluned"
text = "Islwyn, where are you going?"
parent = -1

[[nodes]]
id = 2402
depth = 1
kind = "speaker"
speaker = "Islwyn"
text = "The Underground Pass! I intend to fight for my people, even if their own king won't!"
parent = -1

[[nodes]]
id = 2403
depth = 1
kind = "other"
text = "{{qact|Islwyn leaves, and the funeral ends.}}"
parent = -1

[[nodes]]
id = 2404
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 2405
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I used to think I was a good king, one that took care of his people. Thanks to me, they had roofs over their heads and food for their tables."
parent = -1

[[nodes]]
id = 2406
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "And yet... I never loved them, not really. The only thing I loved was her, my Glarial."
parent = -1

[[nodes]]
id = 2407
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "When they took her from me... I was torn apart. I vowed I would get her back no matter the cost. That vow destroyed my people... I destroyed my people. In the end... I became just like Lord Iorwerth."
parent = -1

[[nodes]]
id = 2408
depth = 1
kind = "speaker"
speaker = "Player"
text = "Maybe you did fail your people, you didn't destroy them though."
parent = -1

[[nodes]]
id = 2409
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "Maybe not then... but now..."
parent = -1

[[nodes]]
id = 2410
depth = 1
kind = "speaker"
speaker = "Player"
text = "You think this is over? Is that it? Lord Iorwerth beats us once so we just give up? If you truly think that then yes, you have destroyed your people!"
parent = -1

[[nodes]]
id = 2411
depth = 1
kind = "speaker"
speaker = "Player"
text = "Do you want to just rot here? Wallowing in your own self pity while you lose the little you still have?"
parent = -1

[[nodes]]
id = 2412
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "What other option is there?"
parent = -1

[[nodes]]
id = 2413
depth = 1
kind = "speaker"
speaker = "Player"
text = "We can fight! Lord Iorwerth doesn't win until he gets into the Temple of Light! We can still stop this!"
parent = -1

[[nodes]]
id = 2414
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "But he outnumbers us ten to one... We'll all die."
parent = -1

[[nodes]]
id = 2415
depth = 1
kind = "speaker"
speaker = "Player"
text = "Surely it's better to die trying than to live a life of regret? I'd have thought you'd know that better than anyone."
parent = -1

[[nodes]]
id = 2416
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I... I can't..."
parent = -1

[[nodes]]
id = 2417
depth = 1
kind = "speaker"
speaker = "Player"
text = """
Oh for crying out loud! You have got to be the biggest waste of space I have ever met! I've met goblins with more of a spine than you! For once in your miserable life why don't you actually do something worthwhile?
"""
parent = -1

[[nodes]]
id = 2418
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "You... You're awful at pep talks."
parent = -1

[[nodes]]
id = 2419
depth = 1
kind = "speaker"
speaker = "Player"
text = "It wasn't meant to be a pep talk!"
parent = -1

[[nodes]]
id = 2420
depth = 1
kind = "speaker"
speaker = "Player"
text = "..."
parent = -1

[[nodes]]
id = 2421
depth = 1
kind = "speaker"
speaker = "Player"
text = "*sigh* Look... Ask yourself this... What would she want?"
parent = -1

[[nodes]]
id = 2422
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "She... She'd want me to save them."
parent = -1

[[nodes]]
id = 2423
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then why are we still stood around talking? We've got work to do!"
parent = -1

[[nodes]]
id = 2424
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I... You're right... We don't have a plan though."
parent = -1

[[nodes]]
id = 2425
depth = 1
kind = "speaker"
speaker = "Player"
text = "Lord Iorwerth only has one way into the Temple of Light, the dwarf tunnel from the Underground Pass. We need to stop him getting through."
parent = -1

[[nodes]]
id = 2426
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "How?"
parent = -1

[[nodes]]
id = 2427
depth = 1
kind = "speaker"
speaker = "Player"
text = "The dwarves should be able to seal the tunnel. We'll need to defend them while they do."
parent = -1

[[nodes]]
id = 2428
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "But we don't have the strength to withstand Lord Iorwerth's forces."
parent = -1

[[nodes]]
id = 2429
depth = 1
kind = "speaker"
speaker = "Player"
text = "We have the clan elders, their combined power is an army in itself."
parent = -1

[[nodes]]
id = 2430
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "Not all the clan elders. We're still missing two."
parent = -1

[[nodes]]
id = 2431
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well have you deciphered their clues?"
parent = -1

[[nodes]]
id = 2432
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I have, but there's a problem. We should hopefully be able to find Lady Meilyr. But Lady Ithell, she died in the early days of the war."
parent = -1

[[nodes]]
id = 2433
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's not good. Did she have any descendants?"
parent = -1

[[nodes]]
id = 2434
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I had a look. Kelyn Ithell is her closest living relative. Problem is, we don't just need a Lady Ithell, we need the Lady Ithell."
parent = -1

[[nodes]]
id = 2435
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hmmm. How did she die?"
parent = -1

[[nodes]]
id = 2436
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "An illness of some sort, I never actually knew what it was. She'd had it for years."
parent = -1

[[nodes]]
id = 2437
depth = 1
kind = "speaker"
speaker = "Player"
text = "For years? So she'd have been ill when she gave you her clue. If she knew she was dying, maybe her clue reflects that."
parent = -1

[[nodes]]
id = 2438
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "What do you mean?"
parent = -1

[[nodes]]
id = 2439
depth = 1
kind = "speaker"
speaker = "Player"
text = "Knowledge can be passed on. Maybe the clue will lead us to her knowledge."
parent = -1

[[nodes]]
id = 2440
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I... I suppose you could be right."
parent = -1

[[nodes]]
id = 2441
depth = 1
kind = "speaker"
speaker = "Player"
text = "It's worth a shot at least. Leave it with me and I'll see what I can do. In the meantime, you should take the others to the dwarf camp in the Underground Pass."
parent = -1

[[nodes]]
id = 2442
depth = 1
kind = "speaker"
speaker = "Player"
text = "See if you can get in contact with General Hining and the new king of Ardougne as well. Maybe they'll be willing to help us."
parent = -1

[[nodes]]
id = 2443
depth = 1
kind = "speaker"
speaker = "Baxtorian"
text = "I'll see what I can do. We'll need to work quickly though, Lord Iorwerth will be preparing his forces as we speak. Now I guess you'll be wanting to hear those clues?"
parent = -1

