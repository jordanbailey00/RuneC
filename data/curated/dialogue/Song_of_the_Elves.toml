[[nodes]]
id = 2916
depth = 1
kind = "speaker"
speaker = "Elena"
text = "They've also agreed to let me move into the city. That tiny house in Ardougne was becoming a bit tiresome, and there's so much for me to learn from the Meilyr elves."
parent = -1

[[nodes]]
id = 2917
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well I'll be sure to come and visit."
parent = -1

[[nodes]]
id = 2918
depth = 1
kind = "speaker"
speaker = "Player"
text = "Now that the city has been reformed, are you going to become king of the elves again?"
