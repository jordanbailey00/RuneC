speaker = "Player"
text = "Bit of an angry guy isn't he?"
parent = -1

[[nodes]]
id = 1113
depth = 1
kind = "speaker"
speaker = "Elena"
text = "That's one way to put it. I can't say I approve of his attitude, but I appreciate he's seen a lot in this war."
parent = -1

[[nodes]]
id = 1114
depth = 1
kind = "speaker"
speaker = "Elena"
text = "It's interesting, the elves have such long lifespans, we're just children compared to them. And yet, even with all their experience, they're still just as fickle as we are."
parent = -1

[[nodes]]
id = 1115
depth = 1
kind = "speaker"
speaker = "Player"
text = "I find most races are the same to be honest."
