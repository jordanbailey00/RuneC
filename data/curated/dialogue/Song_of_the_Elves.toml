speaker = "Edmond"
text = "But why? I know all this plague business has got her a bit emotional, but can't he see that she's just upset?"
parent = -1

[[nodes]]
id = 51
depth = 1
kind = "speaker"
speaker = "Player"
text = "He said she was a threat to Ardougne."
parent = -1

[[nodes]]
id = 52
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "A threat? But she's no danger to anyone. Why does he think that way?"
parent = -1

[[nodes]]
id = 53
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well the thing is..."
parent = -1

[[nodes]]
id = 54
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "What?"
parent = -1

[[nodes]]
id = 55
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well... She's right. The plague is a lie. That's why the king had her imprisoned. He was afraid she'd expose the truth."
parent = -1

[[nodes]]
id = 56
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "The plague is a lie? What do you mean the plague is a lie?"
parent = -1

[[nodes]]
id = 57
depth = 1
kind = "speaker"
speaker = "Player"
text = "I guess I have some explaining to do."
parent = -1

[[nodes]]
id = 58
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "You most certainly do."
parent = -1

[[nodes]]
id = 59
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, it all started after I freed Elena from West Ardougne. As you can imagine, she was still keen on helping the plague victims and asked me to help her find a cure."
parent = -1

[[nodes]]
id = 60
depth = 1
kind = "speaker"
speaker = "Player"
text = "We sent some samples to her old teacher, Guidor in Varrock. He ran some tests and found out that the plague isn't actually real. I confronted the king on this and he admitted it."
parent = -1

[[nodes]]
id = 61
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "But why?"
parent = -1

[[nodes]]
id = 62
depth = 1
kind = "speaker"
speaker = "Player"
text = "The king told me that his brother, King Tyras, was corrupted by the Dark Lord while exploring the lands to the west."
parent = -1

[[nodes]]
id = 63
depth = 1
kind = "speaker"
speaker = "Player"
text = "As Tyras was the king of West Ardougne, King Lathas decided to cordon the city off to keep the rest of the world safe."
parent = -1

[[nodes]]
id = 64
depth = 1
kind = "speaker"
speaker = "Player"
text = "The plague was the excuse he gave for the quarantine."
parent = -1

[[nodes]]
id = 65
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "But that doesn't make any sense. Why not just tell the truth? Why lie to everyone and make up a plague? Something doesn't seem right about it all."
parent = -1

[[nodes]]
id = 66
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well you're right about that. Turns out King Lathas was lying about that as well. But I'll get to that in a minute."
parent = -1

[[nodes]]
id = 67
depth = 1
kind = "speaker"
speaker = "Player"
text = "After confronting the king, he recruited me and tasked me with helping him stop Tyras. He had me travel through the Underground Pass into the elven forests of Tirannwn."
parent = -1

[[nodes]]
id = 68
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "Elves? I wasn't even sure they existed anymore."
parent = -1

[[nodes]]
id = 69
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well Tirannwn is full of them. In fact, they're currently in the middle of a civil war."
parent = -1

[[nodes]]
id = 70
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "An elven civil war? I'm going to need a drink after all of this. So what happened next?"
parent = -1

[[nodes]]
id = 71
depth = 1
kind = "speaker"
speaker = "Player"
text = "I met with an ally of King Lathas, an elf called Lord Iorwerth. He's the leader of one of the elven factions. With his help, I was successful in assassinating King Tyras."
parent = -1

[[nodes]]
id = 72
depth = 1
kind = "speaker"
speaker = "Player"
text = "With the job done, I returned to Ardougne. However, on my way back, I was intercepted by an elf named Arianwyn, the leader of the rebel elves opposing Lord Iorwerth."
parent = -1

[[nodes]]
id = 73
depth = 1
kind = "speaker"
speaker = "Player"
text = "He revealed the truth to me, that King Lathas and Lord Iorwerth are in fact the evil ones. Together they intend to summon this Dark Lord."
parent = -1

[[nodes]]
id = 74
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "Just when I thought this story couldn't get any worse. The king is evil? Why?"
parent = -1

[[nodes]]
id = 75
depth = 1
kind = "speaker"
speaker = "Player"
text = "From what I can tell, King Lathas hated how his father split the kingdom, giving half to him and half to his brother. He wanted his brother dead from the start."
parent = -1

[[nodes]]
id = 76
depth = 1
kind = "speaker"
speaker = "Player"
text = "Not only that, he also wants to reclaim Camelot from King Arthur. I think he's hoping that this Dark Lord will help him."
parent = -1

[[nodes]]
id = 77
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "All of this, just because Lathas wants more land? What about this Lord Iorwerth, what's in it for him?"
parent = -1

[[nodes]]
id = 78
depth = 1
kind = "speaker"
speaker = "Player"
text = "I think he wants to use the Dark Lord to defeat the rebel elves and end the civil war. Apparently, it's been going on for hundreds of years."
parent = -1

[[nodes]]
id = 79
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "I see, this still doesn't explain why the plague was made up though."
parent = -1

[[nodes]]
id = 80
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well since I learnt the truth, I've been helping the rebel elves fight back against King Lathas and Lord Iorwerth."
parent = -1

[[nodes]]
id = 81
depth = 1
kind = "speaker"
speaker = "Player"
text = "I recently discovered that Lord Iorwerth believes the secrets to summoning the Dark Lord lie within the Temple of Light beneath Ardougne."
parent = -1

[[nodes]]
id = 82
depth = 1
kind = "speaker"
speaker = "Player"
text = "The plague was made up to hide their mining operation beneath the city."
parent = -1

[[nodes]]
id = 83
depth = 1
kind = "speaker"
speaker = "Player"
text = "All the mourners are actually Iorwerth elves in disguise and the people who they claim have died of the plague are actually getting sent into the mines."
parent = -1

[[nodes]]
id = 84
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "Goodness me Elena, what have you gotten yourself into?"
parent = -1

[[nodes]]
id = 85
depth = 1
kind = "speaker"
speaker = "Edmond"
text = "Thank you for telling me the truth [player name]. I just wish you had told me sooner."
parent = -1

[[nodes]]
