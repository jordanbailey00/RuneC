kind = "speaker"
speaker = "Player"
text = "What happened between you and Lord Iorwerth?"
parent = 1201

[[nodes]]
id = 1203
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "To be honest, even today I know little of him. When I left Prifddinas to expand our kingdom into the east, he was but a child, with the Iorwerth clan ruled by his mother."
parent = 1201

[[nodes]]
id = 1204
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "The first time I properly met him was after I heard about his takeover of the city. I led my forces through the Underground Pass and confronted him at the city gates."
parent = 1201

[[nodes]]
id = 1205
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "I tried to reason with him, but he had already decided that I was his enemy. We had the numbers and our forces were better skilled, so we tried to besiege the city."
parent = 1201

[[nodes]]
id = 1206
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "The Iorwerth forces had the strength and safety of the city walls though. They slowly whittled us down until we were too weak to carry on. We had no choice but to retreat."
parent = 1201

[[nodes]]
id = 1207
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "We fell back into the Underground Pass, intending to return to our kingdom in the east. Lord Iorwerth sent his forces in after us, hoping to wipe us out."
parent = 1201

[[nodes]]
id = 1208
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "We no longer had the strength in numbers, but we still outmatched the Iorwerth troops in skill and experience. We fought back while we retreated. Both sides suffered huge losses."
parent = 1201

[[nodes]]
id = 1209
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "Eventually we managed to make it through to the other side. By then, there were few of us left. Lord Iorwerth had failed to wipe us out, but he knew we were beaten."
parent = 1201

[[nodes]]
id = 1210
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "While we were gone, an uprising had occurred in the eastern kingdom. We took our best fighters to Prifddinas, those that remained were unable to hold back the enemy."
parent = 1201

[[nodes]]
id = 1211
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "My wife was taken and most of my people were slaughtered. I turned my attention to finding my wife and getting the rest of my people to safety."
parent = 1201

[[nodes]]
id = 1212
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "Lord Iorwerth became the least of my problems. I suspect he didn't consider me much of a threat at that point anyway."
parent = 1201

