[[nodes]]
id = 1602
depth = 1
kind = "speaker"
speaker = "Memory of Seren"
text = "'...Therein lies my guilt. A part of me, trapped and alone. Dark, yes, but still a part of my being, sealed away in the Temple of Light.'"
parent = -1

[[nodes]]
id = 1603
depth = 1
kind = "speaker"
speaker = "Memory of Seren"
text = """
'The protections on the temple, they should keep her contained. But in case they don't, I created one last safeguard, a prison within a prison. With it I made a key, an orb of light, to unlock the darkness.'
"""
parent = -1

[[nodes]]
id = 1604
depth = 1
kind = "speaker"
speaker = "Memory of Seren"
text = "'I could have destroyed it, sealed her away forever. But I still question my decision, and so I hid the orb away, while I think upon my choices.'"
parent = -1

[[nodes]]
id = 1605
depth = 1
kind = "speaker"
speaker = "Memory of Seren"
text = "'The shrine at Gorlah, that is where it lies. With it, she can be freed... or destroyed...'"
parent = -1

[[nodes]]
