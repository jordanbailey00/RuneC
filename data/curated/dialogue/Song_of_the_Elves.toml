speaker = "Player"
text = "What was Seren like?"
parent = 1214

[[nodes]]
id = 1216
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "She... She was wonderful. She taught us to better ourselves in every way possible. Everything we know, everything we are, it all came from her."
parent = 1214

[[nodes]]
id = 1217
depth = 3
kind = "speaker"
speaker = "Player"
text = "I wish I could have met her."
parent = 1214

[[nodes]]
id = 1218
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "I feel very blessed to have been able to. The love she had for us, it's unlike anything I've ever seen."
parent = 1214

[[nodes]]
id = 1219
depth = 3
kind = "speaker"
speaker = "Player"
text = "Sounds like she was pretty much perfect."
parent = 1214

[[nodes]]
id = 1220
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "Well... not quite. Many of the elves alive now were not around when Seren was still with us. They only know her through the stories passed down to them. The stories don't tell everything though."
parent = 1214

[[nodes]]
id = 1221
depth = 3
kind = "speaker"
speaker = "Player"
text = "What do you mean?"
parent = 1214

[[nodes]]
id = 1222
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "Seren was remarkable, but under the surface, she hid a great pain. A sadness unlike any other. She never spoke of it, but when you looked hard enough, you could see the anguish."
parent = 1214

[[nodes]]
id = 1223
depth = 3
kind = "speaker"
speaker = "Baxtorian"
text = "I guess we all have our demons, even the gods. Seren was a beacon of light in this grim world, but the brightest light casts the darkest shadow, and none shone brighter than her."
parent = 1214

