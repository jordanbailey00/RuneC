[[nodes]]
id = 15
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "When I was a boy, my grandfather would tell me the story of my ancestor, Magnus Rimor. He was a great explorer who lived a thousand years ago."
parent = 11

[[nodes]]
id = 16
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "One day, Magnus was approached by none other than King Shayzien VII himself. The King asked him to lead an expedition to explore Mount Quidamortem in the Kebos Lowlands."
parent = 11

[[nodes]]
id = 17
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "Alas, according to records, the party never returned and were declared to have perished in the field."
parent = 11

[[nodes]]
id = 18
depth = 3
kind = "speaker"
speaker = "Player"
text = "That's very interesting and all but why are you telling me this?"
parent = 11

[[nodes]]
id = 19
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "A few days ago, I received a parcel. There was no name on it and I never saw the person that delivered it. Inside, I found something truly fascinating."
parent = 11

[[nodes]]
id = 20
depth = 3
kind = "speaker"
speaker = "Player"
text = "What was it?"
parent = 11

[[nodes]]
id = 21
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "There was an old journal, along with a note. The note claims that the journal was stolen from the Tower of Magic during the uprising against Xeric."
parent = 11

[[nodes]]
id = 22
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "But that's not all. Apparently the journal was written by King Shayzien VII himself!"
parent = 11

[[nodes]]
id = 23
depth = 3
kind = "speaker"
speaker = "Player"
text = "Again, really great and all but I still don't see where I come into this."
parent = 11

[[nodes]]
id = 24
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "Most of the journal is illegible but I've still managed to find a few readable extracts. Listen to this one..."
parent = 11

[[nodes]]
id = 25
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "'Quidamortem's creatures are compatible. The experimentation is proving successful and we will soon be ready to mass produce.'"
parent = 11

[[nodes]]
id = 26
depth = 3
kind = "speaker"
speaker = "Player"
text = "So?"
parent = 11

[[nodes]]
id = 27
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "That extract had a date in the 37th decade but the expedition was declared a failure in the 36th decade! If the expedition truly was a failure, why was the King writing about Quidamortem years later?"
parent = 11

[[nodes]]
id = 28
depth = 3
kind = "speaker"
speaker = "Player"
text = "Maybe there was another expedition."
parent = 11

[[nodes]]
id = 29
depth = 3
kind = "speaker"
speaker = "Phileas Rimor"
text = "Maybe. Or maybe someone wasn't telling the truth about that expedition. Regardless, I must find out what really happened. Can you help me?"
