kind = "speaker"
speaker = "Player"
text = "I'm searching for information on an expedition to Mount Quidamortem during his reign."
parent = 53

[[nodes]]
id = 57
depth = 2
kind = "speaker"
speaker = "Istoria"
text = "Ah yes, I know of that expedition. King Shayzien VII was one of Kourend's most notable rulers. According to the history books, his reign was defined by violence."
parent = 53

[[nodes]]
id = 58
depth = 2
kind = "speaker"
speaker = "Istoria"
text = "The expedition to Quidamortem was part of his aggressive plans to expand Kourend's territory. Unfortunately, it was a failure. The entire party was killed."
parent = 53

[[nodes]]
id = 59
depth = 2
kind = "speaker"
speaker = "Istoria"
text = "The King himself died a few years later and was succeeded by Xeric, a tyrannical mage who made the King seem meek in comparison. Though of course, many believe them to actually be the same person."
parent = 53

[[nodes]]
id = 60
depth = 2
kind = "speaker"
speaker = "Istoria"
text = "But I digress. The key thing to note is that no more expeditions were ordered under King Shayzien VII's rule. Does that help you?"
parent = 53

[[nodes]]
id = 61
depth = 2
kind = "speaker"
speaker = "Player"
text = "No, not really. I have reason to believe that not everyone was killed on that expedition."
parent = 53

[[nodes]]
id = 62
depth = 2
kind = "speaker"
speaker = "Istoria"
text = "I'm afraid I can't help you there. All the evidence we have tells us that the expedition had no survivors."
parent = 53

[[nodes]]
id = 63
depth = 2
kind = "speaker"
speaker = "Player"
text = "So I'm at a dead end?"
parent = 53

[[nodes]]
id = 64
depth = 2
kind = "speaker"
speaker = "Istoria"
text = "It would seem that way. However, if you do want to learn more about King Shayzien VII, it might be worth talking to Pagida. He's recently been investigating the King's additions to the Tower of Magic."
parent = 53

[[nodes]]
