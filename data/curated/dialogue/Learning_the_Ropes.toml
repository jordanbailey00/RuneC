speaker = "Account Guide"
text = "Exactly!"
parent = -1

[[nodes]]
id = 530
depth = 1
kind = "speaker"
speaker = "Account Guide"
text = "Next up, you have your inbox and name changer. The inbox is where you’ll receive important information related to your account and the game. Be sure to keep an eye on it."
parent = -1

[[nodes]]
id = 531
depth = 1
kind = "speaker"
speaker = "Account Guide"
text = "The name changer allows you to change your display name if you don't like your current one. Be aware though that this is only available to accounts with membership."
parent = -1

[[nodes]]
id = 532
depth = 1
kind = "speaker"
speaker = "Player"
text = "Awesome. Is there anything else I should know about accounts?"
parent = -1

[[nodes]]
id = 533
depth = 1
kind = "speaker"
speaker = "Account Guide"
text = "Your account is very valuable and it's important you look after it. Various tools can help with this, such as Bank PINs and two-factor authentication options."
