[[nodes]]
id = 525
depth = 1
kind = "speaker"
speaker = "Account Guide"
text = "Bonds are another thing that you should know about. You can purchase Bonds from the store in the Account Management menu. Once you have some Bonds, you can redeem them for membership!"
parent = -1

[[nodes]]
id = 526
depth = 1
kind = "speaker"
speaker = "Player"
text = "But why would I use a Bond instead of just buying membership normally?"
parent = -1

[[nodes]]
id = 527
depth = 1
kind = "speaker"
speaker = "Account Guide"
text = """
Unlike membership, Bonds can be traded with other players. You could purchase a Bond and then sell it to another player for some gold. Alternatively, you could use your gold to buy a Bond from another player!
"""
parent = -1

[[nodes]]
id = 528
depth = 1
kind = "speaker"
speaker = "Player"
text = "So if I used my gold to buy a Bond from another player, I could get membership without spending any real money?"
