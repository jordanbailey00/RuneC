text = "It is also the only place in the land of Gielinor where players are able to attack each other at will, and as such is the haunt of many Player Killers, or PKers if you will."
parent = 457

[[nodes]]
id = 462
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "There are a few things different in the Wilderness in comparison to the rest of the lands of Gielinor. Firstly, as I just mentioned, you can and will be attacked by other players."
parent = 457

[[nodes]]
id = 463
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "For this reason, you will be given a warning when you approach the Wilderness, as it is not a place you would wish to enter by accident."
parent = 457

[[nodes]]
id = 464
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "Secondly, there are a number of 'levels' to it. The further into it you travel, the greater the range of people you can attack."
parent = 457

[[nodes]]
id = 465
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "In level 1 wilderness you will only be able to attack, or be attacked by, those players within one combat level of yourself."
parent = 457

[[nodes]]
id = 466
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "In level 50, any player within fifty levels of you will be able to attack, or be attacked by you. Always keep an eye on what level of the Wilderness you are currently in."
parent = 457

[[nodes]]
id = 467
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "Your current Wilderness level is shown at the bottom right of the screen. The final thing you should know about the Wilderness is being 'skulled'."
parent = 457

[[nodes]]
id = 468
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "If you attack another player without them having attacked first, you will gain a skull above your character's head."
parent = 457

[[nodes]]
id = 469
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "What this means is that if you die while skulled, you will lose EVERYTHING that your character was carrying."
parent = 457

[[nodes]]
id = 470
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "When skulled, you should try to avoid dying for the twenty minutes or so it will take for the skull to wear off."
parent = 457

[[nodes]]
id = 471
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "If you wish to find the Wilderness, head north from where you start on the mainland. It is rather large and hard to miss."
parent = 457

[[nodes]]
id = 472
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "If you don't wish to end up there, take notice of the warning you will receive when getting near to it."
parent = 457

[[nodes]]
id = 473
depth = 2
kind = "speaker"
speaker = "Combat Instructor"
text = "Now, was there anything more?"
parent = 457

