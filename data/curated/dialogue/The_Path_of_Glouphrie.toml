[[nodes]]
id = 197
depth = 1
kind = "speaker"
speaker = "King Bolren"
text = "Well, yes. I mean no, of course not. Still, Glouphrie has a lot to answer for! If I ever get my hands on him I'll... er... I'll give him a good talking to!"
