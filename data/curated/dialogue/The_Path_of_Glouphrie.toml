parent = -1

[[nodes]]
id = 100
depth = 1
kind = "speaker"
speaker = "Bolrie"
text = "{{Colour|#000080|Healthorg was a great king far longer than he was a weak one. Everyone assumed his son would be as great as he was.}}"
parent = -1

[[nodes]]
id = 101
depth = 1
kind = "speaker"
speaker = "Bolrie"
text = "{{Colour|#000080|We needed to show them the truth. We needed to show them that Argenthorg was weak. My advisor said he knew how...}}"
parent = -1

