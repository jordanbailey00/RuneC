text = "{{qact|Hazelmere looks toward his hand at a special seed pod.}}"
parent = -1

[[nodes]]
id = 419
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Argento's last gift to me. I was saving it for a special occasion. I suppose saving your hide counts."
parent = -1

[[nodes]]
id = 420
depth = 1
kind = "other"
text = "{{qact|Hazelmere uses the seed pod and a large aura surrounds the player and him.}}"
parent = -1

[[nodes]]
id = 421
depth = 1
kind = "speaker"
speaker = "Player"
text = "Wow, that's some trick!"
parent = -1

[[nodes]]
id = 422
depth = 1
