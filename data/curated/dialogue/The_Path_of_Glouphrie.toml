[[nodes]]
id = 290
depth = 1
kind = "speaker"
speaker = "Spirit Tree"
text = "{{Colour|#000080|The tree whisperer has come to my aid. Thank Guthix.}}"
parent = -1

[[nodes]]
id = 291
depth = 1
kind = "speaker"
speaker = "Player"
text = "Do you have a name?"
parent = -1

[[nodes]]
id = 292
depth = 1
kind = "speaker"
speaker = "Spirit Tree"
text = "{{Colour|#000080|You may call me Incomitatus, for I am alone and friendless. You are not a small person of Guthix. How do you speak with me?}}"
parent = -1

[[nodes]]
id = 293
depth = 1
kind = "speaker"
speaker = "Player"
text = "Er... I don't know. Can't anyone just speak to you?"
parent = -1

[[nodes]]
id = 294
depth = 1
kind = "speaker"
speaker = "Spirit Tree"
text = """
{{Colour|#000080|Only those who have opened their minds to the spirits of the earth can talk with spirit trees. You surely must have been trained by a great friend to us, as this is a gift not easily come by.}}
"""
parent = -1

[[nodes]]
id = 295
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, it's true that I have spoken to the odd tree in the past..."
parent = -1

[[nodes]]
id = 296
depth = 1
kind = "speaker"
speaker = "Player"
text = "Oh, wait a minute, this reminds me of something. Hazelmere did something like this to me a while ago. You know, talking using the mind."
parent = -1

[[nodes]]
id = 297
depth = 1
kind = "speaker"
speaker = "Spirit Tree"
text = "{{Colour|#000080|The one you call Hazelmere... he is a friend of trees. He would be able to help me.}}"
parent = -1

[[nodes]]
id = 298
depth = 1
kind = "speaker"
speaker = "Player"
text = "Maybe I could help in some way. What exactly is wrong with you?"
parent = -1

[[nodes]]
id = 299
depth = 1
kind = "speaker"
speaker = "Spirit Tree"
text = "{{Colour|#000080|I have lost my connection to the Anima Mundi. The earth has corrupted my roots and they find only black ichor. My xylem and phloem are tainted. I am alone.}}"
parent = -1

[[nodes]]
id = 300
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hmm... I'm sure there's a way to fix this. What would Hazelmere do?"
parent = -1

[[nodes]]
id = 301
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|What? What do you want? You shouldn't disturb me like that. I was deep in contemplation. Looking into the future is not something you can do on a whim, you know!}}"
parent = -1

[[nodes]]
id = 302
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hazelmere?"
parent = -1

[[nodes]]
id = 303
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Yes of course! You did call for me, didn't you? And what did I tell you about flapping your lips during a mind meld? Use your brain!}}"
parent = -1

[[nodes]]
id = 304
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|Right, sorry.}}"
parent = -1

[[nodes]]
id = 305
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Now, this had best be important. I was in the middle of a dream, a vision of the future. There was something I was meant to see...}}"
parent = -1

[[nodes]]
id = 306
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|It's good to hear you're still as grumpy as always.}}"
parent = -1

[[nodes]]
id = 307
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Hmph! How did you manage to perform a mind meld from so far away anyway? Such skills are far beyond a human. Unless...}}"
parent = -1

[[nodes]]
id = 308
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Of course, a spirit tree. I sense this one to be rather unwell. What happened?}}"
parent = -1

[[nodes]]
id = 309
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|I was hoping you could tell me.}}"
parent = -1

[[nodes]]
id = 310
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Alright, let me try to sense the problem.}}"
parent = -1

[[nodes]]
id = 311
depth = 1
kind = "other"
text = "{{qact|The screen fades to black, and Incomitatus is seen rotating slowly anti-clockwise.}}"
parent = -1

[[nodes]]
id = 312
depth = 1
kind = "speaker"
speaker = "Player"
text = "What's going on?"
parent = -1

[[nodes]]
id = 313
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hazelmere?"
parent = -1

[[nodes]]
id = 314
depth = 1
kind = "speaker"
speaker = "Player"
text = "Help me!"
parent = -1

[[nodes]]
id = 315
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Right, all done. Ah, and it seems you haven't suffered any permanent damage. That's fortunate.}}"
parent = -1

[[nodes]]
id = 316
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|Fortunate? You didn't warn me of any risk before giving me that nightmare!}}"
parent = -1

[[nodes]]
id = 317
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = """
{{Colour|#000080|You have a strong spirit. I assumed you'd be alright. And, after all, it's the spirit tree that really matters. You'll only live for a handful of decades. The tree should live for centuries.}}
"""
parent = -1

[[nodes]]
id = 318
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|I'm not sure I approve of your low regard for my welfare.}}"
parent = -1

[[nodes]]
id = 319
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|The welfare of the tree is our concern right now. Something has poisoned the soil, blocking the tree's connection with the Anima Mundi. This is worrying in itself.}}"
parent = -1

[[nodes]]
id = 320
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|Why is that?}}"
parent = -1

[[nodes]]
id = 321
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Well, no ordinary poison could do this. Only by separating the Anima Mundi from its source...}}"
parent = -1

[[nodes]]
id = 322
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|I'm sorry, you're confusing me.}}"
parent = -1

[[nodes]]
id = 323
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|I forget I'm dealing with a human. I'll spell it out nice and clearly for you. The Anima Mundi is created by all natural things. It is their soul, and a sort of natural energy.}}"
parent = -1

[[nodes]]
id = 324
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|It is powerful and dangerous, and only by the balance of Guthix does it remain in check. Creatures live, creatures die. The balance is maintained.}}"
parent = -1

[[nodes]]
id = 325
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|So how has this caused Incomitatus to become ill?}}"
parent = -1

[[nodes]]
id = 326
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Powerful magics could be used to separate the Anima Mundi from its source. This would produce a great deal of power, power that could be used in an unbridled way.}}"
parent = -1

[[nodes]]
id = 327
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|However, doing so would unbalance the whole pattern of life. The ichor in the soil appears to be the unnatural waste product of such tinkerings.}}"
parent = -1

[[nodes]]
id = 328
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|There is a huge evil-smelling swamp of tar just to the west of here. Is that related?}}"
parent = -1

[[nodes]]
id = 329
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Most likely, but to make enough of this ichor to create a swamp would take an enormous amount of work and would create a dizzying amount of energy.}}"
parent = -1

[[nodes]]
id = 330
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|It would be an abomination, to plunder the earth in such a massive way. Who would need to do this?}}"
parent = -1

[[nodes]]
id = 331
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|Glouphrie?}}"
parent = -1

[[nodes]]
id = 332
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|Hmph, maybe. Anyway, our immediate problem is to help our spirit brethren.}}"
parent = -1

[[nodes]]
id = 333
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|Is there some sort of antidote I could give to the tree?}}"
parent = -1

[[nodes]]
id = 334
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = """
{{Colour|#000080|If you had been paying attention, you'd remember that I said this is no normal poison. Some sort of spiritual cleansing will be needed in order to return the spirit tree's connection to the Anima Mundi.}}
"""
parent = -1

[[nodes]]
