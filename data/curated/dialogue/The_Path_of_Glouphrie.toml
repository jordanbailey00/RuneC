[[nodes]]
id = 12
depth = 2
kind = "speaker"
speaker = "King Bolren"
text = "What are you on about?"
parent = 8

[[nodes]]
id = 13
depth = 2
kind = "speaker"
speaker = "Player"
text = "I came across some creatures like Dumpling at the Gnome Stronghold. They're evil things created using dark magic."
parent = 8

[[nodes]]
id = 14
depth = 2
kind = "speaker"
speaker = "Player"
text = "If this is anything like the situation at the Gnome Stronghold, then Dumpling was sent by Glouphrie to wheedle itself into your affections and spy on you."
parent = 8

[[nodes]]
id = 15
depth = 2
kind = "speaker"
speaker = "King Bolren"
text = "You can't be serious!"
parent = 8

[[nodes]]
id = 16
depth = 2
kind = "speaker"
speaker = "Player"
text = "I'm afraid so. The creature is shrouded by illusion magic to make it look like a cute pet, but in reality it's this horrible... black spiky thing."
parent = 8

[[nodes]]
id = 17
depth = 2
kind = "speaker"
speaker = "Player"
text = "It's watching you all the time, sending details of all your secret dealings back to Glouphrie."
parent = 8

[[nodes]]
id = 18
depth = 2
kind = "speaker"
speaker = "King Bolren"
text = "You've been listening to too many gnomish children's stories! Glouphrie hasn't been seen since before I was King. He's almost certainly long-dead by now."
parent = 8

[[nodes]]
id = 19
depth = 2
kind = "speaker"
speaker = "Player"
text = "Well, what if I were to prove it to you? I unmasked the creatures at the Gnome Stronghold using a machine created by Oaknock the Engineer. Maybe I could do it again."
parent = 8

[[nodes]]
id = 20
depth = 2
kind = "speaker"
speaker = "King Bolren"
text = "It's going to need to be very solid proof for me to just cast Dumpling aside. She's become my constant companion!"
parent = 8

[[nodes]]
id = 21
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh it will be solid. I just need an anti-illusion device... I don't suppose you have one of those around here?"
parent = 8

[[nodes]]
id = 22
depth = 2
kind = "speaker"
speaker = "King Bolren"
text = "I don't think so. What does one look like?"
parent = 8

[[nodes]]
