text = "Bolrie... Golrie... I should have guessed. You seem to like giving your children similar names, just to be confusing."
parent = 133

[[nodes]]
id = 137
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "Certainly, in our family that's true. King Bolren is also Bolrie's younger brother, in case you didn't know."
parent = 133

[[nodes]]
id = 138
depth = 3
kind = "speaker"
speaker = "Player"
text = "So that means you're King Bolren's grand-nephew, right?"
parent = 133

[[nodes]]
id = 139
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "That's right."
parent = 133

[[nodes]]
id = 140
depth = 3
kind = "speaker"
speaker = "Player"
text = "Does that mean that you're in line for the throne?"
parent = 133

[[nodes]]
id = 141
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "Gnomes don't have a hereditary monarchy. We have a democratic monarchy. We vote for our kings."
parent = 133

[[nodes]]
id = 142
depth = 3
kind = "speaker"
speaker = "Player"
text = "Oh, that's unusual. So you've never thought about being the King?"
parent = 133

[[nodes]]
id = 143
depth = 3
kind = "speaker"
speaker = "Golrie"
text = """
That might be fun. I wouldn't want to be like gramps though. He liked wars a bit too much. I do sometimes discuss the Khazard War with the hobgobbos, but they don't have a particularly sharp political sense.
"""
parent = 133

[[nodes]]
id = 144
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "Personally, I don't think we should fight his troops head- on. We're smarter than that. We should come up with some ingenious method of defeating Khazard, like they did at the Battle of Atarisundri!"
parent = 133

[[nodes]]
id = 145
depth = 3
kind = "speaker"
speaker = "Player"
text = "You're very well informed for a gnome in a cave. Most gnomes I've talked to have forgotten most of their own history."
parent = 133

[[nodes]]
id = 146
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "Gnomes don't tend to dwell on the past, but I suppose I'm not a typical gnome. I get lots of time to think and read in here."
parent = 133

[[nodes]]
id = 147
depth = 3
kind = "speaker"
speaker = "Player"
text = "So have you heard from Bolrie recently?"
parent = 133

[[nodes]]
id = 148
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "No, the parcels stopped arriving a few years ago. I guess he's either found what he was looking for, or has died in the attempt."
parent = 133

[[nodes]]
id = 149
depth = 3
kind = "speaker"
speaker = "Player"
text = "What was he looking for?"
parent = 133

[[nodes]]
id = 150
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "I'm not sure. He was definitely obsessed with finding out as much as he could about elven magic. He also seemed to have a bit of a grudge against Glouphrie."
parent = 133

[[nodes]]
id = 151
depth = 3
kind = "speaker"
speaker = "Player"
text = "Maybe he's looking for Glouphrie."
parent = 133

[[nodes]]
id = 152
depth = 3
kind = "speaker"
speaker = "Golrie"
text = "Who knows, eh? Who knows?"
parent = 133

