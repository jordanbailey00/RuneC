speaker = "King Bolrie"
text = "Finally! How long before we can expect his support?"
parent = -1

[[nodes]]
id = 84
depth = 1
kind = "speaker"
speaker = "Advisor"
text = "He will not be sending any support, my King. He does not wish to start a conflict with the humans."
parent = -1

[[nodes]]
id = 85
depth = 1
kind = "speaker"
speaker = "King Bolrie"
text = "What? But can't he see what will happen if we don't act now! The humans will destroy us!"
parent = -1

[[nodes]]
id = 86
depth = 1
kind = "speaker"
speaker = "Advisor"
text = "I have conversed with the spirit trees, my King, and they are in full agreement. If we do not act, Khazard and his forces will. It is not a question of if, but when."
parent = -1

[[nodes]]
id = 87
depth = 1
kind = "speaker"
speaker = "King Bolrie"
text = "Healthorg has become a weak old fool! He's blind to our problems."
parent = -1

[[nodes]]
