parent = -1

[[nodes]]
id = 423
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Megal!"
parent = -1

[[nodes]]
id = 424
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "It seems I have made my choice. So be it."
parent = -1

[[nodes]]
id = 425
depth = 1
kind = "speaker"
speaker = "Player"
text = "What did you say?"
parent = -1

[[nodes]]
id = 426
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Nothing you need to worry about now. We need to get out of here."
parent = -1

[[nodes]]
id = 427
depth = 1
kind = "other"
text = "{{qact|The player and Hazelmere teleport out, arriving at his house.}}"
parent = -1

[[nodes]]
id = 428
depth = 1
kind = "speaker"
speaker = "Player"
text = "Phew, that was a close one! Thanks for saving me."
parent = -1

[[nodes]]
id = 429
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Consider it a thank you for helping that spirit tree. You have shown a great empathy towards the Anima Mundi. Despite being a human, perhaps you could one day be a true spirit tree mage."
parent = -1

[[nodes]]
id = 430
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hang on... you're properly talking to me, without using a mind meld. I thought you only spoke ancient gnomish?"
parent = -1

[[nodes]]
id = 431
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Bah! I've always been able to speak your uncivilised tongue."
parent = -1

[[nodes]]
id = 432
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Normally I wouldn't lower myself to these rudimentary words, but given your recent near-death experience, I felt you would not have the energy for a mind meld."
parent = -1

[[nodes]]
id = 433
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's unusually kind for you. Not going soft, are you?"
parent = -1

[[nodes]]
id = 434
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Perhaps, but it seems I would be wise to ensure your safety. The future is not a place for old wizards like me."
parent = -1

[[nodes]]
id = 435
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "My autumn is ending, and only winter remains. Soon, it will fall to individuals like you to protect the Anima Mundi."
parent = -1

[[nodes]]
id = 436
depth = 1
kind = "speaker"
speaker = "Player"
text = "What are you on about?"
parent = -1

[[nodes]]
id = 437
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "The Anima Mundi granted me a glimpse into the future. I had one final choice to make, and I made it by saving you. We now walk a path that we cannot stray from, so listen closely..."
parent = -1

[[nodes]]
id = 438
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Skilled brothers, numbering eight, will assemble to fight the Mahjarrat deceiver, and they will be heading northwards to confront him."
parent = -1

[[nodes]]
id = 439
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "The time after this is... clouded to me, but I see you clearly, dressed in the evil garb of the darkest night."
parent = -1

[[nodes]]
id = 440
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "However, while you may dress in the colours of evil, you will not follow that path. You will remain true to Guthix."
parent = -1

[[nodes]]
id = 441
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Of the eight, only two shall return. One represents the path of the slayer and one the path of the warrior."
parent = -1

[[nodes]]
id = 442
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Things might have been different, but I have made my choice, and it is up to you to prove that I made the right one."
parent = -1

[[nodes]]
id = 443
depth = 1
kind = "speaker"
speaker = "Player"
text = "Sounds like you have been having some bad dreams, or you've been reading some terrible stories."
parent = -1

[[nodes]]
id = 444
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Dreams often reveal truths masked by the light of day, but I know the truth of what I have seen in my bones. I have seen my end."
parent = -1

[[nodes]]
id = 445
depth = 1
kind = "speaker"
speaker = "Player"
text = "But you can't die! You're a mighty wizard!"
parent = -1

[[nodes]]
id = 446
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "All I know is what the trees tell me. It will soon be time for me to pass the guardianship of the spirit trees to someone else. Maybe that person is you."
parent = -1

[[nodes]]
id = 447
depth = 1
kind = "speaker"
speaker = "Player"
text = "Guardianship of the spirit trees? I wouldn't even know where to begin with that!"
parent = -1

[[nodes]]
id = 448
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "I have faith that you will learn what you need. Anyway, enough moping about the future. You should be on your way."
parent = -1

[[nodes]]
id = 449
depth = 1
kind = "speaker"
speaker = "Player"
text = "But what about Glouphrie?"
parent = -1

[[nodes]]
id = 450
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Considering you nearly died trying to find him, I suggest you leave that problem for another day. Preferably after a better way has been found into Arposandra."
parent = -1

[[nodes]]
id = 451
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "Now, I'm sure you have more important matters to attend to than chatting to a cranky old gnome. Take these and be on your way."
parent = -1

