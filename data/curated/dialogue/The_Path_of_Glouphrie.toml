speaker = "Hazelmere"
text = "{{Colour|#000080|What are you doing, stupid human?}}"
parent = -1

[[nodes]]
id = 413
depth = 1
kind = "speaker"
speaker = "Player"
text = "{{Colour|#000080|Are you Death? You remind me a lot of a gnome I knew when I was alive.}}"
parent = -1

[[nodes]]
id = 414
depth = 1
kind = "speaker"
speaker = "Hazelmere"
text = "{{Colour|#000080|You're not dead yet, fool! Snap out of it!}}"
parent = -1

[[nodes]]
id = 415
depth = 1
