[[nodes]]
id = 199
depth = 1
kind = "speaker"
speaker = "King Bolren"
text = "Yes, of course! Still, that won't be an easy feat. It is said that after Glouphrie was driven out of our lands, he founded the hidden city of Arposandra. To find him, we must first find Arposandra!"
