kind = "speaker"
speaker = "Bolrie"
text = "{{Colour|#000080|When I became King of the Tree Gnome Village, I thought I was lucky, for I did so during a time of peace. However, it seemed that peace was not to last.}}"
parent = -1

[[nodes]]
id = 79
depth = 1
kind = "speaker"
speaker = "Bolrie"
text = "{{Colour|#000080|Human activity in the area was increasing, and conflict between our two races seemed inevitable.}}"
parent = -1

[[nodes]]
id = 80
depth = 1
kind = "speaker"
speaker = "Bolrie"
text = "{{Colour|#000080|Fearing the worst, I had my trusted advisor reach out to King Healthorg of the Gnome Stronghold, but his response left much to be desired...}}"
parent = -1

[[nodes]]
