[[nodes]]
id = 20
depth = 2
kind = "speaker"
speaker = "Player"
text = "Yes! This field looks so colourful! How did you do it?"
parent = 19

[[nodes]]
id = 21
depth = 2
kind = "speaker"
speaker = "Marika"
text = "That took seven different varieties of heirloom pumpkins to achieve! Most farmers only grow one type of crop using the same seeds, but there are a few of us who like to experiment in our own gardens."
parent = 19

[[nodes]]
id = 22
depth = 2
kind = "speaker"
speaker = "Marika"
text = "My favourite thing to grow is tomatoes, but sadly they didn't quite fit the bill for what I was trying to achieve."
parent = 19

[[nodes]]
id = 23
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh? What's that then?"
parent = 19

[[nodes]]
id = 24
depth = 2
kind = "speaker"
speaker = "Marika"
text = "I lost someone very dear to me this year, and I wanted to connect with them one last time."
parent = 19

[[nodes]]
id = 25
depth = 2
kind = "speaker"
speaker = "Marika"
text = "I thought that if I painted a big enough picture of something they liked and it was visible at the time of the year when spirits are closest to us..."
parent = 19

[[nodes]]
id = 26
depth = 2
kind = "speaker"
speaker = "Marika"
text = "Then maybe they would see it, wherever they are, and know they are still loved. It's silly, I know."
parent = 19

[[nodes]]
id = 27
depth = 2
kind = "speaker"
speaker = "Player"
text = "No, it's not silly at all! It makes sense to me. But why the pumpkins?"
parent = 19

[[nodes]]
id = 28
depth = 2
kind = "speaker"
speaker = "Marika"
text = "Not all variety of tomatoes grow well this time of year, and the pumpkins are just bigger fruits. They're perfect for the job!"
parent = 19

[[nodes]]
id = 29
depth = 2
kind = "speaker"
speaker = "Marika"
text = "There's just one problem."
parent = 19

[[nodes]]
id = 30
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh no!"
parent = 19

[[nodes]]
id = 31
depth = 2
kind = "speaker"
speaker = "Marika"
text = "There are crows around here, and they have been pecking at some of the seeds and moving them around. I've never seen anything like it! But the outcome is that the image doesn't look right."
parent = 19

[[nodes]]
id = 32
depth = 2
kind = "speaker"
speaker = "Marika"
text = "It'll be tricky to fix in time unless I get some help."
parent = 19

