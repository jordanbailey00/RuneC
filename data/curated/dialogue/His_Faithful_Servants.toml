kind = "speaker"
speaker = "Player"
text = "What do you mean? What purpose?"
parent = -1

[[nodes]]
id = 4
depth = 1
kind = "speaker"
speaker = "Strange Old Man"
text = "The brothers six! Dutiful servants of Saradomin... At least, that's what they'd tell you! Ha! Not so. Not so."
parent = -1

[[nodes]]
id = 5
depth = 1
kind = "speaker"
speaker = "Strange Old Man"
text = "They made a pact you see! Strength in life for servitude in death."
parent = -1

[[nodes]]
id = 6
depth = 1
kind = "speaker"
speaker = "Player"
text = "Servitude?"
parent = -1

[[nodes]]
id = 7
depth = 1
kind = "speaker"
speaker = "Strange Old Man"
text = "Yes! They guard it for him! That was their purpose, but that time is up now. He wants it back! You can get it! You can dig!"
parent = -1

[[nodes]]
id = 8
depth = 1
kind = "speaker"
speaker = "Player"
text = "You want me to bring you something?"
parent = -1

[[nodes]]
id = 9
depth = 1
kind = "speaker"
speaker = "Strange Old Man"
text = "The icon! He needs it now! You must dig, dig, dig. Slay the brothers six! It's okay, it won't hurt them... much. The icon will be in the chest!"
parent = -1

[[nodes]]
id = 10
depth = 1
kind = "speaker"
speaker = "Player"
text = "Right... So you want me to go and kill the six brothers and bring you back an icon?"
parent = -1

[[nodes]]
