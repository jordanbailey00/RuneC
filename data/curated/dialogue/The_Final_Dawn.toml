[[nodes]]
id = 988
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "This ends here, Metzli. No more running."
parent = -1

[[nodes]]
id = 989
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Running? What do you think I'm running from? After all this time, I'm finally right where I need to be."
parent = -1

[[nodes]]
id = 990
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "And where's that exactly? Another Old One ruin? That's all this place is. There's no centre of the world here. Face it, Metzli, you've failed. Your Final Dawn has failed."
parent = -1

[[nodes]]
id = 991
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "The Final Dawn? Don't you see? There never was a Final Dawn. There never will be a Final Dawn."
parent = -1

[[nodes]]
id = 992
depth = 1
kind = "speaker"
speaker = "Player"
text = "You lied to the Emissaries? Why?"
parent = -1

[[nodes]]
id = 993
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Why? Quite simply because they let me."
parent = -1

[[nodes]]
id = 994
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "You're mad!"
parent = -1

[[nodes]]
id = 995
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Mad? Of course I'm mad! So many see madness as a weakness... As a burden. But to do what I do... To seek what I seek... Insanity is the only way one can ever walk that path."
parent = -1

[[nodes]]
id = 996
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "The people of this land... Their lives are built upon the truths presented to them. Ralos... Ranul... They put their faith in the gods they are told to believe in."
parent = -1

[[nodes]]
id = 997
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "From their first cries to their dying breaths, every choice they make is built upon those foundations. Foundations that have become so ingrained, that no sane person would ever question them."
parent = -1

[[nodes]]
id = 998
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "You have some, like the Emissaries, who dance on the edge of madness, but never leap into its embrace."
parent = -1

[[nodes]]
id = 999
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "It was never truth that they sought. They just took comfort in someone telling them what they wanted to hear."
parent = -1

[[nodes]]
id = 1000
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "And so it falls to me. We stand here in Mokhaiotl, the last archive of the Old Ones. When their doom befell them, they did not pray, they preserved."
parent = -1

[[nodes]]
id = 1001
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "They housed their collective knowledge, their collective power, right here. For years it's sat waiting... Waiting for a worthy inheritor. Waiting... for me."
parent = -1

[[nodes]]
id = 1002
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Here, today, I will shatter the foundations that the sane never question. I will uncover the realities they shy away from. And in my madness, I will finally deliver that which the world has forgotten."
parent = -1

[[nodes]]
id = 1003
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Today, I will be the one to finally find the truth."
parent = -1

[[nodes]]
id = 1004
depth = 1
kind = "other"
text = "{{qact|Augur quickly transforms into her ranged combat gear.}}"
parent = -1

[[nodes]]
id = 1005
depth = 1
kind = "speaker"
speaker = "Augur Metzli"
text = "Time to finish this."
parent = -1

