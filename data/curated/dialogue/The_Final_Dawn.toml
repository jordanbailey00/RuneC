[[nodes]]
id = 373
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "Their days are numbered."
parent = -1

[[nodes]]
id = 374
depth = 1
kind = "speaker"
speaker = "Highlord Katlo"
text = "So they are still at large? How concerning. Still, I'm sure your son and his knights will be doing all they can to rectify that."
