[[nodes]]
id = 371
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "How very true."
parent = -1

[[nodes]]
id = 372
depth = 1
kind = "speaker"
speaker = "Highlord Katlo"
text = "I heard about the unfortunate events at the Teomat, but it is good to see the Teokan has made a full recovery. No doubt those responsible met swift justice?"
