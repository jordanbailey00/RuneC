[[nodes]]
id = 379
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "Very."
parent = -1

[[nodes]]
id = 380
depth = 1
kind = "speaker"
speaker = "Highlord Katlo"
text = "Then what can you tell me of these enemies?"
parent = -1

[[nodes]]
id = 381
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "They are members of the Twilight Emissaries cult. The cult wish to gain access to the Crypt of Tonali, but they require dwarven help to do so."
