[[nodes]]
id = 389
depth = 1
kind = "speaker"
speaker = "Attala"
text = "I am."
parent = -1

[[nodes]]
id = 390
depth = 1
kind = "speaker"
speaker = "Highlord Katlo"
text = "Very well. In that case, my good friends, I grant you permission to search for these cultists. Attala here will join you. Do let her know if there's anything at all that you need."
