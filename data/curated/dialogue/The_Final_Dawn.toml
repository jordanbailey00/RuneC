[[nodes]]
id = 651
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "Old One? A curious term. We nagua measure time as the rivers change their paths and as the mountains errode away."
parent = -1

[[nodes]]
id = 652
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "The days of the masters are fresh memories to me, but to you, one who is so short lived, they are days of myth..."
parent = -1

[[nodes]]
id = 653
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "Tell me, why do the interlopers seek the magic of the masters?"
parent = -1

[[nodes]]
id = 654
depth = 1
kind = "speaker"
speaker = "Player"
text = "There's a crypt in the Tlati Rainforest, but it's sealed using Old One magic. These interlopers are cultists who want to get inside. They think they can do so if they have a keystone of their own."
parent = -1

[[nodes]]
id = 655
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "Provided they have the aptitude, I suspect their beliefs are correct."
parent = -1

[[nodes]]
id = 656
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then we need to stop them before they get one."
parent = -1

[[nodes]]
id = 657
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "The icosahedron behind me is a form of keystone, and the interlopers have already tried to tamper with it."
parent = -1

[[nodes]]
id = 658
depth = 1
kind = "speaker"
speaker = "Player"
text = "But you stopped them?"
parent = -1

[[nodes]]
id = 659
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "Yes, but the danger remains. There is another keystone here. An earlier form of the icosahedron from when Neypotzli was being built."
parent = -1

[[nodes]]
id = 660
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "However, the Moons of Peril must remain my priority. I cannot stop the interlopers from trying to obtain it."
parent = -1

[[nodes]]
id = 661
depth = 1
kind = "speaker"
speaker = "Player"
text = "Don't worry, I can deal with them. I just need to know where they are."
parent = -1

[[nodes]]
id = 662
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "I can give you a fragment of the icosahedron. It resonates with the magic of the other keystone. It will guide you to it. Go to the keystone, and you will no doubt find the interlopers."
parent = -1

[[nodes]]
id = 663
depth = 1
kind = "speaker"
speaker = "Player"
text = "Thank you, but before I go, there's one other thing..."
parent = -1

[[nodes]]
id = 664
depth = 1
