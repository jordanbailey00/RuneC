[[nodes]]
id = 369
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "I'm afraid the suddenness of our arrival was a necessity, though I'm pleased to see that it didn't prevent you from meeting us here personally, Highlord Katlo."
