[[nodes]]
id = 50
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "... and with the guidance of Ralos and Ranul, who stand beside us in our fight, we will be victorious!"
parent = 48

[[nodes]]
id = 51
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "I know recent setbacks have you questioning. I know you have concerns. You need not whisper them in the shadows, for you are free to question. More than that, you are encouraged to question!"
parent = 48

[[nodes]]
id = 52
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "After all, was it not your questions that brought you here? Did you not dare to ask them while others shied away in fear?"
parent = 48

[[nodes]]
id = 53
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "Remember this: We are the doubters! We are the outcasts! Society shunned us for it, but only those who question everything will ever find the truth."
parent = 48

[[nodes]]
id = 54
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "And that truth? That is what we fight for. That is what will bring about the Final Dawn!"
parent = 48

[[nodes]]
id = 55
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "Let me now assure you, these setbacks have done nothing to stop us! The road to Mokhaiotl is clearer than ever! We have no need for the Teokan any more!"
parent = 48

[[nodes]]
id = 56
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "Bring out the prisoner!"
parent = 48

[[nodes]]
id = 57
depth = 2
kind = "other"
text = "{{qact|An Emissary Ascended brings out Prince Itzla, stripped of clothing.}}"
parent = 48

[[nodes]]
id = 58
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "See how the rulers of this kingdom are powerless against us. Itzla Arkan, heir to the throne of Varlamore, is now our prisoner!"
parent = 48

[[nodes]]
id = 59
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "You love it, don't you? Standing on a stage spouting nonsense to a bunch of fanatics! It means nothing, Metzli!"
parent = 48

[[nodes]]
id = 60
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "People like you always fear the truth. Do you know why? Because without your lies, all that you do, all that you live for, is meaningless."
parent = 48

[[nodes]]
id = 61
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "But your fear, it can now end. Here, you finally have a purpose. Here, you can finally serve Ralos and Ranul."
parent = 48

[[nodes]]
id = 62
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "Do you not see? The blood of the Teokan runs through your veins. You are now the key to the Final Dawn!"
parent = 48

[[nodes]]
id = 63
depth = 2
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "You want my blood? Take it! Just make sure you take it all! At least that way I won't have to listen to the garbage you spew any more!"
parent = 48

[[nodes]]
id = 64
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "Listen to the anger in his voice. It is a poor attempt to mask his fear. We need not fear though, for our purpose is clear."
parent = 48

[[nodes]]
id = 65
depth = 2
kind = "speaker"
speaker = "Augur Metzli"
text = "Go now, for time is short, and there is much left to do. It will soon be time to deliver Twilight's Promise. It will soon be time for the Final Dawn!"
parent = 48

