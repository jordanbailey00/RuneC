[[nodes]]
id = 668
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "The masters were always secretive, especially towards the end. They rarely spoke of the world outside this place, but when they did, they only spoke of pain."
parent = -1

[[nodes]]
id = 669
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "They had already lost so much by the time they summoned me. Their extinction was already guaranteed, yet they kept going all the same."
parent = -1

[[nodes]]
id = 670
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "This word... Mokhaiotl... I only heard it once, when things neared the end. It was not clear to me what it was, but when they spoke of it... it was the first time I'd heard them speak with hope."
parent = -1

[[nodes]]
