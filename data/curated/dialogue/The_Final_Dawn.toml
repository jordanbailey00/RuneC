[[nodes]]
id = 382
depth = 1
kind = "speaker"
speaker = "Highlord Katlo"
text = "I assure you, no cultist would have been granted access to the city. For a start, there are only four of us who even have the ability to grant that access."
parent = -1

[[nodes]]
id = 383
depth = 1
kind = "speaker"
speaker = "Highlord Katlo"
text = "However, it is clear this is a matter of great importance to you. I will ensure that we keep a close eye out for any cultists."
parent = -1

[[nodes]]
id = 384
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "With respect, Highlord, these cultists are our enemy. I would ask that you let us find and deal with them personally."
parent = -1

[[nodes]]
id = 385
depth = 1
kind = "speaker"
speaker = "Highlord Katlo"
text = "I understand, and I would very much like to help you. However, a human investigation in Cam Torum would not be looked upon kindly by the citizens here."
parent = -1

[[nodes]]
id = 386
depth = 1
kind = "speaker"
speaker = "Attala"
text = "If I may, Highlord, the human travelling with the Queen here is a friend to us. They are the one who helped us deal with the issues in the ruins beneath the city."
parent = -1

[[nodes]]
id = 387
depth = 1
kind = "speaker"
speaker = "Attala"
text = "If it is this human who is to be conducting the investigations here, I am sure they will act with discretion."
