[[nodes]]
id = 647
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "Welcome back, iknil. You have timed your arrival here well, for Neypotzli is in danger once more. There are interlopers present who have little regard for the dangers posed by the Moons of Peril."
parent = -1

[[nodes]]
id = 648
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, that's exactly why I'm here. I know who these interlopers are and I know what they're after."
parent = -1

[[nodes]]
id = 649
depth = 1
kind = "speaker"
speaker = "Eyatlalli"
text = "Yes, I suspected that to be the case. Your arrival was too precise to be coincidence. Tell me, what do the interlopers seek?"
