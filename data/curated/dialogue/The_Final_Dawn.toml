[[nodes]]
id = 397
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "Clearly. Now, time is of the essence here. Use the trust you have built with the dwarves to find and stop the cultists. Once you have done so, report to me at Tal Teklan in the Tlati Rainforest."
parent = -1

[[nodes]]
id = 398
depth = 1
kind = "speaker"
speaker = "Player"
text = "You're not staying?"
