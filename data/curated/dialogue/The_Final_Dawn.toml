[[nodes]]
id = 602
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Ah, there you are. Oh, I'm sorry, am I meant to bow?"
parent = -1

[[nodes]]
id = 603
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "You jest, dwarf, but you should show some respect."
parent = -1

[[nodes]]
id = 604
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Yes, of course, Your... Holiness? Your Excellency? I'm sorry, I've never had the luck of meeting a god before. What is your preferred title?"
parent = -1

[[nodes]]
id = 605
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "Enough! Do not push me, dwarf!"
parent = -1

[[nodes]]
id = 606
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Why? You are powerless to do anything about it. Without me, you go back to your Augur empty handed. I get the feeling she wouldn't like that."
parent = -1

[[nodes]]
id = 607
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "Well then it's a good thing we do not answer to her."
parent = -1

[[nodes]]
id = 608
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "No? If that's the case, then why are you doing her bidding? Of all the people she could have sent here, why did she pick her gods reborn?"
parent = -1

[[nodes]]
id = 609
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "The blood of Ralos flows through my veins, dwarf! When we reach Mokhaiotl, you will see for yourself."
parent = -1

[[nodes]]
id = 610
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Ha! And what will you see? What happens when you reach the apparent centre of the world, only to discover that everything you thought you knew, was wrong?"
parent = -1

[[nodes]]
id = 611
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "You think you're so..."
parent = -1

[[nodes]]
id = 612
depth = 1
kind = "speaker"
speaker = "Furia Tullus"
text = "Calm yourself, brother. Arguing gets us nowhere. Tell us, dwarf, can it be done?"
parent = -1

[[nodes]]
id = 613
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Yes, I believe so. However, it will not be straightforward."
parent = -1

[[nodes]]
id = 614
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "Meaning?"
parent = -1

[[nodes]]
id = 615
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "I will need you to retrieve something for me. The crypt doors are sealed using the magic of an Old One keystone. I will need one of these keystones for myself if I am to have any success."
parent = -1

[[nodes]]
id = 616
depth = 1
kind = "speaker"
speaker = "Furia Tullus"
text = "And where will we find one of those?"
parent = -1

[[nodes]]
id = 617
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "It is a keystone that keeps the nagua imprisoned in Neypotzli. I'm sure it can't be the only one in there."
parent = -1

[[nodes]]
id = 618
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "Then go in and find one for yourself. We do not serve you."
parent = -1

[[nodes]]
id = 619
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "So you claim, and yet you don't actually have a choice. If you want my help, you'll find me a keystone."
parent = -1

[[nodes]]
id = 620
depth = 1
kind = "speaker"
speaker = "Furia Tullus"
text = "You will have it. Just make sure you are ready."
parent = -1

[[nodes]]
id = 621
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Of course! I assume you've already sorted my payment?"
parent = -1

[[nodes]]
id = 622
depth = 1
kind = "speaker"
speaker = "Furia Tullus"
text = "Yes, as agreed."
parent = -1

[[nodes]]
id = 623
depth = 1
kind = "speaker"
speaker = "Ennius Tullus"
text = "Enjoy it while you can. That money won't mean anything once this is over."
parent = -1

[[nodes]]
id = 624
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Ah, truth be told, the money is just a bonus. The chance to be the one to show you fools the truth... That, my friends, is the real prize."
parent = -1

[[nodes]]
id = 625
depth = 1
kind = "speaker"
speaker = "Teumo"
text = "Anyway, best we all get to work. You have a keystone to find."
parent = -1

