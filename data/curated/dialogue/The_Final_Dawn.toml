kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "Why should I trust you? Because my son did? Tell me, which recent event was it that suggested to you that he was of sound judgement?"
parent = 7

[[nodes]]
id = 18
depth = 3
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "With respect, my Queen, were it not for [player name] here, I would have died at the hands of the Emissaries. I believe [he has/she has/they have] earned our trust."
parent = 7

[[nodes]]
id = 19
depth = 3
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "Trust is like a blade. If not maintained, it fails when you need it most."
parent = 7

[[nodes]]
id = 20
depth = 3
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "Then let us give our iknami here the opportunity to regain our trust."
