[[nodes]]
id = 399
depth = 1
kind = "speaker"
speaker = "Queen Zyanyi Arkan"
text = "No. My presence here will be a distraction, and I must ensure that the defences are ready at the Crypt of Tonali. However, I trust you will not let me down."
