[[nodes]]
id = 71
depth = 2
kind = "speaker"
speaker = "Clivet"
text = "The Carnillean home does not belong to them. The builder of the house was Lord Hazeel, one of the Mahjarrat followers of Zamorak. Many years ago there was a civil war"
parent = 69

[[nodes]]
id = 72
depth = 2
kind = "speaker"
speaker = "Clivet"
text = "in this land, and the hateful Saradominists declared war upon all Zamorakians who lived here. Lord Hazeel nobly would not repent his beliefs, and the Carnilleans harrassed"
parent = 69

[[nodes]]
id = 73
depth = 2
kind = "speaker"
speaker = "Clivet"
text = "Hazeel and his followers for many decades. One fateful night, under cover of darkness, they stormed his home in an angry mob torturing and butchering all loyal"
parent = 69

[[nodes]]
id = 74
depth = 2
kind = "speaker"
speaker = "Clivet"
text = "Zamorakians they encountered inside. The following morning, the Carnillean forefathers moved into the empty household and claimed it as their own."
parent = 69

[[nodes]]
id = 75
depth = 2
kind = "speaker"
speaker = "Clivet"
text = "They have grown fat on the hard work of Lord Hazeel ever since. Unluckily for them Lord Hazeel as a Mahjarrat had access to powers and enchantments they knew nothing"
parent = 69

[[nodes]]
id = 76
depth = 2
kind = "speaker"
speaker = "Clivet"
text = "about, and made preparations for his return when first they began to storm his home. Soon the day will come when he will return to wreak his vengeance upon the thieves!"
parent = 69

