kind = "speaker"
speaker = "Fred the Farmer"
text = "My sheep are getting mighty woolly. I'd be much obliged if you could shear them. And while you're at it, spin the wool for me too."
parent = 2

[[nodes]]
id = 10
depth = 2
kind = "speaker"
speaker = "Fred the Farmer"
text = "Yes, that's it. Bring me 20 balls of wool. And I'm sure I could sort out some sort of payment. Of course, there's the small matter of The Thing."
parent = 2

