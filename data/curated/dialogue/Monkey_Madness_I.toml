speaker = "Player"
text = "How did you know that?"
parent = -1

[[nodes]]
id = 683
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "The King and I are still in communication, albeit sporadic. I decided I need a human of your calibre to assist me. It is pleasing to see you are still alive."
parent = -1

[[nodes]]
id = 684
depth = 1
kind = "speaker"
speaker = "Player"
text = "Why do you need a human?"
parent = -1

[[nodes]]
id = 685
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "There is more going on than meets your eye, human. Did you not find it strange that an entire squad be sent to decommission a shipyard?"
parent = -1

[[nodes]]
id = 686
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well -"
parent = -1

[[nodes]]
id = 687
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "Indeed. But there are more pressing matters at hand. Three of my squad have been captured and placed in the jail. They are watched over by somewhat overpowering guards."
parent = -1

[[nodes]]
id = 688
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "Before we can resume our original mission we must rescue them."
parent = -1

[[nodes]]
id = 689
depth = 1
kind = "speaker"
speaker = "Player"
text = "I know about the guards - I had to sneak out between the change of shifts."
parent = -1

[[nodes]]
id = 690
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "Trust me; we too have considered this, but whilst it is possible for one, it is near impossible for three."
parent = -1

[[nodes]]
id = 691
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "We have considered many things. I have my squad mage and sappers working below us right now. My, assassin Karam, is operating in the village itself."
parent = -1

[[nodes]]
id = 692
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "I remain here so that I may overhear Awowogei's plans."
parent = -1

[[nodes]]
id = 693
depth = 1
kind = "speaker"
speaker = "Player"
text = "Awowogei?"
parent = -1

[[nodes]]
id = 694
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "The self-proclaimed ruler of the island. I have been listening to him for some time now. I believe we will incur a minimum of casualties if we have an insider - a monkey working for us."
parent = -1

[[nodes]]
id = 695
depth = 1
kind = "speaker"
speaker = "Player"
text = "Have you seen these monkeys? You could never convince them to work for you!"
parent = -1

[[nodes]]
id = 696
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "I wasn't suggesting convincing them, human, but you."
parent = -1

[[nodes]]
id = 697
depth = 1
kind = "speaker"
speaker = "Player"
text = "Don't be ridiculous! I'm a human - not a monkey!"
parent = -1

[[nodes]]
id = 698
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "Do not be so sceptical ... you humans are considered to be quite closely related to monkeys."
parent = -1

[[nodes]]
id = 699
depth = 1
kind = "speaker"
speaker = "Player"
text = "Yes, but -"
parent = -1

[[nodes]]
id = 700
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "Go and see my squad mage, Zooknock. Tell him I have asked you to be 'disguised' as a monkey so that you may infiltrate the village. As you will see, he is something of an expert on the subject."
parent = -1

[[nodes]]
id = 701
depth = 1
kind = "speaker"
speaker = "Player"
text = "I can't even communicate with the monkeys!"
parent = -1

[[nodes]]
id = 702
depth = 1
kind = "speaker"
speaker = "Garkor"
text = "Just go and find my squad mage, human."
parent = -1

