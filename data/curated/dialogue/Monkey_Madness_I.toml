[[nodes]]
id = 1008
depth = 1
kind = "speaker"
speaker = "G.L.O. Caranock"
text = "Money for me, Waydar, and promotion for you. As you know, the 10th squad of the Royal Guard are slightly worse for wear on this island."
parent = -1

[[nodes]]
id = 1009
depth = 1
kind = "speaker"
speaker = "Waydar"
text = "This I know. But I don't see how it leads to money or promotion."
parent = -1

[[nodes]]
id = 1010
depth = 1
kind = "speaker"
speaker = "G.L.O. Caranock"
text = "What if they were to die? An entire squad of the Royal Guard goes missing in the jungle of Karamja ... We could blame it on the humans."
parent = -1

[[nodes]]
id = 1011
depth = 1
kind = "speaker"
speaker = "Waydar"
text = "Narnode would be furious!"
parent = -1

[[nodes]]
id = 1012
depth = 1
kind = "speaker"
speaker = "G.L.O. Caranock"
text = "Precisely. He might even order an invasion. At the very least he'll step up the defence. More orders for me, promotion for you."
parent = -1

[[nodes]]
id = 1013
depth = 1
kind = "speaker"
speaker = "Waydar"
text = "Very clever. It might also serve us well to remind Narnode of Bolren's situation."
parent = -1

[[nodes]]
id = 1014
depth = 1
kind = "speaker"
speaker = "G.L.O. Caranock"
text = "Ah yes - all that trouble with the Khazard. Last I heard, Bolren had retrieved the orbs of protection. Apparently some human lent their assistance."
parent = -1

[[nodes]]
id = 1015
depth = 1
kind = "speaker"
speaker = "Waydar"
text = "Really? Typical meddling human behaviour. Nevertheless, it will stoke fires of worry. After all, the battle still continues."
parent = -1

[[nodes]]
id = 1016
depth = 1
kind = "speaker"
speaker = "G.L.O. Caranock"
text = "I agree. Anyhow, we don't want your human wondering as to your whereabouts. When the time is right, don't hesitate to ... dispose of it."
parent = -1

[[nodes]]
