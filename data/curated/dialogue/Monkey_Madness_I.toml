text = "A human... here? What business have you on Ape Atoll?"
parent = -1

[[nodes]]
id = 723
depth = 1
kind = "speaker"
speaker = "Player"
text = "I am on a mission for King Narnode Shareen of the Gnomes."
parent = -1

[[nodes]]
id = 724
depth = 1
kind = "speaker"
speaker = "Player"
text = "I have been sent to investigate the whereabouts of the 10th squad of his Royal Guard, which went missing during a recent mission to Karamja."
parent = -1

[[nodes]]
id = 725
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Well you've found us - what's left of us, that is."
parent = -1

[[nodes]]
id = 726
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "I am Zooknock, the 10th squad mage. These are Bunkwicket and Waymottin, two of our finest sappers. I assume you will want to know how we got here?"
parent = -1

[[nodes]]
id = 727
depth = 1
kind = "speaker"
speaker = "Player"
text = "Of course."
parent = -1

[[nodes]]
id = 728
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Your story first, human. What possessed you to travel to this forsaken island?"
parent = -1

[[nodes]]
id = 729
depth = 1
kind = "speaker"
speaker = "Player"
text = "I am currently in the service of your King. I was the human who exposed Glough's warfaring plans and defeated his demon."
parent = -1

[[nodes]]
id = 730
depth = 1
kind = "speaker"
speaker = "Player"
text = "As far as I understand, the 10th squad were sent to oversee the decommission of Glough's shipyard in east Karamja."
parent = -1

[[nodes]]
id = 731
depth = 1
kind = "speaker"
speaker = "Player"
text = "Rumour has it you were blown off course. The King worried as to your fate, and sent me to investigate."
parent = -1

[[nodes]]
id = 732
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "You were sent alone?"
parent = -1

[[nodes]]
id = 733
depth = 1
kind = "speaker"
speaker = "Player"
text = "No, I have been accompanied by Flight Commander Waydar. We flew south on a special type of glider and landed on a small island to our east."
parent = -1

[[nodes]]
id = 734
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "The so called Crash Island. We left there one of our number, Lumdo, to guard our gliders until our return."
parent = -1

[[nodes]]
id = 735
depth = 1
kind = "speaker"
speaker = "Player"
text = "Yes, we have met. He ferried me across to the atoll."
parent = -1

[[nodes]]
id = 736
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "He did!? He was explicitly ordered to guard the gliders! How did this happen? Who is guarding the gliders now?"
parent = -1

[[nodes]]
id = 737
depth = 1
kind = "speaker"
speaker = "Player"
text = "Waydar ordered him to leave his post. He is guarding the gliders himself."
parent = -1

[[nodes]]
id = 738
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Flight Commander Waydar you said? For some reason that name is familiar..."
parent = -1

[[nodes]]
id = 739
depth = 1
kind = "speaker"
speaker = "Player"
text = "So why are you here?"
parent = -1

[[nodes]]
id = 740
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "The rumours are correct. We were indeed blown off course. Fortunately, we managed to find a small island to steer our gliders towards, else we surely would have drowned."
parent = -1

[[nodes]]
id = 741
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then you gathered enough wood to fashion two boats. Your Sergeant and the rest of the 10th squad took the larger boat to this island, leaving Lumdo to guard the gliders and the other boat..."
parent = -1

[[nodes]]
id = 742
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Correct. I assume Lumdo told you this?"
parent = -1

[[nodes]]
id = 743
depth = 1
kind = "speaker"
speaker = "Player"
text = "Yes. What happened when you landed here?"
parent = -1

[[nodes]]
id = 744
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = """
We split up into several small groups to search the island for potential gnome glider launch sites. Whilst we knew the island to be inhabited, we did not expect its occupants to be quite so ... militant.
"""
parent = -1

[[nodes]]
id = 745
depth = 1
kind = "speaker"
speaker = "Player"
text = "..."
parent = -1

[[nodes]]
id = 746
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Monkeys. Lots of monkeys. They are unlike any other type of monkey we've come across. A far cry from the usual wild variety, these were armed with high quality weaponry and uncanny tactical ability."
parent = -1

[[nodes]]
id = 747
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "We were overwhelmed in numbers. Some of us managed to escape, but the rest were taken captive."
parent = -1

[[nodes]]
id = 748
depth = 1
kind = "speaker"
speaker = "Player"
text = "Who survived?"
parent = -1

[[nodes]]
id = 749
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Myself, the Sergeant, Bunkwicket and Waymottin here. Karam, our assassin, probably managed to escape - he usually does."
parent = -1

[[nodes]]
id = 750
depth = 1
kind = "speaker"
speaker = "Player"
text = "And of the rest?"
parent = -1

[[nodes]]
id = 751
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Lumo, Bunkdo and Carado were captured, as I said. We believe they are being held in the jail. We are working on a way to release them. I have sensed there lies a cavern to the north."
parent = -1

[[nodes]]
id = 752
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "We are attempting to tunnel to this northern cavern and then move upwards from there."
parent = -1

[[nodes]]
id = 753
depth = 1
kind = "speaker"
speaker = "Player"
text = "Why don't you just go overground?"
parent = -1

[[nodes]]
id = 754
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "We have considered this, but every entrance seems to be excessively guarded."
parent = -1

[[nodes]]
id = 755
depth = 1
kind = "cond"
text = "Before talking to Sergeant Garkor:"
parent = -1
