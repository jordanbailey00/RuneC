[[nodes]]
id = 760
depth = 1
kind = "speaker"
speaker = "Player"
text = "I have spoken to your Sergeant. He believes that the best way to rescue the rest of your squad with the minimum of casualties is to have an insider - a monkey working for us."
parent = -1

[[nodes]]
id = 761
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Aha. He wants me to turn you into a monkey."
parent = -1

[[nodes]]
