[[nodes]]
id = 1004
depth = 1
kind = "speaker"
speaker = "Waydar"
text = "The human? Just somebody Narnode appears to have taken a fancy to. It is hard to tell why. I suspect the human was involved with Glough's fall from grace."
parent = -1

[[nodes]]
id = 1005
depth = 1
kind = "speaker"
speaker = "G.L.O. Caranock"
text = "You may be right. Never mind - there are greater matters afoot. With Glough gone, it falls to us to continue with his plans."
