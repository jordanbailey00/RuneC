speaker = "Player"
text = "Actually, it was more along the lines of a disguise..."
parent = -1

[[nodes]]
id = 763
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "I think you misunderstand, human. Do you know why you were sent here?"
parent = -1

[[nodes]]
id = 764
depth = 1
kind = "speaker"
speaker = "Player"
text = "King Narnode Shareen asked me to..."
parent = -1

[[nodes]]
id = 765
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Indeed. However, King Narnode Shareen is still in contact with Garkor! You were sent here because Garkor specifically asked Narnode for you!"
parent = -1

[[nodes]]
id = 766
depth = 1
kind = "speaker"
speaker = "Player"
text = "Why wasn't I told?"
parent = -1

[[nodes]]
id = 767
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Before you arrived on this island, that information would have endangered both yourself and the mission."
parent = -1

[[nodes]]
id = 768
depth = 1
kind = "speaker"
speaker = "Player"
text = "But why a human? Why me?"
parent = -1

[[nodes]]
id = 769
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "Garkor had long decided that we need a monkey insider. I have the necessary magic to perform the shapeshifting spell, but we needed a human to transform."
parent = -1

[[nodes]]
id = 770
depth = 1
kind = "speaker"
speaker = "Player"
text = "Why don't you just transform a gnome?"
parent = -1

[[nodes]]
id = 771
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = """
It has been tried in the past, but the results were far from ... satisfactory. Although we, like you, are related to the monkeys, the link is too weak for a successful transformation. That is why we need you.
"""
parent = -1

[[nodes]]
id = 772
depth = 1
kind = "speaker"
speaker = "Player"
text = "Right. What do I have to do?"
parent = -1

[[nodes]]
id = 773
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "There will be two aspects to your transformation. We must first arrange it so that you are able to understand and communicate with the monkeys."
parent = -1

[[nodes]]
id = 774
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "We must also transform your body so that you may pass amongst them unnoticed."
parent = -1

[[nodes]]
id = 775
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "So that the effects of my spells are not permanent, I will invest their power into magical items which you must find. You can then use them at your will."
parent = -1

[[nodes]]
id = 776
depth = 1
kind = "speaker"
speaker = "Player"
text = "What kind of items?"
parent = -1

[[nodes]]
id = 777
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "For the spells to take full effect, they will have to be in some way related to the monkeys."
parent = -1

[[nodes]]
id = 778
depth = 1
kind = "speaker"
speaker = "Zooknock"
text = "I suggest that I invest the ability to communicate with the monkeys in an authentic monkey amulet."
parent = -1

