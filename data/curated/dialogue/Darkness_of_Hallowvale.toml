depth = 2
kind = "speaker"
speaker = "Player"
text = "Can you explain a little about the Guthixian edicts?"
parent = 965

[[nodes]]
id = 967
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Well, only a little. The followers of Guthix make all sorts of wild claims where he is involved. Those of us who serve Saradomin know that these claims are mostly baseless."
parent = 965

[[nodes]]
id = 968
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "What we do know is that Guthix is a god of nature and balance. We believe him to be of average power. Enough to pay attention to, but nothing compared to the strength of Saradomin."
parent = 965

[[nodes]]
id = 969
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "It is said that long ago, back when the gods walked these lands with us, a great war was fought called the God Wars."
parent = 965

[[nodes]]
id = 970
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "The stories say the war lasted for thousands of years and that the carnage saw the world forever changed."
parent = 965

[[nodes]]
id = 971
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "The followers of Guthix claim that this war ended when Guthix awoke from his slumber and banished the other gods, leaving the world to mortals."
parent = 965

[[nodes]]
id = 972
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "This is likely not the true version of events. Guthixians also claim that it was Guthix himself who made the world. Obviously, that is not correct."
parent = 965

[[nodes]]
id = 973
depth = 2
kind = "speaker"
speaker = "Player"
text = "So where do these edicts come in?"
parent = 965

[[nodes]]
id = 974
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "They were apparently created at the end of the God Wars to ensure that the world never sees a conflict like that again."
parent = 965

[[nodes]]
id = 975
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "The edicts state that no single god should be allowed to gain enough power to become dominant. Instead, a balance must be kept between the gods and their servants."
parent = 965

[[nodes]]
id = 976
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "If the balance is not kept, the followers of Guthix will try to intervene. If they are unable to restore balance, they will supposedly awaken Guthix from his slumber beneath the earth."
parent = 965

[[nodes]]
id = 977
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Once he awakens, they say he will remake the world, destroying civilisation as we know it."
parent = 965

[[nodes]]
id = 978
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "It's just a story of course. All made up by the Guthixians to help them feel relevant."
parent = 965

[[nodes]]
id = 979
depth = 2
kind = "speaker"
speaker = "Player"
text = "But if the edicts are just made up, what's the risk?"
parent = 965

[[nodes]]
id = 980
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Well when there's threats of the world being remade, you can't be too careful. It is wise to be cautious. After all, wisdom is one of Saradomin's greatest strengths."
parent = 965

