text = "Of course!"
parent = 114

[[nodes]]
id = 117
depth = 2
kind = "speaker"
speaker = "Felkrash"
text = "They're tougher, stronger and faster than other kinds of cats. They have superior hunting skills and can even catch butterflies and kalphite larvae."
parent = 114

[[nodes]]
id = 118
depth = 2
kind = "speaker"
speaker = "Player"
text = "So are there any drawbacks to owning them?"
parent = 114

[[nodes]]
id = 119
depth = 2
kind = "speaker"
speaker = "Felkrash"
text = "Wily cats need lots more exercise, otherwise they'll get fat and lazy."
parent = 114

[[nodes]]
id = 120
depth = 2
kind = "speaker"
speaker = "Player"
text = "What's the best way to exercise them?"
parent = 114

[[nodes]]
id = 121
depth = 2
kind = "speaker"
speaker = "Felkrash"
text = "Bring it hunting or take it to the Rat Pits regularly."
parent = 114

[[nodes]]
id = 122
depth = 2
kind = "speaker"
speaker = "Felkrash"
text = "Try and keep it happy too, wily cats can be a little nasty when they're cranky."
parent = 114

[[nodes]]
