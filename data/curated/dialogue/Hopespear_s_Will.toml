[[nodes]]
id = 78
depth = 2
kind = "speaker"
speaker = "Player"
text = "Tell me more about yourself."
parent = 77

[[nodes]]
id = 79
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Me chosen prophet of Big High War God. Before I have prophecy, goblin tribes fight one another very much."
parent = 77

[[nodes]]
id = 80
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Long ago we fight other people: beardy-short-people, pointy-hat-short-people, tall people with keen blades. Other people build cities with walls, and we not able to attack them any more."
parent = 77

[[nodes]]
id = 81
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "There not enough food for all tribes, so tribes with no food attack tribes who have food. Goblin war last many many years. Finally all tribes meet at this place, where temple is now."
parent = 77

[[nodes]]
id = 82
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "It rain many days. But rain not stop goblins. Goblin feet churn up ground with rain and goblin blood. All ground turn to mud. That why it called Battle of Plain of Mud."
parent = 77

[[nodes]]
id = 83
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Battle last many days. Both sides same size, none win, none lose. Goblin bodies everywhere. Many dead."
parent = 77

[[nodes]]
id = 84
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Me not important general, not mighty sergeant. Me just normal goblin. But one night, me have dream."
parent = 77

[[nodes]]
id = 85
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Me see throne of Big High War God. He shine with light so bright me cannot see him, but me hear his voice."
parent = 77

[[nodes]]
id = 86
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "He say, 'Stop the fighting!' He say, 'Fighting good, but not if all my followers die! You must not fight one another so much you all die!'"
parent = 77

[[nodes]]
id = 87
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Then he say, 'Today I cannot lead you, but some day I will send Chosen Commander to lead you.'"
parent = 77

[[nodes]]
id = 88
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "I see Chosen Commander in dream. He wear shining armour and stand at front of army of goblins. Behind Chosen Commander, goblins stretch to horizon. Many goblins, too many to count."
parent = 77

[[nodes]]
id = 89
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "I see banners of every tribe. Banners of all tribes, even Dorgesh tribe."
parent = 77

[[nodes]]
id = 90
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Other races, they run away from mighty goblin army! Chosen Commander make goblins build siege machines and they break down walls of cities. Then goblins march in and kill everyone!"
parent = 77

[[nodes]]
id = 91
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "And when all dead, Big High War God himself appear and sit on great throne of bronze and rule over all, with Chosen Commander beside him."
parent = 77

[[nodes]]
id = 92
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Then I wake from dream. I know it true vision from Big High War God. I run to general of my tribe, and he call other generals for emergency meeting."
parent = 77

[[nodes]]
id = 93
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "I tell all generals what I see. They decide to stop fighting so goblins not all die. By this time, so many had died that there enough food for all."
parent = 77

[[nodes]]
id = 94
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Then generals set goblins to work building temple on site of battle. It sink into mud, so they turn it into underground temple, and keep it secret from others."
parent = 77

[[nodes]]
id = 95
depth = 2
kind = "speaker"
speaker = "Ghost"
text = "Goblins write my vision down in goblin holy book, along with history of goblins and commandments of Big High War God."
parent = 77

