depth = 1
kind = "speaker"
speaker = "Barus"
text = "You'll find it on the border between the Kebos Lowlands and the Kingdom of Varlamore. It's a cursed place. Few have ever entered, and of those that have, none have returned!"
parent = -1

[[nodes]]
id = 477
depth = 1
kind = "speaker"
speaker = "Barus"
