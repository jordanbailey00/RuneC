[[nodes]]
id = 1706
depth = 1
kind = "other"
text = "{{qact|Sliske transforms into Ketla.}}"
parent = -1

[[nodes]]
id = 1707
depth = 1
kind = "speaker"
speaker = "Ketla"
text = "Don't you remember how we held back the shadows of Lassar?"
parent = -1

[[nodes]]
id = 1708
depth = 1
kind = "other"
text = "{{qact|Sliske transforms into Kasonde.}}"
parent = -1

[[nodes]]
id = 1709
depth = 1
kind = "speaker"
