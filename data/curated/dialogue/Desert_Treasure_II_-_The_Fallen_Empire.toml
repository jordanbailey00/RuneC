[[nodes]]
id = 115
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "You seem to be fairly knowledgeable when it comes to the Zarosian Empire, which is quite a rarity these days. How much do you know about its fall?"
parent = -1

[[nodes]]
id = 116
depth = 1
kind = "speaker"
speaker = "Player"
text = "I know that Zaros was overthrown by one of his most trusted generals, Zamorak, who became a god as a result."
parent = -1

[[nodes]]
id = 117
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "Spot on! You could teach the so-called experts around here a thing or two. The betrayal of Zaros ultimately led to the God Wars, making it quite possibly the most pivotal moment in all of history."
parent = -1

[[nodes]]
id = 118
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "However, even to those of us who do know our stuff, much of what happened to the empire following Zaros' defeat is still a mystery. That's why I'm here."
parent = -1

[[nodes]]
id = 119
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "Senntisten, the Zarosian settlement once located here, was believed to be the capital of the empire."
parent = -1

[[nodes]]
id = 120
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "If my research is right, and I have strong reason to believe it is, the remains of a key military installation are located right beneath us."
parent = -1

[[nodes]]
id = 121
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "I can definitely think of worse places to discover details on the fall of the empire."
parent = -1

[[nodes]]
id = 122
depth = 1
kind = "speaker"
speaker = "Player"
text = "And you think this military installation could have information on the four names I found?"
parent = -1

[[nodes]]
id = 123
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "Absolutely! Any respectable military outpost would have been filled to the brim with key strategic intelligence. I'd expect details on notable Zarosians to be included."
parent = -1

[[nodes]]
id = 124
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "Of course, they wouldn't have wanted that information falling into the wrong hands, so recovering it may not be straightforward..."
parent = -1

[[nodes]]
id = 125
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well I do love a good challenge."
parent = -1

[[nodes]]
id = 126
depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "Glad to hear it. Now, I have made good progress in excavating these ruins so far, but perhaps you can help me with the final step?"
parent = -1

[[nodes]]
id = 127
depth = 1
kind = "speaker"
speaker = "Player"
text = "Sounds like something I'd be good at! What do you need me to blow up?"
