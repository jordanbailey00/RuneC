depth = 1
kind = "speaker"
speaker = "Player"
text = "I don't think so."
parent = -1

[[nodes]]
id = 474
depth = 1
kind = "speaker"
speaker = "Barus"
text = "Not too surprising. It's not a place you'd want to visit. Anyway, that's supposedly where this evil emerged from."
parent = -1

[[nodes]]
id = 475
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. What can you tell me about the Stranglewood?"
parent = -1

[[nodes]]
