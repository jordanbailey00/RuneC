[[nodes]]
id = 1711
depth = 1
kind = "speaker"
speaker = "Player"
text = "You?"
parent = -1

[[nodes]]
id = 1712
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "Me."
parent = -1

[[nodes]]
id = 1713
depth = 1
kind = "speaker"
speaker = "Player"
text = "So... they were never real? It was all a lie? It was always just you?"
parent = -1

[[nodes]]
id = 1714
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "A lie? No. They were all so real, until their lives were cut short. Their stories would have ended, but I stepped in."
parent = -1

[[nodes]]
id = 1715
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "I became them and they became me. In many ways, they're the real me, far more so than the form before you now."
parent = -1

[[nodes]]
id = 1716
depth = 1
kind = "speaker"
speaker = "Player"
text = "You used them to manipulate me! Why?"
parent = -1

[[nodes]]
id = 1717
depth = 1
kind = "speaker"
speaker = "Akthanakos"
text = "He needed you to open the vault."
parent = -1

[[nodes]]
id = 1718
depth = 1
kind = "speaker"
speaker = "Player"
text = "But he didn't need me to get those medallions! He already had one of them!"
parent = -1

[[nodes]]
id = 1719
depth = 1
kind = "speaker"
speaker = "Player"
text = "Were you just toying with me?"
