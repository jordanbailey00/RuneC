[[nodes]]
id = 1623
depth = 1
kind = "speaker"
speaker = "Asgarnia Smith"
text = "Well of course there will be others who want the treasure! All the more reason for you to stop messing around."
parent = -1

[[nodes]]
id = 1624
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm not going any further until we work out what's going on."
parent = -1

[[nodes]]
id = 1625
depth = 1
kind = "speaker"
speaker = "Asgarnia Smith"
text = "I really thought you had what it takes, kid, but you're just another fool. If you won't help me find the treasure, I'll just have to do it myself!"
parent = -1

