depth = 1
kind = "speaker"
speaker = "Dr Banikan"
text = "Excuse me?"
parent = -1

[[nodes]]
id = 129
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, my first major discovery here involved me blowing a big hole in some rocks to access an ancient temple. Shouldn't be too hard to do that again."
