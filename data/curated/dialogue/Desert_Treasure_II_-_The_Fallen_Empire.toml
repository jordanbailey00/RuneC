[[nodes]]
id = 1758
depth = 1
kind = "speaker"
speaker = "Hazeel"
text = "Yet you have shielded him for centuries. A choice that all of us may now suffer from."
parent = -1

[[nodes]]
id = 1759
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "You can blame me as much as you wish, Hazeel. It is irrelevant. Sliske now holds the Elder Horn and we must be ready to oppose him."
parent = -1

[[nodes]]
id = 1760
depth = 1
kind = "speaker"
speaker = "Hazeel"
text = "We? You made your choice a long time ago, Azzanadra. There is no 'we' anymore."
parent = -1

[[nodes]]
id = 1761
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "And yet you yourself admit that Sliske poses a threat to us all. The prospect of working with Zamorakians gives me no pleasure, but it may be the only option."
parent = -1

[[nodes]]
id = 1762
depth = 1
kind = "speaker"
speaker = "Hazeel"
text = "Perhaps. Perhaps not. Time will soon tell."
parent = -1

[[nodes]]
id = 1763
depth = 1
kind = "speaker"
speaker = "Hazeel"
text = "Now, we're done here. I'll see you soon, Azzanadra."
parent = -1

