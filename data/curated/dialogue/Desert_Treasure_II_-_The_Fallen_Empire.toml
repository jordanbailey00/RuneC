[[nodes]]
id = 1729
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "Do you not see our fate? Over and over, we have our ritual. Over and over, we doom one of our kind to the endless void."
parent = -1

[[nodes]]
id = 1730
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "It's all so... predictable. It's all so... tiresome. And in the end, it will be the death of us all."
parent = -1

[[nodes]]
id = 1731
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "But the Horn will be our salvation. I will use it to break the cycle that has shackled us for so long. We will finally be free."
parent = -1

[[nodes]]
id = 1732
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "The ritual approaches once more, but things will be different this time. This will be the final Ritual of the Mahjarrat."
parent = -1

[[nodes]]
id = 1733
depth = 1
kind = "speaker"
speaker = "Enakhra"
text = "He's finally lost it. We can take him. He's alone."
parent = -1

[[nodes]]
id = 1734
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "I'm never alone."
parent = -1

[[nodes]]
id = 1735
depth = 1
kind = "other"
text = "{{qact|Sliske summons the Barrows Brothers.}}"
parent = -1

[[nodes]]
id = 1736
depth = 1
kind = "speaker"
speaker = "Akthanakos"
text = "You will not be taking that Horn, Enakhra. Not while I stand."
