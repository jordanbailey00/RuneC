kind = "speaker"
speaker = "Barus"
text = """
Well you picked a great day for it! The name's Barus by the way. I work as a historian here. Those Arceuus lot may think they know it all, but I reckon I could tell you a thing or two that even they haven't realised!
"""
parent = -1

[[nodes]]
id = 465
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well on that note, what can you tell me about the Burning Man?"
parent = -1

[[nodes]]
id = 466
depth = 1
kind = "speaker"
speaker = "Barus"
text = """
The Burning Man is a monument to a great triumph in Lovakengj history. We're talking thousands of years ago, before Kourend was even a kingdom! Sadly, that does mean some details have been lost to time.
"""
parent = -1

[[nodes]]
id = 467
depth = 1
kind = "speaker"
speaker = "Barus"
text = "What we do know is that a great evil threatened the earliest dwarven settlers here. Had that evil prevailed, Lovakengj might never have existed!"
parent = -1

[[nodes]]
id = 468
depth = 1
kind = "speaker"
speaker = "Barus"
text = "Thankfully, with guidance from their brave leader, the settlers were able to overcome this evil! The Burning Man is a reminder of that."
parent = -1

[[nodes]]
id = 469
depth = 1
kind = "speaker"
speaker = "Player"
text = "So I'm guessing the monument represents this evil?"
parent = -1

[[nodes]]
id = 470
depth = 1
kind = "speaker"
speaker = "Barus"
text = "That's right!"
parent = -1

[[nodes]]
id = 471
depth = 1
kind = "speaker"
speaker = "Player"
text = "But what was it, and where did it come from?"
parent = -1

[[nodes]]
id = 472
depth = 1
kind = "speaker"
speaker = "Barus"
text = "Ah, now that bit is less clear. Have you heard of the Stranglewood?"
