[[nodes]]
id = 575
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm listening."
parent = -1

[[nodes]]
id = 576
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "It all starts with the Old Ones. They lived here long before humans came to these lands, and these ruins here were once their home."
parent = -1

[[nodes]]
id = 577
depth = 1
kind = "speaker"
speaker = "Player"
text = "And these Old Ones discovered soul transference?"
parent = -1

[[nodes]]
id = 578
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "They did, and they did so long before House Arceuus even existed. It was their final attempt to overcome their extinction, but they failed."
parent = -1

[[nodes]]
id = 579
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "What you see around you is the result of their failure. It's known as the Strangler."
parent = -1

[[nodes]]
id = 580
depth = 1
kind = "speaker"
speaker = "Player"
text = "The Strangler?"
parent = -1

[[nodes]]
id = 581
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "It's some sort of parasite. It was presumably meant to play a role in their transference rituals, but instead it destroyed them. It has remained here ever since."
parent = -1

[[nodes]]
id = 582
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hence the Strangled?"
parent = -1

[[nodes]]
id = 583
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "Exactly. Plenty of unwary fools have fallen victim to the Strangler. If you don't take care, you will share their fate."
parent = -1

[[nodes]]
id = 584
depth = 1
kind = "speaker"
speaker = "Player"
text = "So how do we deal with them?"
parent = -1

[[nodes]]
id = 585
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "The trick is to maintain your distance. They're relatively passive unless you get too close, but if you disturb one, the rest will quickly come running."
parent = -1

[[nodes]]
id = 586
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "If you need to fight one, try to do it away from the rest!"
parent = -1

[[nodes]]
id = 587
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "And stay off of the tendrils! You'll alert the lot of them to your location! It's like a network."
parent = -1

[[nodes]]
id = 588
depth = 1
kind = "speaker"
speaker = "Player"
text = "Keep my distance and stay off the tendrils. I can do that. So what's our next move?"
parent = -1

[[nodes]]
id = 589
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "The fact that you're still alive tells me you broke into my home and stole some of the potion I made."
parent = -1

[[nodes]]
id = 590
depth = 1
kind = "speaker"
speaker = "Player"
text = "'Broke in' is maybe a bit strong..."
parent = -1

[[nodes]]
id = 591
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "Call it what you want, it's not important now. What is important is that I believe I can make a more powerful potion using ingredients found here."
parent = -1

[[nodes]]
id = 592
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "If all goes well, this potion will provide increased immunity against the Strangler. If either of us are to find what we want here, it will be essential."
parent = -1

[[nodes]]
id = 593
depth = 1
kind = "speaker"
speaker = "Player"
text = "So what ingredients do we need?"
parent = -1

[[nodes]]
id = 594
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "As you've no doubt seen, the Strangler infects plant life as well. However, I've come across a small number of plants that seem to have developed immunity."
parent = -1

[[nodes]]
id = 595
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "First, there's a herb growing atop the cliff just north west of the temple. Second, there are some berries in an old camp on the coast to the south west."
parent = -1

[[nodes]]
id = 596
depth = 1
kind = "speaker"
speaker = "Player"
text = "Alright, I can gather those."
parent = -1

[[nodes]]
id = 597
depth = 1
kind = "speaker"
speaker = "Kasonde"
text = "I need to gather some additional ingredients from within the temple. I will meet you back here once I'm done."
