[[nodes]]
id = 145
depth = 2
kind = "speaker"
speaker = "Dr Banikan"
text = "It's an old poem about the rise, and inevitable fall, of kingdoms and empires. Once, Zaros' Empire stretched as far as the eye could see. Now, no one even remembers his name."
