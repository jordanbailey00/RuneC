[[nodes]]
id = 1765
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "Well, adventurer, it seems I owe you an apology."
parent = -1

[[nodes]]
id = 1766
depth = 1
kind = "speaker"
speaker = "Player"
text = "You do?"
parent = -1

[[nodes]]
id = 1767
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "I did not show you the trust that you deserved. You freed me from my prison, a feat even my closest followers failed to achieve, and yet I doubted you."
parent = -1

[[nodes]]
id = 1768
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "I did not know your allegiance, and so I was cautious, but it is clear that focusing on allegiances has blinded us. Sliske took advantage of that."
parent = -1

[[nodes]]
id = 1769
depth = 1
kind = "speaker"
speaker = "Player"
text = "Oh, well thank you, I suppose."
parent = -1

[[nodes]]
id = 1770
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "Now, I must ask about the destruction of the Frostenhorn. Sliske's doing?"
parent = -1

[[nodes]]
id = 1771
depth = 1
kind = "speaker"
speaker = "Player"
text = "It must have been."
parent = -1

[[nodes]]
id = 1772
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "Then I fear the other artefacts will have met a similar fate."
parent = -1

[[nodes]]
id = 1773
depth = 1
kind = "speaker"
speaker = "Player"
text = "Other artefacts?"
parent = -1

[[nodes]]
id = 1774
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "The Frostenhorn was one of three powerful items I was seeking. Together, they may have been my best chance to determine the fate of my lord."
parent = -1

[[nodes]]
id = 1775
depth = 1
kind = "speaker"
speaker = "Player"
text = "And Sliske didn't want that?"
parent = -1

[[nodes]]
id = 1776
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "Apparently not, though who could say why. I would never describe Sliske as a true believer, but until now, he always supported the Empty Lord."
parent = -1

[[nodes]]
id = 1777
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "Indeed, he himself was entrusted with another of the three artefacts. An icon that was kept under close guard by those wights of his."
parent = -1

[[nodes]]
id = 1778
depth = 1
kind = "speaker"
speaker = "Player"
text = "Ah... Well unless they were guarding multiple icons, I'm afraid Sliske destroyed that one as well. As for your third artefact, it didn't happen to be on Entrana, did it?"
parent = -1

[[nodes]]
id = 1779
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "I had yet to track it down, but that does seem likely. It was stolen by Saradominists long ago."
parent = -1

[[nodes]]
id = 1780
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then I think it's safe to say it's been destroyed too. Sliske stole it from Entrana while disguised as that assassin."
parent = -1

[[nodes]]
id = 1781
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "So my worst fears are confirmed. This may well be the darkest day for us since the fall of the Empty Lord."
parent = -1

[[nodes]]
id = 1782
depth = 1
kind = "speaker"
speaker = "Player"
text = "What will you do now?"
parent = -1

[[nodes]]
id = 1783
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "Since you freed me, I have been driven by a singular purpose. I exist for Zaros. I exist for the Empire. Sliske thinks he has destroyed that purpose, but I will not give up."
parent = -1

[[nodes]]
id = 1784
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "However, that is for another day. There are more immediate matters to concern myself with now. The Ritual of the Mahjarrat is fast approaching, and whatever Sliske is planning will happen there."
parent = -1

[[nodes]]
id = 1785
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "I must ensure I am prepared, and while it may not have been your intention, you are part of this now. You must also ensure you are ready. To help with this, I have something to offer you."
parent = -1

[[nodes]]
id = 1786
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "I understand you are in possession of a ring that lets you see into the Shadow Realm? Considering Sliske's mastery over that place, that is a power that will likely be of great use to you."
parent = -1

[[nodes]]
id = 1787
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "Allow me to upgrade it with some offensive and defensive enchantments. They may well give you an important edge if you find yourself fighting in the shadows."
parent = -1

