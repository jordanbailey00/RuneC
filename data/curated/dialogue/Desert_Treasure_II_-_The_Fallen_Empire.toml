[[nodes]]
id = 1726
depth = 1
kind = "speaker"
speaker = "Enakhra"
text = "He clearly wanted it for himself."
parent = -1

[[nodes]]
id = 1727
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "No, not myself. I want the Horn for all of us."
parent = -1

[[nodes]]
id = 1728
depth = 1
kind = "speaker"
speaker = "Hazeel"
text = "What nonsense are you on about?"
