[[nodes]]
id = 1724
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "Of me."
parent = -1

[[nodes]]
id = 1725
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "You should have contacted me, Sliske. You should have told me about the Horn."
