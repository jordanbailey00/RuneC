depth = 1
kind = "speaker"
speaker = "Asgarnia Smith"
text = "Blimey, kid. You don't half take your time, do you? That treasure of ours won't uncover itself!"
parent = -1

[[nodes]]
id = 1618
depth = 1
kind = "speaker"
speaker = "Player"
text = "Ours? Like I said before, I never actually agreed to work with you."
