[[nodes]]
id = 1647
depth = 1
kind = "speaker"
speaker = "Player"
text = "But if this isn't the Frostenhorn, then what is it?"
parent = -1

[[nodes]]
id = 1648
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "There are many powerful artefacts in this world, but few are truly unknowable. This is one of those few. A relic that predates even the gods themselves."
parent = -1

[[nodes]]
id = 1649
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "It has had many names over many millennia, but to us, it was simply known as the Elder Horn."
parent = -1

[[nodes]]
id = 1650
depth = 1
kind = "speaker"
speaker = "Player"
text = "What does it do?"
parent = -1

[[nodes]]
id = 1651
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "It grants absolute control. With this, one person has the power to bring entire armies to their knees, all without a single drop of blood being shed."
parent = -1

[[nodes]]
id = 1652
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hang on... I think I've heard of this artefact. You say it's been known by many names? Was one of them Imperium?"
parent = -1

[[nodes]]
id = 1653
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "You are well informed. Perhaps then you also know that the Horn was supposedly sent far to the east, which begs the question as to how it stands before us."
parent = -1

[[nodes]]
id = 1654
depth = 1
kind = "speaker"
speaker = "Player"
text = "Because there were two."
parent = -1

[[nodes]]
id = 1655
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "What do you mean?"
parent = -1

[[nodes]]
id = 1656
depth = 1
kind = "speaker"
speaker = "Player"
text = "Something I discovered while tracking down Perseriya. It didn't make sense then, but it does now."
parent = -1

[[nodes]]
id = 1657
depth = 1
kind = "speaker"
speaker = "Player"
text = "The one she took east was a fake. She secretly kept the real one. The intention must always have been to hide it here."
parent = -1

[[nodes]]
id = 1658
depth = 1
kind = "speaker"
speaker = "Azzanadra"
text = "A clever deception, although it does raise another question. If the Frostenhorn was never here, then where is it?"
parent = -1

