[[nodes]]
id = 1636
depth = 1
kind = "speaker"
speaker = "Player"
text = "The Frostenhorn. I've no idea what it does, but it's a powerful Zarosian artefact that it seems quite a few people are searching for."
parent = -1

[[nodes]]
id = 1637
depth = 1
kind = "speaker"
