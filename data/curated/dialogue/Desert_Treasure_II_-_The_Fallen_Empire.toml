[[nodes]]
id = 1679
depth = 1
kind = "speaker"
speaker = "Akthanakos"
text = "What a surprise. Enakhra coming up with a flawed plan as usual."
parent = -1

[[nodes]]
id = 1680
depth = 1
kind = "speaker"
speaker = "Enakhra"
text = "Would you like me to turn you into a boneguard again, you camel-loving coward?"
parent = -1

[[nodes]]
id = 1681
depth = 1
kind = "speaker"
speaker = "Akthanakos"
text = "I'd like to see you try. Come, Azzanadra. We can make short work of these traitors and claim the Horn for Zaros."
