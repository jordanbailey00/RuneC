[[nodes]]
id = 1684
depth = 1
kind = "speaker"
speaker = "Akthanakos"
text = "Who are you hiding? Khazard? He always loved lurking in the shadows."
parent = -1

[[nodes]]
id = 1685
depth = 1
kind = "speaker"
speaker = "Hazeel"
text = "Khazard is attending to business in the North. Surely it is you who is hiding someone."
