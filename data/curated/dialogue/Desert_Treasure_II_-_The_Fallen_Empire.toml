[[nodes]]
id = 1722
depth = 1
kind = "speaker"
speaker = "Sliske"
text = "To see if you were worthy."
parent = -1

[[nodes]]
id = 1723
depth = 1
kind = "speaker"
speaker = "Player"
text = "Of what?"
