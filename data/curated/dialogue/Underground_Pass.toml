kind = "speaker"
speaker = "King Lathas"
text = "Well, as we've previously discussed, my brother is currently gathering strength in the lands west of here. The only known way into those lands is through the Underground Pass."
parent = 3

[[nodes]]
id = 6
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = "Unfortunately, the pass is a treacherous place. Some of my best soldiers have fallen trying to find a way though."
parent = 3

[[nodes]]
id = 7
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = "To make matters worse, some crazed group of cultists has recently made their home in the pass. Their leader, some madman named Iban, claims to be the son of Zamorak himself."
parent = 3

[[nodes]]
id = 8
depth = 2
kind = "speaker"
speaker = "Player"
text = "Well that doesn't sound good. So what do you need from me?"
parent = 3

[[nodes]]
id = 9
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = "If my brother is to be stopped, a way through the Underground Pass must be found. This is the task I have for you. Do you think you're up for it?"
parent = 3

