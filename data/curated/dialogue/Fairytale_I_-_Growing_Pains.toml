kind = "speaker"
speaker = "Player"
text = "Fairy Nuff gave me a list of her symptoms. Here, have a look at it."
parent = 292

[[nodes]]
id = 294
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "Hmm...yes...slow discorporation of ethreal body, eh? Hmm...I think I know what the problem might be."
parent = 292

[[nodes]]
id = 295
depth = 2
kind = "speaker"
speaker = "Player"
text = "You do? That's great! What is it?"
parent = 292

[[nodes]]
id = 296
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "From what I know about fairies, their basic lifeforce is pure magic. Much as we humans would refer to our souls as our life essence, so too does a fairy have a life essence of pure magic."
parent = 292

[[nodes]]
id = 297
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "You could actually refer to fairies as magic embodied and not be wrong."
parent = 292

[[nodes]]
id = 298
depth = 2
kind = "speaker"
speaker = "Player"
text = "Yes, but about the Fairy Queen?"
parent = 292

[[nodes]]
id = 299
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "Patience, I'm getting to that. It appears the Fairy Queen has lost a large part, indeed the majority, of her life essence. Either it was drained from her by the Tanglefoot or she did it voluntarily."
parent = 292

[[nodes]]
id = 300
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "Although why she would do that is beyond me."
parent = 292

[[nodes]]
id = 301
depth = 2
kind = "speaker"
speaker = "Player"
text = "So I guess I need to go and kill this Tanglefoot and get back her magic essence if I am to help her?"
parent = 292

[[nodes]]
id = 302
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "Yes, but if I were you I would seek out a necromancer by the name of Malignus{{sic}} Mortifer. I believe that he once fought a Tanglefoot, many years ago."
parent = 292

[[nodes]]
id = 303
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "You should probably ask him for advice on how to combat it."
parent = 292

[[nodes]]
id = 304
depth = 2
kind = "speaker"
speaker = "Player"
text = "Malignus{{sic}} Mortifer. Any idea where I can find him?"
parent = 292

[[nodes]]
id = 305
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "He's rumoured to have been seen near Port Sarim with his followers recently. Rumour has it that he's working on a spell that has something to do with fungus!"
parent = 292

[[nodes]]
id = 306
depth = 2
kind = "speaker"
speaker = "Player"
text = "Ok, thanks very much."
parent = 292

[[nodes]]
id = 307
depth = 2
kind = "speaker"
speaker = "Zandar Horfyre"
text = "Don't mention it, and give my regards to Nuff, when you see her next."
parent = 292

