[[nodes]]
id = 29
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "Well there is something I could use some help with. I'm here to investigate some unusual happenings in Port Piscarilius."
parent = 28

[[nodes]]
id = 30
depth = 3
kind = "speaker"
speaker = "Player"
text = "What are you investigating?"
parent = 28

[[nodes]]
id = 31
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "Port Piscarilius is home to various gangs. They're a nuisance, but up until now we haven't had much trouble in dealing with them."
parent = 28

[[nodes]]
id = 32
depth = 3
kind = "speaker"
speaker = "Player"
text = "So what's the problem?"
parent = 28

[[nodes]]
id = 33
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "A new gang calling themselves the Saviours of Kourend has recently formed. That's not surprising as gangs come and go all of the time, but this one is different."
parent = 28

[[nodes]]
id = 34
depth = 3
kind = "speaker"
speaker = "Player"
text = "How so?"
parent = 28

[[nodes]]
id = 35
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "The Saviours of Kourend have been absorbing many of the other gangs. Within a few weeks, they've already become the largest gang in Kourend and more join them each day."
parent = 28

[[nodes]]
id = 36
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "The talk amongst the people is that it's all down to their leader, a mysterious figure known only as the Queen of Thieves."
parent = 28

[[nodes]]
id = 37
depth = 3
kind = "speaker"
speaker = "Player"
text = "Nice name. Why doesn't the ruler of Port Piscarilius do something about this?"
parent = 28

[[nodes]]
id = 38
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "Shauna Piscarilius is the ruler of Port Piscarilius, but she spends most of her time galavanting around in that boat of hers rather than looking after her home."
parent = 28

[[nodes]]
id = 39
depth = 3
kind = "speaker"
speaker = "Player"
text = "Fair enough. So what do you need me for?"
parent = 28

[[nodes]]
id = 40
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "Well my original plan was to infiltrate the gang to get close to the queen and capture her. However, I've been unable to make any progress. Apparently, I don't look the part."
parent = 28

[[nodes]]
id = 41
depth = 3
kind = "speaker"
speaker = "Player"
text = "Yeah not sure what that's all about. You clearly fit right in here."
parent = 28

[[nodes]]
id = 42
depth = 3
kind = "speaker"
speaker = "Tomas Lawry"
text = "Quite right. They're quite insistent though, so someone else will need to give it a go. You look like you might be just the type they're after."
parent = 28

[[nodes]]
