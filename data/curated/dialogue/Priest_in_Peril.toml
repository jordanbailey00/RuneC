kind = "speaker"
speaker = "Player"
text = "The Myreque?"
parent = -1

[[nodes]]
id = 479
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "Yes. They're a band of freedom fighters. They fight to protect the humans trapped in Morytania from the tyranny of the vampyres. Their hope is to one day rid the region of all evil."
parent = -1

[[nodes]]
id = 480
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "Veliaf, the leader of their Mort Myre group, is an old friend. I imagine they'd appreciate the help of someone like you, if you can find them."
parent = -1

[[nodes]]
