[[nodes]]
id = 466
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "Please take this dagger. It has been handed down within my family for generations and is filled with the power of Saradomin."
parent = -1

[[nodes]]
id = 467
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "You will find that it has the ability to prevent werewolves from adopting their wolf form in combat. Hopefully it comes in useful."
parent = -1

