[[nodes]]
id = 431
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "I have managed to reinforce the barrier, but I must continue focussing on it to keep it intact. Although the passage is safe for now, I do not know how long I can keep it that way."
parent = -1

[[nodes]]
id = 432
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "This passage could be the least of our worries soon though. Before long, the vampyres will be able to cross at any point of the river. We won't be able to reinforce all of it."
