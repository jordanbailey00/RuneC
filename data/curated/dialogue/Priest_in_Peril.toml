[[nodes]]
id = 21
depth = 4
kind = "speaker"
speaker = "King Roald"
text = "As you are no doubt aware, this kingdom worships Saradomin, the god of wisdom and order. As such, it is a peaceful place to live and prosper."
parent = 18

[[nodes]]
id = 22
depth = 4
kind = "speaker"
speaker = "King Roald"
text = "Paterdomus, the temple where Drezel lives, stands on the eastern border of Misthalin. It guards the only passage into the evil lands of Morytania."
parent = 18

[[nodes]]
id = 23
depth = 4
kind = "speaker"
speaker = "Player"
text = "Evil?"
parent = 18

[[nodes]]
id = 24
depth = 4
kind = "speaker"
speaker = "King Roald"
text = "Oh yes. Morytania is a fearful place, filled to the brim with accursed servants of the chaos god Zamorak. All of them are terrible, but none more so than the rulers of the region, the vampyres."
parent = 18

[[nodes]]
id = 25
depth = 4
kind = "speaker"
speaker = "King Roald"
text = "Thankfully, the sacred River Salve marks a natural border between Misthalin and Morytania. Together, the river and the temple prevent any invasion by the vampyres."
parent = 18

[[nodes]]
id = 26
depth = 4
kind = "speaker"
speaker = "King Roald"
text = "The waters of the river are kept blessed with Saradomin's almighty power. This ensures our defences remain strong, as the vampyres cannot cross such a holy barrier."
parent = 18

[[nodes]]
id = 27
depth = 4
kind = "speaker"
speaker = "King Roald"
text = """
Drezel is descended from one of the original Saradominist priests who first blessed the river. His job is to ensure nothing happens to the river that might allow the evil of Morytania to invade this land.
"""
parent = 18

[[nodes]]
id = 28
depth = 4
kind = "speaker"
speaker = "King Roald"
text = "This is the reason why the lack of communication from him bothers me somewhat, although I am sure nobody would dare to try and attack our kingdom!"
parent = 18

