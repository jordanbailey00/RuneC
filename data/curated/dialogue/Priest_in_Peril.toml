[[nodes]]
id = 231
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "It is said that many years ago, the land that is now Morytania was a peaceful Saradominist kingdom. Alas, all that ended when the vampyres invaded, claiming the land as their own."
parent = 228

[[nodes]]
id = 232
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Morytania wasn't enough for them though. Soon, they set their sights on these lands as well."
parent = 228

[[nodes]]
id = 233
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Misthalin would have quickly fallen to the vampyres, were it not for the bravery of the Seven Priestly Warriors."
parent = 228

[[nodes]]
id = 234
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "They led the armies of Misthalin against the vampyres in a great battle that took place right where this temple stands."
parent = 228

[[nodes]]
id = 235
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "For ten days and nights they fought, never sleeping, never eating, fuelled by their desire to make the world a better place for humans to live."
parent = 228

[[nodes]]
id = 236
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "On the eleventh day they were to be joined by reinforcements. However, when those reinforcements arrived, they found the Seven Priestly Warriors and their forces had been slain by the vampyres."
parent = 228

[[nodes]]
id = 237
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Their sacrifice was not in vain though. Before they were defeated, the Seven Priestly Warriors managed to bless the Salve with the holy power of Saradomin."
parent = 228

[[nodes]]
id = 238
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Their blessings remain to this day, ensuring no vampyre can cross the river."
parent = 228

[[nodes]]
id = 239
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "The temple here was built soon after. It guards the source of the River Salve, and acts as the only passage between Misthalin and Morytania."
parent = 228

[[nodes]]
id = 240
depth = 2
kind = "speaker"
speaker = "Drezel"
text = """
