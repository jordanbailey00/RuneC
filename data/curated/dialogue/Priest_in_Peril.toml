text = "On the eleventh day they were to be joined by reinforcements. However, when those reinforcements arrived, they found the Seven Priestly Warriors and their forces had been slain by the vampyres."
parent = 286

[[nodes]]
id = 294
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "Their sacrifice was not in vain though. Before they were defeated, the Seven Priestly Warriors managed to bless the Salve with the holy power of Saradomin."
parent = 286

[[nodes]]
