speaker = "Player"
text = "So can I pass through that barrier now?"
parent = -1

[[nodes]]
id = 470
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "Into Morytania? Yes, you can. The barrier will prevent the servants of Zamorak from entering Misthalin, but it is safe for those blessed by Saradomin."
parent = -1

[[nodes]]
id = 471
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "I must warn you though, Morytania is an evil land. The region is filled with creatures and monsters more terrifying than any you'll find on this side of the Salve."
parent = -1

[[nodes]]
id = 472
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "Worst of all are the vampyres, the rulers of Morytania. Be very cautious of their kind. Many are completely immune to human weaponry. Those that aren't, are still very hard to kill."
parent = -1

[[nodes]]
id = 473
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'll be careful. Anything else I should know?"
parent = -1

[[nodes]]
id = 474
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "The first settlement you'll likely come across is Canifis, a town of werewolves. They probably won't attack you unless provoked, but you should still be cautious."
parent = -1

[[nodes]]
id = 475
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "You should keep your Wolfbane dagger to hand. It will prevent them from taking on their wolf form."
parent = -1

[[nodes]]
id = 476
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. Thanks."
parent = -1

[[nodes]]
id = 477
depth = 1
kind = "speaker"
speaker = "Drezel"
text = "One last thing. While in Morytania, stay alert for any mention of the Myreque."
parent = -1

[[nodes]]
