kind = "speaker"
speaker = "Drezel"
text = "Their blessings remain to this day, ensuring no vampyre can cross the river."
parent = 286

[[nodes]]
id = 296
depth = 2
kind = "speaker"
speaker = "Drezel"
text = "The temple here was built soon after. It guards the source of the River Salve, and acts as the only passage between Misthalin and Morytania."
parent = 286

[[nodes]]
id = 297
depth = 2
kind = "speaker"
speaker = "Drezel"
text = """
Once the temple was complete, the bodies of the Seven Priestly Warriors were laid to rest in tombs of honour in the mausoleum below. On the top of each tomb, a golden gift was placed as a mark of respect.
"""
parent = 286

