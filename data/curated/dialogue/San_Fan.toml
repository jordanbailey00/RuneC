[[nodes]]
id = 41
depth = 2
kind = "speaker"
speaker = "Player"
text = "I say!"
parent = 34

[[nodes]]
id = 42
depth = 2
kind = "speaker"
speaker = "San Fan"
text = "Neither of us can really corner the 'rum' market at the moment, but we are giving it our best shot."
