[[nodes]]
id = 38
depth = 2
kind = "speaker"
speaker = "San Fan"
text = "All the pirates on the island got together and decided to make our own still, but of course things got a little out of hand, and now we have two."
parent = 34

[[nodes]]
id = 39
depth = 2
kind = "speaker"
speaker = "Player"
text = "So with two stills you have plenty of 'rum' right?"
parent = 34

[[nodes]]
id = 40
depth = 2
kind = "speaker"
speaker = "San Fan"
text = "Well we would do, if that scurvy, whelk-eating foppish dog wouldn't keep trying to burn our still to the ground!"
