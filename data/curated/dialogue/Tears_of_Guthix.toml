[[nodes]]
id = 28
depth = 3
kind = "speaker"
speaker = "Player"
text = "What are the Tears of Guthix?"
parent = 27

[[nodes]]
id = 29
depth = 3
kind = "speaker"
speaker = "Juna"
text = "The Third Age of the world was a time of great conflict, of destruction never seen before or since, when all the gods save Guthix warred for control."
parent = 27

[[nodes]]
id = 30
depth = 3
kind = "speaker"
speaker = "Juna"
text = """
The colossal Wyrms, of whom today's dragons are a pale reflection, turned all the sky to fire, while on the ground armies of foot soldiers, goblins and trolls and humans, filled the valleys and plains with blood.
"""
parent = 27

[[nodes]]
id = 31
depth = 3
kind = "speaker"
speaker = "Juna"
text = """
In time the noise of the conflict woke Guthix from His deep slumber, and He rose and stood in the centre of the battlefield so that the splendour of His wrath filled the world, and He called for the conflict to cease!
"""
parent = 27

[[nodes]]
id = 32
depth = 3
kind = "speaker"
speaker = "Juna"
text = "Silence fell, for the gods knew that none could challenge the power of the mighty Guthix -- for His power is that of nature itself, to which all other things are subject, in the end."
parent = 27

[[nodes]]
id = 33
depth = 3
kind = "speaker"
speaker = "Juna"
text = "Guthix reclaimed that which had been stolen from Him, and went back underground to return to His sleep and continue to draw the world's power into Himself."
parent = 27

[[nodes]]
id = 34
depth = 3
kind = "speaker"
speaker = "Juna"
text = "But on His way into the depths of the earth He sat and rested in this cave; and, thinking of the battle-scarred desert that now stretched from one side of His world to the other, He wept."
parent = 27

[[nodes]]
id = 35
depth = 3
kind = "speaker"
speaker = "Juna"
text = "And so great was His sorrow, and so great was His life- giving power, that the rocks themselves began to weep with Him."
parent = 27

[[nodes]]
id = 36
depth = 3
kind = "speaker"
speaker = "Juna"
text = "Later, Guthix noticed that the rocks continued to weep, and that their tears were infused with a small part of His power."
parent = 27

[[nodes]]
id = 37
depth = 3
kind = "speaker"
speaker = "Juna"
text = "So He set me, His servant, to guard the cave, and He entrusted to me the task of judging who was and was not worthy to access the tears."
parent = 27

