speaker = "Otto Godblessed"
text = """
Who can tell? My forefathers weren't averse to travelling, so it is possible. They tended to cause too much trouble in your so-called civilised lands, however, so most returned to their ancestral homes.
"""
parent = 2

[[nodes]]
id = 5
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "In any case, given you seem the type, I think you are ready to learn our more secret tribal feats for yourself."
parent = 2

[[nodes]]
id = 6
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh, that sounds interesting. What sort of skills would these be?"
parent = 2

[[nodes]]
id = 7
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "To begin with, I can supply knowledge in the ways of firemaking, our special rod fishing tricks, a selection of spear skills and our agricultural techniques."
parent = 2

[[nodes]]
id = 8
depth = 2
kind = "speaker"
speaker = "Player"
text = "There are more advanced stages though, going by your description?"
parent = 2

[[nodes]]
id = 9
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "Your perception is creditable. I can eventually teach of more advanced firemaking techniques, and the rod fishing skills are but a preliminary to our special potions and brews."
parent = 2

[[nodes]]
