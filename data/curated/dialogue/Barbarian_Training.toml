[[nodes]]
id = 157
depth = 2
kind = "speaker"
speaker = "Player"
text = "Could you tell me more of these spirits you continually refer to?"
parent = 156

[[nodes]]
id = 158
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = """
Certainly, though it is quite simple - they are the barbarians of the past who have died in the passing of the years. There are three categories which learned sages claim may describe all spirits encountered.
"""
parent = 156

[[nodes]]
id = 159
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "The majority are at peace, having died with their ambitions sated, even if this ambition was as simple as a glorious death. They can contact those in our world in order to spur us on to glory."
parent = 156

[[nodes]]
id = 160
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "Of course, they cannot or will not contact all inhabitants of these lands, for not all are worthy."
parent = 156

[[nodes]]
id = 161
depth = 2
kind = "speaker"
speaker = "Player"
text = "So those are the spirits who give us guidance. What of the other sorts?"
parent = 156

[[nodes]]
id = 162
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "A second category of spirit is made up of those who are not yet at peace. However, all that is needed is for their mortal remains to be laid to rest and they will join the peaceful majority."
parent = 156

[[nodes]]
id = 163
depth = 2
kind = "speaker"
speaker = "Player"
text = "I can see the pyres serve this purpose. The final category is also restless?"
parent = 156

[[nodes]]
id = 164
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "Alas, there is a small minority who will never be at rest. These have been slain in moments of insanity by their brothers or by adventurers."
parent = 156

[[nodes]]
id = 165
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = """
They are not at rest and will attack those they blame for their tortured state. They are not known, however, for being able to determine this blame with any great accuracy, so should be considered dangerous to all.
"""
parent = 156

[[nodes]]
id = 166
depth = 2
kind = "speaker"
speaker = "Player"
text = "Thank you Otto. It makes a bit more sense now."
parent = 156

