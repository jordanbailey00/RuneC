kind = "speaker"
speaker = "Player"
text = "I have completed firemaking with a bow. What follows this?"
parent = 210

[[nodes]]
id = 212
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "The next stage is quite complex, so listen well. In order to send our ancestors into the spirit world, their mortal remains must be burned with due ceremony."
parent = 210

[[nodes]]
id = 213
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "This can only be done close to the water on the shore of the lake, just to our north-east. You will recognise the correct places by the ashes to be seen there."
parent = 210

[[nodes]]
id = 214
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "You will need to construct a small ship by using an axe upon logs in this area, then add the bones of a long dead barbarian hero."
parent = 210

[[nodes]]
id = 215
depth = 2
kind = "speaker"
speaker = "Player"
text = "Where do I obtain these bones?"
parent = 210

[[nodes]]
id = 216
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = """
From the caverns beneath this lake. Many of our ancestors travelled to these caverns in order to hunt for glory, but found only death. Their bones must still lie inside, their spirits trapped in torment.
"""
parent = 210

[[nodes]]
id = 217
depth = 2
kind = "speaker"
speaker = "Player"
text = "So I make sure I am in the right place, then throw these bones on a ceremonial ship before I set light to it?"
parent = 210

[[nodes]]
id = 218
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "Correct. The spirit will ascend to glory while the pyre will send the earthly remains to the depths. You will also obtain a closer link to the spirit world."
parent = 210

[[nodes]]
id = 219
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "During this heightened contact, any bones you bury will have increased importance to the gods. The number of bones that may be buried before the link fades will depend on the wood used."
parent = 210

[[nodes]]
id = 220
depth = 2
kind = "speaker"
speaker = "Player"
text = "Is there anything else I should know?"
parent = 210

[[nodes]]
id = 221
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "I have little knowledge of the caverns - they are blocked from the sight of the spirits with whom I commune. I can only suspect that whatever slew the barbarian heroes is indeed mighty."
parent = 210

[[nodes]]
id = 222
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "I also suspect that the bones you seek might well be very uncommon, since heroes are not found in vast numbers."
parent = 210

[[nodes]]
id = 223
depth = 2
kind = "speaker"
speaker = "Player"
text = "How do I enter the caverns?"
parent = 210

[[nodes]]
id = 224
depth = 2
kind = "speaker"
speaker = "Otto Godblessed"
text = "Dive into the whirlpool in the lake to the east. The spirits will use their abilities to ensure you arrive in the correct location. Be warned, their influence fades, so you must find your own way out."
parent = 210

