kind = "speaker"
speaker = "Garth"
text = "Great! Now, in case you didn't know, the castle before you is Ver Sinhaza. It's home to the Theatre of Blood."
parent = 2

[[nodes]]
id = 5
depth = 2
kind = "speaker"
speaker = "Player"
text = "So it's a form of entertainment for them? Why do the citizens take part?"
parent = 2

[[nodes]]
id = 6
depth = 2
kind = "speaker"
speaker = "Garth"
text = "The Theatre is run by a famous vampyre noble, Lady Verzik Vitur. She has promised that any citizen of Meiyerditch who survives the Theatre will be freed of the vampyre blood tithes."
parent = 2

[[nodes]]
id = 7
depth = 2
kind = "speaker"
speaker = "Player"
text = "I suppose that must be rather tempting to a lot of people. So who's this Serafina?"
parent = 2

[[nodes]]
id = 8
depth = 2
kind = "speaker"
speaker = "Garth"
text = "The Theatre has been around for many years and thousands of people have tried their luck against it. However, in all that time, only one person has ever survived until the end."
parent = 2

[[nodes]]
id = 9
depth = 2
kind = "speaker"
speaker = "Player"
text = "Serafina?"
parent = 2

[[nodes]]
id = 10
depth = 2
kind = "speaker"
speaker = "Garth"
text = "Exactly. Serafina's younger brother was very ill and he wasn't going to survive many more blood tithes. She couldn't just let him die, so she did what no other person ever had."
parent = 2

[[nodes]]
id = 11
depth = 2
kind = "speaker"
speaker = "Garth"
text = "She entered the Theatre and succeeded in every challenge she faced. They say that Verzik wasn't too happy about that, but she kept her promise. Serafina and her brother were freed."
parent = 2

[[nodes]]
id = 12
depth = 2
kind = "speaker"
speaker = "Player"
text = "Sounds like you're a big fan of her."
parent = 2

[[nodes]]
id = 13
depth = 2
kind = "speaker"
speaker = "Garth"
text = "Well of course. When she survived the Theatre, she provided hope to every person in Meiyerditch. Hope that they can one day follow in her footsteps."
parent = 2

[[nodes]]
id = 14
depth = 2
kind = "speaker"
speaker = "Player"
text = "So what happened to her in the end?"
parent = 2

[[nodes]]
