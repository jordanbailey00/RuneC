speaker = "Player"
text = "What's the deal with your brother again?"
parent = 21

[[nodes]]
id = 23
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = "My brother, King Tyras, was always a bit of an explorer. He went on numerous expeditions to the lands west of here. On one of these expeditions, he was captured by the forces of the Dark Lord."
parent = 21

[[nodes]]
id = 24
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = """
The Dark Lord agreed to spare his life, but only on one condition... That he would drink from the Chalice of Eternity. The chalice corrupted him. He joined forces with the Dark Lord, the embodiment of pure evil…
"""
parent = 21

[[nodes]]
id = 25
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = """
As a result, I had a wall built around West Ardougne to act as a barrier between him and the rest of the world. Tyras is king of West Ardougne, sealing off the city was the only way to stop him and the Dark Lord.
"""
parent = 21

[[nodes]]
id = 26
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = "I knew people would never believe the truth, so I had the plague made up as an excuse for the cordon. I'm not proud of it, but it was the only way to keep people safe."
parent = 21

[[nodes]]
id = 27
depth = 2
kind = "speaker"
speaker = "Player"
text = "But now we’re ready to stop him."
parent = 21

[[nodes]]
id = 28
depth = 2
kind = "speaker"
speaker = "King Lathas"
text = "Indeed we are. My brother has been gathering strength in the west, preparing to move against us. But now that we have a way through, we can move against him first."
parent = 21

