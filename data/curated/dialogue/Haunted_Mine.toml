kind = "speaker"
speaker = "Zealot"
text = "Well, below the very ground you stand upon lies an intricate network of tunnels that make up the abandoned Mort Ridge mines. These mines used to be a valuable resource to the inhabitants of Morytania."
parent = 12

[[nodes]]
id = 15
depth = 4
kind = "speaker"
speaker = "Zealot"
text = "As with many things, this changed when Misthalin was finally able to push the minions of Morytania back, and Saradomin himself blessed the river Salve."
parent = 12

[[nodes]]
id = 16
depth = 4
kind = "speaker"
speaker = "Zealot"
text = "The mines are also the site where the legendary artefact, the salve amulet, was thought to have been carved from the crystals that grow in the lower levels of the mine."
parent = 12

[[nodes]]
id = 17
depth = 4
kind = "speaker"
speaker = "Zealot"
text = "These crystals are thought to be formed by the blessed water of the river Salve as it percolates through the rocks to the lower levels of the mine."
parent = 12

[[nodes]]
id = 18
depth = 4
kind = "speaker"
speaker = "Zealot"
text = "It is not known what happened to the salve amulet, but it is generally believed that by encapsulating within it some of the goodness of Saradomin himself, it afforded the bearer power over evil."
parent = 12

[[nodes]]
id = 19
depth = 4
kind = "speaker"
speaker = "Zealot"
text = "Saradomin has entrusted me alone with the task of regaining access to the mines, whatever the dangers."
parent = 12

[[nodes]]
