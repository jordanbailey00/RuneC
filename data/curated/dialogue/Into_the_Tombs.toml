[[nodes]]
id = 19
depth = 1
kind = "box"
text = """
Before entering a raid, you can customise the difficulty of the challenges you'll face by using Invocations. Invocations can be enabled or disabled from the Grouping Obelisk. There are a large variety of Invocations available, covering both challenge-specific mechanics as well as raid-wide systems.
"""
parent = -1

[[nodes]]
id = 20
depth = 1
kind = "box"
text = """
Enabling or disabling Invocations will change the Raid Level. On top of the Invocation effects, increasing the Raid Level will also increase the stats of all foes in the raid. However, higher Raid Levels will result in more rewards becoming available.
"""
parent = -1

