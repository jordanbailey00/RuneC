[[nodes]]
id = 36
depth = 3
kind = "speaker"
speaker = "Diango"
text = "Then, you spray one of the possessed items with the Ghost Buster, which will force the ghost out."
parent = 10

[[nodes]]
id = 37
depth = 3
kind = "speaker"
speaker = "Diango"
text = "Then, you take a look at what colour the ghost is, and load that colour destabiliser into the Ghost Buster, and spray them again."
parent = 10

[[nodes]]
id = 38
depth = 3
kind = "speaker"
speaker = "Diango"
text = "There are five types of ghosts down there, and if you get rid of three of each then we should be able to make a bit of a start on the toys again."
parent = 10

