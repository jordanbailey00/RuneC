[[nodes]]
id = 19
depth = 3
kind = "speaker"
speaker = "Diango"
text = "So, I got my workers started on the presents now, as that means everything will be nice and ready for the big day, and there'll be plenty of time left in case anything goes wrong."
parent = 10

[[nodes]]
id = 20
depth = 3
kind = "speaker"
speaker = "Diango"
text = "Well, I might have run out of wood after I tried my hand at a little Construction, so I got my workers to take a little wood from Draynor Manor..."
parent = 10

[[nodes]]
id = 21
depth = 3
