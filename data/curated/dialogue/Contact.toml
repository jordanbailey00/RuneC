[[nodes]]
id = 12
depth = 1
kind = "speaker"
speaker = "Player"
text = "Thanks to me?"
parent = -1

[[nodes]]
id = 13
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "Yes. You've shown us that the pox we're all infected with can't be contagious. If it was, you'd be covered in spots by now."
parent = -1

[[nodes]]
id = 14
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's a very good point. Does this mean you can reopen the city?"
parent = -1

[[nodes]]
id = 15
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "It does indeed. The decision to lock things down was made very quickly, so we were forced to trap many of our citizens outside the walls. We'll be able to let them all back in now."
parent = -1

[[nodes]]
id = 16
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's wonderful news!"
parent = -1

[[nodes]]
id = 17
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "It is, but there is a problem."
parent = -1

[[nodes]]
id = 18
depth = 1
kind = "speaker"
speaker = "Player"
text = "What is it?"
parent = -1

[[nodes]]
id = 19
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "When the plague first started, Menaphos, our neighbouring city, closed their gates as well. Many of our citizens became trapped there when they did."
parent = -1

[[nodes]]
id = 20
depth = 1
kind = "speaker"
speaker = "Player"
text = "But if there's no risk of them becoming infected, can't they open up again as well?"
parent = -1

[[nodes]]
id = 21
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "You'd think so, but they believe that there is still a danger. It seems they're even willing to kill if it helps keep their city isolated."
parent = -1

[[nodes]]
id = 22
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hmm... Perhaps I could help?"
parent = -1

