[[nodes]]
id = 51
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "It is often the way under Pharoah Kemesis. He leads the Menaphites in a more secular manner than we would like. Respect for the old ways is diminishing."
parent = -1

[[nodes]]
id = 52
depth = 1
kind = "speaker"
speaker = "Player"
text = "By old ways, do you mean Icthlarin?"
parent = -1

[[nodes]]
id = 53
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "The whole Menaphite Pantheon really. Religion is starting to mean less and less in Menaphos."
parent = -1

[[nodes]]
id = 54
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "There was once a time when we would care for all of Menaphos' dead here. Now, many opt for less traditional burials."
parent = -1

[[nodes]]
id = 55
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "Anyway, I've let myself become distracted. My focus is often on the dead, but right now our main worry is the living."
parent = -1

[[nodes]]
id = 56
depth = 1
kind = "speaker"
speaker = "High Priest"
text = "It's clear that the Pharaoh has no desire to open his city, so we need to find another way of getting our citizens home."
parent = -1

[[nodes]]
id = 57
depth = 1
kind = "speaker"
speaker = "Player"
text = "Any ideas on how we do that?"
parent = -1

[[nodes]]
