speaker = "Player"
text = "Is there any way into Menaphos from below?"
parent = 77

[[nodes]]
id = 79
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "I don't know. I don't think so."
parent = 77

[[nodes]]
id = 80
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh. So there aren't any tunnels under this city?"
parent = 77

[[nodes]]
id = 81
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Beyond the homes of our dead? I can't imagine so. We are not ones for digging tunnels unnecessarily. We leave that nonsense to the Sect of Scabaras, and they're long gone."
parent = 77

[[nodes]]
id = 82
depth = 2
kind = "speaker"
speaker = "Player"
text = "The Sect of Scabaras?"
parent = 77

[[nodes]]
id = 83
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "They were a group dedicated to Scabaras, one of the lesser deities."
parent = 77

[[nodes]]
id = 84
depth = 2
kind = "speaker"
speaker = "Player"
text = "What's a lesser deity?"
parent = 77

[[nodes]]
id = 85
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "You already know of Icthlarin and the Devourer. They are the son and daughter of Tumeken and Elidinis. Together, they are the four main deities of the Menaphite Pantheon."
parent = 77

[[nodes]]
id = 86
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "However, the pantheon also has four lesser deities, or avatars as some call them. The Book of Light and Day says that Tumeken once fell into a deep sleep and dreamt for four days and four nights."
parent = 77

[[nodes]]
id = 87
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "With each night, his dreams took form. Those four forms became the lesser deities of the pantheon, with Scabaras being the last of them."
parent = 77

[[nodes]]
id = 88
depth = 2
kind = "speaker"
speaker = "Player"
text = "And his followers liked to dig tunnels?"
parent = 77

[[nodes]]
id = 89
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "That's right. Scabaras is the god of isolation. In keeping with his teachings, his followers mostly lived underground. As such, they were said to be great architects of the subterranean."
parent = 77

[[nodes]]
id = 90
depth = 2
kind = "speaker"
speaker = "Player"
text = "So what happened to them?"
parent = 77

[[nodes]]
id = 91
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "The Devourer was not the only member of the pantheon to wish ill upon our people. It is said that many years ago, Scabaras and his sect tried to claim these lands as their own."
parent = 77

[[nodes]]
id = 92
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "They built great tunnels beneath the Elid and used them to attack our settlements. However, Elidinis stood against them. The sect was destroyed, and Scabaras was fittingly driven into isolation."
parent = 77

[[nodes]]
id = 93
depth = 2
kind = "speaker"
speaker = "Player"
text = "And you don't think there's a chance they might have built some tunnels under Sophanem and Menaphos?"
parent = 77

[[nodes]]
id = 94
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Er... I suppose I've never considered it before. I guess it's not impossible."
parent = 77

[[nodes]]
id = 95
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "Maybe you should visit Jex at the Temple of the Lesser Gods in the north east corner of the city. He knows more about the Sect of Scabaras than I do."
parent = 77

[[nodes]]
id = 96
depth = 2
kind = "speaker"
speaker = "High Priest"
text = "In fact, now that I think about it, I recall a rumour that the temple was actually once home to the sect."
parent = 77

[[nodes]]
id = 97
