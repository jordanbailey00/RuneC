speaker = "Mac"
text = "Fine... Ajjat gave me unlimited teleports to his Warrior's guild and Kamfreena lets me fight her Cyclopes without needing those annoying tokens."
parent = 19

[[nodes]]
id = 22
depth = 5
kind = "speaker"
speaker = "Mac"
text = "Melee combat tutor added a ring of life function and the armour salesman at the Ranging guild added a magnet and undead chicken thing."
parent = 19

[[nodes]]
id = 23
depth = 5
kind = "speaker"
speaker = "Mac"
text = "Brother Jered attached a holy wrench and Wizard Sinina enchanted the cape so I can change me spellbook."
parent = 19

[[nodes]]
id = 24
depth = 5
kind = "speaker"
speaker = "Mac"
text = "Aubury attached all of the runecrafting tiaras, an estate agent sold me some teleports and one of the nurses at the Emir's Arena made it give me faster hitpoints."
parent = 19

[[nodes]]
id = 25
depth = 5
kind = "speaker"
speaker = "Mac"
text = "Agility Arena guy with a Parrot pet made it lighter for me and Kaqemeex convinced the Nardah herbalist to make potions for me if I wear it and he attached a pestle and mortar, toos."
parent = 19

[[nodes]]
id = 26
depth = 5
kind = "speaker"
speaker = "Mac"
text = "Martin Thwait made the cape better for being sneaky and the Master Crafter added a teleport to his guild before Hickton attached some grapples and a crossbow."
parent = 19

[[nodes]]
id = 27
depth = 5
kind = "speaker"
speaker = "Mac"
text = "Duradel convinced all Slayer masters to give me a chance at repeating an assignment and the Hunting Expert added some useful teleports, too."
parent = 19

[[nodes]]
id = 28
depth = 5
kind = "speaker"
speaker = "Mac"
text = "A dwarf gave it a chance to give me extra ores and another dwarf made it give more experience when making gold bars and the Master Chef stopped it from burning any food."
parent = 19

[[nodes]]
