text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 259
depth = 1
kind = "speaker"
speaker = "Sharathteerk"
text = "I'm telling you, he may be close to finding it."
parent = -1

[[nodes]]
id = 260
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Enough! I don't have time to worry about fairy tales."
parent = -1

[[nodes]]
id = 261
depth = 1
kind = "speaker"
speaker = "Sharathteerk"
text = "But think of the power..."
parent = -1

[[nodes]]
id = 262
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Do you not think that I am all too aware of the power? You couldn't begin to imagine what I'd do to have it for myself! But I am also all too aware of what happens to those who try to claim it."
parent = -1

[[nodes]]
id = 263
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "If that is the fate Lucien wishes for himself, then he is welcome to it. In the meantime, we will focus on more practical endeavours. This is our last chance before the time comes to head north."
parent = -1

[[nodes]]
id = 264
depth = 1
kind = "speaker"
speaker = "Sharathteerk"
text = "Your forces are ready, Zemouregal."
parent = -1

[[nodes]]
id = 265
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Then let us waste no more time. Begin the final preparations."
parent = -1

[[nodes]]
id = 266
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Soon, the Mahjarrat will hold dominion over these lands once more. Varrock will be mine. Arrav cannot save his people this time. He can only watch as he himself seals their fate!"
parent = -1

[[nodes]]
id = 267
depth = 1
kind = "speaker"
speaker = "Player"
text = "This isn't good. I'd better get to Varrock right away!"
parent = -1

