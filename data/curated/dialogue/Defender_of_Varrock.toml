speaker = "Arrav"
text = "... too dangerous for the likes of you here."
parent = -1

[[nodes]]
id = 252
depth = 1
kind = "speaker"
speaker = "Player"
text = "Arrav? But how are you... Are you fighting Zemouregal's control?"
parent = -1

[[nodes]]
id = 253
depth = 1
kind = "speaker"
speaker = "Arrav"
text = "My body is... under his control. I can sometimes manage to speak when Zemouregal's concentration is elsewhere, but even then, it's... painful. My mind, however... gahh..."
parent = -1

[[nodes]]
id = 254
depth = 1
kind = "speaker"
speaker = "Arrav"
text = "... is still intact. He left it that way. He wanted me to feel the horror when I... urgh..."
parent = -1

[[nodes]]
id = 255
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm so sorry, Arrav. There must be some way I can help you. What can I do?"
parent = -1

[[nodes]]
id = 256
depth = 1
kind = "speaker"
speaker = "Arrav"
text = "My heart... He has it. That's how he... how he... arrgh..."
parent = -1

[[nodes]]
id = 257
depth = 1
kind = "speaker"
speaker = "Arrav"
text = "I'm sorry, he calls to me. I must go. Please, leave... Leave before you..."
parent = -1

[[nodes]]
