[[nodes]]
id = 25
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "It's nothing much, but apparently one of the patrons in here was ranting and raving about zombies. Most just dismissed him as having had one too many, but I'm not so sure."
parent = 23

[[nodes]]
id = 26
depth = 2
kind = "speaker"
speaker = "Player"
text = "How come?"
parent = 23

[[nodes]]
id = 27
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Varrock has an interesting history when it comes to zombies. Tell me, what do you know of Arrav?"
parent = 23

[[nodes]]
id = 28
depth = 2
kind = "speaker"
speaker = "Player"
text = "Arrav? As in the Shield of Arrav? I was the one who helped return it to the museum."
parent = 23

[[nodes]]
id = 29
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Ah, I heard about that. Excellent work! You may well know then that the former owner of that shield, Arrav himself, once defended Varrock against a zombie invasion led by a Mahjarrat named Zemouregal."
parent = 23

[[nodes]]
id = 30
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Arrav sacrificed himself to save his city, but Zemouregal survived."
parent = 23

[[nodes]]
id = 31
depth = 2
kind = "speaker"
speaker = "Player"
text = "And you think these zombie sightings mean he's returned?"
parent = 23

[[nodes]]
id = 32
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Apparently the zombies were seen forming ranks. Zombies don't naturally organise themselves, so someone must be organising them. I can think of worse candidates than Zemouregal."
parent = 23

[[nodes]]
id = 33
depth = 2
kind = "speaker"
speaker = "Player"
text = "I can see why you think this is worth looking into. Where do we start?"
parent = 23

[[nodes]]
id = 34
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Zombies are not particularly light on their feet, so my hope is we can pick up their trail. The sightings were apparently right outside the inn."
parent = 23

[[nodes]]
id = 35
depth = 2
kind = "speaker"
speaker = "Player"
text = "Follow the tracks and see where they came from. Good plan."
parent = 23

[[nodes]]
id = 36
