speaker = "Elias White"
text = "Ah, there you are. How did things go after I left you?"
parent = -1

[[nodes]]
id = 272
depth = 1
kind = "speaker"
speaker = "Player"
text = "Not good. Zemouregal is nearly ready to begin another attack on Varrock."
parent = -1

[[nodes]]
id = 273
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Then it's just as I feared. I've already reported our discovery to Captain Rovin. Come, let's fill him in on everything else you've learnt."
parent = -1

[[nodes]]
id = 274
depth = 1
kind = "box"
text = "You head upstairs with Elias."
parent = -1

[[nodes]]
id = 275
depth = 1
kind = "speaker"
speaker = "Captain Rovin"
text = "About time, adventurer. Your companion here tells me we have a zombie army on our doorstep!"
parent = -1

[[nodes]]
id = 276
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "I'm afraid that's not all, Captain. [player name] has made some further discoveries."
parent = -1

[[nodes]]
id = 277
depth = 1
kind = "speaker"
speaker = "Player"
text = "Indeed. Zemouregal plans to have Arrav lead the zombies in an attack on Varrock, and he plans to do so very soon."
parent = -1

[[nodes]]
id = 278
depth = 1
kind = "speaker"
speaker = "Captain Rovin"
text = "Zemouregal attacking Varrock again is our greatest fear and worst nightmare. And to think he now has Arrav under his control as well... What a horrifying fate for our greatest hero."
parent = -1

[[nodes]]
id = 279
depth = 1
kind = "speaker"
speaker = "Player"
text = "There may still be hope for Arrav. While spying on Zemouregal, I came face to face with him. He may serve Zemouregal, but not willingly. His mind is still his own."
parent = -1

[[nodes]]
id = 280
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "A zombie with his mind intact... Most zombies are mere husks, their souls having long departed their bodies. For one to still be sentient is highly unusual. Could it mean..."
parent = -1

[[nodes]]
id = 281
depth = 1
kind = "speaker"
speaker = "Player"
text = "What?"
parent = -1

[[nodes]]
id = 282
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Oh, nothing to worry about now. Still, we may be able to work with this. What did Arrav have to say to you?"
parent = -1

[[nodes]]
id = 283
depth = 1
kind = "speaker"
speaker = "Player"
text = "He told me that Zemouregal has his heart."
parent = -1

[[nodes]]
id = 284
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "His heart? Interesting... Could that be how Zemouregal is controlling him?"
parent = -1

[[nodes]]
id = 285
depth = 1
kind = "speaker"
speaker = "Captain Rovin"
text = "What are you saying? Does this mean we might be able to save Arrav?"
parent = -1

[[nodes]]
id = 286
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "In the long term, potentially. But this will require a fair amount of research. Something I fear we have little time for right now."
parent = -1

[[nodes]]
id = 287
depth = 1
kind = "speaker"
speaker = "Captain Rovin"
text = "Well then what other options do we have?"
parent = -1

[[nodes]]
id = 288
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Well thanks to our good friend here, we have the very shield that was used to stop Zemouregal the first time he attacked."
parent = -1

[[nodes]]
id = 289
depth = 1
kind = "speaker"
speaker = "Captain Rovin"
text = "The Shield of Arrav? But is it really any use? Despite our attempts, we've never been able to unlock its power. Could it be that the legends were exaggerated and that it's just an ordinary shield?"
parent = -1

[[nodes]]
id = 290
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "To answer that, our best bet would likely be to seek out the creators of the shield: The Imcando Dwarves of Camdozaal."
parent = -1

[[nodes]]
id = 291
depth = 1
kind = "speaker"
speaker = "Captain Rovin"
text = "Hmm... but are the Imcando not extinct now?"
parent = -1

[[nodes]]
id = 292
depth = 1
kind = "speaker"
speaker = "Player"
text = "Not quite. There are still a few out there, including one in Camdozaal. Ramarno is his name."
parent = -1

[[nodes]]
id = 293
depth = 1
kind = "speaker"
speaker = "Captain Rovin"
text = "Well then what are we waiting for? [player name], speak to this Ramarno and seek his advice on how to use the shield to defend our city. In the meantime, we will prepare our defences."
parent = -1

