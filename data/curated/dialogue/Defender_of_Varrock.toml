speaker = "Sharathteerk"
text = "Zemouregal, this magical mist feels like it's corroding my insides. This seems like a bad idea..."
parent = -1

[[nodes]]
id = 228
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Nonsense! The mist has no side effects. Besides, it's essential for the new security system. Everyone needs to be imbued with it if they wish to pass through any doors or gates in the base."
parent = -1

[[nodes]]
id = 229
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Now, what news do you bring from the north?"
parent = -1

[[nodes]]
id = 230
depth = 1
kind = "speaker"
speaker = "Sharathteerk"
text = "Your cousin grows unusually strong. We should consider allying ourselves to him, maybe even combine forces."
parent = -1

[[nodes]]
id = 231
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Combine forces? I won't hear of it! Lucien would never enter into such an arrangement unless he were the one in control, and I have no desire to serve at his behest."
parent = -1

[[nodes]]
id = 232
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "Besides, Lucien isn't the only one with powerful resources..."
parent = -1

[[nodes]]
id = 233
depth = 1
kind = "speaker"
speaker = "Player"
text = "Is that...?"
parent = -1

[[nodes]]
id = 234
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Arrav. So the stories are true. The legendary hero of Avarrocka, now the slave of a disgusting necromancer."
parent = -1

[[nodes]]
id = 235
depth = 1
kind = "speaker"
speaker = "Zemouregal"
text = "After many long years, it is time for Arrav to take command of my zombie troops. And on that note, come, let us inspect the forces."
parent = -1

[[nodes]]
id = 236
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "I see it's just as I suspected. Zemouregal is the one responsible for our zombie gatherings. We should inform the authorities in Varrock at once."
parent = -1

[[nodes]]
id = 237
depth = 1
kind = "speaker"
speaker = "Player"
text = "What about the rest of this place? There could be more useful information to uncover here."
parent = -1

[[nodes]]
id = 238
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "True. Perhaps it would be wise for us to split up."
parent = -1

[[nodes]]
id = 239
depth = 1
kind = "speaker"
speaker = "Player"
text = "Sounds like a plan. You head to Varrock and let them know what we've found so far. I'll keep exploring."
parent = -1

[[nodes]]
id = 240
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Very well. I'll meet you in the palace once you're done. Be careful."
parent = -1

