[[nodes]]
id = 48
depth = 4
kind = "speaker"
speaker = "Player"
text = "What can you tell me about Arrav and Zemouregal?"
parent = 47

[[nodes]]
id = 49
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "It's quite the tale and I doubt I'd be able to do it justice, but I can try and give you an overview."
parent = 47

[[nodes]]
id = 50
depth = 4
kind = "speaker"
speaker = "Elias White"
text = """
Back in the Fourth Age, a group of travellers came upon an abandoned child. It is said the child was unusual for one so young. Dark eyes and a fierce countenance, yet fair hair and skin, with a kind smile.
"""
parent = 47

[[nodes]]
id = 51
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "The travellers saw this as an omen and set up camp where they found him. The camp soon grew into the town of Avarrocka, or Varrock as we now call it."
parent = 47

[[nodes]]
id = 52
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "As for the child, he grew to become a mighty hero. After defending the town from a goblin attack, he took on the name Arrav, a curse word in goblin tongue, for he had become the Curse of Goblins."
parent = 47

[[nodes]]
id = 53
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "Arrav's heroic deeds continued, until he was granted a vision of the future. He saw the Mahjarrat Zemouregal claiming Avarrocka as his own."
parent = 47

[[nodes]]
id = 54
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "Determined to stop Zemouregal in any way he could, Arrav set out to find a powerful weapon with which to best him. His journey took him to the Imcando Dwarves, who granted him a powerful shield."
parent = 47

[[nodes]]
id = 55
depth = 4
kind = "speaker"
speaker = "Player"
text = "The Shield of Arrav?"
parent = 47

[[nodes]]
id = 56
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "Exactly. With the shield in hand, Arrav returned home and faced off against Zemouregal and his zombie horde. Thanks to him, the invasion was repelled, but at the cost of Arrav's life."
parent = 47

[[nodes]]
id = 57
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "Zemouregal has not been seen since, but it is said that his last act before retreating was to claim Arrav's body, promising to turn him into an undead slave to one day return with."
parent = 47

[[nodes]]
id = 58
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "Hundreds of years have now passed, and while there are few who haven't heard of Arrav, many have forgotten Zemouregal and his promise."
parent = 47

[[nodes]]
id = 59
depth = 4
kind = "act"
text = "other"
parent = 47
is_terminal = true

[[nodes]]
