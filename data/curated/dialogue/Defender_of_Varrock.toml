[[nodes]]
id = 61
depth = 4
kind = "speaker"
speaker = "Player"
text = "So what exactly is it you're researching?"
parent = 60

[[nodes]]
id = 62
depth = 4
kind = "speaker"
speaker = "Elias White"
text = """
The Mahjarrat. It's fair to say they are quite the subject of fascination for me. Many of them once held dominion over huge parts of the world. Zamorak himself was a Mahjarrat, and he managed to achieve godhood!
"""
parent = 60

[[nodes]]
id = 63
depth = 4
kind = "speaker"
speaker = "Elias White"
text = """
But now, they've all but vanished! Most will go through their whole lives without ever seeing one, and their most common appearance these days is in the spooky stories parents use to keep their children in line.
"""
parent = 60

[[nodes]]
id = 64
depth = 4
kind = "speaker"
speaker = "Player"
text = "And that's why you're so interested in Zemouregal?"
parent = 60

[[nodes]]
id = 65
depth = 4
kind = "speaker"
speaker = "Elias White"
text = """
Indeed. An actual Mahjarrat, and a very dangerous one at that. Ancient tomes can only teach us so much. If I want to learn everything there is to know about their race, it's going to take some more hands on work.
"""
parent = 60

[[nodes]]
id = 66
depth = 4
kind = "speaker"
speaker = "Player"
text = "What about the danger?"
parent = 60

[[nodes]]
id = 67
depth = 4
kind = "speaker"
speaker = "Elias White"
text = "Well that's just all the more reason for me to be here. If Zemouregal is planning a new attack on Varrock, an expert on his race might come in quite useful."
parent = 60

