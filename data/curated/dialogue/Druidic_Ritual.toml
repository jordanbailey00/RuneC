kind = "speaker"
speaker = "Kaqemeex"
text = "I have word from Sanfew that you have been very helpful in assisting him with his preparations for the purification ritual. As promised I will now teach you the ancient arts of Herblore."
parent = -1

[[nodes]]
id = 111
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "Herblore is the skill of working with herbs and other ingredients, to make useful potions and poison."
parent = -1

[[nodes]]
id = 112
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "First you will need a vial, which can be found or made with the crafting skill."
parent = -1

[[nodes]]
id = 113
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "Then you must gather the herbs needed to make the potion you want."
parent = -1

[[nodes]]
id = 114
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "You must fill your vial with water and add the ingredients you need. There are normally 2 ingredients to each type of potion."
parent = -1

[[nodes]]
id = 115
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "Bear in mind, you must first clean each herb before you can use it."
parent = -1

[[nodes]]
id = 116
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "You may also have to grind some ingredients before you can use them. You will need a pestle and mortar in order to do this."
parent = -1

[[nodes]]
id = 117
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "Herbs can be found on the ground, and are also dropped by some monsters when you kill them."
parent = -1

[[nodes]]
id = 118
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "Let's try an example Attack potion: The first ingredient is Guam leaf; the next is Eye of Newt."
parent = -1

[[nodes]]
id = 119
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "Mix these in your water-filled vial, and you will produce an Attack potion. Drink this potion to increase your Attack level."
parent = -1

[[nodes]]
id = 120
depth = 1
kind = "speaker"
speaker = "Kaqemeex"
text = "Different potions also require different Herblore levels before you can make them."
parent = -1

