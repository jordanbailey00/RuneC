[[nodes]]
id = 52
depth = 3
kind = "speaker"
speaker = "Sir Tiffy Cashien"
text = "Besides, you passed the trials to become a Temple Knight, what? If you're good enough to join the elite, then we'd not hesitate to deputise you into the White Knights."
parent = 45

[[nodes]]
id = 53
depth = 3
