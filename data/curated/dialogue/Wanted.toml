speaker = "Player"
text = "What's wrong?"
parent = -1

[[nodes]]
id = 543
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Just give me a minute to cross reference the records in the Library. I know that I've seen readings like this before..."
parent = -1

[[nodes]]
id = 544
depth = 1
kind = "speaker"
speaker = "Savant"
text = "GAH! This is infuriating! It's on the tip of my tongue..."
parent = -1

[[nodes]]
id = 545
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, that Zamorakian mage mentioned that he had a strong magical aura, perhaps that is it?"
parent = -1

[[nodes]]
id = 546
depth = 1
kind = "speaker"
speaker = "Savant"
text = "No...no, it is something..."
parent = -1

[[nodes]]
id = 547
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Oh my! I know what it is!"
parent = -1

[[nodes]]
id = 548
depth = 1
kind = "speaker"
speaker = "Player"
text = "Savant...?"
parent = -1

[[nodes]]
id = 549
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Many years ago the Temple Knights were studying teleportation techniques, and found a strange dimension that was accessed when teleporting.."
parent = -1

[[nodes]]
id = 550
depth = 1
kind = "speaker"
speaker = "Savant"
text = """
We stopped the research as it was too dangerous to be practically useful, but our initial studies showed that we could use the entire dimension as a kind of scrying glass to see a precise point where we wished to teleport to, then teleport extremely slowly between two points.
"""
parent = -1

[[nodes]]
id = 551
depth = 1
kind = "speaker"
speaker = "Player"
text = "How is teleporting really slowly particularly useful?"
parent = -1

[[nodes]]
id = 552
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Well, basically, you are stretched so thinly between dimensions that you effectively become invisible!"
parent = -1

[[nodes]]
id = 553
depth = 1
kind = "speaker"
speaker = "Savant"
text = "From your perspective you can see three places simultaneously, and can choose to move between all three at will!"
parent = -1

[[nodes]]
id = 554
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm... not sure I follow..."
parent = -1

[[nodes]]
id = 555
depth = 1
kind = "speaker"
speaker = "Savant"
text = """
Let me give you an example: If you were in Falador castle, and wished to teleport to Varrock, then you could use this 'slow-teleport' technique to be in both places simultaneously, but invisible to anyone in either.
"""
parent = -1

[[nodes]]
id = 556
depth = 1
kind = "speaker"
speaker = "Savant"
text = "You could also move freely between the two invisibly and then choose which place you wished to end up, simply by concentrating on the location you wanted to appear in."
parent = -1

[[nodes]]
id = 557
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Needless to say, in our line of work this could come in very handy for sneaking around unobserved..."
parent = -1

[[nodes]]
id = 558
depth = 1
kind = "speaker"
speaker = "Player"
text = "But you abandoned this research? Why?"
parent = -1

[[nodes]]
id = 559
depth = 1
kind = "speaker"
speaker = "Savant"
text = "It is far too dangerous. In my example I only used two places, but in practice there is a third place involved. It is a strange, empty dimension that teleports seem to pass through."
parent = -1

[[nodes]]
id = 560
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Frankly, the human mind isn't equipped to cope with processing so much information simultaneously, and the test subjects started to display... behavioral problems..."
parent = -1

[[nodes]]
id = 561
depth = 1
kind = "speaker"
speaker = "Player"
text = "Er... That doesn't sound good..."
parent = -1

[[nodes]]
id = 562
depth = 1
kind = "speaker"
speaker = "Savant"
text = "No, it wasn't: Aggressiveness was highly increased, and there were numerous perceptual faults, hallucinations and the like."
parent = -1

[[nodes]]
id = 563
depth = 1
kind = "speaker"
speaker = "Savant"
text = "We ceased experimentation immediately, there are enough things in this world to haunt a Temple Knight, we did not see the need to create anymore."
parent = -1

[[nodes]]
id = 564
depth = 1
kind = "speaker"
speaker = "Player"
text = "But this signature you are finding is the same as this 'slow-teleport' experiment created?"
parent = -1

[[nodes]]
id = 565
depth = 1
kind = "speaker"
speaker = "Savant"
text = "No... it is not exactly the same..."
parent = -1

[[nodes]]
id = 566
depth = 1
kind = "speaker"
speaker = "Savant"
text = "But it is close enough to be a cause of concern."
parent = -1

[[nodes]]
id = 567
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Either someone else has found this strange dimension and begun their own research, and reached the same conclusions that we did..."
parent = -1

[[nodes]]
id = 568
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Or... We have had a security leak within the Temple Knights and abandoned research has been sold to our enemies!"
parent = -1

[[nodes]]
id = 569
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, I can see how that might be a cause for concern, but right now our priority is Solus, right?"
parent = -1

[[nodes]]
id = 570
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Yes [player name], you're right. But if he is using this 'slow-teleport' technique, then that means it is going to be a lot harder to catch him!"
parent = -1

[[nodes]]
id = 571
depth = 1
kind = "speaker"
speaker = "Player"
text = "Because he is invisible and in three separate places simultaneously?"
parent = -1

[[nodes]]
id = 572
depth = 1
kind = "speaker"
speaker = "Savant"
text = """
Exactly. Listen, I might be able to block his teleportation magics using your CommOrb, but I will need you to get close to him, and if we're unlucky then he will end up teleporting to the point away from you instead of appearing in front of you {{sic}}
"""
parent = -1

[[nodes]]
id = 573
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, we have nothing else to try, right? What will I have to do?"
parent = -1

[[nodes]]
id = 574
depth = 1
kind = "speaker"
speaker = "Savant"
text = "Use the 'Scan' function of your CommOrb, if he is in the vicinity it should knock him out of his 'in-between' state, and make him appear."
parent = -1

[[nodes]]
id = 575
depth = 1
kind = "speaker"
speaker = "Player"
text = "So I should try a scan here in Canifis?"
parent = -1

[[nodes]]
id = 576
depth = 1
kind = "speaker"
speaker = "Savant"
text = "That would seem best... Savant over and out."
parent = -1

