kind = "speaker"
speaker = "Sir Tiffy Cashien"
text = """
Many centuries ago, the founders of the White Knights realized that in times of crisis, a long waiting period for new Knights could be disastrous for the kingdom, so they added a clause to the founding charter that would
"""
parent = 45

[[nodes]]
id = 50
depth = 3
kind = "speaker"
speaker = "Sir Tiffy Cashien"
text = "allow any citizen who has performed an act in the name of the White Knight to become deputised on a purely temporary basis to a full-fledged White Knight."
parent = 45

[[nodes]]
id = 51
depth = 3
kind = "speaker"
speaker = "Sir Tiffy Cashien"
text = "Well now, your actions in the Black Knights' Fortress on behalf of the White Knights make you eligible to be deputised."
