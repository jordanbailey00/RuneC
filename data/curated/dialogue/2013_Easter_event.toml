depth = 1
kind = "speaker"
speaker = "Easter Bunny"
text = "Oh, [player name], won't you help me? I need someone to gather all the chocolate kebbits up and grind them into chunks. Everything is set up to do it, I just need a kind, helpful person to do the job."
