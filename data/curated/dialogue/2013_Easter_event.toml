[[nodes]]
id = 4
depth = 1
kind = "speaker"
speaker = "Easter Bunny"
text = "Well, that went horribly wrong. So this year, I thought to myself, Harvey, how are you going to deliver goodies to all the kids?"
parent = -1

[[nodes]]
id = 5
depth = 1
kind = "speaker"
speaker = "Easter Bunny"
text = "And then I hit on it. I ordered a batch of chocolate rabbits from Diango. But these weren't ordinary chocolate rabbits, these were enchanted so they would deliver themselves."
parent = -1

[[nodes]]
id = 6
depth = 1
kind = "speaker"
speaker = "Player"
text = "It sounds like a good idea."
parent = -1

[[nodes]]
id = 7
depth = 1
kind = "speaker"
speaker = "Easter Bunny"
text = "It was! But Diango got befuddled and sent me a crate of enchanted chocolate KEBBITS. I was so shocked when I opened the crate - they all hopped out and got loose in the warren."
parent = -1

[[nodes]]
