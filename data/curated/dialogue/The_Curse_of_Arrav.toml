speaker = "Elias White"
text = "Well, no great heist is complete without the use of a crossbow and a grappling hook."
parent = -1

[[nodes]]
id = 204
depth = 1
kind = "speaker"
speaker = "Player"
text = "Okay, so to summarise, I need some sort of insulated protection along with a crossbow and grappling hook?"
parent = -1

[[nodes]]
