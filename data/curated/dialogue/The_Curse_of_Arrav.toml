[[nodes]]
id = 188
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "It seems that the inner section of Zemouregal's Base has state of the art security. The corridor into the area is filled to the brim with human detection spells. These will set off an alarm."
parent = -1

[[nodes]]
id = 189
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Now, there is a sewage system running under some parts of the base that can be accessed from the nearby kitchen."
parent = -1

[[nodes]]
id = 190
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "These sewers could be used to bypass the spells. However, surges of energy are periodically sent through the water there."
parent = -1

[[nodes]]
id = 191
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "On the other side of the spells the vault door is found. This door is guarded by zombies. If they see an intruder, they will set off the alarm."
parent = -1

[[nodes]]
id = 192
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "If the alarm is sounded, a gas will be released, incapacitating all living things in the area."
parent = -1

[[nodes]]
id = 193
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "The vault door is made of five-inch thick runite-enforced steel, with a four digit access code. When the code is entered incorrectly more than twice, the alarm will be set off."
parent = -1

[[nodes]]
id = 194
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Inside the vault there is a criss-cross of special fire ray enchantments that Zemouregal has made. Touching any of these will do significant damage and set off the alarm."
parent = -1

[[nodes]]
id = 195
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Finally, at the back of the vault, we have the pedestal holding Arrav's heart."
parent = -1

[[nodes]]
id = 196
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, that sounds an awful lot to get past. It sounds like an impossible mission!"
parent = -1

[[nodes]]
id = 197
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "It does appear to pose somewhat of a challenge, but if we engage in a bit of cunning, it may not be as impossible as you might think."
parent = -1

[[nodes]]
id = 198
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "First of all, we're going to need a distraction to lure some of those zombies out. I have no doubt that I'll be able to act as suitable bait. While I do that, you'll need to get through those sewers."
parent = -1

[[nodes]]
id = 199
depth = 1
kind = "speaker"
speaker = "Player"
text = "But what about the energy surges? I don't really fancy getting fried!"
parent = -1

[[nodes]]
id = 200
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Understandable. I would suggest you invest in some kind of insulation to protect yourself from the surges."
parent = -1

[[nodes]]
id = 201
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Now, provided my distraction works, you should find the area on the other side of the sewers free of zombies. That will give you the time and space needed to get that vault door open."
parent = -1

[[nodes]]
id = 202
depth = 1
kind = "speaker"
speaker = "Player"
text = "And then the fire rays?"
parent = -1

[[nodes]]
id = 203
