[[nodes]]
id = 263
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "It is, and I apologise if you feel I have deceived you. My past with the Mahjarrat, and especially with Zemouregal is... complicated. Again, I would prefer we not discuss this further."
parent = -1

[[nodes]]
id = 264
depth = 1
kind = "speaker"
speaker = "Elias White"
text = "Now, why don't we instead focus this conversation on something far more positive than my history. We have successfully recovered Arrav's heart!"
