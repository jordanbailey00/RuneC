[[nodes]]
id = 22
depth = 2
kind = "speaker"
speaker = "Player"
text = "Sounds like a job for me! What do you need?"
parent = 21

[[nodes]]
id = 23
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Well, without getting bogged down in all the details, my research led me to some information on a rare and unusual form of necromancy that was once practiced in these lands."
parent = 21

[[nodes]]
id = 24
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "The key element of the process involved the removal and preservation of the heart, much in the same way that the priests of Icthlarin do so during their burial ceremonies."
parent = 21

[[nodes]]
id = 25
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "The key difference: The process is performed while the victim is still alive!"
parent = 21

[[nodes]]
id = 26
depth = 2
kind = "speaker"
speaker = "Player"
text = "That's horrible!"
parent = 21

[[nodes]]
id = 27
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Indeed. I have encountered many forms of dark magic in my time, but I must confess, few have filled me with the same anger that I felt upon discovering this vile form of necromancy."
parent = 21

[[nodes]]
id = 28
depth = 2
kind = "speaker"
speaker = "Player"
text = "And you think this is what happened to Arrav?"
parent = 21

[[nodes]]
id = 29
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Almost certainly. The end result of the process is an undead slave, bound to whoever possess their still-beating heart."
parent = 21

[[nodes]]
id = 30
depth = 2
kind = "speaker"
speaker = "Elias White"
text = """
The victim must do whatever they are commanded, but unlike most other forms of necromancy, their mind, and indeed their very soul, remains intact. It all perfectly matches what you encountered with Arrav.
"""
parent = 21

[[nodes]]
id = 31
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Now thankfully, as horrible as all this is, I believe this is a way for us to break Zemouregal's control over Arrav. To do so, we must recover Arrav's heart."
parent = 21

[[nodes]]
id = 32
depth = 2
kind = "speaker"
speaker = "Player"
text = "But what does that have to do with the mastaba?"
parent = 21

[[nodes]]
id = 33
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "If we are to recover the heart, we will need a way to not only keep it preserved, but to keep it beating as well."
parent = 21

[[nodes]]
id = 34
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Zemouregal must have a way of doing this, but I have a feeling he won't be willing to share the details on how."
parent = 21

[[nodes]]
id = 35
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "My hope is the mastaba contains the answers we need. It was built to house a Pharaoh who ruled the desert thousands of years ago."
parent = 21

[[nodes]]
id = 36
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "She was known for many feats, with one of them being her work in saving the victims of a Mahjarrat necromancer."
parent = 21

[[nodes]]
id = 37
depth = 2
kind = "speaker"
speaker = "Player"
text = "Ah, I see. Well, if there's any information on heart preservation in there, I'm sure I can find it."
parent = 21

[[nodes]]
id = 38
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "I have no doubt you can. While you work on that, I will get started on our next issue: Finding where Zemouregal is keeping Arrav's heart. Hopefully I'll have something by the time you're done."
parent = 21

[[nodes]]
id = 39
depth = 2
kind = "speaker"
speaker = "Elias White"
text = """
Oh, and a word of warning. When I was asking around about the mastaba, I was told about a group of... well they apparently called themselves explorers. They entered the mastaba, but never came back out.
"""
parent = 21

[[nodes]]
id = 40
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "I'd say it's safe to assume that there are some sort of defensive measures in place to deter any would-be grave robbers."
parent = 21

[[nodes]]
id = 41
depth = 2
kind = "speaker"
speaker = "Player"
text = "Thanks for the heads up. I'll be careful."
parent = 21

[[nodes]]
id = 42
depth = 2
kind = "speaker"
speaker = "Elias White"
text = "Good luck in there. I will meet you here once you are done."
parent = 21

