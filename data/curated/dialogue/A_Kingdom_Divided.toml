[[nodes]]
id = 1210
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Hello there. I'm guessing you want to discuss the Royal Accord?"
parent = -1

[[nodes]]
id = 1211
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's right. I assume you won't have any issues supporting it, considering it was your idea?"
parent = -1

[[nodes]]
id = 1212
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "It's a messy business, but the Council has to go. That means a replacement is needed. A new Royal Accord is our best hope for a peaceful transition of power."
parent = -1

[[nodes]]
id = 1213
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Now, that said, there are some preparations I need to make before we finalise things. Perhaps you could help me with that."
parent = -1

[[nodes]]
id = 1214
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well if it gets things done faster, then I guess so."
parent = -1

[[nodes]]
id = 1215
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "As with the Royal Accord of Twill, our new accord will see power transferred to the five houses. However, only one of them will rule."
parent = -1

[[nodes]]
id = 1216
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "The Royal Accord of Twill saw each of the houses take it in turns to do this, but we may want to take a different approach this time."
parent = -1

[[nodes]]
id = 1217
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "I'm almost certain that Lord Arceuus and Lady Piscarilius will not wish to rule. Lady Lovakengj likely won't either. That leaves myself and Lord Shayzien."
parent = -1

[[nodes]]
id = 1218
depth = 1
kind = "speaker"
speaker = "Player"
text = "And would you be willing to take on that role?"
parent = -1

[[nodes]]
id = 1219
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Well, that's where my preparations come in. While I can't say I'm too keen on ruling Kourend, I'm not sure if Lord Shayzien is the right man for the job either."
parent = -1

[[nodes]]
id = 1220
depth = 1
kind = "speaker"
speaker = "Player"
text = "How come?"
parent = -1

[[nodes]]
id = 1221
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Take a look through the pages of Kourend's history and you'll soon see that soldiers do not make for good rulers."
parent = -1

[[nodes]]
id = 1222
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "As such, before any final decision is made, there's something I'd like to look into when it comes to Lord Shayzien."
parent = -1

[[nodes]]
id = 1223
depth = 1
kind = "speaker"
speaker = "Player"
text = "What is it?"
parent = -1

[[nodes]]
id = 1224
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "As you probably won't be too surprised to hear, I have people who keep a close eye on things around Kourend. They let me know of any interesting occurrences that could impact Hosidius."
parent = -1

[[nodes]]
id = 1225
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Not too long ago, I was informed that Lord Shayzien went for a private walk in the Kourend Woodland. While there, he stopped off at a small Barbarian Camp."
parent = -1

[[nodes]]
id = 1226
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's an interesting place for him to visit."
parent = -1

[[nodes]]
id = 1227
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "It is. I'm sure it's nothing to worry about, but I'd like to be sure before we make any big decisions."
parent = -1

[[nodes]]
id = 1228
depth = 1
kind = "speaker"
speaker = "Player"
text = "Okay. I can go and take a look around this camp."
parent = -1

[[nodes]]
id = 1229
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "That would be appreciated. It's directly south of here in the Kourend Woodland."
parent = -1

[[nodes]]
id = 1230
depth = 1
kind = "speaker"
speaker = "Player"
text = "Alright. I'll let you know if I find anything."
parent = -1

