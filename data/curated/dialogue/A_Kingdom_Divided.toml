[[nodes]]
id = 603
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "Never underestimate a child, my friend. I remember a gang of thieves a few years back that used them heavily. The kids could get places the adults couldn't. No one ever suspected them either."
