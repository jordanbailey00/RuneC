[[nodes]]
id = 1816
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "But Lord Shayzien? He seemed like a perfect candidate, but he didn't even want to be considered. What happened?"
parent = -1

[[nodes]]
id = 1817
depth = 1
kind = "speaker"
speaker = "Player"
text = "I think I might have some idea, but I'm still a bit confused to be honest."
parent = -1

[[nodes]]
id = 1818
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "Well, Lord Hosidius wants to have a word with you. Perhaps he can shed some light on all of this. He's downstairs."
