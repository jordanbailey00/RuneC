speaker = "Lord Shiro Shayzien"
text = "I... I am."
parent = -1

[[nodes]]
id = 1809
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then it sounds like we have an agreement."
parent = -1

[[nodes]]
id = 1810
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "My friends, thank you for putting your trust in me. This kingdom has suffered through much of late, but now it is time for that suffering to end."
parent = -1

[[nodes]]
id = 1811
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "In honour of her sacrifice, I name this declaration Rose's Accord. With it, the Kingdom of Great Kourend will no longer be a kingdom divided."
parent = -1

[[nodes]]
id = 1812
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "I promise not to let you down."
parent = -1

