[[nodes]]
id = 606
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "The Council had them all thrown in prison, even the children. Lydia was distraught. Still, it didn't stop her joining the Royal Guard. She was always blind to the truth."
