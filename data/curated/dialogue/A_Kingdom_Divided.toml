[[nodes]]
id = 906
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "What happened?"
parent = -1

[[nodes]]
id = 907
depth = 1
kind = "speaker"
speaker = "Player"
text = "His name is Xamphur. I overheard a conversation between him and someone else. They talked about the Council, among other things."
parent = -1

[[nodes]]
id = 908
depth = 1
kind = "speaker"
speaker = "Player"
text = "The weird thing is, the person he was talking to... I think it was Veos."
parent = -1

[[nodes]]
id = 909
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "The treasure hunter?"
parent = -1

[[nodes]]
id = 910
depth = 1
kind = "speaker"
speaker = "Player"
text = "Yes. He disappeared after that earthquake, but I saw him with this mage."
parent = -1

[[nodes]]
id = 911
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "The conversation? What was it about?"
parent = -1

[[nodes]]
id = 912
depth = 1
kind = "speaker"
speaker = "Player"
text = "Xamphur called Veos, or whoever it was, his master. It sounded like he had been seeking him out for a long time."
parent = -1

[[nodes]]
id = 913
depth = 1
kind = "speaker"
speaker = "Player"
text = "They talked about the Council and the Dark Altar. I couldn't make much sense of it, but I managed to look around after they left."
parent = -1

[[nodes]]
id = 914
depth = 1
kind = "speaker"
speaker = "Player"
text = "From what I found, it seems that Xamphur worked with Councillor Andrews to manipulate the other councillors into killing the King."
parent = -1

[[nodes]]
id = 915
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "Councillor Andrews was in on it from the start? That monster."
parent = -1

[[nodes]]
id = 916
depth = 1
kind = "speaker"
speaker = "Player"
text = "It seems he always wanted the throne. Xamphur offered it to him in return for access to the Dark Altar."
parent = -1

[[nodes]]
id = 917
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "The Dark Altar? Why?"
parent = -1

[[nodes]]
id = 918
depth = 1
kind = "speaker"
speaker = "Player"
text = "Xamphur has been redirecting power from the Altar, but I don't know why. It seems his work is what caused the recent issues in Arceuus."
parent = -1

[[nodes]]
id = 919
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "The death? I heard about that."
parent = -1

[[nodes]]
id = 920
depth = 1
kind = "speaker"
speaker = "Player"
text = "Makes you wonder what else he's been responsible for."
parent = -1

[[nodes]]
id = 921
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "I'm not sure what any of this means, but it can't be good. We need to do something. But first..."
parent = -1

[[nodes]]
id = 922
depth = 1
kind = "speaker"
speaker = "Player"
text = "What?"
parent = -1

[[nodes]]
id = 923
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "Rose. What do we do with her?"
parent = -1

[[nodes]]
id = 924
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "I did some research while you were gone. Liam wasn't lying. The poison they gave her irreversibly destroyed her mind. There is no cure."
parent = -1

[[nodes]]
id = 925
depth = 1
kind = "speaker"
speaker = "Player"
text = "I suspect Xamphur won't be making her any more potions any time soon. Maybe someone in Arceuus could help?"
parent = -1

[[nodes]]
id = 926
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "Someone else could make the potions, but all they do is prolong her suffering."
parent = -1

[[nodes]]
id = 927
depth = 1
kind = "speaker"
speaker = "Player"
text = "What are you saying?"
parent = -1

[[nodes]]
id = 928
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "This is no life for anyone. The truth is, Rose died long ago. All that's left now is an empty shell."
parent = -1

[[nodes]]
id = 929
depth = 1
kind = "speaker"
speaker = "Player"
text = "Oh... I think I understand."
parent = -1

[[nodes]]
id = 930
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "I'm sorry, Rose."
parent = -1

[[nodes]]
id = 931
depth = 1
kind = "other"
text = "{{qact|A cutscene begins, with the player and Commander Fullore in front of Rose's grave.}}"
parent = -1

[[nodes]]
id = 932
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "Back when I was a girl, there was this Shayzien patrol that would go past our house each morning. Every day I would run out to wave at them as they went by."
parent = -1

[[nodes]]
id = 933
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "For as long as I can remember, I always wanted to join the army. 'Become a farmer or a chef,' my parents would say to me. 'The army isn't for you.'"
parent = -1

[[nodes]]
id = 934
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "But I knew what I wanted, and I knew nothing would stop me from getting it."
parent = -1

[[nodes]]
id = 935
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "I saw some nasty things while serving the Council. I'd always tell myself that it was necessary."
parent = -1

[[nodes]]
id = 936
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "Whenever I thought about giving up, I'd ask myself who I'd be replaced with. Even if things weren't perfect, I was in the best place to improve them."
parent = -1

[[nodes]]
id = 937
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "It was all a lie though, wasn't it? It's always been a lie."
parent = -1

[[nodes]]
id = 938
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "I've spent most of my life serving a bunch of murderers; turning away from the truth because I was so scared of being wrong."
parent = -1

[[nodes]]
id = 939
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "To think it was Martin who was right all along!"
parent = -1

[[nodes]]
id = 940
depth = 1
kind = "speaker"
speaker = "Player"
text = "We can still make this right. We can still stop the Council."
parent = -1

[[nodes]]
id = 941
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "We won't be able to do it alone. The Council still holds the power in Kourend."
parent = -1

[[nodes]]
id = 942
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm not sure if that's true. The real power is held by the five houses of Kourend. Together, they could replace the Council and take over the kingdom."
parent = -1

[[nodes]]
id = 943
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "We'd need to get them all on board."
parent = -1

[[nodes]]
id = 944
depth = 1
