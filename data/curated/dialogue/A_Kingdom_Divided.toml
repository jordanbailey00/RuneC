text = "This decision will forever change the future of Kourend. If we go forward with this, the Hosidius family will be the new royal family of Kourend."
parent = -1

[[nodes]]
id = 1804
depth = 1
kind = "speaker"
speaker = "Lady Shauna Piscarilius"
text = "Well... This isn't quite what I expected, but sure. Let the idiot have his throne. As long as the people agree."
parent = -1

[[nodes]]
id = 1805
depth = 1
kind = "speaker"
speaker = "Lady Vulcana Lovakengj"
text = "He can do it, I suppose."
parent = -1

[[nodes]]
id = 1806
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Lord Hosidius would be a fitting choice for the role, assuming no one else here is willing."
parent = -1

[[nodes]]
id = 1807
depth = 1
kind = "speaker"
speaker = "Player"
text = "Are you sure about this Lord Shayzien?"
parent = -1

[[nodes]]
id = 1808
depth = 1
