[[nodes]]
id = 1171
depth = 1
kind = "speaker"
speaker = "Player"
text = "About the Council?"
parent = -1

[[nodes]]
id = 1172
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Not exactly. That revelation is concerning and needs to be addressed. However, I fear we may be facing a much larger issue."
parent = -1

[[nodes]]
id = 1173
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "When we spoke before, you mentioned that all of this had some connection to the death in Arceuus. Tell me, does that have anything to do with the mage you mentioned?"
parent = -1

[[nodes]]
id = 1174
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's right. Xamphur was his name. I discovered his hideout in the Lizardman Temple below Molch."
parent = -1

[[nodes]]
id = 1175
depth = 1
kind = "speaker"
speaker = "Player"
text = "He was the one responsible for the device that was redirecting power from the Dark Altar, but I'm not totally sure what he was using the power for. That recent earthquake was also involved somehow."
parent = -1

[[nodes]]
id = 1176
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "I see. And did this Xamphur look similar to an Arceuus citizen?"
parent = -1

[[nodes]]
id = 1177
depth = 1
kind = "speaker"
speaker = "Player"
text = "He did. How did you know that?"
parent = -1

[[nodes]]
id = 1178
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Xamphur is not a common name, and yet it is one I have heard before. During the Age of Strife, Xeric himself was assisted by a loyal servant of that same name."
parent = -1

[[nodes]]
id = 1179
depth = 1
kind = "speaker"
speaker = "Player"
text = "You don't think it's the same person do you?"
parent = -1

[[nodes]]
id = 1180
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Once, we would never have considered it. However, a recent discovery you made yourself means it's a very real possibility."
parent = -1

[[nodes]]
id = 1181
depth = 1
kind = "speaker"
speaker = "Player"
text = "The altar at Quidamortem."
parent = -1

[[nodes]]
id = 1182
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Yes. Thanks to that altar, Xeric and his followers had access to the same power that keeps every citizen of Arceuus alive."
parent = -1

[[nodes]]
id = 1183
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "With that power, they may well have lived much longer than originally believed. It's possible one of them even lives to this day."
parent = -1

[[nodes]]
id = 1184
depth = 1
kind = "speaker"
speaker = "Player"
text = "There's something else as well. When I found Xamphur, he wasn't alone. I think the other person was Veos. The weird thing is, Xamphur spoke as if Veos was his master."
parent = -1

[[nodes]]
id = 1185
depth = 1
kind = "speaker"
speaker = "Player"
text = "This isn't exactly the first odd occurrence when it comes to Veos either. A while back I helped him with some strange client of his."
parent = -1

[[nodes]]
id = 1186
depth = 1
kind = "speaker"
speaker = "Player"
text = "When we were done, this client spoke through Veos himself. The things he said were... strange."
parent = -1

[[nodes]]
id = 1187
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Hmm. This is interesting and concerning. Perhaps this client is the one Xamphur considers his master."
parent = -1

[[nodes]]
id = 1188
depth = 1
kind = "speaker"
speaker = "Player"
text = "But if Veos' client is Xamphur's master, and if Xamphur once served Xeric, could that mean..."
parent = -1

[[nodes]]
id = 1189
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Be careful, friend. Empty speculation will be of little help to us here."
parent = -1

[[nodes]]
id = 1190
depth = 1
kind = "speaker"
speaker = "Player"
text = "But surely it's an option we should consider?"
parent = -1

[[nodes]]
id = 1191
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Of course. However, if you consider one option too closely, you'll become blind to all other possibilities. What we need here is proof."
parent = -1

[[nodes]]
id = 1192
depth = 1
kind = "speaker"
speaker = "Player"
text = "And how do we get that?"
parent = -1

[[nodes]]
id = 1193
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "My friend, I must ask that you once again to pay a visit to the Tasakaal at Mount Karuulm. With their power, they will be able to determine if this Xamphur is the same one that served Xeric."
parent = -1

[[nodes]]
id = 1194
depth = 1
kind = "speaker"
speaker = "Player"
text = "How?"
parent = -1

[[nodes]]
id = 1195
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "The power of the Dark Altar leaves traces. If Xamphur's soul inhabits a body created using the Dark Altar, the Tasakaal will be able to determine when that body was formed."
parent = -1

[[nodes]]
id = 1196
depth = 1
kind = "speaker"
speaker = "Player"
text = "Would they not need his body for that?"
parent = -1

[[nodes]]
id = 1197
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Ideally, but I suspect this will also work."
parent = -1

[[nodes]]
id = 1198
depth = 1
kind = "box"
text = "Lord Arceuus shows you the broken device that was redirecting power from the Dark Altar."
parent = -1

[[nodes]]
id = 1199
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Since you destroyed it, we've been researching this device to try and determine the origin. Thanks to you, we now know that it was made by Xamphur."
parent = -1

[[nodes]]
id = 1200
depth = 1
kind = "speaker"
speaker = "Player"
text = "Alright, I'll take the device to the Tasakaal and see what they can do with it. However, I also need to ask for your support with this new Royal Accord."
parent = -1

[[nodes]]
id = 1201
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "The Council must be removed and a replacement is needed. I will gladly support the new Royal Accord. But first, we must focus on Xamphur."
parent = -1

[[nodes]]
id = 1202
depth = 1
kind = "box"
text = "Lord Arceuus gives you the broken device."
parent = -1

[[nodes]]
id = 1203
depth = 1
kind = "speaker"
speaker = "Player"
text = "Okay. I'll be back once I've discovered something from the Tasakaal."
parent = -1

