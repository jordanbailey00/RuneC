speaker = "Player"
text = "Leave that with me."
parent = -1

[[nodes]]
id = 945
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "Alright, you gather the five leaders. Convince them to meet us at Xeric's Lookout, south east of Shayzien."
