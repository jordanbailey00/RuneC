speaker = "Player"
text = "Consider it done."
parent = -1

[[nodes]]
id = 948
depth = 1
kind = "speaker"
speaker = "Commander Fullore"
text = "It feels wrong, her being out here. She should have had a proper funeral."
parent = -1

[[nodes]]
id = 949
depth = 1
kind = "speaker"
speaker = "Player"
text = "It's not so bad. It's nice and peaceful. She's finally free from the drama of Kourend."
parent = -1

[[nodes]]
