[[nodes]]
id = 604
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "They were such a problem that the Council had to get Lord Shayzien to send some soldiers in to deal with them. Lydia was one of them. This was before she joined the Royal Guard."
