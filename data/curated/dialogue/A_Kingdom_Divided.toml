[[nodes]]
id = 848
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "...actually quite surprised. I thought you of all people would have made more of an effort to find me."
parent = -1

[[nodes]]
id = 849
depth = 1
kind = "speaker"
speaker = "Second Mysterious Voice"
text = "Your greatest achievement was my downfall, my lord. The lizardmen blamed me for your disappearance and sealed me away. I was trapped for centuries."
parent = -1

[[nodes]]
id = 850
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "And yet, here you are."
parent = -1

[[nodes]]
id = 851
depth = 1
kind = "speaker"
speaker = "Second Mysterious Voice"
text = "I managed to convince their shamans I was on their side. They set me free. I have been trying to find you ever since."
parent = -1

[[nodes]]
id = 852
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "Except you were beaten by a treasure hunter."
parent = -1

[[nodes]]
id = 853
depth = 1
kind = "speaker"
speaker = "Second Mysterious Voice"
text = "With humble respect, my lord, this treasure hunter is not the one to thank."
parent = -1

[[nodes]]
id = 854
depth = 1
kind = "speaker"
speaker = "Second Mysterious Voice"
text = "It was me. I was the one who worked out how to find you. I planted the seeds that eventually led him to you."
parent = -1

[[nodes]]
id = 855
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "A proxy? Interesting. I wouldn't have thought you would be one to hide away."
parent = -1

[[nodes]]
id = 856
depth = 1
kind = "speaker"
speaker = "Second Mysterious Voice"
text = "The world has changed. Working from the shadows has served me well. And now it has reunited us once more."
parent = -1

[[nodes]]
id = 857
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "Yes, the earthquake. That was a considerable amount of dark energy. Something I could not ignore. But to what end?"
parent = -1

[[nodes]]
id = 858
depth = 1
kind = "speaker"
speaker = "Second Mysterious Voice"
text = "The same end as always, my lord. Quidamortem has been lost to us, but there are other ways to harness the Dark Altar."
parent = -1

[[nodes]]
id = 859
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "I see. And tell me, what of this Council that now rules Kourend? I sense your work at play there."
parent = -1

[[nodes]]
id = 860
depth = 1
kind = "speaker"
speaker = "Second Mysterious Voice"
text = "I needed access to the Altar. They were a means to an end."
parent = -1

[[nodes]]
id = 861
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "You installed some puppet rulers just to access the Altar? My my, Xamphur, you haven't lost your ambition."
parent = -1

[[nodes]]
id = 862
depth = 1
kind = "speaker"
speaker = "Xamphur"
text = "Never, my lord. I also hoped that access to Kourend would have further uses, but I fear the Council is done."
parent = -1

[[nodes]]
id = 863
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "From what I hear, you are likely right. No matter, though. Kourend is of limited use to us."
parent = -1

[[nodes]]
id = 864
depth = 1
kind = "speaker"
speaker = "Xamphur"
text = "My lord?"
parent = -1

[[nodes]]
id = 865
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "That kingdom was always a means to an end. A disappointing necessity while we were still shackled."
parent = -1

[[nodes]]
id = 866
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "But now, those shackles are gone. I have discovered a new way to achieve our goals, and this time, none will stand in our way."
parent = -1

[[nodes]]
id = 867
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "Now, we have much time to make up. Unfortunate, but bearable. Soon time will be of little meaning to us."
parent = -1

[[nodes]]
id = 868
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "Ah, but on that note, it seems this conversation is at an end, for we are no longer alone."
parent = -1

[[nodes]]
id = 869
depth = 1
kind = "speaker"
speaker = "First Mysterious Voice"
text = "Deal with your guest Xamphur. We will meet again in the south."
parent = -1

[[nodes]]
id = 870
