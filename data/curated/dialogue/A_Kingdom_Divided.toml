[[nodes]]
id = 1821
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Hello there. No doubt you have questions about what just occurred."
parent = -1

[[nodes]]
id = 1822
depth = 1
kind = "speaker"
speaker = "Player"
text = "You can say that again!"
parent = -1

[[nodes]]
id = 1823
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "I'm sorry for keeping you in the dark, my friend. It wasn't anything against you. I just couldn't afford to take any risks."
parent = -1

[[nodes]]
id = 1824
depth = 1
kind = "speaker"
speaker = "Player"
text = "You planned this all along, didn't you? That's why you kept the Royal Accord of Twill."
parent = -1

[[nodes]]
id = 1825
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "It was inevitable that one day the Council would fall. Their rule has always been fragile."
parent = -1

[[nodes]]
id = 1826
depth = 1
kind = "speaker"
speaker = "Player"
text = "So you made sure that you'd be the one to replace them."
parent = -1

[[nodes]]
id = 1827
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "It gives me no pleasure, but this was needed for the safety of all of Kourend. Apart from Lord Shayzien, the other rulers had no interest in the throne. It was always going to be him or me."
parent = -1

[[nodes]]
id = 1828
depth = 1
kind = "speaker"
speaker = "Player"
text = "And you didn't want it to be him?"
parent = -1

[[nodes]]
id = 1829
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "It was for the safety of Kourend. Lord Shayzien has a good military mind, but he is no ruler. After all, you saw what he did with Phileas."
parent = -1

[[nodes]]
id = 1830
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "To Lord Shayzien, family name is everything. Above all else, he craves glory for himself and his house. Under him, war would have been inevitable."
parent = -1

[[nodes]]
id = 1831
depth = 1
kind = "speaker"
speaker = "Player"
text = "War with who?"
parent = -1

[[nodes]]
id = 1832
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Varlamore, the kingdom to the south. Our two kingdoms were in conflict less than a hundred years ago, and relations remain sour. It would take very little for that conflict to be reignited."
parent = -1

[[nodes]]
id = 1833
depth = 1
kind = "speaker"
speaker = "Player"
text = "You really think Lord Shayzien would have declared war?"
parent = -1

[[nodes]]
id = 1834
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "I can't say for sure, but it was a risk I did not intend to take."
parent = -1

[[nodes]]
id = 1835
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. So how did you do it?"
parent = -1

[[nodes]]
id = 1836
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "A while ago, I managed to acquire the old journal of King Shayzien VII. I knew that I could use it to discredit Lord Shayzien and his family, so I made some arrangements."
parent = -1

[[nodes]]
id = 1837
depth = 1
kind = "speaker"
speaker = "Player"
text = "Phileas' mystery parcel! That was you? You acted like you didn't even know him earlier!"
parent = -1

[[nodes]]
id = 1838
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Apologies for the misdirection. It was indeed me who sent that parcel."
parent = -1

[[nodes]]
id = 1839
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Had I revealed the contents of the journal myself, I would likely have just been dismissed as trying to create a rift between our two houses. Phileas was the perfect third party."
parent = -1

[[nodes]]
id = 1840
depth = 1
kind = "speaker"
speaker = "Player"
text = "But then Lord Shayzien had Phileas captured before he could reveal too much. This is all starting to make sense. You know, he actually blamed you for that!"
parent = -1

[[nodes]]
id = 1841
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = """
Phileas' disappearance was an interesting twist. I hadn't expected something like that. Still, it actually made things even easier in the end. Once Phileas was safe, I told Lord Shayzien and gave him a choice.
"""
parent = -1

[[nodes]]
id = 1842
depth = 1
kind = "speaker"
speaker = "Player"
text = "Oh I see. You let him pick between supporting you or being exposed."
parent = -1

[[nodes]]
id = 1843
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Exactly. The truth about Phileas would have lost him the support of his people and ruined his reputation."
parent = -1

[[nodes]]
id = 1844
depth = 1
kind = "speaker"
speaker = "Player"
text = "So in the end, you never actually needed to discredit him at all. What about the journal? Lord Shayzien sent me to steal it from you, but surely he already had it."
parent = -1

[[nodes]]
id = 1845
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "I didn't want to risk losing the real journal. The one I sent to Phileas was a copy, with many bits removed. While I covered my tracks well, Lord Shayzien must have worked out I was involved."
parent = -1

[[nodes]]
id = 1846
depth = 1
kind = "speaker"
speaker = "Player"
text = "And he sent me to recover the real journal."
parent = -1

[[nodes]]
id = 1847
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Yes. Unfortunately for him, the one you stole was a fake. The real one is somewhere much safer."
parent = -1

[[nodes]]
id = 1848
depth = 1
kind = "speaker"
speaker = "Player"
text = "You really thought of everything didn't you? How about the Accord? That was essential to your plans. I'm guessing it was no accident that Artur found it."
parent = -1

[[nodes]]
id = 1849
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "I can't take too much credit from Artur there. He did do most of the work himself. I'd been looking into the Accord for a while when Artur found my research."
parent = -1

[[nodes]]
id = 1850
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "When he went missing, I feared the worst. It was a nice surprise when you not only brought him back, but the Accord as well."
parent = -1

[[nodes]]
id = 1851
depth = 1
kind = "speaker"
speaker = "Player"
text = "This is a lot to take in. I don't know if I like any of it."
parent = -1

[[nodes]]
id = 1852
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Nor do I like it myself. However, when it comes to politics, there are no perfect options. Instead, all we can do is pick the best option we have."
parent = -1

[[nodes]]
id = 1853
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Anyway, we will have plenty of time to discuss this later. For now, the Council needs to be dealt with. You should speak with Commander Fullore."
parent = -1

