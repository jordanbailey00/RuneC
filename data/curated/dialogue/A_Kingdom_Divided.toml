[[nodes]]
id = 1486
depth = 1
kind = "speaker"
speaker = "Player"
text = "The thing I was helping Phileas with involved a mysterious parcel he'd received. The parcel contained King Shayzien VII's journal. When Phileas was captured, it was taken by the barbarians."
parent = -1

[[nodes]]
id = 1487
depth = 1
kind = "speaker"
speaker = "Player"
text = "Before that happened, I followed some clues in the journal. They eventually led me to the discovery that King Shayzien VII may have been responsible for the creation of the lizardmen."
parent = -1

[[nodes]]
id = 1488
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Ah, the discovery at Quidamortem. This is all starting to make sense. It's long been believed that King Shayzien VII eventually became Xeric. That discovery did little to suggest otherwise."
parent = -1

[[nodes]]
id = 1489
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Lord Shayzien wouldn't have been too happy of further evidence that Xeric was part of his family. He must have made arrangements to hide as much of that evidence as possible."
parent = -1

[[nodes]]
id = 1490
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "Thank you, friend. I think we have all the information we need. I'll have some of my people head to this camp. They'll ensure Phileas is safe."
parent = -1

[[nodes]]
id = 1491
depth = 1
kind = "speaker"
speaker = "Lord Kandur Hosidius"
text = "It's probably best he disappear for a while, for his own safety. I'll make the arrangements."
