[[nodes]]
id = 3
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "Now there's a question! I have a better one. What's right with the Council?"
parent = -1

[[nodes]]
id = 4
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "I bet you didn't know that the Council was originally only temporary. After the last King died, they were only supposed to rule until his daughter came of age."
parent = -1

[[nodes]]
id = 5
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "However, according to the Council, the King's daughter went mad. Such a wonderful convenience for them of course. With her out of the picture, the Council became permanent."
parent = -1

[[nodes]]
id = 6
depth = 1
kind = "speaker"
speaker = "Player"
text = "Interesting. What else don't you like about the Council?"
parent = -1

[[nodes]]
id = 7
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "Democracy! That's meant to be the big thing for the Council. Funny thing is, although they're meant to be elected by the people, the same four people have won every single election. Little odd, no?"
parent = -1

[[nodes]]
