[[nodes]]
id = 474
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "He was ever so noble. Something eating away at his conscience, no doubt. He wanted the money to go towards improved education in Port Piscarilius. He felt it would help with the crime levels there."
parent = -1

[[nodes]]
id = 475
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "That was of course a big no-go for the Council. Helping the people? No chance! Instead, they used only a small amount for that. They spent the rest on castle renovations."
parent = -1

[[nodes]]
id = 476
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "They claimed the increase in castle tourism would make more money in the long run. A load of tosh! I knew it was just for them."
parent = -1

[[nodes]]
id = 477
depth = 1
kind = "speaker"
speaker = "Martin Holt"
text = "I walked out that same day. Soon after, I founded Kourend's Royal Society. We've been a bane for the Council ever since."
