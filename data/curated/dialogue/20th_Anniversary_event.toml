[[nodes]]
id = 183
depth = 5
kind = "speaker"
speaker = "Gnome Child"
text = "Over time, many people have come into the world and left it again. One such is Thrander, who used to perform armour conversion services in Varrock. Another is Chuck, the wood certificate trader."
parent = 181

[[nodes]]
id = 184
depth = 5
kind = "speaker"
speaker = "Gnome Child"
text = "When their services were no longer required, they moved on, but they were not all forgotten. Some linger still in the Realm of Memories."
parent = 181

[[nodes]]
id = 185
depth = 5
kind = "speaker"
speaker = "Gnome Child"
text = "From the Realm, we watch how the world changes. We see the happy moments, the sad times, the lucky events, the dry streaks. It is a wonderful existence."
parent = 181

[[nodes]]
id = 186
depth = 5
kind = "speaker"
speaker = "Gnome Child"
text = "There are monsters there too - demons and dragons as they looked in older days. Though they are not what Grayzag hoped to summon into the world, so he has no interest in the Realm."
parent = 181

