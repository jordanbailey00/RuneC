[[nodes]]
id = 42
depth = 2
kind = "speaker"
speaker = "Wizard Grayzag"
text = "But in the past there were much bigger demons. Such as Thammaron, in the Third Age. Imagine if I could get control of something like that - that'd show Mizgog who's smart!"
parent = 39

[[nodes]]
id = 43
depth = 2
kind = "speaker"
speaker = "Wizard Grayzag"
text = "But it didn't work. Instead of inventing time travel to the Third Age of Gielinor, my portal reached something called the Realm of Memories. And instead of a mighty demon, I got this weird kid."
parent = 39

[[nodes]]
id = 44
depth = 2
kind = "speaker"
speaker = "Wizard Grayzag"
text = "He's creeping me out, standing there looking at me with that face. I need you to get the stuff he needs to reopen the portal to the Realm of Memories, so he can go away."
parent = 39

