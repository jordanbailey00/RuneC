kind = "speaker"
speaker = "Gnome Child"
text = "I am just a simple gnome. Perhaps to you I look unusual, but in my day all gnomes were green, like the trees where we live. In the Realm of Memories, the old days are remembered thus."
parent = 176

[[nodes]]
id = 179
depth = 5
kind = "speaker"
speaker = "Gnome Child"
text = "Even to this day, the Short Green Guy cocktail is so named because of this. In fact, Blurberry still instructs his apprentices not to bring him a gnome when he asks for a Short Green Guy."
