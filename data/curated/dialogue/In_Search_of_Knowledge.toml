kind = "speaker"
speaker = "Player"
text = "How did you get injured?"
parent = 31

[[nodes]]
id = 33
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "I found out about this place from Logosia in the Arceuus Library. I came to investigate but was ambushed by the spiders in the room to the north."
parent = 31

[[nodes]]
id = 34
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "I'm a scholar not a fighter. I didn't have time to think through my options so I did what came naturally and ran away."
parent = 31

[[nodes]]
id = 35
depth = 2
kind = "speaker"
speaker = "Player"
text = "Why didn't you decide to run back the way you came from instead of running further into the dungeon where there could be more dangerous creatures?"
parent = 31

[[nodes]]
id = 36
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "See, the problem with that... Is that it is an excellent idea I wish I had thought of at the time."
parent = 31

[[nodes]]
id = 37
depth = 2
kind = "speaker"
speaker = "Player"
text = "You've been trapped here for a while! No wonder you were hungry!"
parent = 31

