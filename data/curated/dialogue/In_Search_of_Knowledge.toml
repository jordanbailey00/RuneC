[[nodes]]
id = 12
depth = 1
kind = "speaker"
speaker = "Brother Aimeri"
text = "Thanks for helping me. Is there anything you'd like to know about this temple? If you find anything in here, show it to me and I'll tell you what I know about it."
parent = -1

[[nodes]]
id = 13
depth = 1
kind = "option"
text = "What is this place?"
parent = -1
children = [14, 15, 16, 17, 18, 19, 20, 21, 22]

[[nodes]]
id = 14
depth = 2
kind = "speaker"
speaker = "Player"
text = "What is this place?"
parent = 13

[[nodes]]
id = 15
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "This place probably had a name at some point but it has long since been forgotten. The Arceuus librarians refer to this place as the Forthos Dungeon."
parent = 13

[[nodes]]
id = 16
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "It is rumoured that this place used to be of religious significance to druidic followers of both Ralos and Ranul."
parent = 13

[[nodes]]
id = 17
depth = 2
kind = "speaker"
speaker = "Player"
text = "Who are Ralos and Ranul?"
parent = 13

[[nodes]]
id = 18
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "According to religious texts, Ralos is the god of the sun and Ranul, his brother, is the god of the moon."
parent = 13

[[nodes]]
id = 19
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "If you find any artifacts or relics from within this temple, I would be very interested in seeing them."
parent = 13

[[nodes]]
id = 20
depth = 2
kind = "speaker"
speaker = "Player"
text = "I'll see what I find. Although, I've never heard of Ralos and Ranul."
parent = 13

[[nodes]]
id = 21
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "You need only to look up and see their greatness above you when you return to the surface."
parent = 13

[[nodes]]
id = 22
depth = 2
kind = "act"
text = "end"
parent = 13
is_terminal = true

[[nodes]]
id = 23
depth = 1
kind = "option"
text = "Who are you?"
parent = -1
children = [24, 25, 26, 27, 28, 29, 30]

[[nodes]]
id = 24
depth = 2
kind = "speaker"
speaker = "Player"
text = "Who are you?"
parent = 23

[[nodes]]
id = 25
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "My name is Brother Aimeri, I am a travelling monk from the distant land of Varlamore on a journey to uncover the secrets of this temple."
parent = 23

[[nodes]]
id = 26
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "I worship Ralos, a common practice where I am from. However, I found out that our order may have originated from this temple. If you find anything of interest, please let me know."
parent = 23

[[nodes]]
id = 27
depth = 2
kind = "speaker"
speaker = "Player"
text = "I'll keep my eyes open."
parent = 23

[[nodes]]
id = 28
depth = 2
kind = "speaker"
speaker = "Brother Aimeri"
text = "You have my gratitude. Any information you do find would also be of interest to the Arceuus Library. I hope we can uncover the secrets of this place for the greater good."
parent = 23

[[nodes]]
id = 29
depth = 2
kind = "speaker"
speaker = "Player"
text = "The greater good."
parent = 23

[[nodes]]
id = 30
depth = 2
kind = "act"
text = "end"
parent = 23
is_terminal = true

