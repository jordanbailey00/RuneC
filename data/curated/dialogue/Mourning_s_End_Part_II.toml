[[nodes]]
id = 23
depth = 1
kind = "speaker"
speaker = "Player"
text = "I think I have found the entrance to the temple. It looks like one of the dig crews discovered it. They were killed by some strange shadows though, so the other mourners don’t know about it yet."
parent = -1

[[nodes]]
id = 24
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "This isn’t good, it will only be a matter of time before they discover the temple."
parent = -1

[[nodes]]
id = 25
depth = 1
kind = "speaker"
speaker = "Player"
text = "So what do we do?"
parent = -1

[[nodes]]
id = 26
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "I did some research while you were gone. Apparently, the temple was built with safeguards to prevent all but Seren's chosen from entering."
parent = -1

[[nodes]]
id = 27
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "If there are shadows roaming outside the temple, it means those safeguards have long since decayed. I believe we can still restore them though."
parent = -1

[[nodes]]
id = 28
depth = 1
kind = "speaker"
speaker = "Player"
text = "How?"
parent = -1

[[nodes]]
id = 29
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "The temple guards an ancient altar, one with powers over life and death. I suspect this altar is why Lord Iorwerth is so keen to access the temple."
parent = -1

[[nodes]]
id = 30
depth = 1
kind = "speaker"
speaker = "Player"
text = "You think he means to use it to summon the Dark Lord?"
parent = -1

[[nodes]]
id = 31
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Indeed. Now, the altar is also key to the safeguards on the temple. We will need to use it to restore them."
parent = -1

[[nodes]]
id = 32
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "First, I need you to return to the temple and find the crystal that is powering the safeguards. As they are no long working, I expect the crystal will be black in colour."
parent = -1

[[nodes]]
id = 33
depth = 1
kind = "speaker"
speaker = "Arianwyn"
text = "Bring me a sample of this crystal. We will then determine our next steps."
