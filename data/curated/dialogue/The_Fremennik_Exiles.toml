text = "If the player has read the letter:"
parent = 137
children = [148, 149, 150, 151, 152, 153, 154, 155, 156, 157, 158, 159, 160, 161, 162, 163, 164, 165, 166, 167, 168, 169, 170, 171, 172, 173, 174, 175, 176, 177, 178, 179, 180, 181, 182, 183, 184, 185, 186, 187, 188, 189, 190]

[[nodes]]
id = 148
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "[Fremennik name], I'm glad you've returned! This letter you have found is very worrying and requires our utmost attention."
parent = 147

[[nodes]]
id = 149
depth = 3
kind = "speaker"
speaker = "Player"
text = "I don't understand. What does the letter mean? Who is the Jormungand? And since when could basilisks read and write?"
parent = 147

[[nodes]]
id = 150
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "While they may not show it, basilisks are much smarter than they seem. Many years ago, a great basilisk army enslaved our people and took our home."
parent = 147

[[nodes]]
id = 151
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "The Jormungand, sometimes known as The Serpent King, was the leader of this army. Along with his three generals, Typhor, Vritra and Bakuna, he brought a terror to these lands unlike any other."
parent = 147

[[nodes]]
id = 152
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "If it hadn't been for the bravery of a great hero, we might never have been freed."
parent = 147

[[nodes]]
id = 153
depth = 3
kind = "speaker"
speaker = "Player"
text = "A hero?"
parent = 147

[[nodes]]
id = 154
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Yes. He was known as V. He stood up to the Serpent King and confronted him on the Island of Stone. It is said that the two of them fought for days, but in the end, V stood victorious."
parent = 147

[[nodes]]
id = 155
depth = 3
kind = "speaker"
speaker = "Player"
text = "What happened next?"
parent = 147

[[nodes]]
id = 156
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Well that depends who you ask. The bards wrote a great song about V's victory. They called it the Ballad of the Basilisk, and it claims V killed the Jormungand."
parent = 147

[[nodes]]
id = 157
depth = 3
kind = "speaker"
speaker = "Player"
text = "But..."
parent = 147

[[nodes]]
id = 158
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Well... bards are known to bend the truth a bit, especially if it makes a song sound better. In reality, V sealed the Serpent King in a magical prison on the island, where he remains to this day."
parent = 147

[[nodes]]
id = 159
depth = 3
kind = "speaker"
speaker = "Player"
text = "A magical prison? I thought the Fremennik people didn't approve of magic?"
parent = 147

[[nodes]]
id = 160
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "V was different. Stories tell of how he unlocked the potential of magic with the single touch of a stone. In that moment, he became more than just a man."
parent = 147

[[nodes]]
id = 161
depth = 3
kind = "speaker"
speaker = "Player"
text = "A god?"
parent = 147

[[nodes]]
id = 162
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "It's not a distinction the Fremennik particularly care for. To us, he has always been a hero to be respected, not a god to be worshipped. They say he felt the same way."
parent = 147

[[nodes]]
id = 163
depth = 3
kind = "speaker"
speaker = "Player"
text = "But he earned the right to use magic?"
parent = 147

[[nodes]]
id = 164
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Exactly. Now the Moon Clan on the other hand, did not earn that right. Their use of magic is an insult to our people."
parent = 147

[[nodes]]
id = 165
depth = 3
kind = "speaker"
speaker = "Player"
text = "So what can we do about the Jormungand?"
parent = 147

[[nodes]]
id = 166
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "We will stay strong, [Fremennik name]. We'll..."
parent = 147

[[nodes]]
id = 167
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "We'll be doomed!"
parent = 147

[[nodes]]
id = 168
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Our army isn't large enough to hold back the forces of the Serpent King."
parent = 147

[[nodes]]
id = 169
depth = 3
kind = "speaker"
speaker = "Player"
text = "I can help!"
parent = 147

[[nodes]]
id = 170
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "[Fremennik name], you're strong. But you're no army."
parent = 147

[[nodes]]
id = 171
depth = 3
kind = "speaker"
speaker = "Player"
text = "You're forgetting Brundt. We have the element of surprise! They don't know we're aware of their attack."
parent = 147

[[nodes]]
id = 172
depth = 3
kind = "speaker"
speaker = "Player"
text = "We could have days to prepare before they make their move. We could..."
parent = 147

[[nodes]]
