[[nodes]]
id = 309
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well that was awkward..."
parent = -1

[[nodes]]
id = 310
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Indeed. I'm sorry [Fremennik name]. The reality is that many on the council did not take kindly to you becoming one of us. They've been looking for a good excuse to exile you ever since you arrived."
parent = -1

[[nodes]]
id = 311
depth = 1
kind = "speaker"
speaker = "Player"
text = "But they're the ones that voted for me in the first place!"
parent = -1

[[nodes]]
id = 312
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Well... not quite. Seven of the twelve council members gave you their vote, but you never had the support of the other five. They're the ones who've been pushing for your exile."
parent = -1

[[nodes]]
id = 313
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. And they've used this basilisk problem to convince some of the others."
parent = -1

[[nodes]]
id = 314
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "It would seem so. Try not to judge them too harshly though, they only had what was best for the province in mind. This basilisk situation has a lot of people scared."
parent = -1

[[nodes]]
id = 315
depth = 1
kind = "speaker"
speaker = "Player"
text = "I don't understand though, they're only basilisks. Surely we have the strength to defeat them."
parent = -1

[[nodes]]
id = 316
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Ah, I see you are not familiar with the End of Things."
parent = -1

[[nodes]]
id = 317
depth = 1
kind = "speaker"
speaker = "Player"
text = "The End of Things?"
parent = -1

[[nodes]]
id = 318
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Many years ago, before the time of V, it was foretold that this world will end in a great battle. They called this battle Ragnarok, or more commonly, the End of Things."
parent = -1

[[nodes]]
id = 319
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well that doesn't sound good. Where do the basilisks fit in?"
parent = -1

[[nodes]]
id = 320
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "The prophecies say that the battle will begin after the Serpent King is freed. So you see, it is not the basilisks people fear, it is what comes after."
parent = -1

[[nodes]]
id = 321
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then we'd better make sure the Jormungand stays in that prison!"
parent = -1

[[nodes]]
id = 322
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = """
Well, [Fremennik name], that's why I asked you to meet me out here. If you are to help us put a stop to this threat, you'll need to regain the trust of the council. And I think I know just how you can do that.
"""
parent = -1

[[nodes]]
id = 323
depth = 1
kind = "speaker"
speaker = "Player"
text = "How?"
parent = -1

[[nodes]]
id = 324
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "I think the best possible way to show your worth to them is by being the person that restores V's Shield."
parent = -1

[[nodes]]
id = 325
depth = 1
kind = "speaker"
speaker = "Player"
text = "V's Shield?"
parent = -1

[[nodes]]
id = 326
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "The shield used by V when he defeated the Serpent King. It is legendary amongst our people. If we are to have any chance of stopping this threat, we will need to remake it."
parent = -1

[[nodes]]
id = 327
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "There's a few things I know about the shield, though other things are lost from stories past."
parent = -1

[[nodes]]
id = 328
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "I believe some members of the Moon Clan might know the details I don't, so your diplomatic relations should come in handy."
parent = -1

[[nodes]]
id = 329
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Keep in mind, now that you've been exiled, most people in the province will be unlikely to talk to you."
parent = -1

[[nodes]]
id = 330
depth = 1
kind = "speaker"
speaker = "Player"
text = "Fair enough. So where should I start?"
parent = -1

[[nodes]]
id = 331
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Stories tell of how V's Shield was made using four components."
parent = -1

[[nodes]]
id = 332
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "First, the base of the shield. This was a traditional Fremennik Shield, like the ones our warriors use."
parent = -1

[[nodes]]
id = 333
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Next, the Lunar Glass. This was apparently created by a great Moon Clan mystic and was used to reflect the Serpent King's gaze."
parent = -1

[[nodes]]
id = 334
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Then you have the Polishing Rock. This was needed to shine the Lunar Glass. This rock was heated softly in a boiling spring."
parent = -1

[[nodes]]
id = 335
depth = 1
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Finally, V's Sigil. This sigil was crafted by the Moon Clan, using a unique metal known only to them."
parent = -1

