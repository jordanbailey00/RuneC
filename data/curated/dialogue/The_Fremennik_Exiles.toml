kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Agnar? What is it?"
parent = 147

[[nodes]]
id = 176
depth = 3
kind = "speaker"
speaker = "Agnar"
text = "Chieftain Brundt! I'm here on behalf of the Fremennik Council! We've heard some disturbing news about a basilisk in town."
parent = 147

[[nodes]]
id = 177
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Well I won't deny there's been a little issue but [Fremennik name] and I will soon have things back under control."
parent = 147

[[nodes]]
id = 178
depth = 3
kind = "speaker"
speaker = "Agnar"
text = "[Fremennik name]? When will you see that this outerlander is the cause of all of our problems!"
parent = 147

[[nodes]]
id = 179
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "[Fremennik name] is no outerlander! [He/She] passed our trials and is a Fremennik, just like you and I."
parent = 147

[[nodes]]
id = 180
depth = 3
kind = "speaker"
speaker = "Agnar"
text = "You can disguise it all you want, but [he/she] is an outerlander and always will be! Ever since we let [him/her] in, we've had nothing but trouble!"
parent = 147

[[nodes]]
id = 181
depth = 3
kind = "speaker"
speaker = "Agnar"
text = "And to top it all off, now we have basilisks wandering our town. The council have had enough!"
parent = 147

[[nodes]]
id = 182
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "What are you saying Agnar?"
parent = 147

[[nodes]]
id = 183
depth = 3
kind = "speaker"
speaker = "Agnar"
text = "I have a declaration here signed by seven of our twelve council members. We declare this outerlander an exile!"
parent = 147

[[nodes]]
id = 184
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "This is outrageous! [Fremennik name] is one of us!"
parent = 147

[[nodes]]
id = 185
depth = 3
kind = "speaker"
speaker = "Agnar"
text = "Do not use that name! The decision of the council is final. As Chieftain, you are honour bound to enact it."
parent = 147

[[nodes]]
id = 186
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "I see..."
parent = 147

[[nodes]]
id = 187
depth = 3
kind = "speaker"
speaker = "Brundt the Chieftain"
text = "Exile, you must leave our province. Our people will no longer see you as their brother."
parent = 147

