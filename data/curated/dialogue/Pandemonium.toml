[[nodes]]
id = 274
depth = 2
kind = "speaker"
speaker = "Ribs"
text = "Despite the warnings of many, Barnacle Barnaby attempted to plunder the Skullhorde, but his only reward was a deadly curse. It destroyed the Crimson Kraken, condemning all on board to a watery grave."
