[[nodes]]
id = 276
depth = 2
kind = "speaker"
speaker = "Ribs"
text = "Aye! I purchased the map from Ulrich the Unfortunate, the sole survivor of the Kraken, but I had no intention of using it. I knew that no good would ever come from seeking the Kraken."
parent = 271

[[nodes]]
id = 277
depth = 2
kind = "speaker"
speaker = "Player"
text = "Then why not destroy the map?"
