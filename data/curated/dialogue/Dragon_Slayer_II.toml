parent = -1

[[nodes]]
id = 901
depth = 1
kind = "speaker"
speaker = "Zorgoth"
text = "Yes. He has power that no other dragon has. The power to influence the minds of other dragons. Through him, an army will be raised. One that will annihilate humanity."
