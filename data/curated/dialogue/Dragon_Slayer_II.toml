speaker = "Zorgoth"
text = "You gave her a name? I never bothered. She was nothing."
parent = -1

[[nodes]]
id = 892
depth = 1
kind = "speaker"
speaker = "Bob"
text = "Nothing? What do you mean?"
parent = -1

[[nodes]]
id = 893
depth = 1
kind = "speaker"
speaker = "Zorgoth"
text = "After your failed attempt on my life, I realised that we were starting to lose the war against your kind. We needed to turn the tide. We needed a new weapon."
parent = -1

[[nodes]]
id = 894
depth = 1
kind = "speaker"
speaker = "Zorgoth"
text = "The creature you call Elvarg was the first. An attempt to create a being which would crush humanity once and for all. She was a failure. Too weak. Pathetic."
parent = -1

[[nodes]]
id = 895
depth = 1
kind = "speaker"
speaker = "Zorgoth"
text = "We moved on. We tried various other methods, all ending in disappointment. In the end, we came here. Our largest facility yet. Here we began work on what would become our masterpiece."
parent = -1

[[nodes]]
id = 896
depth = 1
kind = "speaker"
speaker = "Bob"
text = "But we got here first."
parent = -1

[[nodes]]
id = 897
depth = 1
kind = "speaker"
speaker = "Zorgoth"
text = "An annoying setback. When you attacked, I had this place sealed, to keep our work safe. My people were to return after the attack and release me again."
parent = -1

[[nodes]]
id = 898
depth = 1
kind = "speaker"
speaker = "Bob"
text = "But we killed them before they could leave."
parent = -1

[[nodes]]
id = 899
depth = 1
kind = "speaker"
speaker = "Zorgoth"
text = """
I suspected as much. However, it turned out quite well for me in the end. I have been sealed here for hundreds of years, alone and without disturbance. More than enough time for me to perfect our salvation.
"""
parent = -1

[[nodes]]
