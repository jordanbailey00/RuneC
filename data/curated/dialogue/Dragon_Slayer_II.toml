kind = "speaker"
speaker = "Alec Kincade"
text = "Only the most worthy are allowed access into the Myths' Guild. If you wish to enter, you'll need to prove yourself."
parent = 8

[[nodes]]
id = 10
depth = 3
kind = "speaker"
speaker = "Player"
text = "How can I do that?"
parent = 8

[[nodes]]
id = 11
depth = 3
kind = "speaker"
speaker = "Alec Kincade"
text = "As time passes, that which was once fact, becomes myth. Some tales are just that, tales. However, some tales are something more."
parent = 8

[[nodes]]
id = 12
depth = 3
kind = "speaker"
speaker = "Alec Kincade"
text = "Here at the Myths' Guild, we live to tell the difference between the two. If you wish to join us, you must do the same."
parent = 8

[[nodes]]
id = 13
depth = 3
kind = "speaker"
speaker = "Player"
text = "So what myth would you like me to investigate?"
parent = 8

[[nodes]]
id = 14
depth = 3
kind = "speaker"
speaker = "Alec Kincade"
text = "For as long as history remembers, dragons have roamed these lands, but despite how long they've been here, much of their history remains hidden."
parent = 8

[[nodes]]
id = 15
depth = 3
kind = "speaker"
speaker = "Alec Kincade"
text = "There are tales of course, but tales are not enough for us. We want you to discover the truth. Where did the dragons come from? Why are they here? Who do they serve?"
parent = 8

[[nodes]]
id = 16
depth = 3
kind = "speaker"
speaker = "Alec Kincade"
text = "Answer these questions for us. Help us fill our Library of Knowledge. In return, we will grant you access to the guild and you will reap the rewards within."
parent = 8

[[nodes]]
