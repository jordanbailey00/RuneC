[[nodes]]
id = 2
depth = 2
kind = "speaker"
speaker = "Cecilia"
text = "Greetings! If you have come to gaze in rapture at the natural beauty of Falador's parkland, then I have bad news."
parent = 1

[[nodes]]
id = 3
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh no! What happened?"
parent = 1

[[nodes]]
id = 4
depth = 2
kind = "speaker"
speaker = "Cecilia"
text = "We got some impromptu visitors to the park. They came out of nowhere and made an awful mess of the place."
parent = 1

[[nodes]]
id = 5
depth = 2
kind = "speaker"
speaker = "Cecilia"
text = "They trampled the flowers, startled the ducks, dug new holes in the ground..."
parent = 1

[[nodes]]
id = 6
depth = 2
kind = "speaker"
speaker = "Player"
text = "That's terrible. Who are these hooligans?"
parent = 1

[[nodes]]
id = 7
depth = 2
kind = "speaker"
speaker = "Cecilia"
text = "That's not all! I had plans to decorate the park for Christmas, and they went and chewed some of the decorations."
parent = 1

[[nodes]]
id = 8
depth = 2
kind = "speaker"
speaker = "Player"
text = "How deplorable! Wait, did you say 'chew'? What kind of visitors are you talking about?"
parent = 1

[[nodes]]
id = 9
depth = 2
kind = "speaker"
speaker = "Cecilia"
text = "Why, they're dogs of course! I'm quite upset, yet they are so cute that I can't stay mad. We can't leave them here, however."
parent = 1

[[nodes]]
id = 10
depth = 2
kind = "speaker"
speaker = "Cecilia"
text = "I'm going to need some help to find them a place to be, and to clean up afterwards."
parent = 1

