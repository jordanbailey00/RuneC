depth = 2
kind = "speaker"
speaker = "Zanik"
text = "'All goblins.' Not just the Dorgeshuun, all goblins..."
parent = 7

[[nodes]]
id = 11
depth = 2
kind = "speaker"
speaker = "Zanik"
text = "And what does it even mean, my destiny? Is it something I'm certain to do, or just something I ought to do? How can I know?"
parent = 7

[[nodes]]
id = 12
depth = 2
kind = "speaker"
speaker = "Zanik"
text = "I talked to Juna about it, but she wouldn't tell me anything. She just said, 'You will know, when the time is right.'"
parent = 7

