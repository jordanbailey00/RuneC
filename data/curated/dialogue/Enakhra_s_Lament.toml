speaker = "Player"
text = "Why, what's the matter?"
parent = -1

[[nodes]]
id = 2
depth = 1
kind = "speaker"
speaker = "Lazim"
text = "It's a sorry tale. I was once an accomplished sculptor, you see."
parent = -1

[[nodes]]
id = 3
depth = 1
kind = "speaker"
speaker = "Lazim"
text = "I made statues for the kings, queens and rulers of Gielinor. But then there was the accident..."
parent = -1

[[nodes]]
id = 4
depth = 1
kind = "speaker"
speaker = "Lazim"
text = "After that, I could never hold a chisel again."
parent = -1

[[nodes]]
id = 5
depth = 1
kind = "speaker"
speaker = "Lazim"
text = "But I have been struck by my muse while travelling the desert, and want nothing more than to build a statue in this area."
parent = -1

[[nodes]]
