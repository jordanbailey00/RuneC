speaker = "Player"
text = "Hello? Who are you? What is this place?"
parent = -1

[[nodes]]
id = 48
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "I'm... Ashuelot... Ashuelot Reis. But I don't understand... How are you here?"
parent = -1

[[nodes]]
id = 49
depth = 1
kind = "speaker"
speaker = "Player"
text = "Oh... Well I'm [player name], and I'm here because I was told there was a great treasure to be found."
parent = -1

[[nodes]]
id = 50
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Treasure? I fear you have been misled. There is no treasure here, only our great mistake."
parent = -1

[[nodes]]
id = 51
depth = 1
kind = "speaker"
speaker = "Player"
text = "Mistake?"
parent = -1

[[nodes]]
id = 52
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "This place is a prison. Here, a being of incomprehensible power was sealed away. Things would have stayed that way, if not for our foolishness."
parent = -1

[[nodes]]
id = 53
depth = 1
kind = "speaker"
speaker = "Player"
text = "What happened?"
parent = -1

[[nodes]]
id = 54
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "We thought we were doing good, but we were led astray. We opened the prison, and unleashed the horror within."
parent = -1

[[nodes]]
id = 55
depth = 1
kind = "speaker"
speaker = "Player"
text = "But the door was locked until I came along."
parent = -1

[[nodes]]
id = 56
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Yes... After our great mistake, four opposing armies united to contain the evil again. They managed to reseal the prison, but they were unable to repair the original enchantments."
parent = -1

[[nodes]]
id = 57
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "This place has remained vulnerable ever since."
parent = -1

[[nodes]]
id = 58
depth = 1
kind = "speaker"
speaker = "Player"
text = "And now I've opened it again."
parent = -1

[[nodes]]
id = 59
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "If what you've told me is true, you were fooled just as we were. But I suppose that means little now. With the prison now open again, there isn't much to prevent the evil escaping once more."
parent = -1

[[nodes]]
id = 60
depth = 1
kind = "speaker"
speaker = "Player"
text = "There must be something I can do to stop it."
parent = -1

[[nodes]]
id = 61
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "There is only one thing you can do. You can fight."
parent = -1

[[nodes]]
id = 62
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then that is what I will do."
parent = -1

[[nodes]]
id = 63
depth = 1
kind = "speaker"
speaker = "Player"
text = "Though, now that I think about it, I'm still not overly clear what this evil is."
parent = -1

[[nodes]]
id = 64
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "She is a being of darkness. A servant of the Ruinous Powers. She is the Angel of Death. She is Nex."
parent = -1

[[nodes]]
id = 65
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'll stop her."
parent = -1

[[nodes]]
id = 66
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "I hope so. Nex can be found in the inner section of the prison. Join me there. But be warned, Nex was not imprisoned alone. You'll need to fight through her followers to reach her."
parent = -1

[[nodes]]
id = 67
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Good luck."
parent = -1

