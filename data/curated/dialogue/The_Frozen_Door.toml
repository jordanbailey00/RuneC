[[nodes]]
id = 70
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "You made it?"
parent = -1

[[nodes]]
id = 71
depth = 1
kind = "speaker"
speaker = "Player"
text = "You didn't think I would?"
parent = -1

[[nodes]]
id = 72
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Nex's followers are capable of bringing down even the strongest of warriors. I did fear you might not make it past them."
parent = -1

[[nodes]]
id = 73
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Still, they are nothing compared to the Angel of Death herself."
parent = -1

[[nodes]]
id = 74
depth = 1
kind = "speaker"
speaker = "Player"
text = "So how do I deal with her?"
parent = -1

[[nodes]]
id = 75
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "You will never be able to truly defeat her. The best you can do is to try and keep her contained. When you are ready to face her, just go through the barrier."
parent = -1

[[nodes]]
id = 76
depth = 1
kind = "speaker"
speaker = "Ashuelot Reis"
text = "If it helps, while my magic is limited here, I should still be able to transfer items in and out of the prison for you. Let me know if you'd like me to do this before you enter."
parent = -1

[[nodes]]
id = 77
depth = 1
kind = "option"
text = "Tell me more about Nex."
parent = -1
children = [78, 79, 80, 81, 82, 83, 84, 85, 86, 87, 88, 89, 90, 91, 92, 93, 94, 95, 96, 97, 98, 99, 100, 101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111]

[[nodes]]
id = 78
depth = 2
kind = "speaker"
speaker = "Player"
text = "Tell me more about Nex."
parent = 77

[[nodes]]
id = 79
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Long ago, these lands were dominated by a great empire, ruled over by an ancient god. The Empty Lord is what they often called him, but his true name was Zaros."
parent = 77

[[nodes]]
id = 80
depth = 2
kind = "speaker"
speaker = "Player"
text = "Zaros? I've heard of him."
parent = 77

[[nodes]]
id = 81
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "At the height of his power, Zaros seemed untouchable, but he was eventually defeated by those he trusted the most. With him gone, the empire collapsed. War broke out soon after."
parent = 77

[[nodes]]
id = 82
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Although their god was gone, many Zarosians fought to keep his empire alive. Among them was Nex. She was Zaros' most powerful weapon, and she led a great army to try and restore his empire."
parent = 77

[[nodes]]
id = 83
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Not that she needed an army of course. Nex alone was powerful enough to hold back hundreds of lesser beings."
parent = 77

[[nodes]]
id = 84
depth = 2
kind = "speaker"
speaker = "Player"
text = "So how did she end up here?"
parent = 77

[[nodes]]
id = 85
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "The forces of Saradomin knew that Nex needed to be dealt with. They were able to lure her into these caverns."
parent = 77

[[nodes]]
id = 86
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "After great effort and sacrifice, they managed to place Nex and her followers into a frozen, enchanted sleep."
parent = 77

[[nodes]]
id = 87
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Once Nex was no longer an immediate threat, they built the Temple of Lost Ancients around her. Most of the temple has since fallen to ruin, but you can still see some of the remains."
parent = 77

[[nodes]]
id = 88
depth = 2
kind = "speaker"
speaker = "Player"
text = "But she wasn't frozen forever, was she? You said you were fooled into freeing her."
parent = 77

[[nodes]]
id = 89
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Yes. Later in the war, a great battle broke out in the Temple of Lost Ancients. I was a Saradominist soldier at the time, and I was among those who fought for him in that battle."
parent = 77

[[nodes]]
id = 90
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = """
By then, many of us had grown tired of war. One of our priests discovered this. He came to us and revealed that he felt the same way, and that he had secretly converted to Guthix. He encouraged us to join him.
"""
parent = 77

[[nodes]]
id = 91
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "We abandoned the cause of Saradomin and became followers of Guthix. Our new leader taught us the ways of the druids, including an ancient ritual that had the power to awaken Guthix himself."
parent = 77

[[nodes]]
id = 92
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "We believed this ritual to be the only way to end the war."
parent = 77

[[nodes]]
id = 93
depth = 2
kind = "speaker"
speaker = "Player"
text = "But I'm guessing that's not how things went?"
parent = 77

[[nodes]]
id = 94
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "No... When our leader led us to perform the ritual, it was not Guthix we woke, but Nex and her forces. The ritual also destroyed the protective enchantments on their prison."
parent = 77

[[nodes]]
id = 95
depth = 2
kind = "speaker"
speaker = "Player"
text = "And that was exactly what your leader wanted?"
parent = 77

[[nodes]]
id = 96
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "It was. He had never been a follower of Guthix, or Saradomin. His real goal had always been to free Nex."
parent = 77

[[nodes]]
id = 97
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = """
The rest is as I already told you. Nex posed such a danger, that the four armies temorarily joined forces to drive her back into the prison. They resealed it, but were unable to fix the enchantments we destroyed.
"""
parent = 77

[[nodes]]
id = 98
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = """
As for me, I was one of the first to fall after Nex was freed, but I didn't truly die. Something about our ritual tied me to this place. I've been trapped here ever since. Not dead, but not really alive either.
"""
parent = 77

[[nodes]]
id = 99
depth = 2
kind = "speaker"
speaker = "Player"
text = "I'm sorry."
parent = 77

[[nodes]]
id = 100
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "Don't be. This is the punishment for my sins."
parent = 77

[[nodes]]
id = 101
depth = 2
kind = "speaker"
speaker = "Player"
text = "What of the one that led the ritual. What came of him?"
parent = 77

[[nodes]]
id = 102
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "He'd achieved his goal, so he left. I never saw him again."
parent = 77

[[nodes]]
id = 103
depth = 2
kind = "speaker"
speaker = "Player"
text = "But who was he really?"
parent = 77

[[nodes]]
id = 104
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "He never gave us his true name, but as Nex was freed, she spoke to him."
parent = 77

[[nodes]]
id = 105
depth = 2
kind = "speaker"
speaker = "Player"
text = "She knew him?"
parent = 77

[[nodes]]
id = 106
depth = 2
kind = "speaker"
speaker = "Ashuelot Reis"
text = "It seemed that way. I heard little of what they said, but I did hear what she called him."
parent = 77

[[nodes]]
