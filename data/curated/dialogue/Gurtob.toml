kind = "speaker"
speaker = "Ros"
text = "Dis... Sorry, this corner of the Shrouded Ocean is where we Barracudas like to challenge ourselves to a fun Barracuda Trial called the Jubbly Jive."
parent = -1

[[nodes]]
id = 8
depth = 1
kind = "speaker"
speaker = "Ros"
text = "While he may not look it, Gurtob here is actually an expert sailor and trial master for the Barracudas."
parent = -1

[[nodes]]
id = 9
depth = 1
kind = "speaker"
speaker = "Player"
text = "An ogre is a trial master for the Barracudas? That's surprising."
parent = -1

[[nodes]]
id = 10
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Not at all! He may be rough around the edges and difficult to understand at times, but he's a fantastic sailor and that's the only thing us Barracudas care about."
parent = -1

[[nodes]]
id = 11
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. So what do I do here? What's the challenge?"
parent = -1

