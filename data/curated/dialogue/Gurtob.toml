[[nodes]]
id = 20
depth = 1
kind = "speaker"
speaker = "Ros"
text = "The goal of this trial is to use balloon toads to lure jubblies. First up, you'll want to sail west to collect da... sorry, collect the balloon toads from a boat of ours."
parent = -1

[[nodes]]
id = 21
depth = 1
kind = "speaker"
speaker = "Ros"
text = "On your way, keep an eye out for any lost supplies. You'll need to collect all of them to complete the trial."
parent = -1

[[nodes]]
id = 22
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Sailing over rapids will give you a burst of speed! Try to go over as many as you can. The more rapids you go through in quick succession, the faster you'll go!"
parent = -1

[[nodes]]
id = 23
depth = 1
kind = "speaker"
speaker = "Ros"
text = """
As you continue sailing west, keep an eye out for the jubblies. Remembering where they are will help you later in the trial. They tend to be perched on top of rocky outcrops or trees growing out of the water.
"""
parent = -1

[[nodes]]
id = 24
depth = 1
kind = "speaker"
speaker = "Ros"
text = "The total number of them will depend on the rank you're going for. They're also fairly consistent, so your experience should be the same during each trial attempt."
parent = -1

[[nodes]]
id = 25
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Once you've sailed far enough west, you should be able to spot the boat where you can collect the balloon toads from. The maximum amount you can collect depends on the rank you're going for."
parent = -1

[[nodes]]
id = 26
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Once you've collected some balloon toads, you'll want to start sailing back this way so you can begin luring the jubblies."
parent = -1

[[nodes]]
id = 27
depth = 1
kind = "speaker"
speaker = "Ros"
text = "As you sail, watch out for the extra thick stagnant patches of water. They'll slow down any boat, so do your best to avoid them."
parent = -1

[[nodes]]
id = 28
depth = 1
kind = "speaker"
speaker = "Ros"
text = "As you keep making your way back, you'll want to start luring the jubblies back with you. The goal is to lure all of them back to us here."
parent = -1

[[nodes]]
id = 29
depth = 1
kind = "speaker"
speaker = "Ros"
text = "To lure a jubbly, look out for empty outcrops similar to the ones they like to perch on. If you throw a balloon toad at one of these outcrops, a nearby jubbly will move to it."
parent = -1

[[nodes]]
id = 30
depth = 1
kind = "speaker"
speaker = "Ros"
text = """
It's worth noting that jubblies will only travel to the closest outcrop to them, so you'll need to lure them one outcrop at a time. Make sure to keep track of where you've thrown toads and where the jubblies started.
"""
parent = -1

[[nodes]]
id = 31
depth = 1
kind = "speaker"
speaker = "Ros"
text = "When attempting higher ranks, you may want to set up balloon toads at multiple outcrops ahead of time!"
parent = -1

[[nodes]]
id = 32
depth = 1
kind = "speaker"
speaker = "Ros"
text = "While the jubblies are important, don't forget to keep collecting the lost supplies as you come back as well."
parent = -1

[[nodes]]
id = 33
depth = 1
kind = "speaker"
speaker = "Ros"
text = """
If you can lure all the jubblies and collect all the lost supplies in the time given, you'll be awarded a Barracuda rank! Each trial has three ranks: Swordfish, Shark or Marlin. Each rank is harder than the last.
"""
parent = -1

[[nodes]]
id = 34
depth = 1
kind = "speaker"
speaker = "Ros"
text = "For this trial, you'll be asked to lure additional jubblies and collect even more lost supplies as the rank increases."
parent = -1

[[nodes]]
id = 35
depth = 1
kind = "speaker"
speaker = "Ros"
text = "You can't attempt the next rank until you beat the one before it. You can also try unranked if you'd like to warm up beforehand."
parent = -1

[[nodes]]
id = 36
depth = 1
kind = "speaker"
speaker = "Gurtob"
text = "See, is like Gurtob said so. Go da fastest, grab da toadies, throw da toadies, trick da jubblies, eat da jubblies. Dat's it."
parent = -1

[[nodes]]
id = 37
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. Do you have any tips or tricks for me?"
parent = -1

[[nodes]]
id = 38
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Of course!"
parent = -1

[[nodes]]
id = 39
depth = 1
kind = "speaker"
speaker = "Ros"
text = "First up, you're going to need a boat with at least a mithril helm in order to withstand the strong rapids here, but don't forget, provided you can withstand them, they'll give you a burst of speed!"
parent = -1

[[nodes]]
id = 40
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Secondly, you really want to try to avoid the fetid pools around us. They won't harm you or your boat, but they will completely kill all momentum you've built up."
parent = -1

[[nodes]]
id = 41
depth = 1
kind = "speaker"
speaker = "Ros"
text = "The only way to get across them is by using a wind catcher, but even then the timing is tricky, so we only give those out to sailors who have achieved at least Shark rank here."
parent = -1

[[nodes]]
id = 42
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Thirdly, trim your sails frequently to build up even more speed, but be careful! While it's important to go fast, doing so can make it harder to navigate around the fetid pools."
parent = -1

[[nodes]]
id = 43
depth = 1
kind = "speaker"
speaker = "Ros"
text = "If I were you, I'd consider briefly lowering your speed for those tricky turns to avoid getting your boat stuck."
parent = -1

[[nodes]]
id = 44
depth = 1
kind = "speaker"
speaker = "Gurtob"
text = "Hah! Gurtob sail never go down. Only go fastest."
parent = -1

[[nodes]]
id = 45
depth = 1
kind = "speaker"
speaker = "Ros"
text = "Finally, and you probably don't need to be told, but watch out for those rocks, hitting them will put a stop to all of your momentum, just like the pools."
parent = -1

[[nodes]]
id = 46
depth = 1
kind = "speaker"
speaker = "Player"
text = "Thanks for the advice. I'll bear that in mind."
parent = -1

