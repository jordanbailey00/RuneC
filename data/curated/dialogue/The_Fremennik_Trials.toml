text = "Know you not who I am outerlander? There are none more brave or powerful than me amongst all the Fremennik!"
parent = 1064

[[nodes]]
id = 1067
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "However... The role of bodyguard is below me, as a noble warrior. You might as well ask me to babysit the children!"
