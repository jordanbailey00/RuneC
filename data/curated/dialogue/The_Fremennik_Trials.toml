[[nodes]]
id = 1431
depth = 1
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "But spirit does not always make a good warrior. It takes both skill and spirit to be so. I have a test that I give all Fremenniks on their path to be a member of the clan."
parent = -1

[[nodes]]
id = 1432
depth = 1
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "My test will challenge both your combat prowess and your bravery equally. Should you pass it you will earn my vote at the council, and more importantly my respect for you as a warrior."
parent = -1

[[nodes]]
id = 1433
depth = 1
kind = "speaker"
speaker = "Thorvald the Warrior"
