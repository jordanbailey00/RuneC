[[nodes]]
id = 1427
depth = 1
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Well, let us say that I am not totally against this concept. As a warrior, I appreciate the value of brave and powerful warriors to our clan,"
parent = -1

[[nodes]]
id = 1428
depth = 1
kind = "speaker"
speaker = "Thorvald the Warrior"
