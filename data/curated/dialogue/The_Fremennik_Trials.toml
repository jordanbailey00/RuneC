[[nodes]]
id = 1440
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "If you leave you will of course fail the test. You may retry my test in the future if you fail, but you must stay down there until the death if you wish for my vote at the council."
parent = 1435

[[nodes]]
id = 1441
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "You must defeat him three times to prove that you are worthy. The fourth time that you fight him will be to the death, so do not show cowardice."
