[[nodes]]
id = 1458
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Ah, a wise question before entering combat. His name is Koschei the deathless. He is something of a mystery, even to us."
parent = 1456

[[nodes]]
id = 1459
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "On one of our regular raiding parties, our longship discovered a man in the frozen waters far north-east of here. We took him aboard our ship, thinking he must be dead."
parent = 1456

[[nodes]]
id = 1460
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "To our amazement he was perfectly healthy, even though he must have been in those deadly icy waters for many weeks."
parent = 1456

[[nodes]]
id = 1461
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "He has no memory of who he is, or how he came to be there, except for his own name: Koschei. We named him 'The Deathless' because he is seemingly unkillable!"
parent = 1456

[[nodes]]
id = 1462
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Any combat technique used against him, he learns instantly! He also apparently can heal himself from any wound at will! When he attacks, his weapon moves like a whirlwind!"
parent = 1456

[[nodes]]
id = 1463
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "He can hide his combat level from his opponents at will as well! He is truly a horribly fierce opponent to face! I am only glad that he has chosen to stay here with us!"
parent = 1456

[[nodes]]
id = 1464
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = """
The daylight makes him feel weak, so we have built him his own battleground beneath this building, where he can train his fiercesome{{sic|Fearsome instead of fiercesome?}} skills without being disturbed.
"""
parent = 1456

[[nodes]]
id = 1465
depth = 2
kind = "speaker"
speaker = "Player"
text = "But he can't REALLY be unkillable...  ...can he?"
parent = 1456

[[nodes]]
id = 1466
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Some say he cannot die, for he has hidden his heart outside of his body to be kept forever safe in a duck egg."
parent = 1456

[[nodes]]
id = 1467
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Others say he has been cursed by the gods to wander this land forever, never knowing any peace in his life, but only combat."
parent = 1456

[[nodes]]
id = 1468
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Some claim that the sword he carries is the source of all his power, and if he should lose it, then exactly one minute later, he will turn back into his true form;"
