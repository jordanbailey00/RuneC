speaker = "Player"
text = "Is there no way you would do this for me?"
parent = 1064

[[nodes]]
id = 1069
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "There is but one way outerlander. Since I was steeled in battle, I have dreamt of earning my place at the Champions Table in the Long Hall."
parent = 1064

[[nodes]]
id = 1070
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "It is a tradition amongst us that the bravest and strongest are honoured with a table of champions to drink and feast all that they can in our Long Hall."
parent = 1064

[[nodes]]
id = 1071
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Unfortunately, there are only a fixed number of places available at the table, and these places were all filled many moons ago by others."
parent = 1064

[[nodes]]
id = 1072
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "Although my worthiness is undeniable, the only way I may take my place is if one of those already there die, or give up their place to me voluntarily."
parent = 1064

[[nodes]]
id = 1073
depth = 2
kind = "speaker"
speaker = "Player"
text = "So you want me to go kill one of them off for you? Make it look like an accident?"
parent = 1064

[[nodes]]
id = 1074
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "WHAT? No, no, not at all! I am shocked you would suggest such a thing!"
parent = 1064

[[nodes]]
id = 1075
depth = 2
kind = "speaker"
speaker = "Thorvald the Warrior"
text = "If you can persuade one of the Revellers to give up their Champions' Token to you so that I might take their place, you may have my contract as a bodyguard."
parent = 1064

[[nodes]]
