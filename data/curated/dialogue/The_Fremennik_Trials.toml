[[nodes]]
id = 1089
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "As a matter of fact, I do. I have one right here. I earnt my place here at the longhall for surviving over 5000 battles and raiding parties."
parent = 1087

[[nodes]]
id = 1090
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "Due to my contribution to the tribe, I am now permitted to spend my days here in the longhall listening to the epic tales of the bard, and drinking beer."
parent = 1087

[[nodes]]
id = 1091
depth = 2
kind = "speaker"
speaker = "Player"
text = "Cool. That sounds pretty sweet! So I guess you don't want to give it away?"
parent = 1087

[[nodes]]
id = 1092
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "I think it sounds better than it actually is outerlander. I miss my glory days of combat on the battlefield. And to tell you the truth, the beer here isn't great, and the bards' music is lousy."
parent = 1087

[[nodes]]
id = 1093
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "I would happily give up my token if it were not for the one thing that keeps me here. Our barkeep is one of the best in the world, and has worked in taverns across the land."
parent = 1087

[[nodes]]
id = 1094
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "When she was younger, she experimented a lot with her drinks, and invented a cocktail so alcoholic and tasty that it has become something of a legend to all who enjoy a drink."
parent = 1087

[[nodes]]
id = 1095
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "Unfortunately, she decided that cocktails were not a suitable drink for Fremennik warriors, and vowed to never again make it."
parent = 1087

[[nodes]]
id = 1096
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "I have been here every day since she returned, hoping that someday she might change her mind and I might try this legendary cocktail for myself. Alas, it has never come to pass..."
parent = 1087

[[nodes]]
id = 1097
depth = 2
kind = "speaker"
speaker = "Manni the Reveller"
text = "If you can persuade her to make me her legendary cocktail, I will be happy to never let another drop of alcohol pass my lips, and will give you my champions token."
parent = 1087

