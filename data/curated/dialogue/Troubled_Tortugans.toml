[[nodes]]
id = 195
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Oh, [player name], I hope you haven't taken offense! It's really nothing personal. It's just how we do things."
parent = 193

[[nodes]]
id = 196
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "It's not just limited to humans either. You might have noticed that there are no adult tortugans here on the Conch, just juveniles and elders."
parent = 193

[[nodes]]
id = 197
depth = 2
kind = "speaker"
speaker = "Player"
text = "So it's a societal thing?"
parent = 193

[[nodes]]
id = 198
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Yes, I suppose it is. We tortugans like our privacy, and we don't like being overly dependent on others. It is these preferences that have formed our way of life."
parent = 193

[[nodes]]
id = 199
depth = 2
kind = "speaker"
speaker = "Player"
text = "I see. I guess that gives me another question then. If the adults aren't here, where are they?"
parent = 193

[[nodes]]
id = 200
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Out in the wider world, living their lives. They return here from time to time, usually when it is time to mate."
parent = 193

[[nodes]]
id = 201
depth = 2
kind = "speaker"
speaker = "Player"
text = "Ah, so that explains why Floopa was reluctant to return here."
parent = 193

[[nodes]]
id = 202
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Yes, there can be a certain level of... pride, shall we say, amongst the younger adults. They have been known to see independence as a constant requirement."
parent = 193

[[nodes]]
id = 203
depth = 2
kind = "speaker"
speaker = "Floopa"
text = "I can hear you, you know?"
parent = 193

[[nodes]]
id = 204
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "It's rude to eavesdrop, Floopa! You should be resting!"
parent = 193

[[nodes]]
id = 205
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = """
Anyway, as I was saying, it is a trait seen amongst many of the younger adults. They soon grow out of it. No one wants to be a burden of course, but we elders understand that there is no shame in asking for help.
"""
parent = 193

[[nodes]]
id = 206
depth = 2
kind = "speaker"
speaker = "Player"
text = "It sounds like a good balance."
parent = 193

[[nodes]]
id = 207
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Indeed it is."
parent = 193

