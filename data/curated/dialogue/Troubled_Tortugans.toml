depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Ah, it is nothing to be sad about. We have grown used to it. Besides, while the gryphons may prey upon us, in many ways, we prey upon them as well."
parent = 209

[[nodes]]
id = 215
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Killing them keeps their numbers under control, and their claws and feathers come in quite useful. In fact, all tortugans must obtain a gryphon claw as part of their Trial by Water."
parent = 209

[[nodes]]
id = 216
depth = 2
kind = "speaker"
speaker = "Player"
