text = "Unfortunately so. They are the main predator we have to deal with here on the Conch, and it seems they have decided that we are quite the delicacy."
parent = 209

[[nodes]]
id = 212
depth = 2
kind = "speaker"
speaker = "Elder Raley"
text = "Thankfully, most of them keep to the quieter parts of the island, making them easier to handle. However, from time to time, one will grow bold enough to try and target the town."
parent = 209

[[nodes]]
id = 213
depth = 2
kind = "speaker"
speaker = "Player"
text = "I'm sorry. It can't be nice living with that threat."
