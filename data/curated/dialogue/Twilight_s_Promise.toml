[[nodes]]
id = 86
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Ah, there you are. Nilsal, adventurer. I don't believe you've properly met my father. This is Servius, the Teokan of Ralos and the man whose life you saved."
parent = -1

[[nodes]]
id = 87
depth = 1
kind = "speaker"
speaker = "Player"
text = "Your father? I didn't realise you were related."
parent = -1

[[nodes]]
id = 88
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Yes, very fun stuff. All a bit of a convoluted mess as well! I'll be sure to tell you all about it at some point. For now though, [player name], meet Servius. Servius, meet [player name]."
parent = -1

[[nodes]]
id = 89
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "Nilsal, my child. It is an honour to meet you. Were it not for you, I may well already be making my journey to Mictl. On behalf of both myself and Ralos, I thank you."
parent = -1

[[nodes]]
id = 90
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Well let's not start celebrating just yet. There's a reason why we're lurking in this crypt."
parent = -1

[[nodes]]
id = 91
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Sorry about that, by the way. I'd have much rather given you a proper welcome on your arrival, but given the situation, it's probably best we take a bit more care."
parent = -1

[[nodes]]
id = 92
depth = 1
kind = "speaker"
speaker = "Player"
text = "It's not a problem. Although, I did have an interesting encounter on my way here."
parent = -1

[[nodes]]
id = 93
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Ah, the Tullus twins. Fascinating pair, aren't they?"
parent = -1

[[nodes]]
id = 94
depth = 1
kind = "speaker"
speaker = "Player"
text = "Actually, I was talking about Metzli. I met her upstairs."
parent = -1

[[nodes]]
id = 95
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Oh, you met her! My deepest sympathies."
parent = -1

[[nodes]]
id = 96
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "Metzli and her sect play an essential role in our lives. You should not judge her so harshly."
parent = -1

[[nodes]]
id = 97
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "You're quite right, of course. But anyway, shall we get down to business?"
parent = -1

[[nodes]]
id = 98
depth = 1
kind = "speaker"
speaker = "Player"
text = "Sounds like a plan."
parent = -1

[[nodes]]
id = 99
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Kuani! So we have quite the predicament on our hands. My mother isn't too happy, oddly enough, and has tasked me with sorting it all out."
parent = -1

[[nodes]]
id = 100
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Someone wants our dear Teokan dead, and we have no idea who! All we know is that they were a Varlamorian."
parent = -1

[[nodes]]
id = 101
depth = 1
kind = "speaker"
speaker = "Player"
text = "A Varlamorian who had access to the mainland before the treaty was signed. Surely that limits the options a fair bit?"
parent = -1

[[nodes]]
id = 102
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Right you are, [player name]! In fact, it limits them to just the members of our little delegation. In other words, myself, Servius, the Tullus twins and our retinue of knights."
parent = -1

[[nodes]]
id = 103
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Now I don't think it was me... and I'm guessing you didn't try to arrange your own assassination, Servius?"
parent = -1

[[nodes]]
id = 104
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "I'd like to think I'd have done a better job if I had."
parent = -1

[[nodes]]
id = 105
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Too right. Very sloppy work. A top example of how not to assassinate someone. Still, probably best we track them down all the same."
parent = -1

[[nodes]]
id = 106
depth = 1
kind = "speaker"
speaker = "Player"
text = "So that leaves the Tullus twins and the knights."
parent = -1

[[nodes]]
id = 107
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "Ennius and Furia are loyal children of Ralos. They would not wish to see my death."
parent = -1

[[nodes]]
id = 108
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Those knights should also be loyal children of Ralos, but I agree, they are far more likely candidates. Let us investigate them and see what we can find."
parent = -1

[[nodes]]
id = 109
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Servius, until we have this matter sorted, you should remain here in the capital. The palace will be the safest place."
parent = -1

[[nodes]]
id = 110
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "Nonsense! I am the Teokan of Ralos and I have a duty to the people. I must return to the Teomat at once!"
parent = -1

[[nodes]]
id = 111
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "The Teomat does not offer the protection of the palace. You'll be an easy target there."
parent = -1

[[nodes]]
id = 112
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "I am the chosen messenger of Ralos. He would not have me cower and hide. I will return to the Teomat."
parent = -1

[[nodes]]
id = 113
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Well this is a terrible idea that's definitely going to blow up in all our faces later, but it seems you have made your decision. However, I insist that you let me personally accompany you."
parent = -1

[[nodes]]
id = 114
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "My child, I would be delighted to have you as a travelling companion."
parent = -1

[[nodes]]
id = 115
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "[player name], since Servius here seems keen on letting this killer have another go, you'll need to investigate the knights on your own."
parent = -1

[[nodes]]
id = 116
