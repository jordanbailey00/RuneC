speaker = "Servius, Teokan of Ralos"
text = "Nilsal, my child."
parent = -1

[[nodes]]
id = 509
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "So, how did your investigation go?"
parent = -1

[[nodes]]
id = 510
depth = 1
kind = "speaker"
speaker = "Player"
text = "I found a letter to one of the knights, Velam. The letter instructed him to arrange the death of Servius."
parent = -1

[[nodes]]
id = 511
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Tetamo! One of my own knights! I will need to swiftly deal with this."
parent = -1

[[nodes]]
id = 512
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well there's actually no need. Ennius killed him as soon as we found out."
parent = -1

[[nodes]]
id = 513
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Ah, excellent! Such should be the fate of all traitors."
parent = -1

[[nodes]]
id = 514
depth = 1
kind = "speaker"
speaker = "Player"
text = "But Ennius killed him before we could even question him!"
parent = -1

[[nodes]]
id = 515
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Hmm, that's unfortunate. It would have been good to know who he was working for. No matter though! I'm sure we'll find another way of getting to the bottom of this."
parent = -1

[[nodes]]
id = 516
depth = 1
kind = "speaker"
speaker = "Player"
text = "Does it not bother you how quickly Ennius killed him? Is it not a bit odd?"
parent = -1

[[nodes]]
id = 517
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Here in Varlamore, justice is delivered swiftly and harshly. Ennius may have taken that a bit too literally... but there's not much we can do about that now."
parent = -1

[[nodes]]
id = 518
depth = 1
kind = "speaker"
speaker = "Player"
text = "But do you not find it suspicious? I find a letter perfectly implicating one of the knights, but he's then quickly killed before he can be questioned."
parent = -1

[[nodes]]
id = 519
depth = 1
kind = "speaker"
speaker = "Player"
text = "Seems like a pretty good way of covering things up, don't you think?"
parent = -1

[[nodes]]
id = 520
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "The Tullus family have loyally served the rulers of Varlamore since the death of Emperor Imafore. For one of them to be a traitor is unthinkable!"
parent = -1

[[nodes]]
id = 521
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "It's a dangerous accusation indeed. That said... the family does have a bit of a history."
parent = -1

[[nodes]]
id = 522
depth = 1
kind = "speaker"
speaker = "Player"
text = "How so?"
parent = -1

[[nodes]]
id = 523
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "My family has not always ruled Varlamore. In fact, it was the Tullus family who reigned for the majority of the kingdom's history."
parent = -1

[[nodes]]
id = 524
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "That all ended when good old Imafore declared the kingdom to be his new empire. He celebrated by going on a nice little murder spree. One war later and dear old Imafore found himself without a head."
parent = -1

[[nodes]]
id = 525
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Had that not happened, the throne would have eventually passed down to... Furia, I think... I believe she's the slightly older of the two."
parent = -1

[[nodes]]
id = 526
depth = 1
kind = "speaker"
speaker = "Player"
text = "Right... And you don't think that might be a good reason for her and Ennius to be traitors?"
parent = -1

[[nodes]]
id = 527
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "Imafore's death was over a hundred years ago! His family had no love for him then, and they've loyally served the Arkans since."
parent = -1

[[nodes]]
id = 528
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Yes, very true, but [player name] also has valid concerns. We need to be careful of assumptions, but it seems it would be wise for us to keep an eye on the two of them from now on."
parent = -1

[[nodes]]
id = 529
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Now, [player name], did your investigation uncover anything else?"
parent = -1

[[nodes]]
id = 530
depth = 1
kind = "speaker"
speaker = "Player"
text = "The letter I found mentioned two things: Twilight's Promise and the Final Dawn."
parent = -1

[[nodes]]
id = 531
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Twilight's Promise? I've never heard of that. I wonder if it has anything to do with the Twilight Emissaries..."
parent = -1

[[nodes]]
id = 532
depth = 1
kind = "speaker"
speaker = "Player"
text = "Twilight Emissaries?"
parent = -1

[[nodes]]
id = 533
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "A nice religious cult that has an unhealthy obsession with the end of the world. They've never caused any major problems before, so we've mostly left them be."
parent = -1

[[nodes]]
id = 534
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "However, given this revelation, perhaps it's time to pay a little closer attention to their dealings."
parent = -1

[[nodes]]
id = 535
depth = 1
kind = "speaker"
speaker = "Player"
text = "And the Final Dawn... What's that?"
parent = -1

[[nodes]]
id = 536
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "Nothing more than blasphemy! It is not something we should waste our time talking about."
parent = -1

[[nodes]]
id = 537
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "As you can see, the Final Dawn is a bit of a... controversial topic. It's a religious belief..."
parent = -1

[[nodes]]
id = 538
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "An unofficial religious belief!"
parent = -1

[[nodes]]
id = 539
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "It's an unofficial religious belief concerning the end of the world. Oddly enough, our friends in the Twilight Emissaries are big fans of it."
parent = -1

[[nodes]]
id = 540
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hmm... Where can I learn more about the Final Dawn?"
parent = -1

[[nodes]]
id = 541
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "It's not something I care to know about, but if anyone around here were to know, it would be Metzli."
parent = -1

[[nodes]]
id = 542
depth = 1
kind = "speaker"
speaker = "Servius, Teokan of Ralos"
text = "The Sect of Ranul are responsible for maintaining the library here. That includes dealing with any forbidden materials."
parent = -1

[[nodes]]
id = 543
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "Metzli returned to the Teomat shortly before we did. She'll be around here somewhere."
parent = -1

[[nodes]]
id = 544
depth = 1
kind = "speaker"
speaker = "Player"
text = "Right, I'll go and see if she can help me."
parent = -1

[[nodes]]
id = 545
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 546
depth = 1
kind = "speaker"
speaker = "Prince Itzla Arkan"
text = "If you want to learn about the Final Dawn, Metzli would be the best person to speak to. She'll be around here somewhere."
parent = -1

[[nodes]]
id = 547
depth = 1
kind = "speaker"
speaker = "Player"
text = "Alright, I'll see if she can help me."
parent = -1

[[nodes]]
id = 548
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 549
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "We meet again. Not a chance encounter I see, for it is clear that you want something."
parent = -1

[[nodes]]
id = 550
depth = 1
kind = "speaker"
speaker = "Player"
text = "I was hoping you could help me with some information."
parent = -1

[[nodes]]
id = 551
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Quite possibly. The Sect of Ranul know better than most that time sees the end of all things. When we are gone, what remains? Knowledge must be passed on, lest it be lost forever."
parent = -1

[[nodes]]
id = 552
depth = 1
kind = "speaker"
speaker = "Player"
text = "Yes, what you're describing there is a book. I'm familiar with the concept."
parent = -1

[[nodes]]
id = 553
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "But what is a book without the right reader? Words can be misunderstood, misconstrued. That assumes those words were even right to begin with."
parent = -1

[[nodes]]
id = 554
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Think of all that we believe to know. All those words we have read. How many were the truth, I wonder."
parent = -1

[[nodes]]
id = 555
depth = 1
kind = "speaker"
speaker = "Player"
text = "Okay, well before we go down another rabbit hole, I'm looking for information on the Final Dawn."
parent = -1

[[nodes]]
id = 556
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "The Final Dawn? This is something I can help with, but first, to understand the Final Dawn, you must understand Ximoua."
parent = -1

[[nodes]]
id = 557
depth = 1
kind = "speaker"
speaker = "Player"
text = "Ximoua? That's a fancy word."
parent = -1

[[nodes]]
id = 558
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "The word is a gift to us from those who walked these lands before we did. They knew the truths of this world... in a way we can only dream of."
parent = -1

[[nodes]]
id = 559
depth = 1
kind = "cond"
text = "If the player has not completed [[The Garden of Death]]:"
parent = -1
children = [560, 561]

[[nodes]]
id = 560
depth = 2
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "We call them the Old Ones. They understood the importance of passing on their knowledge. So much of what we know, comes from them."
parent = 559

[[nodes]]
id = 561
depth = 2
kind = "act"
text = "continue"
parent = 559

[[nodes]]
id = 562
depth = 1
kind = "cond"
text = "If the player has completed The Garden of Death:"
parent = -1
children = [563, 564, 565]

[[nodes]]
id = 563
depth = 2
kind = "speaker"
speaker = "Player"
text = "You speak of the Old Ones?"
parent = 562

[[nodes]]
id = 564
depth = 2
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Yes. They understood the importance of passing on their knowledge. So much of what we know, comes from them."
parent = 562

[[nodes]]
id = 565
depth = 2
kind = "act"
text = "continue"
parent = 562

[[nodes]]
id = 566
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hmm... So what is Ximoua?"
parent = -1

[[nodes]]
id = 567
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Our world endures in a way we cannot comprehend, but like all things, it will not do so forever. Its light will one day die, but this is not something to be feared, it is something to be embraced."
parent = -1

[[nodes]]
id = 568
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = """
You see, we are part of a cycle. Something far larger than ourselves. When the time comes, Ralos and Ranul will come together as one, consuming these lands in holy fire, until there is nothing left but ash.
"""
parent = -1

[[nodes]]
id = 569
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "But even in ash, embers remain. From those embers, a new world will be born, and the cycle will continue once more. This is Ximoua."
parent = -1

[[nodes]]
id = 570
depth = 1
kind = "speaker"
speaker = "Player"
text = "So you think the world will one day end? That's quite something."
parent = -1

[[nodes]]
id = 571
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Not think. Know. This knowledge is a gift. One that was passed down to us from the Old Ones."
parent = -1

[[nodes]]
id = 572
depth = 1
kind = "speaker"
speaker = "Player"
text = "But you said it yourself: Knowledge passed down can be misconstrued. How can anyone know the truth for sure? It's not like there are any of these Old Ones around for us to ask."
parent = -1

[[nodes]]
id = 573
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Indeed, and that is why this is just one interpretation. There are those out there with another: Tsak Tauli, the Final Dawn."
parent = -1

[[nodes]]
id = 574
depth = 1
kind = "speaker"
speaker = "Player"
text = "And what do they believe?"
parent = -1

[[nodes]]
id = 575
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "They do not just believe that the world will end. They believe it is their duty to make it happen. They see it as their singular purpose, and will stop at nothing to make it so."
parent = -1

[[nodes]]
id = 576
depth = 1
