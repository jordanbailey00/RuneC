speaker = "Metzli, Teokan of Ranul"
text = "I know your face. I have seen it a thousand times before."
parent = -1

[[nodes]]
id = 29
depth = 1
kind = "speaker"
speaker = "Player"
text = "Er... I think you must have me confused with someone else. We've never met."
parent = -1

[[nodes]]
id = 30
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Yes... and no. This is our first encounter, and yet I know you better than most. You wear the face of my only true companion. You wear the face of death."
parent = -1

[[nodes]]
id = 31
depth = 1
kind = "speaker"
speaker = "Player"
text = "Your only companion is death? You should probably get out more."
parent = -1

[[nodes]]
id = 32
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "You jest, as your kind often do. Is that how you drown out their screams, I wonder? Is that how you hide your pain?"
parent = -1

[[nodes]]
id = 33
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well things got deep very quickly. Is this how you normally introduce yourself to someone?"
parent = -1

[[nodes]]
id = 34
depth = 1
kind = "speaker"
speaker = "Metzli, Teokan of Ranul"
text = "Few seek an introduction with the Sect of Ranul. They spend their days in Ralos' light. The darkness hides an inevitable truth that they prefer to shy away from."
parent = -1

[[nodes]]
id = 35
depth = 1
kind = "speaker"
speaker = "Player"
text = "Right... So who actually are you?"
parent = -1

[[nodes]]
