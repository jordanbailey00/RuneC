kind = "speaker"
speaker = "Gnome child"
text = "As a human grows, they are taught to put childish thoughts aside. Yet the childish thoughts of a Gnome Child can far outstrip the shallow reckonings of humankind. Consider..."
parent = 135

[[nodes]]
id = 137
depth = 2
kind = "speaker"
speaker = "Gnome child"
text = "Instead of seeking to grow into a human adult, with their facile thoughts and closed minds, you should seek to remain as a child, and instead grow into a Gnome Child."
