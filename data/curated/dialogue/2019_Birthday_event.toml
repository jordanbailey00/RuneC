kind = "speaker"
speaker = "Gnome child"
text = "A human party has such focus on food and drink. This is apt. Consider how we come to celebrate the passing of six years..."
parent = 139

[[nodes]]
id = 141
depth = 2
kind = "speaker"
speaker = "Gnome child"
text = "Just as food and drink passes through your bodies until it goes the way of all things, the six years have passed through your minds."
parent = 139

[[nodes]]
id = 142
depth = 2
kind = "speaker"
speaker = "Gnome child"
text = "Do those six years go to the same destination as the food and drink, when it escapes from your nethers? That depends on what experience and wisdom you retained from the years."
parent = 139

[[nodes]]
id = 143
depth = 2
kind = "speaker"
speaker = "Gnome child"
text = "If you have gained from those six years, it is as though you drew nourishment from your food and drink. But if not, it is as though your food dripped straight out of your bottom."
parent = 139

