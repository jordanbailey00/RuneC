[[nodes]]
id = 22
depth = 1
kind = "speaker"
speaker = "Player"
text = "Osman? I was told by the Chancellor to come and speak to you. Apparently you have an issue that I can help with."
parent = -1

[[nodes]]
id = 23
depth = 1
kind = "speaker"
speaker = "Osman"
text = "That would be an apt description. However, I find you to be an interesting choice by the Chancellor. Why has he chosen to trust you with this task over one of our own?"
parent = -1

[[nodes]]
id = 24
depth = 1
kind = "speaker"
speaker = "Player"
text = "Er... I just asked if he needed help and he said yes."
parent = -1

[[nodes]]
id = 25
depth = 1
kind = "speaker"
speaker = "Osman"
text = "That man is far too trusting at a time when we must take extra care. However, if he has made his decision, I will not question it. Still, you should know that I will be keeping a close eye on you."
parent = -1

[[nodes]]
id = 26
depth = 1
kind = "speaker"
speaker = "Player"
text = "Fair enough. So what is this issue?"
parent = -1

[[nodes]]
id = 27
depth = 1
kind = "speaker"
speaker = "Osman"
text = "Prince Ali, heir to the Emir of Al Kharid, has been taken. My spies have already discovered where he is being held, but we need someone to make the rescue."
parent = -1

[[nodes]]
id = 28
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well I'm sure I can manage that. How do I go about rescuing him?"
parent = -1

[[nodes]]
id = 29
depth = 1
kind = "speaker"
speaker = "Osman"
text = "The Prince has been taken by a group of bandits led by the self-proclaimed 'Lady' Keli. They are holding him in the abandoned jail just east of Draynor Village."
parent = -1

[[nodes]]
id = 30
depth = 1
kind = "speaker"
speaker = "Osman"
text = "According to our information, Keli is the only one able to freely move around the area. For you to get the Prince out, you will need to disguise him as her. She will of course need dealing with first."
parent = -1

[[nodes]]
id = 31
depth = 1
kind = "speaker"
speaker = "Player"
text = "Why can't I just go in and kill her and her bandits?"
parent = -1

[[nodes]]
id = 32
depth = 1
kind = "speaker"
speaker = "Osman"
text = "And endanger the life of the Prince in the process? No. There will be no unnecessary risks. We need to do this with as little bloodshed as possible."
parent = -1

[[nodes]]
id = 33
depth = 1
kind = "speaker"
speaker = "Player"
text = "You make a fair point. Do you know what Keli looks like?"
parent = -1

[[nodes]]
id = 34
depth = 1
kind = "speaker"
speaker = "Osman"
text = "She has blonde hair and wears pink clothes. My daughter, Leela, one of my spies, is currently in Draynor Village keeping an eye on the jail. I'm sure she can help you with the specifics."
parent = -1

[[nodes]]
id = 35
depth = 1
kind = "speaker"
speaker = "Osman"
text = "Before you go, there is one more thing. You'll need a key to get the Prince out of his cell. Keli has the only one. You could steal it, but that seems like a risk we should avoid."
parent = -1

[[nodes]]
id = 36
depth = 1
kind = "speaker"
speaker = "Player"
text = "But if she has the only copy, and I can't just steal it, how do I get the key?"
parent = -1

[[nodes]]
id = 37
depth = 1
kind = "speaker"
speaker = "Osman"
text = "If you bring me an imprint of the key along with a bronze bar, I can show you how to make a copy. You should be able to make an imprint of the key using some soft clay."
parent = -1

[[nodes]]
id = 38
depth = 1
kind = "speaker"
speaker = "Osman"
text = "Of course, you'll need to find a way to get Keli to show you the key without causing suspicion. I'm sure Leela can help you with that."
parent = -1

[[nodes]]
id = 39
