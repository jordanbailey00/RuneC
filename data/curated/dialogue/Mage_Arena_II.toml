[[nodes]]
id = 96
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = """
One is a justiciar. According to legend, the justiciars were the elite of Saradomin's forces. Some worked alone, operating as assassins behind enemy lines. Others led entire armies in Saradomin's name.
"""
parent = 94

[[nodes]]
id = 97
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = "I couldn't tell you why this one wanders the Wilderness, but I suspect he has good reason."
parent = 94

[[nodes]]
id = 98
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = "The second is a Demon of Zamorak. From what I can tell, he is completely mad. He roams the Wilderness, killing all who he comes across without mercy. Even his own kind do not escape his fury."
parent = 94

[[nodes]]
id = 99
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = "He's known to battle the justiciar quite regularly, perhaps they are old enemies."
parent = 94

[[nodes]]
id = 100
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = "The final being is a Guthixian Ent. Like most followers of Guthix, he will avoid combat if possible. Make no mistake though, he is deadly when threatened."
parent = 94

[[nodes]]
id = 101
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = "He seems to take great interest in the other two creatures. Maybe he is trying to keep a balance between them."
parent = 94

[[nodes]]
id = 102
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = "All three of them give off a unique magical energy, one unlike any I have ever felt before. The fact that the three of them are so different, yet possess powers so similar, is very odd indeed."
parent = 94

[[nodes]]
id = 103
depth = 3
kind = "speaker"
speaker = "Kolodion"
text = "I'd be very interested in learning more about the source of their power."
parent = 94

