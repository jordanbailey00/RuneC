speaker = "Player"
text = "The Sun Queen?"
parent = 20

[[nodes]]
id = 26
depth = 4
kind = "speaker"
speaker = "Alina"
text = "Yes! She rules from her palace in their capital, Civitas illa Fortis. The sun plays an important role in Varlamorian life. In fact, they worship it!"
parent = 20

