kind = "speaker"
speaker = "Noah"
text = "What... the sun?"
parent = 20

[[nodes]]
id = 28
depth = 4
kind = "speaker"
speaker = "Alina"
text = "That's right! They have their own religion over there dedicated to the sun and the moon. Isn't that fascinating?"
parent = 20

[[nodes]]
