[[nodes]]
id = 22
depth = 4
kind = "speaker"
speaker = "Alina"
text = "It's far across the western sea, over the mountains south of Great Kourend. Between the sea and the mountains, it's totally isolated! No one is allowed to come or go without good reason."
parent = 20

[[nodes]]
id = 23
depth = 4
kind = "speaker"
speaker = "Noah"
text = "Sounds like a prison."
parent = 20

[[nodes]]
id = 24
depth = 4
