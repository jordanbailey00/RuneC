kind = "speaker"
speaker = "Malignius Mortifer"
text = "Ah, you are an inquisitive fellow. I shall speak of the great Wizards' Tower, destroyed by fire many years ago..."
parent = 108

[[nodes]]
id = 110
depth = 4
kind = "speaker"
speaker = "Malignius Mortifer"
text = "Many say it was the greatest building in the history of Gielinor, a magnificent monument to human ingenuity."
parent = 108

[[nodes]]
id = 111
depth = 4
kind = "speaker"
speaker = "Malignius Mortifer"
text = "Yet when humans are offered great power, they so often buy it at the cost of their principles."
parent = 108

[[nodes]]
id = 112
depth = 4
kind = "speaker"
speaker = "Malignius Mortifer"
text = "Wizards who claimed allegiance to Saradomin began to insist that magic be restricted to the few they deemed 'worthy' of such powers."
parent = 108

[[nodes]]
id = 113
depth = 4
kind = "speaker"
speaker = "Malignius Mortifer"
text = "Before long, those who did not share their fatuous obsession with Saradomin were excluded from the Tower completely. This state of affairs could not continue."
parent = 108

[[nodes]]
id = 114
depth = 4
kind = "speaker"
speaker = "Malignius Mortifer"
text = "One dark night, a brave band of magi loyal to the great Lord Zamorak stormed the Tower. Despite heavy losses, they fought their way up the levels until they reached the Great Library."
parent = 108

[[nodes]]
id = 115
depth = 4
kind = "speaker"
speaker = "Malignius Mortifer"
text = """
Alas, they were trapped and could not steal the precious records. But before they could be defeated, the bravest of them took it upon himself to blast the writings into nothingness, destroying the library.
"""
parent = 108

[[nodes]]
id = 116
depth = 4
kind = "speaker"
speaker = "Malignius Mortifer"
text = "The ensuing fire raced through the tower, and none escaped its fury. Some say that Lord Zamorak himself fanned the flames to ensure the destruction of his enemies!"
