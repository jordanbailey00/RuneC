speaker = "Player"
text = "What can you tell me about the Sourhog?"
parent = 183

[[nodes]]
id = 185
depth = 3
kind = "speaker"
speaker = "Spria"
text = "Well, I'm not much of a history buff... But I'll tell you what I know."
parent = 183

[[nodes]]
id = 186
depth = 3
kind = "speaker"
speaker = "Spria"
text = "Many years back, before even I was around, there were two rival family farms not far from where we're standing."
parent = 183

[[nodes]]
id = 187
depth = 3
kind = "speaker"
speaker = "Spria"
text = "Every year the village would hold a 'Finest Swine in Show' prize at the annual faire."
parent = 183

[[nodes]]
id = 188
depth = 3
kind = "speaker"
speaker = "Spria"
text = "The same farmer would win year after year without fail. Driven mad with jealousy, his rival decided to hire a dodgy dark wizard to give him an edge over the competition."
parent = 183

[[nodes]]
id = 189
depth = 3
kind = "speaker"
speaker = "Spria"
text = "The wizard attempted to alter the pig's appearance. I'm sure you can guess how well that went!"
parent = 183

[[nodes]]
id = 190
depth = 3
kind = "speaker"
speaker = "Spria"
text = "Long story short, the mutant, what we now know as a Sourhog, went on a brief rampage and escaped."
parent = 183

[[nodes]]
id = 191
depth = 3
kind = "speaker"
speaker = "Spria"
text = "It must have somehow managed to reproduce, because people have reported seeing them in groups."
parent = 183

[[nodes]]
id = 192
depth = 3
kind = "speaker"
speaker = "Spria"
text = "Up until now, so long as they were left alone, they'd keep to themselves. Rumors are, they live in deep underground caverns, scavenging what they can find."
parent = 183

[[nodes]]
id = 193
depth = 3
kind = "speaker"
speaker = "Spria"
text = "But if they're living so close-by and attacking people on roads, then... they must be getting bold and trying to resurface."
parent = 183

