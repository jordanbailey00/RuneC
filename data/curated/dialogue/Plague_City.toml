kind = "speaker"
speaker = "Edmond"
text = "Not that long ago, West Ardougne was hit by a deadly plague. They had the wall built to try and keep it contained. No one is allowed to enter the city now apart from the mourners."
parent = 5

[[nodes]]
id = 10
depth = 2
kind = "speaker"
speaker = "Edmond"
text = "They say the plague is a horrible way to go... That's why Elena felt she had to go help. She said she'd be gone for a few days but we've heard nothing since."
parent = 5

