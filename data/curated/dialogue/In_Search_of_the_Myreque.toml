[[nodes]]
id = 204
depth = 3
kind = "speaker"
speaker = "Cyreg Paddlehorn"
text = "Well you have Radigad Ponfit. He was a mercenary from Asgarnia but he joined up with the Myreque to settle some mysterious score with the Drakans."
parent = 202

[[nodes]]
id = 205
depth = 3
kind = "speaker"
speaker = "Cyreg Paddlehorn"
text = "Then there's Veliaf Hurtz, the leader of the group. He's been fighting the fight longer than any of them."
parent = 202

[[nodes]]
id = 206
depth = 3
kind = "speaker"
speaker = "Cyreg Paddlehorn"
text = "Next there's Ivan Strom. He's the youngest. I hear he's an aspiring priest. Not that there's much time for that around here."
parent = 202

[[nodes]]
id = 207
depth = 3
kind = "speaker"
speaker = "Cyreg Paddlehorn"
text = "You've also got Sani Piliu, the only female of the group. She's a bit of a shady one. I reckon she was a thief before the Myreque found her."
parent = 202

[[nodes]]
id = 208
depth = 3
kind = "speaker"
speaker = "Cyreg Paddlehorn"
text = "There's Harold Evans. Used to be part of some militia but was kicked out for being too hot-headed. Now he's the main fighter for the Myreque."
parent = 202

[[nodes]]
id = 209
depth = 3
kind = "speaker"
speaker = "Cyreg Paddlehorn"
text = "Finally, you have Polmafi Ferdygris. He's the brains of the operation in many ways. Believe it or not, he used to be a scholar."
parent = 202

[[nodes]]
