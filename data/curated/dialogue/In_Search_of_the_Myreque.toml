speaker = "Vanstrom Klause"
text = "Hello there. The name's Vanstrom Klause. How goes it stranger?"
parent = -1

[[nodes]]
id = 1
depth = 1
kind = "speaker"
speaker = "Player"
text = "Quite well, thanks for asking. How about you?"
parent = -1

[[nodes]]
id = 2
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "Hmm, well, I am a little concerned about some friends of mine. They're in dire need of some assistance, but I'm at a loss as to how I can help them."
parent = -1

[[nodes]]
id = 3
depth = 1
kind = "speaker"
speaker = "Player"
text = "What friends are these?"
parent = -1

[[nodes]]
id = 4
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "It's a personal tragedy that I have yet to meet them in the flesh. But their exploits make mouth watering stories... The real meat and drink of high adventure and daring... So they say."
parent = -1

[[nodes]]
id = 5
depth = 1
kind = "speaker"
speaker = "Player"
text = "What does that mean exactly? I mean, I have some stories. I'm quite a hero myself, you may actually be talking about me?"
parent = -1

[[nodes]]
id = 6
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "They're a group of rebels fighting against the vampyres that rule over Morytania. They're known as the Myreque. Some people call them terrorists while others call them freedom fighters!"
parent = -1

[[nodes]]
id = 7
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. And you want to help them?"
parent = -1

[[nodes]]
id = 8
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "Of course. I'm a big fan of their cause. I was hoping to supply them with some new weapons. Alas, I find that I'm rather lacking in ability when it comes to this kind of thing!"
parent = -1

[[nodes]]
