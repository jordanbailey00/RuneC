kind = "speaker"
speaker = "Vanstrom Klause"
text = "There's always some evil heel ready to grind the face of humanity into the dirt. Here in Morytania, it's the vampyres! They rule over the region with an iron fist, killing any who oppose them."
parent = 20

[[nodes]]
id = 23
depth = 3
kind = "speaker"
speaker = "Vanstrom Klause"
text = "The Myreque are the only ones brave enough to stand up to them. They stay in the shadows though, lest the vampyres track them down!"
parent = 20

[[nodes]]
id = 24
depth = 3
kind = "speaker"
speaker = "Vanstrom Klause"
text = "No one knows for sure how many of them there are. The group hiding in Mort Myre supposedly has six members. There are whispers of more in other parts of Morytania though."
parent = 20

[[nodes]]
