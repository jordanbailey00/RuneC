[[nodes]]
id = 177
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "And this is not all! By finding other talismans similar to this one, you will eventually be able to craft every rune that is available on this world! Just"
parent = 161

[[nodes]]
