[[nodes]]
id = 165
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "Now as you may or may not know, many centuries ago, the wizards at this Tower learnt the secret of creating Rune Stones, which allowed us to cast Magic very easily."
parent = 161

[[nodes]]
id = 166
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "When this Tower was burnt down the secret of creating runes was lost to us for all time... except it wasn't. Some months ago, while searching these ruins for information from the old days,"
parent = 161

[[nodes]]
id = 167
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "I came upon a scroll, almost destroyed, that detailed a magical rock deep in the icefields of the North, closed off from access by anything other than magical means."
parent = 161

[[nodes]]
id = 168
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "This rock was called the 'Rune Essence' by the magicians who studied its powers. Apparently, by simply breaking a chunk from it, a Rune Stone could be fashioned very quickly and easily at certain"
parent = 161

[[nodes]]
id = 169
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "elemental altars that were scattered across the land back then. Now, this is an interesting little piece of history, but not much use to us as modern wizards without access to the Rune Essence,"
parent = 161

[[nodes]]
id = 170
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "or these elemental altars. This is where you and Aubury come into this story. A few weeks back, Aubury discovered in a standard delivery of runes to his store, a parchment detailing a"
parent = 161

[[nodes]]
id = 171
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "teleportation spell that he had never come across before. To his shock, when cast it took him to a strange rock he had never encountered before... yet that felt strangely familiar..."
parent = 161

[[nodes]]
id = 172
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "As I'm sure you have now guessed, he had discovered a portal leading to the mythical Rune Essence. As soon as he told me of this spell, I saw the importance of his find,"
parent = 161

[[nodes]]
id = 173
depth = 2
kind = "speaker"
speaker = "Sedridor"
text = "for if we could but find the elemental altars spoken of in the ancient texts, we would once more be able to create runes as our ancestors had done! It would be the saviour of the wizards' art!"
parent = 161

[[nodes]]
id = 174
depth = 2
