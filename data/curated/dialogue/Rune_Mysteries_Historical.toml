[[nodes]]
id = 52
depth = 3
kind = "speaker"
speaker = "Sedridor"
text = "Well, it is a long story from the past... Many years ago, this Wizards' Tower was a focus of great learning, as we mages studied together to try and learn the secrets behind"
parent = 50

[[nodes]]
id = 53
depth = 3
kind = "speaker"
speaker = "Sedridor"
text = "the Rune Stones that allow us to use Magic. Who makes them? Where do they come from? How many types are there? What spells can they produce? All these questions and more are still unknown to us,"
parent = 50

[[nodes]]
id = 54
depth = 3
kind = "speaker"
speaker = "Sedridor"
text = "but were once known to our ancestors. Legends tell us that in the past the mages who lived here could fashion Rune Stones almost at will, and as many as they desired."
parent = 50

[[nodes]]
id = 55
depth = 3
kind = "speaker"
speaker = "Player"
text = "But they cannot anymore?"
parent = 50

[[nodes]]
id = 56
depth = 3
kind = "speaker"
speaker = "Sedridor"
text = "No, unfortunately not. Many years past, the Wizards who follow Zamorak, the god of chaos, burned this Tower to the ground, and all who were inside."
parent = 50

[[nodes]]
id = 57
depth = 3
kind = "speaker"
speaker = "Sedridor"
text = "To this day we do not fully know why they did this terrible act, but all our research, all of our greatest magical minds were destroyed in one fell swoop."
parent = 50

[[nodes]]
id = 58
depth = 3
kind = "speaker"
speaker = "Sedridor"
text = "This is why I spend my time searching through these few remains we have left from the glorious old Tower. I hope someday to find something that will tell us once more of the mysteries of"
parent = 50

[[nodes]]
id = 59
depth = 3
kind = "speaker"
speaker = "Sedridor"
text = "the runes that we use daily, which dwindle in supply with each use. Someday I hope we may once more create our own runes, and the Wizards' Tower will once more be a place of glory!"
parent = 50

