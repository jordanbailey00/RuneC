[[nodes]]
id = 1147
depth = 1
kind = "speaker"
speaker = "Player"
text = "It's okay again, for now. Some rune guardians called the Guardians of the Rift were built to protect the temple from the Abyss. They helped us close the rift again, but they say it will soon reopen."
parent = -1

[[nodes]]
id = 1148
depth = 1
kind = "speaker"
speaker = "Archmage Sedridor"
text = "This is a disaster! I knew that teleportation matrix was too good to be true. I should have stopped this, but I was blinded by my own desires for that matrix!"
parent = -1

[[nodes]]
id = 1149
depth = 1
kind = "speaker"
speaker = "Archmage Sedridor"
text = "What of Traiborn's apprentices?"
parent = -1

[[nodes]]
id = 1150
depth = 1
kind = "speaker"
speaker = "Player"
text = "They're safe. They chose to stay and help the Guardians of the Rift keep the rift closed."
parent = -1

[[nodes]]
id = 1151
depth = 1
kind = "speaker"
speaker = "Archmage Sedridor"
text = "Then I will ensure they have all the help they need. I will also begin researching this rift at once. Maybe we can still find a way to close it permanently."
