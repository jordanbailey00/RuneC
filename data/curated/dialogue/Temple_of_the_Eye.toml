[[nodes]]
id = 1120
depth = 1
kind = "speaker"
speaker = "The Great Guardian"
text = "This temple was built to house a powerful artefact. Many sought to claim this artefact for themselves, including servants of the Fallen Empire."
parent = -1

[[nodes]]
id = 1121
depth = 1
kind = "speaker"
speaker = "The Great Guardian"
text = "In their attempt to claim the artefact, they used magic they did not understand. The rift to the Scar was created as a result."
parent = -1

[[nodes]]
id = 1122
depth = 1
kind = "speaker"
speaker = "Player"
text = "This artefact... you mean the Eye?"
parent = -1

[[nodes]]
id = 1123
depth = 1
kind = "speaker"
speaker = "The Great Guardian"
text = "You are correct. The Eye was removed after the battle, but not before the Justiciar of the Lion used it to seal the rift once more."
parent = -1

[[nodes]]
id = 1124
depth = 1
kind = "speaker"
speaker = "The Great Guardian"
text = "She then created us, the Guardians of the Rift, to protect this place in the event the rift was ever reopened."
parent = -1

[[nodes]]
id = 1125
depth = 1
kind = "speaker"
speaker = "Apprentice Felix"
text = "And we reopened it."
parent = -1

[[nodes]]
id = 1126
depth = 1
kind = "speaker"
speaker = "Apprentice Cordelia"
text = "But it's been sealed again now! The danger is gone."
parent = -1

[[nodes]]
id = 1127
depth = 1
kind = "speaker"
speaker = "The Great Guardian"
text = "Incorrect. Without the power of the Eye, we have no way to seal the rift permanently. It will soon reopen once more. You should leave before that happens."
parent = -1

[[nodes]]
id = 1128
depth = 1
kind = "speaker"
speaker = "Apprentice Tamara"
text = "No. This was our mistake. I'm staying to help fix it."
parent = -1

