[[nodes]]
id = 1143
depth = 1
kind = "speaker"
speaker = "Player"
text = "Kind of, but not really. The portal took us to the Temple of the Eye, an ancient Saradominist temple built to house a powerful artefact."
parent = -1

[[nodes]]
id = 1144
depth = 1
kind = "speaker"
speaker = "Player"
text = "Long ago, a rift to the Abyss was created in the temple, but it was sealed. At least it was, until Persten accidently opened it again..."
parent = -1

[[nodes]]
id = 1145
depth = 1
kind = "speaker"
speaker = "Player"
text = "She was sucked into the Abyss, and all these abyssal creatures came out!"
parent = -1

[[nodes]]
id = 1146
depth = 1
kind = "speaker"
speaker = "Archmage Sedridor"
text = "Abyssal creatures? We have to get in there and stop this!"
