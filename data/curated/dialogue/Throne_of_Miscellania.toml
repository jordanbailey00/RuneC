kind = "speaker"
speaker = "King Vargas"
text = "Ah, it pleases me to see such enthusiasm!"
parent = -1

[[nodes]]
id = 36
depth = 1
kind = "speaker"
speaker = "King Vargas"
text = "I was once an adventurer such as yourself; even while fulfilling my duties as King of Miscellania, I would roam the lands in search of adventure, and strike down mighty foes with a single blow!"
parent = -1

[[nodes]]
id = 37
depth = 1
kind = "speaker"
speaker = "King Vargas"
text = "Unfortunately, I was a little too daring, and attempted to brave the icelands, where I finally met my match."
parent = -1

[[nodes]]
id = 38
depth = 1
kind = "speaker"
speaker = "King Vargas"
text = "I survived, barely, but I was cursed for the rest of my life to stay in this form. Which leaves me incapable of performing my duties as ruler."
parent = -1

[[nodes]]
id = 39
depth = 1
kind = "speaker"
speaker = "King Vargas"
text = "This is why I am looking for an exceptional soul to be regent of this fair kingdom of Miscellania."
parent = -1

