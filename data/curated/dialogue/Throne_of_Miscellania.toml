[[nodes]]
id = 42
depth = 2
kind = "speaker"
speaker = "Player"
text = "If I may be so bold, Your Majesty, I think Miscellania would rest in capable hands with me."
parent = 41

[[nodes]]
id = 43
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "Hahaha! You are bold, [Fremennik name], but then I have yet to see a good ruler who was not."
parent = 41

[[nodes]]
id = 44
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "You will first have to demonstrate your worth. You are a good warrior, that I do not doubt; however ruling also requires a good grasp of diplomacy."
parent = 41

[[nodes]]
id = 45
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "We have been at war with neighbouring Etceteria for hundreds of years; however, I think both of us have rather lost our appetite for hostilities."
parent = 41

[[nodes]]
id = 46
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "Now may be an opportune time to make amends. If you manage to negotiate peace with them, then you will truly have shown your skill as a diplomat."
parent = 41

[[nodes]]
id = 47
depth = 2
kind = "speaker"
speaker = "Player"
text = "Then do not stray far, Your Majesty, for I shall soon return."
parent = 41

[[nodes]]
id = 48
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "Wait! There is one more matter to discuss... a mere formality, of course."
parent = 41

[[nodes]]
id = 49
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "By Miscellanious tradition, one may not become regent of the kingdom unless in the trust of the royal family."
parent = 41

[[nodes]]
id = 50
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "This includes that of the future king or queen. It is yet too early for me to decide which of my children should inherit the throne."
parent = 41

[[nodes]]
id = 51
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "Until then, gaining the trust of one of them should suffice. Who knows? Your choice might help me make a decision later."
parent = 41

[[nodes]]
id = 52
depth = 2
kind = "speaker"
speaker = "King Vargas"
text = "So tell me! Which of my children will you attempt to gain the trust of?"
parent = 41

