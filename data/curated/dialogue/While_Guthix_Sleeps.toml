depth = 1
kind = "speaker"
speaker = "Movario"
text = "As for my progress, you can tell Lucien that the investigations would be greatly expedited if I weren't subject to all these interruptions!"
parent = -1

[[nodes]]
id = 1589
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then allow me to expedite things myself. Time is now of the essence and Lucien's patience is wearing thin."
parent = -1

[[nodes]]
id = 1590
depth = 1
kind = "speaker"
speaker = "Movario"
text = "You would take over? Preposterous!"
parent = -1

[[nodes]]
id = 1591
depth = 1
kind = "speaker"
speaker = "Player"
text = "While Lucien has asked me to oversee your investigations, I am not unreasonable. Believe it or not, I've actually read much of your detailed research myself."
parent = -1

[[nodes]]
id = 1592
depth = 1
kind = "speaker"
speaker = "Player"
text = "You are clearly an expert in this area, and I am open to letting you continue to take the lead, provided we are able to quickly conclude our work here."
parent = -1

[[nodes]]
id = 1593
depth = 1
kind = "speaker"
speaker = "Darve"
text = "Looks like we don't have much choice, boss."
parent = -1

[[nodes]]
id = 1594
depth = 1
kind = "speaker"
speaker = "Player"
text = "Now, please share what you know with me."
parent = -1

[[nodes]]
id = 1595
depth = 1
kind = "speaker"
speaker = "Movario"
text = "Hmph. Very well. Given you have read my research, and given Lucien himself sent you, I trust you know what it is I seek."
parent = -1

[[nodes]]
id = 1596
depth = 1
kind = "speaker"
speaker = "Player"
text = "I do."
parent = -1

[[nodes]]
id = 1597
depth = 1
kind = "speaker"
speaker = "Movario"
text = "Even with all that I know, I can still scarcely even imagine it! A power beyond even the gods themselves!"
parent = -1

[[nodes]]
id = 1598
depth = 1
kind = "speaker"
speaker = "Player"
text = "I am all too aware, but all this means little given you have still not found it."
parent = -1

[[nodes]]
id = 1599
depth = 1
kind = "speaker"
speaker = "Movario"
text = "Oh, but I believe I have found it. More than that, I believe we are stood right above it."
parent = -1

[[nodes]]
id = 1600
depth = 1
kind = "speaker"
speaker = "Player"
text = "Right above it? Surely you don't mean the chasm?"
parent = -1

[[nodes]]
id = 1601
depth = 1
kind = "speaker"
speaker = "Movario"
text = "That's precisely what I mean. Perhaps now you see the issue that I face. Reaching the bottom will require a significant amount of effort."
parent = -1

[[nodes]]
id = 1602
depth = 1
kind = "speaker"
speaker = "Movario"
text = "I attempted to recruit some goblins to find a way down, but they proved... inadequate. I fear a gantry will need building, which will not be a quick process."
parent = -1

[[nodes]]
id = 1603
depth = 1
kind = "speaker"
speaker = "Player"
text = "And what about the light creatures? Are they of no use?"
