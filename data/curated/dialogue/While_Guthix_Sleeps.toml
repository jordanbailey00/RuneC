[[nodes]]
id = 1928
depth = 1
kind = "speaker"
speaker = "Lucien"
text = "Icthlarin... Zaros... Zamorak... All of them false! Finally the Mahjarrat shall take their rightful place as the sole inheritors of Gielinor, and I will be their god!"
