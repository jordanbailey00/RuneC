[[nodes]]
id = 139
depth = 2
kind = "speaker"
speaker = "Thaerisk"
text = """
We are a group who believe that too many of our fellow Guthixians have allowed themselves to become spellbound by the beauty of nature. The wider world is constantly at threat, but they no longer wish to see it.
"""
parent = 137

[[nodes]]
id = 140
depth = 2
kind = "speaker"
speaker = "Thaerisk"
text = "Our organisation is still fairly new, and many of our members are on the younger side. However, we have the backing of many senior druids such as Sanfew and Kaqemeex."
parent = 137

[[nodes]]
id = 141
depth = 2
kind = "speaker"
speaker = "Player"
text = "I hope you don't mind me saying that druids are not known to be the best fighters. How are you ensuring that you're prepared to take on these threats?"
parent = 137

[[nodes]]
id = 142
depth = 2
kind = "speaker"
speaker = "Thaerisk"
text = "You are not wrong, my friend. I have no doubt that every member of our order would willing fight to the last drop of blood if the situation required it, but it is not where our strength lies."
parent = 137

[[nodes]]
id = 143
depth = 2
kind = "speaker"
speaker = "Thaerisk"
text = """
However, I do not see that as a bad thing. The world has no shortage of warriors and heroes, and our kingdoms have armies capable of standing against many a danger. Instead, we focus on what they often lack.
"""
parent = 137

[[nodes]]
id = 144
depth = 2
kind = "speaker"
speaker = "Thaerisk"
text = "One example is our spy network. While still not quite as extensive as that of the Temple Knights, we have many who are experts in moving around unseen. After all, no one suspects a druid."
parent = 137

[[nodes]]
id = 145
depth = 2
kind = "speaker"
speaker = "Thaerisk"
text = "Then of course you have our Herblore skills, which are second to none. We are constantly making new advancements that let us supply our allies with brews and potions for all manner of purposes."
parent = 137

[[nodes]]
id = 146
depth = 2
kind = "speaker"
speaker = "Thaerisk"
text = "We're already putting many of these potions to the test in our fight against Lucien."
parent = 137

