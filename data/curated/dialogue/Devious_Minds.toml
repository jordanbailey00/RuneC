[[nodes]]
id = 55
depth = 1
kind = "speaker"
speaker = "Monk"
text = "I confess, to do so would not quite be in keeping with our rules, but for such a wonderful gift, the opportunity can't be disregarded."
parent = -1

[[nodes]]
