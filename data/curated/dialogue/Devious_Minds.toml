depth = 1
kind = "speaker"
speaker = "Player"
text = "Hmm... Fair enough. So you want me to sneak this gift onto the island? How do I do that?"
parent = -1

[[nodes]]
id = 57
depth = 1
kind = "speaker"
speaker = "Monk"
text = "Our island is home to the Runic Altar of Law. Recently, I have heard whispers of a way to access these altars via another realm."
