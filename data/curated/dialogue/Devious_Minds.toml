[[nodes]]
id = 51
depth = 1
kind = "speaker"
speaker = "Monk"
text = "I have a special gift I wish to present at the ceremony. It's one that I know my fellow monks will appreciate. As such, it feels only right that a special gift is delivered in a special way."
parent = -1

[[nodes]]
id = 52
depth = 1
kind = "speaker"
speaker = "Player"
text = "Meaning?"
parent = -1

[[nodes]]
id = 53
depth = 1
kind = "speaker"
speaker = "Monk"
text = "I would like my companions to enter the ceremony with no knowledge of the gift. It will then make for a joyous surprise for them. However, to do that, it must be smuggled onto the island."
parent = -1

