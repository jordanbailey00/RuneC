[[nodes]]
id = 1207
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I have many supporters amongst the vampyres of Darkmeyer. Your small group against all of us? The fight would be brief."
parent = -1

[[nodes]]
id = 1208
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Hiding behind larger numbers? Not very honourable."
