speaker = "Player"
text = "What do you know about this place?"
parent = 39

[[nodes]]
id = 41
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Slepe? It's wretched. The people of this town follow the teachings of Zamorak. Some are no better than the vampyres themselves."
parent = 39

[[nodes]]
id = 42
depth = 4
kind = "speaker"
speaker = "Player"
text = "Do they get on with the vampyres?"
parent = 39

[[nodes]]
id = 43
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "As well as any humans can. All settlements in Morytania must pay the vampyres in blood tithes, but the people of Slepe do so willingly."
parent = 39

[[nodes]]
id = 44
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "They see the vampyres as fellow servants of Zamorak. Of course, the vampyres only really serve themselves."
parent = 39

[[nodes]]
id = 45
depth = 4
kind = "speaker"
speaker = "Player"
text = "So why do these people follow Zamorak?"
parent = 39

[[nodes]]
id = 46
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Apparently this place was founded by a group called the Sisterhood, former healers of Saradomin that turned to Zamorak."
parent = 39

[[nodes]]
id = 47
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Their order still exists to this day. You'll probably see a few of them around the town."
parent = 39

