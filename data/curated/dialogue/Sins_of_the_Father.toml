[[nodes]]
id = 211
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Well met friend. Anything to report?"
parent = -1

[[nodes]]
id = 212
depth = 1
kind = "speaker"
speaker = "Player"
text = "You were right about the vampyres. I did some digging and discovered that they are indeed the cause of the Sleeper Plague."
parent = -1

[[nodes]]
id = 213
depth = 1
kind = "speaker"
speaker = "Player"
text = "A vampyre in the dungeon called Kroy was making infected Bloody Bracers. The local barkeep was then selling them to the townspeople."
parent = -1

[[nodes]]
id = 214
depth = 1
kind = "speaker"
speaker = "Player"
text = "I put a stop to that though. I killed Kroy and destroyed his lab. The barkeep has no supply now."
parent = -1

[[nodes]]
id = 215
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Excellent work friend. This should stop any new cases of the illness."
parent = -1

[[nodes]]
id = 216
depth = 1
kind = "speaker"
speaker = "Player"
text = "There's something else, too. While I was spying on Kroy, I saw Vanstrom Klause with another vampyre called Damien. It sounded like Damien was Kroy's boss."
parent = -1

[[nodes]]
id = 217
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "The vampyre you speak of is a noble called Damien Leucurte. He's a known quantity to us. My investigations at the manor also involved the two of them, but let's hear the rest of your findings first."
parent = -1

[[nodes]]
id = 218
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, in their conversations, it was revealed why they caused the new Sleeper Plague. Apparently, they did it to make it easier to take blood tithes."
parent = -1

[[nodes]]
id = 219
depth = 1
kind = "speaker"
speaker = "Player"
text = "But here's the interesting thing. Vanstrom didn't seem very happy with this. It sounded like Damien was doing it without his permission."
parent = -1

[[nodes]]
id = 220
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "This is all very interesting. The citizens of this town are Zamorakians and willingly give their blood to the vampyres. Why would Damien need the Sleeper Plague?"
parent = -1

[[nodes]]
id = 221
depth = 1
kind = "speaker"
speaker = "Player"
text = "He talked about increased demand from the nobles of Darkmeyer. Perhaps they have need for more blood than normal?"
parent = -1

[[nodes]]
id = 222
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "That would make sense. I've heard rumours that the vampyre population has grown such that demand for blood now exceeds supply. Damien may be looking for ways to satisfy this demand."
parent = -1

[[nodes]]
id = 223
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Even so, this seems extreme. And to go behind Vanstrom's back as well? Maybe their overcrowding issues are bigger than we first realised."
parent = -1

[[nodes]]
id = 224
depth = 1
kind = "speaker"
speaker = "Player"
text = "Maybe. So, what's our next move?"
parent = -1

[[nodes]]
id = 225
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "I have an idea about that, although my information is not quite as exciting as yours I'm afraid."
parent = -1

[[nodes]]
id = 226
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "While I was investigating the manor, I discovered that it has indeed been taken over by vampyres. Our friend Damien seems to be the leader of this group."
parent = -1

[[nodes]]
id = 227
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "During my time there, I also managed to spy on Vanstrom and Damien. I only heard a small part of their conversation, but Vanstrom didn't seem very happy, which matches up with what you heard."
parent = -1

[[nodes]]
id = 228
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "At one point, Vanstrom insulted Damien for his recklessness and accused him of demanding too much from the werewolves. Sounds like they've also been gathering extra blood without permission."
parent = -1

[[nodes]]
id = 229
depth = 1
kind = "speaker"
speaker = "Player"
text = "That sounds familiar. I suspect it was werewolves who attacked me that time at Paterdomus."
parent = -1

[[nodes]]
id = 230
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Yes, that encounter also sprung into my mind. It sounds like things are even worse now."
parent = -1

[[nodes]]
id = 231
depth = 1
kind = "speaker"
speaker = "Player"
text = "So you want to investigate the werewolves?"
parent = -1

[[nodes]]
id = 232
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "I do indeed. Something is going on in Darkmeyer that's causing this increased demand. If there's unrest in the city, we might be able to use it to our advantage."
parent = -1

[[nodes]]
id = 233
depth = 1
kind = "speaker"
speaker = "Player"
text = "What about Slepe? Should we not deal with Damien as well?"
parent = -1

[[nodes]]
id = 234
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Not yet. Your actions will have drawn attention to us. We cannot stay here. It sounds like Damien can do little without Kroy, so I doubt he'll be much trouble anyway."
parent = -1

[[nodes]]
id = 235
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Besides, we've already done too much for these Zamorakians. There are others more deserving of our time."
parent = -1

[[nodes]]
