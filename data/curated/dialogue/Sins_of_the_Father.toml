[[nodes]]
id = 19
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "This town has recently become home to an illness known as the Sleeper Plague. It's a nasty affliction. Those infected fall into a deep sleep, never to wake."
parent = 17

[[nodes]]
id = 20
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = """
Now, Morytania is no stranger to odd afflictions. However, I've been doing some digging. Apparently, this isn't the first time this illness has beset Slepe. In fact, they say it's how the town was named.
"""
parent = 17

[[nodes]]
id = 21
depth = 3
kind = "speaker"
speaker = "Player"
text = "And now the illness is back. You said you suspect the vampyres are involved?"
parent = 17

[[nodes]]
id = 22
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "I do. The first victim of the new Sleeper Plague was none other than Lady Crombwick. She rules over this town from Crombwick Manor, along with her husband."
parent = 17

[[nodes]]
id = 23
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "He's not been seen since she fell ill, and their manor has been locked down."
parent = 17

[[nodes]]
id = 24
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Here's the interesting part though. Vampyres have been seen around the manor. Apparently they showed up around the time when the Sleeper Plague returned."
parent = 17

[[nodes]]
id = 25
depth = 3
kind = "speaker"
speaker = "Player"
text = "I see where this is going. You think the vampyres are the reason the plague is back."
parent = 17

[[nodes]]
id = 26
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "I do. The question is, why?"
parent = 17

[[nodes]]
id = 27
depth = 3
kind = "speaker"
speaker = "Player"
text = "I guess that's for us to work out. Where do we start?"
parent = 17

[[nodes]]
id = 28
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "We'll split up. I'm going to try and learn more about these vampyres at the manor. While I do that, I want you to try and find the source of the illness."
parent = 17

[[nodes]]
id = 29
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "They're looking after the victims in this church here. I'd recommend you make that your starting point."
parent = 17

[[nodes]]
id = 30
depth = 3
kind = "speaker"
speaker = "Player"
text = "Sounds like a plan. Good luck."
parent = 17

[[nodes]]
id = 31
depth = 3
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "And to you. Myreque prevail."
parent = 17

