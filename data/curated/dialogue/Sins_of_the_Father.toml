speaker = "Kroy"
text = "Greetings, my lord."
parent = -1

[[nodes]]
id = 172
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "Don't tell me you had me come all the way down here for this? Look at the wretched thing, Damien. It's barely even a proper juvenile."
parent = -1

[[nodes]]
id = 173
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "Well just hang on there, Vanstrom. Kroy may not look like much, but I've never met a vampyre with a better knowledge of herblore."
parent = -1

[[nodes]]
id = 174
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "Kroy, tell him what you found."
parent = -1

[[nodes]]
id = 175
depth = 1
kind = "speaker"
speaker = "Kroy"
text = "Of course, my lord."
parent = -1

[[nodes]]
id = 176
depth = 1
kind = "speaker"
speaker = "Kroy"
text = "It was hidden deep within the sanctuary here. A recipe, for an elixir."
parent = -1

[[nodes]]
id = 177
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "An elixir?"
parent = -1

[[nodes]]
id = 178
depth = 1
kind = "speaker"
speaker = "Kroy"
text = "Yes! The ones that built the place, the Sisterhood, they called it the Elixir of Everlasting."
parent = -1

[[nodes]]
id = 179
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "And just what is this Elixir of Everlasting?"
parent = -1

[[nodes]]
id = 180
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "Those who drink it find their lives heavily extended, but at a cost. They are put into a deep sleep, never to wake."
parent = -1

[[nodes]]
id = 181
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "So the Sleeper Plague? That was your doing?"
parent = -1

[[nodes]]
id = 182
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "Indeed. Using the recipe, Kroy was easily able to recreate the elixir. After a quick test on Lady Crombwick, we started giving it to the citizens."
parent = -1

[[nodes]]
id = 183
depth = 1
kind = "speaker"
speaker = "Kroy"
text = "We hide it in their beer, Bloody Bracer. They've no idea what it's really doing to them!"
parent = -1

[[nodes]]
id = 184
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "And while they sleep, we tithe them. The sleepers only need a fraction of the blood a normal human needs, so we can take more than ever before!"
parent = -1

[[nodes]]
id = 185
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "And tell me, Damien, who gave you permission to do this?"
parent = -1

[[nodes]]
id = 186
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "The nobles of Darkmeyer make their demands Vanstrom. Someone has to meet them."
parent = -1

[[nodes]]
id = 187
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "That someone is not you. I am in charge of blood tithing. I alone decide how it is to be carried out."
parent = -1

[[nodes]]
id = 188
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "The nobles are restless. They are tired of inaction. I saw an opportunity and I took it. Lord Drakan should thank me."
parent = -1

[[nodes]]
id = 189
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "I don't doubt the ingenuity of your plan. This elixir could have great potential. The thing I doubt is your recklessness. This Sleeper Plague has attracted attention. The wrong kind of attention."
parent = -1

[[nodes]]
id = 190
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "The Myreque? Don't tell me you're scared of that lot, Vanstrom? I thought you were made of stronger stuff."
parent = -1

[[nodes]]
id = 191
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "I do not fear the Myreque. I have no need to. They have no way of touching me."
parent = -1

[[nodes]]
id = 192
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "But you on the other hand, you should be very afraid. Out here alone, without the support of the Drakan household. You're a prime target. And if what I hear is true, they're right on your doorstep."
parent = -1

[[nodes]]
id = 193
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "What's that supposed to mean?"
parent = -1

[[nodes]]
id = 194
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "The Myreque are already here in Slepe, Damien. The one that killed Ranis Drakan is among them. Your overconfidence has begun your downfall."
parent = -1

[[nodes]]
id = 195
depth = 1
kind = "speaker"
speaker = "Damien Leucurte"
text = "Well you'll have to do something. You'll need to send us some support."
parent = -1

[[nodes]]
id = 196
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "I will do no such thing. You defied Lord Drakan when you came out here. The consequences of your actions are your own to deal with."
parent = -1

[[nodes]]
id = 197
depth = 1
kind = "speaker"
speaker = "Vanstrom Klause"
text = "Now, if you'll excuse me, I will be on my way. There are things in Darkmeyer that require my attention."
parent = -1

