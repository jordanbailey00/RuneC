[[nodes]]
id = 551
depth = 1
kind = "speaker"
speaker = "Polmafi Ferdygris"
text = "Hello there. Have you spoken to Veliaf and Safalaan?"
parent = -1

[[nodes]]
id = 552
depth = 1
kind = "speaker"
speaker = "Player"
text = "Not yet."
parent = -1

[[nodes]]
id = 553
depth = 1
kind = "speaker"
speaker = "Polmafi Ferdygris"
text = "Ah, probably best that you do. That vampyre could arrive at any moment."
parent = -1

[[nodes]]
id = 554
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 555
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Veliaf! It has been far too long my friend."
parent = -1

[[nodes]]
id = 556
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Good to see you, Safalaan. Though I wish it were under better circumstances."
parent = -1

[[nodes]]
id = 557
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Indeed. And [player name], good to see you as well. Myreque prevail."
parent = -1

[[nodes]]
id = 558
depth = 1
kind = "speaker"
speaker = "Player"
text = "Myreque prevail, Safalaan. How are things in Meiyerditch?"
parent = -1

[[nodes]]
id = 559
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "As dark as ever, my friend. The vyrewatch have doubled their efforts to find us since the death of Ranis and the citizens are being tithed more than ever before."
parent = -1

[[nodes]]
id = 560
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "That said, it does feel like there is now a glimmer of hope where previously there was only darkness. While more ferocious, the vampyres also seem a bit more cautious now."
parent = -1

[[nodes]]
id = 561
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "They know we can kill them. They finally know what fear feels like."
parent = -1

[[nodes]]
id = 562
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "We're also seeing greater support from the people than ever before. Whereas once they'd only speak of the Myreque in whispers, now they speak of us loudly and with pride."
parent = -1

[[nodes]]
id = 563
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Anyway, let's focus on the matter at hand. I must say Veliaf, over the years I've come to expect the unexpected, but your message was something else altogether."
parent = -1

[[nodes]]
id = 564
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "I mean, Vanescula Drakan herself! We find ourselves in very strange times."
parent = -1

[[nodes]]
id = 565
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Strange, and also dangerous. I do not like any aspect of this."
parent = -1

[[nodes]]
id = 566
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Well I won't pretend this isn't risky. But I have faith in [player name], here. The first human to kill a vyre, and quite the vyre it was. Vanescula would be unwise to try anything."
parent = -1

[[nodes]]
id = 567
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Speaking of [player name], about that other matter I mentioned in my message..."
parent = -1

[[nodes]]
id = 568
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Ah, of course. [player name], after due consideration by Veliaf and I, we would like to promote you to the rank of lieutenant in the Myreque. Congratulations!"
parent = -1

[[nodes]]
id = 569
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "You've done well, friend. I realise it doesn't mean much, but we wanted to thank you in some way for all of your work so far."
parent = -1

[[nodes]]
id = 570
depth = 1
kind = "speaker"
speaker = "Player"
text = "Thank you. It's a great honour."
parent = -1

[[nodes]]
id = 571
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "I wish we had time to celebrate, but time is in short supply these days. I imagine Vanescula will be here very soon. Are we ready?"
parent = -1

[[nodes]]
id = 572
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "As ready as we'll ever be. Let's do this."
parent = -1

[[nodes]]
id = 573
depth = 1
kind = "other"
text = "{{qact|Vanescula arrives at the Icyene Graveyard.}}"
parent = -1

[[nodes]]
id = 574
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Well Vanescula, here we are. All the Myreque, just like you wanted."
parent = -1

[[nodes]]
id = 575
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Your move."
parent = -1

[[nodes]]
id = 576
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I'm impressed Veliaf. I did fear you'd go and do something silly."
parent = -1

[[nodes]]
id = 577
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Skip the small talk. Why are we here?"
parent = -1

[[nodes]]
id = 578
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Fine. Conversing with you is a chore, anyway."
parent = -1

[[nodes]]
id = 579
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "The reason I have gathered you all here is because I have an offer for you."
parent = -1

[[nodes]]
id = 580
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Now I won't deny, you've not done a bad job. Killing Ranis was no small achievement, but you managed it all the same."
parent = -1

[[nodes]]
id = 581
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Unfortunately for you, you're still no closer to the true prize."
parent = -1

[[nodes]]
id = 582
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Lowerniel Drakan."
parent = -1

[[nodes]]
id = 583
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Indeed. That is why I have come to you. Only with my help will you have any hope of killing my brother."
parent = -1

[[nodes]]
id = 584
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "And what do you gain from this?"
parent = -1

[[nodes]]
id = 585
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Long ago, the land of Morytania was known as Hallowvale and it was ruled over by a race of Saradominists called the icyene."
parent = -1

[[nodes]]
id = 586
depth = 1
kind = "speaker"
speaker = "Polmafi Ferdygris"
text = "But then your brother came along."
parent = -1

[[nodes]]
id = 587
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Correct. Hallowvale was taken over by my kind, and Lowerniel became ruler of the newly named Morytania."
parent = -1

[[nodes]]
id = 588
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "And you know what? It was the worst thing that ever happened to us."
parent = -1

[[nodes]]
id = 589
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "My brother was a great conqueror, make no mistake. But he is a poor ruler. And now, thanks to him, our society is collapsing."
parent = -1

[[nodes]]
id = 590
depth = 1
kind = "speaker"
speaker = "Ivan Strom"
text = "Collapsing how?"
parent = -1

[[nodes]]
id = 591
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I know you've already been investigating Damien Leucurte and his not so secret arrangement with some of Darkmeyer's nobles."
parent = -1

[[nodes]]
id = 592
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Tell me, have you worked out why this arrangement exists?"
parent = -1

[[nodes]]
id = 593
depth = 1
kind = "speaker"
speaker = "Player"
text = "We could have a good guess."
parent = -1

[[nodes]]
id = 594
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Well I can give you better than guesses. Allow me to offer some clarity."
parent = -1

[[nodes]]
id = 595
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Every day that goes by, the number of humans in Morytania decreases. Yet while this happens, our population continues to grow. Unsurprisingly, we no longer have enough blood to go around."
parent = -1

[[nodes]]
id = 596
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Yeah, yeah. We've suspected as much for a long time. Why is this relevant?"
parent = -1

[[nodes]]
id = 597
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = """
It's relevant because while all of this happens, our great leader remains absent. Lowerniel never liked to show his face, but these days it's as if he doesn't even exist. He spends months in his chambers, refusing to see anyone.
"""
parent = -1

[[nodes]]
id = 598
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "So you wish to take his place. What makes you think we'll help you with that?"
parent = -1

[[nodes]]
id = 599
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "There was once a time where humans and vampyres lived together in a great empire. Under my rule, I would see us return to that way of life."
parent = -1

[[nodes]]
id = 600
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Morytania would become a land of peace and prosperity, with humans and vampyres living side by side."
parent = -1

[[nodes]]
id = 601
depth = 1
kind = "speaker"
speaker = "Kael Forshaw"
text = "Or we could just kill both you and your brother and take back Morytania for humanity!"
parent = -1

[[nodes]]
id = 602
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Ha! You could try. Even if you were to succeed though, which isn't likely, one of the other vampyre lords or ladies would just take over instead."
parent = -1

[[nodes]]
id = 603
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "No. If you want to save your people, my way is the only way."
parent = -1

[[nodes]]
id = 604
depth = 1
kind = "speaker"
speaker = "Ivan Strom"
text = "Why do you need us though? Why not just kill your brother yourself?"
parent = -1

[[nodes]]
id = 605
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I could, but even today there are many in Darkmeyer who still blindly believe in Lowerniel. It will be much easier for me to take his place if I am not responsible for his demise."
parent = -1

[[nodes]]
id = 606
depth = 1
kind = "speaker"
speaker = "Vertida Sefalatis"
text = "You'd have us become your scapegoats."
parent = -1

[[nodes]]
id = 607
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Is that such a bad thing? Your people would consider you heroes. You'd be the ones to finally kill Lowerniel Drakan."
parent = -1

[[nodes]]
id = 608
depth = 1
kind = "speaker"
speaker = "Radigad Ponfit"
text = "How do we know you won't just kill us once this is done?"
parent = -1

[[nodes]]
id = 609
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "You don't. But Castle Drakan is impenetrable. You'll never get inside on your own, and Lowerniel clearly has no intention of coming out. This is your only option."
parent = -1

[[nodes]]
id = 610
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Oh, it's probably also worth mentioning that I can't afford any loose ends. If you decline, I would expect you to leave Morytania immediately."
parent = -1

[[nodes]]
id = 611
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "To stay would have dire consequences for your life expectancy."
parent = -1

[[nodes]]
id = 612
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Say we accept your offer. How do you propose to get us into the castle?"
parent = -1

[[nodes]]
id = 613
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Ah yes, the plan itself. You will pose as my prisoners and I shall escort you to Castle Drakan. Your capture is something that even Lowerniel will be unable to ignore."
parent = -1

[[nodes]]
id = 614
depth = 1
kind = "speaker"
speaker = "Player"
text = "And once inside, we kill him."
parent = -1

[[nodes]]
id = 615
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Exactly. A nice and simple plan."
parent = -1

[[nodes]]
id = 616
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Too simple, if you ask me."
parent = -1

[[nodes]]
id = 617
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Never happy are you Veliaf?"
parent = -1

[[nodes]]
id = 618
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Of course I'm not happy. You expect us to just hop into bed with you? You are the enemy! You always have been, and you always will be! We will have no part in this."
parent = -1

[[nodes]]
id = 619
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Come now, don't be so hasty. You should at least think things over. While you do, I would appreciate a private chat with Safalaan."
parent = -1

[[nodes]]
id = 620
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Me?"
parent = -1

[[nodes]]
id = 621
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Yes, you. Join me by the large mausoleum at the back of the graveyard. There is something we need to discuss."
parent = -1

[[nodes]]
id = 622
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "What makes you think we're just going to let you walk off with him?"
parent = -1

[[nodes]]
id = 623
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "This is growing boringly repetitive, Veliaf. For the last time, if I wanted any of you dead, I'd have done it by now."
parent = -1

[[nodes]]
id = 624
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "It's alright Veliaf. I will go."
parent = -1

[[nodes]]
id = 625
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Hmm. Well [player name] has to go with you. I want him there in case Vanescula here tries anything."
parent = -1

[[nodes]]
id = 626
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Very well. Safalaan, [player name], if you'll please join me."
parent = -1

[[nodes]]
id = 627
depth = 1
kind = "other"
text = "{{qact|The meeting ends.}}"
parent = -1

[[nodes]]
id = 628
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Safalaan Hallow. Interesting name, isn't it?"
parent = -1

[[nodes]]
id = 629
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "What of it?"
parent = -1

[[nodes]]
id = 630
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "The name 'Hallow'. Do you know where it comes from?"
parent = -1

[[nodes]]
id = 631
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "It's common in these parts. They say it was the name of the old Saradominist rulers."
parent = -1

[[nodes]]
id = 632
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Spot on. You know your history. The family of icyene that ruled over Hallowvale were the Hallow family. And so of course, the name of the region is no coincidence."
parent = -1

[[nodes]]
id = 633
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "I'm surprised your brother didn't have it renamed 'Drakanvale'."
parent = -1

[[nodes]]
id = 634
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Good name, but not really his style I'm afraid."
parent = -1

[[nodes]]
id = 635
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "What's your game, Vanescula? Why do you care about my name?"
parent = -1

[[nodes]]
id = 636
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Do you not find it odd that you share a name with the former royal family?"
parent = -1

[[nodes]]
id = 637
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "No, I don't. Like I say, around here the name is pretty ordinary."
parent = -1

[[nodes]]
id = 638
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Ah, but you are far from ordinary, aren't you Safalaan? Tell me, how much do you remember of your childhood?"
parent = -1

[[nodes]]
id = 639
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Nothing. I remember nothing of my childhood. You can thank your friend Vanstrom for that. He always wanted me dead, even back before the Myreque were a thing. One day he nearly succeeded."
parent = -1

[[nodes]]
id = 640
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "But your powers stopped him?"
parent = -1

[[nodes]]
id = 641
depth = 1
kind = "speaker"
speaker = "Player"
text = "You know about Safalaan's powers?"
parent = -1

[[nodes]]
id = 642
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I know many things about Safalaan. It's why we are here, in fact. But please, go on."
parent = -1

[[nodes]]
id = 643
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "It's why we're here? What do you mean? What is all this?"
parent = -1

[[nodes]]
id = 644
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Finish your story. I promise that everything will be made clear."
parent = -1

[[nodes]]
id = 645
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Fine, but it's starting to seem like you already know everything anyway."
parent = -1

[[nodes]]
id = 646
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "You're right about my powers. I was able to use them to drive Vanstrom away. It came at a cost though."
parent = -1

[[nodes]]
id = 647
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "I remember nothing of the event, nor of anything that happened in my life before it. The only thing I remembered was my name."
parent = -1

[[nodes]]
id = 648
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "There, story told. Now, tell me, why are we having this conversation?"
parent = -1

[[nodes]]
id = 649
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "This graveyard is no normal graveyard. It was once the private graveyard of the Hallow family. Every member of the royal family was buried here."
parent = -1

[[nodes]]
id = 650
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "When she was still in power, the ruler of Hallowvale, Queen Efaritay Hallow, had this mausoleum built. It was constructed to one day house her and her human husband, King Ascertes Hallow."
parent = -1

[[nodes]]
id = 651
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Inside, I believe you will find the truth that you've spent your whole life searching for."
parent = -1

[[nodes]]
id = 652
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Stop with these games! If you know something, tell me!"
parent = -1

[[nodes]]
id = 653
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Would you actually believe me if I did? To you, my words are just that, words. Inside this mausoleum lies something far more reliable, proof."
parent = -1

[[nodes]]
id = 654
depth = 1
kind = "speaker"
speaker = "Player"
text = "The door is locked."
parent = -1

[[nodes]]
id = 655
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Well noted. We'll need to unlock it."
parent = -1

[[nodes]]
id = 656
depth = 1
kind = "speaker"
speaker = "Player"
text = "I bet I can get it open."
parent = -1

[[nodes]]
id = 657
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Wonderful. It's an interesting lock. The icyene always were devious. From what I can tell, you'll need to ensure that the total value of each row and column matches the number at the end."
parent = -1

[[nodes]]
id = 658
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Now, off you go."
parent = -1

[[nodes]]
