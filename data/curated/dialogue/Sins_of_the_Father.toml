speaker = "Safalaan Hallow"
text = "But... I don't understand..."
parent = -1

[[nodes]]
id = 701
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I realise it's a lot to take in."
parent = -1

[[nodes]]
id = 702
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "No. What I mean is, you said that this tomb was built for Efaritay and Ascertes, for my mother and father. But they're not here."
parent = -1

[[nodes]]
id = 703
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Where are they Vanescula?"
parent = -1

[[nodes]]
id = 704
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Safalaan I..."
parent = -1

[[nodes]]
id = 705
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "No! No more games! I know why you've done this. You don't care for me. You're just trying to manipulate me!"
parent = -1

[[nodes]]
id = 706
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Well fine, it worked. If you want my support in killing your brother, you will have it. But you must tell me, where are my parents?"
parent = -1

[[nodes]]
id = 707
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "The war for this land was long and bloody. We were winning, but with heavy losses. Lowerniel didn't mind. He was a hunter and a warrior. In his eyes, there was no death more noble than one in battle."
parent = -1

[[nodes]]
id = 708
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Many didn't share that view though, and wanted the war to be over. Ranis was one of them. He managed to infiltrate Efaritay's castle. Once inside, he captured your father, Ascertes."
parent = -1

[[nodes]]
id = 709
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "And?"
parent = -1

[[nodes]]
id = 710
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Efaritay surrendered that same day. She walked into Lowerniel's camp, alone, and willingly handed herself in. I guess she had hoped that Lowerniel would free your father in exchange for her."
parent = -1

[[nodes]]
id = 711
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "But he didn't, did he?"
parent = -1

[[nodes]]
id = 712
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "No. After that, I'm afraid I don't know what happened to your mother. No one ever saw her again. Only Lowerniel himself knows her fate."
parent = -1

[[nodes]]
id = 713
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "And my father?"
parent = -1

[[nodes]]
id = 714
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Like I said, we suffered heavy losses in the war. We needed a way to quickly restore our numbers. Vampyrification was the answer. Your father was the first of many to go through the process."
parent = -1

[[nodes]]
id = 715
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "You turned him into a vampyre? You monsters!"
parent = -1

[[nodes]]
id = 716
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Lowerniel turned him into a vampyre, not I."
parent = -1

[[nodes]]
id = 717
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "But you were there, by his side. Do you expect me to believe that you're not just like him?"
parent = -1

[[nodes]]
id = 718
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I can't control what you believe, but I am not the enemy here."
parent = -1

[[nodes]]
id = 719
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "What happened then? After you had your way with him, what became of my father?"
parent = -1

[[nodes]]
id = 720
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "He still lives to this day, under a different name of course."
parent = -1

[[nodes]]
id = 721
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "What name? Tell me!"
parent = -1

[[nodes]]
id = 722
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Vanstrom Klause."
parent = -1

[[nodes]]
id = 723
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "No! You're lying! You said it yourself earlier, I have no reason to believe you!"
parent = -1

[[nodes]]
id = 724
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Everything I have told you is the truth. Only you can decide if you want to believe it."
