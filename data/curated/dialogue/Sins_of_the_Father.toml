[[nodes]]
id = 51
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "What I told you is pretty much what I know. The illness causes people to fall to sleep, never to wake again."
parent = 49

[[nodes]]
id = 52
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "There's a rumour that the infected are also granted immortality, though I don't know if there's any truth in this."
parent = 49

[[nodes]]
id = 53
depth = 4
kind = "speaker"
speaker = "Player"
text = "To be honest, immortality doesn't seem very useful if you're unable to wake up."
parent = 49

[[nodes]]
id = 54
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Indeed. If history is to be believed, this is the second time the Sleeper Plague has hit Slepe. The first occurrence was many years ago and is supposedly what gave the town its name."
parent = 49

[[nodes]]
id = 55
depth = 4
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "That's all I know. That said, I suspect you might be able to learn more if you do some digging around town."
parent = 49

