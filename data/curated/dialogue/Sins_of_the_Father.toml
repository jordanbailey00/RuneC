[[nodes]]
id = 1211
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Yes, yes. Wonderful to see you. Shall we get on with things?"
parent = -1

[[nodes]]
id = 1212
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "Go ahead."
parent = -1

[[nodes]]
id = 1213
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Well, the research you recovered has confirmed something I have long suspected."
parent = -1

[[nodes]]
id = 1214
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Which is?"
parent = -1

[[nodes]]
id = 1215
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Queen Efaritay was a renowned botanist. She used this to her advantage many times during the war, breeding all kinds of plant life to use against us."
parent = -1

[[nodes]]
id = 1216
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "One of these plants was the Blisterwood tree. The icyene used the sap of this tree to create poisons that were deadly to vampyres."
parent = -1

[[nodes]]
id = 1217
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "However, I've always suspected the tree might have other uses. Clearly the researchers in the Haemalchemy Laboratory thought the same."
parent = -1

[[nodes]]
id = 1218
depth = 1
kind = "speaker"
speaker = "Player"
text = "So what did they find out?"
parent = -1

[[nodes]]
id = 1219
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "It seems that the bark of the Blisterwood tree can be used to create weapons that are deadly to my kind."
parent = -1

[[nodes]]
id = 1220
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "How?"
parent = -1

[[nodes]]
id = 1221
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = """
Well I'm no scientist, oddly enough. But from what I can tell, even when chopped away, the wood of the tree is very much alive. It shifts and grows in unpredictable ways, rendering our immunities useless.
"""
parent = -1

[[nodes]]
id = 1222
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "I see where we're going with this. You want us to use this tree to construct new weapons?"
parent = -1

[[nodes]]
id = 1223
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Well... not quite. While not perfect, the work you've already done has potential. I see no need to completely discard it."
parent = -1

[[nodes]]
id = 1224
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Instead, I suggest we use wood from the Blisterwood tree to enhance the weapons you already have. When combined with the wood, I imagine that flail of yours will be quite effective."
parent = -1

[[nodes]]
id = 1225
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Perfect for killing your brother. Assuming you don't kill us first."
parent = -1

[[nodes]]
id = 1226
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Again with this? I've already told you, I have no need to kill you. Once Lowerniel is gone, I envisage a new age, where my kind and yours live in harmony. I need you alive for that."
parent = -1

[[nodes]]
id = 1227
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "I'll believe it when I see it."
parent = -1

[[nodes]]
id = 1228
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "That's fine by me."
parent = -1

[[nodes]]
id = 1229
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "We're getting sidetracked here. We need some wood from this Blisterwood tree. Where do we find it?"
parent = -1

[[nodes]]
id = 1230
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Ah... that's the tricky bit. I know only of one Blisterwood tree. It lies in Efaritay's old Arboretum, in the middle of Darkmeyer."
parent = -1

[[nodes]]
id = 1231
depth = 1
kind = "speaker"
speaker = "Safalaan Hallow"
text = "It's in the capital? We'll have no hope of getting in there."
parent = -1

[[nodes]]
id = 1232
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "I don't see why we'd need to. Vanescula here can get some of this wood for us."
parent = -1

