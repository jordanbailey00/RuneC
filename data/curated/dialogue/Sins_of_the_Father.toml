id = 410
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Ah, and there I was thinking we were starting to become friends. Fine. I'm here to make you an offer. A once in a lifetime offer."
parent = -1

[[nodes]]
id = 411
depth = 1
kind = "speaker"
speaker = "Ivan Strom"
text = "Which is?"
parent = -1

[[nodes]]
id = 412
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "You've already killed one of my brothers. Now I offer you the chance to kill the other."
parent = -1

[[nodes]]
id = 413
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Alone, you have no hope of ever getting close to Lowerniel. Now, I on the otherhand, can get you right into his chambers at Castle Drakan."
parent = -1

[[nodes]]
id = 414
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "And why would you want that?"
parent = -1

[[nodes]]
id = 415
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I have my reasons."
parent = -1

[[nodes]]
id = 416
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Care to share them?"
parent = -1

[[nodes]]
id = 417
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "I will, but not here."
parent = -1

[[nodes]]
id = 418
depth = 1
kind = "speaker"
speaker = "Player"
text = "Where then?"
parent = -1

[[nodes]]
id = 419
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "To the south east of Meiyerditch, there's an old graveyard. The Icyene Graveyard, we call it. Gather the Myreque, every member, and meet me there. That is where I will present my proposal."
parent = -1

[[nodes]]
id = 420
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "Every member of the Myreque? Do you take us for fools? You're trying to lure us all there to wipe us out."
parent = -1

[[nodes]]
id = 421
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "As I said to you earlier, Veliaf, if I wanted you dead I'd have done it long ago."
parent = -1

[[nodes]]
id = 422
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "You're bluffing!"
parent = -1

[[nodes]]
id = 423
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Am I? So if I were to head to the Burgh de Rott inn and go down into the basement, what would I find?"
parent = -1

[[nodes]]
id = 424
depth = 1
kind = "speaker"
speaker = "Veliaf Hurtz"
text = "You..."
parent = -1

[[nodes]]
id = 425
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "If I were to give the order, I could have the heads of every member of the Myreque mounted above the gates of Castle Drakan before the day is out."
parent = -1

[[nodes]]
id = 426
depth = 1
kind = "speaker"
speaker = "Ivan Strom"
text = "Don't be so sure. There's more of us than you think."
parent = -1

[[nodes]]
id = 427
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "Is there now? Do you refer to the elusive Calsidiu, the apparent leader of the Myreque?"
parent = -1

[[nodes]]
id = 428
depth = 1
kind = "speaker"
speaker = "Vanescula Drakan"
text = "A lie, I'm afraid. I know exactly how many of you there are. And that number isn't as big as you'd like to pretend."
parent = -1

[[nodes]]
id = 429
depth = 1
kind = "speaker"
speaker = "Ivan Strom"
text = "A lie? Veliaf..."
parent = -1

[[nodes]]
id = 430
depth = 1
kind = "speaker"
speaker = "Player"
text = "You've made your point Vanescula. How do we get to this graveyard?"
