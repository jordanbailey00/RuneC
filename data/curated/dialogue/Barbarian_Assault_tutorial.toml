title = "Transcript:Barbarian Assault tutorial"
npcs = ["Captain Cain"]
node_count = 142

[[nodes]]
id = 0
depth = 1
kind = "box"
text = "-- Introduction to the Arena --"
parent = -1

[[nodes]]
id = 1
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "This is the Barbarian Assault arena."
parent = -1

[[nodes]]
id = 2
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
It was established as a battleground to fight a race of creatures called the 'Penance'. The Penance have been created upon this planet by the gods. You see, we have performed many dishonourable deeds over the years
"""
parent = -1

[[nodes]]
id = 3
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "and it's for this that the gods have created these creatures on Gielinor."
parent = -1

[[nodes]]
id = 4
depth = 1
kind = "speaker"
speaker = "Player"
text = "Really? How can you be sure?"
parent = -1

[[nodes]]
id = 5
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Quiet, you piteous-pool-of-black-dragon-dribble!"
parent = -1

[[nodes]]
id = 6
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "We never question what is fact."
parent = -1

[[nodes]]
id = 7
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "What was I saying...?"
parent = -1

[[nodes]]
id = 8
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Oh yes, we have established this place for all to pay their debt to the gods, through combat. For this is the only true honour."
parent = -1

[[nodes]]
id = 9
depth = 1
kind = "speaker"
speaker = "Player"
text = "Isn't fighting wrong?"
parent = -1

[[nodes]]
id = 10
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "What...?"
parent = -1

[[nodes]]
id = 11
depth = 1
kind = "speaker"
speaker = "Player"
text = "Just ignore me, I don't really know what I'm saying."
parent = -1

[[nodes]]
id = 12
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
Exactly. Well, in the arena below you can fight the Penance in teams of five players and, if you make it through nine waves of these monsters, we will pit you against their Queen. You can go through these waves
"""
parent = -1

[[nodes]]
id = 13
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "as many times as you wish."
parent = -1

[[nodes]]
id = 14
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 15
depth = 1
kind = "box"
text = "-- Getting Started --"
parent = -1

[[nodes]]
id = 16
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You will notice a ladder in the centre of this room. If you go down it you will find the briefing rooms. It's within these that you can sign up a team of four other players to enter the game with."
parent = -1

[[nodes]]
id = 17
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Heading down the ladder..."
parent = -1

[[nodes]]
id = 18
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
You will notice there are ten numbered rooms - one for each wave of Penance you can fight - so you should go and stand in the wave room that you wish to start on, so long as you have reached that level.
"""
parent = -1

[[nodes]]
id = 19
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
There are tables within each room from which you can pick up a scroll. Simply select 'use' on this scroll, then click on another player. You need to get the signature of four other members you want in your team.
"""
parent = -1

[[nodes]]
id = 20
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Alternatively you can join someone else's team if they use the scroll on you."
parent = -1

[[nodes]]
id = 21
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
With a full team enlisted, add your name to the scroll by right-clicking and selecting 'Write-role', then proceed down one of the ladders to start a game. Note that you need to have 'Accept Aid' on to be signed up.
"""
parent = -1

[[nodes]]
id = 22
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You will also notice an additional larger room. In there, you don't have to sign up people to play with, just enter, and when there are enough people, we will start a game for you."
parent = -1

[[nodes]]
id = 23
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 24
depth = 1
kind = "box"
text = "-- Playing the Game --"
parent = -1

[[nodes]]
id = 25
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Going down the ladder from a recruitment room, this is the arena in which you shall be fighting."
parent = -1

[[nodes]]
id = 26
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Once you have entered the battle, your task depends on which of the four roles you have chosen: Attacker, Defender, Collector or Healer. I will explain these roles shortly."
parent = -1

[[nodes]]
id = 27
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Each role is provided with a different piece of information in their interface. This information must be communicated to other members of your team using a horn, which we shall provide..."
parent = -1

[[nodes]]
id = 28
depth = 1
kind = "box"
text = "pic=Attacker horn detail.png|A Penance-calling horn"
parent = -1

[[nodes]]
id = 29
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
The Penance use a form of telepathic communication, which one of our elders has managed to tap into and relay to anyone. You are rewarded 'Honour Points' dependant on how well you fight, which can later be
"""
parent = -1

[[nodes]]
id = 30
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "exchanged for rewards."
parent = -1

[[nodes]]
id = 31
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 32
depth = 1
kind = "box"
text = "-- The Attacker Role --"
parent = -1

[[nodes]]
id = 33
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Starting the game, all players are given an icon to show what role they are playing. If you choose to be an Attacker, you will find yourself with a red symbol around your feet."
parent = -1

[[nodes]]
id = 34
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "The Attacker can use melee, ranged or magic to attack the..."
parent = -1

[[nodes]]
id = 35
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "...Penance Fighters..."
parent = -1

[[nodes]]
id = 36
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "...and the Penance Rangers."
parent = -1

[[nodes]]
id = 37
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "These monsters have an intuitive defensive system that allows them to protect against different types of attack. This is good for them, but bad for you."
parent = -1

[[nodes]]
id = 38
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You will need to adopt one of four different fighting stances to overcome the Penance, which can be accessed via the combat menu."
parent = -1

[[nodes]]
id = 39
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "If you attack in the wrong stance, your attacks will backfire against you."
parent = -1

[[nodes]]
id = 40
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "The stance you are supposed to use will be displayed in the interface at the top right corner, next to the 'ear' icon - this is the information you last heard from the Collector."
parent = -1

[[nodes]]
id = 41
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "In this role, you are also responsible for telling the Collector what they have to do. Use the horn we give you to call out what is displayed next to the 'mouth' icon."
parent = -1

[[nodes]]
id = 42
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "So, to recap: DO what is next to the EAR icon; SHOUT out what is next to the MOUTH icon."
parent = -1

[[nodes]]
id = 43
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
Shouting out updates the other players' interfaces, so you need to make sure you regularly shout out the information next to the mouth. You will also see the current wave you are on and the role you are working
"""
parent = -1

[[nodes]]
id = 44
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "with."
parent = -1

[[nodes]]
id = 45
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You can get all the runes and arrows you could possibly need from the Attacker machine near the room's entrance - the machine with a red 'sword' symbol on it."
parent = -1

[[nodes]]
id = 46
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You may want to check out the statues of the Penance Ranger and Penance Fighter near the entrance. It may give you a better idea of what you are up against when playing as an Attacker."
parent = -1

[[nodes]]
id = 47
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 48
depth = 1
kind = "box"
text = "-- The Defender Role --"
parent = -1

[[nodes]]
id = 49
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "If you're a Defender, you will find yourself with the blue symbol around your feet."
parent = -1

[[nodes]]
id = 50
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "As the Defender, you will have to stop the Penance Runners."
parent = -1

[[nodes]]
id = 51
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
These Penance Runners will start off at the far north end of the arena and make their way to the south end. This is a trick we are playing on them - luring them with the smell of their Queen - to test you.
"""
parent = -1

[[nodes]]
id = 52
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "As the Defender, the only way to stop these Penance is to lure them towards traps on the floor. There is one each at the east and west edges of the arena."
parent = -1

[[nodes]]
id = 53
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
You can lure them with a selection of food that's available from the Defender machine near the room's entrance - the machine with a blue 'shield' symbol on it. There are different types of food that you must drop
"""
parent = -1

[[nodes]]
id = 54
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "on the floor in their vicinity, before finally dropping a piece next to the trap."
parent = -1

[[nodes]]
id = 55
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "The type of food you are supposed to use (worms, tofu or crackers) will be displayed in the interface at the top right corner, next to the 'ear' icon. This is transmitted to you by the Healer."
parent = -1

[[nodes]]
id = 56
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
The type of food changes as the Penance Runners wisen to your tactics, and if you use the wrong food type, the Penance Runners will discover your plans and head back from where they came. In this role, you
"""
parent = -1

[[nodes]]
id = 57
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "will also be responsible for telling the Healer the information they need. Simply use the horn we give you to call out what is next to the 'mouth' symbol."
parent = -1

[[nodes]]
id = 58
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Unfortunately, the traps don't last forever. You must fix them with the materials to the north."
parent = -1

[[nodes]]
id = 59
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You can also use these materials to build barricades over the cave entrances to slow down the Penance."
parent = -1

[[nodes]]
id = 60
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Have a look at the statue of the Penance Runner near the entrance, if you want to learn a little more about these strange creatures."
parent = -1

[[nodes]]
id = 61
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 62
depth = 1
kind = "box"
text = "-- The Collector Role --"
parent = -1

[[nodes]]
id = 63
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "By choosing to be a Collector, you'll find yourself with a yellow symbol."
parent = -1

[[nodes]]
id = 64
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
In the Collector role, you must pick up eggs that are dropped by defeated Penance. You can only hold so many at a time, but you can temporarily store them in a bag that we will provide you with when you enter.
"""
parent = -1

[[nodes]]
id = 65
depth = 1
kind = "box"
text = "pic=Collection bag (very small) detail.png|Collector bag"
parent = -1

[[nodes]]
id = 66
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You must then take these eggs, and load them into the launchers up on the podiums, so they can be fired at the Penance. There are three types of egg: explosive, poison and stun."
parent = -1

[[nodes]]
id = 67
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
It's not quite as simple as that, though, because you can only pick up eggs of a certain colour at a certain time. This is because they have a special defence mechanism and will explode upon being touched.
"""
parent = -1

[[nodes]]
id = 68
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
The correct colour will be displayed in the interface at the top right corner, next to the 'ear' icon. This is communicated to you by the Attacker. You will also be responsible for telling the Attacker what type of stance
"""
parent = -1

[[nodes]]
id = 69
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "to use, by calling out what is next to the 'mouth' icon. So, to recap: DO what is next to the EAR symbol; SHOUT what is next to the MOUTH symbol."
parent = -1

[[nodes]]
id = 70
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
I suggest you have a look at the statues of the various Penance, at the entrance to this arena. It may give you a better idea of what you'll be trying to avoid as you collect eggs, if you choose to be a Collector.
"""
parent = -1

[[nodes]]
id = 71
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 72
depth = 1
kind = "box"
text = "-- The Healer Role --"
parent = -1

[[nodes]]
id = 73
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "By choosing to be a Healer, you will have a green circle around your feet. As a Healer, your job is to heal players and poison..."
parent = -1

[[nodes]]
id = 74
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "...the Penance healers. Look at those nasty teeth! They will heal their own kind and poison your team mates."
parent = -1

[[nodes]]
id = 75
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You can get vials from the Healer machine near the room's entrance - the machine with a green 'star' symbol on it. These vials can be used with the nearby spring..."
parent = -1

[[nodes]]
id = 76
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "...to fill up and create a special healing potion for use on other players."
parent = -1

[[nodes]]
id = 77
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "The dispenser also gives poisoned food that you can use on the Penance Healers. There are three kinds of this poisoned food that you can use - tofu, worms and meat."
parent = -1

[[nodes]]
id = 78
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
The type to use will be displayed on the interface at the top right, next to the 'ear' icon, which is communicated to you by the Defender. You will also be responsible for telling the Defender which type of food they should be
"""
parent = -1

[[nodes]]
id = 79
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "using, by calling out with the horn what is next to the 'mouth' icon. So, to recap: DO what is next to the EAR icon; SHOUT what is next to the MOUTH icon."
parent = -1

[[nodes]]
id = 80
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Along the bottom you will see the names of the other players and the state of their health. Keep this in mind and watch out for players that shout for your help."
parent = -1

[[nodes]]
id = 81
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "It'd be a good idea for you to take a look at the statue of the Penance Healer near the entrance. It should help you better understand what you would have to do should you choose the role of Healer."
parent = -1

[[nodes]]
id = 82
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 83
depth = 1
kind = "box"
text = "-- Extra Information --"
parent = -1

[[nodes]]
id = 84
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Other than performing the task of your role, there are two other things you can do."
parent = -1

[[nodes]]
id = 85
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
There are two egg launchers in the arena. These are stocked up by the Collector, but can be fired by anyone. Simply click on the launcher, select the type of monster you want to fire at and the egg you want to
"""
parent = -1

[[nodes]]
id = 86
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "fire (assuming there are eggs of that type loaded)."
parent = -1

[[nodes]]
id = 87
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You will also spot a rather large horn in the corner of the arena."
parent = -1

[[nodes]]
id = 88
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Anyone can use this to shout out information to people in the arena. Using the horn, you will be shown an interface that will display all the information you need to know."
parent = -1

[[nodes]]
id = 89
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "So, you will battle through the waves in your given role, earning Honour Points."
parent = -1

[[nodes]]
id = 90
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "You will notice these blackboards dotted around. You can use these to view your progress as a soldier. You can battle through these waves as many times as you wish."
parent = -1

[[nodes]]
id = 91
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Also, should you want, there is a bank chest to allow you to stow away any items you don't need while in battle."
parent = -1

[[nodes]]
id = 92
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
Let me get something clear. At the start of the First Age, the mighty Guthix placed deposits of runes all around Gielinor for people to use. But this gift simply wasn't enough for some people, and they greedily
"""
parent = -1

[[nodes]]
id = 93
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "started crafting their own runes."
parent = -1

[[nodes]]
id = 94
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
We believe in only using those runes that were given to us in the first place. We have one such depository of runes that we have used ever since Guthix's kindness. We won't allow you to use runes that are no doubt
"""
parent = -1

[[nodes]]
id = 95
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "created by yourself or some other greedy runecrafter!"
parent = -1

[[nodes]]
id = 96
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "We also won't let you use any prayers - there is no time to pray! Arrows, too, are provided in the arena, so you had better leave them behind."
parent = -1

[[nodes]]
id = 97
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 98
depth = 1
kind = "box"
text = "-- The Final Battle --"
parent = -1

[[nodes]]
id = 99
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
On the tenth wave you will face the final battle. The dungeon you are placed in is slightly different from the other waves, but you can still perform your normal tasks within the roles of Attacker, Defender, Collector
"""
parent = -1

[[nodes]]
id = 100
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "and Healer."
parent = -1

[[nodes]]
id = 101
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
After a certain amount of time you will see the deadly Penance Queen. At this point you will need to remove all the other Penance from the room before you can go about tackling the Queen. Hence, it's best to get rid of
"""
parent = -1

[[nodes]]
id = 102
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "the normal Penance as fast as possible."
parent = -1

[[nodes]]
id = 103
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "With the Queen, your task will change. The Queen lays a new type of egg - a yellow egg!"
parent = -1

[[nodes]]
id = 104
depth = 1
kind = "box"
text = "pic=Yellow egg detail.png|A yellow Penance Queen egg."
parent = -1

[[nodes]]
id = 105
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "The Queen can't be beaten by normal combat or by normal eggs and hence, it is up to you as a team to change these yellow eggs into omega eggs."
parent = -1

[[nodes]]
id = 106
depth = 1
kind = "box"
text = "pic=Omega egg detail.png|An omega egg!"
parent = -1

[[nodes]]
id = 107
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "The omega eggs can then be launched from the egg launcher back at the Queen!"
parent = -1

[[nodes]]
id = 108
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "The egg will need to be passed from one person to the next, each person doing something to the egg to prepare it and make it into an omega egg."
parent = -1

[[nodes]]
id = 109
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "I shall go through each role to tell you what you will be responsible for. This is a lot to take in but don't worry, I will provide you with a book that will remind you of your task."
parent = -1

[[nodes]]
id = 110
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = """
As the Collector, you must pick up the yellow eggs and pass them to the Healer. This you can do by simply selecting 'use' on the egg and then selecting the Healer. You will also have to take the omega eggs from the
"""
parent = -1

[[nodes]]
id = 111
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Defender and load them into the launcher."
parent = -1

[[nodes]]
id = 112
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "As the Healer, you will be taking the yellow eggs from the Collector..."
parent = -1

[[nodes]]
id = 113
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "...and dipping them in the poison pools to create a poisoned yellow egg, before passing them onto the Attacker."
parent = -1

[[nodes]]
id = 114
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "As the Attacker, you will be taking the poisoned yellow eggs from the Healer..."
parent = -1

[[nodes]]
id = 115
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "...then attaching spikes, which you can break off from these mushrooms, before passing them on to the Defender."
parent = -1

[[nodes]]
id = 116
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "As the Defender, you will be taking the spiked, poisoned yellow eggs from the Attacker..."
parent = -1

[[nodes]]
id = 117
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "...then heating them up in the lava to create an omega egg, before passing it onto the Collector who can then load the egg into the launcher."
parent = -1

[[nodes]]
id = 118
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Then you can fire the egg at the Queen. Just repeat until she dies."
parent = -1

[[nodes]]
id = 119
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "Again, don't worry, you will be given a book to remind you of these tasks."
parent = -1

[[nodes]]
id = 120
depth = 1
kind = "speaker"
speaker = "Captain Cain"
text = "So, would you like a book to remind you of your role?"
parent = -1

[[nodes]]
id = 121
depth = 1
