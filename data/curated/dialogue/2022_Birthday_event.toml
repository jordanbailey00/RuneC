speaker = "Player"
text = "...A statue set for display has been decapitated and you need to find the head?"
parent = 47

[[nodes]]
id = 54
depth = 2
kind = "speaker"
speaker = "Hassan"
text = "Adventurer, are you quite alright?"
parent = 47

[[nodes]]
id = 55
depth = 2
kind = "speaker"
speaker = "Player"
text = "Well, usually something goes wrong at these events and you need someone like me to help!"
parent = 47

[[nodes]]
id = 56
depth = 2
kind = "speaker"
speaker = "Hassan"
text = "Ah, I see. Well, you will be disappointed to hear that thus far, everything is going smoothly."
parent = 47

[[nodes]]
id = 57
depth = 2
kind = "speaker"
speaker = "Hassan"
text = "The Emir knows the benefits of showcasing the city of Al Kharid to a global audience at an event such as this, and has entrusted me to ensure everything runs flawlessly."
parent = 47

[[nodes]]
id = 58
depth = 2
kind = "speaker"
speaker = "Hassan"
text = "Naturally, I did not fail him."
parent = 47

[[nodes]]
id = 59
depth = 2
kind = "speaker"
speaker = "Player"
text = "That's all well and good, but why am I even here then?"
parent = 47

[[nodes]]
id = 60
depth = 2
kind = "speaker"
speaker = "Hassan"
text = "Well, if you cannot satisfy yourself in helping the event, perhaps you could satisfy yourself by partaking in it instead?"
parent = 47

[[nodes]]
