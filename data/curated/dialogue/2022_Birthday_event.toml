text = "Greetings, adventurer. Welcome to Al Kharid. This year, we've been entrusted to host the year's birthday event-"
parent = 47

[[nodes]]
id = 49
depth = 2
kind = "speaker"
speaker = "Player"
text = "-But a swarm of goblins are threatening proceedings?!"
parent = 47

[[nodes]]
