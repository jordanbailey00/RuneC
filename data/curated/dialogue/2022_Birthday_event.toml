[[nodes]]
id = 62
depth = 3
kind = "speaker"
speaker = "Hassan"
text = "Wonderful. A few of our visiting dignitaries have set up activities to entertain our guests; I am sure they would greatly appreciate your participation."
parent = 61

[[nodes]]
id = 63
depth = 3
kind = "speaker"
speaker = "Hassan"
text = "I'm led to believe you might already know Captain Arnav. He's leading a treasure hunt, and can be found just north-east of the bank."
parent = 61

[[nodes]]
id = 64
depth = 3
kind = "speaker"
speaker = "Hassan"
text = "I believe the leprechauns, lead by one named Larry, are hosting a fishing competition over by the oasis, north of the Gem trader."
parent = 61

[[nodes]]
id = 65
depth = 3
kind = "speaker"
speaker = "Hassan"
text = "And lastly, we had a request from Trollweiss to allow them to sample some of our cuisine. A troll by the name of My Arm can be found outside the Duel Arena."
parent = 61

[[nodes]]
id = 66
depth = 3
kind = "speaker"
speaker = "Player"
text = "And what's in it for me?"
parent = 61

[[nodes]]
id = 67
depth = 3
kind = "speaker"
speaker = "Hassan"
text = "I'm glad you asked, adventurer. I've been working on a new invention in my spare time, and I am planning to debut it towards the end of the ceremonies."
parent = 61

[[nodes]]
id = 68
depth = 3
kind = "speaker"
speaker = "Hassan"
text = "However, if you were to keep our guests engaged by participating in their activities, I would be more than happy to reward you with an advance prototype."
parent = 61

[[nodes]]
