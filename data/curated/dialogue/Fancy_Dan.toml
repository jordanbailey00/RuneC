[[nodes]]
id = 57
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = "Well the stills we have set up are based on the ones on Braindeath island... well roughly at any rate."
parent = 55

[[nodes]]
id = 58
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = "All you have to do is help put the ingredients into the hoppers and keep the boilers burning."
parent = 55

[[nodes]]
id = 59
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = "If you add enough ingredients to the hoppers then you have the ability to pick up a single bottle of rum when it brews."
parent = 55

[[nodes]]
id = 60
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = """
So, if ye add 5 buckets of water to the hoppers, then ye get access to one bottle. If you add 3 bowls of coloured water you get access to one bottle, and if you add one of anything else you get access to one bottle.
"""
parent = 55

[[nodes]]
id = 61
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = "This is cumulative, meaning that if you add (for example) 10 buckets of water, 3 sweetgrubs and 6 bowls of coloured water, then you have a chance to collect 7 bottles of rum for the team."
parent = 55

[[nodes]]
id = 62
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = "The boilers are easy as pie to sort out. You just put some logs in, light them with a tinderbox, and then keep putting logs in until they are good and hot."
parent = 55

[[nodes]]
id = 63
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = "Three logs should do it, but it's best to keep heaping them in just in case."
parent = 55

[[nodes]]
id = 64
depth = 3
kind = "speaker"
speaker = "Fancy Dan"
text = "The ingredients are; Bitternuts, Scrapey Tree Bark, Sweetgrubs, Buckets of Water and some Coloured Water."
