[[nodes]]
id = 147
depth = 2
kind = "speaker"
speaker = "Player"
text = "Can you tell me more about the Abyss?"
parent = 146

[[nodes]]
id = 148
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "It is a hard place to describe. We often refer to it as another plane, but that isn't quite accurate. If anything, it is more like a plane that sits between all other planes."
parent = 146

[[nodes]]
id = 149
depth = 2
kind = "speaker"
speaker = "Player"
text = "Right... And what does it have to do with runecrafting?"
parent = 146

[[nodes]]
id = 150
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "In truth, nothing at all. However, it has everything to do with teleportation. You see, time and space work differently in the Abyss."
parent = 146

[[nodes]]
id = 151
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = """
For example, you can travel to the Abyss, walk a few steps and then exit, only to find yourself somewhere completely different from where you entered. You might even find yourself on a different plane.
"""
parent = 146

[[nodes]]
id = 152
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "You can also enter the Abyss and spend days there, but on your return, only moments have passed."
parent = 146

[[nodes]]
id = 153
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "This is why the Abyss is so useful. It can be used as an effective hub for teleportation. In fact, all teleportation that we know of uses the Abyss, you just don't realise it."
parent = 146

[[nodes]]
id = 154
depth = 2
kind = "speaker"
speaker = "Player"
text = "Wait... So when I teleport, I'm actually travelling through the Abyss?"
parent = 146

[[nodes]]
id = 155
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "In some ways, I suppose you are. Whenever you use a teleport spell, that spell is actually travelling through the Abyss and using it to link two places together."
parent = 146

[[nodes]]
id = 156
depth = 2
kind = "speaker"
speaker = "Player"
text = "So did you discover the Abyss?"
parent = 146

[[nodes]]
id = 157
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "No. Knowledge of the Abyss has existed for a long time, hence it being used for teleportation. However, we believe we may be the first to have properly gained access in centuries."
parent = 146

[[nodes]]
id = 158
depth = 2
kind = "speaker"
speaker = "Player"
text = "How did you manage it?"
parent = 146

[[nodes]]
id = 159
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "By complete accident. One of our initiates was performing a routine teleportation experiment when something went wrong. Instead of ending up at their destination, they found themselves in the Abyss."
parent = 146

[[nodes]]
id = 160
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "Now, did you want something else?"
parent = 146

[[nodes]]
id = 161
depth = 2
kind = "act"
text = "other"
parent = 146
is_terminal = true

