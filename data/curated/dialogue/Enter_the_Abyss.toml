[[nodes]]
id = 163
depth = 2
kind = "speaker"
speaker = "Player"
text = "Can you tell me more about your group?"
parent = 162

[[nodes]]
id = 164
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "I suppose you have proven yourself trustworthy. We are a group of mages in service to Zamorak. Our group is called the Zamorak Magical Institute, or Z.M.I. for short."
parent = 162

[[nodes]]
id = 165
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "Few actually know of us. Saradominist groups like the Order of Wizards hold sway over these lands, so we are forced to work in the shadows. However, make no mistake, our power far exceeds theirs."
parent = 162

[[nodes]]
id = 166
depth = 2
kind = "speaker"
speaker = "Player"
text = "You don't seem to like the Order of Wizards very much."
parent = 162

[[nodes]]
id = 167
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "And why would we? Did you know that the Order of Wizards wasn't always a Saradominist group? Once they allowed mages of all faiths to study with them, but they became greedy."
parent = 162

[[nodes]]
id = 168
depth = 2
kind = "speaker"
speaker = "Player"
text = "What happened?"
parent = 162

[[nodes]]
id = 169
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "They started to desire more control. They banned Zamorakian wizards from certain areas of study, claiming them to be too dangerous. In reality, they just wanted that knowledge for themselves."
parent = 162

[[nodes]]
id = 170
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "It all went wrong for them, of course. A Zamorakian wizard made a great breakthrough in teleportation magic, but the Saradominists stole his research."
parent = 162

[[nodes]]
id = 171
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "They used it to perform a ritual, but their lack of understanding caused it to go wrong. The entire Wizards' Tower burnt down. Many were killed, and years of research was destroyed."
parent = 162

[[nodes]]
id = 172
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "Naturally, they blamed the Zamorakians. Claimed we intentionally burnt the tower down. After the tower was rebuilt, we were banished from the Order of Wizards and forced underground."
parent = 162

[[nodes]]
id = 173
depth = 2
kind = "speaker"
speaker = "Player"
text = "And that's how the Z.M.I. was formed?"
parent = 162

[[nodes]]
id = 174
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "Exactly."
parent = 162

[[nodes]]
id = 175
depth = 2
kind = "speaker"
speaker = "Mage of Zamorak"
text = "Now, did you want something else?"
parent = 162

