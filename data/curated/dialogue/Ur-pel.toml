speaker = "Ur-pel"
text = "Why?"
parent = -1

[[nodes]]
id = 2
depth = 1
kind = "speaker"
speaker = "Ur-lun"
text = "We have surface-dwellers coming down into our mines and our city now, and remember that they don't have very good eyesight."
parent = -1

[[nodes]]
id = 3
depth = 1
kind = "speaker"
speaker = "Ur-lun"
text = "I worry that they can't see our guards very clearly in the dark. It is important for a guard to be seen."
parent = -1

[[nodes]]
