depth = 1
kind = "speaker"
speaker = "Ur-pel"
text = "You have a point. But I don't think red would be the best colour. It is the colour of blood, so it might give the wrong impression."
parent = -1

[[nodes]]
id = 5
depth = 1
kind = "speaker"
speaker = "Ur-lun"
text = "What colour do you suggest, then?"
parent = -1

[[nodes]]
