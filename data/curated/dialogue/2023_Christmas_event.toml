kind = "speaker"
speaker = "Jack Frost"
text = "Officially? I was bored so my dad tasked me to bring a tiny bit of cheer to Gielinor."
parent = 3

[[nodes]]
id = 6
depth = 2
kind = "speaker"
speaker = "Player"
text = "A 'tiny' bit of cheer?"
parent = 3

[[nodes]]
id = 7
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "I understood that to mean he doesn't want me freezing the whole continent."
parent = 3

[[nodes]]
id = 8
depth = 2
kind = "speaker"
speaker = "Player"
text = "That... Sounds sensible."
parent = 3

[[nodes]]
id = 9
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "I don't like Christmas. My dad's always too busy to spend time with me. It's the busiest time of the year for him."
parent = 3

[[nodes]]
id = 10
depth = 2
kind = "speaker"
speaker = "Player"
text = "Have you considered helping him out?"
parent = 3

[[nodes]]
id = 11
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "Honestly, it didn't work out so well last time. I don't think I'm cut out for that kind of work. I'm more of an artist."
parent = 3

[[nodes]]
id = 12
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "But the second reason I don't like Christmas is that there's this one lady that's seemingly obsessed with me."
parent = 3

[[nodes]]
id = 13
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "Every year she sings to all who will listen that all she wants for Christmas is me. Everywhere I go, I hear her. It's awful. I've tried to explain to her that I'm not into her, to no avail."
parent = 3

[[nodes]]
id = 14
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "Last year, in desperation, I even froze her with a special, really potent ice spell of mine. Nothing dangerous of course."
parent = 3

[[nodes]]
id = 15
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "I thought I was finally free... But recently she somehow thawed out and started singing again. I can't go on like this."
parent = 3

[[nodes]]
id = 16
depth = 2
kind = "speaker"
speaker = "Player"
text = "Wait wait wait. Are you absolutely sure she's after you specifically and she's not just singing that song because it's festive? Does she follow you at other times of the year?"
parent = 3

[[nodes]]
id = 17
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "She doesn't, no. She usually keeps going until the new year and then when it's obvious my dad didn't give in, she stops."
parent = 3

[[nodes]]
id = 18
depth = 2
kind = "speaker"
speaker = "Jack Frost"
text = "I suppose she does sing she doesn't want a lot, then she goes on to ask for me, yet Dad always says I'm a lot. Maybe you're right and she's not after me at all!"
parent = 3

[[nodes]]
id = 19
depth = 2
kind = "speaker"
speaker = "Player"
text = "Phew! That's one mystery solved!"
parent = 3

