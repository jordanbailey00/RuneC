[[nodes]]
id = 56
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "Oooh! What a lovely costume! You simply will have to show my sister Iffie later."
parent = 55

[[nodes]]
id = 57
depth = 2
kind = "speaker"
speaker = "Player"
text = "I somehow did not think Halloween was a holiday you'd enjoy."
parent = 55

[[nodes]]
id = 58
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "Well dearie, appearances can be deceiving! Let me tell you a little story of my youth."
parent = 55

[[nodes]]
id = 59
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "My sister and I have always loved knitting. Between Christmas jumpers and other wolly{{sic}} scarves, we have a little family tradition."
parent = 55

[[nodes]]
id = 60
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "As a way to challenge ourselves, when we were a bit younger, we would knit the most horrifying Halloween costumes, then wear them and scare passers-by out of their wits!"
parent = 55

[[nodes]]
id = 61
depth = 2
kind = "speaker"
speaker = "Player"
text = "What kind of costumes are we talking about?"
parent = 55

[[nodes]]
id = 62
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "Iffie's favourite costume represented the Chaos Elemental. Mine was a fearsome three-headed dragon!"
parent = 55

[[nodes]]
id = 63
depth = 2
kind = "speaker"
speaker = "Player"
text = "Sorry, but I have to see it to believe it!"
parent = 55

[[nodes]]
id = 64
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "Sorry dearie! We were banned from wearing those years ago because of the mass hysteria they caused! I reused the yarn to make mittens for the church sale."
parent = 55

[[nodes]]
id = 65
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "Anyway, thank you for taking the time to listen to my silly story. Have some well-deserved treats. They're not all mints, I promise."
parent = 55

[[nodes]]
id = 66
depth = 2
kind = "speaker"
speaker = "Player"
text = "Thank you Elsie! Do you know if anyone else is looking for some trick-or-treating fun?"
parent = 55

