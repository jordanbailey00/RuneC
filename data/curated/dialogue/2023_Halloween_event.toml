[[nodes]]
id = 107
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "Say, while you're here, would you care for a scary story?"
parent = 96

[[nodes]]
id = 108
depth = 2
kind = "speaker"
speaker = "Player"
text = "Sure, why not!"
parent = 96

[[nodes]]
id = 109
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "We have bowls of treats we keep to treat Trick-or- Treaters. We left the bowls outside the shop so the Trick-or-Treaters wouldn't come in and frighten the customers."
parent = 96

[[nodes]]
id = 110
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "However we found the treats vanishing in an instant, as if a greedy passer-by would help themselves without leaving any for anyone else."
parent = 96

[[nodes]]
id = 111
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "That's not very polite if you ask me. I was ready to be up in arms about today's youth, but I thought it would be prudent to witness the thief first."
parent = 96

[[nodes]]
id = 112
depth = 2
kind = "speaker"
speaker = "Player"
text = "That sounds dangerous! What did you do?"
parent = 96

[[nodes]]
id = 113
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "We refilled the bowls and waited, but we must have been too visible. Everyone was behaving perfectly. We went to sit back and the sweets vanished once again!"
parent = 96

[[nodes]]
id = 114
depth = 2
kind = "speaker"
speaker = "Player"
text = "Was it ghosts? I bet it was ghosts."
parent = 96

[[nodes]]
id = 115
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "We refilled again and this time hid very carefully. For a while nothing happened. Charlie came by, but he only took a couple of sweets before strolling back."
parent = 96

[[nodes]]
id = 116
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "Then when we least expected it, the most unsettling monster appeared from behind the shop, crammed its head into one of the bowls and wolfed the whole contents out!"
parent = 96

[[nodes]]
id = 117
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh no! What did it look like?"
parent = 96

[[nodes]]
id = 118
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "Knee-height, eyes as dark as the night, a large gaping mouth, four legs, skin peeling and covered in fleas!"
parent = 96

[[nodes]]
id = 119
depth = 2
kind = "speaker"
speaker = "Iffie"
text = "Eventually we understood that someone had been putting Halloween costumes on the hungry stray dogs! We now keep the bowls where we can see them!"
parent = 96

[[nodes]]
id = 120
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh, I was not expecting that plot twist!"
parent = 96

[[nodes]]
id = 121
depth = 2
kind = "speaker"
speaker = "Player"
text = "That was a lovely story, Iffie. Before I take my leave, is there anyone else I should visit?"
parent = 96

