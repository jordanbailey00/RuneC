speaker = "Player"
text = "I suppose I could lend an ear."
parent = 68

[[nodes]]
id = 71
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "Ok, a little short one then. One day a very kind adventurer came and brought me a warm cup of tea."
parent = 68

[[nodes]]
id = 72
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "It's always nice to have a warm cup of tea, you know. Keeps the fingers nimble."
parent = 68

[[nodes]]
id = 73
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "I was just telling them one of my stories when suddenly the biggest spider I had ever seen appeared in front of my eyes!"
parent = 68

[[nodes]]
id = 74
depth = 2
kind = "speaker"
speaker = "Player"
text = "How big are we talking?"
parent = 68

[[nodes]]
id = 75
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "A spider that took the entirety of my field of vision! Bigger and fuzzier still than the ones you get near here."
parent = 68

[[nodes]]
id = 76
depth = 2
kind = "speaker"
speaker = "Player"
text = "Did the adventurer not help you out?"
parent = 68

[[nodes]]
id = 77
depth = 2
kind = "speaker"
speaker = "Elsie"
text = "Unfortunately, they were busy being covered in tea. I had become rather startled, you see! Thankfully, all that movement caused the tiny spider to fall off my glasses!"
parent = 68

[[nodes]]
id = 78
depth = 2
kind = "speaker"
speaker = "Player"
text = "I don't know if I would prefer a large spider far away or a small spider on my face!"
parent = 68

[[nodes]]
id = 79
depth = 2
kind = "speaker"
speaker = "Player"
text = "I won't keep you any longer Elsie, but before I go, do you know of anyone that might have treats left?"
parent = 68

