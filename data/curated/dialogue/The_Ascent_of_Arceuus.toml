kind = "speaker"
speaker = "Asteros Arceuus"
text = "Thank you for helping us out with those souls. As you can see, we're facing quite the crisis."
parent = -1

[[nodes]]
id = 113
depth = 1
kind = "speaker"
speaker = "Player"
text = "I don't understand. What's going on?"
parent = -1

[[nodes]]
id = 114
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "I'm afraid we don't quite know ourselves yet. A short while ago, our instruments detected fluctuations in power from the Dark Altar."
parent = -1

[[nodes]]
id = 115
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Before we could do anything, we all felt a strange loss of power, as if the Altar had failed altogether."
parent = -1

[[nodes]]
id = 116
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "My father was quick to act, using himself as a conduit to channel what little power the Altar had left."
parent = -1

[[nodes]]
id = 117
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "It seems the loss in power had an interesting impact on our experiments though. Some trapped souls that we were working to free were suddenly released."
parent = -1

[[nodes]]
id = 118
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Alas, whatever happened seemed to cause them great pain, making them to go feral. They are now at peace though, thanks to you."
parent = -1

[[nodes]]
id = 119
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well I'm afraid I have some bad news which is likely related to this. A citizen of Arceuus has died."
parent = -1

[[nodes]]
id = 120
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "A death? No! My father acted as fast as he could, but it sounds like he was not fast enough. This is a dark day for Arceuus."
parent = -1

[[nodes]]
id = 121
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Tell me, who has fallen?"
parent = -1

[[nodes]]
id = 122
depth = 1
kind = "speaker"
speaker = "Player"
text = "Thana. Mori is with her next to the pond."
parent = -1

[[nodes]]
id = 123
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Dear Thana, you did not deserve this fate. Thank you for bringing this terrible news to us. I will make sure someone is sent out to take care of Thana and Mori."
parent = -1

[[nodes]]
id = 124
depth = 1
kind = "speaker"
speaker = "Player"
text = "I still don't understand how this happened."
parent = -1

[[nodes]]
id = 125
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Ever since the Ascent of Arceuus, our people have been kept alive by the Dark Altar. Its power sustains our bodies in the same way yours is sustained by food and drink."
parent = -1

[[nodes]]
id = 126
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Without the power of the Dark Altar, there's nothing to keep our people alive. The loss in power from the Altar will be what killed Thana."
parent = -1

[[nodes]]
id = 127
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "The Altar is currently giving out a fraction of the power it normally would. The only thing keeping us alive is my father. His strength won't last forever though."
parent = -1

[[nodes]]
id = 128
depth = 1
kind = "speaker"
speaker = "Player"
text = "So what do we do?"
parent = -1

[[nodes]]
id = 129
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = """
If we can't find and fix whatever has caused this loss of power, our people are surely doomed. Now that those souls have been dealt with, we can perform tests both here and at the Altar to try and find the problem.
"""
parent = -1

[[nodes]]
id = 130
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Time is not on our side though, and I fear we won't be fast enough."
parent = -1

[[nodes]]
id = 131
depth = 1
kind = "speaker"
speaker = "Player"
text = "Can I help?"
parent = -1

[[nodes]]
id = 132
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Well... There is a secret known only to a few of us. At any other time, I would never dream of telling an outsider."
parent = -1

[[nodes]]
id = 133
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "But our people's lives are in danger and you may well be the only one who can save us."
parent = -1

[[nodes]]
id = 134
depth = 1
kind = "speaker"
speaker = "Player"
text = "What is this secret?"
parent = -1

[[nodes]]
id = 135
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "It's believed by most that the knowledge of immortality was discovered by my father. The truth is, the discovery was not his."
parent = -1

[[nodes]]
id = 136
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = """
To the west of here, lies the sulphur volcano of Mount Karuulm. Within live the Tasakaal, three ancient beings with power over life and death. They granted my father the knowledge that led to the Ascent of Arceuus.
"""
parent = -1

[[nodes]]
id = 137
depth = 1
kind = "speaker"
speaker = "Player"
text = "And you think they can help us?"
parent = -1

[[nodes]]
id = 138
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Their knowledge of the Dark Altar far exceeds ours. If anyone can help us, it's them. Ideally I'd send one of our own, but I have no one to spare. You are the only one who can help us."
parent = -1

[[nodes]]
id = 139
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'd better not waste any time then."
parent = -1

[[nodes]]
id = 140
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Thank you friend. You'll find Mount Karuulm on the other side of Lovakengj. Please hurry."
parent = -1

[[nodes]]
id = 141
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 142
depth = 1
kind = "speaker"
speaker = "Asteros Arceuus"
text = "Please hurry to Mount Karuulm. The Tasakaal may be the only ones who can save us. You'll find the volcano on the other side of Lovakengj."
parent = -1

