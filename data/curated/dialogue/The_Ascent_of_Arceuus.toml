[[nodes]]
id = 236
depth = 1
kind = "speaker"
speaker = "Player"
text = "Lord Arceuus?"
parent = -1

[[nodes]]
id = 237
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "You're the one that saved our people. On behalf of all of Arceuus, I thank you."
parent = -1

[[nodes]]
id = 238
depth = 1
kind = "speaker"
speaker = "Player"
text = "So everything is okay now?"
parent = -1

[[nodes]]
id = 239
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "It seems so. A short while ago I felt the power of the Dark Altar return to normal levels. I was safely able to stop my ritual and let the Altar work on its own again."
parent = -1

[[nodes]]
id = 240
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Now tell me, what was the cause of this and how did you stop it?"
parent = -1

[[nodes]]
id = 241
depth = 1
kind = "speaker"
speaker = "Player"
text = "Your son recommended that I speak to the Tasakaal. They had me perform a task for them but after that they agreed to help. They didn't seem to like you much though."
parent = -1

[[nodes]]
id = 242
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Well that's no surprise. The Tasakaal seem to feel that only they deserve immortality. It's rather hypocritical of them. It clearly didn't stop them helping you though."
parent = -1

[[nodes]]
id = 243
depth = 1
kind = "speaker"
speaker = "Player"
text = "They were reluctant, but they admitted that the people of Arceuus were useful to them."
parent = -1

[[nodes]]
id = 244
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "Such is their way. They act superior to us, but the reality is they'll work with anyone if they think it will further their aims."
parent = -1

[[nodes]]
id = 245
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "So how did they help you?"
parent = -1

[[nodes]]
id = 246
depth = 1
kind = "speaker"
speaker = "Player"
text = "They found out that the power of the Altar was being redirected into a device hidden nearby. I found the device and destroyed it."
parent = -1

[[nodes]]
id = 247
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "A device? What was it?"
parent = -1

[[nodes]]
id = 248
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm not sure, but the Tasakaal said it was made by a mortal."
parent = -1

[[nodes]]
id = 249
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = "The Tasakaal view everyone who isn't one of them as a mere mortal, even those of us who have also achieved immortality. That doesn't narrow down the options very much."
parent = -1

[[nodes]]
id = 250
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = """
This is most concerning though. If someone deliberately sabotaged the Altar, who knows what else they might do. I'll have someone recover the remains of this device. Maybe we can work out where it came from.
"""
parent = -1

[[nodes]]
id = 251
depth = 1
kind = "speaker"
speaker = "Lord Trobin Arceuus"
text = """
For now though, I'd like to once again thank you for your help. Today was a dark day for our people but without you it would have been our end. Please accept these gifts. They are the least you deserve.
"""
parent = -1

