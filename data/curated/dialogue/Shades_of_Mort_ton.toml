text = "My name is Ulsquire Shauncy, I'm the local teacher and priest around here. You've really come at a time when  Mort'ton is in a terrible state."
parent = 12

[[nodes]]
id = 15
depth = 2
kind = "speaker"
speaker = "Ulsquire Shauncy"
text = """
The emanations from the rest of Morytania affect the people here terribly turning them into mindless creatures. And, as if that wasn't enough, we get picked off by the evil Shades that exist in this area.
"""
parent = 12

[[nodes]]
