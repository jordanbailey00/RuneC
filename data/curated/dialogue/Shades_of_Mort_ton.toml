kind = "speaker"
speaker = "Player"
text = "What is this place?"
parent = 18

[[nodes]]
id = 20
depth = 2
kind = "speaker"
speaker = "Ulsquire Shauncy"
text = "This sad and afflicted little town is called 'Mort'ton'. In it's heyday it was a busy and bustling market town with a speciality for interring the dead."
parent = 18

[[nodes]]
id = 21
depth = 2
kind = "speaker"
speaker = "Ulsquire Shauncy"
text = """
The vile emanations from the Sanguinesti area started to spread and the town hasn't been the same since. The serum you made was the one that Herbi Flax was working on. Unfortunately the serum isn't permanent.
"""
parent = 18

[[nodes]]
id = 22
depth = 2
kind = "speaker"
speaker = "Player"
text = "Do you know how I could make the serum permanent?"
parent = 18

[[nodes]]
id = 23
depth = 2
kind = "speaker"
speaker = "Ulsquire Shauncy"
text = """
I remember Herbi Flax talking about the serum. He said it worked on what he called the 'biological' effects of the affliction but that some other secondary effect was at work which he didn't quite understand.
"""
parent = 18

[[nodes]]
id = 24
depth = 2
kind = "speaker"
speaker = "Ulsquire Shauncy"
text = """
He was interested in 'Flaemtaer', the ruined temple to the North. I found this odd. A man of science studying a structure dedicated to faith and the struggle of good verus evil, another concept he didn't understand.
"""
parent = 18

