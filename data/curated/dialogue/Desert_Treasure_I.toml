[[nodes]]
id = 185
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "Ah, it all begun many generations ago, when our ancestors were the proud rulers of these lands..."
parent = 183

[[nodes]]
id = 186
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "My ancestors lived far to the North of here, and our lands stretched from the sea in the East to the river Lum, and the mountain of ice. From coast to coast, North to South, our domain was absolute."
parent = 183

[[nodes]]
id = 187
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "Our god was kind to us, and blessed us with prosperity and happiness, and in return we were merciless to his enemies wherever we found them."
parent = 183

[[nodes]]
id = 188
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "Then came the betrayal."
parent = 183

[[nodes]]
id = 189
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "Our god was banished, leaving us helpless to our fates."
parent = 183

[[nodes]]
id = 190
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "Without his protection, we were forced to fend for ourselves once more, against the enemies that sought to destroy us through their petty jealousies."
parent = 183

[[nodes]]
id = 191
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "But we did not succumb without fighting! The spiteful Saradomin and pathetic Zamorak warred with each other, but the hatred they had for each other was as nothing to the hatred they held towards us!"
parent = 183

[[nodes]]
id = 192
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "With each battle they waged, we lost more and more land, unable to fight on all fronts, and were pushed further and further South into this gods-forsaken desert."
parent = 183

[[nodes]]
id = 193
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "Our greatest hero, Azzanadra, was finally trapped in a strange stone structure to the South of here, and bound within by terrible powers..."
parent = 183

[[nodes]]
id = 194
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "And with that our lands, our homes, our very lives were stolen from us! Too weak to reclaim what was rightfully ours, we made our homes here, knowing that someday Azzanadra will"
parent = 183

[[nodes]]
id = 195
depth = 3
kind = "speaker"
speaker = "Eblis"
text = "return with his magnificent power, and bring us back to our former glory..."
parent = 183

[[nodes]]
