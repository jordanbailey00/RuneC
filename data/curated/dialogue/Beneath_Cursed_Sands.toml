[[nodes]]
id = 465
depth = 2
kind = "speaker"
speaker = "Player"
text = "Tell me more about yourself."
parent = 464

[[nodes]]
id = 466
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|In life I was Mehhar, son of Osmumten. To me, my death was mere moments ago. To you on the other hand, I am surely considered ancient.}}"
parent = 464

[[nodes]]
id = 467
depth = 2
kind = "speaker"
speaker = "Player"
text = "How ancient?"
parent = 464

[[nodes]]
id = 468
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|I sense that the gods have long since departed this world, but when I lived, they still walked among us.}}"
parent = 464

[[nodes]]
id = 469
depth = 2
kind = "speaker"
speaker = "Player"
text = "And your father, Osmumten? You said he was the Pharaoh. What happened?"
parent = 464

[[nodes]]
id = 470
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = """
{{Colour|#000080|My father ruled during the great war. While the war was eventually won, many considered the cost too great. My father led us with the support of the gods, yet he was the one people blamed.}}
"""
parent = 464

[[nodes]]
id = 471
depth = 2
kind = "speaker"
speaker = "Player"
text = "So they killed him?"
parent = 464

[[nodes]]
id = 472
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Him, and the rest of my family. I would have died as well, were it not for the bravery of my father's servants. They gave their lives, so that I might live.}}"
parent = 464

[[nodes]]
id = 473
depth = 2
kind = "speaker"
speaker = "Player"
text = "And then you came here?"
parent = 464

[[nodes]]
id = 474
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|To Ullek? Yes. I found solace here with a group dedicated to Scabaras. In time, I became their leader, and the Sect of Scabaras was formed.}}"
parent = 464

[[nodes]]
id = 475
depth = 2
kind = "speaker"
speaker = "Player"
text = "There's not much left of Ullek now, or the sect."
parent = 464

[[nodes]]
id = 476
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|That is no surprise. Such is the fate of all things. Still, while the sect would have eventually decayed, it was the Devourer's corruption that quickened its demise.}}"
parent = 464

[[nodes]]
id = 477
depth = 2
kind = "speaker"
speaker = "Player"
text = "I'm sorry."
parent = 464

[[nodes]]
id = 478
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Don't be. You have a chance to free the High Priest of Scabaras. If you do, the sect may yet be reborn.}}"
parent = 464

