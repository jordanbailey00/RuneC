speaker = "Player"
text = "What do you know about Amascut?"
parent = 480

[[nodes]]
id = 482
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|The one you call Amascut died long ago. In her place, the Devourer was born.}}"
parent = 480

[[nodes]]
id = 483
depth = 2
kind = "speaker"
speaker = "Player"
text = "How did it happen?"
parent = 480

[[nodes]]
id = 484
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Only Icthlarin himself knows the true answer to that question.}}"
parent = 480

[[nodes]]
id = 485
depth = 2
kind = "speaker"
speaker = "Player"
text = "Okay... but you must have some idea?"
parent = 480

[[nodes]]
id = 486
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|During the great war, our forces were decimated by the servants of the Ruinous Powers. To turn the tide, Icthlarin and Amascut sought powerful allies to aid us.}}"
parent = 480

[[nodes]]
id = 487
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|They found them far from here, in a place beyond this world. A powerful race of faceless ones. They became Icthlarin's Stern Judges.}}"
parent = 480

[[nodes]]
id = 488
depth = 2
kind = "speaker"
speaker = "Player"
text = "What's that got to do with Amascut?"
parent = 480

[[nodes]]
id = 489
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Upon her return, Amascut vanished. She played no further part in the war. Only when the fighting was over did she reappear, but it wasn't really her at all.}}"
parent = 480

[[nodes]]
id = 490
depth = 2
kind = "speaker"
speaker = "Player"
text = "So you think it had something to do with the Stern Judges?"
parent = 480

[[nodes]]
id = 491
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|It seems highly likely.}}"
parent = 480

