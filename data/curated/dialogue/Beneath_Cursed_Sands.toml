speaker = "Player"
text = "Plenty. I discovered all sorts of things. How about you?"
parent = -1

[[nodes]]
id = 631
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "I filled Zahur in on our discoveries and obtained a blood sample from one of Sophanem's citizens for her. Don't ask me how. She's looked over it, and thinks the pox should be easily curable."
parent = -1

[[nodes]]
id = 632
depth = 1
kind = "speaker"
speaker = "Player"
text = "Great!"
parent = -1

[[nodes]]
id = 633
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "Yes, it's a very interesting one this. Do you know of the cadava bush?"
parent = -1

[[nodes]]
id = 634
depth = 1
kind = "speaker"
speaker = "Player"
text = "Yes! One time I used some to help this young couple. I gave one of them a cadava potion to appear dead."
parent = -1

[[nodes]]
id = 635
depth = 1
kind = "speaker"
speaker = "Player"
text = "It all went a bit wrong though, and he ended up with her cousin instead..."
parent = -1

[[nodes]]
id = 636
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "Right..."
parent = -1

[[nodes]]
id = 637
depth = 1
kind = "cond"
text = "If the player has completed Making Friends with My Arm:"
parent = -1
children = [638, 639, 640, 641, 642, 643]

[[nodes]]
id = 638
depth = 2
kind = "speaker"
speaker = "Player"
text = "Oh, and I used one another time when I was helping My Arm!"
parent = 637

[[nodes]]
id = 639
depth = 2
kind = "speaker"
speaker = "Zahur"
text = "You were helping your arm? I'm not sure I need to know about your private life..."
parent = 637

[[nodes]]
id = 640
depth = 2
kind = "speaker"
speaker = "Player"
text = "No, not my arm. My Arm! He's a troll! He needed to kill an old man, so we used a potion to fake it."
parent = 637

[[nodes]]
id = 641
depth = 2
kind = "speaker"
speaker = "Player"
text = "It all went a bit wrong though... again. That seems to happen quite often for some reason..."
parent = 637

[[nodes]]
id = 642
depth = 2
kind = "speaker"
speaker = "Maisa"
text = "What on Gielinor are you on about?"
parent = 637

[[nodes]]
id = 643
depth = 2
kind = "speaker"
speaker = "Zahur"
text = "Maybe we should get back to what I was saying..."
parent = 637

[[nodes]]
id = 644
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "As most people know, cadava berries are quite poisonous. When used in the right quantity, they can put someone into a deep sleep. Use the wrong amount..."
parent = -1

[[nodes]]
id = 645
depth = 1
kind = "speaker"
speaker = "Maisa"
text = """
... and you're not going to be waking up again. Cadava potions are standard issue for Al Kharid spies for that very reason. In fact, they're what I used to get myself and those citizens out of Menaphos.
"""
parent = -1

[[nodes]]
id = 646
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "Well, the thing about cadava berries is that they're not the only part of the bush that's dangerous. If you're not careful, the bark can have quite a nasty effect on the skin."
parent = -1

[[nodes]]
id = 647
depth = 1
kind = "speaker"
speaker = "Player"
text = "Like the spots from the pox! Are you saying that's what caused all the trouble? A rogue cadava bush?"
parent = -1

[[nodes]]
id = 648
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "Maybe, but you won't find any of those bushes this far south. It's quite unexpected. I don't think anyone in Sophanem would even recognise cadava bark, let alone figure out it caused the pox."
parent = -1

[[nodes]]
id = 649
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "To be honest, I probably wouldn't have suspected it myself either. I only realised because of the time I spent training with the Apothecary in Varrock."
parent = -1

[[nodes]]
id = 650
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "It sounds like someone could have caused the pox on purpose."
parent = -1

[[nodes]]
id = 651
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well that leads on to what I discovered in those ruins. I found the High Priest of Scabaras there, under Amascut's control. Turns out she had him and the scabarites cause the plagues in Sophanem."
parent = -1

[[nodes]]
id = 652
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "They caused the plagues? Why?"
parent = -1

[[nodes]]
id = 653
depth = 1
kind = "speaker"
speaker = "Player"
text = """
Amascut wanted an excuse to have Menaphos locked down. She's up to something there, but the High Priest of Scabaras didn't know what. However, he did confirm that Pharaoh Kemesis is under her control as well.
"""
parent = -1

[[nodes]]
id = 654
depth = 1
kind = "speaker"
speaker = "Player"
text = "The thing is, now that I think about it, the High Priest of Scabaras didn't actually seem to be aware of the pox. I doubt he'd have been able to get hold of cadava bark either."
parent = -1

[[nodes]]
id = 655
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "So there's other forces at play. That's not good. What else did you find out?"
parent = -1

[[nodes]]
id = 656
depth = 1
kind = "speaker"
speaker = "Player"
text = "The next bit is worse, I'm afraid. I found out what Amascut is looking for in that tomb. Apparently, there are two weapons in there that could grant her true godhood."
parent = -1

[[nodes]]
id = 657
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "True godhood? You can't be serious!"
parent = -1

[[nodes]]
id = 658
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'm afraid so. She's managed to capture all four of the lesser gods. It's likely that her plan is to use the weapons to claim their power."
parent = -1

[[nodes]]
id = 659
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "The lesser gods? It can't be!"
parent = -1

[[nodes]]
id = 660
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Are you really sure about all of this?"
parent = -1

[[nodes]]
id = 661
depth = 1
kind = "speaker"
speaker = "Zahur"
text = "Do not doubt the will of the Devourer, Maisa. She is a force of pure evil."
parent = -1

[[nodes]]
id = 662
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "It wasn't that long ago that I didn't even think she was still around. Now I'm hearing she's trying to become a true goddess! It's a lot to get used to."
parent = -1

[[nodes]]
id = 663
depth = 1
kind = "speaker"
speaker = "Player"
text = "I do have one bit of good news. I know an incantation that can free a person from her mind control. We can use it to free the people at the necropolis."
parent = -1

[[nodes]]
id = 664
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Right, well we'd better get to work then. First, let's finish off this cure. Once that's done, we can free the citizens."
parent = -1

[[nodes]]
id = 665
depth = 1
kind = "speaker"
speaker = "Player"
text = "Anything you need me to do?"
parent = -1

[[nodes]]
