[[nodes]]
id = 167
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Come on. We'd better get back down there."
parent = -1

[[nodes]]
id = 168
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 169
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Nice job keeping things low profile."
parent = -1

[[nodes]]
id = 170
depth = 1
kind = "speaker"
speaker = "Player"
text = "To be fair, I did warn you."
parent = -1

[[nodes]]
id = 171
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "I suppose. Were you able to discover anything?"
parent = -1

[[nodes]]
id = 172
depth = 1
kind = "speaker"
speaker = "Player"
text = "Sort of. I still don't know why these people are here, but I do know who sent them."
parent = -1

[[nodes]]
id = 173
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Who?"
parent = -1

[[nodes]]
id = 174
depth = 1
kind = "speaker"
speaker = "Player"
text = "Amascut, the Devourer."
parent = -1

[[nodes]]
id = 175
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "What? The goddess? You're joking!"
parent = -1

[[nodes]]
id = 176
depth = 1
kind = "speaker"
speaker = "Player"
text = "You don't believe me?"
parent = -1

[[nodes]]
id = 177
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "It's just quite the claim. How do you know it's her?"
parent = -1

[[nodes]]
id = 178
depth = 1
kind = "speaker"
speaker = "Player"
text = "She has hypnotic powers. She's the one that put them in this trance! I know it better than most. I was unlucky enough to experience it myself back in Sophanem."
parent = -1

[[nodes]]
id = 179
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "Urgh..."
parent = -1

[[nodes]]
id = 180
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Perhaps this one can give us something more to go on."
parent = -1

[[nodes]]
id = 181
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "What's happening? Help me..."
parent = -1

[[nodes]]
id = 182
depth = 1
kind = "speaker"
speaker = "Player"
text = "You were hypnotised, but you're free now. Do you remember anything about what happened to you?"
parent = -1

[[nodes]]
id = 183
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "It's all so unclear... I can't remember..."
parent = -1

[[nodes]]
id = 184
depth = 1
kind = "speaker"
speaker = "Player"
text = "I know what you're going through. Try to think back to before you were hypnotised. What's the last thing you remember?"
parent = -1

[[nodes]]
id = 185
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "We were told we had an audience with Pharaoh Kemesis, but when we arrived at the palace he wasn't there. It was just this woman."
parent = -1

[[nodes]]
id = 186
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "What woman?"
parent = -1

[[nodes]]
id = 187
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "I don't know. I just remember her eyes, her deep red eyes..."
parent = -1

[[nodes]]
id = 188
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's Amascut alright."
parent = -1

[[nodes]]
id = 189
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Do you remember anything after that?"
parent = -1

[[nodes]]
id = 190
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "We came here to find something... I think. A tomb! We unblocked the entrance, and she went inside. There were others with her."
parent = -1

[[nodes]]
id = 191
depth = 1
kind = "speaker"
speaker = "Player"
text = "What does she want from the tomb?"
parent = -1

[[nodes]]
id = 192
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "I don't know... We never saw the inside. The entrance collapsed again after she went in."
parent = -1

[[nodes]]
id = 193
depth = 1
kind = "speaker"
speaker = "Player"
text = "That's okay. You've been a great help."
parent = -1

[[nodes]]
id = 194
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "Wait! I remember one more thing... there were these monsters helping her! They walked like humans, but they had the heads of insects!"
parent = -1

[[nodes]]
id = 195
depth = 1
kind = "speaker"
speaker = "Player"
text = "That sounds like those scarab creatures from the tunnels below Sophanem."
parent = -1

[[nodes]]
id = 196
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Scabarites! Do you know where they came from?"
parent = -1

[[nodes]]
id = 197
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "Some ruins... To the north east..."
parent = -1

[[nodes]]
id = 198
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "I think that's all we're learning from this one. I'll get him some medical attention. Meet me back at my camp."
parent = -1

[[nodes]]
id = 199
depth = 1
kind = "speaker"
speaker = "Player"
text = "Will do."
parent = -1

[[nodes]]
id = 200
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 201
depth = 1
