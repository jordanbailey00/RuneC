speaker = "Head Menaphite Guard"
text = "The work cannot be disturbed... the mistress commands it..."
parent = -1

[[nodes]]
id = 158
depth = 1
kind = "speaker"
speaker = "Player"
text = "Mistress? You mean the Devourer! This is all her doing, isn't it? I'd recognise her work anywhere."
parent = -1

[[nodes]]
id = 159
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "You know too much... you must be removed..."
parent = -1

[[nodes]]
id = 160
depth = 1
kind = "other"
text = "{{qact|Maisa attacks a Menaphite Guard, killing them instantly.}}"
parent = -1

[[nodes]]
id = 161
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Looks like you need a hand."
parent = -1

[[nodes]]
id = 162
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "Die..."
parent = -1

[[nodes]]
id = 163
depth = 1
kind = "other"
text = "{{qact|The cutscene ends, and the fight begins with the Head Menaphite Guard.}}"
parent = -1

[[nodes]]
id = 164
depth = 1
kind = "speaker"
speaker = "Head Menaphite Guard"
text = "{{overhead|Your false gods will not protect you!}}"
parent = -1

[[nodes]]
id = 165
depth = 1
kind = "box"
text = "You flee from the fight."
parent = -1

[[nodes]]
id = 166
depth = 1
