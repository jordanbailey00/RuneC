[[nodes]]
id = 563
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "Yes, I can see it now! There are a few gaps, but it's all coming back to me. Thank you, adventurer."
parent = -1

[[nodes]]
id = 564
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "There is much for me to set right. We have made some terrible mistakes."
parent = -1

[[nodes]]
id = 565
depth = 1
kind = "speaker"
speaker = "Player"
text = "I know the feeling. What did she have you do?"
parent = -1

[[nodes]]
id = 566
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "Many things. I have been under her control my whole life. It was the same for my predecessor, and her predecessor as well. We were all slaves to the Devourer, even our lord himself."
parent = -1

[[nodes]]
id = 567
depth = 1
kind = "speaker"
speaker = "Player"
text = "She controls Scabaras?"
parent = -1

[[nodes]]
id = 568
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "Yes. She used him as her puppet for centuries, but now she has a new plan for him."
parent = -1

[[nodes]]
id = 569
depth = 1
kind = "speaker"
speaker = "Player"
text = "What new plan?"
parent = -1

[[nodes]]
id = 570
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "I don't know. She took him into some tomb, along with the others."
parent = -1

[[nodes]]
id = 571
depth = 1
kind = "speaker"
speaker = "Player"
text = "Osmumten's tomb. Who are these others you speak of?"
parent = -1

[[nodes]]
id = 572
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "Apmeken, Crondis and Het. The other avatars of Tumeken."
parent = -1

[[nodes]]
id = 573
depth = 1
kind = "speaker"
speaker = "Player"
text = "She has them all?"
parent = -1

[[nodes]]
id = 574
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "She does. We helped her capture them. It took many lifetimes, but she was able to fool them all."
parent = -1

[[nodes]]
id = 575
depth = 1
kind = "speaker"
speaker = "Player"
text = "This isn't good. There're weapons in that tomb that can transfer divine power between beings. She must be planning to use them on the lesser deities."
parent = -1

[[nodes]]
id = 576
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "The four of them all came from Tumeken himself. Their power is his power. If she claims that power as her own, she will become a true goddess..."
parent = -1

[[nodes]]
id = 577
depth = 1
kind = "speaker"
speaker = "Player"
text = "Don't worry, I'll make sure that doesn't happen."
parent = -1

[[nodes]]
id = 578
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "How can you hope to withstand her power?"
parent = -1

[[nodes]]
id = 579
depth = 1
kind = "speaker"
speaker = "Player"
text = "I'll find a way. Do you have any other information that can help me?"
parent = -1

[[nodes]]
id = 580
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "We were not the only ones to fall to the Devourer. She has control over Pharaoh Kemesis of Menaphos."
parent = -1

[[nodes]]
id = 581
depth = 1
kind = "speaker"
speaker = "Player"
text = "We feared as much. Do you know what she wants with him?"
parent = -1

[[nodes]]
id = 582
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "She needed control over the city, but she kept the reason a secret. She even had us release locusts and frogs into Sophanem so she could have Menaphos locked down."
parent = -1

[[nodes]]
id = 583
depth = 1
kind = "speaker"
speaker = "Player"
text = "You caused the plagues? The cows and the pox as well?"
parent = -1

[[nodes]]
id = 584
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "We did also poison the cows. I know nothing of this pox, though."
parent = -1

[[nodes]]
id = 585
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hmm... what will you do now?"
parent = -1

[[nodes]]
id = 586
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "I fear many of my people are forever lost, but I will save as many as I can. Together, we will reform the Sect of Scabaras, and right the wrongs of the Devourer."
parent = -1

[[nodes]]
id = 587
depth = 1
kind = "speaker"
speaker = "Player"
text = "So you'll help me fight her?"
parent = -1

[[nodes]]
id = 588
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "In our own way. Before the Devourer, we were an isolated people, just as Scabaras taught us to be. We will go back to that way of life."
parent = -1

[[nodes]]
id = 589
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "We may go unseen, but we will be there, fighting the forces of the Devourer wherever they appear."
parent = -1

[[nodes]]
id = 590
depth = 1
kind = "speaker"
speaker = "Player"
text = "Good to hear. Now, I'd better head over to Nardah. I have a friend there who needs to hear about all of this."
parent = -1

[[nodes]]
id = 591
depth = 1
kind = "speaker"
speaker = "High Priest of Scabaras"
text = "Good luck in your fight, adventurer. May Scabaras guide you."
parent = -1

