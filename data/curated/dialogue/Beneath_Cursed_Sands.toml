[[nodes]]
id = 427
depth = 1
kind = "speaker"
speaker = "Player"
text = "Hello?"
parent = -1

[[nodes]]
id = 428
depth = 1
kind = "box"
text = "The spirit looks at you for a moment, before you suddenly hear a voice echoing in your head."
parent = -1

[[nodes]]
id = 429
depth = 1
kind = "speaker"
speaker = "Spirit"
text = "{{Colour|#000080|Curious... It has been a long time since I've spoken to another. The last time was when my body still had form. Tell me, stranger, what brings you to my tomb?}}"
parent = -1

[[nodes]]
id = 430
depth = 1
kind = "speaker"
speaker = "Player"
text = "I was looking for some scabarites."
parent = -1

[[nodes]]
id = 431
depth = 1
kind = "speaker"
speaker = "Spirit"
text = "{{Colour|#000080|Ah, yes. The fallen remnants of my once great sect. You will find plenty of them here. Why do you seek them?}}"
parent = -1

[[nodes]]
id = 432
depth = 1
kind = "speaker"
speaker = "Player"
text = "Do you know of Amascut, the Devourer?"
parent = -1

[[nodes]]
id = 433
depth = 1
kind = "speaker"
speaker = "Spirit"
text = "{{Colour|#000080|All too well.}}"
parent = -1

[[nodes]]
id = 434
depth = 1
kind = "speaker"
speaker = "Player"
text = "There's an old tomb south of here. Amascut has been excavating the entrance, and the scabarites have been helping her. She's looking for something inside, but I don't know what."
parent = -1

[[nodes]]
id = 435
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|I see. If you are an enemy of the Devourer and her corrupt scabarites, then you are a friend to me. I am Mehhar, and I can help you.}}"
parent = -1

[[nodes]]
id = 436
depth = 1
kind = "speaker"
speaker = "Player"
text = "You can help? Do you know of this tomb?"
parent = -1

[[nodes]]
id = 437
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Even when I still lived, the desert hid many secrets. Now, centuries later, it hides even more. Of all those secrets, few are greater than the ones hidden in that tomb.}}"
parent = -1

[[nodes]]
id = 438
depth = 1
kind = "speaker"
speaker = "Player"
text = "Whose tomb is it?"
parent = -1

[[nodes]]
id = 439
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|It is the resting place of my father, Osmumten. He was once Pharaoh of these lands. My destiny was to succeed him, but the usurpers saw an end to that.}}"
parent = -1

[[nodes]]
id = 440
depth = 1
kind = "speaker"
speaker = "Player"
text = "And what are the secrets in his tomb?"
parent = -1

[[nodes]]
id = 441
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Being a Pharaoh offers many luxuries, both in life and in death. Many strive only for these luxuries. They forget that being a Pharaoh also comes with responsibility.}}"
parent = -1

[[nodes]]
id = 442
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = """
{{Colour|#000080|My father had a responsibility greater than most. At the time of his rule, our people were locked in a great war. To hold back the Ruinous Powers, our gods granted us immensely powerful weapons.}}
"""
parent = -1

[[nodes]]
id = 443
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|When the war was over, my father was tasked with hiding those weapons, lest they fall into nefarious hands. Two of them were buried with him. They will be what the Devourer seeks.}}"
parent = -1

[[nodes]]
id = 444
depth = 1
kind = "speaker"
speaker = "Player"
text = "What are these weapons?"
parent = -1

[[nodes]]
id = 445
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|I trust you are aware of what the Devourer desires?}}"
parent = -1

[[nodes]]
id = 446
depth = 1
kind = "speaker"
speaker = "Player"
text = "Souls?"
parent = -1

[[nodes]]
id = 447
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Yes. When the war ended and the Devourer rose from the ashes, she did so with only one goal. She will not stop until every soul, living or dead, has been destroyed.}}"
parent = -1

[[nodes]]
id = 448
depth = 1
kind = "speaker"
speaker = "Player"
text = "And these weapons can help her?"
parent = -1

[[nodes]]
id = 449
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Many would call the Devourer a god, but they speak only half truths. She is a demi-goddess of limited power, and does not possess the means to devour souls on a mass scale.}}"
parent = -1

[[nodes]]
id = 450
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|The weapons in my father's tomb can be used to drain a being of divine energy and transfer that energy to another. If used correctly, they would grant the Devourer true godhood.}}"
parent = -1

[[nodes]]
id = 451
depth = 1
kind = "speaker"
speaker = "Player"
text = "Then I need to get into that tomb and stop her."
parent = -1

[[nodes]]
id = 452
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Before you leave, I ask that you remember your original purpose here.}}"
parent = -1

[[nodes]]
id = 453
depth = 1
kind = "speaker"
speaker = "Player"
text = "The scabarites?"
parent = -1

[[nodes]]
id = 454
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Yes. They have made their home here in my tomb, disturbing my rest. From the chamber above, the High Priest of Scabaras commands them.}}"
parent = -1

[[nodes]]
id = 455
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|He believes he does so in the name of Scabaras. He does not realise that he is actually a puppet of the Devourer.}}"
parent = -1

[[nodes]]
id = 456
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|Free him of her control, and the Devourer will be without a powerful resource. It will also allow me to rest once more.}}"
parent = -1

[[nodes]]
id = 457
depth = 1
kind = "speaker"
speaker = "Player"
text = "He might also know more about what Amascut is planning. I did free a guard from Amascut's control through combat. I could try that again."
parent = -1

[[nodes]]
id = 458
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = """
{{Colour|#000080|When the Devourer first emerged, Icthlarin himself taught us an incantation to free an individual from her control. I would suggest you use it, rather than risking harm to the High Priest.}}
"""
parent = -1

[[nodes]]
id = 459
depth = 1
kind = "speaker"
speaker = "Player"
text = "Ah, that seems wise. What's this incantation?"
parent = -1

[[nodes]]
id = 460
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|'Majaan, Manand, Almuk.' Be warned, while it will work on those she has hypnotised, it will have no effect on her corrupted akhs. They are sadly beyond saving.}}"
parent = -1

[[nodes]]
id = 461
depth = 1
kind = "speaker"
speaker = "Player"
text = "I see. Thank you, Mehhar."
parent = -1

[[nodes]]
id = 462
depth = 1
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|You will find a key to the upper chamber in an urn to the back of this room. Now go, with the blessing of Scabaras.}}"
parent = -1

[[nodes]]
