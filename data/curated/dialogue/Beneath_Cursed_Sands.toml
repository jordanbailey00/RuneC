text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 203
depth = 1
kind = "speaker"
speaker = "Menaphite Guard"
text = "The work must be completed... the mistress commands it..."
parent = -1

[[nodes]]
id = 204
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 205
depth = 1
kind = "box"
text = "The entrance is completely blocked. There doesn't seem to be any way through."
parent = -1

[[nodes]]
id = 206
depth = 1
kind = "act"
text = "end"
parent = -1
is_terminal = true

[[nodes]]
id = 207
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "So that was... interesting. A hypnotising goddess wasn't quite what I expected."
parent = -1

[[nodes]]
id = 208
depth = 1
kind = "speaker"
speaker = "Player"
text = "You sound like you still don't believe me."
parent = -1

[[nodes]]
id = 209
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "You have to admit, it's a lot to take in. Still, I guess it doesn't change our next steps."
parent = -1

[[nodes]]
id = 210
depth = 1
kind = "speaker"
speaker = "Player"
text = "And what are they?"
parent = -1

[[nodes]]
id = 211
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "That guard gave us two leads to look into. Hopefully one of them will give us some answers as to what's so important about that tomb."
parent = -1

[[nodes]]
id = 212
depth = 1
kind = "speaker"
speaker = "Player"
text = "Should we reach out to Osman about this?"
parent = -1

[[nodes]]
id = 213
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Osman? Why? That man won't be of any help. He'd have happily left me to rot in Menaphos, just like how he sent Kaleef to his death!"
parent = -1

[[nodes]]
id = 214
depth = 1
kind = "speaker"
speaker = "Player"
text = "Kaleef? He was the spy that was meant to relieve you, right? I thought you didn't even know him?"
parent = -1

[[nodes]]
id = 215
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "What? Oh, right."
parent = -1

[[nodes]]
id = 216
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Look, we don't need Osman. We can handle this ourselves."
parent = -1

[[nodes]]
id = 217
depth = 1
kind = "speaker"
speaker = "Player"
text = "Fair enough... so what are our leads?"
parent = -1

[[nodes]]
id = 218
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "First up we have Kemesis, Pharaoh of Menaphos."
parent = -1

[[nodes]]
id = 219
depth = 1
kind = "speaker"
speaker = "Player"
text = "What do you know about him?"
parent = -1

[[nodes]]
id = 220
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Truth be told, not a lot. He's probably the most powerful man in the Kharidian Desert, but he's incredibly reclusive. He's rarely seen in public."
parent = -1

[[nodes]]
id = 221
depth = 1
kind = "speaker"
speaker = "Player"
text = "If he's under Amascut's control, that could be a big problem. Do you know how we could get to him?"
parent = -1

[[nodes]]
id = 222
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Even without the quarantine, it would be incredibly difficult. His palace is a fortress."
parent = -1

[[nodes]]
id = 223
depth = 1
kind = "speaker"
speaker = "Player"
text = "That doesn't sound hopeful."
parent = -1

[[nodes]]
id = 224
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "It isn't. While there may be ways out of Menaphos, I don't know of any way back in again, let alone a way into the Pharaoh's own palace."
parent = -1

[[nodes]]
id = 225
depth = 1
kind = "speaker"
speaker = "Player"
text = "We'll leave that lead for now then. What about the other one?"
parent = -1

[[nodes]]
id = 226
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "The guard mentioned some scabarites. Perhaps we can learn something from them. He said they came from some ruins north east of the necropolis."
parent = -1

[[nodes]]
id = 227
depth = 1
kind = "speaker"
speaker = "Player"
text = "That would put the ruins directly east of here. All I see are cliffs."
parent = -1

[[nodes]]
id = 228
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Maybe there's something on the other side of them?"
parent = -1

[[nodes]]
id = 229
depth = 1
kind = "speaker"
speaker = "Player"
text = "Could be worth exploring, I guess."
parent = -1

[[nodes]]
id = 230
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Right, so we have our leads. One seems impossible to follow, but the other might have some promise. While I think about how we can access Menaphos, do you want to look into these ruins?"
parent = -1

[[nodes]]
id = 231
depth = 1
kind = "speaker"
speaker = "Player"
text = "Sure, but where do you even plan to start?"
parent = -1

[[nodes]]
id = 232
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "If we're ever going to get close to the Pharaoh, the Menaphos quarantine has to end. Kemesis himself has made it clear that will only happen when the plagues in Sophanem are eradicated."
parent = -1

[[nodes]]
id = 233
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "From what I hear, they've managed to deal with most of them now. That just leaves the pox they're all infected with."
parent = -1

[[nodes]]
id = 234
depth = 1
kind = "speaker"
speaker = "Player"
text = "So what, you're going to cure the pox?"
parent = -1

[[nodes]]
id = 235
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Exactly."
parent = -1

[[nodes]]
id = 236
depth = 1
kind = "speaker"
speaker = "Player"
text = "Surely if it were that simple, the High Priest would have done it by now."
parent = -1

[[nodes]]
id = 237
depth = 1
kind = "speaker"
speaker = "Maisa"
text = """
Have you met that man? He can try to present himself as a wise leader all he wants, but it's just a facade. The lizards around here have bigger brains than him, and that's probably still an insult to the lizards.
"""
parent = -1

[[nodes]]
id = 238
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "He didn't even have the guts to get rid of the plagued animals. The guards had to put them down themselves. And it's not like they can do that to the citizens!"
parent = -1

[[nodes]]
id = 239
depth = 1
kind = "speaker"
speaker = "Player"
text = "Well, they could. But I imagine that would be considered quite rude."
parent = -1

[[nodes]]
id = 240
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "Anyway, I reckon I might have a chance of succeeding where the High Priest failed. I have an old friend in Nardah named Zahur. She's a herbalist. I think she might be able to help."
parent = -1

[[nodes]]
id = 241
depth = 1
kind = "speaker"
speaker = "Maisa"
text = "While I go and visit her, you see if you can find these ruins. Remember, they should be just east of here. Meet me in Nardah once you have something."
parent = -1

[[nodes]]
id = 242
depth = 1
kind = "speaker"
speaker = "Player"
text = "Alright, good luck."
parent = -1

