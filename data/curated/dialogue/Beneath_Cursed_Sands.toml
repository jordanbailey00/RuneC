speaker = "Player"
text = "Tell me more about the war you mentioned."
parent = 493

[[nodes]]
id = 495
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|It started during the rule of my grandmother. An ever-expanding empire to the north set their sights on our lands. War soon broke out.}}"
parent = 493

[[nodes]]
id = 496
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|The armies of the Ruinous Powers were far stronger than our own. That was until Icthlarin's Stern Judges joined the fray. Thanks to them, the war was seemingly won.}}"
parent = 493

[[nodes]]
id = 497
depth = 2
kind = "speaker"
speaker = "Player"
text = "It wasn't really though, was it?"
parent = 493

[[nodes]]
id = 498
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|No. Among the Stern Judges, there was a serpent. After my father became Pharaoh, this serpent convinced the others to abandon us.}}"
parent = 493

[[nodes]]
id = 499
depth = 2
kind = "speaker"
speaker = "Player"
text = "They joined the enemy?"
parent = 493

[[nodes]]
id = 500
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|They did. We were powerless against a force of that might. Nothing could stop their advance.}}"
parent = 493

[[nodes]]
id = 501
depth = 2
kind = "speaker"
speaker = "Player"
text = "So how did the war end?"
parent = 493

[[nodes]]
id = 502
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|It was Tumeken himself. He sacrificed himself to annihilate the enemy. The cost was great, but the war was won.}}"
parent = 493

[[nodes]]
id = 503
depth = 2
kind = "speaker"
speaker = "Player"
text = "So Tumeken died?"
parent = 493

[[nodes]]
id = 504
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|That's a matter of perspective. I died long ago, and yet we are still having this conversation.}}"
parent = 493

[[nodes]]
id = 505
depth = 2
kind = "speaker"
speaker = "Player"
text = "That doesn't really answer my question."
parent = 493

[[nodes]]
id = 506
depth = 2
kind = "speaker"
speaker = "Mehhar"
text = "{{Colour|#000080|While Tumeken himself may be gone, he lives on through his four avatars. While they walk among us, Tumeken will always be at our side.}}"
parent = 493

