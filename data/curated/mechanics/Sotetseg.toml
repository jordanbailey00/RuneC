name = "Sotetseg"
source_pages = ["Sotetseg"]
npc_ids = [8387, 8388, 10867, 10868, 10864, 10865]

[sections]
"Mechanics" = """
Sotetseg stands immobile in the northern section of a 14×15 tiled arena. It launches small red projectiles which can be blocked with [[Protect from Magic]]. Upon striking a player, these projectiles will split into two other similar projectiles, both of which will ricochet towards other players as one grey and one red projectiles. The grey projectiles can be blocked with [[Protect from Missiles]] whereas the red projectiles can be blocked with [[Protect from Magic]] the same as original projectile. Failing to protect against Sotetseg's attacks will block the player's protection prayers for 3 seconds. Retribution, Smite, and most importantly, Redemption can still be used at this time. These projectiles are not tick-eatable up close, but it is possible at a distance. Sotetseg's melee attack is not tick-eatable, although unlike most melee attacks by NPCs, the hitsplat is applied one tick after the attack.

[[File:Sotetseg Shadow Realm.png|thumb|left|A player dragged into the [[Shadow Realm]] by Sotetseg.]]
Sotetseg will also occasionally fire a slow-moving large red ball at a single player, which can do up to 135 damage when it hits the player. If other players are standing within a 3×3 area of the targeted player, the damage will be dispersed among them. This large red ball is tick-eatable.

At 66.6% and 33.3% hitpoints, Sotetseg will choose a single player and transport them into a shadow realm. The player must follow the red path on the tiled ground and enter the portal at the end to return to the arena. The transported player will also constantly take hits of 1 to 3 chip damage every 7 ticks (4.2 seconds) while in the realm. The players in the arena must also follow the same path, however, they will only be able to see the current location of the transported player, denoted by a red glow on the tiled ground. Standing on a wrong tile will damage the player for 6.67% of their current hitpoints + 15 (11 in [[Theatre of Blood/Entry Mode|entry mode]]) damage every tick. Concurrently, players in the arena will also be chased by a red vortex that will deal damage to the whole party if intercepted.

His defence level can be lowered down to a minimum of 100. Although it is a [[dark beast]], it is not affected by a [[Slayer]] task.
"""
