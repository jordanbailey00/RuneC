[sections]
"The fight" = """
''Like gargoyles, players '''must''' bring a [[rock hammer]] or [[granite hammer]] to defeat Dawn.''

In the beginning of the fight, players may attack Dawn with either Ranged, Magic, or a halberd (as she cannot be harmed with any other form of melee); [[Dusk]] cannot be harmed during this phase of the fight. Once Dawn's health has reached half, she will fly up out of sight, and players may begin to attack Dusk. Once his health has reached half, Dawn will rejoin the fight and together with Dusk, will perform the lightning special attack that spawns purple and orange circles indicating where lightning will strike. Each lightning has an AoE of 3x3, rapidly dealing up to 5-10 damage per tick, and can stack together to rapidly kill players should they find themselves too close to the lightning. Note that not all the lightning spawns at the same time and some of it will start spawning after other spots are already getting struck. 
[[File:Grotesque Guardians lightning attack.png|thumb|left|250px|The Grotesque Guardians perform their lightning special attack.]]
After returning, she will occasionally send out three energy spheres (sometimes two) that will grow larger over time. The player may choose to absorb these spheres to prevent Dawn from healing from them. If the player ignores them entirely, each sphere will heal Dawn for 90 hitpoints if they return to her; however, it is not necessary to absorb the spheres if the player is able to deal sufficient damage to Dawn and finish her with the hammer before the spheres would have returned to her and actually heal her; as long as the player does not receive a game chat message stating Dawn is not weak enough to be harmed by the hammer when the player goes to smash her, she will crumble and die, even if she appears to start healing. After defeating Dawn, Dusk will absorb her essence, and initiate the final phase of the fight.
{{clear|left}}
"""
