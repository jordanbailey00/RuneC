[sections]
"=Phase 1=" = """
The Nightmare will choose her target based on their defence bonus and their Defence level. If your team has a designated tank, they should [[Protect from Melee|pray melee]], switching to [[Protect from Missiles|ranged]] or [[Protect from Magic|mage]] prayer when appropriate. The rest of the team should stand on different sides than the tank, so that the Nightmare is not facing them, meaning that they can ignore her melee attacks entirely.

During this phase, the Nightmare will use the special attacks '''Grasping Claws, Husks, and Corpse Flowers'''. Deal with these special attacks while continuing to have the correct prayer active.

Players immobilized by Husks will usually not have a portal spawn under them during the Grasping Claws attack, and the Nightmare does not seem to use the Corpse Flowers attack while players are immobilized. During the Corpse Flowers attack, be aware of where your tank is - players who end up on the same side of the Nightmare as the tank will need to be aware that they can be hit by the Nightmare's melee attack afterward, and should move or pray accordingly.

After depleting the Nightmare's shield, the totems will become vulnerable. The Nightmare will continue using its phase 1 attacks while you attack the totems. Fully charge all four and they will damage the Nightmare for 1/3rd of its health, and begin phase 2.

In this phase, be cautious of fully charging all of the totems if the Nightmare has not recently used her Husks attack. If she spawns Husks as the Totems fully charge, it can result in one or more players being immobilized while the Sleepwalkers spawn at the start of the next phase, possibly leading to the party taking massive damage from her power blast. It is recommended for immobilized players to use their magic weapon to kill the Sleepwalkers to prevent the party from taking massive damage. 

If players bring a Saradomin godsword they can use a special attack on the Sleepwalkers to restore health and prayer.
"""

"=Phase 2=" = """
The Nightmare will use her Sleepwalker attack at the start of this phase, and will deal considerable damage to your party if not all of the Sleepwalkers she spawns are killed. This is a good time to restore some HP and Prayer with a saradomin godsword special attack, if you brought one.

During this phase, the Nightmare will use the special attacks '''Grasping Claws, Curse, and Parasites'''. 

The Nightmare will spit out parasites from her mouth, which will then fly towards random player(s) in the arena based on the group size. When this occurs, the player's Hitpoints icon will turn pink. If the player does not drink a dose of [[Relicym's balm]] or [[sanfew serum]] before the parasite bursts from the player, they will take massive damage, and the parasite will be stronger, spawning with 80 hitpoints and slightly more defensive values compared to a weakened parasite. If the player does drink one of these two in time, the damage dealt is much less, and the parasite will have 40 hitpoints instead.

Parasites will immediately prioritise the Nightmare if her shield is depleted, launching a projectile at her that restores 31-50 of her shield charge for every attack they make. During the totems part of the fight, parasites will not focus on the Nightmare, but instead attempt to reverse the charges on the totem for the same amount. Therefore, it is highly vital to kill them as soon as they appear to prevent them from unnecessarily prolonging the fight. Try to maximise attack bonus and strength to kill the parasites as quick as possible. If there are no suitable targets, the parasite will attack player(s) instead, alternating between Ranged and Magic, with the former being used as the first attack.

Parasites are extremely annoying in this phase, especially in solo encounters since the player will likely have to deal with multiple parasite specials in a row.
"""

"=Phase 3=" = """
This phase begins with a Sleepwalker attack, just like the last one. Deal with it normally, optionally healing on the Sleepwalkers using your SGS or [[Blood Barrage]].

During this phase, the Nightmare will use the special attacks '''Grasping Claws, Spores, and Surge'''. Spores will be scattered in set patterns around the arena, and while they have a 1x1 appearance, they actually have a 3x3 AoE. Getting in a spore's AoE will cause it to burst, making whoever triggered it lethargic, disabling their run and decreasing their attack speed by 1 tick for a short duration. This can spread to other players, so avoid infecting them with spores.

It's common that the Nightmare will use her Grasping Claws attack while some spores are still active. Whenever spores are active, figure out beforehand which square(s) you can walk to so that you'll dodge a Grasping Claws portal without triggering any spores.

After the Nightmare's shields are depleted, simply charge all four totems for one final time while continuing to avoid her phase 3 special attacks, and the Nightmare will be defeated.
"""

"=Special attacks=" = """
* '''Grasping Claws:''' The Nightmare will spawn a black portal underneath her, and numerous smaller "end" portals before sticking her claws inside. If the player stands on '''any''' portal, they will take up to 50 damage. Simply move into a tile free of a black portal to avoid damage. The Nightmare uses this attack during '''all three phases'''.
* '''Sleepwalkers:''' At the start of the second and final phases, the Nightmare will summon [[Sleepwalker (monster)|sleepwalkers]] that walk toward her, the number of which is dependent upon the number of players in the instance, ranging from 1-24. They possess 10 health, but instantly die upon taking any damage. At the end of this attack, she will charge up a power blast that hits all players in the room for a minimum of 5 damage. The more sleepwalkers she absorbs, the more damaging the power blast becomes, capable of dealing over 70 damage to each player in masses. This damage is unavoidable, so kill as many sleepwalkers as possible before they reach the Nightmare. '''In a solo encounter, if the player doesn't kill the sleepwalker, the power blast will always result in death.'''
* '''Husks:''' The Nightmare spawns two [[husk]]s around random players in her arena. The targeted players will be frozen in place until the husks are killed. The blue, skinny husk uses magic attacks, while the green, bulky husk uses ranged attacks. The Nightmare will not spawn Grasping Claws portals under players that are frozen by the husks, '''however if the player is under the Nightmare while frozen by husks they will still take damage'''. The Nightmare only uses this attack during '''phase 1'''.
*'''Corpse Flowers:''' The Nightmare will divide the room into four equal quadrants with lines of flowers. One quadrant will be safe as indicated with white '''nightmare flowers''', while the remaining quadrants are unsafe as indicated with red '''nightmare berries'''. The safe quadrant is the one with both sides having nightmare flowers. If the player is standing on a quadrant with nightmare berries, they will rapidly attack the player for up to 20 damage every tick. The Nightmare will heal for double the amount they deal, and any attacks made from an incorrect quadrant will also heal her. This attack is only used during '''phase 1'''.
**Standing on a quadrant with only nightmare berries will cause players to take twice as much damage as the berries on both sides will attack them. 
*'''Curse:''' A pink glow fills the player's screen and protection prayers are shuffled. Clicking on [[Protect from Magic]] activates [[Protect from Missiles]], [[Protect from Missiles]] activates [[Protect from Melee]] and [[Protect from Melee]] activates [[Protect from Magic]]. After 5 attacks, the curse is lifted. The Nightmare only uses this attack during '''phase 2'''.
*'''Parasites:''' The Nightmare throws a [[parasite]] onto random players. After ~18 ticks (10.8s), it will grow and burst out of the player, dealing massive damage, and will then begin healing the Nightmare until killed. Drinking a dose of [[Sanfew serum]] or [[Relicym's balm]] before it emerges will weaken the parasite and greatly reduce the damage taken when the parasite bursts out. The Nightmare only uses this attack during '''phase 2'''. Players may click the [[Minimap|Hitpoints Orb]] to weaken the Parasite instead of clicking the potion within their inventory as well.
*'''Surge:''' The Nightmare will teleport to one of the four edges of the room, then immediately surge across to the opposite side dealing up to 60 damage to anyone caught in her path. Move out of the way to avoid taking damage. The Nightmare only uses this attack during '''phase 3'''.
*'''Spores:''' Puffshroom like objects spawn around the arena. Standing within 1 tile of one will cause it to explode, causing the player to become weary; their run is disabled and their attack speed is increased by 1 tick for a short duration. The Nightmare only uses this attack during '''phase 3'''.
<gallery captionalign="center" widths="350px" heights="280px">
The Nightmare - husks.mp4|The Nightmare summons a pair of husks.
The Nightmare - corpse flowers.mp4|The Nightmare's Corpse Flower attack, followed by her Grasping Claws attack.
</gallery>
"""

"=Standard attacks=" = """
Players can use [[protection prayers]] to mitigate damage from some of The Nightmare's attacks, in a manner similar to the [[Great Olm]] - attacks that are successfully prayed against will deal less damage, while an attack that is incorrectly prayed against will result in more damage; 120% of her maximum hit for her melee attack.{{CiteTwitter|author=OldSchoolRS|url=https://twitter.com/OldSchoolRS/status/1224658454255734785|date=2 February 2020|archiveurl=https://reldo.runescape.wiki/i/109346|archivedate=3 October 2020|quote=2 days...|notes=The tweet includes an image of some [[RuneScript]] showing that The Nightmare's melee damage is multiplied by 6/5 if the wrong protection prayer is used, with the comment: "Increased damage for noobs that pray incorrectly."}} This may also be the case with her Magic and Ranged attacks but has yet to be confirmed. 

The Nightmare has a unique aggression mechanic in which she determines the highest Defence roll out of all five [[Attack types|types]] for each player in her dream world, and will immediately focus on the player with the highest overall value.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1456924975357698061|date=6 November 2021|archiveurl=https://web.archive.org/web/20211106100246/https://twitter.com/JagexAsh/status/1456924975357698061|archivedate=6 November 2021|quote=It's looking at each player's overall crush, slash, stab, magic and ranged defence scores, and identifying the highest out of those for each individual player. Then it tries to find the player whose highest score is higher than anyone else's.}} This in turn makes her melee attack only hit in the direction she is facing.
[[File:The Nightmare - attacks.mp4|thumb|400px|A player correctly praying against the Nightmare's attacks.|autoplay|loop]]
*[[Ranged]] attack: The Nightmare will contort herself and shoot out projectiles toward players; having game sounds enabled will help as this attack performs a loud clicking sound per contortion. Players have '''3 ticks''' (1.8s) to react with [[Protect from Missiles]].
*[[Magic]] attack: The Nightmare will flail to the side surrounding herself with pink flower petals, then spin back shooting the petals toward players. Players have '''3 ticks''' (1.8s) to react with [[Protect from Magic]].
*[[Melee]] attack: The Nightmare will charge her claws and quickly slashes forward. Players have '''2 ticks''' (1.2s) to react with [[Protect from Melee]].
** Melee damage is dealt to everyone in front (including diagonally across) as well as under her. This attack will always hit regardless of the player's defensive bonuses, but it can be avoided by simply being in a direction the Nightmare is not facing or walking one tile away if facing her.
"""

"Fight overview" = """
Players should pre-pot with an [[Anglerfish]] and a sip of a [[stamina potion]] before running over to the Nightmare from a bank. Players should also be familiar with the Nightmare's mechanics, especially which special attacks are used during each phase, and how to take down all of the Sleepwalkers that spawn between phases. When bringing a team, it's not uncommon to designate players to specific sections of the arena, to more consistently deal with all of the Sleepwalkers. In larger teams, consider bringing [[Blood Barrage]] on one or more players, to dispatch multiple Sleepwalkers at once. If in a smaller team, such as a duo, if one player dies, the remaining player must deal sufficient damage, or they will be automatically teleported out of the instance, with a message saying, "The nightmare grows tired of your poor efforts."

The Nightmare is susceptible to defence-reducing special attacks, such as [[dragon warhammer]]'s, but she will restore her defence stat back at the rate of 20 defence per minute.

As the Nightmare has extremely high shield charges, players soloing the boss generally do so for the sake of [[Combat Achievements]] or practicing for [[Phosani's Nightmare]], as each solo kill generally takes well over 16 minutes. If the boss is being fought solo, an [[amulet of blood fury]] and/or [[Sanguinesti staff]] is absolutely required to counter all chip damage incurred during the fight.
"""

"Mechanics" = """
The Nightmare's mechanics scale accordingly to the amount of players present when the fight starts. By default, she automatically scales her shield and totem charge to that of a 5-man encounter, and thus team sizes below that will use this value.
"""

"Starting the fight" = """
Players can initiate the fight by disturbing The Nightmare while she is in her sleeping state.

If there is already a fight in progress, The Nightmare will be seen in a floating state with a glowing symbol on the ground beneath her. During this state, the symbol will indicate which of the 3 phases the current fight is in:
<gallery captionalign="center" widths="200">
The Nightmare - first phase symbol.png|This symbol indicates the fight is in the first phase.
The Nightmare - second phase symbol.png|This symbol indicates the fight is in the second phase.
The Nightmare - third phase symbol.png|This symbol indicates the fight is in the third and final phase.
</gallery>

If The Nightmare is already in her floating state, players will need to wait for the current fight to finish as her [[instance]] is not joinable mid-fight. Alternatively, players can [[world switching|hop]] to look for potentially available worlds.
"""
