name = "Kalphite Queen"
source_pages = ["Kalphite Queen", "Kalphite Queen/Strategies"]
npc_ids = [965, 4304, 963, 4303]

[sections]
"Fight overview" = """
{{Main|Kalphite Queen/Strategies}}
[[File:Fighting Kalphite Queen.png|thumb|250px|A player fights the airborne form of the Kalphite Queen.]]
The Kalphite Queen has a [[combat level]] of 333. Each form has 255 [[Hitpoints]], and her [[Ranged]] and [[Magic]] attacks have 100% accuracy.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/606032495704801281|date=3 June 2015|archiveurl=https://archive.is/raBDO|archivedate=26 May 2020}} She may also use a decently accurate [[melee]] attack.

Each of her attacks has a max hit of 31. Her Ranged attacks consist of her shooting barbed spines from her abdomen. Her Ranged attacks will drain 1 prayer point (which may be reduced by [[spectral spirit shield]]). If there are players close to the person being targeted with this attack they will also be hit. To avoid this, players can stand on opposite sides of the Kalphite Queen. Her Magic attack bounces from player to player.

In addition to her highly accurate attacks, the Kalphite Queen also makes use of overhead [[Protection prayers]]. However, unlike other prayer-using monsters (such as [[Sigmund]]), these '''do not''' provide full immunity, but rather improved defence against them. The first form will simultaneously have [[Protect from Magic]] and [[Protect from Missiles]] active, while the second form will only have [[Protect from Melee]] active. While it's possible to kill the Queen with one combat style, it is recommended to bring two for an easier fight.

[[File:Kalphite queen transformation.png|thumb|250px|The Kalphite Queen transforming to her second form.]]

When the first form is killed, it takes 20 [[RuneScape clock|game ticks]] (12 seconds) for the transition into the second airborne form. During this transformation, an animation can be seen where [[Kalphite queen legs|Kalphite Queen legs]] fall to the ground while the Kalphite Queen sheds her exoskeleton.

If the second form stays alive for over 20 minutes, she will revert to the first form and retain the second form's remaining [[hitpoints]]. When the first form is killed again, a second form with full health will emerge, akin to [[Vet'ion]].

If stat-draining [[special attacks]] are used on her first form, the stat reductions will carry over to the second form.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/861503532712722432|date=8 May 2017|archiveurl=https://archive.is/Ck9G5|archivedate=26 May 2020|quote=Yes [when the defence is lowered on KQ's first form it stays lowered on the second form], same with Vet'ion.}}
"""

"First phase" = """
During both phases, it generally does not matter whether you pray [[Protect from Magic]] or [[Protect from Missiles]], but Protect from Magic is still preferred in case another player crashes you as it can bounce between players. Also, [[Piety]] (or [[Mystic Vigour]]/[[Augury]] for magic) is strongly recommended to speed up kills. Immediately run under her again after killing off her first phase, heal up, and prepare for the second phase.
"""

"Second phase" = """
Players should continue to pray [[Protect from Magic]] during phase 2. Players should walk under her as soon as this phase begins, otherwise she will get an extra attack on you first. Use a DPS calculator to determine how accurate her melee attacks during this phase will be; stand within melee range if more than 50% of her melee attacks will miss on average.<ref group="n">Standing one tile away gives a 50/50 chance of not taking damage, therefore players in melee range should aim for enough stab/defence bonus to dodge more than 50% of her melee attacks. Food can be conserved by running underneath her while healing rather than eating in the open, and players can use her minions or walls to restrict her movement. Also, [[Eagle Eye]] or [[Rigour]] (or [[Mystic Vigour]]/[[Augury]] for magic) is strongly recommended to speed up kills.</ref> 

{{Reflist|group="n"}}
</tabber>
"""

"The fight" = """
'''Tip:''' Unless wearing a [[serpentine helm]] for the duration of the fight, either sip an [[antidote++]] before going to the lair to save an inventory slot, or bring the potion in with you during the fight.

The [[Kalphite Queen]] has 510 [[Hitpoints]], split across two phases. Her [[Magic]] and [[Ranged]] attacks will always land as [[successful hit]]s. While unlikely, it is possible for them to land but deal no damage. Her [[Ranged]] attack will drain 1 prayer point if it deals more than 0 damage. Her [[Melee]] attack does not share the unique accuracy mechanic, and is treated as a standard attack meaning that standing next to her will decrease her DPS. Unlike the soldiers and guardians, this melee attack does not poison. When standing in melee range of the Kalphite Queen, she has a 1/2 chance of doing a melee attack, while her Magic and Ranged attacks each have a 1/4 chance of triggering.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/825775423275532289|date=29 January 2017|archiveurl=https://reldo.runescape.wiki/i/98339|archivedate=4 January 2023|quote=If you're adjacent, it's 50% melee, 25% range and 25% mage. If you're not, it's 50% range and 50% mage.}}

There are two phases of the fight, similar to [[Vet'ion]]. While in her grounded form, the Kalphite Queen has [[Protect from Magic]] and [[Protect from Missiles]] active; however, they only add increased [[Defence]] to those styles rather than full immunity like the player versions of them.

[[File:Fighting Kalphite Queen.png|thumb|250px|A player fights the airborne form of the Kalphite Queen.]]
When her first form falls at zero health, her chitin will crack open to reveal her second form, a wasp-like creature. This airborne form has [[Protect from Melee]] active; however, like the first form, this only provides increased Defence.

'''Note:''' Upon triggering the second form, there is a time limit of 20 minutes for defeating it. If not defeated within this time frame, the Kalphite Queen returns to the first form, though she carries the health she had left in her second form upon reverting back.

Her ranged attack will hit players close to the main target. To avoid this, players in a group can stand on opposite sides of her. This positioning (combined with Protect from Magic) will greatly reduce the amount of damage taken over the course of the fight.

Throughout the fight, if the Kalphite Queen is near any of the bulging cocoons, there is a 1/20 chance it will hatch an aggressive [[Kalphite Worker]] each time the Queen is hit (including on unsuccessful hits).{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/653504232386072576|date=12 October 2015|archiveurl=https://reldo.runescape.wiki/i/103609|archivedate=4 January 2023|quote=It's a small chance when she takes damage, provided she's near the eggs.}}{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1416132459473866753|date=16 July 2021|archiveurl=https://reldo.runescape.wiki/i/99326|archivedate=4 January 2023|quote=She has a 1/20 chance of trying to run that code whenever she takes a hit. Including hits of 0.}} These only stay for a while before despawning. It is advised to get the Queen near them so the workers will spawn. This is because if there are plenty of workers around her, she will be unable to move at all while they are present, and allow the player to easily [[flinch]] her for longer trips. This is only viable with melee, as there is not enough time to dodge her attack if flinching her with Ranged or Magic. An exception to this are salamanders, which work like a melee weapon and can deal magic damage. 

Her attacks can be [[Tick manipulation|tick-eaten]], however her ranged and magic attacks do have different projectile speeds and as such, it is advised to always make sure to heal up when below 31 Hitpoints to prevent the risk of dying. It is recommended to step under her during this to not take more damage.
"""
