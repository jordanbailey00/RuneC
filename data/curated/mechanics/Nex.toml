name = "Nex"
source_pages = ["Nex", "Nex/Strategies"]
npc_ids = [11278, 11279, 11280, 11281, 11282]

[sections]
"=Blood phase=" = """
[[File:Nex - blood sacrifice.png|thumb|300px|A player is marked in red as part of Nex's Blood Sacrifice attack.]]
Nex's third phase, the blood phase, starts when she shouts {{overhead|Flood my lungs with blood!}} During this phase, Nex will use [[Blood Barrage]] against players, which heals her a percentage of the damage dealt and drain prayer based on the damage dealt which can be reduced by the [[spectral spirit shield]].

Unlike her other long-ranged attacks, the barrage is only cast at one player, although it has a 3x3 AoE centred on the current target. However, it is very accurate. Ideally, each player should stand away from each other while in melee distance of Nex to avoid getting splash damage. This can be safely achieved in a team size of six or less, though the team should be using the follow/5-tick stalling method whenever possible.

Her special attacks in this phase are:
* '''Blood Siphon''' - Nex will shout {{overhead|A siphon will solve this!}} Nex will summon up to eight [[blood reaver]]s (depending on team size) and kneel down for about 8 ticks. During this, '''all''' damage she receives will instead '''heal''' her. When a new siphon is used, the previous remaining siphon's reavers will die and heal Nex for their remaining health.
** Players can heal off blood reavers for 50% of the damage dealt towards them, which can be useful in a pinch.
* '''Blood Sacrifice''' - Nex will shout {{overhead|I demand a blood sacrifice!}} A single player will be marked for sacrifice, and will glow red. The marked player has about four seconds to move at least seven tiles away from Nex, otherwise they will be dealt up to 50 damage through [[Protect from Magic]] which heals her and drains the player's current prayer points by 33%. Closest players will also take up to 12 damage through Protect from Magic, and their prayer is drained by 33% as well.

After Nex reaches 40% health (1360 hitpoints), she will shout {{overhead|Cruor, don't fail me!}} [[Cruor]] will become vulnerable and must be killed to proceed to the next phase. Cruor is weakest to slash attacks but can be killed with ranged as well.

Any blood reavers that persist will be automatically killed once Nex starts the next phase.[[File:Ice Barrage icon (mobile).png|left]]
"""

"=Ice phase=" = """
[[File:Nex - containment.png|thumb|300px|Nex unleashes her Containment attack.]]
Nex's fourth phase, the ice phase, starts when she shouts {{overhead|Infuse me with the power of ice!}} During this phase, Nex will use [[Ice Barrage]] against players, which will freeze them for 15 ticks{{CiteDiscord|author=Mod Ash|url=https://discord.com/channels/324132423636090880/434286997360738305/1467836991453528145|date=02 February 2026|quote=Glacies and the Spritual Mages do 6 ticks, checking that your last freeze wore off over 5 ticks ago. Prayer doesn't appear to affect the duration. The accuracy roll is the NPC's magic accuracy vs the player's magic defence, which seems appropriate.
<br>Nex does 15 ticks, checking that your last freeze wore off over 5 ticks ago AND that you're not praying against magic. Prayer doesn't appear to affect the duration, once she's decided to apply it.|image=Ash_nex,_glacies,_spiritual_mages_freeze_duration.png|name=ash_freeze_duration|archiveurl=https://reldo.runescape.wiki/i/27962776#chat-messages-434286997360738305-1467836991453528145|archivedate=2026-03-07}} if they are not praying [[Protect from Magic]] and lowers their prayer points by half of the damage she deals, or 33% if a [[spectral spirit shield]] is worn. Teams should generally stand in melee distance to reduce the frequency of the magic attack. Players should be wary of the 'Containment' special attack when standing in melee distance, especially after [[Glacies]] has been activated to avoid being frozen in place.

Her special attacks in this phase are:
* '''Containment''' - Nex will shout {{overhead|Contain this!}} She will smash the floor and icicles will appear in a 5x5 area around her. Getting caught in this can damage players up to 60 hitpoints and will deactivate protection prayers. Players near [[Glacies]] should be wary of this special as it is possible for Glacies to freeze them in place and at the same time Nex glide to the corner and use this special right after. If one is frozen and cannot escape the special attack, praying [[Protect from Missiles]] will reduce the damage by half.
* '''Ice Prison''' - Nex will shout {{overhead|Die now, in a prison of ice!}} She will freeze a targeted player using an ice stalagmite attack, spawning stalagmites within a 3x3 AoE centred on the target player and deactivating their protection prayers. Players next to the formation will be shoved aside for no damage, although players on the same tile as the target will also be imprisoned. Four seconds after forming, the prison will shatter, dealing up to 75 damage to everyone inside it if one of the stalagmites were not destroyed. To destroy these, use either [[stab]] or [[crush]]-based attacks; while unarmed players can destroy them via kicking and punching, stab and crush weapons (especially those with higher accuracy like the [[Elder maul]] or [[Osmumten's fang]]) are more effective and have less chance of failing. Like with the containment special attack, If one is frozen and cannot escape the special attack, praying [[Protect from Missiles]] will reduce the damage by half its original amount. A salamander can also be used to free players from Ice Prison, without the need for tar, '''and will never fail'''.

After Nex reaches 20% health (680 hitpoints), she will shout {{overhead|Glacies, don't fail me!}} Now, her mage [[Glacies]] will become vulnerable and must be killed to proceed to the last phase. Glacies is weakest to crush attacks, but should still be ranged. Glacies can still freeze players for 6 ticks{{Refn|name=ash_freeze_duration}} through Protect from Magic, so it is important that they stay away from Nex as much as possible to avoid getting clipped by her containment attack.[[File:Ruinous Powers.png|left]]
"""

"=Shadow phase=" = """
[[File:Nex - shadow smash.png|thumb|300px|Nex unleashes her Shadow Smash attack.]]
Nex's second phase, the shadow phase, starts when she shouts {{overhead|Darken my shadow!}} During this phase, Nex will shoot shadow shots which are considered [[Ranged]] attacks. Having [[Protect from Missiles]] active will cut the damage taken in half. Successful hits can drain prayer points slightly, which can be reduced by the [[spectral spirit shield]].

Players will take more damage from the shadow shots the closer to Nex they are, up to 30 with [[Protect from Missiles]], so it is not recommended to melee her during this phase unless the team knows what they're doing. Stand at the furthest possible distance (8 for crossbows not on long-ranged, 10 otherwise) and attack from afar. If using the rapid attack style with a crossbow, hit once as far back as you can then run back two spaces and repeat to reduce damage from the attacks.
[[File:Nex - shadow resetting.mp4|thumb|400px|A group of players force Nex away from melee distance in order to avoid embracing darkness.]]
Nex may chase after a player on the edges of the room from the centre of the arena. If she does, the team should all stand under Nex. This should be coordinated at the centre of the row/column they're on (which should ideally be between Fumus and Umbra). This prevents Nex from attacking anyone; '''do not attack''' Nex during this time until she flies back to the centre of the room. This is known as shadow resetting, and will result in Nex being unable to successfully run near the team. Nex will automatically find herself unable to attack and dart back to the centre of the room when this happens. Running away from her would simply cause her to cut her target in front of them, and she may potentially chase after them a second time. If a player is trapped under or near Nex under Darkness (as seen by the room becoming dark on the player's screen), a swift death is likely if they are being chased. 

Her special attacks in this phase are:
* '''Shadow Smash''' - Nex will shout {{overhead|Fear the shadow!}} Deadly shadows will appear under every player. Players have three ticks to move out of their way before they erupt and deal up to 50 damage.
* '''Embrace Darkness''' - Nex will shout {{overhead|Embrace darkness!}} The chamber will be darkened drastically. The closer players are to Nex, the darker the room will be. If players stand next to Nex for too long, they will take constant damage from the pure shadow. If this damage is triggered, the player must remain outside of Nex's melee distance for 10-15 seconds to avoid taking damage while next to her.

Players that are targeted by Nex should try to lure her away from Umbra or reset Nex into the centre of the room. This allows the entire team to attack Umbra once Umbra is vulnerable, while maintaining a safe distance away from Nex.

After Nex reaches 60% health (2040 hitpoints), she will shout {{overhead|Umbra, don't fail me!}} [[Umbra]] will become vulnerable and must be killed to proceed to the next phase. Umbra is weakest to ranged attacks. Whoever Umbra is focused on should use [[Protect from Magic]] and stay away from the rest of the team if Nex is far away, as Umbra uses accurate [[Shadow Barrage]] attacks.[[File:Blood Barrage icon (mobile).png|left]]
"""

"=Smoke phase=" = """
[[File:Nex - choke quarantine.png|thumb|300px|A single player, on the top right of the image, purposely receives Nex's Choke attack by having the least amount of magic defence bonuses.<br><br>On the left, other players <!--social--> distance themselves from her to avoid spreading the virus.]]
Nex's first phase, the smoke phase, starts when she shouts {{overhead|Fill my soul with smoke!}} During this phase, Nex will use [[Smoke Rush]] against players, which can [[poison]]. This is the only phase where her basic magic attacks do not drain prayer. All players should stand within melee range of her, a strategy known as melee distancing (MD), which will cause her to use her melee attack which only targets one player, as opposed to her magic attack which targets multiple players and deals more total damage. While in melee distance, the player being targeted by Nex may use [[Protect from Melee]] to reduce the overall damage taken, and then immediately switch to [[Protect from Magic]] once Nex switches targets.

Her special attacks in this phase are:
* '''Choke''' - Nex will shout {{overhead|Let the virus flow through you!}} The player furthest away with the least amount of magic defence bonus will be targeted with the attack and become infected, drains two prayer points per every two [[ticks]], and drains stats based on the player's highest attack bonus. The virus will also spread between adjacent players, infecting players without it, and resetting the duration on infected players.
** Infected players can be easily identified by the {{overhead|*Cough*}} above their heads. The virus can easily be prevented from spreading by having one player equip negative magic defence armour, such as Justiciar, and standing away from the other players at the start of the fight, to avoid spreading Choke to the rest of the players.
** A [[gas mask]], [[facemask]], or [[slayer helmet]] will reduce the duration of choke in half, and the [[spectral spirit shield]] can reduce the prayer drain.
* '''Drag''' - Nex will drag a random player towards her, stunning them and deactivate their protection prayer. Nex will only drag players if they are within 6 tiles. There is a 1/4 chance for Nex to drag a player if they do not have Protect from Magic on and a 1/8 chance if they do.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1556556433461747713|date=8 August 2022|archiveurl=https://reldo.runescape.wiki/i/107949|archivedate=31 August 2022|quote=1/4 chance by default, reduced to 1/8 if you're praying against magic, and you'd have to be within 6 tiles of her.}}
* '''Smoke Dash''' - Nex will shout {{overhead|There is... NO ESCAPE!}} and dart down one of the four aisles in the chamber, hitting everyone in her path for up to 50 damage. Nex will look at the direction she intends to fly down towards prior to the attack as a warning indicator to avoid that area.

Nex will always start this phase by using her Choke attack. In smaller teams that are melee distancing, each player should spread out to avoid spreading the virus. Once a player has received the virus, the other players no longer need to distance themselves from each other and should move to a position that allows space for the infected player, in case they are targeted by the Drag special attack. Ideally, one player in the team, typically a ranger, should act as a choke tank (CT) with a form of gas protection to prevent spreading the virus onto other players and reducing the amount of coughs overall.

After Nex reaches 80% health (2720 hitpoints), she will shout {{overhead|Fumus, don't fail me!}} Her mage [[Fumus]] will become vulnerable and must be killed to proceed to the next phase. Fumus is weakest to stab attacks, although ranged is still reasonable and generally still preferred.[[File:Shadow Barrage icon (mobile).png|left]]
"""

"=Zaros phase=" = """
[[File:Nex - melee distancing.png|thumb|300px|Players staying within melee distance of Nex to minimise damage from her magic attacks.]]
Nex's fifth and final phase, the Zaros phase, starts when she shouts {{overhead|NOW, THE POWER OF ZAROS!}} During this phase, Nex will call on Zaros' power, healing her for 500 hitpoints, and will only use her melee and non-attuned magic attacks. Her magic attacks drain 5 prayer points if they hit, which can be reduced with the use of the [[spectral spirit shield]]; the magic attack additionally has a unique interaction with [[Protect from Magic]], where having it active before she uses it will reduce damage by 50% as normal, but activating it after she uses it will reduce damage by 25% instead.

Similarly to the smoke and ice phases, all players should run up to Nex to reduce the team's overall damage taken. Players with the lowest crush defence bonus are targeted more frequently by her melee attack.

In addition, she will use several [[Ruinous Powers]], which are Zarosian prayers, in this final phase of the fight:
* '''Turmoil''' - Lasting until the end of the fight, Nex's magic and melee attacks are now far more accurate and powerful, hitting massive damage even through prayer. In addition, it can also drain the player's melee, range and magic stats, transferring the drained stats to her own.
* [[File:Soul Split overhead.png]] '''Soul Split''' - An overhead prayer in which Nex will heal a small percentage of her health for every successful hit she inflicts.
* [[File:Dampen Melee overhead.png]] '''Deflect Melee''' - An overhead prayer in which Nex will activate a variant of [[Protect from Melee]] that deflects the damage the player would have dealt to her with melee attacks.
* [[File:Wrath overhead.png]] '''Wrath''' - An overhead prayer in which Nex shouts {{overhead|Taste my wrath!}} This is a stronger version of [[Retribution]], and deals up to 50 damage to players within a 5x5 radius of Nex upon her death. Players have three seconds after her death to run away from her Wrath attack.

Nex will always enter the phase with [[Soul Split]]. After four auto-attacks, she will switch to Deflect Melee, and then another four auto-attacks after that, have no active curses. She will then reactive Soul Split after four more auto-attacks and retain this pattern until defeated.
"""

"Fight overview" = """
The battle against Nex is fought in a circular room with a cross-bridge that resembles the symbol of Zaros. Nex moves very quickly as she can run at the speed of a player. She can jump across the room in two ticks and she will leap across the pits. The battle has five phases: Smoke, Shadow, Blood, Ice, and the Zaros phase. There are four level 285 mages in the four corners of the room, [[Fumus]], [[Umbra]], [[Cruor]], and [[Glacies]], which represent the four elements of the [[Ancient Magicks]] Nex uses in the first four phases.

Nex possesses high health but fairly low combat stats and defensive bonuses for her level - however, she should still not be underestimated. While she is weakest to [[Stab weapons|stab]] attacks, ranged is highly recommended for the Shadow and Zaros phases. Her defence can be reduced a maximum of 10 levels. The bodyguards have fairly high Defence with varying defence bonuses, with three of them being slightly weaker to melee than they are ranged. Regardless, bringing melee and ranged is recommended for smooth and fast kills in smaller teams.

During the fight, Nex uses Ancient Magicks of the same type as the mage of that phase with an attack range of 10. Nex also has a standard melee attack that can hit players for up to 30 damage within melee distance, and will always follow up with two additional melee attacks if her target remains within melee distance. Nex targets the nearest player for her standard attack; if multiple players stand within equal proximity, the person with the lowest defensive bonus against the current style will be targeted.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1543993185277562883|date=4 July 2022|archiveurl=https://reldo.runescape.wiki/i/100629|archivedate=3 May 2023|quote=Looks like it's comparing the players' distance from her, and tie-breaking on who's for the lowest defence against her current style, if I'm reading this right.}} Using the correct protection prayer will reduce the damage of Nex's regular melee attacks by 80%, or by 66% during the final phase; while the damage of Nex's Magic attacks can be lowered by 50% normally, or by 66% during the blood phase.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1553364162406924289|date=30 July 2022|archiveurl=https://web.archive.org/web/20220731035959/https://twitter.com/JagexAsh/status/1553364162406924289|archivedate=31 July 2022|quote=[ what percentage of damage is blocked when correctly praying magic and melee against Nex] Melee: 4/5 is blocked, or 2/3 in the final phase. Magic: 1/2 is blocked, or 2/3 in the blood sacrifice bit.}} Nex's Ranged attacks can be lowered by 50% during the shadow phase using protection prayers.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1554011952036417536|date=1 August 2022|archiveurl=https://web.archive.org/web/20220801114518/https://twitter.com/JagexAsh/status/1554011952036417536|archivedate=1 August 2022|quote=[thankyou so much and sorry to be a pain, for phase 2 what is the max hit of ranged? (...)] (...) Prayer blocks 1/2, yes.}}

If Nex is not in combat with a player for at least 8 ticks, she will fly ahead of her target to resume combat. If the player is under her while in the edges of the room, she will dash to the centre of the room. If the player is already in the centre of the room and under nex, she will dash to of one of the bridges in the cross. Player attacks are interrupted when she does this and must be reinitiated. Nex is immune to any hits that are in process during this manoeuvre, such as those from crossbow bolts, so it is advised only to do this if a new position will benefit the team.

Nex's chamber can only be accessed when she is not being fought (i.e., when the barrier to the chamber is glowing '''purple'''). If players are battling her, the barrier to her chamber will be glowing '''red''' and will remain that way until the fight ends. To leave her chamber, use the [[Altar (Ancient Prison)|altar]] across the room to teleport out. '''The altar will teleport players right outside the bank area, so make sure to have appropriate Zarosian protection before teleporting.'''

Praying at the altar while wearing at least one Zarosian item will restore [[Hitpoints]], [[Prayer]], [[Special attacks|Special attack]], and [[Run energy]]. If no Zarosian items are worn, the altar will only restore Prayer. This can be done once every 10 minutes. 

If players die during the fight with Nex, they may reclaim their items via the chest found in the safe rooms immediately after entering the [[frozen door]], as well before Nex's chamber. Reclaiming items in the chest will cost 100,000 coins regardless of the items' total cost. Bring Saradomin and Zamorak-affiliated items; if intending to head straight back into Nex, bring a Zarosian item too if it is not one of the items held in the chest. '''Dying without reclaiming items in the chest will cause them to be lost for good.''' '''<u>DO NOT DIE ON THE WAY BACK!</u>'''[[File:Smoke Barrage icon (mobile).png|left]]
"""
