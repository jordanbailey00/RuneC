[sections]
"Fight overview" = """
The fight is [[instanced]]; if players [[die]] while fighting the Hydra, then they may reclaim their items from [[Orrvor quo Maten]] outside for 100,000 [[coins]] each time. Dying elsewhere with items still held by him will result in them being lost forever.

'''Note:''' While the Hydra is in the room, players cannot leave through the doors, as they are jammed when this occurs. Teleports will still work, however. The Hydra has a respawn time of 20 seconds.
{{Tile markers box|Module:Tile markers/Alchemical Hydra.json}}

The Hydra has four phases, each one beginning upon each 25% health threshold (~275 health). A head will fall off each time this occurs, as the Hydra roars and changes colour. At the start of each phase, the Hydra will perform three auto-attacks before performing a special attack.

The Hydra attacks with both [[Magic]] and [[Ranged]]. The Hydra will begin the fight with either combat style. For the first three phases, after every three basic attacks, the Hydra will sway its heads backwards as an indicator that it is changing combat styles.

During the first three phases, the Hydra reduces incoming damage by 75% until it is lured over and sprayed by the appropriate chemical vent. The Hydra will {{overhead|Roaaaaaaaaaaar!}} when hit by the correct vent. If Hydra is sprayed by an incorrect vent, the damage of its attacks increase, although protection prayers continue to block all damage regardless.

In the final phase, the Hydra attacks alternately with Magic and Ranged, choosing to start with the opposite of what it attacked with last. On the fourth attack, the Hydra instead throws poison splatters as in the first phase.

