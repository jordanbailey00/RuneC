"Fight overview" = """
As a delve boss, defeating the Doom will cause it to delve deeper into the archive, growing in power as it does so. Pursuing it into deeper delve levels will increase the difficulty of the fight, up to delve level 8.

Starting from delve level 1, the Doom of Mokhaiotl starts with a combat level of 558 and 525 Hitpoints. For every delve level after - up to delve level 8 - it will gain 50 additional combat levels and 25 Hitpoints. This excludes delve levels 6 and 7, which both have 650 Hitpoints. The boss' stats remain identical across delve levels, though the damage it deals increases with every delve level. 

The Doom will not appear until the player clicks out of the prompt (after jumping through the gap or descending down a level), after which it will spawn shortly afterwards. 

The Doom possesses a Defence level of 90 and Magic level of 275. It possesses +300 stab and slash defence, +60 crush defence, and +160 magic and overall ranged defence. Additionally, the Doom has a [[stat drain|defence drain cap]] of 30, meaning that its Defence can only be lowered to a minimum of 60. It is not immune to [[poison]], with any hits that would inflict [[venom]] instead being converted to poison.

Further delve levels - referred to as deep delves - will remain at the same difficulty as delve level 8 in theory (having 625 Hitpoints instead of 675), but the persistent [[acid blood]] that remains in the arena makes it practically more difficult.
"""
