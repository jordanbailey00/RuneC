|[[File:Acidic Araxyte.png|140px|left]]
|[[Acidic Araxyte]]s attack with ranged that can deal up to 15 damage. If killed, it will explode, splattering acid on random squares within a 7x7 AoE surrounding it. The araxyte will always attack off-tick from Araxxor if it is not prompted to move. Some players may choose to ignore killing these should they feel comfortable enough in tanking their attacks.
| '''Acid Ball:''' Araxxor launches a projectile that flies in a straight line from his direction towards the player. Being in the ball's trajectory (which has a 3x3 Area-of-Effect despite its 1x1 appearance) will deal approximately 18 [[venom]] damage, and it will leave acidic pools behind as it travels. The ball will explode upon hitting a wall, splattering acid in a 7x7 AoE from impact. Try to have Araxxor face a wall so the ragged tiles are less impactful. The splatter '''will damage''' before the pool forms.
|-
|[[File:Egg (Mirrorback Araxyte).png|140px|left]]
|[[File:Mirrorback Araxyte.png|140px|left]]
|[[Mirrorback Araxyte]]s will redirect 20% of the damage dealt to Araxxor towards themselves, and further recoil 50% of that damage to the player, effectively resulting in players taking damage equal to 10% of the damage they dealt to Araxxor. Attacking the spider directly with a melee weapon will result in the player taking 50% of the damage they deal to it as recoil.

Attacking it with [[ranged]], [[magic]], or with a [[halberd]] (while one tile away) will ignore their deflection. Furthermore, if the player has [[Vengeance]] currently active, attacking it will result in no damage taken and the mirrorback will instead receive the damage that would have been dealt to the player. 
| '''Acid Splatter:''' Araxxor launches venom blobs in a wide arc around the player that hit for low venom damage, leaving acid pools behind. As with the acid ball, the splatters '''will damage''' before the pool forms.
|-
|[[File:Egg (Ruptura Araxyte).png|140px|left]]
|[[File:Ruptura Araxyte.png|140px|left]]
|[[Ruptura Araxyte]]s do not directly attack the player, but will move towards them and explode once they are in melee range. The amount of damage dealt is proportional to its health; at full health, an up-close explosion will deal up to 80 damage, while being at least 3 tiles away from it deals a minimum of 7 damage.

This explosion attack can be used against Araxxor and his minions (whether as an egg or hatched), with the damage dealt based on its health at the time of explosion. If it explodes at full health and the target's hitboxes are underneath it, it will deal 80 damage, meanwhile targets adjacent to it will take 64 damage, with the minimum damage incurred being 33. Damage dealt will be less the further away the target is from the explosion.
| '''Acid Drip:''' Araxxor launches a single venom blob that homes in onto the player, leaving them dripping in venom and leaving pools behind as they move for 6 ticks. Players should continuously move, avoiding standing on the same tile for the duration of the acid, but also while staying within Araxxor's melee range. One good option is to stand under the boss right after the attack lands, move over a tile, then attack the boss again, then repeat this once more. This should allow the player to avoid all of the acid pools while maintaining attacks on the boss.
|}
<gallery mode="packed" heights="300" style="text-align:left">
Araxxor - Mirrorback Vengeance.mp4|To counter the mirrorback araxyte with melee, the player must cast [[Vengeance]] and attack it in quick succession right after Araxxor attacks. Otherwise, Vengeance may deflect Araxxor's attack instead, failing the counter.
Araxxor - Ruptura Araxyte's own goal.mp4|The player can lure Araxxor towards an egg and lure the ruptura araxyte to explode both him and the next egg. Though the egg has one Hitpoint remaining, it will fail to hatch, forcing Araxxor use another three standard attacks to hatch the next egg.
</gallery>

It is always best to lure the red araxytes so they explode underneath Araxxor for the extra damage; while optional, it is generally recommended to lure them to white eggs if the player does not wish to directly attack them to avoid wasting time preparing to kill the white araxytes.

If attacking the white araxytes directly, they can be one-hit with a [[Crush weapons|crush]] weapon while under the effects of [[vengeance]], and also with the same methods as all araxytes, listed below. Alternatively, a noxious halberd will one-hit them which saves a lot more time on average than having to weaken the eggs.

{{Recommended equipment
