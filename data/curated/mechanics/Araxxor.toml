[sections]
"=Enrage phase=" = """
When Araxxor falls below 255 health, he will enter an enrage phase. This is signified with a distinct screeching sound, along with Araxxor coating his two front legs with venom. This will additionally increase his Defence level by 35, Magic by 28 and Ranged by 31; drained stats '''will''' carry over to enrage. Alongside the increased stats, Araxxor's attack speed is increased from 6 (3.6 seconds) to 4 (2.4 seconds).

For the remainder of the fight, Araxxor will replace his melee attack with a cleave attack, but will still use magic and ranged attacks at a distance, as before. The cleave attack targets a 1x3 area around the player's location, dealing melee damage and leaving acid pools on the ground. However, if the player is standing under Araxxor when targeted, the cleave will only leave one acid tile in the centre. The area Araxxor targets when stepped under should be stepped away from by 2 tiles cardinally, or 1 tile diagonally, as it can be unpredictable which direction the line of attacked tiles is facing.

The player can dodge the cleave attack by moving outside the targeted area immediately when Araxxor shouts {{overhead|Skree!}}. If the player fails to dodge the cleave attack, [[Protect from Melee]] will still reduce its damage by ~50%. [[Aranea boots]] can be worn to protect the player from the cleave attack up to once every 20 [[ticks]] (12 seconds) - as well as from Araxxor's ranged attack - although they will not negate the poison damage from the acid pools left behind.
[[File:Araxxor_5-tick_enrage_cropped.mp4|thumb|480px|How to use a 5-tick weapon during the enrage phase without tick loss. When the player attacks Araxxor at the same time he raises his arms, the player must dodge the next attack by moving at the same time Araxxor raises his arms.]]
[[File:Araxxor_step-under_cropped.mp4|thumb|480px|Using the step-under technique to make Araxxor deal damage to himself. If using a 5-tick weapon, players will only attack with their weapon for every 3 out of 4 cleaves the boss performs. As a result, it is recommended for 5-tick weapon users to watch for when they attack just before stepping under the boss, then skip the next step-under to prevent tick loss, as demonstrated in this clip.]]

A way to finish the enrage phase slightly quicker is to bait Araxxor into attacking the tiles he occupies, which results in him damaging himself for 8-12 damage. To perform this method:
# When enrage phase starts, move two tiles into him.
# When Araxxor shouts {{overhead|Skree!}}, click on him to attack. You will move two tiles away to attack.
# For the rest of the kill, repeat the following: when Araxxor's cleave animation shows his front two legs stabbing forward, click to move to a tile without acid, then immediately click him to attack.
# Optionally, stepping 1 tile back immediately after attacking allows the player to walk Araxxor and use a new tile each attack to avoid the acid pool damage - it is recommended to use a 4-tick weapon if doing this.
#* While one acid pool is visually left behind, the attack still has 1x3 AoE.

If players find themselves unable to perform the step-under technique, they can dodge by moving either two tiles to the side or one tile backwards when he shouts {{overhead|Skree!}}. Note that if moving backwards, wait an additional tick before attacking or you will be dragged onto the new acid tiles.
<gallery mode="packed" heights="300" style="text-align:left">
Araxxor - enrage encircling.mp4|The player moves two tiles away from where they stood.
Araxxor - enrage stepback.mp4|The player steps back right as Araxxor attacks.
</gallery>

Players who've decided to opt out of killing the acidic araxytes and who feel confident in always avoiding the enrage phase melee attack can instead change their overhead prayer to [[Protect from Missiles]] in order to completely negate the araxytes' ranged attacks for the remainder of the fight.

After the fight is finished, Araxxor will not respawn just yet, and players can use this time to recover. When ready, the player must either choose to harvest or destroy the boss' corpse. Harvesting will yield normal rewards, while destroying forfeits all rewards, except elite clue scrolls, for a doubled rate of the pet. The player will not be able to preview loot before destroying the corpse. Unless the player is killing Araxxor with the sole purpose of obtaining the pet, it is generally ill-advised to destroy the corpse as this may result in the loss of an [[araxyte fang]] or [[noxious halberd]] pieces, which are incredibly valuable and make up the majority of the boss' profit. Araxxor will respawn shortly after either decision is made.

If harvesting the boss, players should be mindful of supply drops, as Araxxor can potentially drop up to six items at once; an [[araxyte venom sack]] or a 1-dose [[super combat potion]], one or two 3-dose [[prayer potion]]s or a 4-dose prayer potion, along with 2-3 [[shark]]s or [[wild pie]]s. If the player's inventory is full due to having no space after looting, excess rewards will be dropped to the floor and follow the normal despawn timer, despite the instance providing up to three hours for player-dropped items, and it is important not to lose these supplies as they can help extend trips.
"""

"Fight overview" = """
As with all araxytes, Araxxor's attacks can inflict [[venom]], and as with most spiders, is weak to crush. He has a [[Defence]] level of 135, with his lowest defence bonus being crush at +15. His Defence level can be only drained by up to 45 levels, therefore one [[elder maul]] [[special attack]] will suffice. Alternatively, a [[dragon warhammer]] special attack is nearly as effective, draining 40 Defence levels. Though Araxxor has an [[elemental weakness]] to [[fire spells]], his high magical defences makes this trait mostly thematic, and the generally lower defences of magic robes will have the player take more damage overall.

Araxxor spawns in the middle of his chamber and attacks with melee; if out of his melee range, he will close the distance and attack with either magic or ranged - whichever of the player's defensive rolls is lower. His melee and ranged attacks have a maximum hit of 38, the melee hit can be reduced to 5 with [[Protect from Melee]], whilst the ranged attack can only be reduced to 18 with [[Protect from Missiles]] active. Additionally, his ranged attacks will drain 9% of the player's Defence level upon a [[successful hit]]. Meanwhile his magic attack has a maximum hit of 21, and drains 9% of the player's prayer points when hit. All of his attacks are also calculated upon launch, and late reactions will not mitigate damage.

As the attack style used is dependent on the player's defence rolls, prayers such as [[Rigour]] might change which style the boss uses. [[Aranea boots]] can be used to block Araxxor's ranged attack once every 8 ticks (4.8 seconds), but '''not''' his magic attacks. Players with high magic defence armour can take advantage of this negation effect by moving out of the melee range every second attack; forcing a ranged attack. The high magic defences are easiest to achieve whilst ranging and using high end ranged gear such as [[Masori (f) set|fortified masori]].

Around Araxxor's lair, there are nine eggs; three each of red, white, and green. The first egg hatches after three standard attacks from Araxxor, hatching clockwise starting from the south-easternmost egg, with subsequent eggs hatching after every six standard attacks. 

The eggs will always follow one of three potential patterns, with the last two sets copying that of the first:
* Green > White > Red
* White > Red > Green
* Red > Green > White

Players can opt to destroy the eggs, which have 65 [[Hitpoints]]. If an egg has been fully destroyed, Araxxor will simply spawn an araxyte from the next egg in the rotation, skipping over the destroyed egg. Any damage dealt to an egg without destroying it will carry over to the hatched araxyte, however if an egg has taken more damage than the araxyte that would have hatched from it (58 Hitpoints), then the egg will simply despawn, and Araxxor will use another six standard attacks before the next egg in sequence hatches.

Players will always [[max hit]] when attacking the hatched araxytes with a [[noxious halberd]], [[crush weapons]], or heavy Ranged weapon (such as a [[Crossbow (weapon)|crossbow]] or [[ballista]]) if crush or ranged is their highest accuracy style respectively. Attacking the hatched eggs with anything else - or attacking the unhatched eggs - does not guarantee a max hit, and rolls damage normally. Both the eggs and the araxytes count as on-task monsters for the purposes of benefiting from the [[slayer helmet]]'s damage bonus, but '''will not reduce''' the player's task kill count.

Every six standard attacks, Araxxor will use the same one of three possible special attacks for the remainder of the fight, which can be quickly determined by identifying the south-easternmost egg. All of these attacks leave acid pools, which inflict venom and deal increasingly larger damage (starting from 4) the longer the player stays on them.
{| class="wikitable align-center-1" style="text-align:left;"
! colspan="2" |Appearance
!Description
!Araxxor's special attack
|-
