name = "Venenatis"
source_pages = ["Venenatis", "Venenatis/Strategies"]
npc_ids = [6610]

[sections]
"Attacks" = """
Venenatis has many attacks that she uses against her target. 

*[[Melee]] attack: She simply lunges at the player
*Ranged attack: Launches green spit at players
*Magic attack: Launches webs at players
*Sticky Web: Venenatis will occasionally deploy a sticky web at a player, sending a white-blue web at the target's location. It will then expand into a 7x5 AoE - while in this web, any player caught in it will take rapid hits of 3 damage, have their prayer drained by 3, and run energy by 10.
**Note that [[aranea boots]] will only negate the first tick of damage taken from the web attack. Because of this, it is not recommended to use them at Venenatis due to the extremely small benefit they will provide, while adding unnecessary risk.
*Spiderlings: Venenatis will occasionally call some [[Venenatis' Spiderling (monster)|spiderlings]] to assist her in battle. While fairly weak, they will drain prayer on every hit regardless if prayed against or hits. They will also increase her damage and allow her to hit through prayers if left alive.  Thrall damage is reduced while spiderlings are alive.
"""

"Overview" = """
[[File:Fighting Venenatis.png|thumb|300px|A trio of players fighting Venenatis.]]

Venenatis can attack with all three forms of combat. While she will only use one combat style at a time, players in melee distance will instead only be attacked by melee. Like [[Vet'ion]], she is weakest to crush.

She will begin the fight using 8 range attacks, followed by 8 magic attacks, all while moving position every 4 attacks. She will spawn spiderlings on the 1st range attack in cycle, and deploy her web attack on the 3rd mage attack in the cycle.  This pattern will repeat until Venenatis is defeated.

All players who enter the arena will appear to the north, so it is recommended to hang south as much as possible to escape player killers, as she is no longer under level 30 Wilderness following the [[Update:Wilderness_Boss_Rework|Wilderness boss rework]]. This does not apply to the weaker variant of the boss, [[Spindel]], as her lair is still below level 30 Wilderness and can be teleported out of directly.

Players should avoid the webs at all costs, as their ability to drain run energy will prevent them from escaping from player killers. 

The web can be positioned safely by standing on the outskirt of the arena on the 3rd magic attack to help prevent accidentally walking into the web. 

The spiderlings should be killed as soon as they spawn to prevent them from empowering her too much; fortunately, they only have 5 health and can be killed in one hit by any combat style.

* [[Dart|Darts]] or [[Throwing knives]] can quickly eliminate individual spiderlings.
* Any tier of [[Chinchompa (weapon)|Chinchompa]] can eliminate multiple spiderlings with a well-placed shot (Ensure PK Skull prevention is activated).
* Players with 70+ Magic and [[Ancient Magicks]] can use a burst spell with [[Blighted ancient ice sack|Blighted ancient ice sacks]] to eliminate multiple spiderlings at once.

*
"""
