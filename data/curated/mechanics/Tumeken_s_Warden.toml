[sections]
"Mechanics" = """
{{Main|Tombs of Amascut/Strategies#The Wardens}}
[[File:Tombs of Amascut - fighting Tumeken's Warden.png|thumb|left|280px|A player fighting Tumeken's Warden.]]

The fight with the Wardens occurs in three phases:
# The [[Obelisk (Tombs of Amascut)|obelisk]] will begin transferring energy to the Wardens, and so the player must disrupt the charging process by attacking the obelisk. Depending on which energy trough the player stands on and blocks, one of the Wardens will be destroyed while the other will successfully power up. To power up Tumeken's Warden, a player must stand on the west trough. The Obelisk's base defence level can be lowered by a maximum of 40 points, reducing its base defence level to a minimum of 60.
# Once Tumeken's Warden is powered up, it will initially use [[Protect from Melee]] and [[Protect from Magic]] simultaneously, meaning ranged must be used to first damage it. Unlike Elidinis' Warden, it will actively chase after its main target in an attempt to melee them. It shares the same special attack pool as Elidinis' Warden. Once the Warden is damaged enough, the [[core]] will pop out and can be attacked. When defeated, players will face Elidinis' Warden in the third phase.
# If Elidinis' Warden was fought in the second phase, players will face against Tumeken's Warden in phase three. It will attack the player by raising the floors, and summon phantoms of the bosses the player fought in the upper levels of the tomb ([[Zebak's Phantom]] and [[Ba-Ba's Phantom]]), as well as unleash [[Energy Siphon]]s and red lightning.

In phase three, the Warden's base defence level can be lowered by a maximum of 30 damage, reducing its base defence level down to a minimum of 120. Upon reducing the Warden below 5% HP for the first time, the Warden will enrage and heal for 20% of its maximum HP. While the Warden is enraged, the raising floor attacks will stop and instead lightning will strike various tiles on the ground. The tiles at the back of the room will slowly be stripped away, eventually limiting the arena to one row. When entering the enraged state, the Warden's base defence level is reset to 180, but it can be re-lowered by a maximum of 60 damage, reducing its base defence level down to a minimum of 120 as well.

Once defeated, the Warden will be consumed by the large, black [[Phantom (Tombs of Amascut)|phantom]] of unknown origin. In its place, a white teleport crystal will appear that takes players to Osmumten's burial chamber, where they can then claim their rewards for the raid.
"""
