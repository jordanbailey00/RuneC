"=Advanced dragonfire=" = """
Vorkath's advanced dragonfire attacks that are not all affected by dragonfire protection.

{| class="wikitable"
! Image !! Name !! Notes
|-
| |[[File:Vorkath dragonfire attack.png|150px]]|| Standard Dragonfire|| Deals [[dragonfire]] damage dependent on the number of layers of dragonfire protection used by the player. Full damage mitigation requires a [[super antifire potion]] along with a dragonfire protection shield. Players also typically use a regular antifire potion with a shield that protects against dragonfire, or a super antifire potion along with the protect from magic prayer; both combinations reduce the max hits of dragonfire to 10.
|-
| |[[File:Vorkath venom dragonfire attack.png|150px]]|| Venomous Dragonfire || Inflicts [[venom]] if not immune. Dragonfire protection does negate damage inflicted by this attack, but does not protect against the infliction of venom.
|-
| |[[File:Vorkath prayer disabling attack.png|150px]]|| Corrupting Dragonfire || Deactivates all [[prayers]] upon impact. Players should have quick-prayers accordingly set to reactivate their prayers immediately afterward. Dragonfire protection does negate damage inflicted by this attack, but does not protect against the prayer disabling effect.
|-
| |[[File:Vorkath deadly dragonfire attack.png|150px]]|| Deadly Dragonfire || Vertically launched at the player's position when fired. This will often outright kill the player if hit; if adjacent to the strike zone, it will deal half the damage it would have dealt. Thus, players should always be prepared to click two tiles away from where they are at all times. This attack cannot be defended against with any type of dragonfire protection.
|}
"""

