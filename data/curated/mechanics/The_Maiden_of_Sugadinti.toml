[sections]
"Mechanics" = """
[[File:Fighting The Maiden of Sugadinti.png|thumb|left|280px|A group of players fighting Serafina, the Maiden of Sugadinti.]]
At 70%, 50%, and 30% hitpoints, the Maiden will spawn two [[Nylocas Matomenos]] per player in the room (up to 10) from the northern and the southern walls, which will walk straight toward her and heal her if they reach her. To stop this, players can freeze them with the help of [[Ice spells]] and then kill them while frozen. There are 10 spawn locations in which the nylocas can spawn; if there are fewer than 5 players in the party, then the spawn locations will be random. 

To properly freeze all healers, only three Nylocas must be frozen early: the most western ones, two north, and one south. Then, prioritise the northern third and the second southern a few game ticks before they meet in the centre. Once there, the rest will be frozen in the same spot on the consecutive barrage, leaving a clump of five for ice/blood barrage or chinchompas and three isolated ones. Causing multiple clumps will lead to a few leaking to the boss.

Every Nylocas that reaches the boss will heal her for twice their remaining health and increase the damage of her basic tornado magic attacks.

Her tornado attacks are magic-based and will prioritise the closest player to her. If there are multiple players within the same distance, players are prioritised in their party's order (which correlates with the orbs on the top-left of the screen; the topmost player is prioritised first). The attack has a 50% chance to drain a player's combat stats by (damage+1)/5. The stats drained are based on the player's highest attack bonus at the moment they are targeted. Players not targeted by the Maiden, therefore, do not need to protect from Magic, although it is recommended to have active protection in case the other players move farther from her.

The Maiden will also throw blood spots at each player, and three blood spots at the player standing furthest away, dealing large amounts of damage and healing her every tick if not dodged. They have a chance to become a [[blood spawn]] which will track randomly around the room, leaving a blood trail behind it as well. If a player stands on the trail, it will damage them and heal the Maiden for the same damage taken, as well as increase the chance of a blood spawn appearing. It should also be noted that taking damage from a blood spot also drains prayer.

If there are multiple blood spawns, it is suggested to freeze blood spawns and communicate with the teammates to swap gear, heal, or restore magic up before progressing into the Nylocas phases.

Similar to [[TzKal-Zuk]], the Maiden of Sugadinti will over-hit the player beyond their current health when damage is calculated; this makes it so you cannot tick-eat the maiden boss' magic attacks.
"""
