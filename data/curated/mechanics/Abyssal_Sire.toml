"=Phase 1=" = """
{{anchor|phase 1 equipment}}<tabber>
Recommended=

'''Note:''' This is only if the player is using melee for phase 2 and 3. The melee gear will be whatever you're using later in the fight. For phase 2 and 3, a melee weapon will be needed (if one handed, a shield slot item too).

<br/><br/>

The player brings a [[Scorching bow]] and arrows with full Melee gear in order to take out the respiratory system with the bow. This is because even with full melee gear, the bow is fairly accurate and usually oneshots the respiratory systems. The scorching bow allows the player to quickly dispose of the respiratory system without needing a full gear switch, making it possible to quickly move on to phase 2 so the player can melee the boss. At that stage, the weapon and shield slot can be switched out.

