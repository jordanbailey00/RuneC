[sections]
"=Attack styles=" = """
[[File:KBD Melee and Dragonfire.gif|thumb|right|The King Black Dragon's Melee and fiery breath attacks.|200px]]
[[File:KBD Special Breaths.gif|thumb|right|The King Black Dragon using his fiery, toxic and shocking breath attacks.|200px]]
The King Black Dragon attacks with [[Melee]] and [[dragonfire]] attacks. King Black Dragon will use a melee attack 1/3 of the time provided the target is in melee range. Otherwise, a dragonfire attack is used with a 50% chance of a special dragonfire attack. <ref>{{PlainCiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1698712575108579369|date=4 September 2023|archiveurl=https://reldo.runescape.wiki/i/100462|archivedate=4 September 2023|quote=Yes, if it's in melee range, it's got a 1/3 chance of doing melee, 1/3 chance of doing fire and 1/3 of doing one of the ice/toxic/shocking attacks.}}</ref>All three special dragonfires (Toxic, Shocking, and Icy breath) are equally common, each with a 1/9 incidence in melee range or a 1/6 incidence outside of melee range.<ref>{{PlainCiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1698712744508154162|date=4 September 2023|archiveurl=https://reldo.runescape.wiki/i/103193|archivedate=4 September 2023|quote=If it gets to one of the ice/toxic/shocking attacks, normally they have equal chances.}}</ref> 
*The Melee attack is only used when the player is standing in Melee distance and can hit up to 25.
**The [[Protect from Melee]] prayer will negate all damage from this attack.
*The fiery breath attack can deal up to 65 damage. [[Dragonfire#Protection|Antifire shields]], [[Dragonfire#Protection|antifire potions]], and [[Protect from Magic]], or a combination of these, will partially negate the damage from this attack.
*There are three different special dragonfire attacks. Each of these attacks can deal up to 50 damage and have a 50% chance upon a successful hit to inflict a unique effect<ref>{{PlainCiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1698965398287212751|date=5 September 2023|archiveurl=https://reldo.runescape.wiki/i/98756|archivedate=5 September 2023|quote=Protection that reduces the damage, such as shields or the prayer. Without any of that, the chance would be higher - up to 1/2.}}</ref>. Antifire shields and Protect from Magic, or a combination of these, will partly negate the damage from this attack and reduce the effect chance to 1 in 8.<ref>{{PlainCiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1698729370817347816|date=5 September 2023|archiveurl=https://reldo.runescape.wiki/i/107077|archivedate=5 September 2023|quote=That one depends on your protection. It'll usually be 1/8 for a well-protected player.}}</ref>
**Toxic breath inflicts poison to the player, starting at 8 damage.
**Shocking breath drains two levels off of all the player's stats.
**Icy breath freezes the player for 10 ticks (6 seconds).

<gallery captionalign="center" widths="350px" heights="300px" mode="packed">
King Black Dragon - Fiery breath.png|The King Black Dragon's fiery breath attack.
King Black Dragon - Toxic breath.png|The King Black Dragon's toxic breath attack.
King Black Dragon - Shocking breath.png|The King Black Dragon's shocking breath attack.
King Black Dragon - Icy breath.png|The King Black Dragon's icy breath attack.
</gallery>
"""

"Dragonfire" = """
The King Black Dragon uses several kinds of [[dragonfire]] attacks. Dragonfire is a fiery breath attack that can deal considerable damage to players. However, there are a few precautions players can take to negate most of this damage, being:
*Antifire potions: ([[Extended antifire|extended]]) [[antifire potion]] and ([[Extended super antifire|extended]]) [[super antifire potion]]
*Anti-dragon shields: [[anti-dragon shield]], [[dragonfire shield]], [[dragonfire ward]], and [[ancient wyvern shield]]
*Protection prayers: [[Protect from Magic]]

See the table below for an overview of the maximum damage with (combinations of) the above-mentioned precautions.
{{:Dragonfire/King_Black_Dragon}}
{{clear}}
"""

"Fight overview" = """
{{Main|King Black Dragon/Strategies}}
[[File:Fighting the King Black Dragon.png|thumb|280px|A group of players take on the King Black Dragon.]]
The King Black Dragon uses melee and [[dragonfire]], which is of a higher tier compared to those made by adult chromatic dragons. It makes use of four different breath attacks; normal dragonfire alongside three special dragonfire attacks; shock, ice, and poison. While the special dragonfire deals less damage than its normal dragonfire, they require more tiers of protection to reduce its damage, and even with full protection, can still deal up to 10 damage onto the player. Without any protection, the normal dragonfire can deal up to 65 damage and special dragonfire 50.

The special dragonfire attacks have a chance of applying a second effect on the player when it hits them. Shock dragonfire reduces all of the player's stats by two, poison dragonfire can inflict [[poison]] starting at 8 if not protected against, and ice dragonfire freezes the player for 10 ticks (6.0 seconds). Even in melee distance, the King Black Dragon is more likely to use dragonfire attacks.
"""
