[sections]
"=Fight Arena=" = """
General Khazard is the owner of the [[Fight Arena (location)|Khazard Fight Arena]] and the one who ordered his men to invade the [[Tree Gnome Village (location)|Tree Gnome Village]]. During the [[Fight Arena]] [[Quests|quest]], it is revealed that he kidnaps members of rich families, such as [[Lady Servil]]'s [[Sammy Servil|son]] and [[Justin Servil|husband]], and forces them to fight for their lives at his arena for the entertainment of his citizens. However, during the quest, he makes a bet with [[Player character|an adventurer]] — if they beat all of his monsters, he will set the Servil family free. The adventurer defeats all of Khazard's monsters, and an angry Khazard sets his pet [[hellhound]], [[Bouncer]], on them. The adventurer kills Bouncer, and an enraged Khazard attempts to kill the adventurer. The player can choose to either fight or flee; if they choose to fight and defeat Khazard, he will let the player go out of respect, promising to annihilate them if they ever choose to oppose him again.
"""
