[sections]
"Mechanics" = """
Verzik's magic defence is calculated from her defence level rather than magic, unlike most monsters.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1689217131060084736|date=9 August 2023|archiveurl=https://reldo.runescape.wiki/i/97690|archivedate=9 August 2023|quote=Defence like the Ice Demon, in all phases.}} Her defence cannot be lowered.

To initiate the fight, a player must first talk to Verzik Vitur.
Verzik possesses three phases:

*During phase 1, players in the raid must take it in turn to use the [[Dawnbringer]]'s special attack in order to harm Verzik. Any other weapon will have a much lower chance of hitting and will also be [[Maximum damage cap|capped]] on damage. Ranged/mage is capped at 3 and melee is capped at 10 damage per hitsplat.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1038039719437848576|date=7 September 2018|archiveurl=https://archive.ph/9KLSn|archivedate=1 September 2023|quote=Sorry, I must have misread it last time. It's 10 for melee, 3 for magic and ranged.}} It is mandatory to hide behind a pillar, as failing to do so can result in fatal damage (up to 137). If praying [[Protect from Magic]], Verzik's max hit is halved to 68, both of which cannot be [[tick manipulation|tick-eaten]]. Pillars will also collapse after several attacks and deal up to 70 damage (50 in [[Theatre of Blood/Entry Mode|Entry Mode]]) to anyone next to them when it collapses.
*During phase 2, Verzik will leave her throne and fly to the middle of the room, collapsing all remaining pillars in the room. 
**Players next or under her have a chance of being body-slammed away which stuns and can deal heavy damage.
**She tosses out urnbombs at the players' positions which deal heavy damage if they are not avoided. Praying [[Protect from Missiles]] reduces the damage taken from these attacks.
**She will send a lightning ball that will chain between players in a random sequence, hitting them for a small amount of damage. If Verzik is in-between players that it attempts to chain to, she will absorb it and take up to 15-20 damage. If the ball is chained between 4 players, the 4th player will be hit for 48+ damage. If a player is hit by the ball and is too far from any teammates, they will be hit for 48+ damage.
**She can summon multiple Nylocas. When this happens she also tosses a slow purple projectile which can be avoided but if it lands on the tile the player's on it can deal up to 78 damage. This purple projectile also transforms into [[Nylocas Athanatos]] which will heal her and can be removed by attacking them once with a poisoned weapon to inflict a heavy poison hit on Verzik before despawning. The common Nylocas will follow a player and explode if they reach their target for up to 63 damage, but will also explode after a set amount of time.
**As her health falls below 35%, she will start using blood spells to heal her in addition to her ranged attacks which drain the player's prayer if prayed against. She periodically summon two [[Nylocas Matomenos]] (one when only a single player is alive) which she will kill off if they persist too long, and heal her for the amount of health they had left. During the first three seconds after she summons them, any damage inflicted will heal her instead.
[[File:Verzik Virtur transforms.gif|frame|Verzik Vitur transforms into a spider hybrid.]]
*During phase 3, Verzik's true form will be shown, a half spider, half vampyre. She is now mobile and uses all three forms of combat, her ranged attack consisting of barbs and her magic a single blue projectile. Both of these can deal up to 34 damage, reduced by 50% with the corresponding prayer. The melee attack hits up to 63 and will hit everyone adjacent to her, but only if the target is in melee range; she will not melee if they are out of range or under her. She now has four special attacks. The first she will summon common Nylocas during the fight like in the previous phase, and uses new abilities. The order of these attacks are in a set order. The first round of special attacks is Nylos, followed by webs, safe spots, and green projectile. There are four "auto" attacks between each special attack. 
**She can charge up a powerful attack, creating "safespots" which players can stand on to protect them from this attack. Each "safespot" only works for one player, so they cannot stand on the same tile to protect themselves. 
**She can also go to the centre of the room and fling webs around the chamber, binding players if they are stuck on them. Trapped players can be set free by having other players attack the [[web (Verzik Vitur)|web]], which has 10 health. Otherwise, they will be freed after a set amount of time but take heavy damage in the process.
**She can also launch a green projectile which must be bounced between every player of the team or the player who is targeted will take up to 74% of their [[Hitpoints]] level as damage. This cannot be bounced to the same player twice, otherwise both players (the sender and the intended recipient) will take up to 74% of their Hitpoints level as damage when it lands. 
**When she reaches 20% of her health, she will increase her attack speed to 5 ticks, and summon a purple magical tornado for each player in the room, which will constantly follow them. If they are hit by the tornado, they will take damage equal to 50% of their current health, healing Verzik for three times this amount. Tornadoes deal a minimum of 5 damage. The tornado will also heal Verzik if a player dies to another attack.
"""
