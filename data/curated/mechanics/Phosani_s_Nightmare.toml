[sections]
"= Phase 3 =" = """
Phosani's Nightmare will deactivate the player's protection prayers as soon as she starts her attack animation. Since the attack only deals damage once the projectile is launched, this is mostly to keep players alert and remain vigilant. She will also have a much higher chance of using melee attacks during this time, so players should prioritise activating Protect from Melee (or Ranged if Curse is active).

To clear the sleepwalkers at the end of this phase, the player should stand near one corner of the arena, as a sleepwalker is guaranteed to spawn within attacking range at this point. The player must subdue the second sleepwalker before they start moving, or one of them will always leak onto the Nightmare and deal 41 damage. Standing in the middle, especially with a short ranged weapon will be instrumental in avoiding damage.
"""

"= Phases 1-2 =" = """
The first two phases are very much like the regular encounter except the special attacks can be used randomly in any of these phases.

As the player progresses through the phases, sleepwalkers will spawn in to reach the Nightmare. Two will spawn at the end of phase 1 and an additional will spawn at the end of the next two phases.
"""

"=Desperation phase=" = """
[[File:Phosani's Nightmare - desperation phase.mp4|thumb|450px|Mastering corner rifting, unleashing special attacks at the end, and having Redemption active, can mean the difference between finishing the fight and dying.<br/><br/>Here, the player fails to kill the last sleepwalker, and has run out of food and prayer potions. However, having Redemption active allowed them to take one more power blast and finish off the fight by the skin of their teeth.]]
Phosani's Nightmare will survive the final blast, and teleport to the centre of the arena. Lashing out to survive, she will unleash a desperate last stand by indefinitely using '''Grasping Claws''', while sleepwalkers continuously spawn from the edges of the arena. Mastering the corner rifting technique will make this phase less hectic.

Unlike the previous sleepwalkers, these will only deal 15 damage upon reaching the Nightmare, with a short delay. The first sleepwalker that spawns will deal damage ~20 ticks after spawning, allowing for four attacks with a four or five-tick weapon before this occurs. Focusing on ending the fight instead of dealing with the sleepwalkers is crucial.

Before the phase starts, the player should fully restore their health, boost their melee stats and ensure their special attack energy is full. Immediately dump special attacks on the Nightmare to quickly damage her, if available. Ideally the [[voidwaker]] is strongest, due to its guaranteed hit and relatively high damage which often results in the player defeating the Nightmare before the sleepwalkers can damage the player. [[Dragon claws]] would be next as despite her high slash defence, their special attack's high maximum hit and repeated accuracy checks perform very well. The [[Granite maul (ornate handle)|ornate granite maul]] can be better than dragon claws if using Inquisitor's armour, though it requires more skill to use both of its special attacks off without delaying your regular attacks. [[Redemption]] is highly useful if the phase takes too long, to potentially save the player from the damage dealt by sleepwalkers.
"""

"=Special attacks=" = """
Each phase will have three special attacks. This will always consist of one "spawn" (husk or parasite), one paired with Grasping Claws (Corpse Flowers or Spores), and one miscellaneous special attack (Curse or Surge). Below are four possible sets of special attacks:

* '''A1''': Spore/Husks/Curse
* '''A2''': Spore/Husks/Surge
* '''B1''': Flowers/Parasite/Curse
* '''B2''': Flowers/Parasite/Surge

The first phase picks a random set (A or B), then every following phase alternates between the A and B sets, but randomly picks between 1 and 2. For example, a special attack set will go as follows: A1, B2, A2.

The Nightmare '''will''' expend all special attacks first before she may use them again, and both the spawning mechanic and claw-accompanying mechanic cannot be used in consecutive phases.
* '''Sleepwalkers:''' At the end of the first three phases, Phosani's Nightmare will summon [[Sleepwalker (Phosani's Nightmare)|sleepwalkers]] that walk toward her, the number of which is dependent upon which phase the player is on, up to four at the end of phase three.
** Sleepwalkers have 10 health, but players will deal their maximum hit on them and always hit regardless of bonuses. The number of sleepwalkers that reach her will determine how strong her power blast will be. If no sleepwalkers are killed, the resulting blast will always kill the player.
[[File:The Nightmare - husks.mp4|thumb|400px|The Nightmare summons a pair of husks.]]
* '''Husks:''' Phosani's Nightmare spawns two [[Husk (Phosani's Nightmare)|husks]] around the player. The player will be frozen in place until the husks are killed. The blue, skinny husk uses magic attacks, while the green, bulky husk uses ranged attacks.
** Phosani's Nightmare will not spawn Grasping Claws portals under players frozen by the husks, '''however if the player is under Phosani's Nightmare while frozen by husks, they will still take damage'''. Additionally, any weapon on their crush attack style will always land as a [[maximum hit]] on the husks.
* '''Spores:''' Puffshroom-like objects spawn around the arena. Standing within 1 tile of one will cause it to explode, causing the player to become weary; their run is disabled, their attack speed is lowered by 2 ticks, and every yawn will also drain prayer by 6 points. Accompanied by '''Grasping Claws''', the attack will occur before or after husks appear.
* '''Parasites:''' Phosani's Nightmare impregnates a [[parasite (Phosani's Nightmare)|parasite]] on the player. After ~18 ticks (10.8s), it will grow and burst out of the player, dealing massive damage, and will then begin healing Phosani's Nightmare until killed. 
** Drinking a dose of [[Sanfew serum]] or [[Relicym's balm]] before it emerges will weaken the parasite and greatly reduce the damage taken when the parasite bursts out; like with husks, any weapon on its crush attack style will always hit as a maximum hit against a weakened parasite. Players may click the [[Minimap|Hitpoints Orb]] to weaken the Parasite instead of clicking the potion within their inventory as well.
[[File:The Nightmare - corpse flowers.mp4|thumb|400px|The Nightmare's Corpse Flower attack, followed by her Grasping Claws attack.]]
*'''Corpse Flowers:''' Phosani's Nightmare will divide the room into four equal quadrants with lines of flowers. One quadrant will be safe as indicated with white '''nightmare flowers''', while the remaining quadrants are unsafe as indicated with red '''nightmare berries'''. Accompanied by '''Grasping Claws''', the attack will occur before or after the parasite appears.
** If the player is in the incorrect quadrant, they will take rapid damage, any attacks that would damage her will instead heal and she heals for twice the amount of damage inflicted from the berries.

The following special attacks are used randomly throughout all phases.
* '''Grasping Claws:''' Phosani's Nightmare will spawn a black portal underneath her, and numerous smaller "end" portals before sticking her claws inside. If the player stands on '''any''' portal, they will take up 55-65 damage. Simply move into a tile free of a black portal to avoid damage. Compared to the normal fight, Grasping Claws is significantly more clumped around the player.
** This attack is used randomly throughout the fight, and is also performed for the entirety of the '''Corpse Flowers''' and '''Spores''' attacks. Lastly, it is used indefinitely during her desperation phase.
*'''Curse:''' A pink glow fills the player's screen and protection prayers are shuffled to the right. Using [[Protect from Melee]] will instead activate [[Protect from Magic]], Protect from Magic activates [[Protect from Missiles]], and Protect from Missiles activates Protect from Melee. After 5 attacks, the curse is lifted.
*'''Surge:''' Phosani's Nightmare will teleport to one of the four edges of the room, then immediately surge across to the opposite side, dealing up to ~80 damage if caught in her path. Move out of the way to avoid taking damage.
*'''Prayer Deactivation:''' Only during phase three, Phosani's Nightmare will deactivate the player's protection prayer if they have the correct prayer active before the attack animation starts.
"""

"=Standard attacks=" = """
[[File:The Nightmare - attacks.mp4|thumb|400px|A player correctly praying against the Nightmare's attacks.|autoplay|loop]]
Unlike the normal Nightmare, praying against the attacks of Phosani's Nightmare will fully block damage. The boss' auto-attacks hit significantly harder, with both the magic and ranged having a max hit of 80 and the melee a max hit of 73.
*[[Ranged]] attack: Phosani's Nightmare will contort herself and shoot out projectiles toward players; having game sounds enabled will help as this attack performs a loud clicking sound per contortion. Players have '''3 ticks''' (1.8s) to react with [[Protect from Missiles]].
*[[Magic]] attack: Phosani's Nightmare will flail to the side surrounding herself with pink flower petals, then spin back shooting the petals toward players. Players have '''3 ticks''' (1.8s) to react with [[Protect from Magic]].
*[[Melee]] attack: Phosani's Nightmare will charge her claws and quickly slashes forward. Players have '''2 ticks''' (1.2s) to react with [[Protect from Melee]]. This attack will always hit regardless of the player's defensive bonuses, but it can be avoided by walking one tile away from her.
"""

"Difference in mechanics" = """
{{See also|Phosani's Nightmare/Strategies}}
There are notable differences in mechanics compared to the regular Nightmare encounter:
* Standard attacks hit significantly higher, but successfully praying against them will fully block the attack.
* Special attacks and minions are stronger and some are used in combination with one another: for example, spores are always summoned before six consecutive claw attacks.
** Phosani's Nightmare will use multiple consecutive claw attacks in conjunction with Flower Power or Spores.
** The spores slow the player's attack speed by 2 ticks instead of 1 (doubled if maging), and they also drain 6 prayer points every time the player yawns.
* Crush weapons will always deal their maximum hit against [[Husk (Phosani's Nightmare)|husks]] and [[Parasite (Phosani's Nightmare)|parasites]].
* There are four phases instead of three: 3 phases of 400 shield durability and 1 phase of 150 health, along with 3 sets of totems (12 in total) with 200 charge. In total, the player has to deal 1,350 physical damage and 1,200 charge damage (using magic) for a total of 2,550 damage in Phosani's encounter. The original fight, in comparison, requires 7,800 damage (3 phases each of 2,000 shield durability and 600 charge damage (using magic)), making kills ~66% faster on average.
* After each phase, the number of sleepwalkers spawned increases by one, capping at 4 at the end of the third phase, compared to a single sleepwalker at the end of all phases.
* Phases 1-3 use a set rotation of specials taken from the original encounter.
* In phase 3, Phosani's Nightmare will deactivate the player's protection prayer if they had already had the prayer active before the attack. She also has an increased chance of attacking with melee.
* In phase 4, the "desperation phase", she indefinitely performs Grasping Claws and summons sleepwalkers until killed. One sleepwalker is summoned at a time; should they reach her, she will unleash a blast causing 15 damage.
"""

"Fight overview" = """
Before heading to the boss, eat an [[anglerfish]] to overheal. If the player does not have the teleport to the [[Sisterhood Sanctuary]] with [[Drakan's medallion]] (via [[slepey tablet]], acquired from the boss), it is '''required''' that players sip a [[stamina potion]] before leaving the bank, as their run energy will deplete before even reaching the sanctuary. If the player has the teleport unlocked, a stamina dose is not necessary.

The fight plays out very similarly to the original, though much faster. Phosani's Nightmare is significantly more punishing when a mistake is made, as its auto-attacks have the capability to kill players in two hits. Food that can heal 22 (which should usually be anglerfish due to its overhealing capability) are recommended for mistakes and chip damage taken during the fight. Unlike the original, an [[amulet of blood fury]] is not mandatory, since the boss' auto-attacks cannot pierce prayers, unless the player is aiming for the grandmaster Combat Achievement [[Can't Wake Up]]. Generally without a [[saradomin godsword]], up to three mistakes are allowed, after which the fourth one will likely kill the player.

When using a weapon on its crush setting, the player will be guaranteed a maximum hit on both husks and weakened parasites. When using a 5-tick or slower weapon such as a [[scythe of vitur]], a [[goblin paint cannon]] or [[ham joint]] swap is generally encouraged due to their 3-tick attack speed. If using an [[inquisitor's mace]], this swap is not necessary. For parasites, the player must have a minimum of 118 [[Strength]], a strength bonus of 160 or more and [[piety]] in order to one-hit weakened parasites. A godsword swap requires piety and a four-way swap of the weapon, cape, amulet and gloves. If the parasite is not weakened, the damage it deals to the player will be added onto its base health, and the player will not be able to land maximum hits on it even with crush weapons.
[[File:Phosani's Nightmare - corner rifting.mp4|thumb|400px|A player demonstrates the corner rifting technique, using audio cues to time their movements.]]
Learning players will likely struggle against the Grasping Claws, as a late reaction by even a tick will deal heavy damage, and it also has the capability to kill players in two hits if no healing is made. As such, learning the "corner rifting" technique is vital to killing the boss, which requires the player to stand next to one of the boss' four corner tiles when the claws appear, then quickly move out of that tile in the next tick to prevent a pool from appearing on that tile. This minimises ticks lost not hitting the boss, though this method '''should not''' be used if a spore is next to or on said corner tile. Mastering this technique will also make the desperation phase much less hectic.

Before using Flower Power or Spores, the Nightmare will have a slight delay before actually using the attack alongside Grasping Claws. During Flower Power, it is possible to move the boss one tile in any direction; with Spores, it is possible to move the boss two tiles from the centre with fast reactions. Moving the boss from the centre for Spores is only recommended if there are no safe spots or corner-rifting, as there are three layouts used, of which one does not require movement from the centre.

During the phase transition, it is important not to miss any sleepwalkers as doing so can result in high or outright fatal damage. The table below indicates how much damage is dealt depending on how many sleepwalkers Phosani's Nightmare manages to absorb:

