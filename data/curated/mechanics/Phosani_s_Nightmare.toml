"""

"Mechanics" = """
Phosani's Nightmare shares the same combat stats with the original, despite having a higher combat level.

The fight is divided into four phases; three normal phases with a shield value of 400 and a final phase consisting of 150 hitpoints, along with four totems in the first three phases with a charge value of 200 (100 if maging).

The total amount of physical damage needed is 1,350, while totem charges needed are 2,400 (1,200 if maging); a total of 2,550 damage in total is required.
"""
