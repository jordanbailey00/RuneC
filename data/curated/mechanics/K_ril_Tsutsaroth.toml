name = "K'ril Tsutsaroth"
source_pages = ["K'ril Tsutsaroth", "K'ril Tsutsaroth/Strategies"]
npc_ids = [3129]

[sections]
"=Attack Styles=" = """
K'ril attacks with both Magic and Melee:

*K'ril swipes at his target with his scimitars for his melee attack, dealing up to 46 damage. The attack also has a chance of inflicting [[poison]], even through [[Protect from Melee]], with damage starting at 16. He has a 2/3 chance of performing a melee attack.
*K'ril raises both of his scimitars in the air before slamming them down as his magic attack, emitting a magical shock wave at his target. This attack deals a minimum of 10 damage and a maximum of 30 damage if it hits. He has a 1/3 chance of performing this attack.
*Both attacks are single-target.
"""

"=Attacker=" = """
At the beginning of the fight, the attackers should all stand in one of the corners near the altar, as this both is the furthest away you can get from [[K'ril Tsutsaroth]]'s spawn and allows prayer restoration in the last few seconds before the boss respawns. Attackers should only attack K'ril Tsutsaroth once the tank has hit him, this is especially important when the tank is using ranged as it takes a little more time for a ranged attack to hit K'ril Tsutsaroth compared to a melee attack. As K'ril Tsutsaroth's attacks only hit the tank, the attackers should pray against whichever minion does the most damage to their respective combat style, and wear armour to tank damage against the other combat styles. This effectively means that attackers take relatively small amounts of damage during kills, especially if their [[Defence]] is high. Players using [[Melee]] should use [[Protect from Magic]], players using [[Ranged]] should use [[Protect from Missiles]]. It is important to note that should K'ril Tsutsaroth focus on you, the armour you are wearing is generally quite bad at tanking him and you will take excessive amounts of damage. Should this happen, players using [[Melee]] should use [[Protect from Magic]], players using [[Ranged]] should use [[Protect from Melee]]. All attackers should also bring an antidote++, both for this eventuality and to share with the tank should they run out of antidotes.
"""

"Fight overview" = """
{{Main|K'ril Tsutsaroth/Strategies}}
[[File:Fighting K'ril Tsutsaroth.png|thumb|300px|A group of players fighting K'ril Tsutsaroth and his bodyguards.]]
Like other God Wars Dungeon bosses, K'ril roams around a rectangular room with his bodyguards until a player enters, attacking them on sight. He attacks with melee and magic, and if his target is praying [[Protect from Melee]], he can use a devastating melee special attack that hits through prayer. The melee attack has a maximum hit of 46, the magic attack hits from 10-30{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1055016564595011585|date=24 October 2018|archiveurl=https://archive.is/z0Y5o|archivedate=26 May 2020|quote=Zilyana has a 10-20 attack and K'ril has a 10-30 attack.}} and the special attack hits from 35-49{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1247599267910467584|date=7 April 2020|archiveurl=https://archive.is/RSH4O|archivedate=26 May 2020|quote=Its damage is random, 35-49 inclusive, even distribution across those numbers.}}, as well as drains half of the player's current prayer points, rounded down. The relative occurrences of the attacks are 2/3 for melee and 1/3 for magic. Barring a complex mechanic, K'ril will use his special on 1 in every 9 hits instead of a melee attack, which gives it an incidence of 2/27 in total.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1247602346496004096|date=7 April 2020|archiveurl=https://archive.is/CFZMo|archivedate=26 May 2020|quote=The melee one looks more like a 2/3 to me, from the code, but the enraged attack would be part of that too, so it'd be less than 2/3 in practice.}}
If all players leave, his health and stats will be reset.
"""
