name = "Ancient mace"
item_ids = [11061]

[special]
"Special attack" = """
[[File:Favour of the War God.gif|frame|A player performing the ancient mace's special attack, ''Favour of the War God''.]]
The ancient mace has a [[special attack]], ''Favour of the War God'', requiring 100% special attack energy, that hits through [[Protect from Melee]] and drains the [[Prayer points]] of the opponent by 100% of the amount hit, recharging the user's prayer points by the same amount. This can raise your current Prayer points to above your maximum Prayer level - up to the amount of damage inflicted by the attack. The accuracy roll of the special attack is based on the attack bonus of the player's current style, which is rolled against an enemy's crush defence.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/851077560805076992|date=9 April 2017|archiveurl=https://reldo.runescape.wiki/i/106989|archivedate=24 December 2022|quote=[Does the ancient mace special use the attack style you've chosen (stab or crush) or a specific style always?] It uses the one you chose, but rolls against the target's crush defence.}}

The special attack will restore prayer even if used against a target that has immunity to conventional weaponry such as [[Turoth]]s and [[Kurask]]s, making this a useful special attack on slayer trips for restoring prayer. It is a useful tool while in the [[Nightmare Zone]] for restoring prayer after activating a power surge power-up, which gives the player infinite special attack energy. To maximise the number of [[prayer points]] restored, activating a strength-boosting prayer and drinking strength boosting potions before using the special attack is advised.
"""
