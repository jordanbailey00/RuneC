name = "Emberlight"
item_ids = [29589]

[special]
"Special attack" = """
[[File:Weaken (Emberlight).gif|thumb|250px|A player performing Emberlight's special attack, ''Weaken''.]]
Emberlight's [[special attack]] uses a version of ''Weaken'', which consumes 50% of the player's special attack energy and lowers the opponent's [[Strength]], [[Attack]], and [[Defence]] levels by 5% (15% for [[Demon (attribute)|demons]]) of their base level + 1.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/948619653617717248|date=3 January 2018|archiveurl=https://reldo.runescape.wiki/i/107311|archivedate=24 December 2022|quote=[It seems like the Darklight special attack actually drains by 5%/10% + 1. Is that true or just an inconsistency I'm seeing?] It's got a +1 in there, yes. Possibly to ensure it always does something, even if a stat is already low.}} This is a +5% improvement to Arclight and Darklight's 10% drain on demons but is otherwise the same.

The accuracy roll for ''Weaken'' is made against an opponent's stab defence,{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/793083437976543233|date=31 October 2016|archiveurl=https://reldo.runescape.wiki/i/109639|archivedate=24 December 2022|quote=[Against what defensive style bonus does the special attack of the darklight/arclight roll against? The dds always uses slash.] Stab.}} and its drain effect only applies to [[successful hit]]s.

''Weaken'' will stack additively upon [[successful hit]]s unlike the [[dragon warhammer]], which stacks multiplicatively. Two successful special attacks thus reduce an opponent's Strength, Attack and Defence by 10% + 2, or 30% + 2 against demonic targets.
"""
