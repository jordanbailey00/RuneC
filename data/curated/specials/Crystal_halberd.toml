name = "Crystal halberd"
item_ids = [23987, 24125]

[special]
"Special attack" = """
[[File:Sweep (crystal halberd).gif|thumb|250px|A player performing the crystal halberd's special attack, ''Sweep''.]]
[[File:Sweep (crystal halberd, PvP).gif|thumb|250px|A player performing the crystal halberd's special attack in PvP.]]
The crystal halberd shares the same [[special attacks|special attack]] as the [[dragon halberd]], consuming 30% of the player's special attack energy. In addition to a 10% damage boost, if used against "large" monsters (anything that is larger than 1x1, such as [[General Graardor]]), the special attack will deal an additional second hit onto them, although with 25% reduced accuracy. It can also hit up to 10 NPCs in a [[multi-combat area]] in a 3x1 area centred on the main target (unless it is used on an NPC larger than 1x1, in which case it will hit the target twice and ignore the rest of the NPCs). In [[PvP]], it can only hit up to three players.

The crystal halberd's special attack's accuracy rolls against the opponent's slash defence.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/690476787806158848|date=22 January 2016|archiveurl=https://reldo.runescape.wiki/i/100957|archivedate=28 May 2020}} When using gear with the highest strength bonus and a [[Slayer helmet]] or [[black mask]] on task, the highest possible hit with the special attack is 74–74 (total of 148) on large monsters. While this is higher than what [[dragon claws]] and [[dragon dagger]] can achieve, the much slower attack speed of the halberd is a major downside, so the claws and dagger generally lead to faster damage output in combat.

The crystal halberd's special attack can still be particularly useful in certain situations. Anywhere that players have a forced amount of downtime (time where it is impossible to continue attacking), a crystal halberd special attack can be substituted for extra damage without incurring the 7-tick penalty. This is a common tactic against the [[Pestilent Bloat]]; due to his long period of time where you have to run away, players typically use a crystal halberd special attack as their last damaging attack before running away to increase their potential damage cap. This tactic is also commonly utilized when fighting [[Zulrah]] with a melee setup; the crystal halberd special attack is used right before Zulrah dives into the swamp, with the damage registering after she resurfaces. Because she is temporarily untargetable after diving, the special attack's downside of a 7-tick attack penalty is made irrelevant, allowing its high damage output to be more beneficial. 

In a similar manner, it is often used when the opponent is on low health and the special attack is likely to finish them faster than using standard weapons (a strategy known as "last-hitting").

Although halberds are the only weapon category alongside [[spear]]s to ignore the damage reduction on the [[Corporeal Beast]], the crystal halberd has limited use on it; as the special attack rolls against the opponent's slash defence, which is particularly high on the Corporeal Beast, it is very inaccurate against it (typically to the point where [[dragon claws]] are more effective despite the damage reduction) unless its Defence level is severely reduced.

The special attack's ability to hit up to ten enemies can prove useful as well; when on a [[Slayer]] task where stacking enemies up in one pile to cast multi-combat spells is efficient, such as [[smoke devil]]s, the crystal halberd can deal a large amount of additional damage, often twice that of an [[Ice Barrage]]. It is often used for this purpose in efficient [[Barbarian Assault]] teams by the attacker.
"""
