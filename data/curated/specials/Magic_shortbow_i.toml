name = "Magic shortbow (i)"
item_ids = [12788]

[special]
"Special attack" = """
[[File:Snapshot.gif|thumb|250px|A player performing the magic shortbow's special attack, ''Snapshot''.]]
This weapon retains the standard magic shortbow's [[special attack]], ''Snapshot'', which fires two arrows in rapid succession but with lowered accuracy, using 50% of the player's special attack energy. While the in-game tooltip states that ''Snapshot'' has reduced accuracy, it actually likely has an accuracy boost of <math>\\frac{10}{7}</math> or about 43%.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1042029374428639232|date=18 September 2018|archiveurl=https://reldo.runescape.wiki/i/100981|archivedate=23 May 2021|quote=Looks to me like it's a 43% buff, not a nerf.}} 

''Snapshot'' uses a custom form of damage calculation that does not take into account the slayer helmet (i)'s damage boost (on a Slayer task) and the offensive Prayers (such as [[Eagle Eye]]) when determining a player's [[Maximum ranged hit#Calculating your maximum ranged hit|maximum Ranged hit]],{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1167133164642480131|date=29 August 2019|archiveurl=https://reldo.runescape.wiki/i/102769|archivedate=23 May 2021|quote=[The special attack for rune throwing axes, magic shortbow, and magic longbow all ignore the active range boosting prayers for the special attack, and this ends up with a lower max hit during special attack. is this intentional?] They always had their own special calculations for effective accuracy/damage (...)}} but its accuracy is still affected.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/jagexash/status/1396397301925662723|date=23 May 2021|archiveurl=https://reldo.runescape.wiki/i/101488|archivedate=23 May 2021|quote=Correct, it does now affect that spec, and every other custom attack I've seen so far.}}

The following formula can be used to calculate the max hit of ''Snapshot'': <br/>
<br/>
<math>\\text{Maximum Hit} =\\left\\lfloor 0.5+\\frac{(\\text{Visible Ranged Level} + 10) *(\\text{Ammo Ranged Strength} +64)}{640} \\right\\rfloor</math> {{efn|name=level|Only the player's visible ranged level matters. Boosts given through prayers and Void Knight armour are ignored.}} {{efn|name=stance|A stance bonus of 10 is used regardless of attack style used.}} {{efn|name=ammo|The ranged strength bonus of the player's armour and gear is ignored. Only the ranged strength bonus of the player's ammo is used.}} {{efn|name=slayer|The bonus damage usually provided by wearing a Slayer helmet (i), Salve amulet (i) or Salve amulet (ei) is ignored.}}

{{notelist}}
"""
