name = "Dragon pickaxe"
item_ids = [11920, 12797]

[special]
"Special attack" = """
[[File:Rock Knocker.gif|frame|A player performs the Dragon pickaxe's special attack, ''Rock Knocker''.]]
The dragon pickaxe's [[special attack]], ''Rock Knocker'', temporarily boosts the player's [[Mining]] level by 3 (players will need to have 60 [[Attack]] to utilise this special). This consumes 100% of the player's [[special attack energy]]. The boost degrades every 60 seconds, with your Mining level returning to normal after 3 minutes.

This effect is useful to increase the chance of successful rolls or to meet a Mining level requirement above the player's base level. When used alongside the [[Lightbearer]] ring, special attack energy regenerates twice as fast, making it viable to consistently mine rocks 1-2 levels higher than base.

Note that any levels boosted above 99 with the special attack will be treated as 99. Therefore, you will start to receive diminishing returns with the special attack at level 97 and 98, with there being no value in using the special at level 99.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1375844352098975753|date=27 March 2021|archiveurl=https://reldo.runescape.wiki/i/98237|archivedate=29 March 2021}}
"""
