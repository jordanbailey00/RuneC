name = "Eldritch nightmare staff"
item_ids = [24425]

[special]
"Special attack" = """
[[File:Invocate.gif|thumb|250px|A player performing the eldritch nightmare staff's special attack, ''Invocate''.]]
The eldritch nightmare staff has a [[special attack]], ''Invocate'', that consumes 55% of the player's special attack energy to hit the target for a high amount of magic damage, also restoring the caster's [[prayer points]] by 50% of the damage dealt. ''Invocate'' can boost the caster's prayer points above their natural prayer level, up to a maximum of 120.  

The Prayer restoration from ''Invocate'' is calculated from the potential damage of a hit before some types of damage immunities are applied. This can allow it to restore prayer even if a monster appears to take zero damage. For example, [[Kurask|kurasks]] can only be harmed by leaf-bladed weaponry, [[Broad bolt|broad bolts]], or the [[Magic Dart]] spell, but if ''Invocate'' would have otherwise hit a 40 before immunity, the restoration effect still takes place for 20 prayer points. This mechanic also applies if the target has less total health than the potential damage of the attack. If a target with only 2 hitpoints remaining is struck with an ''Invocate'' that would have dealt 60 damage, the attacker will still have 30 prayer points restored.
"""
