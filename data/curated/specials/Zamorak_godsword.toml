name = "Zamorak godsword"
item_ids = [11808]

[special]
"Special attack" = """
[[File:Ice Cleave.gif|thumb|250px|A player uses ''Ice Cleave'', the Zamorak godsword's special attack.]]
The Zamorak godsword has a [[special attacks|special attack]], ''Ice Cleave'', which consumes 50% of the player's special attack energy. It doubles the player's accuracy (slash or crush roll) and increases their max hit by 10%. In addition, it freezes the target in place for 19.2 seconds (32 [[tick]]s); the same duration as [[Ice Barrage]]. The sword's special attack must produce a [[successful hit]] in order to have the freezing effect, and it rolls against the opponent's slash defence. [[Protect from Melee]] only gives a damage reduction of 40% and does not affect the freeze.

While its unique special attack may provide less utility than all other Godswords for the majority of situational uses, (e.g. it doesn't restore depleted stats, deplete opponent's stats, or deal any additional maximum damage relative to the other godswords), it is useful in numerous niche situations. 

It is very popular in the [[Castle Wars]] [[minigame]] when used to freeze flag-bearers, as such players generally wear equipment with high [[Magic defence]] bonus, such as [[black d'hide armour|black dragonhide]], [[Karil's leathertop]], and/or [[Armadyl armour]] in order to more easily defend against enemy mages casting [[Ancient Magicks]] (or [[Snare]]/[[Entangle]] with the standard spellbook). The use of this common strategy of possessing high magic defence bonus equipment, coupled with the game's particular [[magic defence]]-determining mechanics (that ultimately benefit accounts with higher levels in magic than defence), reliably renders magic-based freezing methods consistently ineffective. The Zamorak godsword's melee-based [[Special attacks|special attack]] is often used to undermine this tactic. In the [[Wilderness]], it can also be used to freeze an enemy in place in order to attack from a distance, escape, or provide a more diversified (and therefore reliable) freezing strategy for clans; a useful tactic in [[Single-way combat]] is logging out while standing under a recently frozen enemy, as they will not unfreeze in time to retaliate unless they bring [[adamant seeds|adamant]] or [[mithril seeds]].

The Zamorak godsword has also found use in [[monster killing|player-vs-monster]] situations. It is a popular weapon when fighting the [[Muttadile]]s, as it usually stops them from being able to heal from the [[meat tree]]. It can also be used during the [[Barrows]] minigame to freeze the melee-using brothers in place, particularly [[Dharok the Wretched]].

The special attack [[animation]]'s colours can be changed to gold, which costs 75 [[Last Man Standing]] points. Once unlocked, the gold trim can be toggled at [[Justine's stuff for the Last Shopper Standing]] whenever the player desires.
"""
