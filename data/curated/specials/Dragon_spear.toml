name = "Dragon spear"
item_ids = [1249]

[special]
"Special attack" = """
[[File:Shove (dragon spear).gif|thumb|250px|A player performs the dragon spear's special attack, ''Shove''.]]
The dragon spear has a [[special attacks|special attack]], ''Shove'', which it shares with the [[Zamorakian spear]] and [[Zamorakian hasta|hasta]]. It pushes the target back and [[Stun (status)|stuns]] them for 5 ticks (3.0 seconds), consuming 25% of the player's special attack energy. ''Shove'' has an attack speed of 5 ticks compared to the spear's normal attack speed of 4 ticks (2.4 seconds). 
<!-- Please do not change info on the length of the stun or the attack speed. See the talk page for in-depth discussion. If you think the length of the stun is incorrect, discuss it on the talk page before making changes. --> 

The effects of ''Shove'' do not stack, meaning that players cannot use it on a target who is already stunned. Stunned players are also given a one tick (0.6 seconds) period of immunity after a stun wears off during which they cannot be stunned again. This effectively means that ''Shove'' cannot be used on the same player more than once every 6 ticks. In addition to this, as soon as the stun wears off, the stunned player is granted a 5 tick (3.0 seconds) period of immunity against being bound by binding spells like [[Entangle]] or [[Ice Barrage]]. Despite this, ''Shove'' is popular in player killing scenarios as the brief stun causes all incoming damage to be stalled until it expires, after which all damage taken is applied at once.

Under certain conditions, ''Shove'' can push the target diagonally past obstacles. This only occurs when pushing a target east or west, and if there is a free tile directly north or south of the obstacle — e.g. 1x1 obstacles, the corner of larger ones, or diagonal walls. Targets will not be pushed past obstacles when pushing to the north or south. ''Shove'' displays a preference for certain tiles; when pushing a target east or west past a 1x1 obstacle, the north or south free tile will always be chosen, respectively.

On non-Castle Wars worlds, players within Castle Wars are able to shove targets back-to-back using this special attack.<ref>{{PlainCiteNews|url=https://secure.runescape.com/m=news/poll-83-castle-wars-update?oldschool=1|title=Poll 83: Castle Wars Update|newsdate=2 April 2025}}</ref>

''Shove'' cannot be used against large monsters, such as [[giants]], because they are too big to push back. If a player tries this, the special attack does not occur and no special attack energy is consumed. A message appears in the chat box, reading, "That creature is too large to knock back!" A general way to tell if the spear can use the "Shove" special attack is to determine how much space the target monster takes up. If it takes up more than one game tile, it cannot be shoved. For example, a player can shove an [[ice warrior]], which takes up one game tile, but not an [[ice giant]], which takes up four.
"""
