name = "Rune thrownaxe"
item_ids = [805]

[special]
"Special attack" = """
[[File:Chainhit.gif|thumb|220px|A player performs the rune thrownaxe's special attack, ''Chainhit''.]]
The rune thrownaxe has a [[special attack]], ''Chainhit'', that ricochets off the target and hits multiple other opponents within a 3 tile radius (forming a 7x7 square centred on the target) at the moment the special attack is initiated.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1356679120306995201|date=2 February 2021|archiveurl=https://reldo.runescape.wiki/i/96437|archivedate=23 April 2023|quote=It does it all on the tick when the attack took place. It's always a radius of 3 tiles.}} ''Chainhit'' can only ricochet to other enemies in a [[multicombat area]]. This special attack can target up to 5 opponents, but a rune thrownaxe will not rebound back to its original target after chaining to another enemy.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1356223483261423619|date=1 February 2021|archiveurl=https://reldo.runescape.wiki/i/100258|archivedate=23 April 2023|quote=The game makes a list of potential targets in a random order, ensuring that it doesn't include the original target. The randomness may be skewed rather than evenly distributed; I can't tell exactly what the engine's doing under the hood. It's not doing tactical routeing, anyway.}} Furthermore, an accuracy roll is made after each target hit by the thrownaxe, which will end the sequence if failed.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1336282813272829952|date=8 December 2020|archiveurl=https://reldo.runescape.wiki/i/97304|archivedate=25 April 2023|quote=The thing that picks nearby targets does it randomly, and has a chance at each step of stopping (by failing an accuracy roll) rather than moving on to another.}}

Each hit consumes 10% of the player's special attack energy, i.e. three hits consumes 30% energy. This special attack uses a custom form of damage calculation that does not take into account offensive Prayers (such as [[Eagle Eye]]) when determining a player's [[Maximum ranged hit#Calculating your maximum ranged hit|maximum Ranged hit]].{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1167133164642480131|date=29 August 2019|archiveurl=https://reldo.runescape.wiki/i/102769|archivedate=23 May 2021|quote=[The special attack for rune throwing axes, magic shortbow, and magic longbow all ignore the active range boosting prayers for the special attack, and this ends up with a lower max hit during special attack. is this intentional?] They always had their own special calculations for effective accuracy/damage (...)}} In addition, the attack speed of ''Chainhit'' is one tick slower than the rune thrownaxe's regular attack, meaning the attack interval is 5 ticks (3.0s) on the rapid style, and 6 ticks (3.6s) on accurate or longrange. 

The following formula can be used to calculate the max hit of ''Chainhit'': <br/>
<br/>
<math>\\text{Maximum Hit} =\\left\\lfloor 0.5+\\frac{(\\text{Visible Ranged Level} + 10) *(\\text{Ammo Ranged Strength} +64)}{640} \\right\\rfloor</math> {{efn|name=level|Only the player's visible ranged level matters. Boosts given through prayers and Void Knight armour are ignored.}} {{efn|name=stance|A stance bonus of 10 is used regardless of attack style used.}} {{efn|name=ammo|The ranged strength bonus of the player's armour and gear is ignored. Only the ranged strength bonus of the rune thrownaxe is used.}} {{efn|name=slayer|The bonus damage usually provided by wearing a Slayer helmet (i), Salve amulet (i) or Salve amulet (ei) is ignored.}}

{{notelist}}
"""
