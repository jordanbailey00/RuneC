name = "Zamorakian hasta"
item_ids = [11889]

[special]
"Special attack" = """
[[File:Shove (Zamorakian hasta).gif|thumb|250px|A player performs the Zamorakian hasta's special attack, ''Shove''.]]
The Zamorakian hasta has a [[special attacks|special attack]], ''Shove'', which it shares with the [[Dragon spear|Dragon]] and [[Zamorakian spear]]. It pushes an opponent back and [[Stun (status)|stuns]] them for three seconds, consuming 25% of the player's special attack energy.

The effects of ''Shove'' do not stack, meaning that players cannot use it on a target who is already stunned. Stunned players are also given a one tick (0.6 seconds) period of immunity after a stun wears off during which they cannot be stunned again. This effectively means that ''Shove'' cannot be used on the same player more than once every 6 ticks. In addition to this, as soon as the stun wears off, the stunned player is granted a 5 tick (3.0 seconds) period of immunity against being bound by binding spells like [[Entangle]] or [[Ice Barrage]].

On non-Castle Wars worlds, players within Castle Wars are able to shove targets back-to-back using this special attack.<ref>{{PlainCiteNews|url=https://secure.runescape.com/m=news/poll-83-castle-wars-update?oldschool=1|title=Poll 83: Castle Wars Update|newsdate=2 April 2025}}</ref>

''Shove'' cannot be used against large monsters, such as [[giants]], because they are too big to push back. If a player tries this, the special attack does not occur and no special attack energy is consumed. A message appears in the chat box, reading, "That creature is too large to knock back!" A general way to tell if the ''Shove'' special attack is able to be used is to determine how much space the target monster takes up. If it takes up more than one game tile, it cannot be shoved. For example, a player can shove an [[ice warrior]], which takes up one game tile, but not an [[ice giant]], which takes up four.
"""
