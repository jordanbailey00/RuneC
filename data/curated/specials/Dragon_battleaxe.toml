name = "Dragon battleaxe"
item_ids = [1377]

[special]
"Special attack" = """
[[File:Rampage.gif|frame|A player using the dragon battleaxe's special attack, ''Rampage''.]]
The dragon battleaxe has a [[special attack]], ''Rampage''; when toggled, the player character immediately hefts the weapon above their head and bellows {{overhead|Raarrrrrgggggghhhhhhh!}}, consuming 100% of their special attack energy. This drains the player's [[Attack]], [[Defence]], [[Ranged]], and [[Magic]] levels by 10%, while increasing their [[Strength]] level by 10 + (levels drained / 4), rounded down.

The strength boost is comparable to that of a [[super strength]] potion. However, depending on the player's combat levels and pre-existing boosts, it can raise Strength by up to 21. Barring overload potions or an imbued heart, doing this requires a minimum of 97 Ranged and 96 Magic, as well as 99 Attack and 92 Defence (or vice versa if the player chooses to drink a saradomin brew). Players can then drink a [[Zamorak brew]], [[super restore]], [[super defence]], [[ranging potion]] and [[magic potion]] before using the dragon battleaxe special attack to have more levels drained, which in turn increases the Strength boost. This allows players with 99 Strength to reach 120, the highest possible in the game outside of the [[Stone of Jas]] buff during [[While Guthix Sleeps]] and the [[Tombs of Amascut]].

The special attack providing an unlimited amount of Strength boosts accounts for the popularity of this weapon; although the weapon itself is seldom used in combat, it is entirely possible to use ''Rampage'' for a strength boost and then revert to a primary melee weapon. The drained stats can be recovered using a [[restore potion]], or an [[attack potion|attack]]/[[super attack]] potion if only melee damage output is a concern.

In order to make full use of the special attack without boosts, your Attack, Defence, Ranged and Magic need to be at 90; using the special attack will reduce each by 9 points which will raise your Strength by 19 points (10+reduction/4).

Alternatively, drinking from a [[Fancy rejuvenation pool|fancy]]/[[ornate rejuvenation pool]] effectively eliminates the stat drain and special energy cost of ''Rampage'' while retaining the Strength boost. The [[Pool of Refreshment]] in [[Ferox Enclave]] will reset both boosts and drains, so it cannot be used for this purpose.
"""
