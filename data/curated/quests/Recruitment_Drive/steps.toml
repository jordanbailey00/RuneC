quest = "Recruitment Drive"
step_count = 12

[[steps]]
index = 0
name = "Starting out"
links = ["Sir Amik Varze", "White Knights' Castle", "Sir Tiffy Cashien", "Falador Park"]
text = """
{{Map|name=Sir Amik Varze|x=2960|y=3337|r=3|plane=2|mtype=square|align=left|width=200|height=200|caption=The start point of the quest.}}
To start the quest, speak to [[Sir Amik Varze]] who is located on the {{FloorNumber|uk=2}} of the western part of the [[White Knights' Castle]]. He will tell you to talk to [[Sir Tiffy Cashien]] in [[Falador Park]] to be tested. In order to be able to be tested, '''you need to have an empty inventory''' and no items equipped.

Now, head to Falador Park, and talk to Sir Tiffy Cashien. He will tell you that you must go through a mental test. Sir Tiffy Cashien is sitting on a bench at the entrance for Falador Park.
{{Clear|left}}
"""

[[steps]]
index = 1
name = "Testing"
links = ["Sir Tiffy Cashien", "Falador", "Sir Leye"]
text = """
[[File:Sir Tiffy Cashien chathead.png|left]]
[[Sir Tiffy Cashien]] will take you to the testing grounds. There are seven different testing rooms. In each room, there is a yellow portal at the beginning of the room (takes you back to [[Falador]]) and a yellow portal at the end of the room, which you may use to travel to the next room after you pass the test. You need to complete five in a row. Which five you'll get, as well as the order that they are in, is completely random. However, you will '''always''' be required to defeat [[Sir Leye]] in one of the five tests. If you fail a test, you have no choice but to return to Falador and start over.
{{Clear|left}}
"""

[[steps]]
index = 2
name = "Sir Kuam Ferentse"
links = ["Sir Kuam Ferentse", "Sir Leye", "Saradomin", "steel sword", "steel claws", "steel battleaxe", "steel warhammer", "Skiller", "flinch"]
text = """
[[Sir Kuam Ferentse|He]] tells the player that they must defeat [[Sir Leye]], who is level 20. Sir Leye has been blessed by [[Saradomin]] so that no blade may harm him. There are four weapons nearby: a [[steel sword]], [[steel claws]], a [[steel battleaxe]], and a [[steel warhammer]]. Any of the weapons can be used to damage Sir Leye, but the player must choose the warhammer (as it is the only non-bladed weapon) or may opt to fight unarmed for the final blow to kill him. If the player is wielding a bladed weapon when he dies, they will fail the test. '''Note:''' [[Skiller]]s can trap Leye in the corners of the room and [[flinch]] him by waiting for his HP bar to go away and then hitting and running. Skillers may find this part impractical because Sir Leye is very difficult to get into the corner positions ''and'' he will take damage very slowly, to the point where he may heal faster than the damage being done. One of the corners where flinching is possible is on the south-west corner. Sir Leye should be on the south tile with the player on the west tile. Wait until his HP bar disappears, then attack and move back to the west tile. Setting this up is tricky and requires patience.
"""

[[steps]]
index = 3
name = "Sir Spishyus"
links = ["Sir Spishyus"]
text = """
Right next to [[Sir Spishyus|him]], you'll see a 5&nbsp;kg chicken, a 5&nbsp;kg bag of grain, and a 5&nbsp;kg fox. You must get all three of them across a bridge that only supports five kilograms at a time. The tricky part is that if you leave the fox and chicken alone, the fox will eat the chicken. The chicken will also eat the bag of grain if the two of them are left alone.
[[File:Recruitment Drive - Walking across the bridge.png|thumb|Crossing the bridge.]]'''Option 1'''
{{Checklist|*Take the chicken to the other side, since the fox and grain are the only pair that actually get along.
*Drop the chicken, then come back and grab the grain.
*Take it to the other side then grab the chicken and drop the grain. Then take the chicken back to the start.
*Grab the fox, drop the chicken, and take the fox across the bridge.
*Drop the fox, then go back to the beginning for the chicken, take it across and drop the chicken.}}
'''Option 2'''{{Checklist|
*Take the chicken to the other side, since the fox and grain are the only pair that actually get along.
*Drop the chicken, then come back and grab the fox.
*Take it to the other side then grab the chicken and drop the fox. Then take the chicken back to the start.
*Grab the grain, drop the chicken, and take the grain across the bridge.
*Drop the grain, then go back to the beginning for the chicken and take it across.
}}
Once you complete the puzzle, the door now unlocks and you can proceed to the next puzzle via the portal.
"""

[[steps]]
index = 4
name = "Lady Table"
links = ["Lady Table", "sword", "halberd", "mace"]
text = """
[[File:Recruitment Drive - Statue Room.png|thumb|The bronze, silver, and gold statues used in the memory test.]]
'''Important:''' Take a screenshot of the statues as you enter the room (or remember the statues if you have a good memory). You only have a few seconds after you enter the room! If you talk to Lady Table before the room changes, the room won't change until you exit the chat dialogue, so you can use this time to study the room layout.

[[Lady Table]] will test your memory. She will have 11 statues of a knight in front of her. There are supposed to be 12, but one has been taken away. You will have a few seconds to look at the statues, then the missing one will be returned. You must then touch the one that was missing.

The trick to passing this one is to analyse the types of statues. There should be four statues of each colour: bronze, silver, and gold. First, see which colour only has '''three statues'''. After you figure out the colour, figure out the weapon. There are four weapons: [[sword]], [[halberd]], greataxe, and [[mace]]. Figure out which weapon is missing. After you have figured it out, touch the statue.
"""

[[steps]]
index = 5
name = "Miss Cheevers"
links = ["alchemical notes"]
text = """
There are many bookcases and crates with items. Search everything (including the chest) and take everything. Some of the items you find are not needed for the solution, such as the [[alchemical notes]] that only contain hints. There are two doors that you must get through. The first door is missing a handle, while the second one is locked.
"""

[[steps]]
index = 6
name = "==For the first door=="
links = ["vial of liquid", "cupric sulfate"]
text = """
[[File:Recruitment Drive - Pouring liquid on the handle.png|thumb|Using the [[vial of liquid]] on the new handle.]]
{{Checklist|
*Take the metal spade, and use it on the Bunsen burner to remove the wood.
*Use the metal spade (without handle) on the stone door.
*Use the [[cupric sulfate]] (not to be confused with the other orange cupric powder!) on the door with the metal spade in it
*Use a vial of liquid on the door.
*The metal spade will expand and be jammed in the hole, and you can now open the door.
}}
"""

[[steps]]
index = 7
name = "==For the second door=="
links = ["vial of liquid", "cake tin", "gypsum", "tin ore powder", "cupric ore powder", "Bronze key (Recruitment Drive)", "knife", "chisel", "bronze wire"]
text = """
{{Checklist|
*Use a [[vial of liquid]] on the tin (which looks like a [[cake tin]]);
*Use [[gypsum]] on the tin. Do not use the liquids on each other.
*Use the tin with the lumpy white liquid inside of it on the key (on the ground south of the portal you came from) to get an imprint of the ''key''.
*Use [[tin ore powder]] on the tin.
*Use [[cupric ore powder]] on the tin.
*Use the tin on the Bunsen burner to make a duplicate [[Bronze key (Recruitment Drive)|bronze key]].
*Use a [[knife]], [[chisel]] ''or'' [[bronze wire]] on the tin to obtain the bronze key; you can now use the bronze key on the door to open it.
}}
"""

[[steps]]
index = 8
name = "Sir Ren Itchood"
links = ["Sir Ren Itchood"]
text = """
When you talk to [[Sir Ren Itchood]], he will speak in riddles, the answer to which is a four letter word, made up of the first letter of each line of his riddle. Use the answer to unlock the combination lock on the next door. The possible solutions are: '''BITE''', '''FISH''', '''LAST''', '''MEAT''', '''RAIN''' or '''TIME'''.
"""

[[steps]]
index = 9
name = "Ms. Hynn Terprett"
links = ["Ms. Hynn Terprett"]
text = """
[[Ms. Hynn Terprett|She]] will give you a multiple choice riddle. There are many to choose from - they are as follows:

*'''Riddle:''' ''Imagine that you have been captured by an enemy. You are to be killed, but in a moment of mercy, the enemy has allowed you to pick your own demise - being drowned in a lake of acid, burned on a fire, thrown to a pack of wolves that have not been fed in over a month or thrown from the walls of a castle, many hundreds of feet high.''
**'''Answer:''' Being fed to the wolves - wolves cannot survive for 30 days without food, thus they would all be dead.
*'''Riddle:''' ''I have both a husband and daughter. My husband is four times older than my daughter. In twenty years time, he will be twice as old as my daughter. How old is my daughter now?''
**'''Answer:''' Her daughter is 10 years old. Writing out the given information in the form of the equation <math>4x+20=2(x+20)</math>, we can find easily the daughter's age 𝑥. Balancing the equation gives us <math>\\left ( \\frac{4x+20=2(x+20)}{2} \\right )=\\bigl((2x+10)-10=(x+20)-10\\bigr)=\\bigl(2x=x+10\\bigr)</math>, from which we can finally subtract an 𝑥 from each side to get  <math>x=10</math>.
*'''Riddle:''' ''I dropped four identical stones, into four identical buckets, each containing an identical amount of water. The first bucket was at 32 degrees Fahrenheit, the second was at 33 degrees, the third was at 34 and the fourth was at 35 degrees. Which bucket's stone dropped to the bottom of the bucket last?''
**'''Answer:''' The first bucket (Bucket A). At 32 degrees Fahrenheit (0 degrees Celcius) the bucket of water is frozen, so the stone never reaches the bottom.
*'''Riddle:''' ''I estimate there to be 1 million inhabitants in the world of Gielinor, creatures and people both. What would be the number you would get if you multiply the number of fingers on everythings left hand, to the nearest million?''
**'''Answer:''' Zero. There are creatures with zero fingers anything multiplied by zero is zero.
*'''Riddle:''' ''Which of the following is true? The number of false statements here is one. The number of false statements here is two. The number of false statements here is three. The number of false statements here is four. How many false statements are there?''
**'''Answer:''' Logic dictates that the number of false statements must be three. There are four possible answers, so for one of them to be true, all others must be false.
"""

[[steps]]
index = 10
name = "Sir Tinley"
links = ["Sir Tinley"]
text = """
Talk to [[Sir Tinley]],  click on "continue". Stand still for eight seconds, do not click on '''anything''' after clicking continue, or the player will fail this task.
"""

[[steps]]
index = 11
name = "=Finishing up="
links = ["Falador Park", "Sir Tiffy Cashien"]
text = """
After completing all five tests subsequently, you will automatically be teleported back into [[Falador Park]] where [[Sir Tiffy Cashien]] will congratulate you on a job well done.

'''Congratulations, quest complete!'''
"""
