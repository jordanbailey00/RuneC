[[steps]]
index = 0
name = "Manni the Reveller"
links = ["Tinderbox", "beer", "Camelot Teleport", "Manni the Reveller", "Brundt the Chieftain", "keg of beer", "beer tankard", "Seers' Village", "Low alcohol keg", "Poison Salesman", "coins", "strange object", "council workman", "Rellekka", "Olaf the Bard", "tinderbox", "lit strange object"]
text = """
{{Needed|[[Tinderbox]], [[beer]], and 250 coins.|recommended=[[Camelot Teleport]].}}

You can find [[Manni the Reveller|Manni]] in the bar right next to [[Brundt the Chieftain|the chieftain]]. He can be found walking around drinking. Talk to him and challenge him to see who can drink more beer before getting drunk. Take the [[keg of beer]] and [[beer tankard]], which can be grabbed off the bar in the longhall.
{{Map|2653,3592|mtype=square|align=right|r=3|caption=The council worker's location.}}
Talk to him again to drink. You will lose no matter what, while he'll hardly get drunk at all.
Go back to [[Seers' Village]] and buy a [[Low alcohol keg]] of beer from a [[Poison Salesman]] by the bar for 250 [[coins]]. ('''Note:''' Buy a [[beer]] here if you didn't grab the [[beer tankard]] to save time getting the [[strange object]].)
[[File:The Fremennik Trials - Talking to the Poison Salesman.png|thumb|left|220px|Talking to the poison salesman.]]

Use the beer or beer tankard on the [[council workman]] at the end of the bridge to [[Rellekka]] in order to give it to him and receive a [[strange object]]. You can do this while returning to Rellekka from the poison salesman.
[[File:The Fremennik Trials - Drink off.png|thumb|A player competes with Manni.]]
Go to the Rellekka bar and look on the outside of the longhall for a pipe. It should be on the east wall - the same side with [[Olaf the Bard]]. Light the strange object with your [[tinderbox]] to get a [[lit strange object]]; then, hide it in the pipe. Walk into the hall, grab another keg of beer ('''Note:''' If you stored the keg in your bank you will not be able to pick up another one from the table), and use the low alcohol keg on the normal keg of beer that is in your inventory. The lit strange object will then explode, distracting the Fremennik and allowing you to switch the contents of the two kegs.

Talk to Manni again once you have switched the contents of the kegs. After drinking the keg of beer, Manni will give you his vote after noticing that you drunk a whole keg of beer without any side effects.

<div align="right">[[#Walkthrough|(Return to Trials Map)]]</div>
"""

[[steps]]
index = 1
name = "Olaf the Bard"
links = ["axe", "knife", "raw shark", "raw manta ray", "raw sea turtle", "potato", "onion", "cabbage", "Raw manta ray", "Olaf the Bard", "lyre", "Lalli", "Rellekka", "Swaying tree", "Woodcutting", "Askeladden", "pet rock", "Strange altar", "swaying tree", "Golden tree", "spinning wheel", "drop trick", "Lanzig", "Borrokar", "Lensa", "Freidir", "safespot", "strange altar", "Fossegrimen", "The Fremennik Trials"]
text = """
'''''Items needed for Option 1:''' An [[axe]], [[knife]], [[raw shark]]/raw [[raw manta ray|ray]]/raw [[raw sea turtle|turtle]], [[potato]], [[onion]], [[cabbage]], (requires {{SCP|Fletching|25}} {{SCP|Woodcutting|40}} {{SCP|Crafting|40}}; vegetables obtained for free in Rellekka).''

'''''Items needed for Option 2:''' Combat equipment and a [[raw shark]]/[[Raw manta ray|manta ray]]/[[raw sea turtle|turtle]] ''

You should see [[Olaf the Bard|Olaf]] east of the bar building where you started the quest.
He'll give you his vote if you can prove your worth as a bard by performing at the longhall. The first thing you need is a lyre.

There are two ways to get a [[lyre]]:

*'''Option 1:'''

'''Note: You MUST start the trial by speaking with [[Olaf the Bard]] BEFORE speaking with [[Lalli]] or else he will not tell you about the other human.'''

[[File:The Fremennik Trials - Swaying tree.png|thumb|230px|Cutting the Swaying tree.]]

Make a lyre yourself. First, grab a [[potato]], [[cabbage]], and [[onion]] from the vegetable patch in [[Rellekka]] before you leave. Once you leave the gates, head east until you find a [[Swaying tree]], and cut a branch off it. Then use a knife on the branch. If you forgot to bring a knife, there is a knife spawn a few tiles north of the mining area in Rellekka. You will need an axe (blessed will not work) and a [[Woodcutting]] level of 40 in order to cut the tree and a Crafting level of 40 to make the unfinished lyre.

You will then need to string the unfinished lyre, but unfortunately only golden wool will work. Head south-east of the tree until you find several golden sheep and a golden tree. Near them will be a troll called [[Lalli]], who will initially think you want the apples when you want the wool. He will tell you that he already gave it to another human, so go find him.

The other human is [[Askeladden]], who is the child located at the entrance of the long hall in Rellekka. Talk to him and he will give you a [[pet rock]] which he fooled Lalli with. Return to Lalli with the rock, but he will refuse it because the rocks might have baby rocks, so tell him that you can make a delicious rock soup with it.

{{Map|mtype=pin|align=left|caption=Lalli's located at the Golden tree; Fossegrimen will enchant your finished lyre at the Strange altar.
|2626,3598,desc:The location of the [[Strange altar]].
|2741,3638,desc:The location of the [[swaying tree]].
|2766,3608,desc:The location of the [[Golden tree]].
}}

{{Map|2675,3665|align=right|mtype=square|r=3|caption=Lanzig's location.}}
'''<u>Use</u>''' the potato, cabbage, onion, and pet rock on Lalli's stew, which is just outside Lalli's cave home. Ask Lalli to taste it; he will like it and give you some golden fleece. The fleece will need to be strung into a ball of wool; even though there is a [[spinning wheel]] in Rellekka, you cannot use that until the quest is finished, so you will need to go to Seers' Village instead. Use the ball of wool on the unfinished lyre, which will require 25 Fletching.

'''Note:''' If you plan to create multiple lyres, use the [[drop trick]] to collect multiple fleece before proceeding. Once Olaf the Bard's trial is complete, you will not be able to get more fleece from Lalli until the entire Fremennik Trials quest is complete, and Lalli will then charge you 1,000 coins per fleece.

'''Option 2:''' Kill [[Lanzig]], [[Borrokar]], [[Lensa]], or [[Freidir]] in and around the buildings on the eastern side of Rellekka until they drop the lyre, each have a 1/17 chance to drop it. They all have a very quick respawn time and are located a short distance from each other. For mage and range users, you can use the fires in the centre of the buildings to [[safespot]].

[[File:The_Fremennik_Trials_-_An_enchanted_performance.png|thumb|209x209px|A player performs with their lyre.]]

Once you've obtained the lyre, you need to get it enchanted. Bring a [[raw shark]], [[raw manta ray]], or [[raw sea turtle]] with you (if you have more than one lyre to enchant, then bring '''one fish for each lyre''' you wish to have enchanted; if using raw sharks, try to get raw sharks from Rufus' Meat Emporium in Canifis over a period of time). South-west of Rellekka is a [[strange altar]] located on a small peninsula. With the lyre in your inventory, use your raw shark/manta ray/sea turtle on the strange altar. A spirit named [[Fossegrimen]] will appear and enchant your lyre for you.

Enter the door the Longhall Bouncer is guarding to go onstage. ('''Note:''' Drop any extra enchanted lyres, or they will become unenchanted). Play your lyre in front of the crowd, then talk to Olaf a final time to get his vote.

<div align="right">[[The Fremennik Trials#Walkthrough|(Return to Trials Map)]]</div>
"""

[[steps]]
index = 2
name = "Sigli the Huntsman"
links = ["food", "armour", "weapon", "prayer potion", "Draugen", "hunters' talisman", "Runecraft", "talisman", "Fremennik Province", "Butterfly (Draugen)", "Agility", "log balance (Fremennik Province)", "Equipment", "Sigli the Huntsman", "The Fremennik Trials"]
text = """
{{Needed|recommended=Some [[food]], [[armour]], a [[weapon]] (a halberd is best, Ranged is not effective), and [[prayer potion]]s.}}
[[File:The Fremennik Trials - Fighting the Draugen.png|thumb|250x250px|A player fights the Draugen.]]
Sigli can be found near the entrance gate.
Your task is to find the [[Draugen]], an immortal spirit, and defeat it to weaken it. Keep using the [[hunters' talisman]] he gives you to find where to go. The talisman is used the same way you might use a [[Runecraft]] [[talisman]]; selecting locate gives a chat message in the direction to go. The Draugen moves around the [[Fremennik Province]] and can cross bridges. There is a small, transparent-looking [[Butterfly (Draugen)|butterfly]] that follows the Draugen. It can be used to help locate him. Use the talisman on the exact tile the Draugen is on to fight him. Level 48 [[Agility]] can help by allowing you access to the [[log balance (Fremennik Province)|log balance]] shortcut, as the Draugen has a random location that changes frequently. One slow method to find the [[Draugen]] is to sit near the bridge to the east of the strange altar and camp in a spot. Eventually, the Draugen will appear, announced by a chat message, "The Draugen is here! Beware!" With the proper [[Equipment|gear]], a level-50 player should defeat him without problems. However, it should be noted that the Draugen is particularly resistant to ranged attacks. When you defeat him, the Draugen's essence will be absorbed into the [[hunters' talisman]]. Return with the talisman to [[Sigli the Huntsman|Sigli]] to get his vote.

<div align="right">[[The Fremennik Trials#Walkthrough|(Return to Trials Map)]]</div>
"""

[[steps]]
index = 3
name = "Sigmund the Merchant"
links = ["coins", "Sigmund the Merchant (shop)", "exotic flower", "One Small Favour", "The Fremennik Trials", "NPC", "Fremennik ballad", "Olaf the Bard", "Sturdy boots", "Yrsa", "Brundt the Chieftain", "Sigli the Huntsman", "Custom bow string", "Skulgrimen", "Unusual fish", "Torfinn", "Sea fishing map", "Swensen the Navigator", "weather forecast", "Peer the Seer", "Thorvald the Warrior", "Manni the Reveller", "Thora the Barkeep", "legendary cocktail", "Askeladden", "Champions token", "Warriors' contract", "Tracking map", "Fiscal statement"]
text = """
{{Needed|5,000 [[coins]].}}

You can find [[Sigmund the Merchant (shop)|Sigmund]] in the market. He will want you to get him an [[exotic flower]]. This may sound easy, but you will end up having to get something or do something for another person, kind of like a miniature [[One Small Favour]] quest. Refer to [[The Fremennik Trials#Walkthrough|the map above]] to easily locate the [[NPC]]s. '''DO NOT''' lose the items that the people give you; otherwise, you must start over and talk to Askeladden for the promissory note again.

#First, talk to the Sailor on the dock (second pier from the left) about the flower. Ask him about the Merchant's Trial. He will want a romantic [[Fremennik ballad|ballad]] composed for him. 
#Talk to [[Olaf the Bard]]. He will ask you to get him a pair of [[Sturdy boots|new boots]].
#Go to the clothing store (aside: the clothing store is also the starting point of the Rellekka agility course on this building, so in your minimap, you can see the Agility icon) which can be found west of Sigmund, and ask [[Yrsa]] about them. She will only agree to make the boots if [[Brundt the Chieftain]] will lower the taxes on the stores.
#If you talk to Brundt in the longhall, he will tell you that the clan can afford it if [[Sigli the Huntsman]] will show him the best places to hunt monsters.
#Talk to Sigli just south of the longhall. He agrees, but first will want a [[Custom bow string|custom-made bowstring]].
#Go to the helmet store just north of the longhall. The shopkeeper, [[Skulgrimen]], will give you the bowstring in exchange for the [[Unusual fish|rare fish]] that the fisherman caught.
#Head to the dock located west of the helmet shop ([[Torfinn]] is on this dock) and talk to the fisherman on the northern end of the dock. He will ask you to get a [[Sea fishing map|map]] of the best spots to catch edible fish.
#Find [[Swensen the Navigator]], located in the building south of the marketplace. He will make the map, but will want a [[weather forecast]] first.
#[[Peer the Seer]] is found just north-west of Swensen. He will give you a forecast if [[Thorvald the Warrior]] agrees to be his bodyguard.
#[[Thorvald the Warrior]] is in the helmet store. He wants you to get him a seat in the longhall.
#[[Manni the Reveller]] is found in the longhall. He will gladly give up his seat if [[Thora the Barkeep]] will make him one of her [[legendary cocktail]]s.
#Thora, also in the longhall, will only agree to make one if you can get a signed note from [[Askeladden]] for him to stay out of the bar.
#Talk to Askeladden, just south of the longhall, to get the note for 5000 [[coins]].
#Then, give the note to Thora, the cocktail to Manni, the [[Champions token|token]] to Thorvald, the [[Warriors' contract|contract]] to Peer, the forecast to Swensen, the chart to the fisherman, the fish to Skulgrimen (helmet shop), the string to Sigli, the [[Tracking map|map]] to Brundt, the [[Fiscal statement|slip]] to Yrsa (clothes shop), the boots to Olaf (East of longhall), the ballad to the sailor (the second dock from the left in Rellekka), and finally the flower to Sigmund. You will get his vote.

<div align="right">[[The Fremennik Trials#Walkthrough|(Return to Trials Map)]]</div>
"""

[[steps]]
index = 4
name = "Swensen the Navigator"
links = ["Swensen the Navigator", "The Fremennik Trials"]
text = """
Talk to [[Swensen the Navigator|Swensen]] in his house, south-west of the longhall. Your task is to navigate your way through his maze of portals. Enter the maze by going down the ladder in the south-west of his house. In each room of the maze, there are four portals: One on the north wall, one on the south wall, one on the east wall, and one on the west wall. In the brighter rooms with burning torches, one of the portals will take you to the next room on the correct path. The other three will send you to a dim room, with extinguished torches, spider webs, and skeletons. The darker rooms are dead ends, their portals only lead to other dead ends, you must climb the rope and start over.

The trick is to spell his name. First, go in the '''S'''outh portal, then the '''W'''est, then '''E'''ast, then '''N'''orth, then '''S'''outh, then '''E'''ast, and finally '''N'''orth again ''(SWENSEN)''. After you finish, talk to Swensen to get his vote (make sure to put your minimap focused with the north on the right spot).

<div align="right">[[The Fremennik Trials#Walkthrough|(Return to Trials Map)]]</div>
"""

[[steps]]
index = 5
name = "Thorvald the Warrior"
links = ["Food", "prayer potion", "god book", "rings of recoil", "goblin paint cannon", "phoenix necklace", "dramen branch", "Ultimate Ironman", "Thorvald", "Koschei the deathless", "weapons", "armour", "fletching", "logs", "arrowtips", "runes", "food", "Prayer", "Ring of recoil", "ring of suffering (ri)", "Dramen branch", "Dramen staff", "Celastrus bark", "Battlestaff", "Peer the Seer", "ring of life", "Fremennik blade", "The Fremennik Trials"]
text = """
{{Needed|None (you will have to approach the trial with no weapons or armour)|recommended=[[Food]], [[prayer potion]]s, and combat potions. If you have low combat stats you may bring a [[god book]], [[rings of recoil]] (7 minimum), [[goblin paint cannon]], [[phoenix necklace]]s, a [[dramen branch]] and knife.}}

*Note for [[Ultimate Ironman|Ultimate Ironmen]]: Looting bags are prohibited in this fight, regardless of their contents.
*Note for ''Hardcore Group Ironmen'': '''If you die to the 4th phase in the fight, this is a SAFE DEATH.''' You do not actually die, the fight ends if you get to 1 health.

[[Thorvald]] lives in the helmet store. His task is for you to fight a special warrior called [[Koschei the deathless]]. There are two rules: 

# You must fight and defeat him 3 times. Whenever he is defeated, he recovers his health and becomes much stronger. '''You only need to defeat Koschei for the first 3 rounds; if you die to him on the 4th round, you will pass Thorvald's trial. ''Hardcore ironmen and hardcore group ironmen only need to be concerned about dying to the first 3 forms. Losing to his fourth form will not actually kill the player; a small cut-scene ends the fight when you are about to lose to the fourth form.'''''
# You cannot use any [[weapons]], [[armour]], [[fletching]] materials (such as [[logs]]/[[arrowtips]]), or bring [[runes]]. The Ardougne cloak counts as armour, but the boots of lightness do not. However, you can use [[food]], [[Prayer]], [[god book]]s, and jewellery. H.A.M gear is suitable for combat with Koschei, as that counts as clothing, but it still gives some combat defence. [[Ring of recoil|Rings of recoil]] or the [[ring of suffering (ri)]] are strongly recommended. A [[Dramen branch]] and a knife can be used to create a [[Dramen staff]], or a [[Celastrus bark]] and a knife can be used to create a [[Battlestaff]].

There are also some things to note:
* You are given the option to send your items to the bank before entering the basement. Talk to the [[Peer the Seer]] to do so. Note that '''all''' of your items, both equipped and in your inventory, will be banked if you have any equipment that you are not allowed to take in with you. However, you can drop your items on the ground before asking Peer the Seer to deposit your items, keeping them for the battle. Clue scrolls count as armour.
* It is possible to flinch Koschei, but not recommended if you take too long to kill; he will despawn back to his first phase.
* Do not wear a [[ring of life]] as you will be teleported back to your spawn point. You will need to fight him again at his first phase.
* Reward caskets and/or mystery boxes may also be brought into the arena for their armour and weapon drops. Bear in mind that items '''cannot be dropped inside the arena''', so if you inventory is full and you must make space in it to pick up the rewards from the casket that will have dropped to the ground, you will have to eat food to make that space. It has not yet been tested whether trying to make inventory space by climbing the ladder back up, dropping items outside and coming back down will make the dropped rewards disappear.
* It is possible to glitch the fight if you die, and if you come back quickly enough, it is possible to keep fighting him from the point at which you died, and ignore the second Koschei that pops up.
* The time limit for the third form is 10 minutes. If you cannot beat Koschei's third form at this time, he will despawn, and you will have to reset.

Stock up on the food and potions, then climb down to Thorvald's basement. When you enter the arena, Koschei is hidden. Simply roam around for a short while, and he will appear.
[[File:The_Fremennik_Trials_-_Fighting_Koschei_the_deathless.png|thumb|Koschei's final form.]]
Koschei's first form is easy and should give you no problems. After you defeat him, he will regain all of his health and become stronger. There is no way to safespot him as you have no weapons, but you can trap him over the hole and wait a while for your health to regenerate. However, if you stay there too long, he will disappear and reappear after you run around, back in his first form. His level is not displayed.

His second form might give you a bit of trouble, and you might need to use food or Prayer.

His third form is fairly difficult, so you will most likely need to use food and/or Prayer here. You may need a [[prayer potion]] here as it is possible to run out of prayer points early. This is the last form required for you to defeat to complete the quest.

'''Note:''' Leaving after the 3rd fight resets your progress. Enter the 4th fight regardless and, should you lose, his fourth form may roam the area when you return.

The fourth form is the hardest. He will hit once every game tick, but can only hit for 1 damage at a time. It is recommended that the player use a [[Ring of recoil]], but be sure to bring enough rings for the fight (7 minimum) as the ring breaks after 40 hitpoints of damage, and Koschei has 255 HP in this form. Some high level food will also be required to heal the damage taken using this method. In this form, Koschei will quickly drop your prayer points in intervals of 1-2 every second and will drop all of your prayer points as soon as the form starts. If you manage to beat Koschei in this form, you will be given a [[Fremennik blade]]. Otherwise, when Koschei leaves you at 1 hitpoint, you will kneel on the ground and find yourself upstairs. Regardless, Thorvald will give you his vote for your bravery in fighting a superior foe.

<div align="right">[[The Fremennik Trials#Walkthrough|(Return to Trials Map)]]</div>
"""

[[steps]]
index = 6
name = "Peer the Seer"
links = ["Peer the Seer"]
text = """
[[Peer the Seer|Peer]] is found south of the market. He'll give you his vote if you can simply enter the front door to his house, and then come out the other side. This is more difficult than it seems because you cannot take any items in, and you will encounter many puzzles inside. '''You can deposit all your items by completing the dialogue after Peer introduces his trial.'''

'''Note:''' Because Peer will bank all of your items in your inventory, this should be done last to save a lot of time walking to and from the bank.
"""

[[steps]]
index = 7
name = "=Entering the house="
links = []
text = """
[[File:The Fremennik Trials - Combination Lock Door.png|thumb|The combination lock door before entering Peer the Seer's house.]]
To get in, you need to answer a puzzle. The answer is a four-letter word and Peer will give you a clue for each letter and the word itself. All possible answers include: time, life, mage, fire, wind, mind, and tree.
{| class="wikitable"
!Riddle
!Answer
|-
|
*My first is in mage, but not in wizard.
*My second in goblin, and also in lizard.
*My third in night, but not in the day.
*My last is in fields, but not in the hay.
*My whole is the most powerful tool you will possess.
|Mind
|-
|
*My first is in tar, but not in a swamp.
*My second in fire, but not in a camp.
*My third is in eagle, but never in air.
*My last is in hate, but also in care.
*My whole wears more rings the older I get.
|Tree
|-
|
*My first is in the well, but not at sea.
*My second in 'I', but not in 'me'.
*My third in flies, but insects not found.
*My last is in earth, but not in the ground.
*My whole when stolen from you causes you death.
|Life
|-
|
*My first is in fish, but not in the sea.
*My second in birds, but not in a tree.
*My third is in doors, but not in a hall.
*My last is everything, but nothing at all.
*My whole cannot die as long as it has food.
|Fire
|-
|
*My first is in water, and also in tea.
*My second is in fish, but not in the sea.
*My third is in mountains, but not underground.
*My last is in strike, but not like in pound.
*My whole crushes mountains, drains rivers, and destroys civilisations. All that live fear my passing.
|Time
|-
|
*My first is in wizard, but not in a mage.
*My second in jail, but not in a cage.
*My third is in anger, but not in a rage.
*My last in a drawing, but not on a page.
*My whole helps to make bread, let birds fly and boats sail.
|Wind
|}
"""

[[steps]]
index = 8
name = "=Inside the house="
links = ["vase", "old red disk", "wooden disk", "red herring", "empty jug", "empty bucket", "full bucket", "2/5ths full bucket", "full jug", "2/3rds full jug", "4/5ths full bucket", "sticky red goop", "red disk", "abstract mural", "vase lid", "vase of water", "sealed vase", "frozen table", "Frozen key (The Fremennik Trials)", "Chieftain Brundt"]
text = """
After you have solved the riddle, use the ladder. 

You now need to open a chest with a balancing mechanism as a lock to get a [[vase]]. To open it, you must set exactly four litres of water on it.

To solve the puzzle, you will need some items found in the room; search and study everything until you find an [[old red disk]], a [[wooden disk]], a [[red herring]], an [[empty jug]], and an [[empty bucket]].

Once you have all of the items, you can solve the puzzle by doing the following:

#Fill up the bucket from the tap south of the cooking range.
#Use the [[full bucket]] on the jug to end up with a [[2/5ths full bucket]].
#Empty the [[full jug]] by using it on the drain.
#Use the bucket on the jug to get a [[2/3rds full jug]].
#Fill up the bucket with the tap again, and then use the bucket on the jug to get a [[4/5ths full bucket]].
#Use the bucket on the locked chest to get the [[vase]].
#Use the [[red herring]] on the cooking range to receive [[sticky red goop]].
#Use the sticky red goop on the wooden disk so you have 2 [[red disk]]s.
#Go down the east ladder and use both red disks on the [[abstract mural]] to receive the [[vase lid]].
#Use the full jug on the vase to get a [[vase of water]].
#Use the vase lid on the vase, creating a [[sealed vase]].
#Use the sealed vase on the [[frozen table]] to get a [[Frozen key (The Fremennik Trials)|frozen key]]. (frozen table is back up the ladder)
#Unfreeze the key by cooking it on the range.
#Go down the east ladder (Note: '''Use the east ladder nearest to the frozen table. If you exit using the other door, you will have to do some parts over again.''') and out the exit to get Peer's vote.

Once you have all seven council members' votes, head back to [[Chieftain Brundt]], and speak to him to complete the quest.

'''Congratulations, quest complete!'''
"""
