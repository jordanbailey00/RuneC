quest = "Tai Bwo Wannai Trio"
step_count = 8

[[steps]]
index = 0
name = "Introduction (visiting Timfraku)"
links = ["knife", "Karamjan rum", "banana", "Amulet of glory", "Antipoison", "Musa Point", "amulet of glory", "Karamja Wines, Spirits, and Beers", "sliced banana", "Tai Bwo Wannai", "Timfraku", "icon", "Trufitus", "Tamayu", "Tiadeche", "Tinsay", "Tribesmen", "antipoison", "Karamjan rum (sliced banana)", "Cairn Isle"]
text = """
{{Needed|A [[knife]], [[Karamjan rum]] (or 30 coins), and a [[banana]].|recommended=[[Amulet of glory]], [[Antipoison]]}}

Teleport to the [[Musa Point]] banana plantation with your [[amulet of glory]] and pick a banana if you do not already have one. Then, go south to the [[Karamja Wines, Spirits, and Beers|Karamja Spirits Bar]] and purchase [[Karamjan rum|Karamja Rum]]. Slice the [[banana]] using your knife (or a spear) and add the [[sliced banana]] to your rum, making sure not to accidentally eat the sliced banana. Make sure you combine the sliced banana with the rum '''before''' you leave the island, or the rum will break. The rum combined with sliced banana will be necessary in a later part of the quest.

After obtaining the Karamjan rum, travel south to [[Tai Bwo Wannai]] (fairy ring {{Fairycode|CKR}}) and talk with [[Timfraku]] upstairs in the north-west house with a quest [[icon]] above it. Talk with him, and say that [[Trufitus]] sent you. Talk to him again, and when he thanks you for what you have done so far, pick the option "So far??" and he will ask you to gather his sons, [[Tamayu]], [[Tiadeche]], and [[Tinsay]], in the village. {{Colour|Red|Warning}}: The [[Tribesmen]] in and around Tai Bwo Wannai are aggressive to players level 64 and under and deal very high poison damage, easily killing unprepared low-level players. The general store north of Tai Bwo Wannai sells [[antipoison]]s if you forgot to bring some.

:'''''Optional:''''' To avoid accidentally banking/losing the [[Karamjan rum (sliced banana)]], you can visit Tinsay at [[Cairn Isle]] (near fairy ring {{Fairycode|CKR}}) and give it to him. This will fulfil the first of three requests he makes later on.
{{clear|right}}
"""

[[steps]]
index = 1
name = "Tamayu"
links = ["small fishing net", "pestle and mortar", "Agility potion", "iron spear", "steel spear", "mithril spear", "adamant spear", "rune spear", "dragon spear", "Logs", "tinderbox", "raw karambwan", "Brimhaven teleport", "raw karambwanji", "Tamayu", "The Shaikahan", "cutscene", "spear", "Holy Lake", "Cooking", "Karambwan", "Pestle and mortar", "Jiminua's Jungle Store", "Lubufu", "icon", "Brimhaven", "karambwan vessel", "Fishing", "Tiadeche", "Tinsay"]
text = """
{{Needed|A [[small fishing net]], a [[pestle and mortar]] or 6 gold, an [[Agility potion|Agility potion(4)]] and one of any of the following spears: [[iron spear]], [[steel spear]], [[mithril spear]], [[adamant spear]], [[rune spear]] or [[dragon spear]]. Tamayu will accept any spear given to him, but only the ones listed will work for completing the quest|recommended=[[Logs]] (or an axe to chop them), a [[tinderbox]], and a [[raw karambwan]] (one is obtainable later in the quest), [[Brimhaven teleport|Brimhaven Teleport]].|skills={{SCP|Fishing|5}} {{Boostable|yes}} to catch [[raw karambwanji]]}}

[[File:Meeting Tamayu.png|thumb|Tamayu must slay the Shaikahan before he returns to the village.]]
You can find [[Tamayu]] south-east of Tai Bwo Wannai Village at the mine. He will return to Tai Bwo Wannai only once he has killed [[The Shaikahan]]. Talk to him twice; ask him when he will succeed and offer to join him on his next hunt. During a [[cutscene]] Tamayu will fail to defeat The Shaikahan. He will claim that he is overpowered by its strength, regenerating health, and agility.

'''Do not give your [[spear]] or [[Agility potion]] to Tamayu yet. You must poison the spear with karambwan paste, obtained later in the quest, before giving it to Tamayu.''' Go to the [[Holy Lake]] south-west of Tamayu and net-fish for at least 22 [[raw karambwanji]] ({{SCP|Fishing|5}}). (It's recommended to have a few spares or keep the net for later if your [[Cooking]] level is low.) (They are different from [[Karambwan]] and stack like other forms of bait.) If you still need logs, there are some trees that can be cut to the south-west of this pond near the Hunter icon on the minimap.

Now travel north. If you don't have a [[Pestle and mortar]], you can buy one at [[Jiminua's Jungle Store]] (general store icon) north-west of the village. Then continue and talk to [[Lubufu]] (near the POH portal, [[Brimhaven teleport|Brimhaven Teleport]] is useful here) by the fishing [[icon]] on the south-eastern shore of [[Brimhaven]].

[[File:Tai Bwo Wannai Trio Lubufu.png|thumb|Lubufu teaching you the secrets to catching karambwan.]]
Select to "Talk about him..." and ask him how old he is. Then offer to help him collect bait, and then say that he sounds like he could do with the help. He will then tell you to catch 20 karambwanji. Give him the karambwanji and ask him what he uses to catch karambwan, followed by what he does with them, and he will ask you if you want to become his apprentice (you will need to select all options, not just the two listed here). He will then give you a [[karambwan vessel]] and the information that it must be filled with karambwanji as bait. '''You can now catch [[raw karambwan]] with 65 fishing, you will also receive 1500 [[Fishing]] experience'''. If your character goes idle after a couple seconds of fishing, you need to fish at the fishing spots next to Tiadeche in the north east of Karamja. It is recommended you collect more vessels at this stage, one for [[Tiadeche]], one for [[Tinsay]] and one for yourself. You can obtain more by dropping the one in your inventory and then asking [[Lubufu]] for another.

Once you have obtained as many as you wish use a [[raw karambwanji]] on one of these vessels.

See below on how to complete the Tamayu part of this quest.
[[File:Tai Bwo Wannai Trio - Tiadeche catches a karambwan.png|thumb|Tiadeche catches a karambwan.]]
"""

[[steps]]
index = 2
name = "Tiadeche"
links = ["Karambwan vessel", "Raw karambwanji", "Ranged", "Magic", "Monkey", "Tiadeche", "Karambwan", "Raw karambwan", "Tinsay", "Seaweed", "poison karambwan", "Fishing", "Hosidius Kitchen", "Cooking", "pestle and mortar", "Poison karambwan", "Karambwan paste", "spear", "Tamayu", "Jogre bones", "Jogre", "iron spear", "Agility potion", "cutscene", "The Shaikahan", "monkey", "halberd", "Monkey corpse", "monkey bones", "Monkey skin"]
text = """
{{Needed|A [[Karambwan vessel]], and a [[Raw karambwanji]]. Logs and Tinderbox, and a [[Ranged]] or [[Magic]] method to kill a [[Monkey]] if you want to save time.}}

Next, go to the north-east corner of the Karamja jungle (fairy ring {{Fairycode|DKP}}) to seek out [[Tiadeche]]. Once found, talk to him. He says he will go back to Tai Bwo Wannai after you teach him how to catch [[Karambwan]]. Give him your '''full''' [[Karambwan vessel]] '''(use your karambwanji on the vessel first, then use the full vessel on Tiadeche)''' and he will subsequently give you a [[Raw karambwan]]. He will also ask you to bring a Karambwan vessel to his brother [[Tinsay]] to request that he study the vessel's design, so the tribe can craft additional vessels. (He will not give you the vessel back; you will have to go get another from Lubufu if you did not already obtain additional vessels earlier.)

While you are here you can grab the nearby [[Seaweed]] that spawns on the beach as you will need it later on.

Once you have the raw karambwan, cook it to obtain a [[poison karambwan]]. If you are an Ironman and burn the [[Karambwan]], you will need to catch another (requires 65 [[Fishing]]). Consider using the [[Hosidius Kitchen]] or some other [[Cooking#Temporary boosts|Cooking boosts]] to minimise the risk of burning it.

Use the [[pestle and mortar]] on the [[Poison karambwan]] to produce [[Karambwan paste]]. Then, use the paste on the [[spear]] to create a karambwan poisoned spear. If you eat the [[Poison karambwan]] you will take up to 5 damage, so right-click on it and select the "use" option, or simply use the pestle and mortar to avoid doing so.

Now, head back to [[Tamayu]] by running south. If you didn't purchase the [[Jogre bones]], kill a [[Jogre]] on the way and pick up the bones. If you don't have a spear, you can continue killing jogres until they drop an [[iron spear]]. Cross the agility shortcut, then run west to the mine.

[[File:Tai Bwo Wannai Trio - The Shaikahan.png|thumb|Tamayu fights the Shaikahan.]]
Once you have returned to Tamayu, use the newly poisoned spear and your [[Agility potion|Agility potion(4)]] (it needs to have 4 doses) on him (being careful not to drink the potion). You can now join Tamayu on his hunt and a short [[cutscene]] will play showing Tamayu being successful on his hunt. Once he has slain [[The Shaikahan]] he will promise to return to the village once you've talked with his brothers and father.

To save some time helping [[Tinsay]], kill a nearby [[monkey]] (with [[Ranged]] or [[Magic]], or with a [[halberd]] from one square away) and use its [[Monkey corpse|corpse]] on [[Tamayu]]. He will ask you if you'd like him to skin it, returning the [[monkey bones]] and [[Monkey skin|skin]] (you only need to save the skin).
"""

[[steps]]
index = 3
name = "Tinsay"
links = ["rock slide (Cairn Isle)", "Cairn Isle", "Tinsay", "Tribal Statue", "Jogre"]
text = """
{{Needed|skills={{SCP|Agility|15}} {{Boostable|yes}} to climb the [[rock slide (Cairn Isle)|rock slide]] to [[Cairn Isle]]}}
Now head to [[Cairn Isle]] in order to talk to [[Tinsay]]. He is located up the rockslide ({{SCP|Agility|15}}) and across the bridge. He'll tell you that he's trying to repair the [[Tribal Statue]] in the village. He has lost his sanity recently due to some sort of accident with a [[Jogre]]. He asks for three special local items.
"""

[[steps]]
index = 4
name = "=Banana rum (if not done beforehand)="
links = ["banana", "Karamjan rum", "knife", "Musa Point", "general store", "Sliced banana", "Karamjan rum (banana)"]
text = """
{{Needed|A [[banana]], [[Karamjan rum]], and a [[knife]]. Note that the knife is not strictly required. A slashing weapon seems to work as well.}}

The first thing he'll ask you to get him is a bottle of banana-flavoured rum. Head to [[Musa Point]], and buy a bottle of [[Karamjan rum]] from the liquor store there. Then, go into the [[general store]], take the banana and knife off the table and use the knife with the banana to slice it. Add these [[Sliced banana|slices]] to the rum and give it to Tinsay (be careful not to eat the slices).

Do not use a whole banana on the rum without slicing it. It will create a joke item, [[Karamjan rum (banana)]]. If done so you will need to get another bottle of [[Karamjan rum]] to try again.
"""

[[steps]]
index = 5
name = "=Seaweed sandwich="
links = ["Seaweed", "monkey skin", "Ranged", "Magic", "Seaweed sandwich", "Monkey", "Monkey corpse", "Tamayu", "Monkey skin", "Tinsay", "monkey corpse", "seaweed", "Stuffed monkey", "karambwan vessel", "Crafting manual", "Tiadeche"]
text = """
{{Needed|[[Seaweed]], and a [[monkey skin]]  or a [[Ranged]] or [[Magic]] method to kill a monkey.}}

Next Tinsay wants you to bring him a [[Seaweed sandwich]]. If you do not already have the items cross back over the bridge to collect [[Seaweed]] from the beach and equip your [[Ranged]] or [[Magic]] gear (or a halberd) in order to kill a [[Monkey]]. Collect the [[Monkey corpse]] and take it back to [[Tamayu]] to be skinned and be given [[Monkey skin]].

Once you have both items use them on each other to create a [[Seaweed sandwich]] to give to [[Tinsay]].

Like before, do not use a [[monkey corpse]] on the [[seaweed]] before taking the monkey to Tamayu for skinning. This will create another joke item, [[Stuffed monkey]], and you will need to give the stuffed monkey to Tamayu to revert it back to its base components.

After you make the seaweed sandwich, use one of the [[karambwan vessel]]s on Tinsay to receive the [[Crafting manual]] for [[Tiadeche]]. He won't accept it until you make the sandwich.
"""

[[steps]]
index = 6
name = "=Marinated jogre bones="
links = ["Jogre bones", "raw karambwanji", "pestle and mortar", "logs", "tinderbox", "Firemaking", "furnace", "Superheat Item", "Karambwanji paste", "Burnt jogre bones", "pasty jogre bones", "range", "fire", "marinated j' bones", "karambwan vessel", "Crafting manual"]
text = """
{{Needed|[[Jogre bones]], a [[raw karambwanji]], a [[pestle and mortar]]. Recommended: [[logs]], and a [[tinderbox]] (for cooking the pasty jogre bones).}}

You now need to get some burnt jogre bones marinated in karambwanji sauce. '''Be careful not to bury the bones!''' The bones can be accidentally buried at any step in this process.

# Use the jogre bones on a '''tinderbox''' to burn them. It will take a couple of seconds for them to finish burning, after which you can pick them up. If your [[Firemaking]] level is below level 30, you will not be able to burn the jogre bones with a tinderbox. Instead, you will have to burn them in a '''[[furnace]]'''. Alternatively, cast '''[[Superheat Item]]''' on the jogre bones.
# Grind a [[raw karambwanji]] with your [[pestle and mortar]].
# Use the [[Karambwanji paste|paste]] on the [[Burnt jogre bones|burnt bones]] to get [[pasty jogre bones]].
# Cook the pasty jogre bones on a [[range]] or [[fire]] to marinate them, and give the [[marinated j' bones]] to Tinsay. Note: These bones should be green in colour. If you cooked the bones wrong, they will be white instead.

Like before, do not use the karambwanji paste on the jogre bones before burning the jogre bones. This will create another joke item, useless [[marinated j' bones]] (which will be white, not green). You will have to get new jogre bones and karambwanji paste.

Now that you've helped Tinsay, he will regain his sanity and agree to return to Tai Bwo Wannai. Before leaving, give a spare [[karambwan vessel]] to Tinsay and receive the [[Crafting manual]]. 

Return to Tiadeche with the [[Crafting manual]], and they will both return to Tai Bwo Wannai.
"""

[[steps]]
index = 7
name = "Wrapping up"
links = ["Timfraku", "Tai Bwo Wannai"]
text = """
After you're done with all three brothers, talk to [[Timfraku]] up the ladder in the north-west house of [[Tai Bwo Wannai]] again to complete the quest. 

'''Congratulations, quest complete!'''

'''Note''': You must talk to each of the three brothers in their houses along the southern fence of the village to receive the additional experience rewards.
"""
