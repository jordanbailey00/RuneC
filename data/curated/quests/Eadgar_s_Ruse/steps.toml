quest = "Eadgar's Ruse"
step_count = 9

[[steps]]
index = 0
name = "Starting off"
links = ["Herblore", "troll truth potion", "Sanfew", "Taverley", "goutweed", "Druid's circle", "troll", "Troll Stronghold (location)", "Eadgar", "Trollheim"]
text = """
:'''Note:''' If boosting the [[Herblore]] requirement, you will need to boost twice; once before starting the quest, and once before making the [[troll truth potion]].

Speak to [[Sanfew]] on the top floor of the herb shop in [[Taverley]]. Select '''ask general questions''', then ask if he has any more work for you. He will task you to find the secret of the herb [[goutweed]], in order to perform the next part of the purifying ritual on the [[Druid's circle]]. Only the [[troll]]s in the [[Troll Stronghold (location)|Troll Stronghold]] know about goutweed, so Sanfew will suggest you speak to his friend, [[Eadgar]], who lives near there at the top of [[Trollheim]].
"""

[[steps]]
index = 1
name = "Getting to the Troll Stronghold"
links = ["Food", "armour", "climbing boots", "Ardougne teleport (tablet)", "prayer potion", "super restore", "slayer Ring", "dramen staff", "Ghommal's hilt", "combat bracelet", "games necklace", "Trollheim"]
text = """
{{Needed|[[Food]], [[armour]] and [[climbing boots]]|recommended=An [[Ardougne teleport (tablet)|Ardougne teletab]], [[prayer potion]]s or [[super restore]]s, and one of a [[slayer Ring]], a [[dramen staff]], a [[Ghommal's hilt]], a [[combat bracelet]], or a [[games necklace]]}}

'''''Note:''''' Failing the obstacles, though uncommon, deals 1-5 damage, depending on your current HP.

Make your way to [[Trollheim]] using any of the routes below.
"""

[[steps]]
index = 2
name = "=God Wars Dungeon route="
links = ["God Wars Dungeon", "Ghommal's hilt", "Combat Achievements", "Boulder (God Wars Dungeon)", "little crack"]
text = """
The fastest and safest method to get to Trollheim is to teleport near the entrance of the [[God Wars Dungeon]] with one of [[Ghommal's hilt]]s, rewarded from completing [[Combat Achievements]]. The hilt's 'Trollheim' option will place the player near the [[Boulder (God Wars Dungeon)|boulder]]/[[little crack]], at which point they may run south to meet up with the thrower troll portion of the Burthorpe route.
"""

[[steps]]
index = 3
name = "=Burthorpe route="
links = ["games necklace", "combat bracelet", "Burthorpe Games Room", "Warriors' Guild", "Burthorpe", "Tenzing", "climbing boots", "coins", "Troll Stronghold (location)"]
text = """
[[File:Eadgar's Ruse - Quest map.png|thumb|240x240px|Shows the various ways to get to Mad Eadgar's Cave. The red line is the path to take if you do not have level 44 agility. Eadgar is located inside the cave entrance.]]
If using a [[games necklace]] or a [[combat bracelet]] teleport to [[Burthorpe Games Room]] or the [[Warriors' Guild]], respectively, and follow the mountain path out of the north-western corner of [[Burthorpe]]. Go south at the fork in the path to [[Tenzing]]'s house. If you don't already have [[climbing boots]], buy some here from Tenzing for 12 [[coins]]. Wear the climbing boots, and climb over the stile in his back yard, following the path north. At the next junction, climb over the rocks, follow the path, and go west at the next fork climbing over rocks as required. Head north to the Secret Entrance that will place you on the lower level of the [[Troll Stronghold (location)|Troll Stronghold]].
"""

[[steps]]
index = 4
name = "=Rellekka route="
links = ["Slayer ring", "Dramen staff", "climbing boots", "Tenzing", "Fremennik Slayer Dungeon", "Fairy ring", "Troll Stronghold (location)"]
text = """
''If using a [[Slayer ring]] or a [[Dramen staff]], you must have [[climbing boots]] already as you won't be able to reach [[Tenzing]] from this path.''

For the [[Slayer ring]] path, teleport to the [[Fremennik Slayer Dungeon]] or use the [[Fairy ring]] with (code {{Fairycode|ajr}}) to teleport outside the Dungeon entrance. Head north-east to a narrow passage and climb over some rocks ([[climbing boots]] required). Head north to the Secret Entrance that will place you on the lower level of the [[Troll Stronghold (location)|Troll Stronghold]].
"""

[[steps]]
index = 5
name = "Cooking up a plan"
links = ["Eadgar", "Troll Stronghold", "Berry", "Troll Cook", "Burntmeat", "goutweed", "Troll Romance", "Trollheim"]
text = """
:'''Note:''' If you didn't rescue [[Eadgar]] during the [[Troll Stronghold]] quest, you will need to do so before the following steps, or he will not appear in the cave. You may check the quest log to see whether it says "I've rescued Godric and Mad Eadgar". To rescue him, head to the Stronghold's prison on the bottom level, and pickpocket [[Berry]] the sleeping guard to get the key to his cell. If you are unable to pickpocket him, you may have already freed Eadgar (he will still appear in the cell even after being freed). Unlock the gate to free him.

From the Secret Entrance, head north along the corridor, past the jail cells and sleeping guards and take the stone staircase in the north-east corner. Head south and you'll see four [[Troll Cook]]s here – one of them will be called [[Burntmeat]]. Speak to him, and he will offer to tell you about [[goutweed]] in exchange for a human to cook in his stew.

:'''Note:''' Consider doing the first section of the [[Troll Romance]] quest while in the area (the three trolls are just to the north-west of the kitchen).

Take the stairs next to Burntmeat and you will be on the upper level of the Stronghold. From here, follow the corridor north until you see the exit on the wall to the east, exit the Stronghold and run south-east to reach the base of [[Trollheim]] on the west side.

At the summit of Trollheim, enter the unmarked cave entrance on the southern side. Speak to Eadgar and the player will inform him of your quest and Burnmeat's request for a human stew. Eadgar has a plan to trick him, but first he needs a parrot.
"""

[[steps]]
index = 6
name = "The parrot"
links = ["Climbing boots", "vodka", "pineapple chunks", "grain", "logs", "tinderbox", "raw chicken", "pestle and mortar", "boost", "ranarr potion (unf)", "Tegid", "Slayer ring", "Dramen staff", "games necklace", "combat bracelet", "Ardougne Zoo", "Parroty Pete", "wolf", "alco-chunks", "drunk parrot", "unfinished ranarr potion", "Troll Stronghold (location)", "fairy rings", "slayer ring", "Fremennik Slayer Dungeon", "Taverley", "dirty robe", "Sanfew", "Eadgar", "Troll Romance"]
text = """
{{Needed|[[Climbing boots]], [[vodka]], [[pineapple chunks]], 10 [[grain]], 2 [[logs]], a [[tinderbox]], 5 [[raw chicken]]s, a [[pestle and mortar]], Herblore [[boost]] (if not level 31), and a [[ranarr potion (unf)]]. 10 grain may be picked while obtaining robes from [[Tegid]]|recommended=A [[Slayer ring]] or a [[Dramen staff]] for the fastest access to the troll prison, a [[games necklace]], or a [[combat bracelet]] if not.
A Falador Teleport Tablet if you need to return to Taverley for the dirty clothes}}

Head to the [[Ardougne Zoo]], and talk to [[Parroty Pete]] near the northern [[wolf]] enclosure. Ask him when they added the parrot aviary, and then ask what they like to eat. He will tell you their favourite food is [[pineapple chunks]], and that someone recently replaced their drinking water with [[vodka]] as a prank.

'''Use''' (don't eat) your pineapple chunks on the vodka to make [[alco-chunks]], then use them on the aviary hatch on the west side of the parrot cage. You'll obtain a [[drunk parrot]], with the player telling Parroty Pete that you will take it to the vet.

'''Do not drop''' the parrot or it will fly away. Once you have visited Eadgar with the parrot, you will be able to retrieve it from him if lost.

While in Ardougne, it's also a good idea to pick up your logs, tinderbox, grain, raw chicken, pestle and mortar, and [[unfinished ranarr potion]] from the bank.

Take the parrot to Eadgar. You need to make it look like a human, taste like a human, smell like a human, and talk like a human. (You must do these steps in order; however, you may hand in the items after hiding the parrot.)

:Go back to Eadgar using your route of choice, to talk about the rest of his plan before proceeding to the next step.
:If you pick a Thistle now, you can dry it on a fire on the way back to Eadgar. Scroll down to the [[#Truth serum|truth serum section]] to learn how to acquire a troll thistle.

*'''Talk like a human''' - Go back to the [[Troll Stronghold (location)|Troll Stronghold]], and head north through the corridor, then climb down the stone staircase, and unlock the prison door (no key required), finally climb down the second stone staircase to arrive at the prison cells. Go a bit further west and hide your parrot under the rack just north of the cells. Alternatively, use the [[fairy rings]] (code {{Fairycode|ajr}}) or a [[slayer ring]] to teleport to the [[Fremennik Slayer Dungeon]] and follow the north-east passage to the climbable rocks, then open the secret door to the north and you will be directly south of the jail cells. Then, head north until you get to the stone staircase, and then, head west and hide the parrot under the rack north of the cells.
*:You will come back for the parrot later. Make sure that you check your Quest Log and talk to Eadgar before teleporting away.

*'''Look/Taste like a human''' - Teleport out of Trollheim and get your 10 grain, 2 logs, tinderbox, 5 raw chicken, pestle and mortar, and unfinished ranarr potion.
**Note for Ultimate Ironmen: You can make multiple trips with the items if you do not have the inventory space available to bring them in one trip.
*'''Smell like a human''' - Go to [[Taverley]]. You will see [[Tegid]] washing robes in the lake. Talk to him, and ask for a [[dirty robe]]. Then, threaten him with talking to [[Sanfew]] or chopping down trees to get one. After this, if needed, pick 10 [[grain]] just south of Tegid to bring to [[Eadgar]]. Take all items to Eadgar and he will make the human substitute for you. 
**Consider doing the middle sections of the [[Troll Romance]] quest now to save time running back and forth.
"""

[[steps]]
index = 7
name = "Truth serum"
links = ["Arrg", "Troll Romance", "Eadgar", "troll truth potion", "Burntmeat", "Goutweed", "Thistle (Trollheim)", "Troll thistle", "log", "dried thistle", "pestle and mortar", "ground thistle", "Greenman's ale", "unfinished ranarr potion", "troll potion", "Troll Stronghold (location)", "Fairy rings", "Slayer ring"]
text = """
{{Needed|recommended=Combat gear and supplies for fighting [[Arrg]] if returning to complete the last part of [[Troll Romance]] quest simultaneously}}

'''Note:''' If you boosted your Herblore to start the quest, a level of 31 is needed to make the troll truth potion.  
[[File:Eadgar's Ruse - Troll thistle.png|thumb|220px|A thistle, hiding amongst the grass.]]
After you've done all of this, [[Eadgar]] will tell you that you need to make a [[troll truth potion]] so that [[Burntmeat]] won't lie to you about [[Goutweed]]. Look near the grass patches around Eadgar's hill until you find a tiny [[Thistle (Trollheim)|thistle]] growing in one of them and pick it for a [[Troll thistle]]. It may take you a while, but keep searching. If unable to find it, one may find it helpful to world hop and check the grass directly north or directly west of the cave. The Thistle's name is yellow when displayed at the top-left of the game window.

Once you've found the troll thistle, make a fire with your third [[log]], and cook it to get a [[dried thistle]]. If you forgot a third log and/or tinderbox, there is a fire in the cave between the arena and Trollheim. Then, grind it with a [[pestle and mortar]] to make [[ground thistle]]. Finally, [[Greenman's ale|boost]] your Herblore level (if necessary) and add the ground thistle to your [[unfinished ranarr potion]] to make a [[troll potion]]. (If your character doesn't want to, check your quest journal to re-sync your progress).

Talk to Eadgar again. He will take the potion off of you and tell you that the parrot has had enough by now, so you can get it back from the troll jail. At this point it's recommended that you bank and grab some food for the next part of the quest. Go back to the prison cells in the [[Troll Stronghold (location)|Troll Stronghold]], either through the back door to the jail via [[Fairy rings]], code '''{{Fairycode|ajr}}''' or with the [[Slayer ring]] teleport (bring climbing boots). If you chose not to bank, head back to the stronghold then north through the corridor, then climb down the stone staircase, and unlock the prison door. Finally, climb down the second stone staircase to arrive at the prison cells, search the rack to retrieve the parrot, and then return to Eadgar.
----
"""

