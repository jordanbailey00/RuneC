quest = "Cold War"
step_count = 8

[[steps]]
index = 0
name = "Penguin spotting"
links = ["oak plank", "steel nails", "hammer", "spade", "Dramen", "Lunar", "Fairy ring network", "Ardougne", "Ardougne cloak 1", "Larry", "Ardougne Zoo", "penguin", "Rellekka", "Iceberg", "fairy ring", "The Giant Dwarf", "Grand Exchange", "enchanted lyre", "Camelot", "cutscene", "Emotes", "emotes", "clockwork suit", "Clockwork book"]
text = """
{{Needed|10 [[oak plank]]s, 10 [[steel nails]], a [[hammer]], and a [[spade]].|recommended=[[Dramen]] or [[Lunar]] staff (as well as a teleport to access the [[Fairy ring network]]), [[Ardougne]] teleport runes or [[Ardougne cloak 1]] or higher (to get to Ardougne and start the quest).}}
[[File:Cold War - Finished bird hide structure.png|thumb|220px|The finished bird hide structure.]]

Speak to [[Larry]] at the south entrance of the [[Ardougne Zoo]]. He's a bit nutty about [[penguin]]s. Larry hopes to build a lookout to observe the penguins. His instructions are to collect him 10 [[oak plank]]s, 10 [[steel nails]], a [[hammer]] and a [[spade]]. When you have your supplies, talk to him again and tell him that you have the materials to build the lookout (He also says to meet him north-east of [[Rellekka]], but this is not necessary). He will now teleport you to the [[Iceberg]]. Accept the teleportation prompt (you can't have any pet following you, otherwise you won't be teleported).

''If you opt out of Larry's offer or ever need to get to the meeting location without his teleport, you have to go to the north-east of the rock crabs, and can teleport very close to it with the [[fairy ring]] code {{fairycode|dks}} (just walk down the mountain and a small bit north-west to the dock). If you have completed [[The Giant Dwarf]], you can use the [[Grand Exchange]] trapdoor to shortcut to Rellekka. You can also use the [[enchanted lyre]] to teleport to Rellekka and walk to the meeting spot. If no closer teleport is available to you, teleport to [[Camelot]] and walk north. '''If you leave an area during any point in the quest, Larry will not teleport you back and you'll need to make your way there yourself. Prepare for this if necessary.'''''

Upon arrival, you'll see a firm snow patch next to the landing spot. Build the lookout here by using an oak plank on the patch. Then, use a [[spade]] on the lookout to cover it in snow. You can also use the dig option on the spade while standing near the lookout.

[[File:Cold War - Spying on penguins.png|thumb|220px|Spying on the penguins.]]

When the lookout is ready, speak to Larry. This will be followed by a rather strange [[cutscene]]. '''Keep note of the emotes the penguin does, as the emote greeting code is unique for every player and will need to be used, in order, for several later parts of the quest.''' There are eight different [[Emotes#Penguin emotes|penguin emotes]] in all, similar to the normal character [[emotes]], and the greeting will consist of three of those. If you need to see them again, click "Use Snowy bird hide" to watch the cutscene again. After the cutscene, speak to Larry and suggest to him that the behaviour of the penguins in the cutscene was suspicious.

