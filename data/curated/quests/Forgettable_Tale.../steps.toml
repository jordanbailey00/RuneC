[[steps]]
index = 0
name = "Starting out"
links = ["Beer", "coins", "Keldagrim", "Minigame Teleport", "Blast Furnace", "Grand Exchange", "fairy ring", "Dwarven Mine", "White Wolf Mountain", "Dorgesh-Kaan", "Another Slice of H.A.M.", "Veldaban", "Dwarven Black Guard", "The Giant Dwarf", "Red Axe", "Consortium", "Drunken Dwarf (Keldagrim)", "Laughing Miner Pub", "King's Axe Inn", "Kelda stout"]
text = """
{{Needed|[[Beer]] (or 2 [[coins]] to buy one)}}
[[File:Commander Veldaban chathead.png|left]]
Head to [[Keldagrim]]. A great way to get there is by using the [[Minigame Teleport]] to [[Blast Furnace]]. Another great way is to use the cart trapdoor in the north-western part of [[Grand Exchange]]. The [[fairy ring]] code {{Fairycode|dks}} will bring you right next to the entrance to Keldagrim. There are also cart rides from the [[Dwarven Mine]], the underground [[White Wolf Mountain]] passageway, and [[Dorgesh-Kaan]] (if you completed the quest [[Another Slice of H.A.M.]]).

To start this quest, talk to [[Veldaban]], Commander of the [[Dwarven Black Guard|Black Guard]] in the Black Guard H.Q., west of the Keldagrim bank. He is rather shocked to tell you that, after the incident at the end of [[The Giant Dwarf]], the [[Red Axe]] company has completely left Keldagrim, causing disorder within the [[Consortium]].

However, he finds this to be rather suspicious, and wants you to investigate the mining group. The only lead the Black Guard currently has is that there is a [[Drunken Dwarf (Keldagrim)|dwarf]] living in east Keldagrim who acts strangely whenever the company is mentioned.

Agree to help Veldaban, and you will automatically be transported to the dwarf's house in east Keldagrim after a short cutscene. Speak to the dwarf, who is rather drunk and will ask you for a drink. Talk to him to give him the beer. Beer can be bought in the [[Laughing Miner Pub]] or the [[King's Axe Inn]] for two coins. He, however, wants "some of the REALLY good stuff", which is an incredibly alcoholic drink called [[Kelda stout]].
"""

[[steps]]
index = 1
name = "Getting the seeds"
links = ["beer glass", "beer", "Keldagrim minecart system", "White Wolf Mountain", "kelda hops", "kelda seed", "Khorvak", "Gauss", "rowdy dwarf", "Drunken Dwarf (Keldagrim)", "Laughing Miner", "Rowdy dwarf", "minecart", "Khorvak, a dwarven engineer", "Keldagrim", "King's Axe Inn", "Varrock", "apothecary", "Dommik's Crafting Store.", "Emir's Arena", "Cooking", "log", "Karamja", "amulet of glory", "Bones to Bananas", "Seers' Village", "Laughing Miner Pub", "Camulet", "Enakhra's Lament", "camel", "Al Kharid", "hot sauce", "Pollnivneach", "kebab seller", "The Asp & Snake Bar", "bucket", "chicken", "cooked chicken", "range", "fire", "Cabbage", "Explorer's ring 2", "Cabbage (Draynor Manor)", "trader crewmember", "charter ship", "Ali Morrisane", "barbarian", "imp", "man", "Tree Gnome Stronghold", "Taverley", "Thessalia's Fine Clothes", "East Ardougne", "Diango", "Draynor Village", "Crafting", "The Tourist Trap", "Lumbridge Swamp", "Morytania", "Draynor", "Crafting table", "Player-owned house", "plank", "Vampyre", "Haunted Woods", "Canifis", "Port Sarim"]
text = """
{{Needed|Random item (see below), and a [[beer glass]] or [[beer]] (purchasable for 1 coin)|recommended=200 coins to take the [[Keldagrim minecart system|minecart]] train to [[White Wolf Mountain]]}}

To make the drink, you need to grow some [[kelda hops]] from 4 [[kelda seed]]s, possessed by some of his drunken friends - namely [[Khorvak]], [[Gauss]] and the [[rowdy dwarf]].
[[File:Forgettable Tale toast.png|200px|thumb|Cheers!]]
*The [[Drunken Dwarf (Keldagrim)|drunken dwarf]] gives the first seed to set you off.
*For the next seed, go to the [[Laughing Miner]] pub (directly south of the drunken dwarf's house) and you should see the [[Rowdy dwarf]], circling around the pub. He asks you for a random item in exchange for another seed. See the list of items and how to obtain them below. Before teleporting outside of Keldagrim to obtain whatever item you're asked for (if needed), proceed to obtaining the next seed.
*For the third seed, go to the [[White Wolf Mountain]] by using the [[minecart]]s. In the pub, talk to [[Khorvak, a dwarven engineer]]. Convince him that you will bring the seed back when you are done, and he will let you "borrow" it. Alternatively, you may give him a dwarven stout from a nearby table in exchange for the seed.
*For the last seed, go to the west side of [[Keldagrim]] and talk to [[Gauss]]. He is in the [[King's Axe Inn]], south of the bank in west Keldagrim. He will ask you to do a toast with him. If you don't have an empty beer glass, buy a beer and toast with him to get the seed. You may toast with an empty beer glass or with a full beer; toasting with a full beer will not consume the beer, and it may be used later in the quest.

{| class="mw-collapsible" style="text-align:left;" mw-collapsed "
!The Rowdy Dwarf may ask you for one of the following (if you cannot obtain the item, wait a few minutes and talk to him again for a different request):
|-
|
*'''{{plink|Potion (Apothecary)|txt=Acne potion}}''' - [[Varrock]] [[apothecary]]. Ask him for a free potion. You may have to ask for it several times.
*'''{{plink|Amulet mould}}''' - [[Dommik's Crafting Store.]], in Al Kharid, south of the [[Emir's Arena]].
*'''{{plink|Anchovy pizza}}''' - Made with the [[Cooking]] skill.
*'''{{plink|Ashes}}''' - Burn any [[log]] and collect the ashes.
*'''{{plink|Banana}}''' - Found in [[Karamja]] Plantation - use an [[amulet of glory]] teleport, or use the [[Bones to Bananas]] spell.
*'''{{plink|Bat bones}}''' - Found in various locations, such as south of [[Seers' Village]].
*'''{{plink|Broken glass}}''' - Found north of the [[Laughing Miner Pub]] in the Drunken Dwarf's house.
*'''{{plink|Ugthanki dung|txt=Bucket of "camel poo"}}''' - Use a [[Camulet]] (obtained from the [[Enakhra's Lament]] quest) and a bucket and ask a [[camel]] for its dung in [[Al Kharid]], or use a bottle of [[hot sauce]] from the [[Pollnivneach]] [[kebab seller]] with camel feed west of [[The Asp & Snake Bar]] and use a [[bucket]] on the resulting dung with a spade in your inventory while wearing gloves.
*'''{{plink|Burnt chicken}}''' - Either fail at cooking a [[chicken]], or use a [[cooked chicken]] on a [[range]] or [[fire]].
*'''{{plink|Cabbage}}''' - Found in [[Cabbage#Cabbage patches|cabbage patches]] across Gielinor. If you have [[Explorer's ring 2]], you can teleport to the cabbage patch south of Falador. He '''<u>''will not accept''</u>''' the special [[Cabbage (Draynor Manor)|Draynor Manor variety]].
*'''{{plink|Right eye patch|txt=Eye patch}}''' - Any [[trader crewmember]] next to the [[charter ship]]s.
*'''{{plink|Fake beard}}''' - Bought from [[Ali Morrisane]], north of the Palace in [[Al Kharid]].
*'''{{plink|Flyer}}''' - Not tradeable on the GE. Dropped from [[barbarian]]s and [[imp]]s, or a random gift from talking to [[man]] (level 2) (Rare). An Al Kharid flyer or flyer obtained from the Gauntlet '''<u>''will not''</u>''' be accepted.
*'''{{plink|King worm}}''' - Obtained in the north part of [[Tree Gnome Stronghold]] or in [[Taverley]].
*'''{{plink|Pink skirt}}''' - Can be purchased from [[Thessalia's Fine Clothes]] by the central square in [[Varrock]] for 2 coins.
*'''{{plink|Potato}}''' - Can be picked in the fields north of [[East Ardougne]], near Lumbridge, or player-grown.
*'''{{plink|Red cape}}''' - Can be purchased from [[Thessalia's Fine Clothes]] by the central square in [[Varrock]] for 2 coins.
*'''{{plink|Spinning plate}}''' - Bought from [[Diango]] in [[Draynor Village#Marketplace|Draynor Market]].
*'''{{plink|Studded chaps}}''' - Made with the [[Crafting]] skill or bought.
*'''{{plink|Steel dart}}''' - Player-made after [[The Tourist Trap]].
*'''{{plink|Swamp tar}}''' - Obtained in [[Lumbridge Swamp]] or in [[Morytania]].
*'''{{plink|Toy horsey|pic=Black toy horsey}}''' - Bought from [[Diango]] in [[Draynor]] Market or made on the [[Crafting table]] in a [[Player-owned house]] using a regular [[plank]].
*'''{{plink|Vampyre dust}}''' - [[Vampyre]]s are found in the [[Haunted Woods]], east of [[Canifis]].
*'''{{plink|White apron}}''' - [[Port Sarim]] Fishing shop, on the north wall.
|}
"""

[[steps]]
index = 2
name = "Brewing"
links = ["kelda seed", "rake", "seed dibber", "Barbarian Training", "Bucket of water", "barley malt", "ale yeast", "pot", "coins", "beer glass", "Keldagrim", "Rind the gardener", "Kelda hops", "Letter (Forgettable Tale...)", "Elstan", "Falador", "Explorer's ring", "marrentill seed", "fermenting vat", "bucket of water", "kelda hops", "Blandebir", "Drunken Dwarf (Keldagrim)", "Red Axe", "Kelda stout"]
text = """
{{Needed|4 [[kelda seed]]s, [[rake]] (obtainable for free), [[seed dibber]] (or by hand after completing the first farming subsection of [[Barbarian Training]]), 2 [[Bucket of water|buckets of water]], 2 [[barley malt]], [[ale yeast]] (or [[pot]] (obtainable for free) and 25 [[coins]]), [[beer glass]]}}

[[File:Kelda hops grown.png|thumb|Harvesting the Kelda hops]]
Once you have all four seeds, go to the hops farming plot in front of the palace in West [[Keldagrim]] and east of the bank. Ask [[Rind the gardener]] for advice on planting the seeds, and he will explain that sunlight is harmful for kelda seeds and hence you can only grow it underground. He then gives you permission to use the [[Kelda hops]] patch. Pick up the rake to the south if needed.

Weed the garden using a rake, plant the hops, and wait 15-20 minutes. You don't have to be online, but logging in and out will reset the timer. You'll get a notification when the hops are ready saying: ''Perhaps I should take a look and see if my Kelda hops have grown...'' The hops don't require attention or water and cannot get diseased, as they are known for having a remarkably fast growing speed.

If you need something to pass the time, you can talk to [[Rind the gardener]] and deliver a [[Letter (Forgettable Tale...)|letter]] for him; you must take it to [[Elstan]], the gardener at the allotment south of [[Falador]] (you can quickly reach him using the cabbage port from the [[Explorer's ring]] 2, 3, or 4), then go back to Keldagrim to Rind to get two [[marrentill seed]]s. Note: You can only do this delivery during this stage of this quest; this little side quest is no longer available after picking the hops. If you tell Rind that you do not want to deliver the letter after receiving it, you will also not be able to complete the side quest anymore.

When your seeds have grown, pick the Kelda hops.

You now need to head to the bar in East Keldagrim and up the stairs to the [[fermenting vat]]. '''The vat at Port Phasmatys cannot be used'''; the vat will give the message, "These special hops need to be brewed in the Keldagrim brewery. Oh well..." If you already have contents in the fermenting vat bring 8 beer glasses or 2 calquat kegs to empty them. If the contents are still fermenting you can drain the vat by using the valve (whatever contents were fermenting in this vat will be lost).

If ready to brew the ale, use two [[bucket of water|buckets of water]] on the vat, then add two [[barley malt]], then the [[kelda hops]]. If you didn't bring [[ale yeast]], take the [[pot]] from the nearby table and ask [[Blandebir]] to fill it up with ale yeast for 25gp. Use the ale yeast on the vat and the fermenting process will begin. This will take another 15–20 minutes and you will get a notification when it's ready.

When it's done fermenting, turn the valve (behind the barrel) and use a [[beer glass]] on the barrel. Head to the [[Drunken Dwarf (Keldagrim)|Drunken Dwarf]]'s house just north and talk about the [[Red Axe]]. He will ask for the [[Kelda stout]] and then tell you about the boarded up tunnel along with a small cutscene.
"""

[[steps]]
index = 3
name = "Exploring the closed tunnel"
links = ["cart conductor", "The Giant Dwarf"]
text = """
{{Needed|Two empty inventory spaces, Empty weapon and shield slot (You need both hands free)}}

[[File:Cart Conductor.png|thumb|left|200px|Cart Conductor and the blocked passage]]
Talk to the [[cart conductor]] to the south at the train cart tracks (only one of the conductors will give you the option to ask about the closed off tunnel, which would be the one furthest south, nearest to the closed off tunnel). Now, talk to the director of the mining company that you joined during [[The Giant Dwarf]] quest, which is located upstairs in either the west or the east marketplace. Ask them for help with the boarded up tunnel, and they will have the boards removed at once. Go back to the conductor and ride the cart that goes into the new tunnel (the most southern cart, no ticket required). Make sure to remove any held items in your hands before riding the cart.

You will find yourself before a gigantic abyss at the end of the cart ride. A short cutscene shows the vastness of the area, along with tracks floating out in all directions.

''If you log out at anytime while in the cave, you will be transported out in the city, and your progress will be saved.''
"""

[[steps]]
index = 4
name = "=Room 1="
links = ["square stone", "box (Forgettable Tale...)"]
text = """
To proceed, you will need to head through one of the many exits on the other side of the chasm. First, you need to solve a puzzle to set the tracks to the exit. Collect the [[square stone]]s from the [[box (Forgettable Tale...)|box]] next to the controls, and set them in the dwarven machinery. A green stone will make the cart take the top path at a junction, and a yellow stone will make it take the bottom path.

Your goal is to set up a connection between the red square all the way to the left and the boxes that are to the right. To place/rotate a stone in a junction, click '''''once''''' for green, '''''twice''''' for yellow, and '''''three times''''' to remove the stone. The green line shows the path the cart will take. The chest at the top of Room 1 cannot be reached.


# To get past this room, operate the controls and place the '''yellow''' stone on the farthest spot to the left and the '''green''' stone one spot below that, as shown below. Hop onto the cart, and search the box on the platform that you reach to obtain another green [[square stone]]. Take the cart back to the control box.
# There are two ways to go forward with the next one: either '''green, yellow, green''' or '''green, green, yellow'''. Ride the cart again, search the box for a second yellow stone, and return to the control box.
# Finally, connect the stones to the red cross, with the '''two yellow''' blocks on the left hand side and '''two green''' blocks on the right hand side. Ride the cart to reach the second room.

<gallery captionalign="center" position="center">
Forgettable Tale - cart 1-1.png|Part 1
Forgettable Tale - cart 1-2.png|Part 2
Forgettable Tale - cart 1-3.png|Part 3
</gallery>
"""

[[steps]]
index = 5
name = "=Room 2="
links = ["Hreidmar", "Grunsh", "Colonel Grimsson", "The Red Axe", "The Giant Dwarf"]
text = """
[[File:Forgettable Tale - eavesdropping.png|thumb|200px|Overhearing an important conversation...]]
In this room, you eavesdrop on a conversation between [[Hreidmar]] (the Red Axe Director), an [[Grunsh|Ogre Shaman]], and a [[Colonel Grimsson|Red Axe Henchman]] discussing their plans. You learn that [[The Red Axe]] bribed the boatman into deliberately crashing into the statue so that they could blame it on a human in [[The Giant Dwarf]] quest. Crawl through the hole at the opposite end of the room from where you entered.
"""

[[steps]]
index = 6
name = "=Room 3="
links = []
text = """
You'll now be in another minecart abyss. Search the box to receive two yellow and one green stone. The chest at the top of Room 3 is empty when searched.

# Put the '''green''' stone on the far left, a '''yellow''' one above it, and another '''yellow''' one to the right. Ride the cart, search the box, and ride back.
# Put a '''yellow''' stone at the far left, another '''yellow''' one spot below that, a '''green''' one below that, and another '''green''' to the right. Ride the cart, search the box, and ride back.
# Put a '''green''' stone on the far left, another '''green''' one spot above that, a '''yellow''' one spot above that, a '''green''' to the right and below, and a '''yellow''' to the right. Ride the cart into the fourth room.

<gallery captionalign="center" position="center">
Forgettable Tale - cart 2-1.png|Part 1
Forgettable Tale - cart 2-2.png|Part 2
Forgettable Tale - cart 2-3.png|Part 3
</gallery>
"""

[[steps]]
index = 7
name = "=Room 4="
links = ["Colonel Grimsson", "Drunken Dwarf (Keldagrim)", "Red Axe", "Grunsh"]
text = """
You appear in a small archive room, with a number of bookcases and crates, the ones with visible contents being searchable. Search the three crates. One contains papers concerning statistical data, salary structures, and shopping lists. The other two, however, are much more interesting. '''YOU MUST ALSO SEARCH A BOOKCASE BEFORE MOVING ON.'''

*There is a copy of a letter addressed to the dwarven boatman, signed by [[Colonel Grimsson]]. It speaks of the bribe, which was part of the plans you overheard earlier, so that the boatman takes along some gullible human on his boat to blame and destroy the statue of King Alvis:

{{Cquote2|
<center> I am writing to advise you that our secret preparations to the statue have been completed. All you need to do now is hit it with your boat. Take some gullible human along when you do, the mines are crawling with them these days. The human will surely get the major blame.</center>

<center> After this, the statue is going to be rebuilt in the image of our great director. You need not concern yourself with the how and why, but rest assured you will be compensated greatly.</center>|Regards, Colonel Grimsson of the Red Axe}}
*The other letter is a report on an exploring dwarf who entered the mines - your new buddy, the [[Drunken Dwarf (Keldagrim)|drunken dwarf]] - whose memory was wiped to avoid any risk:

{{Cquote2|Report on Intruder


We found a dwarf wandering in our mines. We weren't sure if he was a spy or simply an explorer, but we couldn't take any risks. We decided to send him back with his memory wiped, rather than put him to use as one of our test subjects. We can't afford having to explain another mysterious disappearance at this point. Additionally, we added something to the spell that would make him hungry for kebabs and thirsty for beer, so that whatever he can remember will be dismissed as the ravings of a drunken fool. Grunsh did a good job, he seems to be fitting in well. Nevertheless, the spell seems to have been a little bit too strong, the subject is unlikely to recover from his condition. His obsession with kebabs is a bit too extreme. Will tell Grunsh to adjust his spell next time.}}

*One of the books in the bookcases contains information on [[Red Axe]] employees, in particular Colonel Grimsson and [[Grunsh]], the Red Axe Henchman and ogre shaman encountered earlier:

{{Cquote2|Red Axe Employee Records


Hreidmar, director of the Red Axe (employee #1)

Information classified.

Grimsson, the butcher of Barendir (employee #4297)

Grimsson was once a soldier in the dwarven army and quickly made his way up the ranks, up to colonel. He served with the Black Guard at Ice Mountain and in Kandarin. He was present at the battle of Barendir when he fought against an army of trolls. It was here that he got his nickname, the Butcher of Barendir, as he mercilessly killed the trolls even as they retreated in defeat. Here, also, he got his distinctive scar running across his forehead in a hand-to-hand battle with a particularly ferocious troll. After this battle Grimsson became more and more aggressive, even to his fellow dwarves. Following a particularly vicious attack on a comrade, he was dismissed from the Black Guard. Soon after, he was recruited by the Red Axe. Here he's learned to control his rage and become even stronger. By now, he has become the right hand dwarf of the director. While he holds no official rank, he is still often affectionately referred to as 'The Colonel'.

Grunsh, Ogre Shaman (employee #38262)

Found lost and near death in the ice cold mountains above Keldagrim, Grunsh was nearly mistaken for a troll at first. Taken in by the Red Axe and nursed back to health, it turned out that he was in fact a powerful ogre shaman. Intelligent by ogre standards, and steadfastly loyal to his rescuers, he has taken up a prominent position in the ranks of the Red Axe. This is primarily due to the fact that since dwarves cannot use magic, they must rely on other races as spellcasters. Grunsh fits the bill perfectly.}}
"""

