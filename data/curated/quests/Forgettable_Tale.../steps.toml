[[steps]]
index = 9
name = "=Room 6="
links = ["Red Axe Director", "Chaos Dwarves", "Commander Veldaban", "Grunsh"]
text = """
[[File:Forgettable Tale chaos dwarf army.png|right|thumb|Hreidmar assembles his army.]]
[[File:Forgettable Tale memory wipe.png|right|thumb|The shaman casts a memory-erasing spell.]]
A cutscene starts, where the [[Red Axe Director]] will show off his army of [[Chaos Dwarves]]. But, before you can report to [[Commander Veldaban]] of what you've seen so far, [[Grunsh]] the Ogre shaman catches you prying into their plans and casts a spell that eliminates all your memories of the caves.
"""

[[steps]]
index = 10
name = "Finishing"
links = ["Kebab", "beer", "Commander Veldaban", "Laughing Miner Pub", "Keldagrim", "Drunken Dwarf (Keldagrim)"]
text = """
{{Needed|[[Kebab]] (purchase from kebab shop for 1 coin), [[beer]] (buy from barmaid for 2 coins)}}

Go back and talk to [[Commander Veldaban]], where you began the quest. ('''Note:''' Drinking the beer/eating the kebab before talking to Commander Veldaban will not initiate the cut scene.) You won't remember any of what had happened, but your instincts will tell you to go to the [[Laughing Miner Pub|Laughing Miner]] pub in east [[Keldagrim]] and have a beer and kebab. Buy a kebab from the store on the east side (directly south-west of the [[Drunken Dwarf (Keldagrim)|drunken dwarf]]'s house) and a beer from the pub. Now, drink the beer/eat the kebab in the east pub to begin the final cutscene. You will get drunk and tell a nonsensical story to a bunch of drunken dwarves.

'''Congratulations, quest complete!'''

{{Clear}}
