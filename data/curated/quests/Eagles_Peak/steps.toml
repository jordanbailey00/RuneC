quest = "Eagles' Peak"
step_count = 8

[[steps]]
index = 0
name = "Starting off"
links = ["Charlie", "Ardougne Zoo", "Nickolaus", "Gnome Stronghold"]
text = """
[[File:Eagles' Peak - The summit.png|thumb|220px|A player at the summit of Eagles' Peak.]]
Talk to [[Charlie]] the zoo keeper at [[Ardougne Zoo]]. He is at the south-west part of the zoo, just south of the scorpion cage. He'll tell you about a delivery of a northern ferret who managed to escape his cage while unloading. He will ask you to contact a huntsman called [[Nickolaus]] who agreed to capture another ferret, but he hasn't heard from him for some time. He will ask you to look for him. Finally, ask ''"Sure. Any idea where I should start looking?"'', and upon Charlie's answer, the quest begins. Charlie will tell you to start around the mountains just west of the [[Gnome Stronghold]].
"""

[[steps]]
index = 1
name = "Eagles' Peak"
links = ["Eagles' Peak (mountain)", "Tree Gnome Stronghold", "fairy ring", "necklace of passage", "bird book", "metal feather", "Agility shortcut", "feathered journal", "cutscene"]
text = """
{{Map|2319,3503|r=3|mtype=square|align=right|width=220|height=220|caption=The location of the tent.}}
Head to [[Eagles' Peak (mountain)|Eagles' Peak]], which is west of the [[Tree Gnome Stronghold]]. If you have access to the [[fairy ring]] network, code {{Fairycode|AKQ}} gets you there relatively fast. You can also use a [[necklace of passage]] and choose the second option "The outpost" and head north-west. At the base of the mountain on the north-west side, you should find a tent, but Nickolaus is no where to be found. Inspect the books on the ground, and you will receive a [[bird book]]. Try to read the book, and a [[metal feather]] will fall out of the book.

Follow the path up to the peak, which starts on the south side of the mountain, or use the [[Agility shortcut]] right beside the tent. At the top is a door (disguised as a rocky outcrop) with an inscription of a feather on the north side.
[[File:Eagles' Peak Dungeon map.png|thumb|left|The Eagles' Peak Dungeon map.]]
[[File:Eagles' Peak Shout nikolaus.png|thumb|220px|Nickolaus is trapped by a giant eagle.]]
Use the metal feather from the book to open the door. Then, go inside. A few steps into the cave, there is a [[feathered journal]] on the north side which contains some interesting info, but it is not critical to the quest. The passages split to three tunnels to other areas and another metal door (used later) and to a ledge over a large open area. '''Go the southern route''' where you see the giant feathers laying on the ground. Nickolaus is across the ledge, and you must click to shout to him. A [[cutscene]] will start when you shout to Nickolaus, who is trapped across a chasm by a giant eagle that will not let him out of the cave. Continue through the dialogue and ask if there is any way you can help.
"""

[[steps]]
index = 2
name = "Eagle disguise"
links = ["eagle feather", "swamp tar", "yellow dye", "coins", "Nickolaus", "Varrock", "Fancy Dress Shop", "Asyff", "giant feather", "eagle cape", "fake beak", "Eagles' Peak (mountain)", "Eagles' Peak Dungeon"]
text = """
{{Needed|10 [[eagle feather]]s, [[swamp tar]], a [[yellow dye]], and 50 [[coins]].}}

[[Nickolaus]] tells you to make a disguise for him. Talk to him about eagles—mention that he is trapped and offer to help. Gather 10 [[eagle feather]]s (piles of giant feathers can be found near the area after you speak to Nickolaus and throughout the cave).

Teleport to [[Varrock]] and go to the [[Fancy Dress Shop]] in the south-east corner (inside of the gated area). Ask specifically about a couple of bird costumes, and [[Asyff]] will make you two giant eagle costumes using the 10 [[giant feather]]s, [[swamp tar]], a [[yellow dye]], and 50 [[coins]]. Each costume consists of an [[eagle cape]] and a [[fake beak]].

With the two sets of disguises, return to the [[Eagles' Peak (mountain)|Eagles' Peak]] [[Eagles' Peak Dungeon|dungeon]] and shout to Nickolaus again. He wants you to bring the clothes to him.
"""

[[steps]]
index = 3
name = "Unlocking the eagle door"
links = ["Eagles' Peak Dungeon", "Stone door (Eagles' Peak)", "Nickolaus", "bronze feather", "Silver feather", "Golden feather"]
text = """
[[File:Eagles' Peak Eagle door.png|thumb|220px|The locked Eagle door.]]
Go to the south-west extremity of the [[Eagles' Peak Dungeon|dungeon]], and then take the east path. You will find a large [[Stone door (Eagles' Peak)|stone door]] with an eagle marking, which leads to [[Nickolaus]]. You cannot open the door in this state. Three feathers ([[bronze feather|bronze]], [[Silver feather|silver]], and [[Golden feather|gold]]) are required to be able to open the door.
"""

[[steps]]
index = 4
name = "=Bronze feather="
links = ["bronze feather", "silver feather"]
text = """
[[File:Eagles' Peak Bronze feather.png|thumb|220px|The bronze feather on a pedestal.]]
West of the eagle door is a tunnel. The tunnel leads to a room with a stone pedestal on which sits a [[bronze feather]]. Attempt to take the feather, and the obvious net trap will lift it upwards. Now, operate all four winches in each of the corners, causing the net trap to break. The pedestal will fall down, and it is possible to take the bronze feather. Leave and follow the directions to the [[silver feather]] cave.

:'''Note:''' You cannot operate the winches before the net trap has activated.
"""

[[steps]]
index = 5
name = "=Silver feather="
links = ["Hunter", "Kebbit (Eagles' Peak)", "silver feather"]
text = """
[[File:Eagles' Peak silver feather trail.png|thumb|220px|The trail leading from the pedestal.]]
A bit further north, a second tunnel leads into another dungeon room, this time with an empty pedestal. You will need to have 27 [[Hunter]] to successfully inspect the empty pedestal. Inspect the pedestal, and a partial trail will appear. Follow the trail, and inspect the heap of rocks in the direction the trail points to. If you are correct, the trail from the pedestal is shown to the heap of rocks. Investigate rocks near where the trail ends—if correct, another trail will appear. Repeat until the trail leads to a tunnel in the wall. Click the tunnel in the wall, and a level-13 [[Kebbit (Eagles' Peak)|kebbit]] will attack. Kill it, or use the right-click "threaten" option, and it will drop the [[silver feather]]. If you lose or destroy the feather, you will not have to kill or threaten the kebbit again; simply search the tunnel to reclaim it.
"""

[[steps]]
index = 6
name = "=Gold feather="
links = ["Eagles' Peak Dungeon", "lever", "birdseed holder", "odd bird seed", "Golden feather (Eagles' Peak)", "Nickolaus", "polar eagle", "jungle eagle", "desert eagle", "Hunter area"]
text = """
[[File:Eagles' Peak Golden feather.png|thumb|220px|The golden feather on a pedestal.]]
('''Note:''' If the puzzle gets messed up, there is a reset lever outside of the chamber.)

The third tunnel entrance is in the north-east corner of the main [[Eagles' Peak Dungeon|dungeon]]. You need to retrieve the gold feather from the pedestal at the end of a long corridor due west from the entrance, but the way is blocked by metal eagles and wing-shaped stone gates. The birds can be moved by putting bird seeds in the bird feeder close to the point where you need the eagle to go to. The eagle wings can be moved by pulling a [[lever]]. There are four levers and five metal eagles.

{| class="wikitable"
!Lever location
!Operates on eagle wings
|-
|Centre of dungeon
|East and north-west
|-
|East of dungeon
|North-west
|-
|South-west dungeon
|North-west and south
|-
|North-west of dungeon
|Corridor to feather room
|}

To start, take-from the [[birdseed holder]] to get [[odd bird seed]] near the entrance to place in bird feeders. You'll need six to finish the puzzle. Follow the visual guide below which lists the sequence or the steps outlined below the visual guide.

You need to clear access to the north-west lever, by operating the south-west and centre levers. The north-west lever unlocks the eastern part of the area and gives access to the east lever. Although operating this lever clears a critical eagle wing blocking the corridor to the [[Golden feather (Eagles' Peak)|golden feather]], there are still blocking objects from the actions to get to the east lever. Use the table above to remove any remaining objects blocking the corridor.

[[File:Eagles' Peak - gold feather puzzle solution.png|thumb|300px|Visual guide to obtaining the Golden Feather.]]
To solve the puzzle, follow these steps. Step numbers correlate with the picture to the right:

#First pull the lever, which is just north-west of the start.
#Walk to the south-eastern part of the [[Eagles' Peak Dungeon|dungeon]]. Then, place some bird seed in most south-eastern bird feeder.
#Place some bird seed in the bird feeder next to the one you just filled.
#Pull the south-eastern lever.
#Walk back to the handle you pulled the first time, just north-west of the start, and push it back to its original position again.
#Walk to the southern part of the dungeon, and put bird seed in the feeder south of the lever you just pulled and east of the lever in the southern part (the bird coming from the north should get blocked by the stone gate).
#Pull the lever in the southern part of the dungeon.
#Go back to the lever you started at, which is just north-west of the start, and put bird feed in the feeder.
#Pull the lever in the north-western part of the dungeon.
#Go to the southern part of the dungeon, and put bird feed in the bird feeder closest to the lever there.
#Place some feed in the bird feeder in the corner of the rails to the east of the bird feeder from Step 10.
#Retrieve the [[Golden feather (Eagles' Peak)|golden feather]] from the pedestal.

[[File:Eagles' Peak Pass eagle.png|thumb|220px|Walking past the eagle with a disguise.]]
After collecting all three feathers (bronze, silver, and gold), use each feather on the eagle door to open it. Walk to [[Nickolaus]] and wear the full eagle disguise to "walk past" the eagle guarding Nickolaus. Not wearing a disguise will cause the eagle to hit you for a small amount of damage.

After a short conversation, Nickolaus requests you to meet him back at the camp.

A bit further east are three huge eagles ([[polar eagle|polar]], [[jungle eagle|jungle]], and [[desert eagle|desert]]). After the quest, they can be used as a transport system to the other [[Hunter area]]s from the South Woodland Hunter Area.
"""

[[steps]]
index = 7
name = "Finishing up"
links = ["Eagles' Peak (location)", "Eagles' Peak Dungeon", "Nickolaus", "ferret", "box trap", "cutscene", "Ardougne Zoo", "Charlie", "quest reward", "rope", "diary tasks", "Fremennik Diary", "Desert Diary", "Western Provinces Diary", "necklace of passage", "Strength", "desert eagle", "jungle eagle", "teasing stick", "thatching spar", "garden cane"]
text = """
[[File:Catching the Ferret.png|thumb|220px|Catching the ferret for the zoo.]]
Go back out of the [[Eagles' Peak (location)|Eagles' Peak]] [[Eagles' Peak Dungeon|dungeon]] and go down the rock climb. On the ground where the tent you were at before is, talk to [[Nickolaus]] and he'll teach you how to catch [[ferret]]s. You do not need a [[box trap]] for this part of the quest. If you click on the [[cutscene]] where you retrieve the box trap, you will not catch the ferret. If you accidentally release the ferret, you are able to catch a new one with the box trap Nickolaus has given you.
Go back to [[Ardougne Zoo]] with the ferret you caught. Talk to [[Charlie]] who gives the [[quest reward]].

'''Congratulations, quest complete!'''

'''Note for diary completions:''' After completing the quest, return to Eagles' Peak with a [[rope]]. Riding each eagle to their destinations and then back to Eagles' Peak will complete medium [[diary tasks]] in the [[Fremennik Diary|Fremennik]], [[Desert Diary|Desert]], and [[Western Provinces Diary|Western Provinces]].

A fast way to get to Eagles' Peak is to teleport to Eagle's Eyrie with a [[necklace of passage]], then using a rope found nearby on the eagle to travel. '''45 [[Strength]]''' is required to unlock the entrance to the [[desert eagle]]s.

Lastly, if you want to unlock the [[jungle eagle]]'s nest, bring a [[teasing stick]], [[thatching spar]], or [[garden cane]] to grow the vine for the entrance. ('''DO THIS LAST''', as the vine takes approximately 40 minutes to grow and can't immediately be used to get back.)
{{Clear}}
"""
