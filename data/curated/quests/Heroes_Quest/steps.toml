quest = "Heroes' Quest"
step_count = 14

[[steps]]
index = 0
name = "The greatest heroes of the land"
links = ["Achietties", "Heroes' Guild", "Burthorpe", "fire feather", "Entrana firebird", "lava eel", "Thieves' armband", "Entrana"]
text = """
[[File:Achietties chathead.png|left]]
[[File:Heroes' Quest start.png|thumb|Speaking to the heroine Achietties.]]
Talk to [[Achietties]] outside the [[Heroes' Guild]] just south of [[Burthorpe]] about joining the guild. If you meet the requirements, she will acknowledge your questing prowess and set you the entry tasks. She will tell you that in order to get in you need to give her three items: a [[fire feather]] from an [[Entrana firebird]], a cooked [[lava eel]], and a [[Thieves' armband|Master Thieves' Armband]].

For the armband, she suggests you probably have 'relevant contacts' yourself with whom to enquire about it. To obtain the feather she only offers the most helpful advice that Entranan firebirds tend to live on [[Entrana]]. To get the eel, she advises you to talk to someone who knows a lot about fishing.

The items may be obtained in any order, but must be given to Achietties simultaneously.
"""

[[steps]]
index = 1
name = "Master Thieves' armband"
links = ["Shield of Arrav", "Grouping", "chat-channel", "Heroes' Quest", "miscellaneous key"]
text = """
{{Map|2771,3194|mtype=rectangle|rectX=24|rectY=12|caption=The location of Scarface Pete's mansion in Brimhaven.|align=right|width=250|height=250}}
To earn the armband, you will have to contact your old gang associates from the [[Shield of Arrav]] quest, as indicated by the quest journal. For this part of the quest, you will need the help of a player of the opposite gang. Players that have completed the quest may go back and help others. For finding a quest partner, the [[Grouping]] interface is useful. You can also usually find a partner on the [[chat-channel]] 'Osrs Soa' during peak hours.

:'''Note:''' For this part of the quest you '''do not''' need to meet the skill requirements. This means you can complete this part of the quest in order to help a friend complete their entire quest; see [[Heroes' Quest#Trivia|Trivia]] for more details. You can even help a friend if you have already completed the quest yourself.
:'''Note:''' Traded Pete's candlesticks will not be accepted if the presenter did not kill Grip. As such, do not get scammed into buying or taking free candlesticks unless you are a Phoenix Gang member and can kill Grip. Black Arm gang members can never kill Grip so they should not accept traded candlesticks under any circumstances. Likewise, a [[miscellaneous key]] without a Black Arm member to lure Grip is useless. Do not get scammed into buying miscellaneous keys.
"""

[[steps]]
index = 2
name = "Black Arm Gang member"
links = ["black full helm", "black platebody", "black platelegs", "Katrine", "Black Arm Gang Headquarters", "Brimhaven", "Scarface Pete", "Pete's candlestick"]
text = """
[[File:Katrine chathead.png|left]]
{{Needed|A [[black full helm]], a [[black platebody]] and [[black platelegs]]}}

Go to Varrock and talk to [[Katrine]] who is inside the [[Black Arm Gang Headquarters]], which is situated in the south-west of the city. She tells you that you need to do something amazing in order to attain the rank of master thief. She explains some of the most coveted items for thieves are in [[Brimhaven]]. The leader of the pirates there is one [[Scarface Pete]]. She will tell you that you have to steal his very valuable [[Pete's candlestick|candlesticks]] and that his security is very good.

You have to visit the Black Arm members in their hideout in the alleyway of Palm Street. The gang's password is "''four leafed{{sic}} clover".''
"""

[[steps]]
index = 3
name = "==The Hideout on Palm Street=="
links = ["Brimhaven Agility Arena", "Grubor", "Trobert", "Grip", "Hartigen", "Kinshra", "Id papers", "Garv", "black armour"]
text = """
Go to Brimhaven and find the gang office, which is the building along the fence, east of the two inns and south of the [[Brimhaven Agility Arena|Agility Arena]]. Give [[Grubor]] the password "four leaved clover"at the door, and inside speak to [[Trobert]], the leader of the Black Arms in Brimhaven. Trobert explains one of the only keys to Pete's treasure room is carried by his head guard [[Grip]], who was taking on a new deputy called [[Hartigen]], a deserter of the [[Kinshra|Black Knights]] seeking employment in Brimhaven. The Black Arms have waylaid Hartigen and stolen his identification papers. Volunteer to impersonate Hartigen. He will give you the [[Id papers]], which you will need to get into Scarface Pete's mansion, and tell you to introduce yourself to its guards.

Speak to [[Garv]], who is the guard patrolling along the southern wall of the large building on Brimhaven's western side. He will not believe you are Hartigen, stating that the Black Knight dressed differently. Equip a full set of [[black armour]]: full helm, platebody and platelegs. Garv will then allow you to go inside tells you to speak to Grip.
"""

[[steps]]
index = 4
name = "==Getting a Grip on the key=="
links = ["Grip", "Miscellaneous key", "Phoenix Gang"]
text = """
[[File:Talking to Grip.png|thumb|250x250px|Grip explaining your duties.]]
Once inside, talk to [[Grip]]. He explains you will be working various guard duties, and that the important keys are in Grip's jacket. Ask him "So what do my duties involve?" and then "Anything I can do now?" and he will give you a [[Miscellaneous key]].

:'''Note:''' If you have already done the quest and have the Miscellaneous key in your bank, he will not give you a new one.

Grip won't allow you to enter the treasure room and you can't kill him without drawing attention to yourself. This means you will need an accomplice. Leave the building and trade the key to your [[Phoenix Gang]] partner.
"""

[[steps]]
index = 5
name = "==Handling the candlesticks=="
links = ["Grip", "cupboard (Heroes' Quest)", "pirate guard", "Grip's keyring", "Thieves' armband"]
text = """
[[File:Heroes'_Quest_-_Attacking_Grip.png|thumb|250x250px|A player attacking [[Grip]].]]
Back inside, head into the north-eastern room from the entrance. Wait for your partner to get to the room behind the eastern wall, behind the arrowslit; then, search the [[cupboard (Heroes' Quest)|cupboard]]. A [[pirate guard]] will say that Grip really doesn't like his drinks cabinet being touched, but open it anyway. Grip will then come into the room, telling you to get your hands off his drinks. Make sure the door is open. Grip can become stuck on the guards in the room, so you may need to wait or kill some guards to create space or else Grip may be blocked and leave the room. If this happens, just search the cupboard again.

Your Phoenix Gang partner will then kill Grip through the slit from the hidden room. Once he dies, pick up [[Grip's keyring]]. 

Using the key, go to the treasure room (the {{FloorNumber|uk=0}} room with coins on the floor next to the staircase in the north-west corner) and open the north chest in the first room to receive two candlesticks. '''Give one candlestick to your Phoenix Gang partner.'''

Go back to Varrock and talk to Katrine. She will give you the [[Thieves' armband]].

:'''Note:''' The door to the treasure room will not open and give you a message if you attempt to open it with Grip's keyring without having obtained a miscellaneous key at least once.
:'''Note:''' The chest containing Pete's candlesticks (position to the north) will be empty if you have a candlestick in your inventory or bank. If you have a traded one in the bank, you will need to discard it then come back to search this chest as you will not be able to turn in a traded candlestick to Katrine at any time.
:'''Note:''' Be sure to pick up the candlesticks yourself; otherwise, Katrine will say you weren't the one to retrieve the candlestick and you will have to go back to do it all over again.
:'''Note:''' Grip's Keyring is unique to the player you are doing the quest with. If you complete the quest and are retrieving candlesticks for a different player and still have Grip's Keyring, drop it and ask him for a new one.
"""

[[steps]]
index = 6
name = "Phoenix Gang member"
links = ["Ranged weapons", "ammo", "brutal arrows", "runes", "Magic", "Varrock", "Straven", "Scarface Pete", "Brimhaven", "Alfonse the waiter", "The Shrimp and Parrot", "bow", "arrows"]
text = """
{{Needed|A [[Ranged weapons|ranged weapon]] and [[ammo]] ([[brutal arrows]] will not work) or [[runes]] for [[Magic]]}}
[[File:Straven chathead.png|left]]
Go to [[Varrock]] and speak to [[Straven]] at the hideout. Enquire about becoming a master thief. He will explain that some eager gang members are trying to steal the valuable candlesticks of [[Scarface Pete]], the pirate leader of [[Brimhaven]]. He gives you the password ''gherkin'' to tell [[Alfonse the waiter|Alfonse]], a gang member posing as a waiter in [[The Shrimp and Parrot]] inn.

Get a [[bow]] and [[arrows]], or magic gear if using magic, before heading to [[Brimhaven]].
"""

[[steps]]
index = 7
name = "==The side entrance=="
links = ["Charlie the cook", "Mr. Olbors", "guard dog", "miscellaneous key", "Black Arm Gang", "Grip", "Ranged", "Magic", "Pete's candlestick", "Thieves' armband"]
text = """
Go to the Shrimp and Parrot restaurant in Brimhaven. Once you are there, talk to Alfonse the waiter and ask about gherkins. He will wink and redirect you to [[Charlie the cook]] in the back room. Give him the password as well and tell him you are after Pete's candlesticks. Charlie the cook will tell you that the restaurant was set up as part of the heist. There is a secret wall-door that opens into [[Mr. Olbors]]'s garden that you are able to push to open. Across the garden is an old side entrance into the mansion that has since been blocked. However, the Phoenixes are unable to get hold of the key to that door. The pushable wall is in the kitchen, in the same room as where Charlie is. Beware of Mr. Olbors's [[guard dog]]s.

'''Get a [[miscellaneous key]] from your [[Black Arm Gang]] partner.''' Head into Olbors's garden and enter the mansion's eastern door. Once inside, use the miscellaneous key on the northern door. This brings you in a cramped room with an arrowslit into a room with a cupboard. Shoot through the hole in the wall at [[Grip]] and kill him with [[Ranged]] or [[Magic]]. Your partner will have to lure him inside the room by rummaging through his drinks cabinet. Grip will drop the key for your Black Arm Gang partner.

'''Your Black Arm Gang partner will get two [[Pete's candlestick|candlesticks]] and should trade you one of them.'''

:'''Note:''' You must actually kill Grip! If you don't, Straven will ''NOT'' accept your candlestick. Don't buy it or the key off other players as shortcut; you can't kill Grip alone.

Go back to Varrock and give the candlestick to Straven to get the [[Thieves' armband]].
"""

[[steps]]
index = 8
name = "Entrana firebird feather"
links = ["Ice gloves", "pickaxe", "Energy potion", "stamina potion", "ice gloves", "monk", "High Priest (Entrana)", "firebird", "Entrana", "fire feather", "Ice Queen", "White Wolf Mountain", "Law Altar"]
text = """
{{Needed|[[Ice gloves]], or a [[pickaxe]] and combat equipment if you do not already own a pair|recommended=[[Energy potion|Energy]]/[[stamina potion]]s if obtaining [[ice gloves]]|skills={{SCP|Mining|50}} {{Boostable|yes}} if obtaining [[ice gloves]]}}

If you want, speak to a [[monk]] in the Entranan church about the firebird. He does not think they exist but redirects you to the head monk, who is more knowledgeable. The [[High Priest (Entrana)|High Priest]] tells you that the bird lives somewhere on Entrana, and that you will need some cold gloves to pick up its feather.

The [[firebird]] lives on the northern half of [[Entrana]]. It is very weak and easy to kill. However, its [[fire feather]] is too hot to pick up; you require something cold in order to do so. In order to pick up the [[fire feather]], you'll need [[ice gloves]]. They are dropped by the level 111 [[Ice Queen]] located underneath [[White Wolf Mountain]]. If you do not own ice gloves, see the section below.

Once you have a pair of ice gloves, bank your weapons and armour, but keep the gloves. Head to [[Entrana]] and kill the firebird near the [[Law Altar]]. Make sure to have the ice gloves equipped before picking up the feather.

You can also grab a fishing rod from the house beside the fishing platform on the south east corner of the island if you need a spare to use for making the oily fishing rod.
"""

[[steps]]
index = 9
name = "=Ice Spy with my Little Eye="
links = ["Ice gloves", "Catherby", "Taverley", "gnome glider", "pickaxe", "ice warrior", "Ice Queen's Lair", "Ice giant", "Ice Queen"]
text = """
[[File:Heroes'_Quest_-_Rockslide.png|thumb|250x250px|Compass pointing north; location of the rockslide to get into the lair.]]

If you do not already own [[Ice gloves]], go to White Wolf Mountain (east of [[Catherby]], west of [[Taverley]]), to the rock slide on the north side. It can be found just north-west of the [[gnome glider]]. Otherwise, enter the mountain at the southern entrance and walk or run north until you come to the rock slide.

Use a [[pickaxe]] on the rock slide ({{SCP|Mining|50}}) and go through it . Once you are through, you will be near level 57 [[ice warrior]]s and three ladders.

[[File:Heroes'_Quest_-_Ice_Queen's_Lair_route.png|thumb|220x220px|left|A map of the [[Ice Queen's Lair]].]]

{| class="wikitable lighttable"
!Steps
|-
|After the rock slide, head '''down''' the '''southernmost''' ladder
|-
| Go down the '''south-west''' tunnel and climb '''up''' the ladder at the end
|-
|Avoiding the [[Ice giant|ice giants]], climb down the '''easternmost''' ladder
|-
|Go '''north''' through the long tunnel, and climb '''up''' the ladder at the end
|-
|Climb '''down''' the ladder immediately next to it
|-
|Follow the tunnel '''north''' until it opens into a large room
|}
{{Clear}}
At the end of the room resides the [[Ice Queen]], kill her and she will drop the ice gloves. If you stand behind the throne, you can avoid the ice warriors and can still attack the Ice Queen if positioned right. Once you have the gloves, exit using the same route back or teleport out.
"""

[[steps]]
index = 10
name = "Cooked lava eel"
links = ["fishing rod", "fishing bait", "harralander potion (unf)", "harralander", "vial of water", "fishing boost", "Energy potion", "stamina potion", "blamish oil", "Port Sarim", "Gerrant", "fishing shop", "blamish snail slime", "oily fishing rod", "Raw lava eel", "Taverley Dungeon", "Charred Dungeon", "Wilderness", "Lava Maze", "Player killing", "dusty key", "anti-dragon shield", "antifire potion", "admiral pie", "Sailing", "Agility", "Dusty Key"]
text = """
{{Needed|A [[fishing rod]], [[fishing bait]], [[harralander potion (unf)]] (or a [[harralander]] and [[vial of water]]), [[fishing boost]] (if needed), other items depending on chosen location (see below), dusty key|recommended=[[Energy potion|energy]]/[[stamina potion]]s|skills={{SCP|Herblore|25}} {{Boostable|yes}} to make [[blamish oil]]}}
[[File:Heroes' Quest Gerrant.png|thumb|250px|Speaking to the fishing expert about catching a lava eel.]]
Go to [[Port Sarim]] and talk to [[Gerrant]] at the [[fishing shop]]. He says lava eels are tricky to catch and require a fireproof line. He will give you a bottle of [[blamish snail slime]] used to make an oil to treat a fishing rod. He says the oil is made by mixing the slime with harralander and water. Buy a fishing rod and some bait from him if you haven't got any yet.

Once you have the items, use the [[harralander]] on the [[vial of water]] and then add the blamish snail slime ({{SCP|Herblore|25}}). Right-click the [[blamish oil]] and use it on a normal [[fishing rod]] to get an [[oily fishing rod]].

There are '''three possible locations''' where you can catch [[Raw lava eel|lava eels]]: the [[Taverley Dungeon]], the [[Charred Dungeon]], or the [[Wilderness]] [[Lava Maze]]. It is highly recommended that you go to Taverley Dungeon as it is much safer than travelling to levels 40-45 in the Wilderness to reach the Lava Maze and may be well worth it considering you will have to start over again and recollect supplies if you get [[Player killing|PK'ed]] there. Don't forget your [[dusty key]], [[anti-dragon shield]] and possibly [[antifire potion]]s if you are going the Taverley Dungeon route! Also, don't forget your fishing boost such as an [[admiral pie]] for either route if you require it. If you have 60 [[Sailing]] it is also highly recommended to go to the [[Charred Dungeon]] as it is as safe as [[Taverley Dungeon]] and doesn't require agility level nor additional items, making it a quicker route for players who lacks 70 [[Agility]] level and the [[Dusty Key]] but safer than going to the [[Wilderness]].
"""

[[steps]]
index = 11
name = "=Taverley Dungeon="
links = ["dusty key", "Agility", "oily fishing rod", "bait", "anti-dragon shield", "dragonfire shield", "antifire potion", "food", "Protect from Melee", "fishing rod", "Fishing bait", "Balloon transport system", "Falador", "shortcut", "Taverley", "fishing spot", "baby blue dragon", "Raw lava eel", "lesser demon", "blue dragon", "hill giant", "Black Knights' Base", "jailer", "Velrak the explorer"]
text = """
{{Needed|The [[dusty key]] (if you don't have 70 [[Agility]]) - can be obtained in the dungeon, [[oily fishing rod]], [[bait]], fishing boost if using|recommended=The [[anti-dragon shield]] or a [[dragonfire shield]] and [[antifire potion]]. Also bring [[food]] or make sure you have ample prayer points for [[Protect from Melee]] if low-levelled}}
[[File:Heroes'_Quest_-_Taverley_Dungeon_route.png|thumb|250px|Routes to the lava eels and dusty key.]]
Bring your [[fishing rod]], [[Fishing bait|bait]], and other items. Take the [[Balloon transport system|balloon]] to Taverley, or teleport to [[Falador]] and walk west over the [[Agility]] [[shortcut]] (requires 5 Agility) or through the main gate, or teleport to your house if it is in [[Taverley]].

'''If you have 70 Agility''' (which can be boosted), enter the pipe (be sure to wear your [[anti-dragon shield]]) and run south. The [[fishing spot]] is near some [[baby blue dragon]]s. Catch a [[Raw lava eel|lava eel]].

'''If you don't have 70 Agility''', follow the magenta path on the image to the right. Walk through the dungeon and use the [[dusty key]] on the door between the [[lesser demon]]s and [[blue dragon]]s. If you have 63 Agility, you can save a bit of time by squeezing through loose railings to go straight to the lesser demon area.

If you don't have the dusty key, go past the bridge, continue south-west past the [[hill giant]]s, and you will enter the [[Black Knights' Base]]. Go to the east into a jail, kill the [[jailer]] and then pick up his key. Use it on the jail cell holding [[Velrak the explorer]]. Ask him if there are any good places to explore to get the dusty key. Head back north past the hill giants and follow the magenta path to the fishing spot. Use the key on the door between the lesser demons and blue dragons. The fishing spot is near some baby blue dragons; from here, catch a lava eel.
"""

[[steps]]
index = 12
name = "=Lava Maze="
links = ["knife", "slash weapon", "Wilderness sword", "oily fishing rod", "fishing bait", "raw lava eel", "Lava Maze", "Wilderness", "player killer", "Player killing", "Fishing spots", "burning amulet", "Ghorrock Teleport", "Ghorrock teleport", "Ancient Magicks", "Desert Treasure I", "Canoe", "Edgeville", "Woodcutting", "Wilderness Obelisk", "black knight", "lava eels", "Wilderness Diary", "fire", "range"]
text = """
{{Needed|A [[knife]] or a [[slash weapon]] (use any [[Wilderness sword]] for fastest completion), [[oily fishing rod]], [[fishing bait]], fishing boost if using|skills={{SCP|Fishing|53}} {{Boostable|yes}} to catch a [[raw lava eel]], and {{SCP|Cooking|53}} {{Boostable|yes}} to cook it}}
{{Map|name=Lava Maze|3070,3853|zoom=1|align=right|height=180|width=280|caption=A map of the Lava Maze.}}

'''{{Colour|Red|Warning}}:''' The [[Lava Maze]] is located in deep [[Wilderness]]. Beware of any [[player killer]]s. They can commonly be found at the maze and will most likely have the level range to [[Player killing|PK]] you. You may likely lose any quest items you are carrying and may end up needing to gather the items to make another [[oily fishing rod]]. Make sure to bring some food in case someone does try to kill you and make sure you are ready to fight!

At this point, travel to the nearest bank and stash anything that you don't intend on losing.

If you're going to the [[Fishing spots|fishing spot]] in the [[Lava Maze]], there are several methods of reaching it:

*Teleporting there with the [[burning amulet]]. This is the quickest way.
*Casting the [[Ghorrock Teleport]] spell (or [[Ghorrock teleport|tablet]]) in the [[Ancient Magicks]] spellbook, although this requires completing the quest [[Desert Treasure I]].
*Use a [[Canoe|waka canoe]] from [[Edgeville]] into the Wilderness. This requires 57 [[Woodcutting]]. From there, simply walk west to arrive near the entrance.
*Use the [[Wilderness Obelisk]]s to arrive in level 35 or 44 Wilderness. Either teleport will place you close to the entrance of the maze.

Make your way through the aggressive [[black knight]]s at the entrance. Make your way through the maze until the fishing icon appears on your minimap. This is where the [[lava eels]] are caught.
[[File:Catching a lava eel.png|thumb|220px|Fishing in the lava.]]
Fishing a lava eel here will also complete a Hard [[Wilderness Diary]] task.

Once you catch a [[raw lava eel]] ({{SCP|Fishing|53}}), cook it over a [[fire]] or a [[range]] ({{SCP|Cooking|53}}).

:'''Note:''' Lava eels do not burn when cooked (or, indeed, when swimming in lava). Do not worry about obtaining multiple eels if you are worried about burning one.
"""

[[steps]]
index = 13
name = "Quest end"
links = ["Heroes' Guild", "Achietties"]
text = """
Go back to the [[Heroes' Guild]], talk to [[Achietties]] outside and give her the three collected items.

'''Congratulations, quest complete!'''
"""
