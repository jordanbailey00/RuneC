quest = "Legends' Quest"
step_count = 16

[[steps]]
index = 0
name = "Transport and banking"
links = ["fairy rings", "amulet of glory", "ring of wealth", "Edgeville", "Grand Exchange", "Brimhaven", "Ardougne", "charter ship", "Shilo Village cart system", "Shilo Village (location)", "coins", "Viyeldi caves", "death wing"]
text = """
You will need to bank several times during the quest. Depending on stats and risk tolerance, it may be possible to complete more steps in a single trip, so read ahead to see what will be required.

If you have unlocked [[fairy rings]], the shortest way to the jungle is code {{Fairycode|ckr}}. When you need to bank, teleport out of the jungle and return using the fairy ring. Wearing a charged [[amulet of glory]] or [[ring of wealth]] throughout the quest provides a convenient teleport close to a bank and fairy ring ([[Edgeville]] and the [[Grand Exchange]] respectively). It may be worth taking the alternative route to Shilo Village on the first trip, to buy charcoal and papyrus.

If not using the fairy rings, make your way to [[Brimhaven]] by taking a boat from [[Ardougne]] or any [[charter ship]]. Then, you can take [[Shilo Village cart system|Hajedy's cart]] to [[Shilo Village (location)|Shilo Village]] (his fee is 200 [[coins]]). Later, you can exit the jungle the same way as entering it, and return to Shilo Village to use the bank.

It will be necessary to exit from the depths of the [[Viyeldi caves]], twice for the short path and three times for the long path. Even for players travelling by cart, teleporting out will be faster than climbing out. If climbing out, you can fail at some obstacles, particularly the strength door (where your attempts to open it from the inside can be interrupted by attacks from [[death wing]]s). Teleporting out also provides an opportunity to bank before continuing.
"""

[[steps]]
index = 1
name = "Mapping the jungle"
links = ["Radimus notes", "Legends' Guild", "axe", "machete", "charcoal", "papyrus", "jungle wolf", "Tormented Warrior"]
text = """
{{Needed|[[Radimus notes]] (he will replace at the [[Legends' Guild]] for 30gp), [[axe]], [[machete]], at least 1 [[charcoal]] (3 to be safe), at least 3 [[papyrus]] (5 to be safe)|skills={{SCP|Crafting|50}} {{Boostable|yes}} to map the jungle with the notes}}

[[File:Legends' Quest - Thick jungle.png|thumb|220px|The jungle is very dense.]]
Head to the jungle boundary south of Shilo Village. To get into the Kharazi Jungle, you'll need to cut your way through the overgrown jungle vegetation using an axe and machete.

Once inside (preferably on the eastern/western sides, so you don't have to run back and forth), start mapping down the jungle with your charcoal and papyrus by right-clicking on the Radimus notes and then selecting 'Complete' ({{SCP|Crafting|50}}). Sometimes the charcoal and/or papyrus can break, so you should bring extra just in case. Alternatively, you may mess up the papyrus, but be able to salvage it. You should watch out for the [[jungle wolf|jungle wolves]], as they are aggressive; the [[Tormented Warrior|tormented warriors]] and oomlie birds aren't aggressive unless provoked (see below).

{{UIMnote|You can drop your charcoal and papyrus after completing the notes all three times.}}
"""

[[steps]]
index = 2
name = "Extra tasks"
links = ["Sir Amik Varze", "Recipe for Disaster", "Vanilla pod", "Water Pool", "leafy palm tree", "palm leaf", "Karamja Diary", "oomlie bird", "Raw oomlie", "wrapped oomlie", "fire", "oomlie wrap", "teak", "mahogany", "trading sticks", "Hardwood Grove"]
text = """
*If you intend on freeing [[Sir Amik Varze]] in [[Recipe for Disaster]], you should grab [[Vanilla pod|vanilla pod(s)]] whilst you are here—they are located directly south-west from the [[Water Pool]] near the beach in a group of five plants.
*Shake a [[leafy palm tree]] to acquire a [[palm leaf]]. Pick up five palm leaves (or pick up and drop the same one five times) to complete a hard task for the [[Karamja Diary]].
*Additionally, kill an [[oomlie bird]] and collect its [[Raw oomlie|meat]]. Use a palm leaf on the raw meat, then cook the resulting [[wrapped oomlie]] over [[fire]] (now or later) and eat the resulting [[oomlie wrap]] to complete another hard task. The wrapped oomlie cannot normally be burned.
*Chop some [[teak]] and [[mahogany]] trees at the pool or southern coastal end (teak) and south-east (mahogany) of the jungle to complete two medium tasks rather than paying 100 [[trading sticks]] to enter the [[Hardwood Grove]].
"""

[[steps]]
index = 3
name = "Contacting the locals"
links = ["Radimus notes", "axe", "machete", "Mossy rock", "jungle forester", "bullroarer", "Tormented Warrior", "Gujuo", "Ungadulu", "Shaman Caves", "Fire Wall", "Bed (Viyeldi caves)", "Table (Viyeldi caves)", "Crate (Viyeldi caves)", "scrawled note", "a scribbled note", "scrumpled note", "sketch"]
text = """
{{Needed|[[Radimus notes]], [[axe]], [[machete]], 4 free inventory slots|skills={{SCP|Agility|50}} {{Boostable|yes}} to squeeze past some [[Mossy rock|rocks]]}}

Consider banking here to get the items for the '''Binding book''' section.

Talk to one of the [[jungle forester]]s, who are standing at various points along the outside of the jungle boundary. They have a [[bullroarer]], which they'll be willing to give up if you give them a copy of your notes. Use the completed Radimus notes on the forester, who will then make a copy before giving you their bullroarer.

:'''{{Colour|red|Warning:}}''' Do not use the bullroarer around [[Tormented Warrior|tormented warriors]] or oomlie birds, or you'll be attacked!

{{Map|align=right|mtype=pin|2793,2908|2855,2916|2872,2909|2919,2920|2952,2898|caption='Totem Pole' Locations in Jungle.}}
Go inside the jungle again, and swing it near the totem pole found east of the water pool represented by a blue square on the map to call a local named [[Gujuo]] out of hiding. '''(There are multiple totem poles in the jungle, so if nothing happens, try another one.)''' He'll ask for your help, since his tribe's shaman, [[Ungadulu]], is trapped in his [[Shaman Caves|cave]].
{{Map|2782,2935|r=5|mtype=square|align=left|height=200|width=200|caption=The location of the cave.}}
From now on, you can call Gujuo using the bullroarer from anywhere in the jungle. Towards the north-western edge of the jungle, you'll find some [[Mossy rock|rocks]] that you can squeeze through to get into the cave ({{SCP|Agility|50}}).

Investigate (right-click) the [[Fire Wall]] and talk to [[Ungadulu]], who warns you not to approach the flames, but becomes possessed and informs you that only pure water can extinguish the flames. Next, search the various items; the [[Bed (Viyeldi caves)|bed]], [[Table (Viyeldi caves)|table]], and [[Crate (Viyeldi caves)|crate]] to obtain Ungadulu's notes: a [[scrawled note]] from the crate; [[a scribbled note]] on the table; and a [[scrumpled note]] on the bed. Reading them tells you how the shaman had prepared to summon his ancestors and pay homage to them, but fell prey to an evil presence in the cave.

Once you're back outside again, call [[Gujuo]] with your [[bullroarer]]. Ask him for more information and tell him you need some pure water to douse some magic flames (option 4). Ask, "What kind of a vessel?" (option 5). He'll give you a [[sketch]] of the vessel. (If you do not have these dialogue options, go back inside the cave and speak to [[Ungadulu]] again after you read the notes and they should become available).

[[File:Legends' Quest - Viyeldi caves entrance.png|thumb|right|220px|The entrance to the cave.]]

{{Map:Viyeldi caves}}
{{Clear|left}}
"""

[[steps]]
index = 4
name = "Binding book"
links = ["Radimus notes", "axe", "machete", "pickaxe", "lockpick", "soul rune", "mind rune", "earth rune", "law runes", "sapphire", "emerald", "ruby", "diamond", "red topaz", "jade", "opal", "Death Wing", "Karamja Diary", "Super restore", "Boulder (Shaman Caves)", "Bookcase (Shaman Caves)", "Ancient Gate", "Mining", "Strength", "Protect from Melee", "jagged wall", "Marked wall", "carved rock", "gem", "Crafting", "binding book"]
text = """
{{Needed| ''[[Radimus notes]], [[axe]], [[machete]], [[pickaxe]], 1-2 [[lockpick]]s (2 to be safe).'' ''"SMELL" runes: 1 [[soul rune]], 1 [[mind rune]], 1 [[earth rune]], 2 [[law runes]].'' ''Cut [[sapphire]], [[emerald]], [[ruby]], [[diamond]], [[red topaz]], [[jade]], and [[opal]].''|recommended=Supplies to pass level 83 [[Death Wing]]s, and equipment to kill one for the [[Karamja Diary]] if you wish to do it on this trip. (The second trip may be more convenient, as you will need combat equipment anyway. A [[Super restore|super restore potion]] if your level is not far above the required level stated below.|skills={{SCP|Agility|50}} {{Boostable|yes}} to squeeze through the crevice, {{SCP|Thieving|50}} {{Boostable|yes}} to pick the locked door, {{SCP|Mining|52}} {{Boostable|yes}} to smash three [[Boulder (Shaman Caves)|boulders]] (consider bringing 2-3 boosts if boosting), {{SCP|Strength|50}} {{Boostable|yes}} to force the heavy door.}}

'''Make sure that you have all the required items.''' Go back to the cave. Ignore the fire wall and head to the east side of the room. Squeeze through a crevice hidden behind the [[Bookcase (Shaman Caves)|easternmost bookcase]] by searching it ({{SCP|Agility|50}}).

As you proceed further into the cave, you will come across an [[Ancient Gate]]. Attempt to pick the lock ({{SCP|Thieving|50}}). If you fail, clicking elsewhere during the dialogue box will save your lockpick and you can try again.

Once past this door, you'll need a [[pickaxe]] to mine three [[Boulder (Shaman Caves)|boulders]] out of the way ({{SCP|Mining|52}}). If you fail, your [[Mining]] level will decrease by 1. Once past these three boulders, use brute force to open the next set of [[Ancient Gate#Second gate|gates]] ({{SCP|Strength|50}}); failing this will result in your [[Strength]] being lowered. Beware of level 83 [[Death Wing]]s on the other side; activating [[Protect from Melee|Protect From Melee]] can completely negate their damage. Killing a Death Wing, either now or on the second visit, will complete a hard task in the [[Karamja Diary]].

Run farther into the cave, and jump over the [[jagged wall]]. When you get further inside, you'll find a place where there are [[Marked wall|markings on the wall]]. Read them and it will give you the riddle:
:''"Place five stones of magical power - but place them wrong, and your fate will sour. First is the spirit of man or beast (Soul rune), second the place where fools tread least (Mind rune). Third is the soil where plants do grow (Earth Rune) -- and four and five are the rules you must know (Two Law Runes). Solve this riddle, and overcome your ignorance; arranged correct, it should make sense."''

[[File:Gems locations.png|thumb|223x223px|Gems location for puzzle]]
It spells SMELL. Use the runes with the wall in the order of Soul, Mind, Earth, Law, Law and then the door will appear. If the runes are used in an incorrect order, you will have to leave and re-enter the cave. 
[[File:Legends' Quest - Binding book.png|thumb|220px|Retrieving the binding book]]
Inside are a number of [[carved rock]]s sitting in pools of water. Search the rocks to find the next riddle:
:''"Once there were crystals to make the pool shine. Ordered in stature to retrieve what's mine."''

''Crystals'' refers to [[gem]]s, and ''ordered in stature'' refers to arranging them in ascending order of their [[Crafting]] level requirement. Starting at the ancient gate, use the gems in ascending order (from North to South, East to West) on each carved rock (refer to the diagram on the right). The sequence in which you do this does not matter, as long as you use each gem on the correct rock. You will '''not''' lose the gem if you use it on an incorrect one.

When all of the gemstones are in place, there will be a little light show. Take the [[binding book]] that appears.

Once you have the binding book, teleport away or leave the cave to restock.

:'''Note:''' If you lose the binding book, you must repeat the steps above, though the "SMELL" runes are no longer needed.
"""

[[steps]]
index = 5
name = "Gold bowl"
links = ["Sketch", "hammer", "gold bar", "gold bowl", "anvil", "Tai Bwo Wannai Village", "Blast Furnace", "Grand Exchange"]
text = """
{{Needed|[[Sketch]], [[hammer]], 2-6 [[gold bar]]s|skills={{SCP|Smithing|50}} {{Boostable|yes}} to create the [[gold bowl]]}}

'''Note''': If you're planning on gathering magic logs from the yommi tree using the yommi tree sapling method described later, you do not need to make additional gold bowls. '''{{Ironman}}'''

Go to any [[anvil]] while holding the sketch of the vessel you obtained from Gujuo and try to make the [[gold bowl]] ({{SCP|Smithing|50}}). You may easily fail even at higher smithing levels, so to be safe, bring more than two bars. If walking, the closest anvil is in [[Tai Bwo Wannai Village]]. If you can use fairy rings and have 60 smithing, you can use the minigame teleport to [[Blast Furnace]] for an anvil, take a mine cart back to the [[Grand Exchange]], then use the fairy ring there to return to the jungle.

{{UIMnote|You can now drop your Sketch after successfully making a Gold bowl.}}
"""

[[steps]]
index = 6
name = "Pure water"
links = ["Radimus notes", "axe", "machete", "bullroarer", "gold bowl", "prayer potion", "Gujuo", "prayer points", "blessed golden bowl", "hollow reed"]
text = """
{{Needed|[[Radimus notes]], [[axe]], [[machete]], [[bullroarer]], [[gold bowl]], [[prayer potion]] (if you fail to bless the bowl and your prayer drops below 42)|recommended=Bring the items for '''Freeing Ungadulu'''|skills= {{SCP|Prayer|42}} {{Boostable|yes}} to bless the bowl}}

Head back into the jungle and call [[Gujuo]]. He'll help you bless your gold bowl so that it can carry the pure water. Your [[prayer points]] must be ''at or above'' 42 to attempt this, and if you fail, it will drain 5 prayer points. If it drains your prayer below 42, you'll have to restore it to try again.

To bless multiple bowls, talk to Gujuo again (without saying "thanks for your help").

With your [[blessed golden bowl]], head to the pool of pure water towards the middle of the jungle. Since you can't quite reach the water, cut a [[hollow reed]] by using your [[machete]] on the tall reeds by the edge of the pool, then use the reed on the pool to siphon the water into your bowl. If you left-click the reeds, you will receive a message saying you need a knife to cut them, but a machete works just as well. Note that if you leave the jungle, the water in your bowl may evaporate, requiring you to refill the bowl again when you return.
"""

[[steps]]
index = 7
name = "Freeing Ungadulu"
links = ["Radimus notes", "axe", "machete", "bullroarer", "binding book", "blessed gold bowl", "prayer potion", "Ungadulu", "Nezikchened", "prayer", "Fire Blast", "HP", "Protect from Magic", "Arclight", "demonbane weapons", "Silverlight", "Darklight", "Holy water", "Desk (Viyeldi caves)", "safespot", "Magic", "aggressive", "health", "yommi tree seeds", "drop trick", "Ironman", "magic logs", "Gujuo", "bravery potion"]
text = """
{{Needed|[[Radimus notes]], [[axe]], pickaxe, [[machete]], [[bullroarer]], [[binding book]], [[blessed gold bowl]] filled with pure water, Combat equipment and food to kill a level 187 demon|recommended=Several [[prayer potion]]s|skills={{SCP|Agility|50}} {{Boostable|yes}} to enter the cave}}

[[File:Legends' Quest - Fighting Nezikchened.png|thumb|220px|Nezikchened, the demon possessing Ungadulu.]]
There is an upcoming fight, so be prepared. '''''If you die during the fight, you will have to re-obtain all quest items.'''''  When you're ready, use your pure water on the fire wall to step through without damage. Then, use your [[binding book]] on [[Ungadulu]] to release the demon, [[Nezikchened]]. Do not talk to or attack Ungadulu. (If you talk to him, he will damage you. If you attack him, he will damage you and knock you out of the octogram.)

Nezikchened is level 187 and will drain a large amount of [[prayer]] (90%) at the beginning of the battle, but never again after that, so be careful if you want to use it while fighting him. Additionally, he'll cast a [[Fire Blast]] just before dying, so make sure to keep your [[HP]] up so that he doesn't kill you with his last ditch attack. '''This Fire Blast will hit through the [[Protect from Magic]] prayer.'''

[[Arclight]] is heavily recommended for its damage and accuracy boost, as well as its stat-lowering special attack versus demons. If unavailable, other [[demonbane weapons]] (e.g. [[Silverlight]], [[Darklight]], [[Holy water|Holy Water]]) may be used alongside a higher-tier weapon. The [[Desk (Viyeldi caves)|desk]] can be used as a [[safespot]], resulting in Nezikchened switching to [[Magic]] attacks.

:'''Note:''' There seems to be a glitch where if there is more than one person in the room (not inside the octagram), Nezikchened may go [[aggressive]] on the other player. This then makes Nezikchened completely harmless and unable to attack the player.
:'''Note:''' If you don't kill [[Nezikchened]] fast enough, he will reset, causing you to have to use the book on Ungadulu again. The combat will reset, restoring him to full [[health]] and re-draining your [[prayer]].

Once Nezikchened is defeated, talk to Ungadulu. Ungadulu will thank you and give you some [[yommi tree seeds]]. '''Be careful not to attack him as this will knock you out of the octogram and deal some damage, and if your health is low after the fight, this may kill you.''' You can use the [[drop trick]] to get more yommi tree seeds, to save time later if you lose the plants to rotting or if you are an [[Ironman]] and want to get [[magic logs]]. Ask Ungadulu how to get out, and he will tell you that he cast a spell to protect you from the flames. You can now walk through the flames at any time without the bowl.

{{UIMnote|You can now drop the Binding Book.}}

Exit the cave, head back to the pure water pool, and refill your bowl with water if needed. Then, use it on the [[yommi tree seeds]] to germinate them. (Doing this will empty all your bowls if you had more than one, and you cannot plant the seed without more pure water.) After germinating the seeds, attempt to refill your bowl again to discover the pool is now gross with sludge. We will need to cleanse the pool during the next section before we can plant the seeds. (You must use a hollow reed on the pool to get the next dialogue from Gujuo.) 

Call [[Gujuo]]. He will tell you that the underground source has probably been blocked off, and you'll need a [[bravery potion]] to be able to make it through the dark tunnel.
"""

[[steps]]
index = 8
name = "Bravery potion"
links = ["Ardrigal", "snake weed", "vial of water", "Snake weed", "Jungle Potion", "Tai Bwo Wannai", "Marshy jungle vine", "Harpie Bug Swarm", "palm tree (Ardrigal)", "bravery potion"]
text = """
{{Needed|[[Ardrigal]], [[snake weed]], [[vial of water]]}}

{{Map|align=right|mtype=pin|caption=The locations of the herbs for the bravery potion.
|2875,3121,title:[[Ardrigal]],desc:
|2764,3046,title:[[Snake weed]],desc:
}}
To make the potion you need [[Ardrigal]] (obtained during the [[Jungle Potion]] quest) and [[Snake weed]]. The [[Snake weed]] can be found south-west of [[Tai Bwo Wannai]] by searching the [[Marshy jungle vine|green and yellow vines]] on the ground and the [[Ardrigal]] can be found north-east of [[Tai Bwo Wannai]] along the shore by the [[Harpie Bug Swarm|Harpie Bug Swarms]] by searching the large-leafed [[palm tree (Ardrigal)|palm trees]] by the agility shortcut. Mix the herbs into the vial of water (in either order) to make the [[bravery potion]]. You can drink it now to save space.
"""

[[steps]]
index = 9
name = "Finding the water source"
links = ["Radimus notes", "axe", "machete", "pickaxe", "Lockpick", "rope", "Blessed Gold Bowl", "Bravery Potion", "Unpowered orb", "runes", "staff", "Charge Orb", "Food", "potions", "Nezikchened", "Shaman Caves", "Agility", "Thieving", "Mining", "Strength", "Super restore potion", "Salve amulet", "Salve amulet (e)", "undead", "Ungadulu's cave", "death wing", "Karamja Diary", "Barrel (Viyeldi caves)", "food", "weapons", "Winch (Viyeldi caves)", "Viyeldi caves", "Rocky Ledge", "Blue hat (Legends' Quest)", "Viyeldi", "Ranalph Devere", "Irvig Senay", "San Tojalon", "Lump of crystal", "Hunk of crystal", "chunk of crystal", "Ranged", "Magic", "safespot", "Furnace (Viyeldi caves)", "heart crystal", "minimap", "Mossy rock (Viyeldi caves)", "lesser demon"]
text = """
'''''Items required:'''''

*''[[Radimus notes]], [[axe]], [[machete]], [[pickaxe]], 1-2 [[Lockpick|lockpicks]], [[rope]], [[Blessed Gold Bowl]], and [[Bravery Potion]] (if it has not been consumed yet).''
*''[[Unpowered orb]] and [[runes]]/[[staff]] to cast any [[Charge Orb]] spell (note that at Magic level 56 you can only cast the Charge Water Orb spell). Bring 2 sets if taking the long path and you don't intend to bank between the two descents of the cave. Be on normal spellbook.''
*''[[Food]] and [[potions]] to fight the three warriors followed by [[Nezikchened]]. If taking the long path and teleporting out of the cave, you can restock before fighting Nezikchened.''
*''Bring boosts needed to access the cave again.''

'''''Skills required:''''' {{SCP|Magic|56}} {{Boostable|yes}} ''to cast a [[Charge Orb]] spell.'' {{SCP|Crafting|50}} {{Boostable|yes}} ''to use the furnace. In addition, the skills to go through the [[Shaman Caves|cave]] again (indicated above)<!--: 50 [[Agility]], 50 [[Thieving]], 52 [[Mining]] and 50 [[Strength]].''-->''

'''''Recommended items: '''[[Super restore potion]] in case of failed obstacles. [[Salve amulet]] or [[Salve amulet (e)]] for fighting the 3 [[undead]] warriors.''

Go back to [[Ungadulu's cave]] and head down into the cave again, going through all the same areas that you did before. Kill a [[death wing]] on the way past if you have yet to complete a [[Karamja Diary#Hard|Karamja Hard Task]].

When you reach the area with the seven pools, head further to where another door is. Cast any [[Charge Orb]] spell on it to go through. You'll find yourself in a room with several [[Barrel (Viyeldi caves)|barrels]] in it. You can smash them to reveal things like [[food]], [[rope]], [[weapons]], or often enemies. For now though, ignore them.

Use your rope on the [[Winch (Viyeldi caves)|winch]] and drink the bravery potion before heading down into the depths of the [[Viyeldi caves]]. If you've brought along a [[Salve amulet]], now is the time to equip it. If the rope disappears, searching the winch again will cause it to reappear. Climb down the winch. '''You may lose your grip on the rope and fall into the pit, leading to moderate damage (15+)'''.

You'll be on the top of a long, winding path with several [[Rocky Ledge|rocks]] covering it. The [[Blue hat (Legends' Quest)|blue wizard hat]] to the right of the ladder is the spirit of [[Viyeldi]], which you can take to talk to or skip past for now. Climb over these rocks to the bottom of the path, but be warned. '''If you fall off, you can take extremely heavy damage (40+)''', depending on where you fell. You may also be immediately attacked by one of the three warriors mentioned below.

Once at the bottom, you'll see three groups of different [[undead]] warriors named [[Ranalph Devere]] (level 92), [[Irvig Senay]] (level 100), and [[San Tojalon]] (level 106), who will drop the [[Lump of crystal|lump]], [[Hunk of crystal|hunk]], and [[chunk of crystal]], respectively. Approach them and fight them individually. There are multiple of each warrior in the room. If you are using [[Ranged]] or [[Magic]], hiding behind one of the empty ore rocks allows you to [[safespot]] them. Once you've defeated them, they won't attack again. Take the crystals over to the [[Furnace (Viyeldi caves)|furnace]] to the north-east, and put them in to make a [[heart crystal]].

Go south to the shimmering field and look at the [[minimap]]. If you haven't noticed already, the area to the north-north-west looks like the head of a dragon.
[[File:Legends' Quest - Viyeldi caves mossy rock.png|thumb|220x220px|The mossy rock that players must use the heart crystal on to activate it.]]
Go to where the eye is, and use the crystal on a [[Mossy rock (Viyeldi caves)|mossy rock]] there. It will glow. Go back to the shimmering field, place the crystal in the heart-shaped recess next to it, and pass through the barrier. On the other side of the barrier are three [[lesser demon]]s, and past them to the west is the source of the pure water.
"""

[[steps]]
index = 10
name = "The second battle"
links = ["Demonbane weapons", "Archlight", "Silverlight", "Darklight", "Nezikchened", "Viyeldi", "dark dagger", "Ungadulu", "Charge Orb"]
text = """
{{Needed|recommended=[[Demonbane weapons]] (e.g. [[Archlight|Arclight]], [[Silverlight]], [[Darklight]])}}
[[File:Legends' Quest - Echned Zekin appears.png|thumb|220x220px|Echned Zekin, the ancient spirit.]]

You'll notice that there is a boulder blocking the water flow. Try to push it, and a spirit named Echned Zekin (which is an anagram of [[Nezikchened]]) will appear. He'll say he's being tortured and beg you to help him by killing the spirit, [[Viyeldi]]. He'll give you a [[dark dagger]] to do so.

If you have no intentions of killing Viyeldi, you still have to accept the dagger from Echned, as the dagger must be given to [[Ungadulu]] in order to proceed with the quest.

There are now two paths to choose from.

:'''Note:''' Players who leave the cave will need another [[Charge Orb]] spell to get through the door again. You will not need another rope or bravery potion.
"""

[[steps]]
index = 11
name = "=The short path="
links = ["Blue hat (Legends' Quest)", "Viyeldi", "Echned", "dark dagger", "safespot", "Nezikchened", "Prayer"]
text = """
'''Note: If you choose the short path, you will have to fight the three undead warriors again in the final battle!'''

Do as the spirit asks. Walk back to the rock path with the blue wizard hat that you climbed down, and climb the rocks back up to the very top (you cannot fail here).

You may have noticed a [[Blue hat (Legends' Quest)|blue wizard hat]] on the way in—maybe even tried to pick it up. If you did, you met a spirit named [[Viyeldi]], who [[Echned]] wanted you to kill. Stab him with the [[dark dagger]] (use the dagger on him while the dialogue is shown); then, go back down to the boulder.

Before pushing the boulder, proceed to the southern boulder if you wish to [[safespot]] [[Nezikchened]]. Tell Echned Zekin that you did as he asked, use dark dagger on him. Nezikchened will reveal himself and attack the player, draining the player's [[Prayer]].

'''After the battle, push the boulder out of the way of the water's flow and fill the bowl from the pool below it.''' You may need to try from different angles, try from the East side.
"""

[[steps]]
index = 12
name = "=The long path="
links = ["Dark dagger", "Charge Orb", "Blue hat (Legends' Quest)", "Viyeldi", "Ungadulu", "dark dagger", "Holy Force", "Nezikchened", "magic", "melee", "health", "prayer"]
text = """
{{Needed|[[Dark dagger]]; the same items as for '''Finding the water source''', including another unpowered orb and runes to cast any [[Charge Orb]] spell (but you will not need another rope or bravery potion)}}

:''Skip the "long path" if you did the short path.''

Do not try to pick up the [[Blue hat (Legends' Quest)|blue hat]] or talk to [[Viyeldi]].

Bank if desired. Go back to the beginning of the cave, investigate the fire wall and [[Ungadulu]]'s magic will allow you to pass through the fire wall safely. Use the [[dark dagger]] on Ungadulu. He will recognise the evil in the dagger and take it from you, giving you a [[Holy Force]] spell card, which will reveal the spirit's true form.

Now, head back down to the bottom once again. You'll have to use another [[Charge Orb]] spell to get back in (including another unpowered orb). Search the winch to make the rope reappear.

At the bottom, you'll have to fight [[Nezikchened]] again. Choose the southern boulder if you wish to safespot him. Push the boulder and Echned will appear again. Do not tell him you lost the dagger or he will damage you. To start the fight, cast the Holy Force spell (left-click on the card) when Echned is near you, and he will transform into Nezikchened and attack you. At the start of the battle, your Prayer will be halved. Nezikchened fights with a very ineffective [[magic]] attack at the beginning of the battle, and he'll soon realise that it doesn't work and will switch to [[melee]]. Defeat him however you like. '''After the battle, push the boulder out of the way of the water's flow and fill the bowl from the pool below it.''' You may need to try from different angles, try from the East side.

:'''Note:''' If you don't kill [[Nezikchened]] fast enough, he will reset, causing you to have to push the boulder again to talk to him. The combat will reset, and he will have full [[health]] as well as drain your [[prayer]] again.
"""

[[steps]]
index = 13
name = "Restoring the totem"
links = ["Radimus notes", "axe", "Rune axe", "yommi tree", "machete", "bullroarer", "yommi seeds", "blessed gold bowl", "equipment", "potions", "food", "yommi tree seeds", "yommi totem", "Magic logs", "Herblore", "Gujuo", "Fertile Soil (scenery)", "Ungadulu"]
text = """
{{Needed|[[Radimus notes]], [[axe]] ([[Rune axe|rune]] or higher required to cut the [[yommi tree]]), [[machete]], [[bullroarer]], [[yommi seeds]], [[blessed gold bowl]], and any [[equipment]]/[[potions]]/[[food]] you need for the most difficult battle of this quest|skills={{SCP|Herblore|45}} {{Boostable|yes}} to plant the [[yommi tree seeds]] and {{SCP|Woodcutting|50}} {{Boostable|yes}} to create the [[yommi totem]]}}

*'''Note for Ironmen: You may wish to do this before proceeding further in the quest.''' 16 [[Magic logs]] are required for other quests, and the logs can be challenging to obtain for ironmen. Allowing a [[yommi tree]] to die and then chopping it down has a 1/4 chance to yield magic logs. This can be done quickly by not watering it, letting it die in the sapling stage, and hopping between three separate worlds. At the minimum [[Herblore]] requirement to plant the tree, about 192 seeds should be enough to get 16 magic logs accounting for a high (66%) failure rate from planting the seeds. When a dead tree is chopped down, the soil is damaged, so the player will have to hop worlds or move to another spot. It's possible to walk/run between two fertile soils and plant two yommi trees at once. While this method is time consuming, it is more consistent and has lower requirements than other early [[Magic logs#Obtaining magic logs|sources for magic logs]].

Return to the pure water pool, then use the bullroarer to call [[Gujuo]] for instructions on what to do next. Fill the bowl again. Find a patch of [[Fertile Soil (scenery)|fertile soil]] - it will be bare of vegetation and brown on the map. Plant the germinated seeds in the fertile soil ({{SCP|Herblore|45}}) and wait for the tree to grow. If it says you planted the seeds incorrectly, just keep trying until it works (the chance of planting it successfully is based on your Herblore level). The growing process only takes a matter of seconds so be prepared. Once the tree reaches the second stage, use your bowl of water on it. The third and final stage is the '''adult''' yommi tree. Use your axe on it, and keep doing this until you've chopped all the branches off and shaped it into a [[yommi totem]] ({{SCP|Woodcutting|50}}). You'll know it's done when you can pick it up.
[[File:Legends' Quest - Chopping yommi tree.png|thumb|220x220px|A player creating the yommi totem.]]

*'''Note:''' Keep alert, because once the Yommi tree has reached the adult stage, you'll have only a brief window of time where you can cut it, or it will go rotten, and you will need to start again.

If you lose all your seeds, you can always go back and get more from [[Ungadulu]] in the cave. Remember to germinate them with the sacred water.
"""

[[steps]]
index = 14
name = "The final battle"
links = ["Protect from Melee", "Nezikchened", "Viyeldi caves", "prayer", "Melee", "Magic", "Ranged", "halberd", "Protect from Magic", "health"]
text = """
Now, find any of the locations where there's an old, brown totem. One is located just east of the pool, but there are others all over the forest. Once you find one, make all the preparations you need to fight. Turn on [[Protect from Melee]] and use your new totem on the old one.

Note: you cannot replace the totem if you have inspected it recently. Wait a short time for it to return to its default state.

[[File:Legends' Quest - Final Nezikchened fight.png|thumb|220x220px|Nezikchened returns to destroy the hero once and for all.]]
When [[Nezikchened]] spawns, he will say his dialogue and begin attacking you! You are immobile while he is speaking and can take heavy damage, so '''it is highly recommended to turn on Protect from Melee before replacing the totem to be safe'''.

If you chose the '''short path''', you will need to kill the three undead warriors you saw down in the [[Viyeldi caves|dragon cave]] once again. He will summon them one at a time, going from the strongest to weakest in terms of combat level. After each hero is killed, make sure that Protect from Melee is up as the interlude repeats, and [[Nezikchened]] will freely hit you four times on three occasions, which can deal a lot of damage if he gets lucky with his hits. '''Low levels should note that if you kill the three undead warriors and then leave, you will not have to fight them again upon returning.'''

If you took the '''long path''', Nezikchened will not summon the undead heroes because Viyeldi is protecting them, but be cautious as he will hit four times before the fight.

Nezikchened will attack and drain your [[prayer]]. He attacks with [[Melee]] and [[Magic]], which is much more effective this time. He doesn't use Magic that much if you melee him. Using [[Ranged]], Magic, or a [[halberd]] from between the trees with [[Protect from Magic]] on will allow you to defeat him without losing [[health]].

:'''{{Colour|red|Warning:}}''' If you take too long to fight him, he will disappear. When you resummon him, he returns with full health.
"""

[[steps]]
index = 15
name = "Finishing up"
links = ["Nezikchened", "Gujuo", "Radimus Erkle", "Radimus notes", "gilded totem", "fairy ring"]
text = """
When [[Nezikchened]] dies, replace the totem, and [[Gujuo]] will appear to thank you for defeating the demon. He'll give you a totem pole as a reward for everything you've done.

Return to [[Radimus Erkle]] with the [[Radimus notes]] and [[gilded totem]] ([[fairy ring]] code {{Fairycode|blr}}), who will then let you into the guild. He will train you in one of 12 various skills of your choice up to four times. After all the experience rewards are claimed, the quest is complete.

'''Note:''' You will need to talk to Radimus one more time after training to actually complete the quest. Without talking to him again, it will not be marked in the questlog and you won't receive the Quest Points.

'''Congratulations, quest complete!'''
"""
