[[steps]]
index = 5
name = "Path to Yu'biusk"
links = ["Dorgesh-kaan sphere", "dramen staff", "lunar staff", "fairy rings", "Oldak", "Dorgesh-Kaan", "fairy ring", "Dorgesh-Kaan South Dungeon", "law rune", "Dorgesh-Kaan Agility Course", "Yu'biusk", "Bandos", "God Wars", "Strange box (Yu'biusk)"]
text = """
{{Needed|Light source|recommended=[[Dorgesh-kaan sphere]], [[dramen staff|Dramen]] or [[lunar staff]] if players have access to the [[fairy rings]]}}
Return to [[Oldak]]'s workshop in [[Dorgesh-Kaan]], and tell them what you've learned from the high priests. Oldak will tell you that they've found a [[fairy ring|fungus ring]] in the [[Dorgesh-Kaan South Dungeon|southern caves]] with similar properties to [[law rune]]s, and believes that with enough power and Zanik's presence, it should be able to open a portal to Yu'biusk.

If players have access to the [[fairy rings]], use the code {{Fairycode|AJQ}} to teleport there. Otherwise, to get there, travel south on the same floor level as Oldak's workshop, go up the stairs at the end and then up again to reach the [[Dorgesh-Kaan Agility Course|agility course]]. Climb down the ladder at the west side of the agility course platform, walk a bit south and take the first corridor to the east. At the end of the corridor, head south and look west for the [[File:Transportation icon.png]] icon at the southern entrance of the {{FloorNumber|uk=2}}.

Meet up with Zanik and Oldak, who will ask you to adjust the machine by allocating power to each ring proportional to the area within the ring. The rings, from outer to inner, have a radius of 3, 2 and 1. Because a circle's area is proportional to the square of its radius, this means the power given to each of the circles should be 9, 4, and 1.

[[File:Fairy ring power relay.png|right|thumb|280px|The interface used to allocate power to each of the circles in the [[fairy ring]].]]

Enter the values 9-4-1 and activate the machine to start a cutscene where the three of you will be teleported to [[Yu'biusk]]. Upon arriving, you see that it is a barren wasteland, torn asunder in a fit of rage by [[Bandos]], after the [[God Wars]]. Walk north-west until you get to some short walls surrounding a [[Strange box (Yu'biusk)|strange box]]. Oldak will warn you that you need to return fast, but keep walking. Zanik will notice the box and ask you to help her open it.

Open the strange box, and Zanik will be sucked into it. As this happens, Oldak tells you that you and him have to leave, as the portal is closing. Upon returning to Gielinor, Oldak will tell you that he hasn't been able to get the fairy ring-hacking machine working again, and suggests that there may be a way to reach Yu'biusk after breaching the planar barriers between it and Gielinor.

'''Congratulations, quest complete!'''

