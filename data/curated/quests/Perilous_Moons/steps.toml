quest = "Perilous Moons"
step_count = 3

[[steps]]
index = 0
name = "Ruins in Cam Torum"
links = ["Sulphur Nagua (Perilous Moons)", "Cam Torum", "Ralos' Rise", "landing site", "Quetzal Transport System", "Zuma", "Attala", "Agility", "Rocks (Ralos' Rise)", "the Teomat", "exposed altar", "Renu", "Protect from Melee", "Jessamine"]
text = """
{{Needed|Combat equipment and food to defeat the [[Sulphur Nagua (Perilous Moons)|Sulphur Nagua]].}}
[[File:Zuma chathead.png|left|frameless]]
Make your way to the [[Cam Torum]] entrance at the southern side of [[Ralos' Rise]]. If you have not already built a [[landing site]] by the city entrance, it is recommended to do so for quick access via the [[Quetzal Transport System]].

[[File:Perilous Moons - a dispute.png|thumb|300px|A dispute at the entrance to Cam Torum.]]
At the bridge near the entrance, [[Zuma]] and [[Attala]] will be in argument. Zuma wishes to enter the dwarven city to document some newly discovered ruins but Attala refuses due to the risks involved. A guard will come out of the gates and inform Attala that a creature has escaped through the mountain's outflow spring and that they have no spare men to deal with it.

Agree to help Attala and make your way to the outflow spring. Players with level 47 [[Agility]] may walk east over the bridge, then head north to climb a set of [[Rocks (Ralos' Rise)|rocks]] to reach the outflow spring. Players without level 47 Agility must use the western path and run all the way north towards [[the Teomat]], then back around to the south-east of the [[exposed altar]]. If players have already built the Cam Torum [[landing site]], they may also use [[Renu]] to fly to the Teomat and then run to the south-east of the exposed altar.

Once at the spring, a [[Sulphur Nagua (Perilous Moons)|Sulphur Nagua]] will be wandering around the area. It is level 98 and hits twice per attack. Its attacks can be completely blocked using [[Protect from Melee]]. After killing it, return to Attala, who will agree to let you in with Zuma as long as you keep him in check. Enter Cam Torum through the entrance and travel all the way north to the ruins entrance. Speak to [[Jessamine]] and ask if you could be of any help with the dig. She will then give you permission to enter the city.
"""

[[steps]]
index = 1
name = "Remnants of the Old Ones"
links = ["Attala", "Zuma", "Jessamine", "Old Ones", "Building Supplies (scenery)", "hammer", "saw", "building supplies", "minimap", "Sulphur Nagua", "run energy", "Neypotzli", "water talisman", "earth talisman", "Nahta", "The Runic Emporium", "naguanil", "Blacksmith (Cam Torum)", "world map", "Lunar Chest"]
text = """
[[File:Nahta chathead.png|left|frameless|width=110x110]]
Enter the ruins to find yourself in an antechamber with a large black monolith in the centre. Speak to [[Attala]], [[Zuma]], and [[Jessamine]], in that order. Jessamine will tell you that inscriptions on the murals are written in the language of the [[Old Ones]], and ask you to help her set up camps in the surrounding caverns.
[[File:Perilous Moons - mural in Neypotzli.png|thumb|300px|A mural found in the ruins.]]
Take from the [[Building Supplies (scenery)|building supplies]] just to the west of Jessamine to obtain a [[hammer]], [[saw]], and three [[building supplies]]. To build the campsites, run to the cooking range symbol [[File:Cooking range icon.png]] on the [[minimap]] in each of the following rooms, using entrances in the corners of the antechamber:
{| class="wikitable"
|+Caverns
!Cavern
!Entrance
|-
|Earthbound Cavern
|North-west
|-
|Streambound Cavern
|North-east
|-
|Ancient Prison
|South-west corner
|}
Beware of aggressive [[Sulphur Nagua]] in the Ancient Prison.

Each time you build a campsite, your [[run energy]] will be fully restored. After building all three campsites, speak to Jessamine, who has finished translating the inscriptions. She will reveal that the ruins are called "[[Neypotzli]]," and that emissaries of unknown origins have been sealed here. Ask what to do, and she will give you a [[water talisman]] and [[earth talisman]], telling you that the power of "earth and streams" were used to seal the emissaries away. Attala will recognise the talismans, and ask that you bring them to [[Nahta]].

Nahta runs the magic shop, [[The Runic Emporium]], near the centre of the city and marked with a magic shop symbol [[File:Magic shop icon.png]]. She will enchant the talismans to react to [[naguanil]] magic, and ask that you take them to the [[Blacksmith (Cam Torum)|blacksmith]].

Speak to the blacksmith, found north-east of Nahta, in the city's forge, and a cutscene will play in which he will infuse the talismans. Return to Neypotzli with the talismans and speak to Attala; she will instruct you to use the talismans to guide you towards the location (within the dungeon) where earth and water runic energy resonate the most. This location differs for each player. 

Use the east/west pulling talisman to find the "column" and the north/south pulling talisman to find the "row" of the area you're searching in. Finding the location to travel to might require entering multiple doors. Use the [[world map]] to figure out possible connections between rooms. Rarely, it is possible to be required to go to the [[Lunar Chest]]'s room in order to find the correct location.
"""

[[steps]]
index = 2
name = "= The ancient warden ="
links = ["nagua", "Eyatlalli", "Moons of Peril", "big fishing net", "rope", "pestle and mortar", "knife", "moonlight grub", "grubby sapling", "moonlight grub paste", "raw bream", "bream scales", "Moss Lizard", "raw moss lizard", "moss lizard tail"]
text = """
[[File:Eyatlalli chathead.png|left|frameless]]When you are at the correct location and attempt to click either talisman, a [[nagua]] named [[Eyatlalli]] will appear before you. She will tell you that Neypotzli is a prison created to seal the [[Moons of Peril]], a trio of powerful [[nagua]]. The ground will then shake and she will disappear; return to the antechamber and talk to the group to find Zuma missing. Eyatlalli will reappear, telling you that the icosahedron has been disturbed and must be re-infused with a ritual.

If you didn't bring the required tools for the quest, enter the Earthbound Cavern and search the supply crates next to the campsites you set up earlier. Obtain the [[big fishing net]], [[rope]], [[pestle and mortar]], and [[knife]] if needed.

With the tools, collect a [[moonlight grub]] from the [[grubby sapling]] found slightly up the path in the Streambound Cavern, and use the pestle and mortar to grind it into [[moonlight grub paste]]. Run slightly north-east, towards a fishing spot on the bridge, and catch a [[raw bream]]. Use the knife on it to obtain the [[bream scales]].

Next, enter the Earthbound Cavern and head to the Hunter icon. Set a lizard trap on two adjacent rocks to create a trap between them, then rustle the bushes on either side of them until a [[Moss Lizard|moss lizard]] is caught. Use the knife on the [[raw moss lizard]] to obtain a [[moss lizard tail]].

Return to Eyatlalli with all three items. The Eyatlalli is now located in the central antechamber, return and speak with Attala to continue the dialogue and then speak with the Eyatlalli with the items. The ritual will be set in motion, but she will need to have you distract the Moons of Peril whilst she does so. Now you have to defeat three nagua, which are dangerous and each have different mechanics.

  [[File:Fighting the Blue Moon.png|thumb|300px|Battling the Blue Moon.]]
"""
