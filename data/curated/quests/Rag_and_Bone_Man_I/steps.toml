{{Needed| 8 [[Coins|gp]] to buy the 8 [[Jug of vinegar|jugs of vinegar]] with, 60 gp to travel to and back from [[Karamja]] (if walking), and 8 empty inventory slots for the bones|recommended=Teleports to [[Lumbridge]], [[Draynor Village]]'' (''[[Amulet of glory]]) and [[Karamja]] (will save some time).}}

Collecting all of the required bones is a relatively easy task if you walk south of the [[Odd Old Man|Odd Old Man's]] location, down to [[Lumbridge]], and then to [[Port Sarim]] in the west to get to [[Karamja]]. Using teleports to get to the required locations will speed up the process ([[Lumbridge]], [[Draynor Village]], and [[Karamja]] teleport). Ensure you '''talk to the Odd Old Man before you begin gathering and go through the entire dialogue'''. All needed bones are a guaranteed drop.{{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1108655941006835713|date=21 March 2019|archiveurl=https://archive.is/A1bcg|archivedate=18 May 2019|quote=The initial quest ones are guaranteed drops. The longer wish-list is 1/4.}} The following is a recommended route for the first six of the eight required bones, starting from the Odd Old Man's house and ending in the [[Lumbridge Swamp Caves]].

#Run west from the Odd Old Man's house and through the gate, then south to the mines south-east of Varrock and kill a [[Giant rat]] near or inside the mine, picking up the [[giant rat bone]] it drops in the process.
#Head slightly south of the mine to the forest and kill a [[unicorn]] and [[black bear]], picking up the [[unicorn bone]] and the [[bear ribs]] respectively.
#Head into the sheep pen to the south-west of the mine and west of the forest and kill a [[ram]] to get a [[ram skull]].
#Walk south towards [[Lumbridge]] (or teleport to the city and walk east) and kill a [[goblin]] on the eastern side of the [[River Lum]] to get a [[goblin skull]].
#Head down to the [[Lumbridge Swamp]] and kill one of the [[big frog]]s for the [[big frog leg]]. The small [[frog]]s and [[giant frog]]s do '''NOT''' drop the big frog leg.

From here, head to [[Draynor Village]], north-west of the Lumbridge Swamps. Find and '''talk to''' [[Fortunato]] in the market about vinegar. Only after talking about vinegar will he have it stocked in the store, trade him and purchase 8 (or 35 if intending to do [[Rag and Bone Man II]] at some point, saving time later) [[jugs of vinegar]]. '''Do not steal from the market stall or he won't talk to you.'''

This is also a good opportunity to withdraw items to return to the Odd Old Man ([[Varrock Teleport|Varrock teleportation runes]] or [[Magic tablet|tablet]], [[Digsite pendant]]), and, if returning directly to him, all 6 currently collected bones and the necessary supplies to polish all 8 (8 jugs of vinegar, 8 pots (highly recommended to make the 6 bone in vinegar you currently can and 2 pots of vinegar to save space - see "Polishing the bones" for details), and 8 [[logs]] (of any type - alternatively, an [[axe]] to cut down the trees by the Odd Old Man, which will save a lot of space)).

'''Note:''' Be careful that you '''do not''' accidentally "empty" a bone in vinegar, because if you do, '''you will lose the bone and have to collect that bone again'''.

From here, travel south-west to Port Sarim and take the ship (the third transportation icon from the north, fourth from the south) (requires 30 gp each way) to Karamja (can also teleport (amulet of glory)). Once there:

#Walk west towards the [[Karamja Volcano]] and kill a monkey on the way, picking up the [[monkey paw]].
#Head into the [[Crandor and Karamja Dungeon]], which is located at the top of the Karamja Volcano (marked by a dungeon icon), and kill a [[giant bat]], picking up the [[giant bat wing]].

After you've gathered all 8 bones, head back to the Odd Old Man, and a bank if necessary.
"""

