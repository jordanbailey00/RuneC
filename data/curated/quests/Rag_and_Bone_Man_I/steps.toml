[[steps]]
index = 0
name = "Starting out"
links = ["Varrock Teleport", "digsite pendant", "balloon transport system", "willow logs", "Odd Old Man", "Varrock", "Paterdomus Temple", "Silvarea", "Earth Altar", "Saradomin", "Digsite", "Balloon transport system", "Castle Wars", "minigame teleport", "Canifis", "Silvarea mine", "icon", "minimap", "mining site"]
text = """
{{Needed|recommended=A [[Varrock Teleport|Varrock teleport]] or [[digsite pendant]] (or usage of the [[balloon transport system]] (with [[willow logs]])) for a faster route of travel to the [[Odd Old Man]]}}
[[File:Sack chathead.png|left]]

The [[Odd Old Man]] (quest start location) is found east of [[Varrock]] and west of [[Paterdomus Temple]] in [[Silvarea]].

If travelling from Varrock, walk east of the city and through the gate near the [[Earth Altar]], directly east of the nearby statue of [[Saradomin]]. If travelling from the [[Digsite]], walk north and east around the mountain. You can also use the [[Balloon transport system|balloon Transport System]], as one of the destinations is directly north-west of the gate (it is suggested to have the [[Castle Wars]] location unlocked due to its proximity to a balloon. Use the [[minigame teleport]] to Castle Wars, then fly to the [[Varrock]] balloon location (1 willow log required). The Odd Old Man is a fairly short distance to the east).

Reaching him will take you down the same path as travelling [[Canifis]] would. Halfway down that path, you will find the Odd Old Man to the north, just slightly north-west of the [[Silvarea mine|limestone quarry]] (marked by a quest [[icon]] on your [[minimap]], right next to the [[mining site]] icon).

Talk to him, and he will tell you that he needs several bones to complete his collection. '''Then talk to him again''' after getting the list to have him list every bone individually; go through the chat dialogue, where he tells you what bones you have remaining and where to get them individually, until he guides you on how to polish the bones in vinegar. '''If you do not speak to him and go through the entire dialogue, you will be unable to add bones to the pots of vinegar later on unless you talk to him, so doing this will efficiently save you a trip or two.'''
"""

