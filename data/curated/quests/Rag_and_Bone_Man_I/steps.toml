{{Needed|8 [[bone in vinegar]] (requiring 8 [[Jug of vinegar|jugs of vinegar]], 8 [[pot]]s, and all 8 bones to make), a [[tinderbox]], 8 [[logs]] (of any type - can also bring an [[axe]] to chop them down by the [[Odd Old Man]]|recommended=A teleportation method to the [[Odd Old Man]] ([[Varrock]] teleport, [[Digsite pendant]]).}}

An example of how an inventory looks, before heading back to the Odd Old Man, can be seen on the right.

If you haven't already, make 8 [[Pot of vinegar|pots of vinegar]] by using the [[Jug of vinegar|jugs of vinegar]] on your pots and then use all the bones on the pots of vinegar to make 8 [[bone in vinegar]].

'''Note:''' Be careful that you '''do not''' accidentally "empty" a bone in vinegar, because if you do, '''you will lose the bone and have to collect that bone again'''.

Go back to the old man taking the eight bones in vinegar, a [[tinderbox]] and eight [[logs]] (or, alternatively, bring an [[axe]] instead of logs; there are [[tree]]s near the Odd Old Man at the bottom of the stairs where logs can be cut). '''Any''' type of logs works for this quest, provided you have the [[Firemaking]] level to light the logs.

To polish the bones, use a log on the pot-boiler next to the Odd Old Man. Then, use a bone in vinegar on the pot boiler, and finally, use your tinderbox to light it (you will not receive [[experience]] for lighting the logs). It takes 12 seconds for each pot to boil. You can hop worlds after lighting the logs to skip these 12 seconds. Repeat this for all eight bones.

Talk to the [[Odd Old Man]], and give him the polished bones to complete the quest.

'''Congratulations, quest complete!'''
"""
