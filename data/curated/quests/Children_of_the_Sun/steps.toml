quest = "Children of the Sun"
step_count = 3

[[steps]]
index = 0
name = "Delegation"
links = ["Noah", "Alina", "Varrock Square", "Eliza", "Varlamore", "King Roald", "Aeonisig Raispher", "Prince Itzla Arkan", "Servius, Teokan of Ralos", "Furia Tullus", "Ennius Tullus", "Knight of Varlamore (Children of the Sun)", "Varrock Palace", "Sergeant Tobyn"]
text = """
[[File:Children of the Sun - the delegation arrives.png|thumb|280px|The Varlamorian delegation arrives in Varrock.]]
Speak to [[Noah]] or [[Alina]] at the eastern side of [[Varrock Square]], behind [[Eliza]]'s stall. Alina will tell you that a delegation from the Kingdom of [[Varlamore]] is on their way to Varrock after a long period of isolation. You may ask her various information about the kingdom, or ask when the delegation will arrive to immediately progress through the quest, which will begin a cutscene.

The delegation, seen approaching [[King Roald]] and [[Aeonisig Raispher]], comprises of [[Prince Itzla Arkan]], [[Servius, Teokan of Ralos]], [[Furia Tullus]], [[Ennius Tullus]], and six [[Knight of Varlamore (Children of the Sun)|Knights of Varlamore]]. Meanwhile, a guard carrying a large bag is seen leaving the walls of the [[Varrock Palace]]. Though his superior, [[Sergeant Tobyn]], lets him leave, you believe he looks a bit suspicious and decide to tail him.
"""

[[steps]]
index = 1
name = "Investigation"
links = ["Lowe's Archery Emporium", "Old Man Yarlo", "Aubury's Rune Shop", "Bandit (Children of the Sun)", "Sergeant Tobyn", "Aris", "Benny", "Varrock east bank"]
text = """
[[File:Children of the Sun - suspicious guard path.png|frame|The path you can take, and where to stand on to prevent being spotted.]]
[[File:Children of the Sun - the bandits scheme.png|thumb|280px|Eavesdropping on the bandit's scheme.]]
The guard will walk towards south-east Varrock and periodically turn around, where you will need to hide behind a building in order to avoid his sight. If you are caught, you will have to talk to Noah and start from the beginning again.

Use the image on the right and '''walk''' accordingly, standing on the indicated spots and resume walking once he's on the move again:
* Run inside [[Lowe's Archery Emporium]]. 
* Hide behind the northern wall of the building south of the archery shop.
* Walk to the south-eastern corner of the building.
* Hide behind the western wall of [[Old Man Yarlo]]'s house.
* Hide either inside Old Man Yarlo's house or near the building south of [[Aubury's Rune Shop]].

After hiding in the last spot, the suspicious guard will enter the small building just next to [[Aubury's Rune Shop]] and a cutscene will automatically begin, detailing how the guard was actually a member of some [[Bandit (Children of the Sun)|bandits]], and how they plan to attack the delegation as they leave.

After the cutscene, go back to Varrock Square and speak to [[Sergeant Tobyn]] at the north side of the square, outside the castle wall entrance. He will instruct the player to identify the four bandits posing as guards. Do so by clicking the "Mark" option on them:
<gallery captionalign="center" widths="200">
Children of the Sun guard location (1).png|The first guard can be found directly outside [[Aris]]'s tent. He is standing with his hands on his hips with no weapon. <!-- NPC id 12668 -->
Children of the Sun guard location (2).png|The second guard is found near [[Benny]] and his news stand. She is not wearing a helmet. <!-- NPC id 12671 -->
Children of the Sun guard location (3).png|The third guard can be found directly outside [[Lowe's Archery Emporium]] on the east path. He is leaning on the wall with his arms crossed, without a weapon. <!-- NPC id 12677 -->
File:Children of the Sun guard location (4).png|The fourth guard can be found further along the east path between the archery shop and [[Varrock east bank]]. He wields a mace instead of a sword. <!-- NPC id 12674 -->
</gallery>
"""

[[steps]]
index = 2
name = "Interrogation"
links = ["Sergeant Tobyn", "Prince Itzla", "Servius, Teokan of Ralos", "Varlamore", "Regulus Cento"]
text = """
[[File:Children of the Sun - The Interrogation.png|thumb|The player and Prince Itzla interrogate the bandit.]]

Return to [[Sergeant Tobyn]], who will promptly arrest the bandits off-screen. You will be taken to the cell on the palace roof to assist with the interrogations. Unexpectedly, [[Prince Itzla]] will appear; having been bored by the politics and hearing a bit of commotion, he decides to come to the roof. He will introduce himself to you and decide to assist you with the interrogations.

A cutscene will play where Prince Itzla interrogates one of the bandits, with you providing a little help. The bandit quickly gives in and informs him that they were approached by someone unknown, possibly from Varlamore, to kill [[Servius, Teokan of Ralos]].

After the interrogation, Prince Itzla will thank you for your role in stopping the assassination attempt by giving you special permission to visit [[Varlamore]] and asks you to speak with [[Regulus Cento]] outside the Eastern gate of Varrock when you're ready to travel to Varlamore and help continue the investigation on the assassination attempt.

Speak to [[Sergeant Tobyn]] in the cell room.

'''Congratulations, quest complete!'''
"""
