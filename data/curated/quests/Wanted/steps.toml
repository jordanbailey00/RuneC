[[Solus Dellagar]] will also react based on which scan location out of seven the player is at.
*If it is the '''second''' scan location, Solus will forcibly teleport the player to [[Camelot]].
*If it is the '''fourth''' scan location, Solus will attempt to personally ward the player off with a particularly strong cast of [[Flames of Zamorak]]. The damage he deals is equal to a percentage of the player's '''current''' [[Hitpoints]] total. At level 99 [[Hitpoints]] with maximum boosts it will deal up to 96 damage, 111 damage when the player has 121 Hitpoints when boosted with an Anglerfish. The damage he deals is typeless, meaning [[protection prayers]] have no effect on it. However, no matter how much damage it inflicts, it will '''never''' kill the player as [[Savant]] will protect them and teleport them back to [[Falador]], in the [[White Knights' Castle]] with all items intact.
*If it is the '''sixth''' scan location (the one before the [[Rune essence mine]]), Solus will summon a level 32 [[Black Knight (Wanted!)|Black Knight]] in an attempt to take the player out. [[Armour]] and a [[weapon]] should be brought. It is not necessary to kill the Black Knight; you can simply run away.
"""

[[steps]]
index = 9
name = "Confronting Solus"
links = ["Solus Dellagar", "Ice Barrage", "Pure essence", "rune essence", "Savant", "Solus's hat", "Combat level", "Hitpoints"]
text = """
{{Instance}}
[[File:Wanted! - Solus decimates rangers.png|thumb|[[Solus Dellagar]]'s powerful [[Ice Barrage]] attack.]]
The final clue will be 20 noted [[Pure essence|pure]]/[[rune essence]]. Bank and equip a weapon and armour for the final fight. Use any rune essence teleport spot you want, and [[Savant]] will close off possible teleports in order to trap him. After a small cutscene, Savant will summon 15 rangers to assist you, but Solus kills them all with [[Ice Barrage]].

[[File:Wanted! - Fighting Solus.png|thumb|The final battle.]]
Go attack Solus yourself and kill him, and you'll get his [[Solus's hat|hat]]. He's fairly easy as he has been weakened after using such a powerful attack on the Temple Knight rangers. He has no specific [[Combat level]], has 40 [[Hitpoints]] and only uses a weak, but fairly rapid melee attack. After the fight, Savant congratulates you. You are returned to the rune essence teleport location. If you lose Solus's hat, contact Savant for another one. You will lose Solus's hat if your inventory is full at the end of the fight.
"""

[[steps]]
index = 10
name = "Finishing"
links = ["Falador", "Sir Amik Varze", "White Knights' Castle", "drop trick", "White equipment", "Black Knight", "White Knight"]
text = """
Return to [[Falador]]. Talk to [[Sir Amik Varze]] in the [[White Knights' Castle]], and hand over the hat. To keep a hat for after the quest, [[drop trick]] it before talking to him. He'll explain to you about the [[White equipment|new armour]] system and killing [[Black Knight]]s (and [[White Knight]]s).

'''Congratulations, quest complete!'''
"""
