You will need to give these items in more than one trip. Luckily, these items are all easily obtained and most players likely have many of them stored in their bank already. If returning to the bank in East Ardougne and running back to the altar through the mourner's headquarters, you will need to keep your mourner's outfit and new key for each trip. However, you should not need any other supplies, as these trips should be quick enough not to drain your prayer points to 0, and you can pray at the altar on the way back to West Ardougne each time you refill your inventory. If you get rid of Thorgel's list to save an inventory slot, you can ask him for another.

'''{{Colour|red|Warning}}: If you teleport out, make sure you turn the mirror towards the cyan door first!''' Otherwise, you'll lock yourself out and you'll have to go through the [[Underground Pass (dungeon)|Underground Pass]] and enter the Temple of Light via the tunnel inside the dwarf camp. The entry at the dwarf camp is most easily reached from [[Lletya]], which is fairly close to the elven land entrance to the Underground Pass; doing the Underground Pass in reverse to get to the dwarf village is a lot easier. To do this, enter the dungeon first on the elven side, down the well then down to the dwarf camp. The tunnel is located directly south of the main building. It is not marked on the minimap, so it is rather difficult to see.

On your final trip, make sure to bring the [[newly made crystal]] and [[teleport crystal]] instead of an Ardougne teleport.
"""

[[steps]]
index = 11
name = "The power of death"
links = ["catalytic talisman", "death talisman", "Death Altar", "newly made crystal", "Eluned", "Ardougne Diary", "Lletya"]
text = """
[[File:Temple of Light repowered crystal.png|thumb|220px|The temple's safeguard is now restored.]]
Use your [[catalytic talisman]] or [[death talisman]] on the [[Death Altar]] (or equip the tiara equivalents) then use the [[newly made crystal]] that [[Eluned]] repaired for you on it to charge it. (If you have {{SCP|Runecraft|65+|link=yes}}, and you brought a pure essence, make a death rune as well, to complete that step of the [[Ardougne Diary#Hard|hard Ardougne Diary]].) Exit the Death Altar, and then exit the final chamber and make your way to the black crystal that you observed at the beginning of the quest. Use this charged crystal on the black crystal. This will stop people from entering the temple for another thousand years! Go back to [[Lletya]], and talk to Arianwyn for your reward.

'''Congratulations, quest complete!'''
"""
