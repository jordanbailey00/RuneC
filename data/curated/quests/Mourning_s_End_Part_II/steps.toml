[[steps]]
index = 8
name = "==Part 2=="
links = ["Closed chest (fractured crystal, 3 mirrors)", "fractured crystal"]
text = """
[[File:Mourning's End Part II - chest 5 solution - part 2.png|275px|right|thumb|Chest #5, part 2.]]
{{Checklist|
*Cross back across the gap. If you fall, climb back up to the middle floor.
*Remove {{plinkp|Hand mirror}} Mirror #4 from its current position and put it back into your inventory.
*Rotate {{plinkp|Hand mirror}} Mirror #3 to shine the light up.
*Use the south ladder to head to the top floor.
*Place {{plinkp|Hand mirror}} Mirror #4 in the new position on the top floor to shine the light south.
*Place the {{plink|Fractured crystal (Mourning's End Part II)|txt=Fractured crystal|pic=Fractured crystal (horizontal)}}. The light will split in 3.
*Place {{plinkp|Hand mirror}} Mirror #5 to shine the western light down (the longest side should be facing east).
*Place {{plinkp|Hand mirror}} Mirror #6 to shine the southern light east.
*Place {{plinkp|Hand mirror}} Mirror #7 to shine the light down (the longest side should be facing west).
*Climb down the south ladder to the middle floor.
*Climb down the east stairs to the ground floor.
*Where you see a green light coming in from the ceiling, place {{plinkp|Hand mirror}} Mirror #8 to shine the light south.
*Place {{plinkp|Hand mirror}} Mirror #9 to shine the light east.
*Cross the magenta light barrier. You should see a blue light coming in from the ceiling.
*Place {{plinkp|Hand mirror}} Mirror #10 to shine the light north.
*Pass through the yellow light barrier and open the [[Closed chest (fractured crystal, 3 mirrors)|chest]] to obtain 3 mirrors and a second [[fractured crystal]].
}}{{clear}}
"""

[[steps]]
index = 9
name = "=Death Altar Puzzle="
links = ["mourner set", "new key", "Lletya"]
text = """
[[File:Mourning's End Part II - Death Altar solution.png|275px|right|thumb|Death Altar solution.]]
{{Checklist|
*Return to the crystal dispenser and reset the puzzle. You should have 13 mirrors and 5 crystals. You will not need the Cyan crystal for the final puzzle.
*Place {{plinkp|Hand mirror}} Mirror #1 to shine the light north.
*Place {{plinkp|Hand mirror}} Mirror #2 to shine the light down (the longest side should be facing south).
*Use the east stairs to go down to the bottom floor.
*Place {{plinkp|Hand mirror}} Mirror #3 to shine the light west.
*Place the {{plink|Fractured crystal (Mourning's End Part II)|txt=Fractured crystal|pic=Fractured crystal (vertical)}}. The light will split in 3.
*Place {{plinkp|Hand mirror}} Mirror #4 to shine the northern light up.
*Following the southern light, place the {{plink|Fractured crystal (Mourning's End Part II)|txt=Fractured crystal|pic=Fractured crystal (horizontal)}}. The light will split in 3 again.
*Place {{plinkp|Hand mirror}} Mirror #5 to shine the western light up.
*Place {{plinkp|Hand mirror}} Mirror #6 to shine the eastern light up.
*Climb the east stairs to the middle floor.
*To the north, you should see a white light. Place the {{plink|Yellow crystal (Mourning's End Part II)|txt=Yellow crystal}}. The light will turn yellow.
*Climb up the north ladder to the top floor.
*Place {{plinkp|Hand mirror}} Mirror #7 to shine the light west. You should see the light turn red at the pillar to the west.
*Climb down the north ladder to the middle floor.
*Climb up the south ladder to the top floor.
*Place {{plinkp|Hand mirror}} Mirror #8 to shine the green light west.
*Place {{plinkp|Hand mirror}} Mirror #9 to shine the white light west.
*Place {{plinkp|Hand mirror}} Mirror #10 to shine the white light north.
*Cross to the north part of the top floor via the middle stairs.
*Place {{plinkp|Hand mirror}} Mirror #11 to shine the white light west.
*Place the {{plink|Blue crystal (Mourning's End Part II)|txt=Blue crystal}}. The light will turn blue.
*Head to the north-west corner of the map and place {{plinkp|Hand mirror}} Mirror #12 to shine the red light south.
*Place {{plinkp|Hand mirror}} Mirror #13 to shine the light east.
*Head back to the middle stairs, and go down the middle stairs twice to get to the ground floor, beside Mirror #14 which is pre-placed.
*Pass through the cyan light barrier and rotate Mirror #14 to shine the red light west.
*The black barrier to the west in front of the Death Altar should now be white and open.
*'''When you're ready to leave, make sure to turn the light back towards the entrance door, otherwise to get back in here you will have to go through the Underground Pass to get back. (Do note that the route through the Underground Pass does not require a [[mourner set]] nor a [[new key]] so it can be a good option to save some inventory space per trip if entering through the entrance on [[Lletya]])'''
*Pass through to the Death Altar.
}}
"""

