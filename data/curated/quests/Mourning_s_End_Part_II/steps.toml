[[File:Death Altar inside.png|thumb|240px|The Death Altar.]]
After you go through the final door, talk to the dwarf [[Thorgel]]. You will ask each other how you got to the altar, and he will reveal there is a passage from the [[Underground Pass (dungeon)|Underground Pass]] created by him and his companions. You will ask if he knows [[Klank]], after which he will realise you are the one who had slain [[Iban]]. Because of this, he agrees to trade you a [[death talisman]] in return for some supplies.

