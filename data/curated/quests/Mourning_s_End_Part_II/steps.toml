quest = "Mourning's End Part II"
step_count = 12

[[steps]]
index = 0
name = "Entering the temple"
links = ["mourner gear", "chisel", "teleport crystal", "West Ardougne", "food", "armour", "prayer potions", "Arianwyn", "Lletya", "mourner", "Essyllt", "Defence", "Protect from Melee", "Mourner HQ", "new key", "Mourner Tunnels", "Temple of Light", "Dark beast", "Shadow (Temple of Light)", "Edern's Journal", "blackened crystal", "Eluned", "newly made crystal"]
text = """
{{Needed|Full [[mourner gear]], [[chisel]], three free inventory spaces for quest items|recommended=[[teleport crystal|Elf teleport crystal]], teleport to [[West Ardougne]], [[food]] and [[armour]]/[[prayer potions]] to run past high level monsters}}
[[File:Mourning's End Part II - Blackened crystal.png|275px|right|thumb|Map of the area and path to the blackened crystal.]]

Begin by speaking to [[Arianwyn]] in [[Lletya]]. He will tell you to go and stop the [[mourner]]s from excavating under [[West Ardougne]], and that you need a key from [[Essyllt]] to enter the excavation site.

Next, put on your full [[mourner gear]]. Bring a [[teleport crystal]], and some food if you have low [[Defence]] or do not have {{SCP|Prayer|43|link=yes}} for [[Protect from Melee]]. Also, bring a [[chisel]]. Go to the basement of the [[Mourner HQ]] in West Ardougne, and talk to [[Essyllt]].

He will give you a [[new key]] to the nearby [[Mourner Tunnels|tunnels]] that they dug to the [[Temple of Light]]. He will ask you to find the digging team. Leave the head mourner's room and open the door on the west wall. Go into the tunnel. You will see level 182 [[Dark beast]]s.

Run past them to the west whilst praying Protect from Melee, to reach the temple entrance. You'll see a cutscene showing the digging team; shortly thereafter, you may be attacked by level 73 [[Shadow (Temple of Light)|shadows]]. Search the corpse of the guard slumped against the northern wall to get [[Edern's Journal]].

From there, go west and enter the [[Temple of Light]].
{{Checklist|
*Take the set of stairs just west of the entrance to the middle floor.
*Take the ladder built into the south wall to the top floor.
*Cross to the northern part of the top floor via the middle stairs.
*Head east to the blackened crystal.
*Use your chisel on the crystal to break off a piece of [[blackened crystal]].
}}

Teleport to Lletya, and go back to Arianwyn. He will summon [[Eluned]], who will enchant the black crystal in your inventory into a [[newly made crystal]]. It will be used at the end of the quest. Talk to Arianwyn again; then, you will need to prepare for a long and potentially frustrating puzzle. If you end up losing your crystal you can acquire a new one from Arianwyn.
"""

[[steps]]
index = 1
name = "The light puzzles"
links = ["mourner gear", "new key", "rope", "catalytic talisman", "catalytic tiara", "death talisman", "death tiara", "newly made crystal", "Weight-reducing clothing", "Prayer items", "Maple blackjack(d)", "Shadow (Temple of Light)", "Prayer potion", "stamina potion", "food", "summer pie", "agility potion", "pure essence", "Hard Ardougne Diary", "Runecraft", "Mourner gear", "Newly made crystal"]
text = """
{{Needed|Full [[mourner gear]], the [[new key]], one [[rope]]. If you're planning to complete the puzzles in a single trip, bring a [[catalytic talisman]]/[[catalytic tiara]]/[[death talisman]]/[[death tiara]], and the [[newly made crystal]] too. One teleport out. Two or more free inventory spaces|recommended=[[Weight-reducing clothing]], high [[Prayer items|Prayer bonus]] gear and a weapon; or high-defence armour and a weapon (for players using high-defence armour, a [[Maple blackjack(d)]] switch provides cheap additional crush defence against the [[Shadow (Temple of Light)|Shadow]]'s attacks), [[Prayer potion]]s (highly recommended), [[stamina potion]]s, [[food]], [[summer pie]]s/[[agility potion]]s, [[pure essence]] (needed for [[Hard Ardougne Diary]] if you have 65 [[Runecraft]])}}

If you want to attempt the puzzle in one trip, bring the [[Mourner gear|mourner clothing]], the [[new key]], the [[Newly made crystal|crystal]], and a catalytic/death talisman as well as your rope. As you progress through the puzzle you will need an increasing number of inventory spaces free in order to hold the mirrors and crystals which are used in the puzzle, which you will have naturally as you consume prayer potions and food. Alternatively, if you are lacking inventory space, you can pick up only some of the mirrors and crystals and go back and get more. You will need 4 inventory spaces for the first steps of the puzzle, increasing to 13 inventory spaces open for the last step of the puzzle. You may freely bank at any time, especially between the completion of each puzzle. If you leave in the middle of a puzzle, the puzzle will be unchanged when you return. However, you cannot bank the mirrors and crystals received in the temple, so it is not recommended.

If you're having trouble rotating mirrors while under attack, you can press 1 to rotate the mirror as soon as the dialogue comes up, if on PC—this should give you one or two rotation attempts between each attack.
"""

[[steps]]
index = 2
name = "=Chest #1="
links = ["Temple of Light", "new key", "Essyllt", "yellow crystal", "Wall support (Temple of Light)", "Closed chest (cyan crystal, 2 mirrors)", "cyan crystal"]
text = """
[[File:Mourning's End Part II - chest 1 solution.png|275px|right|thumb|Chest #1 solution.]]
{{Checklist|
*Go back to the [[Temple of Light]].
*Take the stairs just west of the entrance up to the middle floor.
*Head to the area indicated by the rope on the guide map and use your rope on the rocks to free up 1 inventory space. This space is safe.
*Drop your [[new key]] to free up a second inventory space. You can re-obtain this key from [[Essyllt]] if needed.
*Head to the area marked with mirror #1 just east of the stairs.
*Pull on the crystal dispenser and reset the puzzle.
*Click on the crystal dispenser again to obtain four mirrors and a [[yellow crystal]].
*Place {{plinkp|Hand mirror}} Mirror #1 to shine the light north.
*Place {{plinkp|Hand mirror}} Mirror #2 to shine the light west.
*Place {{plinkp|Hand mirror}} Mirror #3 to shine the light south.
*Place the {{plink|Yellow crystal (Mourning's End Part II)|txt=Yellow crystal}} at the next junction. The light will turn yellow.
*Place {{plinkp|Hand mirror}} Mirror #4 to shine the light east over the gap.
*Cross the gap to the other side using the [[Wall support (Temple of Light)|wall supports]] on the south side. If you fall, climb up the east stairs and try again. If your agility level is under 75, expect to fail many times before succeeding. If you brought a summer pie, use it now to boost your agility level. 
*Pass through the blue light barrier and open the [[Closed chest (cyan crystal, 2 mirrors)|chest]] to obtain 2 mirrors and a [[cyan crystal]].
}}{{clear}}
"""

[[steps]]
index = 3
name = "=Chest #2="
links = ["Closed chest (2 mirrors)"]
text = """
[[File:Mourning's End Part II - chest 2 solution.png|275px|right|thumb|Chest #2 solution.]]
{{Checklist|
*Return to the crystal dispenser and reset the puzzle. You should have 6 mirrors and two crystals.
*Place {{plinkp|Hand mirror}} Mirror #1 to shine the light north.
*Place {{plinkp|Hand mirror}} Mirror #2 to shine the light west.
*Place the {{plink|Cyan crystal (Mourning's End Part II)|txt=Cyan crystal}} at the next junction. The light will turn cyan.
*Place {{plinkp|Hand mirror}} Mirror #3 to shine the light north.
*Place {{plinkp|Hand mirror}} Mirror #4 to shine the light east.
*Place the {{plink|Yellow crystal (Mourning's End Part II)|txt=Yellow crystal}} at the next junction. The light will turn green.
*Pass through the magenta light barrier and open the [[Closed chest (2 mirrors)|chest]] to obtain 2 mirrors.
*Do NOT reset the puzzle.
}}{{clear}}
"""

[[steps]]
index = 4
name = "=Chest #3="
links = ["Closed chest (fractured crystal, 2 mirrors)", "fractured crystal"]
text = """
[[File:Mourning's End Part II - chest 3 solution.png|275px|right|thumb|Chest #3 solution.]]
{{Checklist|
*Head back west from Chest #2 and pick up the {{plink|Yellow crystal (Mourning's End Part II)|txt=Yellow crystal}} from the pillar, putting it back into your inventory. The light will now be cyan.
*At the same pillar, place {{plinkp|Hand mirror}} Mirror #5 to shine the light up to the top floor.
*Climb up the nearby north ladder to the top floor.
*Place {{plinkp|Hand mirror}} Mirror #6 to shine the light west. You should see the light turn blue as it passes through the pillar to the west.
*Climb down the north ladder to the middle floor.
*Head to the south ladder and climb up to the top floor.
*Head to the north-west corner of the map.
*Place {{plinkp|Hand mirror}} Mirror #7 to shine the light down. Its longest side should be on the east.
*Climb down the south ladder to the middle floor.
*Climb down the east stairs to the bottom floor.
*Head to the north-west corner of the map. Mirror #8 is pre-placed, meaning that you can pass through the yellow barrier.
*Turn Mirror #8 to pass through the second yellow barrier.
*Open the [[Closed chest (fractured crystal, 2 mirrors)|chest]] to obtain 2 mirrors and a [[fractured crystal]].
*Do NOT reset the puzzle.
}}{{clear}}
"""

[[steps]]
index = 5
name = "=Chest #4="
links = ["Closed chest (blue crystal)", "blue crystal"]
text = """
[[File:Mourning's End Part II - chest 4 solution.png|275px|right|thumb|Chest #4 solution.]]
{{Checklist|
*You will be using the rope shortcut for this chest. Make sure you have placed your rope as described in [[#Chest #1|Chest #1]].
*From Chest #3, go back to Mirror #8 and rotate it so you can exit east. Then climb the east stairs to get to the middle floor.
*Pick up the {{plink|Cyan crystal (Mourning's End Part II)|txt=Cyan crystal}} from the pillar between Mirrors #2 and #3, putting it back into your inventory. The light will now be white.
*At the same pillar, place the {{plink|Yellow crystal (Mourning's End Part II)|txt=Yellow crystal}}. The light will now be yellow.
*Climb up the south ladder to the top floor.
*Head to the north-west corner of the map.
*Rotate Mirror #7 to shine the light south. This light should be red.
*Run all the way south, then place {{plinkp|Hand mirror}} Mirror #8 to shine the light down (rotate the mirror so the longest side is facing north). Note, this is a different Mirror #8 to the one from chest 3.
*Climb down the south ladder to the middle floor.
*Use the rope shortcut to reach the bottom floor.
*Mirror #9 is pre-placed, meaning that you can pass through the cyan barrier.
*Open the [[Closed chest (blue crystal)|chest]] to obtain a [[blue crystal]].
}}{{clear}}
"""

