quest = "Mourning's End Part I"
step_count = 6

[[steps]]
index = 0
name = "Starting the quest"
links = ["Eluned", "Roving Elves", "Lletya", "Arianwyn", "mourner", "West Ardougne", "Iorwerth", "Prifddinas", "Arandar", "teleport crystal", "Mourning's End Part II", "Hard Western Provinces Diary"]
text = """
[[File:Eluned chathead.png|left]]
Talk to [[Eluned]], who teleports between three different locations. Refer to the map on the [[Roving Elves]] quest page for these locations. You may travel to any of them and then switch worlds to find her.

She will lead you to the rebel elven outpost [[Lletya]]. Talk to [[Arianwyn]], the leader of the elves in this outpost. He will reveal to you that the [[mourner]]s in [[West Ardougne]] are really [[Iorwerth]] elves from [[Prifddinas]], and that it is your job to uncover their evil plot. He will tell that these mourners frequently cross the overpass of [[Arandar]] between the elven capital and West Ardougne, allowing you to easily ambush one there. Arianwyn then gives you a [[teleport crystal]] that allows you to teleport back to Lletya.

This crystal contains charges, with one being consumed per teleportation. It starts with four charges. If the crystal is used efficiently, this will be enough teleports for both this quest and [[Mourning's End Part II|Part II]]. [[Eluned]] is able to grant it three charges whenever it becomes uncharged, or five charges if the [[Hard Western Provinces Diary]] is completed. She charges a maximum of 750 coins for this service, although you would have to find her again first.
"""

[[steps]]
index = 1
name = "Obtaining mourner gear"
links = ["Arandar", "Bucket of water", "silk", "bear fur", "Weapon", "food", "necklace of passage", "ring of dueling", "Taverley", "House teleport", "Balloon network", "Falador teleport", "teleport crystal", "Outpost", "mourner", "Hitpoints", "Nightmare Zone", "pool of refreshment", "Ferox Enclave", "Fancy rejuvenation pool", "ornate rejuvenation pool", "player-owned house", "Magic shortbow", "bones", "Gas mask", "Bloody mourner top", "Ripped mourner trousers", "Mourner boots", "Mourner gloves", "Mourner cloak", "Mourner letter", "Tegid", "Tegid's soap", "Thieving", "bucket of water", "mourner top", "Lletya", "Oronwen", "dyes", "red dye", "yellow dye", "green dye", "blue dye"]
text = """
[[File:Arandar.png|thumb|right|The northern entrance to the [[Arandar]] pass.]]
{{Needed|[[Bucket of water]], 2 [[silk]], [[bear fur]] and 7 empty inventory spaces.|recommended=[[Weapon]], [[food]] (if low combat stats), [[necklace of passage]], [[ring of dueling]], Fast travel to [[Taverley]] ([[House teleport]], [[Balloon network]], [[Falador teleport]]), and a [[teleport crystal]]}}

Head towards the entrance of [[Arandar]]. The fastest way is by travelling with the [[necklace of passage]] to the [[Outpost]], then walking westwards. There, kill a level-11 [[mourner]] to obtain their outfit. Right before you land your first hit, they will always attempt to throw a potion that reduces your combat stats to 20, including your [[Hitpoints]]. Stats reduced this way cannot be instantly restored with a potion. However, they may be restored by entering the [[Nightmare Zone]], with the [[pool of refreshment]] in the [[Ferox Enclave]], or the [[Fancy rejuvenation pool|fancy]] or [[ornate rejuvenation pool]] in the [[player-owned house]]. It is possible to kill the mourner without having your stats reduced, if you initiate combat with a weapon that can either 1-hit kill it, or hits multiple times at once to add up enough damage to kill it. For example, a spec attack from a [[Magic shortbow]] is one possible method.

You will need everything that the mourner drops, excluding their [[bones]] and the broken glass:

*[[Gas mask]]
*[[Bloody mourner top]]
*[[Ripped mourner trousers]]
*[[Mourner boots]]
*[[Mourner gloves]]
*[[Mourner cloak]]
*[[Mourner letter]]

Because the top is covered in blood, you will first have to clean it before it can be worn. Go to [[Taverley]] and talk with the druid [[Tegid]], who is doing his laundry by the lake. He will however refuse to lend you his [[Tegid's soap|soap]]. Therefore, you must steal it from his laundry basket (with level 50 [[Thieving]]). While holding a [[bucket of water]], use the soap on the bloody mourner top to [[mourner top|clean]] it. Tegid's soap is no longer required after this point, so you may drop it or deposit it in the bank as a souvenir to save an inventory spot.

Travel to [[Lletya]], optimally with the [[teleport crystal]], to repair the pair of trousers. Talk to the elven seamstress [[Oronwen]], who will be able to repair the trousers if provided with a [[bear fur]] and two [[silk]]. You may also purchase the required [[dyes]] ([[red dye|red]], [[yellow dye|yellow]], [[green dye|green]], and [[blue dye|blue]]) from her if you haven't acquired them yet.
"""

[[steps]]
index = 2
name = "Infiltrating the headquarters"
links = ["Mourner letter", "mourner gear", "feather", "magic logs", "leather", "toad crunchies", "premade t'd crunch", "Mourner Headquarters", "West Ardougne", "trapdoor (Mourner Headquarters)", "mourner", "Essyllt", "Gnome (Mourner Headquarters)", "broken device", "tarnished key", "fixed device", "swamp toad"]
text = """
{{Needed|[[Mourner letter]], the full [[mourner gear]], [[feather]], [[magic logs]], [[leather]], [[toad crunchies]] or [[premade t'd crunch]], and 2 empty inventory spaces.}}
Wearing the full [[mourner gear]], you may enter the [[Mourner Headquarters]] in [[West Ardougne]], located in the north-east corner of the city. Enter the basement via the [[trapdoor (Mourner Headquarters)|trapdoor]] in the north-western corner, where you will find level-108 [[mourner]]s and their commander, [[Essyllt]]. Speak with him to show him your letter, and he welcomes you aboard.

Essyllt will explain to you that their job is to keep the people of Ardougne believing in the plague. One of their ways of doing it involved dyeing Farmer Brumty's sheep. However, their colour is starting to vanish and they will need to be redyed, a task he assigns you to do. Normally, they use a gnomic device to dye them unseen from a distance, however it has broken down and the [[Gnome (Mourner Headquarters)|gnome tinkerer]] refuses to tell the elves how to repair it. The elf allows you to interrogate the gnome and hands you the [[broken device]] and a [[tarnished key]] to the torture chamber.

Speak with this gnome in the adjacent room to learn about the variety of torture methods the elves already tried on him. He will accidentally spill that he is vulnerable to having his feet tickled and that he craves for some [[toad crunchies]], and then realises his mistake. Repeat what he said back to him. {{Chat option|3 You talked about toad crunchies and being tickled}}

Then ''use'' a [[feather]] on the gnome to tickle him while having the toad crunchies or a [[premade t'd crunch]] in your inventory. Make sure to '''not''' give him the toad crunchies before tickling him, or you will need new ones. The gnome will beg you to stop. Get him off the rack so he may fix the broken device, if you provide him with [[magic logs]] and [[leather]]. He will then hand you a [[fixed device]]. Talk with him again to ask him about the ammunition needed, which turns out to be dyed [[swamp toad]]s that gruesomely explode when launched from the device.
"""

[[steps]]
index = 3
name = "Sheep"
links = ["Fixed device", "red dye", "blue dye", "yellow dye", "green dye", "ogre bellows", "Feldip hills", "Feldip hills teleport", "fairy rings", "ring of dueling", "Big Chompy Bird Hunting", "Sheep Herder", "quest", "Ardougne", "fixed device", "Combat Options", "Essyllt"]
text = """
[[File:Fixed device aim.png|thumb|200px|The aim and fire interface.]]
{{Needed|[[Fixed device]], [[red dye]], [[blue dye]], [[yellow dye]], [[green dye]] and an [[ogre bellows]].}}
{{Map|align=right|mtype=pin|caption=Location of the sheep.
|2609,3389,title:Location of the yellow sheep,icon:yellowPin,desc:
|2620,3368,title:Location of the green sheep,icon:greenPin,desc:
|2608,3346,title:Location of the red sheep,icon:redPin,desc:
|2569,3383,title:Location of the blue sheep,icon:bluePin,desc:
}}
These toads can be found in the [[Feldip hills]]. You may easily reach this location with a [[Feldip hills teleport]] or by travelling with [[fairy rings]] to {{Fairycode|AKS}}. Alternatively, they can be found south of Castle Wars, easily accessible with a [[ring of dueling]] or by travelling with [[fairy rings]] to {{Fairycode|BKP}}.

Similar to how you have captured the toads during the [[Big Chompy Bird Hunting]] quest, you will require an [[ogre bellows]]. However, instead of filling it with swamp gas, you need to '''''use''''' dye on it. Using a dyed ogre bellows on a swamp toad results in an inflated toad of that colour. Inflate at least one toad in each of the four colours (for safety you can use extra dyes get multiple toads in each colour, as the toad will be used up if you miss during the next step), and then travel to the coloured sheep from the [[Sheep Herder]] [[quest]] north of [[Ardougne]].

Use one of the coloured toads on the [[fixed device]], and then wield the device. When near the flock of sheep in that colour, select ''Aim and Fire'' in [[Combat Options]], and aim the crosshair at any of the sheep in the flock. Shoot by pressing the red button in the centre of the crosshair. Successfully hitting one will coat the entire flock of sheep. 

Repeat the process for the other three colours. When finished, return to [[Essyllt]].
"""

[[steps]]
index = 4
name = "Another favour"
links = ["mourner gear", "barrel of naphtha", "coal", "Biohazard", "rotten apple", "Mourner Headquarters", "Elena", "Plague City", "East Ardougne", "sieve", "apple orchard", "Combat Training Camp", "barrel", "rotten apple pile", "rotten apples", "apple press", "apple barrel", "Tyras Camp", "Coal Tar", "Isafdar", "barrel of coal tar", "Chemist", "Rimmington"]
text = """
{{Needed|Full [[mourner gear]] and a [[barrel of naphtha]] (or at least 10 [[coal]] to make the barrel).}}
Essyllt will tell you that someone has [[Biohazard#Infiltrating the Mourner HQ|poisoned their stew]] recently, causing them to get plague-like symptoms. He will want to apply these symptoms on some of the citizens to stimulate the rumour of the plague. You will need to reproduce the poison.

Take a [[rotten apple]] north-west of the [[Mourner Headquarters]]. Rotten apples from elsewhere will not work. Go to [[Elena]], the scientist you rescued during [[Plague City]]. Her house is north-west in [[East Ardougne]]. Ask her for help, and she will reluctantly give in. Continue talking to her and hand her the apple, eventually she hands you a [[sieve]] that you will need later.

[[File:Mashing apples.png|thumb|200px|Mashing the rotten apples.]]
Travel to the [[apple orchard]], located directly west of the [[Combat Training Camp]], a short distance north-west from Elena's house. In the orchard, take a [[barrel]] and use it on a [[rotten apple pile]]. Then, use the barrel of [[rotten apples]] on the [[apple press]]. You will elegantly mash them up into an [[apple barrel]].

You will now require a [[barrel of naphtha]]. If you already have one, skip to the ''[[#Poisoning the Food|Poisoning the Food]]'' section.

[[File:Regicide - Coal tar location.png|thumb|left|200px|The location to obtain the coal-tar.]]
You now need to add a solvent to make the poison nonlethal and undetectable. Take another barrel from the apple orchard or [[Tyras Camp]], and use it on the [[Coal Tar|coal tar swamp]] south of [[Isafdar]] to get a [[barrel of coal tar]]. Then, gather at least 10 regular [[coal]] and go to the [[Chemist]]'s house in [[Rimmington]].

Follow these simple steps to obtain a barrel of naphtha:
#Rotate the tar regulator clockwise twice to make the tar flow at its maximum. The 'pressure' indicator on the left should go up.
#When the pressure enters the green region, rotate the pressure valve clockwise once to let out some pressure. This should stall the pressure indicator.
#Start adding coal. This raises the 'heat' indicator on the right. If it is below the green region, add more coal. If it is above, do not add coal until it gets lower.
#If the heat reading reaches the dark orange portion, you have spoiled your compound and must start again; although the coal is wasted, it can be redone with the same barrel of tar.
#If you run out of coal, your progress will be saved. This means you do not have to re-set the pressure or re-add coal to it.

When the green bar on the bottom is full, stop adding coal and close the window to replace your barrel of coal tar with a barrel of naphtha.
"""

[[steps]]
index = 5
name = "Poisoning the food"
links = ["mourner gear", "barrel of naphtha", "apple barrel", "sieve", "Teleport crystal", "naphtha apple mix", "toxic naphtha", "range", "toxic powder", "Mourner Headquarters", "West Ardougne", "Civic Office of West Ardougne", "manhole (West Ardougne)", "West Ardougne General Store", "Temple of Light", "Essyllt", "Lletya", "teleport crystal", "Arianwyn"]
text = """
{{Needed|Full [[mourner gear]], [[barrel of naphtha]], [[apple barrel]] and the [[sieve]].|recommended=[[Teleport crystal]].}}
Use the [[barrel of naphtha]] on the [[apple barrel]] to get a [[naphtha apple mix]]. Then, use your [[sieve]] on it to obtain a barrel of [[toxic naphtha]].  The sieve is no longer needed after this point. After first ensuring that you have two free inventory slots, cook this product on a [[range]] in order to turn it into two heaps of [[toxic powder]] (there is a range inside the [[Mourner Headquarters]]). It must be a range, '''do not''' use a fire! Once the toxic powder is made, you no longer need the empty barrels.

Place the powder on any two of the three sack of grain locations in [[West Ardougne]]. These are found inside the [[Civic Office of West Ardougne|office]] north of the [[manhole (West Ardougne)|manhole]], just outside the [[West Ardougne General Store|general store]], and inside the church.

Go back to Essyllt once more, who will now trust you enough to disclose secret information. Their plan is to delve into the mountains, with the help of enslaved citizens of West Ardougne, under the pretext they fell victim to the plague. They will make a tunnel towards the [[Temple of Light]], to make it easier to resurrect their "Dark Lord".

After talking to [[Essyllt]], head back to [[Lletya]] ([[teleport crystal]]) and talk to [[Arianwyn]] to complete the quest.

'''Congratulations, quest complete!'''
"""
