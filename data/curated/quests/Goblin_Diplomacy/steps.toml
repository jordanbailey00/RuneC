quest = "Goblin Diplomacy"
step_count = 4

[[steps]]
index = 0
name = "Getting started"
links = ["General Bentnoze", "General Wartface", "Goblin Village", "Asgarnia", "Falador", "Taverley", "goblin"]
text = """
Talk to [[General Bentnoze]] or [[General Wartface]] in [[Goblin Village]], in the Kingdom of [[Asgarnia]] (located north of [[Falador]], and east of [[Taverley]]). They will say that the [[goblin]] race is on the brink of civil war over armour colour, and they want their armour to be orange which is different to their normal colour.
"""

[[steps]]
index = 1
name = "Gathering the required items"
links = ["Goblin mail", "Grubfoot", "Draynor Village", "goblin", "Goblin Village", "Wyson", "Falador Park", "woad leaves", "onion", "Rimmington", "Lumbridge", "Farmer Fred", "redberries", "Wydin's Food Store", "Port Sarim", "Varrock", "South-east Varrock mine"]
text = """
'''''<u>Skip this subsection if you already have the items required.</u>'''''

Ask the generals where you can get orange armour. Eventually, one will answer that you can dye [[Goblin mail]] orange. [[Grubfoot]] will mention he stole yellow dye from a witch in [[Draynor Village]], and mentions you may be able to find it there. One of the generals will mention you can find goblin mail in three different crates around the village.
Grab the suits of goblin mail from the following crates:
*Behind the generals' hut in a crate.
*Inside the western hut in between the small square hut and the generals' hut.
*Up a ladder near the gate to the goblin village.
''Note: DO NOT dye 3 pieces of armour. You only want 1 blue and 1 orange. Leave one plain. If you mistakenly paint an armour you won't get new ones from the crates.''

Alternatively, goblin mail can be obtained as a drop from killing [[goblin]]s. The goblins in [[Goblin Village]] drop red or green goblin mails, which can be dyed, but you will need one uncoloured one from a standard goblin. You can go up the only ladder in the goblin village, up there will be some crates, search them to find a brown goblin mail.

[[Wyson]] the head gardener in [[Falador Park]] will sell you the needed [[woad leaves]]. Ask him if you can buy some. When you do, he'll ask how much you are willing to pay. Say, "<u>About 20 coins</u>," and he'll say you are generous and will give you two woad leaves. This is the cheapest option.

Two [[onion]]s can easily be picked from the field just north of [[Rimmington]], or alternate places such as [[Lumbridge]], in the backyard of [[Farmer Fred]]'s farm, which is next to the sheep paddock.

Three [[redberries]] can be purchased from [[Wydin's Food Store]] in [[Port Sarim]] for 3 coins each or picked west of [[Varrock]]'s [[South-east Varrock mine|south-east mine]].
"""

[[steps]]
index = 2
name = "Making the dyes"
links = ["Orange dye", "Blue dye", "Aggie", "Draynor Village", "yellow dye", "red dye"]
text = """
'''''<u>Skip this subsection if you already have [[Orange dye]] and [[Blue dye]].</u>'''''

You need to make orange dye and blue dye from the components you gathered in the previous section. Take the supplies to [[Aggie]] in [[Draynor Village]], and have her make one [[yellow dye|yellow]], one [[red dye|red]], and one blue dye. To make orange dye, use the yellow dye and red dye on each other in your inventory. Note: dying Yellow Goblin Mail with red dye makes Red Goblin Mail (and vice versa), so make sure you mix the dyes before using them!
"""

[[steps]]
index = 3
name = "The generals' verdict"
links = ["Goblin mail", "Goblin Village", "Grubfoot"]
text = """
[[File:Goblin Diplomacy - Grubfoot cutscene.png|thumb|Grubfoot trying the orange goblin mail.]]
Dye one [[Goblin mail]] orange, one blue, and leave the last one unaltered.

Go back to [[Goblin Village]], and give the orange goblin mail to the generals. They will have [[Grubfoot]] try it on, and say they do not like it. They will ask for blue armour. Give them the blue goblin mail. Again, they will have Grubfoot try it on, and again, it is rejected. They now want brown. Give them the plain brown goblin mail. Grubfoot tries it on for the last time. They decide that the original colour, brown, is best after all.

'''Congratulations, quest complete!'''
"""
