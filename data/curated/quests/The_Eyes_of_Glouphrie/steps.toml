[[steps]]
index = 0
name = "Starting out"
links = ["Brimstail's cave", "Spirit Tree", "Tree Gnome Stronghold", "Brimstail", "singing bowl", "machine panel", "Oaknock's exchanger", "Oaknock's Machine", "Hazelmere", "Yanille", "fairy ring", "Watchtower Teleport", "Nightmare Zone", "minigame teleport"]
text = """
{{Map|x=2402|y=3419|r=4|mtype=square|caption=[[Brimstail's cave]] entrance.|align=right|width=250|height=250}}
[[File:Brimstail chathead.png|left]]
Head south-west from the [[Spirit Tree]] in [[Tree Gnome Stronghold]] until you see a dungeon entrance marker near the edge of a small lake. Enter the cave, and speak to [[Brimstail]]. Ask him about the cute creature wandering around, and then agree to let him tell you about his research. He will offer to tell you some history - agree and say that you love a bit of history (the second option does not work to skip the dialogue). You will then be given the option to start the quest.

Brimstail will ask you to go into the next room and look at it carefully.  First, ''Inspect'' the [[singing bowl]] set in the centre of the cave and surrounded by a black circular pothole. Next, ''Inspect'' the [[machine panel]] next to [[Oaknock's exchanger]]. Then, ''Unlock'' [[Oaknock's Machine]]. After completing these three actions, '''in that order''', talk to Brimstail again.

Talk to Brimstail again, and he will tell you to go and talk to [[Hazelmere]]. '''Fully finish the dialogue or Hazelmere will not be understood later on.''' Hazelmere is located on the island chain east of [[Yanille]], there is also a [[fairy ring]] directly beside his hut code {{Fairycode|CLS}}. You can also use the [[Watchtower Teleport]] spell and run east. Another way to reach him is by using the [[Nightmare Zone]] [[minigame teleport]] and running south-east.
"""

[[steps]]
index = 1
name = "Memories"
links = ["Hazelmere", "Yanille", "Magic", "cutscene", "gnomes", "goblin", "King Healthorg", "Oaknock", "Glouphrie", "Argento", "Gnome Stronghold", "violet pentagon"]
text = """
Speak to [[Hazelmere]], located east of [[Yanille]]. There's a long conversation, and he will get inside your mind where you can now talk to him. This requires 46 [[Magic]] and '''cannot''' be boosted. A long [[cutscene]] will follow showing the battle between the [[gnomes]] and [[goblin]]s, with [[King Healthorg]], [[Oaknock]], [[Glouphrie]] and Hazelmere fighting alongside. Glouphrie uses his magic to scare away the goblins, and later uses his magic to cover up [[Argento]]'s death. Oaknock then builds a machine that reverses Glouphrie's magic, revealing that Argento is actually dead to the King. The King, unable to trust Glouphrie, banishes him from the [[Gnome Stronghold|Stronghold]], which Glouphrie isn't happy about. Hazelmere will then give you a [[violet pentagon]] for the machine.

