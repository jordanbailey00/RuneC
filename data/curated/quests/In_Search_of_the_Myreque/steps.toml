quest = "In Search of the Myreque"
step_count = 5

[[steps]]
index = 0
name = "Starting out"
links = ["Vanstrom Klause", "Hair of the Dog", "Canifis", "the Myreque", "vampyres", "Mort'ton"]
text = """
Speak to [[Vanstrom Klause]], the man sat down in the north-east corner of the [[Hair of the Dog]] tavern in [[Canifis]]. He wants you to deliver some weapons to [[the Myreque]], a group of rebels fighting against the [[vampyres]] that rule over Morytania. If you agree to help Vanstrom, he will also tell you about a boatman in [[Mort'ton]] who is rumoured to be able to show you the Myreque hideout.
"""

[[steps]]
index = 1
name = "Convincing Cyreg Paddlehorn"
links = ["Druid pouch", "Silver sickle (b)", "plank", "hammer", "steel nails", "combat gear", "Skeleton Hellhound", "coins", "ring of charos (a)", "steel longsword", "steel sword", "steel mace", "steel warhammer", "steel dagger", "inventory", "Shades of Mort'ton", "Mort'ton", "Mort myre fungus", "Fairy ring", "Agility", "Cyreg Paddlehorn", "the Myreque", "druid pouch", "The Hollows"]
text = """
{{Map|align=right|name=Cyreg Paddlehorn|x=3519|y=3284|r=3|mtype=square|caption=Cyreg's location, east of Mort'ton.|width=250|height=250}}
{{Needed|[[Druid pouch]] (must have 5 charges), [[Silver sickle (b)|blessed silver sickle]] (if refilling the pouch), 6  [[plank|normal plank]]s, a [[hammer]], 225 [[steel nails]], [[combat gear]] (for level 97 [[Skeleton Hellhound]]), 10 [[coins]] or [[ring of charos (a)]], [[steel longsword]], 2 [[steel sword]]s, [[steel mace]], [[steel warhammer]], [[steel dagger]] (all the steel weapons must be held in your [[inventory]] at the same time). You will also need the planks, unless you have completed the [[Shades of Mort'ton]] quest and opened the general store}}

Go to [[Mort'ton]]. You can walk on foot, but beware that the ghasts on the way will drain charges from your [[Druid pouch]] - you may consider taking six [[Mort myre fungus]] in your inventory so you can refill the pouch when you arrive. If you've unlocked [[Fairy ring|fairy rings]] and have at least 50 [[Agility]], you may skip the Mort Myre Swamp using the fairy ring west of Canifis and entering {{fairycode|bip}}, then using the agility shortcut to arrive south of the swamp.

Find [[Cyreg Paddlehorn]]. He is located on the eastern edge of Mort'ton, near his boat at the bridge leading to the Barrows. Attempt to persuade him to bring you to [[the Myreque]]. Cyreg will be very secretive about how to find them though, so you will have to choose the correct sequence of responses to make him feel guilty in order for him to allow you to use his boat. The steel weapons must all be in the inventory to continue dialogue. Choose the following responses in this order:
#''Well, I guess they'll just die without weapons... (2)''
#''Resourceful enough to get their own steel weapons? (2)''
#''If you don't tell me, their deaths are on your head! (3)''
#''What kind of man are you to say that you don't care? (3)''

He will decline to take you himself, but will allow you to rent his boat provided you prove that you have some defence against the ghasts. He will also request 3 planks to fix his boat and 3 to fix a bridge. The player will show him the [[druid pouch]] with at least five charges. Give him the planks and he will give you directions to the hideout. Finally board the boat to travel to [[The Hollows]]; A [[ring of charos (a)]] may be used to avoid paying the 10 gold to rent the boat.

'''Note''': Do not repair the bridge in the next section before you've followed the prior steps, or you will need to do so again.
"""

[[steps]]
index = 2
name = "Myreque"
links = ["The Hollows", "ghast", "Rope bridge (The Hollows)", "steel nails", "plank", "Curpile Fyod", "the Myreque", "Veliaf Hurtz", "Skeleton Hellhound"]
text = """
[[File:In Search of the Myreque - Bridge repair.png|thumb|250px|Repairing the rope bridge.]]
{{Map|3509,3448|align=right|width=250|height=250|mtype=square|r=3|caption=Location of the doors leading into the Myreque's hideout.}}
Once you land at [[The Hollows]], go north, avoiding the [[ghast]]s, until you see a strange tree. Climb up to see a damaged [[Rope bridge (The Hollows)|rope bridge]]. Mend the bridge as you walk along, which requires 75 [[steel nails]] per [[plank]] (225 steel nails total) and three [[plank]]s, and then climb down the other side of the bridge.

Go north to the strange-looking hollow tree and talk to [[Curpile Fyod]] out front. Tell him you've brought the weapons for [[the Myreque]] and then answer some questions for him to prove that you are indeed telling the truth. 
Here are the answers to the possible questions:
{| class="wikitable"
!Question
!Answer
|-
|'' Name the only female member of the Myreque.''||Sani Piliu
|-
|''Who is the leader of the Myreque in Mort Myre?''||Veliaf Hurtz
|-
|''What is the name of the boatman who helps the Myreque?''||Cyreg Paddlehorn
|-
|''Which member of the Myreque was originally a scholar?''||Polmafi Ferdygris
|-
|''Who is the youngest member of the Myreque?''||Ivan Strom
|-
|''What vampyre family rules over Morytania?''||Drakan
|}

'''Note''': If you fail to answer the questions correctly, you will be knocked unconscious and wake up at the boat again, but luckily the bridge will still be intact and your druid pouch will not need the full five charges to re-board the boat.

When you have correctly answered the guard's questions, circle around his tree to the north, and the set of doors in the earth there will be unlocked. Enter and proceed to follow the path to the north west. Halfway up there is an eastern alcove. In the south eastern corner there is a hidden cave entrance - click on the wall to enter (you can rotate your camera to see the entrance).

First speak to [[Veliaf Hurtz|Veliaf]], and he will ask you to introduce yourself to the other five members. Initiate a conversation with each member - it isn't necessary to actually ask any questions of them to continue the quest, just say, "I'll be back later", and then talk to another one.

'''Note''': Combat with the [[Skeleton Hellhound]] will begin immediately after you talk to Veliaf, read the next section to read tips on the fight.

Go back and talk to Veliaf again about the weapons, and he will accept them. However...
"""

[[steps]]
index = 3
name = "Vanstrom Klause"
links = ["cutscene", "vampyre", "Vanstrom Klause", "Sani Piliu", "Harold Evans", "Skeleton Hellhound", "the Myreque", "safespot", "Magic", "Earth spells", "Hitpoints", "food", "Protect from Melee", "fairy ring", "Canifis"]
text = """
As you give the weapons, a [[cutscene]] ensues where a strange mist envelopes the room, and Veliaf realises that it is a [[vampyre]]. The mist shifts, revealing [[Vanstrom Klause]], the stranger you were trying to help. He transforms into his vampyre form and kills [[Sani Piliu]] and [[Harold Evans]] with Blood Burst. After performing the murders, Vanstrom disappears, before summoning a level 97 [[Skeleton Hellhound]], his "little gift" to finish off the remaining members. In order to regain [[the Myreque]]'s trust after having lured Vanstrom to them, you must kill the hellhound.
[[File:In Search of the Myreque - Skeleton Hellhound safespot.png|thumb|The safespot for killing the hellhound with magic attacks.]]
After the cutscene ends, the hellhound will immediately attack you. There is a [[safespot]] in the upper eastern corner of the room on the south side of the chair. Using [[Magic]] is recommended as the hellhound has no Magic defence and is weak to [[Earth spells]]. The hellhound only has 55 [[Hitpoints]], but hits fairly hard; lower levels should bring [[food]]. If you have access to [[Protect from Melee]], the fight will be much easier.

'''Note''': You may leave the chamber during the fight, which will cause the hellhound to respawn close to the entrance once you re-enter. Dying in the chamber will cause your gravestone to appear outside of the room. Returning to the area via the boat will not require you to have a druid pouch, and the bridge will not need repairing. Note that if you die, you cannot return via [[fairy ring]] {{fairycode|dls}} until the quest is completed.

After defeating the hellhound, talk to Veliaf Hurtz who'll say he needs to speak to his superior in order to instate you into the Myreque; you can also ask him more questions about the Myreque and Vanstrom. Finally, ask him how to leave the hideout; he tells you about a secret passage to [[Canifis]].
"""

[[steps]]
index = 4
name = "=The Myreque shortcut="
links = ["Hair of the Dog", "Myreque Hideout", "Mort'ton", "Vanstrom Klause", "Stranger (In Search of the Myreque)"]
text = """
{{Main|Myreque Hideout}}
[[File:The Hollows map.png|frame|centre|The dungeon underneath [[Hair of the Dog]] Inn houses the [[Myreque Hideout|Myreque's hideout]].]]
{{Map|3495,3464|align=right|width=250|height=250|mtype=square|r=3|caption=The Myreque shortcut can be accessed via the trapdoor behind the Canifis pub.}}
Leave the chamber, and search the wall at the end of the tunnel; it will open. Now, climb up the ladder.

'''Note:''' Exiting through the trap door is a requirement of the quest. Exiting through any other method will require travelling here again to complete the quest.

You will surface south of the tavern. The nearby trapdoor leads back to the cave, which you can use as an alternate route back to [[Mort'ton]] in the future.

Proceed back into the tavern and seek out [[Vanstrom Klause]], only to find that Vanstrom isn't there but only a [[Stranger (In Search of the Myreque)|Stranger]]. Speak to him to complete the quest.

'''Congratulations, quest complete!'''
{{Clear}}
"""
