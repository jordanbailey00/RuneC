quest = "Lair of Tarn Razorlor"
step_count = 6

[[steps]]
index = 0
name = "Starting off"
links = ["Tarn", "Tarn's Lair", "slayer ring", "Kharyrll Teleport", "Canifis", "Myreque", "Burgh de Rott", "Minigame Teleport", "Shades of Mort'ton (activity)", "Agility", "Haunted Mine", "Zealot", "terror dog statue"]
text = """
[[File:Tarn's Lair Part 1.png|thumb|left|The bank here costs 100 coins per use.]]
'''The easiest way to get to [[Tarn]] is to teleport to [[Tarn's Lair]] via a [[slayer ring]].''' This will bring you directly outside of the room with Tarn. Doing so will mean you can skip '''all''' of the traps and the entire route, and get right to the boss fight.

Alternatively, [[Kharyrll Teleport|teleport]] to [[Canifis]], then go via the [[Myreque]] shortcut to [[Burgh de Rott]], or use the [[Minigame Teleport]] to [[Shades of Mort'ton (activity)|Shades of Mort'ton]]. There is an [[Agility]] shortcut between the town of [[Burgh de Rott]] and the [[Haunted Mine]] area. Climb over the mine cart just south of the [[Zealot]] (featured in the Haunted Mine quest), and enter the haunted mine, then travel north and enter the lair. Upon entering the room, a cutscene will appear showing [[Tarn|Mutant Tarn]] and two [[terror dog statue]]s.

*The entrance is the same cave as the [[Haunted Mine]] quest (west of [[Burgh de Rott]], south of [[Zealot]], Climb-over mine cart, Crawl-down cart tunnel).
*Once inside the mine, Level 1, go north to the end of the path.
"""

[[steps]]
index = 1
name = "Reaching the bank"
links = ["coins", "Tarn Razorlor"]
text = """
The banker is to the north-east. To get there:
*When entering the lair, go east past the floor traps, which are indicated by <span style="line-height:21px;">a big X across the floor tile,</span> and attacking monsters to the end of the passage.
*Follow the path heading north ('''disarm''' the two wall traps by "searching" them, the southern one being attached to the western wall, the north one being attached to the eastern wall) the banker carrying a huge backpack at the end of the hall in a little room.
*It costs 100 [[coins]] each time to use the bank. Some of the undead in the lair drop coins.
*This is the last place to restock or heal prior to moving on to [[Tarn Razorlor]].
"""

[[steps]]
index = 2
name = "Getting to Tarn Razorlor"
links = ["Protect from Magic", "Auto Retaliate", "Hanging log", "Floor (Tarn's Lair)", "bank", "skeleton", "skeleton mage"]
text = """
<gallery mode="packed" captionalign="center" heights="180px">
Tarn's Lair Part 2.png|The U-shaped hallway after the bank.
Tarn's Lair Part 3.png|The room with a giant skeleton in it followed by the room containing three floor traps.
Tarn's Lair Part 4.png|Pass through the inverted-T hallway, deactivate the log trap in the pillar room, and navigate the wall traps. Lastly, use [[Protect from Magic]] to nullify damage from the skeleton mages at the second room of pillars.
Tarn's Lair Part 5.png|thumb|left|Tarn is here!
</gallery>
[[File:Tarn Disarming Switch.png|thumb|150cpx|The disarming switch for the log trap.]]
[[File:Tarn Jump Pillar.png|thumb|150cpx|The pillars.]]
[[File:Tarn last rest.png|thumb|150cpx|The last rest you get before fighting Tarn.]]

There are many traps and two ways to deal with them; slowly disarm each trap, or ignore the traps and take the damage. There are also numerous monsters and passages within the lair. 

*'''Note:''' It is recommended that you have [[Auto Retaliate]] '''OFF''' whilst in the lair, because after disabling a wall trap, you don't want to run back across the spikes straight into the trap again.

{|class="wikitable"
!Trap/Feature
!Failure result
!Notes
|-
|'''Floor trap'''
|You will be hit 7-8 hitpoints if you run over a floor trap
|They are fairly obvious, having a big X across the floor tile. Right-click and search floor to disarm the trap. Another simple alternative is to carefully walk around them.
|-
|'''Wall trap'''
|You will be hit 7-10 hitpoints if you run past a wall trap
|These are harder to see, but generally only occur in narrow passages, so check for them when you are in a narrow passage.
|-
|'''[[Hanging log|Log trap]]'''
|You will be hit 15-20 hitpoints by a log trap, and knocked to a level below.
|Log traps only occur on jumps to pillars. There is a nearby right-click [[Floor (Tarn's Lair)|"Search" floor]] which will disable the log trap near one of the walls. '''NOTE: If you fall at any point after having disabled a log trap, the trap will become active again the next time you attempt to pass it. Disable them every time.'''
|-
|'''Receding walls'''
|You will be pushed by the walls, and knocked to a level below.
|Occurs sometimes on slim ledges. Wait until the trap moves back into the walls and '''run''' past it.
|-
|'''Passage'''
|N/A
|Passages lead to new areas in the lair. Following the more ornate doors (especially with water-features) will eventually lead you to Tarn Razorlor.
|}

# Starting at the [[bank]], go north through the doorway.
# Follow the U-shaped hall heading westward to the end, and take the south-western-most doorway.
# You will now be in a trap-less, square room with a single giant [[skeleton]] in it. Go into the square room to the north, which has three floor traps in it, via the northern door, and take the passageway to the west.
# You will now be in a hallway that looks like an inverted T. Take the passage to the '''NORTH''', and go through the opening on the west side. Don't go all the way west in the inverted T-shaped room, or you'll face more traps and monsters and end up going in a big circle. (There are no traps in the first part of the hall, but the north hall has two; the first one is on the west wall, and the second one is on the east wall.)
# This puts you in room with a bunch of pillars that you must jump on. Make your way to the west side of the room using the southern pillars, and deactivate the log swing trap by searching the floor. Sometimes, the trap will not deactivate when you search it, thus you should click the floor again, and if the trap has been deactivated, texts will appear saying, "That flagstone has already been pressed down. You'll need to wait until it reactivates." Then, it will be safe to cross. The log swing trap will reset in 10 to 15 seconds, so you must move quickly. Use the second row of pillars from the west to go north.
# Follow the path to the east (with a wall trap on the south and then north walls), and you will end up in a room with a big hole in the centre. The walls will shoot out from time to time and knock you into the hole if you are standing there. Time your moves to avoid being knocked into the hole. Take the passageway on the east wall. (There's a total of four areas that will knock you to the lower area.)
# This is another room of pillars you have to jump on to get across; it does a zigzag across the room from the north-west to the south-east. You will be attacked by two level-94 [[skeleton mage]]s as you are crossing this room. They will start attacking you when you reach the second pillar. It is recommended to turn on [[Protect from Magic]] prayer and ignore them. Hurry across, and go down the stairs. Once on the bottom floor, the passageway to the north leads to Tarn's chamber.
"""

[[steps]]
index = 3
name = "Preparations"
links = ["prayer potions", "monkfish"]
text = """
[[File:Tarn transforms.gif|frame|Tarn looks angry...]]
*Make sure you check your health, prayer (if you're going to use it) and have your equipment in order to start the fight, as once you enter there will be little time for any preparations. '''Note''': Wearing the salve amulet is not required to start or end this fight.
*At least 2 [[prayer potions]] and/or 15 pieces of food ([[monkfish]] or better) left is recommended prior to entering Tarn's room.
"""

[[steps]]
index = 4
name = "Strategies"
links = ["terror dog", "Protect from Melee", "Tarn Razorlor"]
text = """
*The fight itself is fairly easy with high level combat stats (60+).
*He can attack with both melee and magic, but attacks solely with melee if approached. Since the [[terror dog]]s can only use melee, [[Protect from Melee]] is strongly recommended.
*[[Tarn Razorlor]] is the only monster required to be killed, so ignoring the minions and turning off Auto Retaliate is recommended.
*Prayer is drained constantly, regardless of the use of prayers. Make sure you keep an eye on it.
*During the fight with Tarn Razorlor, you can manoeuvre the terror dogs behind Tarn allowing you to only be attacked by Tarn himself, therefore eliminating the terror dogs from the fight completely.
"""

[[steps]]
index = 5
name = "Fighting Tarn Razorlor"
links = ["Tarn Razorlor (music track)", "Prayer Flicking", "Tarn", "terror dog", "Animated steel armour (Tarn's Lair)", "Protect from Melee", "Tarn's diary", "salve amulet", "salve amulet (e)", "Medium Morytania Diary"]
text = """
{{Instance}}
[[File:Fighting Tarn.png|thumb|Fighting mutant Tarn.]]
{{Listen
|title = [[Tarn Razorlor (music track)|Tarn Razorlor]]
|desc = The music which plays while fighting Tarn.
|filename = Tarn Razorlor.ogg
}}
There is a prayer drain effect during this fight, so make sure that you're stocked up on prayer potions before entering, as you'll lose your prayer even if [[Prayer Flicking|prayer-flicking]].
*A cut scene of [[Tarn]] transforming into a green mutant with lashing tentacles and unleashing two level-110 [[terror dog]]s appears upon entering the room. After this cut scene, the fight will begin. [[Animated steel armour (Tarn's Lair)|Animated steel armour]] (level 53) will also attack if moved near them.
*As soon as the cut scene ends, turn on [[Protect from Melee]] and attack [[Tarn]], who is level 69 Combat. Be sure to turn on prayer before eating as well, as there seems to be a delay before you can consume food.
*If you poison him in mutant form, the poison will carry over to his ghost form.
*After his first form is defeated, he will turn into a ghost, but this form is easier to defeat.
*As soon as [[Tarn]] is defeated, the northern door will open up. Go inside.
**Neither the Animated Armours nor the Terror Dogs will despawn or de-aggro once Tarn is defeated, though doing the next step seems to "reset" the room's instance.
*[[Tarn's diary]] is in this next room on a table. Read through it to complete the miniquest.
*You can use the diary with a [[salve amulet]] to create a [[salve amulet (e)]]. This does not need to be done in the boss room, and you can enchant multiple salve amulets.
'''Note: '''Kill a [[terror dog]] while you are here to complete a [[Medium Morytania Diary|Medium Morytania]] task.
"""
