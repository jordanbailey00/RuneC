quest = "The Great Brain Robbery"
step_count = 6

[[steps]]
index = 0
name = "Beginning"
links = ["plank", "nails", "hammer", "fishbowl helmet", "diving apparatus", "Medallion of the deep", "Zombie pirate (Harmony Island)", "Mos le'harmless teleport", "Ectophial", "Watermelon seed", "rake", "seed dibber", "ultracompost", "Morytania Diary", "Mos Le'Harmless", "Brother Tranquility", "Trouble Brewing", "Bill Teach", "Port Phasmatys", "Harmony Island"]
text = """
{{Needed|4 [[plank]]s, ~20 [[nails]], a [[hammer]], & underwater equipment ([[fishbowl helmet]] & [[diving apparatus]], or [[Medallion of the deep]]). Good food and some armour to defend from aggressive level 57 [[Zombie pirate (Harmony Island)|zombie pirates]].|recommended=2 [[Mos le'harmless teleport]]s or [[Ectophial]], 3 [[Watermelon seed]]s, [[rake]], [[seed dibber]], and [[ultracompost]] if doing the hard [[Morytania Diary]].}}

:'''Note:''' Leave your follower in the bank, otherwise you will not be able to go diving.
[[File:Brother Tranquility (zombie) chathead.png|left]]

To start the quest, you must sail to [[Mos Le'Harmless]] and speak to [[Brother Tranquility]]. To get there, use a [[Mos le'harmless teleport]], a [[Trouble Brewing]] mini-game teleport, or talk to [[Bill Teach]] on his boat in [[Port Phasmatys]] at the east end of the dock near the Green Ghost Inn and agree to sail to [[Mos Le'Harmless]].

Near the dock, you will notice a rather sickly-looking monk named [[Brother Tranquility]]. Talk to him to begin the quest — select the option regarding undead pirates. He will explain how some of his fellow monks are in trouble and ask for help. Accept the offer to be teleported to [[Harmony Island]].
"""

[[steps]]
index = 1
name = "Gathering info"
links = ["Morytania Diary", "watermelon seed", "Zombie pirate (Harmony Island)", "aggressive", "Saradomin", "Statue (The Great Brain Robbery)", "peephole"]
text = """
[[File:Moving Saradomin statue.png|thumb|Moving the statue.]]
''When doing the Hard [[Morytania Diary]], you can plant your [[watermelon seed]]s now, so you can harvest them at the end of the quest.''

Make sure you have the supplies listed earlier and head outside the windmill. [[Zombie pirate (Harmony Island)|Zombie pirates]] (level 57) are [[aggressive]] and will attack. A short way to the north will be a [[Saradomin]] [[Statue (The Great Brain Robbery)|statue]] that can be pulled. Pull the statue. Go down the hole and into a tunnel. It is full of water, so equip the underwater breathing gear to submerge beneath the water. Note that you cannot enter the water if you are carrying a follower such as a pet cat. Run past the zombie pirates and repair the stairs at the far end of the tunnel (you can be attacked while repairing the stairs and it takes a while). Go up them, climb up the ladder in the next room; then, look through the [[peephole]] to spy on the enemy.[[File:Peeking through hole.png|thumb|left|The secret room, peek through the hole.]]
"""

[[steps]]
index = 2
name = "The prayer book"
links = ["Holy symbol", "Combat bracelet", "Amulet of glory", "Edgeville", "Mos le'harmless teleport", "Ectophial", "Brother Tranquility", "poison", "Monastery", "prayer book", "holy symbol", "Harmony Island"]
text = """
{{Needed|[[Holy symbol]].|recommended=charged [[Combat bracelet]] or [[Amulet of glory]] (teleport to [[Edgeville]]), [[Mos le'harmless teleport]] or [[Ectophial]].}}
Report back to [[Brother Tranquility]]. He will suggest getting a book that can be used to pray away [[poison]]. Travel to the [[Monastery]] near [[Edgeville]] to find the [[prayer book]] in a bookshelf towards the south-west corner of the building on the {{FloorNumber|uk=0}}. Read the book, which provides instructions on how to use it. Equip a [[holy symbol]] and return to [[Harmony Island]] by talking to [[Brother Tranquility]]. The zombies have begun to gas the windmill, so right-click the book and select "recite-prayer." After this, make sure to talk to Brother Tranquility.
"""

[[steps]]
index = 3
name = "The doctor"
links = ["Ring of charos", "plank", "Ectophial", "Fenkenstrain's Castle Teleport", "Fenkenstrain's castle teleport (tablet)", "Kharyrll teleport (tablet)", "Desert Treasure I", "armour", "food", "weapon", "Wolfbane dagger", "Elfinlocks", "poisoned", "Dr Fenkenstrain", "Fenkenstrain's Castle", "Canifis", "Rufus", "ring of charos", "crate part", "wolf whistle", "fur", "hammer", "home teleport", "ectophial", "oak plank", "saw", "Canifis villager", "werewolves", "Wolfbane", "player-owned house", "wooden cat", "nails", "shipping order"]
text = """
{{Needed|[[Ring of charos]], 10 wooden cats (or the materials to make them), ~50 nails, 4 [[plank]]s, hammer, wolf whistle (obtained during quest)|recommended=[[Ectophial]], Runes for 2 [[Fenkenstrain's Castle Teleport]]s or 2 [[Fenkenstrain's castle teleport (tablet)|tablet equivalents]], [[Kharyrll teleport (tablet)|Kharyrll tab]] (if [[Desert Treasure I]] has been completed), [[armour]], [[food]], [[weapon]] and/or [[Wolfbane dagger]].}}

[[File:Great Brain Robbery Elfinlocks.png|210px|thumb|[[Elfinlocks]] makes another cameo appearance.]]
Now that the monks are no longer in danger of being [[poisoned]], they would like to get their brains back in their bodies where they belong. Travel to [[Dr Fenkenstrain]] in [[Fenkenstrain's Castle|his castle]], climb up either stairs, and then climb up the ladder in the jail cell in the middle of the room. After a bit of negotiation, he agrees that a new home free of the threat of being eaten sounds better than where he is. However, he does not want to risk being eaten while travelling. He is also allergic to teleportation, so another way needs to be found.

Go to [[Canifis]] and talk to [[Rufus]], the owner of the meat store north of the bank, about another meat shipment. Make sure to be wearing the [[ring of charos]] while talking to him. Rufus will give you some [[crate part]]s and a [[wolf whistle]]. You need to build ten decoy cats to fill the crate since Rufus assumes the crate will be transporting cats.

'''''Tip:''' Since you are right next to a bank, deposit the whistle and crate parts and take out Mos Le'Harmless teleport (treasure trail), 10 wooden [[plank]]s, 10 pieces of [[fur]], and a [[hammer]] — [[home teleport]] runes or tab and an [[ectophial]] are advised for easy travelling. If you do not have a Clockmaker's bench yet, you will also need to bring 4 [[oak plank]]s and a [[saw]]. Also, if you still need fur, you can kill [[Canifis villager]]s—they'll transform into level 88 [[werewolves]] if you don't use [[Wolfbane]], so be careful. You can also obtain fur by thieving from stalls in Ardougne (or trading with the fur trader there) or by purchasing fur in Varrock Square for 20 coins apiece. Ultimate Ironmen may find a table in the south-west tower of Fenkenstrain's castle on the first floor helpful.''

[[File:Great Brain Robbery crate.png|thumb|left|Building the delivery crate.]]
Travel to a [[player-owned house]] that has a Clockmaker's bench. Craft the materials into 10 [[wooden cat]]s. Grab your ring of charos, the 10 wooden cats, 4 planks (normal), a hammer, ~50 [[nails]], the crate parts, and the wolf whistle before travelling back to Fenkenstrain's castle.
Return to [[Dr Fenkenstrain]] and build the crate on the crate hotspot. Then select the "add-bottom" option on the crate to build the false bottom of the crate. If you run out of nails whilst building the surround or the bottom, you will have to start over and bring more nails to ensure the structure is built. Fill it with the fake cats and then use the wolf whistle Rufus gave you to call him. Fenkenstrain will automatically get in the crate. 

'''''Tip:''' You can't blow the Wolf whistle if you are still wearing the Fishbowl helmet.''

Once past inspection, Rufus will give you a [[shipping order]]. Use this on the crate, and it will be ''teleported'' to the island.
"""

[[steps]]
index = 4
name = "Making the transplants"
links = ["fishbowl helmet", "diving apparatus", "Medallion of the deep", "Salve amulet", "Mos Le'Harmless", "hammer", "armour", "weapon", "Harmony Island", "Dr Fenkenstrain", "Brain tongs", "Cranial clamp", "bell jar", "skull staple", "locker (The Great Brain Robbery)", "Fuse (The Great Brain Robbery)", "tinderbox", "Keg (The Great Brain Robbery)", "Sorebones", "Brother Tranquility", "Undead"]
text = """
{{Needed|Hammer & underwater equipment ([[fishbowl helmet]] & [[diving apparatus]], or [[Medallion of the deep]])|recommended=Weapon, armour to kill 4 Sorebones (safespottable), [[Salve amulet]]}}
Now that the doctor is on the island, travel back to [[Mos Le'Harmless]]. Use the island bank to grab a [[hammer]], equipment to breath underwater, [[armour]], and a [[weapon]] before teleporting to [[Harmony Island]]. [[Dr Fenkenstrain]] is in the basement of the windmill and needs some equipment to perform the surgery. He will give you a list of items to collect:

*[[Brain tongs]]
*[[Cranial clamp]]
*3 [[bell jar]]s
*30 [[skull staple]]s
*A [[hammer]]

Luckily, the bad guys already have what you need since they performed the surgery in the first place. The only problem is how to get inside the building.[[File:Blowing up the door.gif|frame|right|The player creates an explosion to open the door.]]
Put on the equipment to breathe underwater to avoid passing out from the gas, and head north from the windmill to the ship beached nearby. Search the [[locker (The Great Brain Robbery)|locker]] on the {{FloorNumber|uk=0}} to get a [[Fuse (The Great Brain Robbery)|fuse]]; then, climb up a level and get a [[tinderbox]] and a [[Keg (The Great Brain Robbery)|keg]] of powder. With these in hand, go back to the front door of the monastery. Use the keg in the front door, add a fuse, and then, light it. The door is now open.
[[File:The Great Brain Robbery cat cutscene.gif|thumb|width=256x256|The gruesome operation, replaced with a cute cat playing with a ball.]]
Once inside, kill the 4 [[Sorebones]] to obtain all the needed equipment, which can be safespotted behind benches. You must pick up the dropped items after each kill, or else you will just get duplicates. Walk back to the windmill, head downstairs, and give all this to Dr Fenkenstrain to begin the gruesome surgery. A cutscene of a cute cat playing with a ball will ensue due to the surgery being too gruesome. Make sure to speak to [[Brother Tranquility]] after the operation.

Note, the Sorebones are considered [[Undead]] and thus a [[Salve amulet]] will work against them.
"""

[[steps]]
index = 5
name = "The big battle"
links = ["Mos Le'Harmless", "armour", "food", "potions", "Undead", "Salve amulet", "Mi-Gor", "Barrelchest", "Brain Battle", "Prayer", "prayer potion", "Melee", "ranging", "maging", "safespot", "Barrelchest anchor", "Brother Tranquility"]
text = """
{{Instance}}
Return to the bank on [[Mos Le'Harmless]] and grab all the [[armour]], [[food]], and [[potions]] you will need for the fight. '''Note:''' You still need to wear your underwater equipment. The Barrelchest is '''NOT''' considered [[Undead]] meaning the [[Salve amulet]] will not provide a benefit against him.

Go back to Harmony. 

When you enter the monastery, only [[Mi-Gor]] will be there, giving you the option to confront him. When you do, he will summon his monstrosity, a giant mess of machinery named [[Barrelchest]], to attack you.

[[File:Barrelchest safespot.png|thumb|250px|left|Safespotting the barrelchest.]]
{{Listen
|title = The Great Brain Robbery - Kitten
|desc = Soothing music
|filename = Soothing Kitten Music (Great Brain Robbery).ogg
}}
{{Listen
|title = [[Brain Battle]]
|desc = The music which plays while battling the Barrelchest.
|filename = Brain Battle.ogg
}}
[[Prayer]] (and also Defence) drains faster than usual during the fight, and Barrelchest will turn your Prayers off.

If meleeing, just keep turning prayer back on ('''''note''': repeatedly turning it on can be a huge time waste and result in death if he gets lucky with the timing of his hits, plan to do this without prayer to avoid that)''. Bringing several [[prayer potion]]s and at least ten good food is highly recommended. Barrelchest is a fairly blunt instrument; he will not use anything but [[Melee]] attacks, which are fairly slow and inaccurate; however, when he does hit, he tends to frequently hit over 20.

If [[ranging]] or [[maging]], it is possible to [[safespot]] him: either catch him on the corner of the first pew by taking a few steps back when you first start the battle, or simply exit and then re-enter the monastery after the fight begins and he will immediately be caught if you stay where you are at the entrance. '''DO NOT hide behind a pew when attempting to do this or he will strike the ground with his anchor, dealing up to 25 typeless Ranged damage.'''

Once you have killed Barrelchest, pick up his [[Barrelchest anchor|anchor]] and walk back to the windmill to inform [[Brother Tranquility]] of your victory.

He will thank you and give you a lamp granting 5,000 experience in the skill of your choice.
[[File:Barrelchest dies.gif|right|frame|The Barrelchest is defeated!]]

'''Congratulations, quest complete!'''

''Note: If you died during the boss fight, '''you will need another set of underwater equipment to recover your items'''. Otherwise, you'll need to visit Death in his office.''
"""
