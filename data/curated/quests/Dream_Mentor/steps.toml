quest = "Dream Mentor"
step_count = 4

[[steps]]
index = 0
name = "Helping the fallen man"
links = ["food", "Seal of passage", "Runes", "NPC Contact", "Air rune", "Cosmic rune", "Astral rune", "Lunar Isle", "spellbook", "Lunar spells", "runes", "Lunar Isle mine", "Cyrisus", "minimap", "wine", "Allotment", "bank", "'Birds-Eye' Jack", "melee", "dragon med helm", "Ahrim's robetop", "Ahrim's robe skirt", "ranger boots", "abyssal whip", "ranged", "splitbark helm", "Karil's leathertop", "Torag's platelegs", "adamant boots", "magic shortbow", "magic", "robin hood hat", "dragon chainbody", "black d'hide chaps", "infinity boots", "ancient staff", "Combat", "Oneiromancer"]
text = """
{{Needed|3 kinds of [[food]] (6-7 of each, or log in and out 21 times) and a [[Seal of passage]]|recommended=[[Runes]] for casting [[NPC Contact]] (2 [[Air rune|air]], 1 [[Cosmic rune|cosmic]], and 
1 [[Astral rune|astral]])}}
Travel to [[Lunar Isle]]. Changing [[spellbook]]s to the [[Lunar spells|lunar set]] may help, as will carrying [[runes]] to teleport back to the bank.

*Travel north-east from the bank and go down the [[Lunar Isle mine|mine]]—then, crawl through the passageway to reach the [[Cyrisus|fallen man]] (located just south-east of where you entered the cave. The cave entrance will appear as a red line in the wall on your [[minimap]]). You can talk to him and inspect him to open a status screen. 

[[File:Dream mentor cyrus stats.png|thumb|220px|Cyrisus isn't well.]] 

*He will need you to increase three stat bars, in this order: health, spirit, and armament.
*To feed him, you will need to give him at least three different kinds of food in sequence, for a total of 20 pieces of food (beverages other than [[wine]] and Guthix Rest will not work). It is recommended to bring seven pieces of two types and six pieces of a third type. The type of food brought does not offer any advantages. Using sacks or baskets of [[Allotment|farm produce]] is useful to save space, '''but you must take the food out before using it''', or it will only count as one.

Use one food that you have seven of on Cyrisus to feed him, followed by the one that you have six of, then the third type. There will be four lots of dialogue to complete while feeding him.

Continue feeding him in the same order until the chatbox says he doesn't need any more. If you feed him a type you used recently, he will reject it; just try another type.

*:'''Note:''' It is possible to use only one type of food by logging out after using each piece.
*Increasing his spirit is done by talking to him, but just try to choose the most positive things. This part is long, but no dire consequences if you get it wrong. Make sure he's standing up and both his health and spirit are at least at 70 and 72% respectively before you leave the cave.

[[File:dream mentor bank.png|thumb|220px|Cyrisus' bank.]]

*For armour, go to the [[bank]] on [[Lunar Isle]] and talk to the most right banker [['Birds-Eye' Jack]]. Tell him you want to access Cyrisus' bank account—from there, select a helmet, top, legs, boots, and weapon. It is guess and check whether or not you got it right. The easiest way to check is using the level 67 Lunar spell, [[NPC Contact]], to ask Cyrisus whether you chose right. It may take several tries, but eventually, he will tell you your choice is just right—take that set to him in the cave.
*: '''Note:''' The most common set (for players with combat level determined by [[melee]] skills) is a [[dragon med helm]], [[Ahrim's robetop]] and [[Ahrim's robe skirt|robe skirt]], [[ranger boots]] and an [[abyssal whip]]. Cyrisus ends up dressed like a melee fighter.
*: For archers (players with [[ranged]] being the dominant combat skill), the combination is a [[splitbark helm]], [[Karil's leathertop]], [[Torag's platelegs]], [[adamant boots]] and a [[magic shortbow]]. Cyrisus will look like an archer.
*:For mages (players with [[magic]] being the dominant combat skill), the combination is a [[robin hood hat]], [[dragon chainbody]], [[black d'hide chaps]], [[infinity boots]] and an [[ancient staff]]. Cyrisus will look like a mage.

Now, you have to reach 100% in all of his remaining stats. Once Cyrisus has reached 100% in all stats, he'll tell you that he's afraid of [[Combat]]. Afterwards, you'll agree to accompany him to the [[Oneiromancer]]—exit the mine, and go southward.
"""

[[steps]]
index = 1
name = "Making the potion"
links = ["Goutweed", "hammer", "pestle and mortar", "astral rune", "Oneiromancer", "Astral Altar", "Cyrisus", "Dreamland", "dream vial", "goutweed", "gout tuber", "Eadgar's Ruse", "Dragon Slayer II", "dream potion"]
text = """
'''''Items required:''' [[Goutweed]], a [[hammer]], a [[pestle and mortar]] and an [[astral rune]].''

*Head south to the [[Oneiromancer]] on the south-east part of the island near the [[Astral Altar]]. Talk to her, and [[Cyrisus]] will appear. The Oneiromancer will suggest going into [[Dreamland]] together to solve Cyrisus' fear of combat.
*'''Note: If you're using Magic for the upcoming fight and were on the Lunar Spellbook, don't forget to switch back to Standard Spellbook/Ancient Spellbook''' (your choice; Standard Spellbook is closer, done by praying to the [[Astral Altar]]).
*The Oneiromancer will give you a [[dream vial]]. Fill this with water. The nearest water source is the house west of the bank.
*You need to obtain some [[goutweed]], either by growing a [[gout tuber]], or by stealing it from the troll kitchens from [[Eadgar's Ruse]] quest. (If you go back to the troll kitchen, it is recommended to grab two goutweed in total if you plan on doing [[Dragon Slayer II]].)
*Use the goutweed with the vial.
*Use a [[hammer]] with an [[astral rune]], and then, use a [[pestle and mortar]] on the result—add this to the potion to get a [[dream potion]].
"""

[[steps]]
index = 2
name = "The battles"
links = ["Dream potion", "tinderbox", "armour", "weapon", "food", "seal of passage", "Our lives", "ring of life", "escape crystal", "Brundt the Chieftain", "trident of the seas", "Iban Blast", "Warped sceptre", "Blood Rush", "halberd", "divine battlemage potion", "Vengeance Other", "The Inadequacy", "A Doubt", "dragon dagger", "The Everlasting", "Safespot", "The Untouchable", "The Illusive"]
text = """
'''''Items required:''' [[Dream potion]], a [[tinderbox]], [[armour]], a [[weapon]], and good [[food]], [[seal of passage]].''
{{Instance}}

Using [[Our lives|the lectern]] at the north of the arena is the '''only''' way to leave the following fight. Use of all teleports, including the [[ring of life]] and [[escape crystal]]s, will not work. Players should prepare to use the right-click leave option during the fight. If you die you will always lose your [[seal of passage]] and will have to speak with [[Brundt the Chieftain|Brundt]] to get a replacement.

In the upcoming fight, four bosses must be defeated in a row, '''without the use of prayers'''.

'''It is highly recommended to use magic for the fight.''' All four bosses have very low magic defence, and magic will hit consistently even if you wear melee gear to reduce incoming damage. An excellent strategy is to use a [[trident of the seas]], but [[Iban Blast]], [[Warped sceptre]] or [[Blood Rush]] are also very good options. Strong melee armour, a shield with high ranged defence, and plenty of high-healing food are recommended. A [[halberd]] can also be brought to safespot the second and third bosses if desired. Lower-levelled players may want to drink a dose of [[divine battlemage potion]] prior to entering.

'''Note:''' Remember to bring the [[seal of passage]].

Go to the Dream Hall, the large building on the west side of Lunar Isle, where Cyrisus will be waiting for you. Light the brazier with a [[tinderbox]] and talk to Cyrisus to enter the dream world. During the fight, a bar showing Cyrisus' Courage will be shown and he will occasionally attack or use [[Vengeance Other]] on you.

You will then have to fight, in order, four monsters representing Cyrisus' fear:

*[[The Inadequacy]] ''(level 343).'' This is by far the hardest part of the fight, so don't worry if you use most of your food on it. The Inadequacy will use powerful and accurate melee and ranged attacks, but will only use ranged if the player is outside of melee range. It will also summon [[A Doubt|Doubts]], which should be ignored in favour of defeating the boss as quickly as possible. Magic will hit dependably even with a negative magic attack bonus. Use available special attacks, like from a [[dragon dagger]] to deal damage quickly. Make sure to keep your health above 30 and the boss will eventually go down.
*[[The Everlasting]] ''(level 223).'' Hits high, but can be easily [[Safespot|safespotted]] by '''standing directly west of the lectern on the north side of the arena'''. Note that due to its size the player cannot walk through the Everlasting, so be careful not to get trapped between it and the side of the arena. After it is killed, the next boss may spawn in a position that allows it to attack a player in the safespot. To avoid this, run out during the Everlasting's death animation so the next boss spawns further away, or lure it away before killing it and return to the safespot on the other side of lectern. Finally, this boss can be kited (especially with a stamina potion).
*[[The Untouchable]] ''(level 274)''. Similar to the Everlasting but with much lower health, and can also be safespotted with Magic or a halberd. This boss can also be kited.
*[[The Illusive]] ''(level 108)''. Not much of a threat, though it will regularly burrow into the ground and reappear somewhere else, forcing the player to chase it around.
After defeating the Illusive, Cyrisus will finally conquer his fear and stomp it to death.<gallery>
Fighting the Inadequacy.png
Fighting the Everlasting.png
Fighting the Untouchable.png
Fighting the Illusive.png
</gallery>
[[File:Cyrisus transfers knowledge.gif|thumb|220px|Cyrisus transfers some knowledge to the player.]]
"""

