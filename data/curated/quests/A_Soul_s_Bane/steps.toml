[[File:A Soul's Bane - Tolna leaves home.png|thumb|300x300px|Tolna leaves the streets of Varrock in search of a more lucrative life.]]Players will do large amounts of damage on these creatures, but no experience will be gained. Each creature killed will fill the "rage level" bar at the top of the screen. After several kills of the player's choice of angry creatures, the bar will reach maximum and the player will yell, spin, and kill all remaining monsters in the room. This grants the player 40 Attack experience.

A cutscene will then play, in which Tolna leaves his mother for a more lucrative life. Players can then exit out of the rage room near the east end of the cave, and proceed to the next room.
