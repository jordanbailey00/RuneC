{{Cquote2|''"<big>Why should I, Tolna, be trapped in such a wretched place? Arrghh, It's not fair! Feel my ANGER!</big>"''}}[[File:Weapon rack (Tolna's rift) (Full).png|left|frameless|width=104x104]]''This room represents [[Tolna]]'s anger by frustrating players, as they can only hit monsters with certain weapons.''<br>

The rage room has four types of monsters, which must be killed to fill a rage meter. When entering this room, players will see a [[weapon rack (Tolna's rift)|weapon rack]], which contains four types of weapons. Each of the weapons only work on a specific monster, and will deal normal damage multiplied by 10 when correctly chosen.[[File:A Soul's Bane - maximum outrage.gif|thumb|500x500px|The player, outraged, kills all the remaining monsters.]]To defeat the monster, unwield your weapon and shield, and select one of the weapons from the rack and wield it. Only one weapon can be taken at a time. Once you have the weapon, kill the monster it can damage, based on the table below:
