{{Cquote2|''"<big>It's so quiet and dark. I FEAR I may never escape this horrid place. Mum, Dad, help me!</big>"''}}[[File:Fear reaper (Level 42).png|left|frameless|width=141x141]][[File:A Soul's Bane - dark holes.png|thumb|300x300px|You must look into the dark holes. Prepare for a small shock.]]''This room represents [[Tolna]]'s fear, giving players a frightening jolt when they don't know whether or not a [[fear reaper]] will attack.''<br>

In this room, you will find multiple [[Dark hole (A Soul's Bane)|dark holes]] lining the outer walls. One of these holes is too dark and frightening to search, while the others have a chance of triggering a 'jumpscare' and summoning a [[fear reaper]]. You will have to kill five of these in order to progress.  Which hole that spawns a [[fear reaper]] is random and changes after each kill, requiring you to move around the room and search different holes after each encounter. Depending on your luck, you might need to circle the room up to five times to get defeat all five reapers.[[File:A Soul's Bane lit up hole.png|thumb|alt=Picture of the hole for the player to proceed.|width=120x120|Lit up hole to the west]]
