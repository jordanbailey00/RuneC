quest = "Making Friends with My Arm"
step_count = 7

[[steps]]
index = 0
name = "Starting out"
links = ["Weight-reducing clothing", "teleport", "Trollheim", "Rellekka", "Troll Stronghold (location)", "Burntmeat", "Wolfbone", "Weiss", "mountain trolls", "Mother", "My Arm", "Kob", "Drunken Dwarf's Leg", "fairy ring", "Larry"]
text = """
{{Needed|recommended=[[Weight-reducing clothing]], [[teleport]]s to [[Trollheim]] and [[Rellekka]]}}
[[File:Burntmeat chathead.png|left]]
Head to the [[Troll Stronghold (location)|Troll Stronghold]], and speak to [[Burntmeat]]. He will tell you that an important visitor, [[Wolfbone]], has arrived, and that they require your help. Agree to help them.
Wolfbone will stop you from starting the quest if you don't have level 66 Firemaking.
Wolfbone comes from a place called [[Weiss]], a troll town far north of the Stronghold, and wants to meet with the [[mountain trolls]] to trade knowledge. His leader, [[Mother]], wants the mountain trolls to send an ambassador up to Weiss to teach the Weiss Trolls their inventions, while Wolfbone teaches theirs in the Stronghold. Burntmeat will tell you that they have chosen [[My Arm]] to be the ambassador for the mountain trolls, as he has travelled to distant lands (with you) before. Wolfbone will then show you the way to their town by sea, as climbing the mountains is too difficult.

Go to My Arm by his herb patch by taking the stairs south of Burntmeat, and climbing the ladder on the wall north of [[Kob]]. You will see My Arm training [[Drunken Dwarf's Leg]] to take over his role as the herb patch caretaker. Talk to My Arm, and ask him to meet you by Larry's boat, north-east of [[Rellekka]].

Head to Larry's boat. The quickest way to reach there is using the [[fairy ring]] code {{Fairycode|DKS}}, and then running west. Talk to [[Larry]] and ask him if you could borrow his boat, and after some amusing dialogue, a short cutscene will play, showing My Arm's arrival. Speak to Larry again, and you and My Arm will sail to Weiss.
"""

[[steps]]
index = 1
name = "Troll Diplomacy"
links = ["pickaxe", "rope", "Weight-reducing clothing", "stamina potion", "Draynor Village", "My Arm", "Weiss", "bronze pickaxe", "hammer", "Agility"]
text = """
{{Needed|Any [[pickaxe]] and [[rope]] (both obtainable during this part), mining and agility boosts if you need them|recommended=[[Weight-reducing clothing]] and [[stamina potion]]s, a teleport to [[Draynor Village]]. If your agility level is not much higher than 68, bring some food, as failing the rockslides can deal at least 15 damage}}

After some time, you and [[My Arm]] will arrive just north of [[Weiss]]. As My Arm cannot climb the rockslide, you must find a way to help him. Search the wrecked boat and obtain a [[rope]] and [[bronze pickaxe]] if needed. A [[hammer]] can also be taken if one hasn't been obtained by the player.
[[File:Making Friends with My Arm - Climbing rockslide.png|thumb|250px|Climbing up the cliff to reach Weiss.]]
Attempt to mine the cave entrance. After some dialogue, boost up your [[Agility]] if necessary (68 required), climb up the rockslides, and use a rope on the tree. Next, climb the rope and cross the ledge. Lastly, climb the next rockslide and pass the fallen tree.

{{Listen
|title = Kicked out of Weiss
|align = right
|filename = Rejection (Making Friends with My Arm).ogg
|desc = The track that plays upon getting knocked out.}}
"""

[[steps]]
index = 2
name = "=Weiss surface="
links = ["Boulder", "instanced", "Yellow Snow"]
text = """
Once you've reached the top, speak to [[Boulder]]. He will refuse to let you in, as humans are not welcome in the town and disbelieves that you brought a troll along. Instead, go east of him and sneak in through the gap in the fence. You will enter an [[instanced]] version of the city with trolls throwing rocks at you, which will knock you out of the city if they hit you. Be sure to read through below and reference the diagrams, as once you start running, unless you are in a safe area, the trolls will hit you and kick you out. Running diagonally tends to help evade troll throws.

Go south along the city's edge, then west, moving from safespot to safespot if necessary, until you come across a small alleyway east of the ice wolf pen. Move yourself to Safespot 1 shown on the right. Then, click on the bucket spawn a little to the north-west to move to Safespot 2.

Now for the hardest part: click on the Little Boulder (it has a left-click 'Cross' option) just north of the troll [[Yellow Snow]] to begin running there. Once you are a tile away from the boulder (but before you reach it), click on the hole to the north. If everything goes correctly, you should make it inside, but this may take a few attempts. Once inside, '''DO NOT''' try to use the ramp; instead, '''immediately''' click on the narrow gap to the south, near the body of water.
[[File:Weiss Safespot 1.png|thumb|Safespot 1 (the player's location) and Safespot 2 (the red dot north-west of the player, between two trees).]]
"""

[[steps]]
index = 3
name = "=Cave level="
links = ["cave exit (Weiss cave)", "Mining", "Mother", "Don't Know What", "Odd Mushroom", "Snowflake", "Keldagrim", "Wise Old Man"]
text = """
Follow the path and swim through the water, again avoiding the thrown rocks. At the end will be the [[cave exit (Weiss cave)|cave exit]] that needs to be unblocked for My Arm to enter, requiring 72 [[Mining]]. However, before you can mine it, a path of five stepping stones needs to be created in the water for My Arm to walk on, conveniently provided by the trolls above throwing their rocks into the water. To create this path, first swim to the other side. Click the square you want a stone thrown to, and then move one square away when you see the troll's throwing animation begin. Continue this until the path is completed (it will need to be five boulders long), then boost up if necessary, mine the rubble, and let My Arm walk in. The trolls cease attacking once they see My Arm and will take you to the city's leader — [[Mother]], his bodyguard [[Don't Know What]], and his inventor assistant [[Odd Mushroom]]. He also has a daughter, [[Snowflake]], with whom My Arm falls in love.

[[File:Making Friends with My Arm - Swimming in Weiss cave.png|thumb|250px|Swimming through the Weiss cave, evading trolls in the process.]]

Once Mother asks what My Arm has to offer to the trolls of Weiss, pick every chat option possible. Mother will be uninterested in any of the offerings My Arm has to make any business with Weiss, and he is adamant that trolls only need to be concerned about physical strength and prowess; he also wants his daughter to marry Don't Know What, who would inherit the throne once Mother dies, though Snowflake secretly opposes the arrangement.
[[File:Making Friends with My Arm - Troll invasion.png|thumb|250px|Once upon a time, the Weiss trolls attacked the dwarves of Keldagrim...]]
Having nothing to offer to Mother, you and My Arm leave the hut. Outside, speak to My Arm, and pick every chat option once more. You will learn from Odd Mushroom that the trolls of Weiss once lived further south near [[Keldagrim]], and was driven away by a then-young [[Wise Old Man]]. A plan is devised to let My Arm impress Mother by faking the killing of Wise Old Man, a long-time enemy of the Weiss trolls.
"""

[[steps]]
index = 4
name = "The Wise "Dead" Man"
links = ["Hammer", "saw", "mahogany plank", "bolt of cloth", "cadava berries", "bucket of water", "Draynor Village", "Wise Old Man", "My Arm", "Swan Song", "Apothecary", "cadava potion", "Construction", "Varrock", "reduced cadava potion", "old man's coffin", "Weiss", "Fire of Domination"]
text = """
{{Needed|[[Hammer]], [[saw]], 5 [[mahogany plank]]s, a [[bolt of cloth]], [[cadava berries]], [[bucket of water]]|recommended=Draynor teleport method, Varrock teleport method, Weiss travel method}}

Make your way to [[Draynor Village]] where you will have to talk to the [[Wise Old Man]]. Ask him to help [[My Arm]]. He will initially refuse, as he is more of an adventurer than a family mediator; after reminding him of you saving his life during [[Swan Song]], he will agree to help you.

He will ask that you build a mahogany coffin and have the [[Apothecary]] brew a [[cadava potion]] that is suited for his age. The coffin can be built next to him, granting the player 715 [[Construction]] experience. This can be boosted by wearing pieces of the Carpenter's outfit.

Make your way to the Apothecary in [[Varrock]], and have him make a [[reduced cadava potion]]. Return to the Wise Old Man and talk to him. He will then drink the potion and "die". Pick up the [[old man's coffin]], and make your way back to [[Weiss]], and speak to My Arm. You can avoid climbing the rockslides by entering the cave you cleared out earlier, which takes you directly into the city.

My Arm will now offer the Wise Old Man's "corpse" to Mother, but he doubts its authenticity due to a lack of battle wounds. Odd Mushroom will attempt to persuade Mother to accept My Arm into the tribe and have Snowflake marry him, but Mother is still set in his ways, claiming that she needs to marry a proper troll like Don't Know What.
[[File:Making Friends with My Arm - My Arm's deceit.png|thumb|250px|My Arm, Snowflake, Odd Mushroom and you attempt to convince Mother that My Arm killed the Wise Old Man.]]
Snowflake will then become enraged at Mother, telling him he shouldn't tell her how to think and love, and declaring her love for My Arm. He still insists that My Arm is not to be trusted. Suddenly, the Wise Old Man begins snoring. Odd Mushroom will claim that it is the remains of his magic escaping his body. The Wise Old Man will then break wind, convincing Mother that this is all a trick. Mother will become enraged and throw rocks at you, My Arm and Snowflake before battering Odd Mushroom, throwing the group into the cells below.

Talk to Odd Mushroom. He will tell you that Mother has lit a [[Fire of Domination]], which drastically increases his strength and prevents teleportation magic from working, indicating his intention to kill everyone. Odd Mushroom will instruct you to find his notes where he writes down his inventions, so that Snowflake can carry on with his inventions. Shortly afterwards, Odd Mushroom succumbs to his wounds. Snowflake will then ask you to kill her father as revenge for killing Odd Mushroom, seeing Odd Mushroom more of a father than Mother.

The Wise Old Man will warn you to prepare accordingly before the fight as you will be unable to teleport out for the next two combat sequences.

If players need to escape, they must use the smelly hole found within the cell. This will take them outside of [[Weiss]] right next to the boat.
"""

[[steps]]
index = 5
name = "Matricide"
links = ["Ranged", "bucket of water", "Fire of Domination", "Weiss", "Don't Know What", "Squirrel (troll)", "ranged", "protection prayers", "Hitpoints", "magic", "melee", "bucket", "Pile of Buckets", "Protect from Magic", "Protect from Missiles", "Broken fence (Weiss)", "Mother"]
text = """
{{Needed|[[Ranged]] equipment, [[bucket of water]], food}}
{{Instance}}
[[File:Making Friends with My Arm - Fighting Don't Know What.png|thumb|left|220px|Fighting Don't Know What.]]

'''Note:''' You '''cannot''' teleport out of this fight until the [[Fire of Domination]] is extinguished. Despite what the Wise Old Man says, items may be reclaimed upon death from a gravestone outside [[Weiss]].

Once ready, the Wise Old Man will break the cell door, and [[Don't Know What]] will attack while [[Squirrel (troll)|Squirrel]] flees to warn Mother. He uses [[ranged]] attacks that can hit through the player's [[protection prayers]]. These attacks are different from his normal attacks, with a different animation. When doing the attacks that hit through protection prayers, two boulders are thrown: one where the player is standing and the other for the normal attack. If you successfully dodge the one that is thrown where you are standing then you will not take damage from it, so he can be beaten by running around the arena while attacking with ranged. He has 220 [[Hitpoints]], and is very resistant to [[magic]], so [[melee]] or ranged attacks are recommended. Even though Snowflake, My Arm, and the Wise Old Man assist you in the fight, they will not do much damage. Both Don't Know What and Mother are vulnerable to venom (and poison).

[[File:Making Friends with My Arm - Fighting Mother.png|thumb|220px|You and the gang battle against Snowflake's father, Mother.]]
After defeating Don't Know What, you and the gang will have to fight Mother. '''Before fighting him''', you must '''take a [[bucket]]''' from the nearby [[Pile of Buckets]] next to the large barrel of water, '''fill it with water and extinguish the Fire of Domination''', or else none of your attacks will hit. You may also escape through the staircase to replenish your supplies. When you come back to Weiss, enter through the cave and you will start the fight with Mother from the beginning. If you die during this fight you will only need to fight Mother again, and will not need to re-do the fight with Don't Know What. Similarly, if you already put out the fire, you will not need to do so a second time. 

Once Mother has switched to [[Protect from Magic]], you have successfully put out the fire. Mother uses the same attacks as Don't Know What, but also uses a melee attack that drains prayer. To easily beat Mother, use ranged with [[Protect from Missiles]] and run away from him around the arena so he does not hit you with his melee attack. Alternatively, it is possible to position Mother on the east side of the staircase while standing on the tile next to the [[Broken fence (Weiss)|broken fence]], preventing him from moving into melee range. Once in this position it is possible to melee without being stunned or having your prayer drained. Each time [[Mother]] begins a ranged attack animation there is time to attack once and immediately return to the tile you came from.
"""

[[steps]]
index = 6
name = "A New Leader"
links = ["Bucket", "goat dung", "goat poo (scenery)", "bucket", "herb patches", "goutweed", "Weiss fire notes", "Burntmeat", "Wolfbone", "Weiss"]
text = """
''Items required: [[Bucket]]''

After killing Mother, Snowflake will call all the trolls of Weiss and declare herself as the new leader of Weiss, with all of them in agreement, stating she is much nicer than Mother. She will then ask you to perform the wedding ceremony for her and My Arm; they will say their vows, and you will pronounce them as husband and wife. They will then perform the ancient dance of love.

<gallery captionalign="center" widths="200">
Making Friends with My Arm - Stepping up as leader.png|Snowflake declares herself the new leader of Weiss.
Making Friends with My Arm - Wedding.png|The wedding ceremony of Snowflake and My Arm.
Making Friends with My Arm - Ancient dance of love.png|The newlyweds performing the ancient dance of love.
Making Friends with My Arm - Snowflake and My Arm forever.png|Snowflake and My Arm forever!
</gallery>

After the ceremony, Snowflake will ask you to fetch some [[goat dung]] for her. [[goat poo (scenery)|Piles of goat poo]] can be found in the north-east building. You will need a [[bucket]] to pick up the dung; you should still have it from the fight against Mother. If not, simply pick up another bucket next to the large barrel of water.

Return to Snowflake, who will make two [[herb patches]] just west; one to grow [[goutweed]], and one for you. She will then give you Odd Mushroom's [[Weiss fire notes|notes]], which contains the information required to light braziers. Read it, and speak to her once more.

'''Congratulations, quest complete!'''

'''Optional post-quest reward''' - Players can return to [[Burntmeat]] and [[Wolfbone]] to inform them of the situation in [[Weiss]], and to give Burntmeat the notes. As Burntmeat has felt that you dislike his burnt meat, he will have Wolfbone reward you instead. Humorously, Wolfbone gives you burnt meat as a reward, while Burntmeat eats the notes you gave him, much to your annoyance. (The notes can be reobtained by talking to Snowflake if desired.)
"""
