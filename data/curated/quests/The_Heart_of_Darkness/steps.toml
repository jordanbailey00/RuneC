| The Final Dawn is the will of Ranul. He will show us all that death is nothing to be feared. He and Ralos will lead us into forming a new world before then guiding us to Mictl.
|}
"""

[[steps]]
index = 5
name = "=The fourth trial="
links = ["Protect from Melee", "special attack", "Protect from Magic"]
text = """
[[File:The Heart of Darkness - Emissaries' fourth trial.png|thumb|250px|The final trial of the Twilight Emissaries.]]
{{Cquote2|Victory is within your reach, but one more trial awaits... Face your opponent.}}

The final trial requires you to battle Prince Itzla. He uses melee attacks, so [[Protect from Melee]] is advised. He will use protection prayers whenever you perform a [[special attack]], and uses two in turn, both of which he will warn you about in advance. For instance, he will pray [[Protect from Magic]] if a Voidwaker special is used.

The sword swipe special attack turns off any active protection prayers, but you can simply reactivate them without any delay. The other is an AoE attack, once he warns you he is going to do it, run behind him immediately to dodge.

Upon his defeat, speak to Janus to complete the trials.
"""

[[steps]]
index = 6
name = "The Ruins of Tapoyauik"
links = ["Prayer Potion", "Twilight Emissary Robes", "Twilight Temple", "Augur Metzli", "Ennius Tullus", "Furia Tullus", "Ralos", "Ranul", "Forebearer Fides", "Ruins of Tapoyauik", "Old Ones", "barrel (Ruins of Tapoyauik)", "frost nagua", "Forebearer Vulcan", "The Final Dawn", "Protect from Magic", "Lever (Ruins of Tapoyauik)", "frost crab", "Trap (Ruins of Tapoyauik)", "frozen platform"]
text = """
{{Needed|up to 4 empty inventory slots (the icons can be done one at a time, but is recommended against)|recommended=Combat gear, Food, [[Prayer Potion]]s}}
[[File:The Heart of Darkness - Metzli appears.png|thumb|250px|The Augur is revealed to be Metzli, the Teokan of Ranul.]]
Now that you and Prince Itzla have passed the trials, the Augur herself will oversee the initiation process. Open the nearby chest to obtain the [[Twilight Emissary Robes]], then wear them and make your way to the [[Twilight Temple]] to begin a cutscene. 

'''''Note:''' If you teleport out or walk too far, Itzla will go back to the Tower of Ascension.''

During the initation, it is revealed that the Augur is indeed [[Augur Metzli|Metzli]], the Teokan of Ranul, and claims [[Ennius Tullus|Ennius]] and [[Furia Tullus]] are the mortal forms of [[Ralos]] and [[Ranul]], who were reborn as the twins during an eclipse 31 years ago.

After the cutscene, speak to [[Forebearer Fides]]. She will task you with opening up the passage to the [[Ruins of Tapoyauik]], a fortress of the [[Old Ones]] under the temple, where Metzli believes they left behind secrets to bring about the Final Dawn. Make your way to the building directly south, and climb down the stairs to the blocked passage; a [[barrel (Ruins of Tapoyauik)|barrel]] containing pickaxes can be found nearby to mine it.
[[File:The Heart of Darkness - past blockage.png|thumb|250px|Frost nagua manifest before the cultists.]]
Upon mining the blockage, a cutscene will play in which you proceed further into the fortress. However, the ground rumbles, manifesting two [[frost nagua]], killing [[Forebearer Vulcan]] and knocking Prince Itzla over a pit.

'''Note:''' Once you have completed the cutscene, you no longer need to wear the [[Twilight Emissary Robes]] to proceed. The robes will be required in the subsequent quest [[The Final Dawn]], and can be reclaimed at anytime from the chest you found them in.

You will now need to navigate the fortress to meet up with Prince Itzla. Run past the frost nagua (use [[Protect from Magic]] if able), then avoid the spear traps; getting hit by one will stun you and deal 6-12 damage. Once past them, '''pull the [[Lever (Ruins of Tapoyauik)|lever]]''' and climb down the nearby ledge.
[[File:The Heart of Darkness - navigating Tapoyauik.png|thumb|250px|Navigating the Ruins of Tapoyauik.]]
Next, run past the [[frost crab]]s and make your way north, avoiding stepping on the [[Trap (Ruins of Tapoyauik)|traps]] by taking the middle path. You will come across a wall by an icy ledge that you can slide across. Once across, enter the north-eastern room and move around the trap before '''pulling the lever'''. Move west to the [[frozen platform]]s and cross them, then climb down the western ledge.

Head west to the enclosed room and '''pull another lever''', avoiding the trap. Head south to find a large gate and another '''lever to pull''' on the north side. Before entering, pull the chain just east to unlock a shortcut to the exit. If you need to leave and come back, climb down the stairs to enter the dungeon and head west to climb down this chain.

There are four total levers to pull, each lever lighting a brazier at the large gate.
"""

[[steps]]
index = 7
name = "=Icons Puzzle="
links = ["Icon (The Heart of Darkness)"]
text = """
When you walk west through the gate, you will find yourself in a large, rectangular room divided into thirds. The eastern third that you start in contains many urns and two murals. The middle third has a floor of ice and several frost nagua. The western third contains urns, another two murals, four statues, and a frozen door.

'''Do not search the urns yet''' - whilst searching urns, frost naguas will spawn and attack and cannot be safespotted. Instead, inspect the two murals and take note of the first words used (zema, oma, yeya, naui) and the corresponding element that is visible on them. You will need to recall these word-element pairs soon. Then, run all the way west to meet up with Prince Itzla. He will help you fight any nagua that you bring near him.

Now in the western third of the room, inspect the other two murals for their words and elements. Check which three of the statues are broken. Then, you will need to run back east again.

In the eastern third again, search the urns to find three distinct [[Icon (The Heart of Darkness)|icons]] which correspond to the broken statues that you inspected earlier. You will be ambushed by frost nagua while searching urns. Once you have all three icons, run west again.

Finally, in the western third again, use the icons on their corresponding statues. Once you have done so, you will need to touch each of the four statues in the correct order. The words on the murals determine the order in which the player must touch the statues: Zema = 1, Oma = 2, Yeya = 3, and Naui = 4. Meanwhile, the elements on the murals determine the specific statue that must be touched. The order is different for each player. If all statues are touched, but in the incorrect order, you will take damage from falling rocks.

Upon touching the statues correctly, they will unleash a wave spell and melt the ice off the door. The next section will be a boss fight, so return to a bank if needed.
[[File:The Ruins of Tapoyauik Levers 1.png|thumb|width=225x225|The location of the first lever, pulled after traversing the first wall traps.]]
"""

[[steps]]
index = 8
name = "Guardian of the Fortress"
links = ["Prayer Potion", "Protect from Magic", "Super combat potion", "Amoxliatl", "Metzli", "Ennius Tullus", "Furia Tullus", "Sunrise Palace", "Servius"]
text = """
{{Instance}}
{{Needed|Combat gear (Melee combat strongly recommended)|recommended=Food, [[Prayer Potion]]s and at least 37 prayer to use [[Protect from Magic]], [[Super combat potion]]s or similar, melee equipment to destroy ice blocks (Glacial temotli)}}
[[File:The Ruins of Tapoyauik Levers 2.png|thumb|width=225x225|The location of the second lever, within the north-eastern room between the sliding wall and the platform jumps.]]
Enter the door to begin a cutscene in which you and Prince Itzla encounter [[Amoxliatl]], a powerful frost nagua guarding the fortress. She will tell you and Itzla that the Mokhaiotl - or the Tlati archive - is off-limits to humans, claiming they are unworthy. Suddenly, Prince Itzla is teleported away, revealing that [[Metzli]], [[Ennius Tullus|Ennius]], and [[Furia Tullus|Furia]] followed you here. As they attempt to deal with you, Amoxliatl claims they have defiled Tapoyauik and will face the consequences. However, as they teleport away, you are forced to fight her in their stead.

<gallery captionalign="center" widths="200">
The Heart of Darkness - Amoxliatl.png|The player and Prince Itzla encounter Amoxliatl.
The Heart of Darkness - Metzli and the Tullus twins.png|Metzli and the Tullus twins reveal themselves.
</gallery>

Amoxliatl uses three different attacks. In her standard attack, she attacks with magic, summoning ice spikes on the player's current tile and around the arena. [[Protect from Magic]] will protect against the initial attack, but the ice spikes additionally deal typeless damage. Finally, an icy pool will be left on the tile where the player was originally standing that will deal 6-10 damage per tick.
[[File:The Ruins of Tapoyauik Levers 3.png|thumb|width=228x228|The location of the third and fourth levers. The third lever is in the last north-western room. The fourth lever is directly north of the ancient gate, in close proximity to the braziers.]]
[[File:Fighting Amoxliatl.png|thumb|250px|The player fights Amoxliatl, the guardian of Tapoyauik.]]
After every 2-4 standard attacks, Amoxliatl will use one of two special attacks. The first one used is randomly selected, but after that, she will alternate between them and will not use the same special attack twice in a row. If you are standing in the narrow entry path, she will not use her Unstable Ice special attack.

* Unstable ice blocks: Amoxliatl forms 1-4 blocks of unstable ice around the arena. If not destroyed in time (16 ticks, ~10 seconds), all remaining ice blocks will shatter, causing icy pools to form within 3x3 of the ice blocks and healing the boss (16-25) for each ice block shattered. Ice Blocks can only be destroyed with melee, but will be fully destroyed in 1 tick regardless of the melee weapon used.

* Icicle attack: Amoxliatl disables the player's prayer and launches an icicle at them. A message is shown in the chatbox: {{mes|Amoxliatl disables your prayers and launches an icicle attack!|colour=red}} Turn on [[Protect from Magic]] before the icicle hits you to negate all damage.

After defeating Amoxliatl, you will forcefully be banished from Tapoyauik. Make your way to [[Sunrise Palace]], where [[Servius]] is currently staying. You will inform him of the events that transpired, and he will ask that you leave so as to avoid the Queen's anger, but assures you that you will be involved in whatever plans are made next.

'''Congratulations, quest complete!'''
"""
