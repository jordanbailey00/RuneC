quest = "The Heart of Darkness"
step_count = 9

[[steps]]
index = 0
name = "Infiltration"
links = ["Twilight's Promise", "the Teomat", "Prince Itzla", "Twilight Emissaries", "Queen Zyanyi Arkan", "Quetzacalli Gorge", "Renu", "the Windbreaker", "Bed (The Heart of Darkness)", "Quetzacalli Gorge General Store"]
text = """
[[File:The Heart of Darkness - the Sun Queen arrives.png|thumb|250px|Queen Zyanyi Arkan arrives at the Teomat to speak to her son.]]
Start the quest where you left off at the end of [[Twilight's Promise]], at [[the Teomat]]. Speak to [[Prince Itzla]], who will propose you and him go undercover by infiltrating the [[Twilight Emissaries]]. As he discusses the plan, his mother, [[Queen Zyanyi Arkan]], will arrive. Frustrated at her son's failure to protect his father, Itzla tells her about his plans to lead the infiltration. However, she refuses, insisting that he confide in someone he absolutely trusts to lead in his stead. After the Queen's departure, Itzla relents and asks you to visit a pub in the [[Quetzacalli Gorge]] to meet a trusted contact of his, who will fill you in on the infiltration operation.

Head south-west towards [[Renu]] and fly to the Quetzacalli Gorge, then head to [[the Windbreaker]] pub and speak to the bartender. Ask him to rent the basement room as instructed, only to find out a basement doesn't exist; he will offer to let you rent the ground floor room for 30 coins instead. If you don't have 30 coins, either pickpocket the citizens around the area or use the bank just east of the pub. Once you have the coins, accept the bartender's offer, then head to the east room and rest at the [[Bed (The Heart of Darkness)|bed]].

Upon waking up, you will find a disguised Prince Itzla to be your "trusted contact". He claims that there are very few people he can trust after the events of the previous quest, and that the less people who know about his mission, the better; additionally, as an outsider fairly uninvolved in Varlamorian politics, you ironically are far more trustworthy. He will then tell you that he believes a shopkeeper in the Gorge is recruiting members for the cult, and that you will pose as a potential recruit in the hopes he'll contact the Emissaries.

Head out east to the [[Quetzacalli Gorge General Store]] and speak to the shopkeeper, and tell him that you've heard he can offer help to those in need. He is initially skeptical, but accepts your request to join the Emissaries, and tells you and your "friend" to head to the Twilight Temple, where he'll send word for them to expect two recruits. Return to Prince Itzla at [[the Windbreaker]], he will then meet you at the Temple.
"""

[[steps]]
index = 1
name = "Trials of the Emissaries"
links = ["Quetzal feed", "limestone brick", "soft clay", "Prayer Potion", "Protect from Melee", "the Proudspire", "Tower of Ascension", "Forebearer Janus", "Nova", "Sergius", "Felius", "Caritta", "Ximoua", "landing site", "quetzal feed", "Salvager Overlook"]
text = """
{{Needed|4 empty inventory slots|recommended=10 [[Quetzal feed]], 3 [[limestone brick]]s, and 4 [[soft clay]]. Combat gear, Food, [[Prayer Potion]]s and at least 43+ prayer for [[Protect from Melee]]}}
Head north-east past the gate, and make your way east past [[the Proudspire]], then head south to the [[Tower of Ascension]] to meet Prince Itzla. He will tell you that a person named [[Forebearer Janus]] will call on the both of you when its time to be tested. In the meantime, he wishes to speak to the nearby recruits for insights on why they wish to join the Emissaries.

Talk to the nearby recruits: [[Nova]], [[Sergius]], [[Felius]], and [[Caritta]]. Nova will speak of the Augur, the new leader of the Emissaries, who has reorganized the cult and is said to guide them to Mokhaiotl. Return to Prince Itzla, who will explain that Mokhaiotl refers to the centre of the world, which is where it is said [[Ximoua]] will happen. As you discuss this with him, [[Forebearer Janus]] calls on the both of you to begin your trials.

Before leaving, it is recommended that you bring the materials to build a [[landing site]]: 10 [[quetzal feed]], 3 [[limestone brick]]s, and 4 [[soft clay]], as you'll be in proximity to the [[Salvager Overlook]] landing site en route to the Temple.
"""

[[steps]]
index = 2
name = "=The first trial="
links = ["Emissary Ascended", "Tower key (The Heart of Darkness)", "Book (The Heart of Darkness)", "scrap of paper", "poem", "Old Ones", "completed note"]
text = """
[[File:The Heart of Darkness - Emissaries' first trial.png|thumb|250px|The first trial of the Twilight Emissaries.]]
{{Cquote2|The aim is simple: Speak the correct pass phrase to me and you will be allowed to proceed.}}

You will be in a room with three [[Emissary Ascended]]. Pickpocket one of them to obtain a [[Tower key (The Heart of Darkness)|tower key]], which is used to open the south-east gate. Search the chest to receive a [[Book (The Heart of Darkness)|book]] and [[scrap of paper]]. Take note of the first letter of each white word in the book, which is the passcode for the south-western chest; you will receive a [[poem]] and another scrap of paper.

The first word of each verse in the poem uses the language of the [[Old Ones]], translated as cardinal directions: Takam = East, Makt = North, Silam = West, Uitt = South. Reference the poem to get the order of arrows for the code for the last chest located in the north-west part of the room. Enter the code to get the last scrap of paper. Combine the three for a [[completed note]], which contains a pass phrase.

Speak the pass phrase to Forebearer Janus to complete the first trial.
"""

[[steps]]
index = 3
name = "=The second trial="
links = ["Emissary Brawler", "Emissary Conjurer", "Bandages (The Heart of Darkness)", "medical box"]
text = """
[[File:The Heart of Darkness - Emissaries' second trial.png|thumb|250px|The second trial of the Twilight Emissaries.]]
{{Cquote2|Welcome to your next trial. Here, there is one simple goal... Survive.}}

The second trial is combat-based, with [[Emissary Brawler]]s (melee) and [[Emissary Conjurer]]s (magic) attacking two at a time, then four at a time. The level 86 brawlers can use a special attack that strikes the tiles adjacent to them that can be dodged, while the conjurers can heal themselves and adjacent brawlers.

Both you and Prince Itzla must survive the trial; use the [[Bandages (The Heart of Darkness)|bandages]] from the [[medical box]]es around the room on him to heal.

Speak to Forebearer Janus again to start the third trial.
"""

[[steps]]
index = 4
name = "=The third trial="
links = ["Tenoch", "Silia", "Adrius", "Eleuia", "Ranul"]
text = """
[[File:The Heart of Darkness - Emissaries' third trial.png|thumb|250px|The third trial of the Twilight Emissaries.]]
{{Cquote2|Welcome to your third trial. Before you stand some recently initiated acolytes. However, it seems one of them was not as loyal to our cause as first believed. Your task is to question all four and determine who the traitor is.}}

The third trial involves questioning the members of the cult - [[Tenoch]], [[Silia]], [[Adrius]], and [[Eleuia]] - and working out who the traitor is. Ask each about the Final Dawn; the traitor (different for each player) will be the one who talks about '''having eternal life in [[Ranul|Mictl]]'''. Once you question each member, you'll be given the option to accuse them while talking to them. If none of the members are the traitor, you may need to exit and re-enter the floor. 

If the chosen member is the traitor, Janus will kill them rather than keep them barely alive; speak to him to begin the final trial.

{| class="wikitable"
|+ '''Traitor Dialogue (by character)'''
! Player Prompt !! If Tenoch is traitor !! If Silia is traitor !! If Adrius is traitor !! If Eleuia is traitor
|-
| '''Why did you join the Emissaries?''' 
| To do my duty, of course. Ralos and Ranul wish us to bring about the end of this world. Only then will we all unite in Mictl.
