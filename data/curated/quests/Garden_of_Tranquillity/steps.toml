quest = "Garden of Tranquillity"
step_count = 14

[[steps]]
index = 0
name = "Queen Ellamaria's project"
links = ["Varrock Palace", "Queen Ellamaria", "list", "Wise Old Man"]
text = """
Head to the fenced garden east of the [[Varrock Palace]], accessible by exiting the kitchen in the north-eastern corner of the place, then running south.

Speak to [[Queen Ellamaria]], who will hand over a [[list]] describing the plants she wants you to gather for her. However, first she wants you to talk to the [[Wise Old Man]] about the art of persuasion.
"""

[[steps]]
index = 1
name = "Enchanting the ring of charos"
links = ["ring of charos", "Creature of Fenkenstrain", "Draynor Village", "Wise Old Man", "Queen Ellamaria", "King Roald", "NPCs"]
text = """
{{Needed|ring of charos}}
:'''Note:''' Any additional rings in your inventory ''or'' bank will disappear in the following section.
With the [[ring of charos]] the player obtained from [[Creature of Fenkenstrain]], head to [[Draynor Village]] and talk to the [[Wise Old Man]]. He will tell the player a story about [[Queen Ellamaria]] before she was married to [[King Roald]], as well as explain the origin of the ring of charos. Before enchanting it for you, he wants to test the player's diplomacy skills to see if they are worthy of the ring. Answer the following six questions correctly; note that the seventh question can be answered in any way. The correct answers are given below:

{| class="wikitable lighttable"
!Question
!Answer
|-
|Two goblins are fighting over the colour of their armour. What do you do?
|Show them a range of colours so that they can come to a compromise.
|-
|A Drunken dwarf offers you a kebab. What do you do?
|Take his generous gift even though you have no need for it.
|-
|Are you enjoying your experience of Farming?
|It's absolutely, unquestionably the most interesting thing I've ever done!
|-
|A dwarf asks you to put on a silly golden helmet so that you can be fired from a cannon into a wall. What do you do?
|Put on the silly helmet and jump into the cannon.
|-
|You meet Pkmaster0036 in the wilderness who asks you who is the greatest player killer in the world. How do you answer?
|You of course Pkmaster0036, no one could ever challenge your greatness!
|-
|Queen Ellamaria orders you to go on a foolish quest without any offer of reward. What do you say?
|Ask me nicely and I might consider it.
|-
|A Draynor bank guard asks you if you've seen any suspicious characters lately, because the bank has been robbed. What do you say?
|No, especially not that wise old man, who doesn't look at all suspicious.
|-
|}

After answering the questions correctly, the Wise Old Man will enchant the ring of charos and return it to the player. You will need to wear the ring throughout the quest to use dialogue marked with (Charm) in order to persuade [[NPCs]] to assist you.
"""

[[steps]]
index = 2
name = "Farming equipment"
links = ["rake", "seed dibber", "spade", "Secateurs", "watering can", "gardening trowel"]
text = """
Throughout the rest of the quest the player should have these items present in their inventory.

*A [[rake]]
*A [[seed dibber]]
*A [[spade]]
*[[Secateurs]]
*A [[watering can]]
*A [[gardening trowel]]
"""

[[steps]]
index = 3
name = "Obtaining the seeds"
links = ["Elstan", "Lyra", "Kragen", "amulet of nature"]
text = """
:'''Note:''' Players can visit the NPCs in any order. Also, note that when crops you plant for [[Elstan]], [[Lyra]], and [[Kragen]] fully grow, you will receive a message in your chat box. The seeds for these NPCs '''must''' be planted '''after''' talking to them. Using an [[amulet of nature]] can be very helpful for this quest. The allotments cannot be protected by flowers.
"""

[[steps]]
index = 4
name = "=Elstan, farming patch south of Falador="
links = ["ring of charos(a)", "marigold seed", "compost", "supercompost", "ultracompost", "Farming/Patch locations", "Falador", "Draynor Village", "Ring of charos(a)", "Elstan", "marigolds", "flower patch", "delphinium seed"]
text = """
{{Needed|[[ring of charos(a)]], [[#Farming equipment|farming equipment]] and a [[marigold seed]]|recommended=[[compost]]/[[supercompost]]/[[ultracompost]]}}

Go to the [[Farming/Patch locations|farming patch]] between [[Falador]] and [[Draynor Village]], north of the cabbage patch.

*Wear the [[Ring of charos(a)]].
*Speak to the gardener [[Elstan]].
*Ask if he has any delphinium seeds to spare.
**"Do you have any delphinium seeds to spare?"
*Select the 'charm' responses until he asks you to plant some [[marigolds]]. '''Agree to his request without using the "charm" option.''' If you use it, he will refuse and you will have to agree anyway.
**"(Charm) That is why I have come to an expert for advice."
**"(Charm) Not just AN expert, Elstan - they say you are THE expert"
**"(Charm) Oh, no, I love listening to gardening stories..."
**"(Charm) Millions? Ah, just what I wanted to hear..."
**'''Do not select (Charm).''' Instead, select: "Okay, I'll grow you some marigolds."
*After speaking with Elstan, the player must grow marigolds in the nearby [[flower patch]] from seed to flower.
**Marigolds take 20 minutes to grow, so it is advisable to move to the next portion of the quest and return once they are grown.
**Marigolds planted before Elstan's request '''will not count'''.
**Use [[compost]] (or [[supercompost]]/[[ultracompost]]), water, and plant cure as you would with any other crop.
*Harvest the marigolds and give them to Elstan.
*In exchange for the harvested marigolds, Elstan will hand over the [[delphinium seed]]s. If you lose these seeds, speak to Elstan again, and he will provide you with more.
"""

[[steps]]
index = 5
name = "=Lyra, farming patch west of Port Phasmatys="
links = ["ring of charos(a)", "onion seed", "compost", "supercompost", "ultracompost", "Bottomless compost bucket", "ectophial", "Dramen staff", "Lunar staff", "fairy ring", "Fenkenstrain's Castle Teleport", "plant cure", "Farming/Patch locations", "Port Phasmatys", "Fenkenstrain's Castle", "Lyra", "allotment", "onion", "allotment patch", "yellow orchid seed", "pink orchid seed"]
text = """
{{Needed|[[ring of charos(a)]], [[#Farming equipment|farming equipment]], 3 [[onion seed]]s|recommended=[[compost]]/[[supercompost]]/[[ultracompost]] ([[Bottomless compost bucket]] will work here), the [[ectophial]] or [[Dramen staff|dramen]]/[[Lunar staff|lunar]] staff for [[fairy ring]] {{Fairycode|alq}}'' or [[Fenkenstrain's Castle Teleport]] '', and a [[plant cure]]}}

:'''Note:''' Farming payment will not work for this section.

Go to the [[Farming/Patch locations|farming patch]] between [[Port Phasmatys]] and [[Fenkenstrain's Castle]]. Wear the Ring of charos(a).

*Speak to [[Lyra]] at the [[allotment]]s.
*Ask "Do you have any orchid seeds to spare? "
*Select the charm responses until she asks you to grow some [[onion]]s. '''Agree to her offer without using the "charm" option.''' If you use it, she will refuse and you will have to agree anyway.
**"(Charm) If you tell me your problems, I may be able to help you."
**"(Charm) Yes, I was wondering about that."
**"(Charm) Times must be very hard for you."
**"(Charm) Whatever you've done, I'm sure you had just cause."
**"(Charm) And what is the nature of this fee that you pay?"
**"(Charm) If not yours, then whose blood are you offering?"
**"(Charm) How can you deal with so much guilt?"
**'''Do not select (Charm).''' Instead, select: "That's a deal - I'll grow a patch of onions for you."
*After speaking with Lyra, the player must grow onions in a nearby [[allotment patch]].
**Onions take 40 minutes to grow, so it is advisable to move to the next portion of the quest and return once they are grown.
**Onions planted before [[Lyra]] asks you to grow them '''will not count'''.
**The flower patch '''must be empty'''.
**Use [[compost]] (or [[supercompost]]/[[ultracompost]]), water, and plant cure as you would with any other crop.

When the onions are fully grown, speak to [[Lyra]] again. She will give you three [[yellow orchid seed]]s and three [[pink orchid seed]]s for your effort.
"""

[[steps]]
index = 6
name = "=Kragen, farming patch north of Ardougne="
links = ["ring of charos(a)", "cabbage seed", "compost", "supercompost", "ultracompost", "Bottomless compost bucket", "Dramen staff", "Lunar staff", "fairy ring", "Skills necklace", "Fishing Guild", "plant cure", "Farming/Patch locations", "East Ardougne", "Kragen", "allotment", "cabbage", "allotment patch", "snowdrop seed"]
text = """
{{Needed|[[ring of charos(a)]], [[#Farming equipment|farming equipment]], and 3 [[cabbage seed]]s|recommended=[[compost]]/[[supercompost]]/[[ultracompost]] ([[Bottomless compost bucket]] will work here), [[Dramen staff|Dramen]]/[[Lunar staff|Lunar]] staff for [[fairy ring]] {{Fairycode|blr}} or a [[Skills necklace|skills necklace]] ([[Fishing Guild]] teleport) and a [[plant cure]]}}

:'''Note:''' Farming payment will not work for this section.

Go to the [[Farming/Patch locations|farming patch]] north of [[East Ardougne]]. Wear the Ring of charos(a)

*Speak to [[Kragen]] at the [[allotment]]s.
*Ask "Do you have any snowdrop seeds to spare?"
*Select the charm responses until he asks you to grow some [[cabbage]]s. '''Agree to his offer without using the "charm" option.''' If you use it, he will refuse and you will have to agree anyway.
**"(Charm) You seem to be a little irritable, my friend."
**"(Charm) I don't like to see a fellow human being so upset."
**"(Charm) So what ails you, my friend?"
**"(Charm) Well, is there anything I can do for you?"
**"(Charm) So what can I do for you?"
**'''Do not select (Charm).''' Instead, select: "That's a deal – I'll let you know when your cabbages are ready."
*After speaking with Kragen, the player must grow [[cabbage]]s in a nearby [[allotment patch]].
**Cabbage takes 40 minutes to grow, so it is advisable to move to the next portion of the quest and return once they are grown.
**Cabbages planted before [[Kragen]] asks you to grow them '''will not count'''.
**The flower patch '''must be empty'''.
**Use [[compost]] (or [[supercompost]]/[[ultracompost]]), water, and plant cure as you would with any other crop.
*When the [[cabbage]]s are fully grown, speak to Kragen again.
**"Okay, I've grown those cabbages like you asked."
*He will reward your efforts with four [[snowdrop seed]]s.
"""

[[steps]]
index = 7
name = "=Dantaera, farming patch in Catherby="
links = ["ring of charos(a)", "gardening trowel", "secateurs", "watering can", "spade", "filled plant pot", "Vanessa", "Camelot teleport", "amulet of glory", "Edgeville", "The Giant Dwarf", "Catherby", "Dantaera", "white tree", "Ice Mountain", "Falador", "White Wolf Mountain", "Oracle", "white tree shoot", "Ellamaria", "Varrock"]
text = """
{{Needed|[[ring of charos(a)]], a [[gardening trowel]], [[secateurs]], a [[watering can]], a [[spade]], and a [[filled plant pot]] (can be bought from [[Vanessa]] next to the allotment farming patch north of Catherby)|recommended=a [[Camelot teleport]] and an [[amulet of glory]] (for [[Edgeville]] teleport), or having started [[The Giant Dwarf]]}}

[[File:Garden of Tranquillity - White Tree.png|frame|The white tree on Ice Mountain.]]

*Go to [[Catherby]] farming patch
*Talk to [[Dantaera]].
**"Do you know how I could grow a White Tree?"
*Charm her.
**"(Charm) I think that there is something that you are not telling me."
**"(Charm) A secret is a dreadful burden to have to keep to yourself."
**"(Charm) Unless you allow me to do this she will die anyway."
*Dantaera will let you cut a branch of the [[white tree]], which is on the top of [[Ice Mountain]] located west of [[Edgeville]] and north-east of [[Falador]] ''(not to be confused with [[White Wolf Mountain]])'', near the [[Oracle]].
*After talking to Dantaera, the player should prepare a [[filled plant pot]], a pair of [[secateurs]], a [[gardening trowel]], and a [[watering can]] with water.
*Teleport to [[Edgeville]] or the Monastery via combat bracelet and head west, to the top of Ice Mountain and find the white tree.
*Use the pair of secateurs on the tree, and the player will get a [[white tree shoot]].
*Use it on the plant pot with soil (you will need a gardening trowel) and water it.
*After five minutes, the branch will grow into a sapling and is ready to be planted in the tree patch in [[Ellamaria]]'s garden in [[Varrock]].
"""

[[steps]]
index = 8
name = "=Brother Althric, Edgeville Monastery="
links = ["ring of charos(a)", "fishing rod", "amulet of glory", "Edgeville", "combat bracelet", "Edgeville Monastery", "Brother Althric", "Dr Fenkenstrain", "red rose seed", "pink rose seed", "white rose seed", "Fishing rod", "fly fishing rod", "oily fishing rod", "barbarian rod", "Fenkenstrain's Castle", "The Great Brain Robbery", "Harmony Island"]
text = """
{{Needed|[[ring of charos(a)]] and a [[fishing rod]] (optional, see below)|recommended=an [[amulet of glory]] (for [[Edgeville]] teleport) or [[combat bracelet]] to teleport right to it(soul wars minigame teleport also will bring you close)}}

'''Players should ''not'' throw away or destroy the ring ''before'' being told by Althric to do so. The steps mentioned in this section should be followed strictly.'''

*Go to the garden at the northern side of the [[Edgeville Monastery]], with the [[ring of charos(a)]] equipped.
*Speak to [[Brother Althric]].
**"(Charm) These are the most beautiful rosebushes I've ever seen."
**He will claim the player is wearing an "evil talisman" and demands that the player throw it into the well in [[Edgeville]], or simply destroy it.
*Go to Edgeville and throw the [[ring of charos(a)]] in the well. '''You will recover it later, that's what the fishing rod is for.''' Alternatively, you can destroy the ring and later pickpocket it from [[Dr Fenkenstrain]] again.[[File:Garden of Tranquillity - Fishing ring of charos.png|thumb|220px|Fishing back the ring of charos.]]
*With the ring thrown away or destroyed, players can go to the monastery and attempt to take the seeds again. This time, Brother Althric will be pleased and will allow the player to take the rose seeds.
**Players need all three kinds of rose seeds - [[red rose seed]]s, [[pink rose seed]]s, and [[white rose seed]]s.
**If the player has thrown the ring into the well, the monk will mention a method to recover it. Players should get their own [[Fishing rod|fishing]]/[[fly fishing rod]], ([[oily fishing rod]] and [[barbarian rod]] do not work) and use it with the well in Edgeville. It might take several tries, but the ring can eventually be recovered. If it is thrown into the well it is NOT possible to pickpocket a new one, it must be retrieved from the well.
**If the player has destroyed the ring instead, pickpocket it from [[Dr Fenkenstrain]], located on the top floor of [[Fenkenstrain's Castle]] before [[The Great Brain Robbery]], or in the basement of the windmill on [[Harmony Island]] after it.
"""

[[steps]]
index = 9
name = "=Bernald, The Toad and Chicken in Burthorpe="
links = ["Ring of charos", "rune essence", "pure essence", "pestle and mortar", "plant cure", "hammer", "games necklace", "Burthorpe", "Minigame Teleport", "The Toad and Chicken", "Bernald", "Alain", "Taverley", "tree patch", "members", "free-to-play", "rune shards", "rune dust", "Plant cure (Garden of Tranquillity)", "vine seed"]
text = """
{{Needed|[[Ring of charos|Ring of charos(a)]], a [[rune essence|rune]]/[[pure essence]], a [[pestle and mortar]], 2 [[plant cure]]s, and a [[hammer]]|recommended=A [[games necklace]]}}

Go to [[Burthorpe]] (you can use a [[games necklace]] or [[Minigame Teleport]]) and go to [[The Toad and Chicken]] pub. Equip your ring of charos, and enter the garden on the eastern side. Talk to [[Bernald]] and charm him. He will tell the player that his vines are dying and needs a cure. Use '''''one''''' plant cure on the vine, and you will find it's not working. Talk to Bernald again, and he will instruct you to find [[Alain]] at [[Taverley]].

Head south to the [[tree patch]] in Taverley (near the entrance gate dividing the [[members]] and [[free-to-play]] areas) and speak to Alain. He will provide a method of enhancing the [[plant cure]]'s power. '''Do not use the "charm" option in dialogue, or he will refuse to help you.'''

After speaking with [[Alain]], use a [[hammer]] on a [[rune essence|rune]]/[[pure essence]] to crush the stone into [[rune shards]], and then use the [[pestle and mortar]] on the shards to make some [[rune dust]]. Use the dust with the remaining plant cure potion to get a [[Plant cure (Garden of Tranquillity)|strengthened plant cure]]. Talk to Bernald in Burthorpe again, then use it on the diseased vines. The vines will now be cured.

Talk to Bernald, and he will give some Burthorpe [[vine seed]]s. If you lose these seeds, talk to Bernald, and he will provide you with more.
"""

[[steps]]
index = 10
name = "Getting the statues"
links = ["Lumbridge teleport", "Falador teleport", "random events", "Ellamaria", "trolley", "Transportation"]
text = """
{{Needed|recommended=a [[Lumbridge teleport|Lumbridge]] and [[Falador teleport]]}}

:'''Note:''' The plants take a while to grow (the white tree being the longest time), so it is recommended to [[#Gardening|do the gardening now]] and to get the statues while the plants are growing.

:'''Note:''' Teleporting away after using the trolley on the statue, including via [[random events]], can reset your progress and you may need to return to [[Ellamaria]] to get another.

Talk to [[Ellamaria]] and ask about getting the statues. She will provide a [[trolley]] for the player to push or pull the statues.

When there is a statue on the trolley, the player can choose to "Push" or "Pull" the trolley, causing the trolley to move one square away from or towards the player respectively. The option "Big push" allows the trolley to move several squares away from the player.

A [[Transportation#Teleportation|teleport]] is recommended for players to get to the statues' original places.
"""

[[steps]]
index = 11
name = "=Statue of a former king, Lumbridge="
links = ["Lumbridge", "Lumbridge Castle", "trolley", "Trolley (king)", "River Lum", "Varrock Palace", "Ellamaria"]
text = """
Walk or teleport to [[Lumbridge]]; then, walk out of the [[Lumbridge Castle|castle]]. Examine both statues, and use the [[trolley]] on the one described as the statue of a "king" (should be the one on the south side).

Push or pull the [[Trolley (king)|statue]] across the bridge directly outside the castle. Once the statue is on the other side of [[River Lum]], the scene will immediately change to the north backyard of [[Varrock Palace]]. Push or pull the statue to the east, and then south into the [[Ellamaria|queen's]] garden (Note, the first statue (king) is the north-east plinth).

Be careful not to get the trolley stuck or you will have to logout and log back in to reset it.

If the statue at any point gets "recaptured" (if you take more than five minutes to place it on the spot for the statue), you can get another trolley from the queen (Ellamaria) and you have to go back to Lumbridge and get the statue again.

The statue should be placed on the eastern side slot against the wall. When the statue is pushed beside the spot, use the "place" option to place the statue, and the trolley will return to the player's inventory automatically.
"""

[[steps]]
index = 12
name = "=Statue of Saradomin, Falador="
links = ["Falador", "trolley", "cutscene", "guard", "Bob, another guard of Falador", "Billy, a guard of Falador", "player spoof", "PKMaster0036", "Trolley (empty)", "Trolley (Saradomin)", "Varrock Palace", "Ellamaria"]
text = """
{{Listen
|title = Billy and Bob
|align = right
|filename = Billy & Bob (Garden of Tranquillity).ogg
|desc = The track that plays during the cutscene.}}
[[File:Garden of Tranquillity - Bob is killed.png|thumb|220px|A nearby player-killer creates a distraction.]]
Walk or teleport to [[Falador]], and use the [[trolley]] on the statue in the city square (not the statue in the park). A [[cutscene]] will appear, showing two [[guard]]s, [[Bob, another guard of Falador|Bob]] and [[Billy, a guard of Falador|Billy]], at the north gate being killed by a [[player spoof]] named [[PKMaster0036]] while the player tries to push the statue onto the [[Trolley (empty)|empty trolley]].

{{Bug|The cutscene currently ends prematurely when the [[player spoof]] character gets stuck behind one of the banners in front of the gate, before the guards are killed.}}

After the cutscene, the player should pull or push the [[Trolley (Saradomin)|statue]] towards Falador's northern gates ''as soon as possible''. If the player takes more than five minutes, the guards will discover the statue has been stolen, and the player will have to start it all over again.

Once the statue is out of Falador, the scene will immediately change to the north backyard of [[Varrock Palace]]. Again, push or pull the statue to the east, and then south, into [[Ellamaria]]'s garden.

The statue should be placed on the central slot. When the statue is next to the spot, use the "place" option to place the statue, and the trolley will return to the player's inventory automatically.
"""

[[steps]]
index = 13
name = "Gardening"
links = ["ring of charos(a)", "compost", "tool leprechaun", "rake", "weeds", "Ellamaria", "King Roald", "Varrock Palace", "Ring of charos", "cutscene"]
text = """
'''''Items required:''' [[ring of charos(a)]], [[#Farming equipment|farming equipment]], two buckets of [[compost]] and all seeds and saplings from earlier sections. '''Note:''' There is no [[tool leprechaun]] in the garden. The nearest one is at the tree patch on the eastern side of the palace courtyard. Also, you cannot use the Bottomless compost bucket to do the required task and need two composts/supercomposts/ultracomposts in un-noted form.''
[[File:Garden of Tranquillity - Garden map.png|left|thumb|265x265px|A map showing where each seed should be planted.]]
You will not need to add [[compost]] to the allotments in the garden, nor water any of the patches. Use the [[rake]] to wipe out the [[weeds]] in all farming patches, and plant the seeds/sapling to where they should be placed. However, you will need to add compost to the orchid pots before planting them. The plants in Ellamaria's garden take 10–15 minutes to grow and cannot die. Make sure you've watered your White Tree Shoot or it won't work when you try to plant it.

After all patches are fully grown and the statues are in place, talk to [[Ellamaria]], and she will ask the player to get [[King Roald]]. Go to King Roald, located in the south-east side of the [[Varrock Palace|Palace]] on the {{FloorNumber|uk=0}}.
[[File:Garden of Tranquillity - Ending cutscene.png|right|thumb|220px|King Roald is not pleased with the garden, resulting in "Ellie" scolding him.]]
{{Listen
|title = Touring the Garden
|align = right
|filename = Garden Tour (Garden of Tranquillity).ogg
|desc = The track that plays during the cutscene.}}
Talk to him while wearing the [[Ring of charos|ring of charos (a)]], and charm him when possible (or continue on without charming for an amusing conversation). A [[cutscene]] will play with the Queen of Varrock giving him a tour. Don't open any interfaces after the end of the cutscene or walk away from the queen, otherwise you will have to fetch the king again.

After a short [[cutscene]], the queen will reward the player.

'''Congratulations, quest complete!'''

{{clear}}
"""
