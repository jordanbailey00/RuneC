quest = "Beneath Cursed Sands"
step_count = 12

[[steps]]
index = 0
name = "Entranced Menaphites"
links = ["Stamina potion", "Pharaoh's sceptre", "desert heat", "Jamila", "Sophanem", "minimap", "Message (Beneath Cursed Sands)", "Maisa", "Al Kharid", "Contact!", "Menaphos", "necropolis", "Obelisk (Necropolis)", "necropolis mine", "Jaltevas Pyramid", "Head Menaphite Guard", "Menaphite Guard", "Amascut", "scabarites"]
text = """
{{Needed|Combat equipment, one empty inventory space, food|recommended=[[Stamina potion]], [[Pharaoh's sceptre]], a means to combat [[desert heat]]}}
[[File:Jamila chathead.png|left]]
Talk to [[Jamila]] in [[Sophanem]] ([[File:Crafting shop icon.png]] icon on the [[minimap]]). She will tell you that she has an exclusive item from her shop for you as thanks for helping the people of Sophanem; agree to begin the quest. As she tries fitting the item, a gold ring, on your finger, she will sneakily give you a [[Message (Beneath Cursed Sands)|message]] and proceed to tell you the ring is too small for you, acting as if nothing had happened. Read the message to find out that the sender wishes to meet you at a campsite by the cliffs east of the city.
[[File:Beneath Cursed Sands - arriving at the old necropolis.png|thumb|280px|The player and Maisa arrive at the necropolis.]]
Make your way to the campsite, which is directly north of the small mining site by the cliffs. Here, you will find that [[Maisa]], a spy from [[Al Kharid]] you met during the [[Contact!]] quest, was the one who asked for you. She will tell you that citizens from [[Menaphos]] have been bypassing the quarantine of the city and excavating the old [[necropolis]] south of [[Sophanem]]. In addition, upon visiting the necropolis, she found the behaviour of the citizens to be unusual. She will ask you to come with her there; agree to do so, and a cutscene will play. If you accidentally cancel the cutscene, make sure you speak to [[Maisa]] again to trigger it, otherwise you will not be able to advance to the next cutscene.

After the cutscene, you'll appear at the [[necropolis]]. You will see many citizens and Menaphite Guards excavating the area. If you have the [[Pharaoh's sceptre]] with you, you can commune with the [[Obelisk (Necropolis)|obelisk]] directly north of the [[necropolis mine]] to allow teleportation back here, via the "Jaltevas" teleport option on the sceptre.
[[File:Beneath Cursed Sands - fighting Head Menaphite Guard.png|thumb|left|280px|The Head Menaphite Guard disables the player's protection prayers.]]
Head to the [[Jaltevas Pyramid]] south-east, and inspect the blocked entry. After that, talk to a citizen or Menaphite Guard, and a cutscene will play, where the [[Head Menaphite Guard]] and two [[Menaphite Guard]]s will confront you. Maisa will instantly kill one Menaphite Guard, and begins fighting the other. Meanwhile, you will fight the Head Menaphite Guard.

The Head Menaphite Guard will attack with melee and can deal up to 16 damage. '''Do not''' use any overhead protection prayers as he will otherwise yell {{overhead|Your false gods will not protect you!}} and damage you for 33% of your Hitpoints level. While the Head Menaphite Guard cannot be safespotted as he will manoeuvre around obstacles to hit the player, you can use a hit-and-run strategy using any ranged weapon or combat spell while running around a neighboring cluster of rocks to prevent him from coming into melee distance. Iban's Blast is quite effective for low-level Ironmen.

After defeating him, he will snap out of his trance and tell you and Maisa that [[Amascut]] was responsible for hypnotising the Menaphites and unblocking the tomb in the Jaltevas Pyramid and that she is currently inside. He will also tell you that [[scabarites]] assisted her and that they came from some ruins to the north-east. Maisa will then ask you to head back to her camp.
"""

[[steps]]
index = 1
name = "The Ruins of Ullek"
links = ["coal", "tinderbox", "spade", "iron bar", "Ruins of Ullek", "Stone tablet (Beneath Cursed Sands)", "Waterskin", "Chest (Beneath Cursed Sands)", "scarab mould", "Scarab_emblem", "Scarab Mage", "Protect from Magic", "Scarab swarm", "poison"]
text = """
{{Needed|Combat equipment, [[coal]], [[tinderbox]], [[spade]], [[iron bar]]|recommended=A means to cure/prevent poison and desert heat, food and a stamina potion}}
[[File:Maisa chathead.png|left]]
[[File:Beneath Cursed Sands - chest location.png|thumb|280px|The location to dig to find the chest.]]
[[File:Beneath Cursed Sands - fighting Scarab Mages.png|thumb|280px|Scarab Mages attack the player upon climbing down the stairs in the ruins.]]
Talk to Maisa at the camp, and she'll ask that you explore the cliffs in order to find the scabarites, while she figures out how to re-enter Menaphos. Make sure you finish the conversation with her, or you will not be able to progress to the next part. If you do not have a [[tinderbox]] for later, you can search the camping equipment by the tent to get one. A spade can also be found at the north side of the campsite.

From the campsite, head south and then to the east, around the cliffs, where you will find a set of stairs to the [[Ruins of Ullek]]. Make your way towards the furnace next to the well. Use the [[coal]] and [[tinderbox]] on the furnace to ignite it. Next, search the well for a [[Stone tablet (Beneath Cursed Sands)|stone tablet]] and read it. The message indicates a hidden chest buried in the southernmost ritual pillar found down and south-west of the climbing steps. Refill any [[Waterskin|waterskins]] you may have at the well, then dig at the aforementioned location to receive the [[Chest (Beneath Cursed Sands)|chest]]. The passcode to the chest, which is deciphered from the numerical order of the letters of the alphabet in the name "Akhem", is 1118513. The chest will contain a [[scarab mould]].
[[File:Beneath Cursed Sands scarab map.png|thumb|303x303px|Lower floor after Scarab mages]]
With the scarab mould and iron bar, go back to the furnace and make an [[Scarab_emblem#Iron|iron scarab emblem]]. Then, head north and inspect the pillar in front of the stairway to insert the emblem. An interface will open up to rotate the emblem; rotate the scarab on it until it faces down. The entryway will now be unlocked. Climb down the stairs, and you will be attacked by two [[Scarab Mage]]s. These attack much quicker than their normal counterparts, so [[Protect from Magic]] is recommended. Shortly after beginning the fight a [[Scarab swarm]] will also spawn attacking with rapid, but weak melee attacks, also being able to inflict [[poison]]. The swarm can be ignored as they will die when the mages are killed. Upon defeating the two mages, climb down the stairs.
"""

[[steps]]
index = 2
name = "Riddle of the Tomb"
links = ["Tomb wall", "damage", "Human emblem", "Scarab emblem", "Crocodile emblem", "Baboon emblem", "Mehhar", "Osmumten", "Jaltevas Pyramid", "Amascut", "Kharidian Desert", "Second Age", "High Priest of Scabaras", "rusty key"]
text = """
After killing both Scarab mages, take one of the two stairs down and then follow the green arrows to the southern lever to activate it. Once the first lever is activated quickly run along the red lines to pull the other lever. You must hit both levers within 60 seconds to continue to the next area. If you are hit by the projectiles fired down the hallways by the [[Tomb wall]]s, you will be stunned and take up to 10 [[damage]].

Note that if you die during this portion, you may find that your first time successfully pulling the levers won't unlock the door; simply pull them again within 60 seconds of each other to fix this.

Return to the junction and enter through the previously locked door. Inspect the south-western plaque and you will find four emblems depicting a [[Human emblem|human]], [[Scarab emblem|scarab]], [[Crocodile emblem|crocodile]], and [[Baboon emblem|baboon]]. The emblems need to be put into the urns in the correct order; a plaque to the north-west, will give a riddle, hinting of the order where each emblem is to be placed.
[[File:Beneath Cursed Sands - urn riddle.png|thumb|280px|The riddle indicating where to put the urns, which is random for each player.<br><br>In this example, the solution would be to place the baboon, crocodile, scarab, and human emblems from the northern to southern urns.]]
The order of urns is randomised, but doesn't change if you leave the tomb and come back. To solve the riddle, use the table below and place the emblems in the urns that correspond to the following:

* "To the one that arrived first, he offered '''item 1'''." – Place the emblem corresponding to '''item 1''' in the '''centre-south urn'''.
* "The one that was offered '''item 2''' came from just south..." – Place the emblem corresponding to '''item 2''' in the '''southernmost urn'''.
* "The '''god 1''' arrived just before the '''god 2'''..." – Place the emblem corresponding to '''god 1''' in the '''northernmost urn''' and the emblem corresponding to '''god 2''' in the '''centre-north urn'''.

