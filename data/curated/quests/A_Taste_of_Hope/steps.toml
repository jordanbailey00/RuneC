[[steps]]
index = 0
name = "Starting out"
links = ["Sickle", "Knife", "Ectophial", "Coins", "Ver Sinhaza", "Pickaxe", "Vyrewatch outfit", "Stamina potion", "Theatre of Blood", "Ectofuntus", "Ghosts Ahoy", "Andras", "Burgh de Rott", "Mort'ton teleport", "Barrows Teleport", "Garth (Theatre of Blood)", "Serafina", "Vanstrom Klause", "Ranis Drakan", "Safalaan", "Myreque", "Myreque base", "Vyrewatch", "Daeyalt ore", "Vampyre Juvinate", "Bronze pickaxe", "Ranis", "Vanstrom", "King Roald", "Mercenary (Theatre of Blood)"]
text = """
{{Needed|[[Sickle]] or [[Knife]]|recommended=[[Ectophial]] and 10,000 [[Coins]] for the fastest way to get to [[Ver Sinhaza]]; [[Pickaxe]], [[Vyrewatch outfit]].}}

('''''Please Note:''' This is a fairly long and running-around-like quest. It is strongly recommended to bring [[Stamina potion]]s.)''
[[File:Garth (Theatre of Blood) chathead.png|left]]
[[File:A Taste of Hope - Ranis and Vanstrom enter Theatre.png|thumb|260px|Vanstrom and Ranis enter the Theatre of Blood.]]
To start this quest, head to the [[Theatre of Blood]] in [[Ver Sinhaza]]. The fastest way there is by teleporting with an [[Ectophial]] to the [[Ectofuntus]] (or fairy ring {{Fairycode|alq}} if [[Ghosts Ahoy]] has not been completed), and then taking the rowboat run by [[Andras]] to the north for 10,000 coins - this will bring you just north of the Theatre. Alternatively you can travel to [[Burgh de Rott]] via either the Shades of Mort'ton minigame teleport, [[Mort'ton teleport]], [[Barrows Teleport]] or {{Fairycode|bip}} ({{SCP|Agility|50|link=yes}}), then taking the boat on the south-eastern dock of [[Burgh de Rott]]. Climb up the rocks and run along the wall until you get to the part of the wall that turns north. Right-click to climb down the gap in the floorboard that you created in Darkness of Hallowvale. Run north from the ground floor and climb up the wall rubble. Run north-east through Meiyerditch (you '''don't''' need to follow the Myreque hideout route to get to the Theatre of Blood). You can also follow the road south from Port Phasmatys, past Slepe, but this is a lot of walking.

Talk to [[Garth (Theatre of Blood)|Garth]] inside [[Ver Sinhaza]], just outside the entrance to the Theatre. Garth will ask if you are interested in hearing the tale of [[Serafina]]. He will briefly describe the connection between Serafina and the Theatre of Blood to you. During the conversation, you will see [[Vanstrom Klause]] and [[Ranis Drakan]] entering the Theatre. You will remark that [[Safalaan]] and the [[Myreque]] should be informed.

Head to the [[Myreque base]] quickly via this route:
*Speak to a [[Vyrewatch]] and ask to be sent to the mines - there is one just next to the bank booths.
*Mine 15 [[Daeyalt ore]]s; once the mine cart is full, speak to a [[Vampyre Juvinate]] to leave. If you have no pickaxe, talk to a miner to obtain a [[Bronze pickaxe|bronze]] one.
*You will appear up on the surface. Below is a map of the route to take to get to the hideout; follow the blue path down to the leftmost green dot.
*From here, follow the old route: climb up the ladder, jump east to the floorboards, climb down the stairs, and go south-east through the hidden door.
*Press the decorated wall and reveal a hidden trapdoor by right-clicking and opening the lumpy rug.
Go down the trapdoor and walk north to speak to [[Safalaan]], and inform him of what you saw. He tells you that while [[Ranis]] regularly visits Ver Sinhaza to spectate, [[Vanstrom]] has never visited it and thus deems it worth investigating. He sends you to speak to some of [[King Roald]]'s [[Mercenary (Theatre of Blood)|mercenaries]] at the south-east corner of [[Ver Sinhaza]]. Return to the theatre via whichever method you prefer, and speak to any of the mercenaries. They will tell you that both Ranis and Vanstrom are still there, and that you can spy on them via one of the windows in the castle.
"""

[[steps]]
index = 1
name = "Vampyric espionage"
links = ["Ectophial", "Coins", "Ver Sinhaza", "Pickaxe", "pestle and mortar", "vial of water", "knife", "sickle", "super restore", "Theatre of Blood", "vyrewatch", "Harpert", "coins", "Vent (Ver Sinhaza)", "Hitpoints", "Window (Ver Sinhaza)", "Ranis", "Vanstrom", "Verzik Vitur", "abomination", "Myreque", "run energy", "Safalaan", "Vertida", "Flaygian Screwte", "Haemalchemy", "Darkness of Hallowvale", "vampyres", "Serafina"]
text = """
[[File:A Taste of Hope - Climbing roof.png|thumb|right|A player is blasted with boiling hot steam while attempting to climb a rooftop vent.]]
{{Needed|recommended=[[Ectophial]] and 10,000 [[Coins]] (to return to [[Ver Sinhaza]]), [[Pickaxe]] (to return to the Myreque hideout via the mines). As there will not be any bank nearby when you reach the next section of the quest, also consider bringing the recommended items for the next two sections: [[pestle and mortar]], [[vial of water]], [[knife]] or [[sickle]], battle gear for shorter trip back to the hideout, weapon to fight a Combat Level 149 monster, [[super restore]] potion|1,000 [[Coins]]}} 
You will now need to get up onto the top of the [[Theatre of Blood]]. Return to [[Ver Sinhaza]] with whichever method you prefer. Go to the south-west corner, just west of the bank, and try to climb up the rubble at the base of the wall, but the nearby [[vyrewatch]] will stop you. Talk to [[Harpert]] nearby, who will distract the guard if you provide him with 1,000 [[coins]]. A bank is nearby if you do not have the coins on you.

Climb up the rubble, and follow the wall around to the north. The [[Vent (Ver Sinhaza)|vents]] are like obstacles that need to be climbed up and down. Take care when climbing up and down the vents (they occasionally blow out boiling hot steam, which will deal 15-20 [[Hitpoints]] of damage and knock you back down), and then east (you will climb up and down sections of the roof), until you reach a [[Window (Ver Sinhaza)|red window]] that you can look through. A short cutscene will play in which [[Ranis]] and [[Vanstrom]] speak with [[Verzik Vitur]], who gives them an [[abomination]] to help track down the [[Myreque]]. Watching the cutscene will refill your health, prayer and [[run energy]].

[[File:A Taste of Hope - Meeting with Verzik.png|thumb|right|The vampyres meet with Lady Verzik Vitur.]]
Return to [[Safalaan]]  at the Myreque Hideout, and report what you saw. He will begin formulating a plan with [[Vertida]], and asks you to speak with [[Flaygian Screwte]], the head researcher translating the [[Haemalchemy]] book you obtained during [[Darkness of Hallowvale]]. Flaygian is in the same room as Safalaan. He will explain that the [[vampyres]] were experimenting on both humans and vampyres in order to increase the amount of blood they can harvest from humans, and to strengthen their immunities to human attacks. You will draw a connection from this fact to the weakness that [[Serafina]] potentially discovered. Speak to Safalaan once more.
"""

