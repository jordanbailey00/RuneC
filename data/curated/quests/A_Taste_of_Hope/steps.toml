{{Needed|[[Pestle and mortar]], [[vial of water]] (both obtainable during quest), [[knife]] or [[sickle]]. [[battle gear]] for shorter trip back to hideout.}}
After speaking to [[Flaygian Screwte]], speak again to [[Safalaan]] who plans to have his team meet up with [[Veliaf Hurtz]]'s in [[Burgh de Rott]] and escape [[Morytania]] in order to build up their numbers, as Morytania may not be safe anymore for them to hide in. You will ask him about [[The Maiden of Sugadinti|Serafina]], and he will tell you [[Old Man Ral]] used to tell stories about her and will reveal to you where she used to live. '''Check your quest log before leaving, as you may be asked to speak with [[Flaygian]] before you can proceed.'''

Upon exiting the [[Myreque Hideout|hideout]], climb up the stairs, jump the gap and then climb down the ladder. From there, head due north through the three doors in a line, then due west until you reach the wall. From there, head north-west to reach a [[Broken Fountain|broken fountain]]. Climb down the stairs in the building directly south to meet up with Safalaan once more (''Optional: Search the bed by the stairs to obtain an [[old diary]]''). He will express his frustration with the tale of Serafina, as he believes it gives the citizens of Morytania a sense of false hope. He will then tell you the locked door in the room may contain what they are seeking.

[[File:A Taste of Hope - Serafina's home.png|thumb|right|The player and Safalaan in Serafina's home.]]
Search the crates and the barrels for a [[mysterious meat]], [[mysterious herb]], a [[vial]], and a [[pestle and mortar]]. If you've brought your own pestle and mortar and vial of water, you only need to search the crate and barrel in the north-east and north-west corners of the basement; a vial is in the crate in the south-east corner and a pestle and mortar in the south-west corner crate next to the stairs. Once you have these items, use the vial on the broken fountain north of the house to get a vial of water. Add the herb to create an [[Unfinished potion (A Taste of Hope)|unfinished potion]], then crush the meat with the pestle and mortar and use it on the unfinished potion. Use the finished [[Potion (A Taste of Hope)|potion]] on the door, but nothing will happen. Talk to Safalaan again with an empty vial, and he will give you a [[Vial of blood (A Taste of Hope)|vial of blood]]. Use another herb on the vial to create an [[unfinished blood potion]], then add the mysterious crushed meat to complete the [[blood potion]]. Use this on the door to unlock it. Take the [[Old notes (A Taste of Hope)|old notes]] from the chest, then give them to Safalaan.
"""

[[steps]]
index = 3
name = "It's a trap!"
links = ["weapon", "food", "Myreque Hideout", "Safalaan", "Flaygian", "Vanstrom", "abomination", "Mekritus A'hara", "Andiess Juip", "Flaygian Screwte", "Vertida", "melee", "ranged", "restore potion", "super restore", "Prayer", "Magic", "Ranged", "Protect from Missiles"]
text = """
{{Needed|A [[weapon]], super restore and some [[food]] to fight a level 149 monster.}}
{{Instance}}
[[File:A Taste of Hope - Safalaan unleashes hidden power.gif|thumb|upright|Safalaan unleashes a hidden power, heavily weakening the abomination.]]
Head back to the [[Myreque Hideout|hideout]], and speak to [[Safalaan]]. As you are all about to leave the hideout, [[Flaygian]] will tell you that the notes were complete nonsense. Safalaan will realise that he has been tricked by [[Vanstrom]] into giving up his blood at Serafina's house and prompts everyone to leave at once. However, it is too late, and the [[abomination]] reaches the base. It will kill [[Mekritus A'hara]], [[Andiess Juip]], and [[Flaygian Screwte]]. As it is about to attack Safalaan, he will levitate and emit a strange, cyan glow, which is amplified before producing a large explosion of power, weakening the [[abomination]]. [[Vertida]] will help you defeat the creature, but keep in mind his damage output is low.

[[File:A Taste of Hope - Fighting Abomination.png|thumb|left|The player and Vertida fight the weakened abomination.]]
The abomination uses [[melee]] and [[ranged]] attacks. Additionally, the monster will occasionally launch a black projectile which will drain the player's stats by up to 3, so bring a [[restore potion]] to restore combat stats or [[super restore]] for additional [[Prayer]] point restoration. It has very low [[Magic]] Defence, a relatively high [[Ranged]] Defence, and moderate melee defence in every style.

It is possible to safespot it by hiding behind the brick wall and allowing it to fight with Vertida and having Vertida kill the abomination (Vertida won't die during the fight).

If player wishes to fight the abomination they can safespot with [[Protect from Missiles]] negating all damage.
[[File:Abomination safespot.png|thumb|Safespotting the Abomination.]]
The player can safespot in the hallway south out of the room, then east along the northern side wall to safespot it in the room's entrance. An attack range of 9 or 10 is required, or using a Magic spell, to be out of its attack range. This method doesn't require Prayers or food.
"""

[[steps]]
index = 4
name = "The legendary weapon"
links = ["Rod of ivandis", "emerald", "chisel", "air rune", "cosmic rune", "Enchant emerald or jade", "Combat equipment", "Safalaan", "Vertida", "Old Man Ral", "trapdoor (Old Man Ral's house)", "Burgh de Rott", "Flaygian", "Flaygian's notes", "Vyrewatch", "rod of Ivandis", "silver sickle (b)", "chain", "Veliaf Hurtz", "emerald sickle (b)", "Lvl-2 Enchant", "enchant emerald or jade", "tablet", "Enchanted emerald sickle (b)", "Ivandis flail", "Kael", "Myreque", "abomination", "Ranis Drakan", "Meiyerditch", "Ver Sinhaza"]
text = """
[[File:A Taste of Hope - Old Myreque base.png|thumb|right|The old Myreque base.]]
{{Needed|[[Rod of ivandis]] (you will get it back if you gave it to Veliaf at the end of In Aid of the Myreque), [[emerald]], [[chisel]], either 3 [[air rune]]s and 1 [[cosmic rune]] or an [[Enchant emerald or jade]] tablet|recommended=[[Combat equipment]]}}
Once the fight is over, [[Safalaan]] and [[Vertida]] will ask you to meet at their old base, a small room underneath [[Old Man Ral]]'s house accessible via a [[trapdoor (Old Man Ral's house)|trapdoor]] in the north room. Old Man Ral's house is easily accessed by taking the boat from [[Burgh de Rott]], going over the wall and running north-east. Once there, talk to Safalaan, who will insist on leaving. Vertida will then interject, telling him that [[Flaygian]] had managed to translate more of the book while you and Safalaan were investigating Serafina's home.

Speak to Vertida, who will give you [[Flaygian's notes]]. Read them, and discover that a weapon that may be effective against the [[Vyrewatch]] is a flail of some kind, with the [[rod of Ivandis]] being suitable as the flail's shaft. Search the nearby crates to find a [[silver sickle (b)]] and a [[chain]]. The rod of Ivandis can be obtained from [[Veliaf Hurtz]] in Burgh de Rott (under the pub), or can be made by the player again should they choose to do so. '''You need to have talked to Vertida about the Rod of Ivandis otherwise Veliaf Hurtz won't give it to you.'''

#Attach the emerald to the sickle to create an [[emerald sickle (b)]].
#Then, cast [[Lvl-2 Enchant]] on the emerald sickle, or use an [[enchant emerald or jade]] [[tablet]] on it.
#Finally, use the chain on the [[Enchanted emerald sickle (b)|enchanted emerald sickle]] or the Rod of Ivandis to create the [[Ivandis flail]].

When you have the flail, speak with Safalaan, who will have [[Kael]] tell you that the vampyres believe that the [[Myreque]] has been completely defeated by the [[abomination]], and [[Ranis Drakan]] intends to deliver this news to all of [[Meiyerditch]] at [[Ver Sinhaza]]. Safalaan proposes to confront Ranis during this speech.
"""

[[steps]]
index = 5
name = "The Taste of Hope"
links = ["food", "prayer potions", "Rings of recoil", "Ver Sinhaza", "Kael", "Ranis Drakan", "Meiyerditch", "Ivandis flail", "melee", "magic", "Protection prayers", "Blood Barrage", "vyrewatch", "Protect from Melee", "Dragonhide armour", "Blessed dragonhide armour", "Protect from Magic", "Vampyre (attribute)", "Efaritay's aid", "Mixed hide", "red spiky vambraces", "Blessed shield", "Melee", "Rune kiteshield", "Dragon kiteshield", "Slash weapons", "Attack", "Super Attack Potion", "Super combat potion", "Shark", "Manta ray", "Super restore", "Prayer potion", "Grand Exchange", "Prayer", "Incredible Reflexes", "Ultimate Strength", "Piety", "Vyrewatch"]
text = """
{{Instance|irs=at the chest located north-west of the noticeboard|cost=20000}}
'''Note:''' ''This is a very hard boss fight, so bring enough high-quality [[food]], [[prayer potions]], and combat boosts!''

'''Note:''' ''[[Rings of recoil]] do not work on this boss.

Return to [[Ver Sinhaza]] (it is just a short walk east from Old Man Ral's house) and speak with [[Kael]] to begin the final fight with [[Ranis Drakan]]. Kael can be found near the entrance. Should players need to escape from the fight, the [[Meiyerditch]] citizen directly behind the player can be right-clicked to quickly escape.

[[Ranis Drakan]] is level 233, and can only be harmed by the [[Ivandis flail]]. He will use [[melee]] and [[magic]] attacks that can hit up to 20, and can even hit through [[Protection prayers|Protection Prayers]], although they will reduce damage taken by 50%. He can also cast [[Blood Barrage]], which will heal himself for half of the damage dealt. Occasionally, he will charge an attack and explode, hitting up to 30, which can be reduced to 6 by '''running away''' until he explodes.

After he reaches 65% of his health, he'll summon two level 87 [[vyrewatch]] and will fly airborne. Every now and then, he will throw blood bombs at where you are currently standing, which can hit up to 40. '''Move away from the tile you were standing on when it was launched''' to avoid damage. This attack ''can'' hit the vyrewatch if they are on the landing tile, so it can be used to aid combat, especially at lower levels. When you kill the vyrewatch, you will fight Ranis again until he reaches 25% of his health, where he will then summon two vyrewatch again.

After killing them, he will go berserk and attack the player. During this last phase, his attacks are much faster and accurate, but only have a max hit of 6. Using [[Protect from Melee]] will easily defeat him in the last phase. Running away from him between your attacks will allow you to mitigate some damage if necessary.

Some tips for lower level or struggling players:

* When facing Ranis alone,  equip magic-resistant gear, such as [[Dragonhide armour|Dragonhide]] (blue or better) and/or [[Blessed dragonhide armour|Blessed d'hide]], and pray [[Protect from Magic]], approaching Ranis only after he has attacked with a magical attack or charge-up attack, avoiding his melee attacks entirely thus mitigating the damage taken throughout the fight. 
* Since Ranis has the [[Vampyre (attribute)#Tier 3 Vampyres|Tier 3 Vampyre attribute]], [[Efaritay's aid]] can be used for a +15% accuracy bonus for the majority of the fight before breaking. 
* [[Blessed dragonhide armour|Blessed d'hide]] also provides a prayer bonus for each piece equipped (up to 6 total) for a maximum of 20% slower prayer drain, on top of its already high Magic and Melee defence. This makes it an excellent choice for the fight. A lower level alternative is the [[Mixed hide]] set and [[red spiky vambraces]], giving melee strength bonus and both magic and melee defence.
* Despite the [[Blessed shield|Blessed shield's]] extra Magic defence and Prayer bonus, it may be better to bring a [[Melee]] shield, such as a [[Rune kiteshield|Rune]] or [[Dragon kiteshield|Dragon]] Kiteshield. This is because the shield only offers 15 Magic defence and 18 [[Slash weapons|Slash]] defence (Ranis hits with Slash for Melee), while the kiteshields have a  -1 Magic defence and 46/60 slash defence respectively.
* If your [[Attack]] level is several levels below 70, you will hit Ranis less often and drag out the length of the fight. In this case, a multi-dose [[Super Attack Potion]] or [[Super combat potion|Super Combat potion]] can help to supplement the lower accuracy.
** If you would rather bring as much food as possible instead of potions, you can drink your potions at the nearby bank, then swap them for food right before starting the fight.
* It is recommended to bring high healing food, such as [[Shark|Sharks]] and [[Manta ray|Manta rays]]. Even with high combat stats, Ranis hits up to 20 on his attacks and occasionally casts [[Blood Barrage]] which can undo some of the player's damage if it hits. This means that the fight will almost always take 10+ minutes of non-stop combat.
* It may be worth using  [[Super restore|Super Restore Potions]] over [[Prayer potion|Prayer potions]], as Super Restore potions restore more Prayer-per-dose compared to Prayer potions, at the cost of a higher buying price from the [[Grand Exchange]].
* If [[Prayer]] is not an issue, it may be worth using other prayers such as [[Incredible Reflexes]], [[Ultimate Strength]], or [[Piety]] to improve your combat stats even further.
* When fighting the [[Vyrewatch]],  move one tile opposite of a Vyrewatch such that the Vyre will replace your tile as Ranis casts his Blood Bombs. This will speed up the fight and kill the Vyrewatch faster.
* During the first two phases of the fight, Ranis never moves, meaning if you aren't standing next to him on the tick before he attacks, he will never melee you. Therefore, if you protect from mage, you will never get hit off prayer by melee for these parts of the fight, making you take far less damage. Both you and Ranis are on a 5-tick attack cycle, so the pattern required to do this strategy should feel intuitive enough even for newer players looking to beat the fight with low stats.
* During the final phase of the fight, turn on sprint if it isn't on already and sprint at least 2-3 tiles away from Ranis every time you land a hit to reduce the amount of hits landed on you, as even with good gear and [[Protect from Melee]] active, Ranis is very accurate.

After killing Ranis, you will give an inspirational speech to the Meiyerditch citizens. If you disconnect after killing Ranis, talk to Kael again to restart the cut-scene with your speech.

