A Taste of Hope - Ranis' blood bomb.png|Ranis launches his blood bomb attack.
</gallery>
{{clear|left}}
"""

[[steps]]
index = 6
name = "Finishing up"
links = ["Myreque Hideout", "Old Man Ral", "Safalaan", "Ranis", "Meiyerditch", "Drakan's medallion", "Vanescula Drakan", "Vanstrom Klause", "Lord Drakan"]
text = """
[[File:A Taste of Hope - Vanescula and Vanstrom.png|thumb|right|Vanescula and Vanstrom discover Ranis' corpse.]]
Return to the [[Myreque Hideout|hideout]] under [[Old Man Ral]]'s house, and talk to [[Safalaan]]. He will congratulate you on defeating [[Ranis]], giving real hope to the citizens of [[Meiyerditch]]. In addition, Kael will give you [[Drakan's medallion]] that he recovered from Ranis' corpse.

Meanwhile, [[Vanescula Drakan]] and [[Vanstrom Klause]] visit Ranis' corpse, with Vanstrom exclaiming that [[Lord Drakan]] will be displeased, while Vanescula tells him that she is counting on that.

'''Congratulations, quest complete!'''
"""
