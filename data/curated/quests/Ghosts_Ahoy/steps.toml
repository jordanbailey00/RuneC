quest = "Ghosts Ahoy"
step_count = 8

[[steps]]
index = 0
name = "Pre-quest: Obtaining Ecto-tokens at the Ectofuntus"
links = ["Ghostspeak amulet", "empty buckets", "empty pots", "bones", "Ectofuntus", "Port Phasmatys", "ring of charos(a)", "charter ship", "Port Sarim", "Bucket of slime", "bonemeal", "Agility", "weathered wall", "shortcut", "Pool of Slime", "bone grinder", "ghost disciple"]
text = """
{{Needed|[[Ghostspeak amulet]], 7 [[empty buckets]], 7 [[empty pots]], and 7 [[bones]]}}

Ectofuntus tokens are required to complete the quest and can be gathered before starting it. This is done by worshipping the [[Ectofuntus]] just north of [[Port Phasmatys]]. It is recommended to obtain 35 Ecto-tokens to finish the quest, (20 when using the [[ring of charos(a)]]). You can obtain these tokens in one trip by wearing your Ghostspeak amulet and bringing 7 empty buckets, 7 empty pots and 7 bones of any type to the Ectofuntus. Level 1 undead chickens can be killed near the farm west of the Ectofuntus to obtain the needed bones. Buckets and pots may be purchased in [[Port Phasmatys]], but note that you cannot enter the town before gathering Ecto-tokens unless you enter via a [[charter ship]] from [[Port Sarim]] which costs 1,300 gp.

You will then need to follow the steps below to obtain untradeable [[Bucket of slime|buckets of slime]] and [[bonemeal]] in order to then worship the Ectofuntus and earn tokens:

# Enter the trapdoor to the west of the fountain inside the temple. If you have 58 [[Agility]] use the [[weathered wall]] [[shortcut]] in front of you, otherwise walk around to the opposite side of the cavern and climb down the stairs, then repeat this process for the next two sets of stairs. Use a bucket on the [[Pool of Slime]]: this will automatically fill all the buckets in your inventory over the next few seconds. Walk back up the stairs and up the ladder.
# Go up the stairs east of the Ectofuntus. Use a bone on the loader located on the right side of the [[bone grinder]], making sure to '''use''' the bones and not bury them. This will begin an automated process where the player will load one of the bones, turn the wheel, empty the bin to retrieve the completed bonemeal, and then automatically repeat this for each subsequent bone. However, interacting with each part of the grinder will speed up this process.
# Return to the Ectofuntus and click on it to consume each set of bonemeal and slime. While wearing your ghostspeak amulet, talk to a [[ghost disciple]] to receive your Ecto-tokens.
"""

[[steps]]
index = 1
name = "Beginning the quest"
links = ["Ghostspeak amulet", "Ecto-tokens", "Velorina", "Necrovarus", "Ectofuntus"]
text = """
<!-- This map does not use the regular template as it cannot draw text labels; the GeoJSON used as an alternative is rather bloated, and is therefore placed in mapspace and transcluded here-->{{Map:Ghosts Ahoy NPCs}}
{{Needed|[[Ghostspeak amulet]] and 4 [[Ecto-tokens]]}}

Pay 2 ecto-tokens (right click the Energy Barrier entrance located north of Port Phasmatys) and go to the house directly east to speak to [[Velorina]]. She will explain the sad history of the ghosts of Port Phasmatys. She will ask you to speak to [[Necrovarus]] located at the [[Ectofuntus]] temple to allow any ghost who wishes to pass over into the next world.

Head west of Velorina's house and pass the Energy Barrier again to be outside of the town's walls. Speak to Necrovarus located in the Ectofuntus temple. Necrovarus becomes furious over you mentioning Velorina and demands you be silent, refusing to listen to any reasoning.

Pass the Energy Barrier back into the city and speak to Velorina again. She mentions another approach: speaking to an old friend who may be used as aid without Necrovarus's involvement. When asked where she may be located, Velorina explains a vision of a small wooden shack in Morytania, where a sea is very close and castles loom to the west and east.
"""

[[steps]]
index = 2
name = "The old crone and nettle tea"
links = ["Old Crone", "Nettle tea", "Nettles", "tinderbox", "logs", "gloves", "bowl of water", "bucket of milk", "nettle tea", "Mazchna", "nettles", "Old crone", "Slayer Tower", "Mausoleum", "Ghostspeak amulet", "Mystical robes", "Haricanto", "Translation manual", "model ship"]
text = """
{{Map|x=3464|y=3559|zoom=1|title=[[Old Crone]]|mtype=pin|align=right|icon=redPin|caption=The [[Old Crone]]'s house|width=220|height=220}}
{{Needed|[[Nettle tea]] (or the ingredients to make: [[Nettles]], [[tinderbox]], [[logs]], [[gloves]], a [[bowl of water]]), and a [[bucket of milk]]|skills={{SCP|Cooking|20}} {{Boostable|yes}} to create [[nettle tea]]}}

Go out of Port Phasmatys from the Energy Barrier and head west towards Canifis. If you need to make the nettle tea, follow the directions below while heading to Canifis:

*Fill the empty bowl with water by using the bowl on the waterpump located west of the farm allotment patches. (Empty bowls can be purchased from the charter ships on the Phasmatys docks, buy 3 to be safe)
*Continue west towards Canifis until you reach the Slayer master [[Mazchna]]. Just east will be a patch of [[nettles]]. Wear your gloves and pick some; it is recommended to pick some spare nettles, since the Nettle-water can boil over when making tea. Note: gloves that '''cannot be used to pick up nettles''' include Slayer gloves, Ranger gloves, Infinity gloves, Moonclan gloves, and Lunar gloves. A pair of coloured gloves can be purchased for 650 coins from Barker's Haberdashery in Canifis.
*Use the nettles on the bowl of water. ({{SCP|Cooking|20}})
*Light a fire using your tinderbox and logs and use the bowl on fire. ({{SCP|Cooking|20}}) '''Avoid accidentally drinking the bowl'''. The bowl can also be boiled on a range, however there are no ranges in Canifis.

Head north-west of the Slayer master [[Mazchna]] to the [[Old crone]]'s house, shown on the map as a red pin (between the [[Slayer Tower]] and the [[Mausoleum]]).

Speak to the [[Old crone]]. When asked if she was a disciple of Necrovarus in the Temple of Phasmatys, she will have a hard time remembering due to her old age. She will mention that nettle tea will help refresh her memory as well as where you can find nettles.

If you have the nettle tea already made, she will exclaim that she only drinks from her special cup. She will give you a porcelain cup to pour the nettle tea into. '''Avoid accidentally drinking the bowl'''.

Speak to the Old crone again where she will refuse the tea again due to no milk being added. Add the bucket of milk to the cup of tea. '''Avoid accidentally drinking the cup of tea'''.

Speak to the Old crone again, this time she will remember being a disciple of Necrovarus. When Velorina's name is mentioned, she will remember her as a very good friend and ask how she is doing. After being told she's now a ghost, she regrets running away rather than stopping what was happening. She knows a way to help those wanting to pass over into the next world using the [[Ghostspeak amulet]]. She explains that enchanting the amulet will give power of command over ghosts; one charge will allow you to command Necrovarus to let the ghosts pass on. She explains that Necrovarus must have a [[Mystical robes|magical robe]] that can be used to perform the enchantment. She will also need his book of rituals called [[Haricanto]] written by an ancient sorcerer from the East and [[Translation manual|a book to translate]] these rituals.

Ask her if there is anything else you can do for her. She will speak about her son, who at the age of 12 years old, ran away with some pirates to be a cabin boy. She asks if you see him, give him the toy model boat that he made. She will give you the [[model ship]].
"""

