[[steps]]
index = 4
name = "=''The Book of Haricanto''="
links = ["Ghostspeak amulet", "Model ship", "silk", "needle", "thread", "costume needle", "knife", "dyes", "Red dye", "Blue dye", "Yellow dye", "spade", "ecto-tokens", "Giant lobster (Ghosts Ahoy)", "Canifis", "Canifis General Store", "Mast (Ghosts Ahoy)", "Orange dye", "Purple dye", "Green dye", "Old man", "Chest key (Ghosts Ahoy)", "map scrap", "safespot", "Magic", "Ranged", "treasure map", "Dragontooth Island", "Port Phasmatys", "activated ring of charos", "book of haricanto", "Book of haricanto"]
text = """
{{Needed|[[Ghostspeak amulet]], [[Model ship]], [[silk]], a [[needle]] and some [[thread]] (or a [[costume needle]]), a [[knife]], [[dyes]] (3 [[Red dye|red]], 3 [[Blue dye|blue]], and/or 3 [[Yellow dye|yellow]], the colour used will be random for each person), a [[spade]], 27 [[ecto-tokens]], and Food/Combat gear to defeat a [[Giant lobster (Ghosts Ahoy)|Giant lobster]] (level 32)|skills={{SCP|Agility|25}} {{Boostable|yes}} to cross the rocks}}
[[File:Poor_man.png|thumb|220x220px|Poor man!]]Head to the [[Canifis]] bank and retrieve the items required. You can buy the needle, thread, and knife from the nearby [[Canifis General Store]]. Make sure to still have your Ghostspeak amulet and ecto-tokens.
Repair the model ship by using silk, needle, thread, and a knife.

Go east towards Port Phasmatys. Before you pass the undead cows and undead chickens, go to the wrecked ship on the north coast of the farming patch (refer to map; the boat will appear as water on the mini map).

Climb up the ship's ladder to the ship deck. Head east and climb the ship's ladder just outside the small room (on the wall next to the cabin) with the Old man and the Pirate Captain to get to the ship quarterdeck.

The wind speeds will appear on the top right hand side; wait for the wind speed to change to low. Search the [[Mast (Ghosts Ahoy)|mast]] in the centre of the deck to find the colour of the tattered flag. Different parts of the flag and the skull emblem are different colours. Make sure you dye the right parts of your toy ship with the right colours. You will need to check the mast at least 3 times to get all 3 colours needed. Now mix the dyes you need and dye the model ship to match the colours seen from the mast. If you make a mistake when painting, simply paint over the piece again.

*[[Red dye|Red]] + [[Yellow dye|Yellow]] = [[Orange dye|Orange]]
*[[Red dye|Red]] + [[Blue dye|Blue]] = [[Purple dye|Purple]]
*[[Blue dye|Blue]] + [[Yellow dye|Yellow]] = [[Green dye|Green]]

Head back down the ship's ladder to the ship deck and talk to the [[Old man]]. Ask him if the model ship is his and he'll recognise it. For giving his model ship back, he'll give you a [[Chest key (Ghosts Ahoy)|chest key]].

[[File:Ghosts Ahoy - Lobster fight.png|thumb|220x220px|The lobster fight.]]
Use the key on the closed chest inside the captain's quarters to receive the first [[map scrap]].

Go to the north-west side of the deck where there is a gangplank you can walk onto rocks. Jump along the path of rocks ({{SCP|Agility|25}}). Each jump costs 5% of your run energy. It is possible to fail the jumps by falling on your face but you won't fall in the water. When you get to the end, there will be another chest with the second map scrap. Once you have the second map scrap, head back to the ship.

Climb down the ship's ladder. When you open the next chest you will be attacked - '''be ready to fight'''. Search the chests until you are attacked by a [[Giant lobster (Ghosts Ahoy)|giant lobster]] ''(level 32)'' with a blinking yellow arrow over it. Once you kill it, search the chest again for the final map scrap.

You can [[safespot]] the lobster by standing west of the ladder (the one nearest to the chests) and using [[Magic]] or [[Ranged]]. However, if you do not kill the lobster fast enough (within two minutes), it will disappear and you will have to fight it again from full health.

[[File:Ghosts Ahoy_treasure.png|thumb|220x220px|The location of the book.]]

After you've received all pieces, use one piece on another to get a completed [[treasure map]]. It marks where to find treasure on [[Dragontooth Island]]. Head east to [[Port Phasmatys]]. Pass the Energy Barrier to enter the town and go to the bank. If you haven't already, grab 27 ecto-tokens (or 10, if you have an [[activated ring of charos]]), a [[spade]], and the treasure map.

{{Map|3803,3530|3804,3530|3804,3529|3803,3529|title=The location of the<br/>[[book of haricanto|book of Haricanto]]|mtype=polygon|zoom=3|align=right|width=220|height=220}}

Head north-east from the bank onto the dock and find the Ghost captain next to the small rowing boat. Ask him to take you to Dragontooth Island, and he will oblige for a 25 ecto-token fee (10 with an [[activated ring of charos]], or 500 for permanent access). Once there, use the map to find the treasure. You can proceed to the square pictured to the right. You will be standing in the only grass-less square in the clearing. If you follow the instructions from the map you will start by standing west of the Statue of Saradomin. From there, walk 6 steps '''south''', 8 steps '''east''', 2 steps '''north''', 4 steps '''east''', and 22 steps '''south'''. Dig with a spade and you will find the [[Book of haricanto|book of Haricanto]].
"""

[[steps]]
index = 5
name = "=The translation manual="
links = ["coins", "oak longbow", "Ak-Haranu", "Translation manual", "Robin", "Rune-Draw", "death rune"]
text = """
{{Needed|Around 400 [[coins]] and an [[oak longbow]]}}

After finding the Book of Haricanto, head north to the ghost captain and travel back to Port Phasmatys. Go to the bank just south-west of the boat, and take out the 400 [[coins]] and the [[oak longbow]].

Head north of the bank. Go onto the docks just east of the pub/inn and talk to [[Ak-Haranu]]. He is a trader from the east. After being asked if he has a book that can be used to translate, he'll tell you he has the [[Translation manual|manual]], but in trade for it, he wants Robin's signature on an oak longbow.

Go to the pub/inn just west of Ak-Haranu and talk to [[Robin]]. He'll challenge you to a game of [[Rune-Draw]]. Beat him at it a few times until he owes you 100 coins (the objective of the game is to get as many points as possible, awarded when you draw a rune, before drawing a [[death rune]], which results in an automatic loss; if Robin draws a death rune before you, you win). He will give you his signature to repay the debt.

Take it back to Ak-Haranu and he'll give you the manual as promised.
"""

[[steps]]
index = 6
name = "=The robes="
links = ["Ghostspeak amulet", "bucket of slime", "Robin", "Ghost innkeeper", "bedsheet", "Ectofuntus", "Trader crewmember", "Gravingas", "Petition form", "Necrovarus", "Bone key (Ghosts Ahoy)", "Mystical robes"]
text = """
{{Needed|[[Ghostspeak amulet]] and [[bucket of slime]] (can be purchased during quest)}}

Head back to the pub/inn (where [[Robin]] was) and speak to the [[Ghost innkeeper]]. Ask him if he has any jobs for you and he will give you a [[bedsheet]] that he wants you to take to [[Robin]]. Rather than doing that, keep the bedsheet; you will be using it to disguise yourself as a ghost.

Ghosts do not look like bedsheets, so to make it passable you need to colour it with [[Ectofuntus]] slime. A fast way to get some slime is by trading with one of the [[Trader crewmember]]s on the east docks and buying a [[bucket of slime]] to dip the bedsheet in. Alternatively, use the Ectofuntus by walking down to the slime pool with an empty bucket, and fill it with slime. After you get the bucket of slime, dip the sheet into it.

Go to the town square near the north entrance of Port Phasmatys and talk to [[Gravingas]], the ghost activist protesting and carrying a sign. He will ask if you will partake in the protest, to which you will accept happily. He'll give you a [[Petition form]] to collect signatures from the townsfolk. Put your dyed bedsheet on and gather 10 signatures.

Speak to any ghost villager nearby for signatures. As long as you don't talk to the same person twice in a row, you can ask the same two or three ghosts for all 10 signatures. If they ask for ecto-tokens, move onto the next ghost that doesn't require payment. Alternatively, you could ask the same people by switching worlds. Repeat until they say "yes" enough times to have 10 signatures.

With all 10 signatures, talk to Gravingas. He will ask you to go back to [[Necrovarus]] and show him the petition.

Head north of Gravingas and pass the Energy Barrier. Speak to Necrovarus and show him the petition form. He will ask you to continue explaining the petition which outlines that the citizens of Port Phasmatys should have the right to choose whether they pass over to the next world or not. He will sarcastically say that he understands, then flies into a rage, causing him to drop a [[Bone key (Ghosts Ahoy)|bone key]]. Pick it up and head upstairs. Use the key on the locked door to get into his room. Open and search the coffin to find [[Mystical robes|his robes]]. Leave the room and head back downstairs.
"""

[[steps]]
index = 7
name = "Using the spell"
links = ["Mystical robes", "Book of haricanto", "translation manual", "Ghostspeak amulet", "Translation manual", "Ectofuntus", "Necrovarus", "Velorina", "Ectophial"]
text = """
{{Needed|[[Mystical robes]], [[Book of haricanto|Book of Haricanto]], [[translation manual]], and a [[Ghostspeak amulet]]}}

From the Ectofuntus, head back to the Old Crone, just north of Canifis.

Give her the [[Mystical robes|robes]], [[Book of haricanto|book]], [[Translation manual|manual]], and Ghostspeak amulet in your possession. The Old crone will perform an enchantment ritual - dancing - on your amulet, empowering it.

Head back east to the [[Ectofuntus]] and speak with [[Necrovarus]]; make sure your ghostspeak amulet is equipped. Command Necrovarus to release all the ghosts he's holding. You can command him to tell you the joke first or do the chicken impersonation; both of which won't deplete the ghost amulet's charge. A beam of green light will radiate out from the amulet, enveloping Necrovarus in its power. He will appear to become much softer in the eyes and stare into nothingness. He will then allow the ghosts to pass at their will.

Once finished speaking to Necrovarus, pass through the Energy Barrier (this will not consume any ecto-tokens from now on) and speak to [[Velorina]]. She will tell you that she sensed the removal of Necrovarus's psychic barrier. She will then hand you a vial of ectoplasm as her thanks in return, and explain the use of this newly acquired item: an [[Ectophial]].

'''Congratulations, quest complete!'''
"""
