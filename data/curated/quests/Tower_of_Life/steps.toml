quest = "Tower of Life"
step_count = 6

[[steps]]
index = 0
name = "Obtaining the builder's costume"
links = ["Tower of Life (building)", "East Ardougne", "Necromancer Tower", "fairy ring", "Ardougne cloak", "Ardougne Monastery", "Effigy", "Bonafido", "'Black-eye'", "hard hat", "Builder's trousers", "'Gummy'", "plant (Tower of Life)", "'The Guns'", "beer", "coins", "Flying Horse Inn", "Fight Arena (location)", "Yanille", "Builder's shirt", "'No fingers'", "Thieving", "Builder's boots"]
text = """
Begin the quest by heading to the [[Tower of Life (building)|Tower of Life]] south of [[East Ardougne]], just south-west of the [[Necromancer Tower]] (south-west of [[fairy ring]] {{Fairycode|DJP}}, or [[Ardougne cloak]] teleport to the [[Ardougne Monastery|monastery]] and go east).

*Talk to [[Effigy]]. He will tell you speak to [[Bonafido]] if you want to help. 

*Talk to Bonafido. He can be found lying around the boxes just north of the entrance to the Tower of Life - if you can convince him you're a builder by getting the outfit, he will let you into the tower. You need a hard hat, some scruffy trousers, a good top, and some hard boots. Talk to the other builders to get them.
*Talk to [['Black-eye']] to get a [[hard hat]], and answer his three questions. Here are the questions and answers:

:#''How many nails does it take to make a rocking chair?'' - '''Three.'''
:#''What takes 3 planks, 3 cloths and 3 nails to make, and helps remove light from a room?'' - '''Torn curtains.'''
:#''I like fish and I want to put some in my garden, but I need a special water feature. What materials would I require?'' - '''10 clay pieces.'''

{{Map|2656,3212|mtype=pin|align=right|caption=Location of [[Builder's trousers|Trousers]].}}

*Talk to [['Gummy']] and ask for trousers. He says he lost a pair around the tower - just search the [[plant (Tower of Life)|plants]] south-east of the tower to find the [[Builder's trousers]].
*Talk to [['The Guns']], who wants a [[beer]]. Go and buy a beer for 2 [[coins]] at [[Flying Horse Inn|The Flying Horse]] pub in north-west East Ardougne or the pub at the [[Fight Arena (location)|Fight Arena]] or [[Yanille]] and return, give him the beer, and he will give you his [[Builder's shirt|shirt]].
*Finally, talk to [['No fingers']] and [[Thieving#Pickpocketing|pickpocket]] him when he refuses to give you the [[Builder's boots|boots]].
*Once you've acquired all the items, you must answer some questions from Bonafido for him to grant you entry to the tower. The answers are:

:#''You've plenty of work to do, but you need a drink fast - what do you go for?'' - '''Tea.'''
:#''Now, let's hear you whistle!'' - '''Whistle for attention.'''
:#''What's a good sign that you need to replace your trousers?'' - '''Your legs are getting a bit cold.'''
:#''What do you do if you cut your finger?'' - '''Carry on, it'll fix itself.'''

After answering these questions, you are allowed to enter the tower. Please note that you need to wear the outfit if you want to enter the tower at any time during the quest, although it is not needed after.
"""

