text = """
{{Needed|a cat '''or''' kitten, 5 death runes, a catspeak amulet|recommended=a Varrock teleport, Games necklace}}

You do not need to have your kitten or cat following the entire time—simply keep it in your inventory throughout the quest, and it will jump out to participate in necessary dialogue, and then you can pick it back up again to avoid it becoming overgrown. Equip your [[catspeak amulet]], and start the quest by talking to [[Unferth]], who can be found in east [[Burthorpe]] in the house south of [[Dunstan]]. After starting, talk to [[Hild]] in the nearby house north-east of [[Unferth]]. She will enchant your catspeak amulet if you give her five [[death runes]]. You can now open it to find [[Bob (cat)|Bob]]'s location. It works somewhat like a compass - when facing north, click the left or right whiskers to control the interface and point it in the right direction. When you see the central cat's eyes light up, go in that direction to find Bob. He can only be found in [[Misthalin]], [[Asgarnia]], and the northern part of the [[Kharidian Desert]] (he cannot pass through the [[Shantay Pass]] into the rest of the desert). '''However it is recommended to pick a common spot where Bob is found, and then world hop.''' He is commonly found at the Varrock anvils (south of the [[Varrock west bank]], not the armour shop anvils), or the Catherby Archery Shop.

