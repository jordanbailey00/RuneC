[[steps]]
index = 1
name = "Strong lineage"
links = ["Bob (cat)", "Neite", "Gertrude", "Robert the Strong", "Varrock Palace", "Reldo", "Dragonkin", "cat", "Sphinx"]
text = """
After finding [[Bob (cat)|Bob]], talk to him. He will tell you that he's in love with [[Neite]], but she has no idea what his origins are so she's not interested in him. Talk to [[Gertrude]] (located south of the Cooking Guild, West of Varrock) about Bob's family. While there, your cat will tell you to research a warrior called [[Robert the Strong]].

In the [[Varrock Palace]] library, talk to [[Reldo]]. He will tell you that Robert the Strong was much taller and stronger than any other man of his time. His longbow was six feet tall, and he fought immortal monsters known as the [[Dragonkin]]. He fought alongside a black panther.

Return to Bob ('''who might have changed location, use the enchanted Catspeak amulet to locate him'''). You and your [[cat]] will try to convince Bob he is Robert the Strong. Your cat will remind you of the fact that the [[Sphinx]] knows how you were hypnotised, so perhaps it can hypnotise Bob.
"""

[[steps]]
index = 2
name = "Hidden memories"
links = ["Nardah teleport", "ring of charos", "Raetul and Co's Cloth Store.", "Sphinx", "Sophanem", "Pyramid Plunder", "Burthorpe", "Robert the Strong", "Odysseus", "Dragonkin (A Tail of Two Cats)", "Neite"]
text = """
[[File:A Tail of Two Cats - talking to sphinx.png|thumb|The Sphinx talking to Bob the cat in the desert.]]
{{Needed|recommended=[[Nardah teleport]]''' AND coins for the magic carpets (and [[ring of charos]] for discounted rides) OR Desert clothing AND waterskins AND 80gp if you are buying the desert outfit in Sophanem. ''Additionally''' you will need a games necklace if you decide to skip the cutscene}}

You can use the Pharoh's sceptre to get here faster (Jalsavrah teleport is in Sophanem).

If you haven't gotten the desert outfit, you can buy it from [[Raetul and Co's Cloth Store.]], which can be found east of the [[Sphinx]].

Talk to the Sphinx in [[Sophanem]]. A good way of getting there is to take a magic carpet to Pollnivneach from Shantay Pass and then to Sophanem using Pollnivneach's southern carpet - the Sphinx is south-east of the northern [[Pyramid Plunder|pyramid]]. Ask her for help, and after a bit, you'll have the option to view a five-minute cutscene or get a brief summary of what happens. '''''If you choose the brief summary, you won't be offered the option of being teleported to [[Burthorpe]].'''''

During the cutscene, the Sphinx will teleport Bob to Sophanem and hypnotise him. Bob, thinking back on his earliest memories, recalls himself as [[Robert the Strong]]. He sees himself looking over at a tower beside [[Odysseus]], followed by a battle between them and a [[Dragonkin (A Tail of Two Cats)|Dragonkin]]. The Dragonkin manages to slay the panther and weaken Robert, however Robert manages to kill the Dragonkin.<gallery captionalign="center">
Bob The Cat Hypnotised.gif|Bob the Cat hypnotised by the Sphinx
A Tail of Two Cats - dragonkin's castle.png|The Dragonkin on top of its castle.
A Tail of Two Cats - Odysseus dies.png|Odysseus fighting the Dragonkin, before being killed.
A Tail of Two Cats - Robert vs the Dragonkin.png|Robert continues to fight the Dragonkin after Odysseus dies.
A Tail of Two Cats - dragonkin dies.png|Robert finally kills the Dragonkin
</gallery>
After the cutscene, the Sphinx teleports [[Neite]] to Bob, who will be impressed and fall in love with him. Bob will tell you to keep his owner busy by doing his chores, and you will be given the option to teleport back to Burthorpe (only if you choose to hear the long summary), or stay in Sophanem.
"""

[[steps]]
index = 3
name = "Bob's list"
links = ["Unferth", "Burthorpe", "chores", "Unferth's patch", "potato seed", "bed (A Tail of Two Cats)", "logs", "fireplace (A Tail of Two Cats)", "bucket of milk", "chocolate cake", "table (A Tail of Two Cats)", "shears", "Apothecary", "Varrock", "doctor's hat", "nurse hat", "vial of water"]
text = """
{{Needed|Catspeak amulet (wear it), A vial of water, logs, a tinderbox, a bucket of milk, a chocolate cake, shears, a rake, a seed dibber, 4 potato seeds, Desert shirt or Druid's robe top or Medical gown, Desert robe or Druid's robe|recommended=Varrock teleports, a games necklace}}

Go back to [[Unferth]]'s house in [[Burthorpe]] and do these [[chores]]:
[[File:A Tail of Two Cats - cutting Unferth's hair.png|thumb|One of the chores Bob asks you to do while he is gone.]]

*Tend garden: Using your rake, weed [[Unferth's patch]] in the yard just north of the house and plant four [[potato seed]]s. You now need to wait about 15 – 35 minutes for them to grow. You do not need to water or compost the patch. ''If this is the only remaining chore, you will be alerted by your character or your cat/kitten saying all the chores are finished once the potatoes are done growing.''
*Tidy house: Make [[bed (A Tail of Two Cats)|Unferth's bed]]. This takes one click and is the easiest chore.
*Warm human: Use some [[logs]] on the [[fireplace (A Tail of Two Cats)|fireplace]] and light it.
*Feed human: Use a [[bucket of milk]] and a [[chocolate cake]] on the [[table (A Tail of Two Cats)|table]]. '''Right click your cake! Do not eat it. A slice of cake does not work. Make sure it is the table with a cup and plate on it, NOT the one next to his bed.'''
*Tidy human: Use a pair of [[shears]] on Unferth to shave his hair. '''Note: The animation takes a couple of seconds, do not click away until he is bald.'''
*Note: the quest will not allow you to continue until the potatoes are grown.

After you've done all of this, talk to Unferth again. He'll tell you that he's very ill and must see a doctor or a nurse. Talk to the [[Apothecary]] in [[Varrock]] (located in the south-west of the city). He will tell you that Unferth is a {{wp|hypochondria|hypochondriac}} - he thinks that he's sick all the time even though he really has been tested for illnesses and it's all in his head. You need to use a placebo on him - pick a [[doctor's hat]] or [[nurse hat]] from the Apothecary, and wear some white robes (princess robes and graceful outfit don't work).

Go back to Unferth's house, and give him a [[vial of water]]. His illness will clear up. '''Note:''' You can't be wielding a weapon/shield; otherwise, Unferth won't believe you.
"""

[[steps]]
index = 4
name = "Love-cats"
links = ["catspeak amulet", "Bob (cat)", "Neite", "magic carpet", "Sophanem", "King Black Dragon", "R4ng3rNo0b889", "Fishing Trawler", "Unferth", "present"]
text = """
Using your [[catspeak amulet]], find [[Bob (cat)|Bob]] again and talk to him. Log out and log in again if he is not in the same place as before, he will reappear. He may have moved to another of the other locations mentioned above, or he may be in the same location as before. You'll see a cutscene showing all the adventures Bob takes [[Neite]] on, including a [[magic carpet]] ride in [[Sophanem]], a conversation between Bob and the [[King Black Dragon]] (a player spoof known as [[R4ng3rNo0b889]] also tries to attack the dragon, but the dragon kills him instantly), and a journey on the [[Fishing Trawler]] ship.

After the cutscene, you will be teleported in front of [[Unferth]]'s house. Talk to him to get a [[present]] from Bob, finishing the quest.

'''Congratulations, quest complete!'''

