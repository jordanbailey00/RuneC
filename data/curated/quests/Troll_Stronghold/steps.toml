quest = "Troll Stronghold"
step_count = 4

[[steps]]
index = 0
name = "Dad"
links = ["Dad", "Melee", "Stun (status)", "safespotted", "Ranged", "Magic", "halberd", "Defence", "mountain troll", "Trollheim", "thrower troll", "Agility", "Protect from Missiles", "God Wars Dungeon", "Troll Stronghold (location)"]
text = """
A huge troll called [[Dad]] will prevent passage until you defeat him. At level 101 and using a tree to hit with [[Melee]], he can hit up to 27 and send players flying, temporarily [[Stun (status)|stunning]] them. Dad can be [[safespotted]] by standing next to the western gate, or standing where the audience is, and attacking with either [[Ranged]] or [[Magic]] (using a [[halberd]] is a good Melee alternative). Note that Dad has high [[Defence]] stats against Ranged and Magic, so it may take a little bit before you kill him. It is much easier to damage Dad using magic, compared to range. 

When Dad is low on health, he will ask you to spare his life. Spare him and walk past to the gate north of the arena. Be careful as he may try to hit you still if you are in range. '''Note:''' If you don't spare his life, you can still continue the quest.

Enter the cave north of the arena, and go past the level 69 and 71 [[mountain troll]]s. Beyond this is [[Trollheim]]. There are level 68 [[thrower troll]]s who will range players here as they walk past the northern part of the mountain. You can avoid them entirely by taking a shortcut by climbing up the rocks, starting from the eastern region of the mountain and ending at the western side. Some of the shortcuts require 41, 43, 44, or 47 [[Agility]]. If you do not have at least 44 Agility, run around the mountain and activate [[Protect from Missiles]] around the northern bend to avoid taking too much damage from the trolls to get to the western portion. (Avoid the north-west portion going towards the [[God Wars Dungeon]].)

Go west of Trollheim and north past several mountain trolls. Enter inside the [[Troll Stronghold (location)|Stronghold]].
"""

[[steps]]
index = 1
name = "Inside the stronghold"
links = ["mountain troll", "Kob", "troll generals", "prison key (Troll Stronghold)", "Protect from Melee", "safespot", "Ranged", "Magic", "Dad", "Defence"]
text = """
[[File:Troll general safespot.png|thumb|220px|Safespot for the Troll General.]]
Inside are some more level 69 and 71 [[mountain troll]]s. From the entrance, walk south until you see a door on the west wall. Enter and walk north, passing the non-aggressive troll, [[Kob]]. You will see several '''aggressive''' [[troll generals]] (level 113). They wield huge granite knives and mauls, which can hit up to 38. Kill one to get a [[prison key (Troll Stronghold)|prison key]]. Use [[Protect from Melee]] or [[safespot]] them with [[Ranged]] or [[Magic]]. The southern-most general can be safespotted easily by standing on either side of the desk in his room, or by standing next to the ladder and luring him out into the corridor. Like [[Dad]], it may take a while if killing with Ranged or Magic as they have a high [[Defence]] against both.
"""

[[steps]]
index = 2
name = "Prison break"
links = ["Burntmeat", "Troll Stronghold (location)", "Berry", "Twig", "Thieving", "Cell key 1", "Cell key 2", "safespot", "Eadgar", "Godric"]
text = """
[[File:Berry and Twig safespots.png|thumb|220px|Safespots for Berry and Twig.]]
Once you have the key, go back south, down the stairs arriving in [[Burntmeat]]'s Kitchen, and then go to the very north end of the [[Troll Stronghold (location)|Stronghold]]. Enter the locked door with the prison key, and climb down again to reach a jail. Head west and south, and you'll see two sleeping prison guards called [[Berry]] and [[Twig]]. Both are level 71. If you have level 30 [[Thieving]], pickpocket both to get [[Cell key 1]] and [[Cell key 2]]. Beware, if you fail to pickpocket one, they will still attack you! If not, kill them for the keys. You can [[safespot]] both trolls by standing inside one of the vacant cells. Free both [[Eadgar]] and [[Godric]] with the keys; then, exit the prison by going south to the secret exit.
"""

[[steps]]
index = 3
name = "Finishing up"
links = ["minigame teleport", "games necklace", "Burthorpe", "Dunstan", "Smithing"]
text = """
Head south-east and climb over the rocks; you can use the [[minigame teleport]] or use a [[games necklace]] to return to [[Burthorpe]]. Go to the north-east corner of the city, and talk to [[Dunstan]] (look for the [[Smithing]] icon) for your reward.

'''Congratulations, quest complete!'''
"""
