text = """
[[File:Ghost (Hopespear) chathead.png|left]]
Head to the [[Goblin Cave]] entrance located just east of the [[Fishing Guild]]'s entrance. Enter the cave and walk north, then west until you find two [[Goblin guard (Land of the Goblins)|goblin guards]] guarding the entrance to the temple. Drink a dose of [[goblin potion]] and enter the temple. '''Do not equip the ghostspeak amulet and ring of visibility yet, or you will revert to human form and be expelled from the temple.'''
[[File:Goblin Temple crypt.png|thumb|280px|The crypt of the Goblin Temple.]]
Make your way to the crypt within the [[Goblin Temple]], and once inside then equip the [[ghostspeak amulet]] and [[ring of visibility]] or [[ring of shadows]]. You will see the ghost of [[Hopespear]], the goblin prophet. Ask him why he is here, and he will tell you that he is waiting for the [[Big High War God]] to take his spirit to [[Yu'biusk]].

Tell him that you have been to Yu'biusk, and he will ask you for a favour: to free the souls of the goblin high priests. To do this, you must complete a ritual which includes killing the goblin priests, without the use of weapons, spells, or armour, and retrieving their bones to be buried in Yu'biusk. 

'''Remove any items you have equipped''' or else the goblin high priests will not drop their bones upon defeat. This includes any equipment that gives stat bonuses, and jewellery like [[Ring of recoil|rings of recoil]]. Attempting to cheese the fights with stat-less [[attack speed]] enhancing weapons such as the [[Ham joint]] or [[goblin paint cannon]] will not work either. However, the [[ghostspeak amulet]] and [[ring of visibility]] or [[ring of shadows]] can still be worn, but [[Morytania legs]] cannot be worn.

Now summon and battle the five high priests as done during [[Land of the Goblins]] by speaking their name over their grave. Unlike the quest, the high priests can be fought in any order. 

