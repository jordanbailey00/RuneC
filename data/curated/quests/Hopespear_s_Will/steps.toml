[[Strongbones]] is by far the hardest of the high priests. To take him on it is recommended to have at least level 70 melee stats along with 70 Prayer for [[Piety]], or slightly higher melee stats if using [[Chivalry]]. Redeyes and Strongbones will also periodically lower your Attack, Strength and Defence, so a few regular [[Super combat potion|super combat potions]] are also advised to keep boosting throughout the fight. Strongbones will hit up to 18 regularly so bring as much high-healing food as possible, as well as 2-3 Prayer potions (3-4 if around 70 melee stats) to keep up [[Protect from Melee]] and Piety. Having access to the [[ring of shadows]] over the [[ring of visibility]] will also aid in boosting combat stats. 

'''Note:''' You can recharge your Prayer inbetween fights at the [[Altar (Goblin Temple)|altar]] outside of the crypt, provided you still have doses of your goblin potion. Drink a dose of it before leaving the tomb. You also do not have to defeat all the high priests in one go; you can leave the crypt to restock and bank any bones collected thus far. '''When returning, another dose of goblin potion is needed to enter the crypt but the ghostspeak amulet and ring of visibility are not needed'''. If you die fighting any of the high priests, you will lose any bones in your inventory and they will not be protected by your gravestone, so you must fight them again. Your gravestone will appear in the [[Goblin Cave]], near the stairs leading to the temple, thus, you do not need another dose of goblin potion to reclaim your items. 

'''Note:''' You must pick up each goblin's set of bones before killing the next, as the new goblin's death will cause the old goblin's bones to despawn. 

Finally, use [[fairy ring]] code {{fairycode|BLQ}} to reach Yu'biusk, and once there bury the bones. Players do not need to bury all five sets of bones at once. Burying all of the bones will complete the miniquest.   

The rewarded XP for each priest is as following:
