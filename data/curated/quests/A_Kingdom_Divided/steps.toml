quest = "A Kingdom Divided"
step_count = 13

[[steps]]
index = 0
name = "The Disgraced Councillor's Escape"
links = ["Martin Holt", "Kourend Castle", "Kingstown", "protester", "Kourend Council", "Commander Fullore", "Sophia Hughes", "Tomas Lawry", "lesser demon", "Receipt (A Kingdom Divided)", "Rose (A Kingdom Divided)", "Kourend map", "Demonic incantations", "Order form", "Delivery confirmation", "Bloody knife", "Bone (A Kingdom Divided)", "Cultist robe", "The Deeper Lode", "Mount Quidamortem", "Lovakengj", "Fuggy", "Jewellery of jubilation", "Kharedst's memoirs", "Port Piscarilius", "Veos"]
text = """
[[File:Martin Holt chathead.png|left]]
Start out by talking to [[Martin Holt]], just east of the [[Kourend Castle]] in [[Kingstown]]. He can be found on a platform near the [[protester]]s. He will explain that the previous king's daughter was supposed to take over the throne, but the [[Kourend Council]] seems to have taken control for themselves; agree to help him to start the quest and Martin will explain what needs to be done. He tells you to talk to [[Commander Fullore]] on the ground floor of the castle.

[[File:A Kingdom Divided - Tomas Lawry appears.png|thumb|right|Tomas Lawry arrives to take over the investigation.]]
Talk to the Commander and she will explain that the council is actually very beneficial to Kourend. She will agree to have you help find [[Sophia Hughes]], given that you follow her orders. Say "Let's get going" and you will see a cutscene, where [[Tomas Lawry]] will claim to have the authority to lead this investigation. After the cutscene is finished, enter the house just north of you and search the scenery around the house to find clues where Hughes may have gone. The objects that can be searched are:
* {{FloorNumber|uk=0}}: 4 shelves, 2 tables, 4 cabinets, roses
* {{FloorNumber|uk=1}}: Bathtub, desk, dresser, chest, bed, 3 drawers, 2 wardrobes
* {{FloorNumber|uk=2}}: Table, skeleton
** Note: Watch out for the [[lesser demon]] (level 82) on the top floor.
Note: You do not need all of the clues to continue with the quest. You only need to search the drawers by the door to the bedroom on {{FloorNumber|uk=1}} to get the [[Receipt (A Kingdom Divided)|receipt]].

If you want all of the clues, they are:
{{Checklist|
* [[Rose (A Kingdom Divided)|Rose]]
* [[Kourend map]]
* [[Demonic incantations]]
* [[Order form]]
* [[Delivery confirmation]]
* [[Bloody knife]]
* [[Receipt (A Kingdom Divided)|Receipt]]
* [[Bone (A Kingdom Divided)|Bone]]
* [[Cultist robe]]
}}

Inspect the [[Receipt (A Kingdom Divided)|receipt]] and it will indicate that there is an order for a bed at [[The Deeper Lode]]. Talk to Tomas Lawry by the roses in the house where you searched for clues and tell him you have found something that might be useful. Due to his incompetence, you will tell him that Sophia may have gone to [[Mount Quidamortem]] and he goes there without question. Talk to Fullore again and you will tell her that you suspect Hughes may have gone to the Deeper Lode.

Go to the Deeper Lode, the pub in [[Lovakengj]], and talk to [[Fuggy]]. A quick method of getting there is by using the [[Jewellery of jubilation]] teleport on [[Kharedst's memoirs]] and running east. Ask him if he has had any councillors stay there recently; he will say he's had only one human customer lately, a woman who did not look like a councillor. He will mention that he overheard her saying she was going to catch a ship in [[Port Piscarilius]]. Upon asking which ship it was, the ground will shake briefly, after which he will say she was going to catch [[Veos|Veos']] ship.
"""

[[steps]]
index = 1
name = "Standing before the Judge"
links = ["Food", "combat equipment", "Judge of Yama (A Kingdom Divided)", "Veos", "Port Piscarilius", "Cabin Boy Herbert"]
text = """
[[File:A Kingdom Divided - confronting Sophia Hughes.png|thumb|The player and Commander Fullore confront Sophia Hughes.]]
{{Needed|recommended=[[Food]] and [[combat equipment]] to defeat the level 168 [[Judge of Yama (A Kingdom Divided)|Judge of Yama]] with melee.}}

Go to [[Veos|Veos']] ship in [[Port Piscarilius]] and talk to [[Cabin Boy Herbert]], who has taken Veos' place. He will say Veos just wandered off in a trance right after the earthquake. Ask him if he has seen the councillor, and he will tell you that the ship is about to leave soon. A cutscene will start where you confront Hughes, who will claim that all her crimes were coordinated with the rest of the council and that she is being betrayed by them to save themselves. She will hint at playing a role in getting rid of the old king and his daughter. She will then summon a [[Judge of Yama (A Kingdom Divided)|Judge of Yama]] to eliminate the two of you, but because she had "taken advantage" of Yama's generosity, the demon incinerates her before focusing on the two of you, also deeming you a threat to Yama. You will challenge the demon, who will agree to remove the "sins" you committed if you defeat it in combat.

[[File:Fighting the Judge of Yama.png|thumb|250px|The player is challenged to a fight by the Judge of Yama.]]
"""

[[steps]]
index = 2
name = "= The Fight ="
links = ["Judge of Yama (A Kingdom Divided)", "magic", "ranged", "melee", "Fire Wave (Judge of Yama)", "portal (A Kingdom Divided)"]
text = """
The [[Judge of Yama (A Kingdom Divided)|Judge of Yama]] is immune to [[magic]] and [[ranged]] damage, meaning it is only vulnerable to [[melee]]. The demon itself also only attacks with [[melee]] when up close, but it will occasionally teleport you further on the docks, and cast [[Fire Wave (Judge of Yama)|waves of fire]] towards you; since it can only be damaged with melee, you need to pass through the waves to reach the boss.

The battle takes place on a thin pier of 4 squares wide, where the demon will cast three waves of fire towards you. This leaves a single square without a wave, which can be used to dodge the attack completely. Use these gaps to walk closer towards the demon and then attack it. If you run into a wave of fire, you will take moderate damage and be inflicted with a minor burn. Repeat this if you get teleported back away from the demon, until it dies. Players with decent Hitpoints (70+) may find it easier to simply run through the waves back to the Judge and tank the damage.

If you die or have to teleport for any reason throughout the fight with the Judge of Yama, there will be a [[portal (A Kingdom Divided)|portal]] to re-enter the battle near Veos' ship in Port Piscarilius. If you die, the gravestone appears by this portal.
"""

[[steps]]
index = 3
name = "Kourend's Last Princess"
links = ["Axe", "runes", "Fire spells", "Fire Strike", "Fire Bolt", "Xeric's talisman", "Kharedst's memoirs", "Great Kourend", "games necklace", "food", "combat equipment", "Assassin (A Kingdom Divided)", "Councillor Andrews", "Martin Holt", "Commander Fullore", "Shayzien mine", "Royal Society", "Library Historical Archive", "Archeio", "Arceuus Library", "Istoria", "bluish key", "Rose's diary", "Rose's note", "axe", "Forthos Ruin", "Settlement Ruins", "Wintertodt Camp", "ice wolf", "ice giant", "ice spider", "dragon dagger", "dragon dart", "cold key", "The Legless Faun", "Port Piscarilius", "Mount Karuulm", "Fairy ring", "Farming Guild", "skills necklace", "bed (tatty note)", "tatty note", "Councillor Orson", "Kourend Council"]
text = """
{{Needed|[[Axe]], [[runes]] to cast a [[Fire spells|fire spell]] higher than [[Fire Strike]] ([[Fire Bolt]] works).|recommended=[[Xeric's talisman]] or [[Kharedst's memoirs]] for quick transport around [[Great Kourend|Kourend]], [[games necklace]], [[food]], and [[combat equipment]] to defeat a level 132 [[Assassin (A Kingdom Divided)|Assassin]].}}
[[File:A Kingdom Divided - Andrews thanks.png|thumb|Councillor Andrews expresses his gratitude for dealing with the demon.]]
A cutscene will play where [[Councillor Andrews]] will thank you for your help, and tell you they will be investigating how Hughes managed to escape. Meanwhile, he will ask you to tell [[Martin Holt]] that the issue with Sophia Hughes is resolved, so he and the other protesters should go home. Before doing that, however, [[Commander Fullore]] will ask you to meet her outside the castle. She will be standing just south of the castle, directly north of the [[Shayzien mine]] (accessible through the small door in the south wall of the castle).

Talk to the commander, and she will discuss the things Hughes said on the docks. She will give some backstory regarding the old king, and his daughter called Rose. Fullore will ask you to investigate the council's conspiracy against the royalty, and recommends you start by talking to [[Martin Holt]]. Martin is the leader of the Kourend [[Royal Society]], and the expert on the old royal family. He may know where Rose is. Talk to him to ask him about Rose's whereabouts. He will mention that Rose wrote [[Kharedst's memoirs]], which were recently auctioned off. However, Rose's personal diary is still in the [[Library Historical Archive]]. He will ask you to talk to [[Archeio]] in the [[Arceuus Library]] (A minecart south-east will take you straight there), who will teleport you to the Archive.

In the Archive, pickpocket [[Istoria]] to obtain a [[bluish key]]. Use it to open the purple display case in the eastern wall of the south-eastern corner of the room to obtain [[Rose's diary]]. Read it, and you will not find anything of note. Go back to [[Martin Holt|Martin]], and talk to him while holding Rose's diary. He will find [[Rose's note|a note]] in the cover of the book, and read through it. After that he hands it to you. Read it, to find some instructions on where to find more information. Talk to Martin again, and he will tell you to split up from him and figure out what the location is the note is hinting at.

Grab an [[axe]] from your bank, and head to the [[Forthos Ruin]]s. Talk to Martin on the west side of the northern entrance, and he will explain what the note meant, and why this must be the location. After giving some explanations on his past involvement with the Council, his relationship with [[Commander Fullore]], and the corruption that goes on inside the current government of Kourend.

Search the four stone piles around the ruins to figure out the number combination. Write these down. Each stone pile has an inscription where a letter is mapped to a number. For example, a tile may say "S - 9", which means the letter S maps to the number 9. The combination required is random for all players, so note down the numbers. Chop the vines just south of [[Martin Holt]], and squeeze through them. On the east wall of this small room, check the panel. Fill in the number combination that matches the numbers for "ROSE". Doing so will give you another [[Rose's note#Forthos Ruin|note]]. Read it, and talk to Martin again. You will split up again, and meet at the next location.

[[File:A Kingdom Divided - fighting assassin.png|thumb|right|The player and Martin are ambushed by an assassin.]]
Grab runes to cast a fire spell, [[Fire Bolt]] or higher works. Head to the [[Settlement Ruins]], just south-west of the [[Wintertodt Camp]]. Beware of the aggressive [[ice wolf|ice wolves]], [[ice giant|giants]], and [[ice spider|spiders]]. Martin can be found in the north-western building in the ruins. Talk to him and you will be attacked by a level 132 [[Assassin (A Kingdom Divided)|Assassin]]. He will exclaim that he is there to kill Martin. Kill him. The assassin will attack with a [[dragon dagger]] and [[dragon dart]]s, so protection prayers will not be able to block all damage. You can use range and safespot the assassin using the short wall in the room while praying Protect from Missiles to negate all damage. Regardless, this fight should not be too difficult compared to the fight with the demon.

Martin will believe that the Council had hired assassins to kill him, but you quickly point that the assassin only mentioned Martin, thus ruling the decision out.

You now need to find a key to the panel in the ruins. Cast [[Fire Bolt]] or a higher fire spell on the Ice chunks in just west of the southern part of the building you're in. This melts the ice, which means you can retrieve the [[cold key]] from it by searching the chunks. Check the panel on the western wall of the building near Martin. You will find another [[Rose's note#Settlement Ruins|note]]. Read it, and talk to Martin again to move on to the next location.

Travel to [[The Legless Faun]], the pub on the southern edge of [[Port Piscarilius]]. Speak to Martin again, and he will give some more information about the situation. You will have to climb the pillar just west of Martin, to reach the upper floor of the pub building. Search the panel on the northern wall of the building, and take note of the order the cities are listed in. Climb down the wall again, and inspect the statues in the '''same''' order as given on the panel; press it in for each of the statues. If you did it right, you will hear a click nearby. Climb back up the pillar and check the panel to receive [[Rose's note#The Legless Faun|the final note]].

A cutscene will play of you looking over the balcony, observing Lawry arrest Martin for inciting protests against the Council, leaving you on your own. Read the note to find the final location in the hunt for Rose. This is located at the small house just south of [[Mount Karuulm]], and can be easily reached by travelling west of the [[Fairy ring]] {{fairycode|cir}} or teleporting to the [[Farming Guild]] with a [[skills necklace]] and running north-east. Search the [[bed (tatty note)|bed]] to find a [[tatty note]]. Read it to discover it's a letter to Rose from a certain "L.O." Inspect the crates in the north-western corner of the shack, and climb down the hidden trapdoor. (''Note: The option to inspect the crates will not appear until you've read both notes.'')

A cutscene will play of a woman − presumably Rose − lying on a large stone on the side of the underground room. A man will walk in, identifying himself as [[Councillor Orson|Councillor Liam Orson]], of the [[Kourend Council]]. After a short conversation you will bring in Fullore, and together you get Orson to confess, where he reveals that he and the others killed the King to save the kingdom and that Rose is being kept alive by potions from a mysterious mage that resided with the lizardmen.

If you accidentally click anywhere other than the chat box during the cutscene it will end and put you back in the shack. You can inspect the crates again to resume.

<gallery captionalign="center" widths="200">
A Kingdom Divided - Martin Holt is arrested.png|Martin is arrested by Tomas Lawry.
A Kingdom Divided - Councillor Orson confesses.png|The player discovers Rose and Councillor Orson.
</gallery>
"""

[[steps]]
index = 4
name = "The Mysterious Mage"
links = ["Weapons", "armour", "Xamphur", "food", "prayer potion", "Toxic blowpipe", "Dragonhide armour", "Abyssal whip", "Dragon scimitar", "Prayer potion", "Shark", "Teleport tab", "Lizardman Temple", "Molch", "Kaht B'alam", "lizardman egg", "Lizardman brute", "Kourend & Kebos Diary", "damp key", "Veos"]
text = """
{{Needed|1 inventory space, [[Weapons|Weapon]] and [[armour]] to kill [[Xamphur]], [[food]], antipoison potions, and [[prayer potion]]s.}}

Gear up for the fight against [[Xamphur|a level 239 enemy]] that uses several special mechanics. Using a ranged weapon such as a [[Toxic blowpipe]] will make the fight much easier, though armour with good magic defence such as [[Dragonhide armour]] should be brought even with melee. For melee bring an [[Abyssal whip]] or better if possible, though a [[Dragon scimitar]] will also suffice. If you are a low combat level (~80), bring at least 3-4 [[Prayer potion]]s and 20+ high-healing food such as [[Shark]]s. You should also bring an emergency one-click teleport such as a [[Teleport tab]].

Head to the [[Lizardman Temple]] in [[Molch]] - use a skills necklace to teleport to the Farming Guild and head south-east. Enter the temple via any of the Lizard dwelling entrances and head east through the middle hallway. Enter the room to the north, where you will find [[Kaht B'alam]]. Talk to him and ask him if he can help you find a mage, or as they call him, Yo'kal ahk. He will help you get to the mage, but in exchange he wishes to escape from the war against the humans. To do that, he wants to take his [[lizardman egg|last egg]] with him, and asks you to retrieve it for him.

Exit the temple through the strange hole at the west end of the hallway and head west in the swamp and go south across the stone bridge, to find several piles of Lizardman eggs. Search them until you find the right pile, at which point you will be attacked by a level 75 [[Lizardman brute]]. You do not need to kill the brute, but you may choose to complete a medium [[Kourend & Kebos Diary]] task by killing it.

Return to Kaht with his egg, who will give you a [[damp key]] to unlock the small door on the northern wall in the corridor of the temple by the bones, close to Kaht. Through the door is a small room that leads to a gate. Open the gate to start a cutscene, after which you will enter the boss fight with [[Xamphur]]. In the cutscene you will see two mysterious voices discussing the past events in the Kourend quest line. After some time, one of the voices will be revealed to be Xamphur, and the other voice turns out to be [[Veos]]. Veos will sense your presence and order Xamphur to eliminate you, who forcibly teleports you into his chamber and attacks.

<gallery captionalign="center" widths="200">
A Kingdom Divided - eavesdropping on the mage.png|The player eavesdrops on the mysterious mage.
A Kingdom Divided - Xamphur appears.png|Xamphur appears to kill the player.
</gallery>
"""

[[steps]]
index = 5
name = "= The Fight ="
links = ["Xeric", "Xamphur", "Magic", "Protect from Magic", "Mark of Darkness", "Corruption (status)", "Corruption", "The Ascent of Arceuus"]
text = """
[[File:Fighting Xamphur.png|thumb|280px|The player fights against Xamphur, one of [[Xeric]]'s closest comrades.]]
[[Xamphur]] is immune to [[Magic]] attacks, and attacks primarily with magic; praying [[Protect from Magic]] will greatly reduce damage done by Xamphur's basic attack. It is recommended to use range against him if you are low level.

Around the room, there are several Marks of Darkness on the floor. Walking over these will inflict a [[Mark of Darkness]] effect on you, causing his basic attack to become twice as effective, and cause [[Corruption (status)|corruption]] to happen twice as often, if you get corrupted by one of the other mechanics. Avoid these marks to fully avoid this effect; be aware that he can also bind you in place, so for this reason, it's critical to ensure that you're never standing on a Mark of Darkness.

The best method is to turn off auto retaliate and running, '''pick a row of tiles that you can move on, and only walk along that plane throughout the fight'''. This will also allow you to more easily avoid his hand crushing attack later in the fight.

Other than the basic attack, he has two special mechanics, which he uses '''every ten attacks.'''
{| class="wikitable"
|+
!Mechanic
!Action
!Pray
|-
|Hands will fall from ceiling, '''dealing up to 10 damage every tick''', for 5–10 seconds
|Walk around the room, avoiding Marks of Darkness.

Stepping between two tiles, when timed correctly, will also work.
|Magic
|-
|Two Phantom Hands spawn
|'''Kill the hands as soon as possible'''. They have 12 Hitpoints
and can cause [[Corruption]] upon inflicting damage.
|Magic if high prayer. Melee if
low prayer, to avoid Corruption.
|}
[[File:A Kingdom Divided - Lizardmen arrive.png|thumb|250px|Lizardmen arrive to deal with the player's 'corpse'.]]

If you leave the fight, whether by dying or by teleporting away, entering the door again will immediately put you back into the fight. If you died, your gravestone will be outside the door.

After you have defeated Xamphur, he will state that your efforts to defeat him are amusing as he unleashes a powerful bolt of magic that seemingly kills you. There is then a short cutscene where two lizardmen come to dispose of your body, but run away when they hear you groan and think you are a zombie. After standing back up, search the table in the north wall of the room to read a note. The note reveals that Xamphur was responsible for the events that occurred during the quest [[The Ascent of Arceuus]]. After reading it, return to Fullore in the basement of the shack where you found Rose, near fairy ring code {{Fairycode|cir}}, by inspecting the crates again.
"""

[[steps]]
index = 6
name = "The Houses of Kourend"
links = ["Xeric's Lookout", "Lord Arceuus", "Tower of Magic", "Arceuus Library Teleport", "fairy ring", "Kharedst's memoirs", "Lord Hosidius", "Hosidius", "vinery", "Xeric's talisman", "Lady Lovakengj", "Lovakengj Assembly", "Lady Piscarilius", "The Warrens", "Port Piscarilius", "Lord Shayzien", "War Tent", "Shayzien Encampment", "Woodcutting Guild", "Lord Kandur Hosidius", "Royal Accord of Twill"]
text = """
Return to the basement and a cutscene will play where you explain to Fullore what just happened. Fullore will tell you that she researched the potions and confirmed Orson's statement that the potions were the only thing keeping Rose alive, and adds that Rose has been braindead since she was originally poisoned twenty years ago. She decides to mercy kill her to put her out of her misery before the two of you bury her outside the house. With the truth known, Fullore suggests that you speak to the leaders of the five Houses as they have the power to overthrow the council. Go past each of the five cities to ask their leader to come to [[Xeric's Lookout]].
[[File:A Kingdom Divided - Rose's funeral.png|thumb|250px|The player and Commander Fullore bury Rose, the last princess of Great Kourend.]]

{{Checklist|
* [[Lord Arceuus]] is found in the upper level of the [[Tower of Magic]], north-west of Arceuus. Players can use the [[Arceuus Library Teleport]] spell or tablet and run west, or using a [[fairy ring]] (code {{Fairycode|CIS}}) and running south-west. Players can also use [[Kharedst's memoirs]] ("A Dark Disposition" teleport) and run north-west past the Library.
* [[Lord Hosidius]] is found in the family mansion in [[Hosidius]], north-west of the [[vinery]]. [[Xeric's talisman]] ("Xeric's Glade" teleport) brings players a short distance from the mansion; players can also use [[Kharedst's memoirs]] ("Lunch by the Lancilliums" teleport) and run south, east across the bridge, and south again.
* [[Lady Lovakengj]] is found in the [[Lovakengj Assembly]] in Lovakengj. Players can use [[Kharedst's memoirs]] ("Jewellery of Jubilation" teleport) and run westwards, or use [[Xeric's talisman]] ("Xeric's Inferno" teleport) and travel south.
* [[Lady Piscarilius]] is found in [[The Warrens]] under [[Port Piscarilius]]. Players can use [[Kharedst's memoirs]] ("The Fisher's Flute" teleport) to teleport close to the entrance.
* [[Lord Shayzien]] is found in the upper level of the [[War Tent]] in the [[Shayzien Encampment]]. Players can use a [[fairy ring]] (code {{Fairycode|DJR}}) and run south-east, or use [[Kharedst's memoirs]] ("History and Hearsay" teleport) and run north, past the city.
}}

[[File:A Kingdom Divided - the Five Houses meet.png|thumb|right|The leaders of the Five Houses of Kourend meet.]]
After talking to them all and asking them to meet you at [[Xeric's Lookout]], go to the lookout (shortcut via [[Xeric's talisman|Xeric's Talisman]], or west-north-west of the [[Woodcutting Guild]] entrance) and talk to Fullore. A cutscene will play of the five leaders, Fullore, Orson and the player discussing what has happened, and confronting Orson with what he has done. After some discussion regarding what should happen after the council is deposed by the leaders of the five houses, [[Lord Kandur Hosidius]] will show the [[Royal Accord of Twill]] as a proposed solution to the issue.

Visit the different floors of the lookout, including Lord Arceuus outside at the entrance, and talk to each of the leaders before doing any of their tasks in order to be able to do them all in one go. Each of them will share their opinions on following the Royal Accord. After speaking with Lady Lovakengj, you '''must''' speak with Commander Fullore and tell her you need help with Lady Lovakengj. After that, the tasks may be completed in any order.
"""

[[steps]]
index = 7
name = "=Lady Lovakengj="
links = ["Weapons", "armour", "Assassin (A Kingdom Divided)", "Councillor Andrews", "Councillor Unkar", "Commander Fullore", "Martin Holt", "Shayzien Prison", "Kharedst's memoirs", "Graveyard of Heroes", "Jorra", "declaration"]
text = """
{{Needed|[[Weapons|Weapon]] and [[armour]] to kill a level 132 [[Assassin (A Kingdom Divided)|assassin]]}}

Speak to Lady Lovakengj, who is now on the {{FloorNumber|uk=2}} of the lookout. She will wish to replace [[Councillor Andrews]] with [[Councillor Unkar]], so she must be convinced that Councillor Unkar is not innocent in this conspiracy. Talk to [[Commander Fullore]] and ask about Lady Lovakengj. She will recommend talking to [[Martin Holt]] to find Unkar's connection to the conspiracy. Martin can be found in the [[Shayzien Prison]], just west of the Graveyard of Heroes. Make sure you have spoken to [[Commander Fullore]] or you will not be able to speak with [[Martin Holt]].
[[File:A Kingdom Divided - another assassin.png|thumb|250px|Jorra is ambushed by another assassin.]]
Go west of Shayzien, to the Shayzien prison, very close to the [[Kharedst's memoirs]] ''History and hearsay'' teleport and just south-west of the southern Shayzien bank. Climb down the staircase and talk to Martin, who is in one of the four cells of the prison. A guard will initially stop you from talking to Martin, but relents when you claim to be on a task for the Council. Martin will say that he has no direct proof of [[Councillor Unkar]]'s involvement, but he will tell you to go to the Royal Society's meeting, and tell them the passphrase 'Evil only triumphs when the good do nothing.' to talk to Martin's contact, who is a dwarf. Go to the [[Graveyard of Heroes]] just east of the prison's entrance and talk to [[Jorra]], Vulcana's assistant. Tell him the passphrase and Jorra will start to give some information he found out. However, you will be attacked by an [[Assassin (A Kingdom Divided)|assassin]] again. Defeat the assassin and continue the conversation to receive a [[declaration]]. Read it to learn that there was a plan to overthrow Lady Lovakengj.

Return to Lady Lovakengj with the note, who will be shocked that Unkar had secretly tried to remove her. She will agree to sign the new accord.
"""

[[steps]]
index = 8
name = "=Lord Hosidius="
links = ["Weapons", "armour", "Barbarian Warlord", "barbarian camp", "Kourend Woodland", "Rada's blessing", "Phileas Rimor"]
text = """
{{Needed|[[Weapons|Weapon]] and [[armour]] to kill a level 91 [[Barbarian Warlord]].}}
[[File:A Kingdom Divided - fighting Barbarian Warlord.png|thumb|right|Phileas Rimor is discovered to have been imprisoned, and the Barbarian Warlord attacks.]]
Speak to Lord Hosidius in the basement of the lookout. He needs your help investigating Lord Shayzien's involvement in a [[barbarian camp]] just south of the lookout (he's located downstairs). Go to the barbarian camp in the [[Kourend Woodland]]s, just south-east of the [[Rada's blessing]] Kourend Woodland teleport destination. Go down the ladder next to the southern wall and [[Phileas Rimor]] will talk to you from a cell. A level 91 [[Barbarian Warlord]] who had Phileas captured will attack you. Kill him, and talk to Phileas again. He will say that he was captured by the barbarians, who said they were doing this as a task from someone. The barbarians also stole his package, King Shayzien VII's journal.

Return to Lord Hosidius, who will theorise that Shiro wanted to hide information that would link his house to Xeric. He will agree to sign the new accord.
"""

[[steps]]
index = 9
name = "=Lord Shayzien="
links = ["King Shayzien VII", "Lord Kandur Hosidius", "Vinery", "Shayzien journal"]
text = """
Speak to Lord Shayzien on the {{FloorNumber|uk=1}} of the lookout. He will ask you to find [[King Shayzien VII]]'s journal in [[Lord Kandur Hosidius|Lord Hosidius]]' private office, which is hidden at the southern end of the Hosidius [[Vinery]]. You can use the Xeric's Talisman 'Glade' teleport and head east to the vinery, Tithe Farm mini game teleport and head north, or fairy ring AKR and head west. Inspect the eastern wine barrel to find a hidden trapdoor. Climb down, and picklock the chest in the corner of the room. You will obtain a [[Shayzien journal]]. You will need to bring this back to Lord Shayzien, who will agree to sign the accord.
"""

[[steps]]
index = 10
name = "=Lady Piscarilius="
links = ["molten glass", "dark essence block", "chisel", "dense essence mine", "dense essence block", "Dark Altar", "Yama", "Arceuus", "Mori", "Voice of Yama", "Dark essence block", "Dark nullifier", "Chasm of Fire", "fairy ring", "Disciple of Yama"]
text = """
{{Needed|[[molten glass]], [[dark essence block]] or a pickaxe and a [[chisel]]}}
If you do not already have a dark essence block, go to the [[dense essence mine]] to mine a [[dense essence block]] and then imbue it at the [[Dark Altar]].

Speak to Lady Piscarilius on the {{FloorNumber|uk=3}} of the lookout. She will wish to have the cult of [[Yama]] stopped by having an [[Arceuus]] mage named [[Mori]] attempt to stop the disciples of Yama's connection to Yama himself. To find Mori, head to the [[Arceuus]] church - you can use the Kharedst's memoirs teleport 'A Dark Disposition' and walk north (look for the Altar icon on the Worldmap). Mori can be found on the very top floor of the church.

Mori will explain her plan to disconnect the [[Voice of Yama]]'s connection to [[Yama]] himself, by using a connection to the [[Dark Altar]]. To do this, she needs some [[molten glass]] and a [[Dark essence block]]. Hand the items over to Mori, and she will give you a [[Dark nullifier]]. You must hide it somewhere in the [[Chasm of Fire]] to prevent the cult from contacting [[Yama]]. Go to the Chasm ([[fairy ring]] {{fairycode|djr}}) and try to climb down. However, the [[Disciple of Yama]] standing outside will interrupt you, taking the device and casting a memory-altering spell on you. You will wake up in the forest just south of the chasm, falsely believing the device has been planted. Return to Shauna, who will agree to sign the accord despite insisting that it's a bad idea.
"""

[[steps]]
index = 11
name = "=Lord Arceuus="
links = ["Defence potion", "Volcanic sulphur", "games necklace", "Xamphur", "Xeric", "Tasakaal", "Mount Karuulm", "Rada's blessing", "broken redirector", "Boots of stone", "Doors of Dinh", "Dark Altar", "defence potion", "sulphur potion", "shielding potion", "Games necklace"]
text = """
{{Needed|[[Defence potion]] (3 or more doses) and [[Volcanic sulphur]]|recommended=[[games necklace]]}}
Speak to Lord Arceuus just outside of the lookout. He will ask you to investigate whether [[Xamphur]] is indeed the same mage as the one that served [[Xeric]] long ago. To do this, you must visit the [[Tasakaal]] in [[Mount Karuulm]] (to get there, teleport with [[Rada's blessing]] or fairy ring {{Fairycode|cir}}) and show them the [[broken redirector]] for help.

Enter [[Mount Karuulm]] ([[Boots of stone]] are not needed in this area), and talk to any of the Tasakaal sitting in the middle of the first room. The Tasakaal will analyse the broken redirector, and they will trace the history of the object. Many humans and people of Arceuus have used it, but also two others: one touched by fire, and one touched by darkness. The one touched by darkness was indeed one who served [[Xeric]], and the player concludes that the one touched by fire must be the pyromancer who damaged the [[Doors of Dinh]].

To prevent further damage to the Doors of Dinh, the Tasakaal will offer to create a potion that will reinforce the [[Dark Altar]]'s power on the Doors of Dinh. Use the [[Volcanic sulphur]] on a [[defence potion]] with '''at least''' 3 doses to create a [[sulphur potion]], and talk to the Tasakaal again to have them enchant it, turning it into a [[shielding potion]].

Teleport to the Wintertodt Camp ([[Games necklace|games necklace]] or fairy ring {{Fairycode|CIS}}) and use the [[shielding potion]] on the [[Doors of Dinh]].

Return to Lord Arceuus, who you will inform that the Xamphur you met is the same as the Xamphur from back then, giving him much worry. You will also inform him that one of the Pyromancers colluded with Xamphur to sabotage the Doors of Dinh. While the information is of great importance, Lord Arceuus states that dealing with the Council comes first and will agree to sign the accord.
"""

[[steps]]
index = 12
name = "The Council's End"
links = ["Phileas Rimor", "Great Kourend", "Misthalin", "Asgarnia", "Kandarin", "Varlamore", "Xamphur"]
text = """
[[File:A Kingdom Divided - Councillor Orson's death.png|thumb|right|Councillor Orson's body is discovered outside Xeric's Lookout.]]
Return to the lookout and talk to each of the five leaders again to finish up their task. Some of the leaders will provide their insights on your discoveries. After that, talk to Fullore again, who reveals Orson's body being found at the bottom of the lookout tower, after he fell down from it, either from jumping, or being pushed. After that, all of the leaders will convene again in the basement, and they will all sign the accord. All leaders, including a reluctant Lord Shayzien, will agree to make Lord Hosidius the new king of Kourend. The accord is named Rose's Accord, in the honour of the unfortunate demise of Rose.

After the cutscene, Commander Fullore will talk to you about the decision that was just made. She is confused that Lord Shayzien did not want to take up the leadership, and notes that Lord Hosidius wishes to talk to you. Go down the ladder again to speak with him, and he will explain the details of how he managed to convince Lord Shayzien not to make a bid for the throne. Lord Shayzien's attempted cover-up of the journal of King Shayzien VII, and his eventual capturing of [[Phileas Rimor]], would be too humiliating for him to be confronted with, so he decided to withdraw his attempts to become king.

After this reveal, talk to Fullore again to start a long final cutscene. The remaining council members get arrested, and Lord Hosidius being crowned the new King of Kourend. A banquet is held to celebrate, with prominent guests from [[Great Kourend]], [[Misthalin]], [[Asgarnia]], [[Kandarin]] and [[Varlamore]]. You will have a talk with Lord Arceuus, who teaches you some spells discovered in [[Xamphur]]'s hideout. After that you'll have a short chat with Fullore, who points out the guests from [[Varlamore]]. After a coronation speech by the new king, you will have a private conversation with him in which he wishes to call on your services once more when they have enough information on Xamphur, but before the two of you can do anything, another assassin appears and assassinates him, claiming he has been marked for death and teleports away.

After the cutscene concludes, speak with Commander Fullore a final time. She will express surprise that they buried a king just as fast as they crowned one, and that they commenced another crowning ceremony for his son, now king. She then hands you a reward for your work, as well as the book Lord Arceuus mentioned he would give you.

