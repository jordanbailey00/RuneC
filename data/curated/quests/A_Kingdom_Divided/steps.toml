File:A Kingdom Divided - arriving at the coronation.png|The coronation of King Kandur Hosidius commences.
File:A Kingdom Divided - coronation toast.png|The King thanks the attendees for coming to his coronation, and toasts to the player, Martin, and Lydia for their efforts.
File:A Kingdom Divided - regicide.png|The king is killed by an assassin.
</gallery>

'''Congratulations, quest complete!'''
"""
