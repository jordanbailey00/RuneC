[[steps]]
index = 4
name = "The four elements of Enakhra"
links = ["pickaxe", "chisel", "fire bolt", "wind bolt", "tinderbox", "logs", "oak logs", "maple logs", "candle", "coal", "bread", "pie", "pizza", "baked potato", "magic barrier"]
text = """
{{Needed|A [[pickaxe]] or [[chisel]], runes for [[fire bolt|fire]] and [[wind bolt]] or better, [[tinderbox]], [[logs]], [[oak logs]], willow [[logs]], [[maple logs]], a [[candle]], [[coal]], and either [[bread]], [[pie]], [[pizza]], or [[baked potato]].}}
Lazim will appear next to you after the cutscene, complimenting you on opening the doors. He explains the [[magic barrier]] will not let you through but it may open if you solve each of the four puzzles in the surrounding rooms. You will know you have succeeded because the corresponding globes on the pedestal will be lit. You may wish to start with the blood room, as it will unlock advice about the other ones.
"""

[[steps]]
index = 5
name = "=Smoke="
links = ["furnace (Enakhra's Lament)", "wind spell"]
text = """
Take the north-east corridor and examine the [[furnace (Enakhra's Lament)|furnace]]. Its grate is blocked and requires a strong blast of air to clear. Use a [[wind spell]], bolt or stronger, on the furnace to clear out the room.
"""

[[steps]]
index = 6
name = "=Shadow="
links = ["darkness", "brazier (Enakhra's Lament)", "Firemaking", "logs", "oak logs", "willow logs", "maple logs", "candle", "coal"]
text = """
'''{{Colour|red|Warning}}:''' Standing too long in this room without lighting any braziers will do damage due to [[darkness]]! Light the candle before entering the room to avoid damage.

Take the south-east corridor and investigate each [[brazier (Enakhra's Lament)|brazier]]s to see what kind of fire used to burn there. The appropriate [[Firemaking]] level is required to see what item goes into what brazier, but it is not required to actually add the items to the brazier, meaning that you can simply guess and check to figure out which item goes into which brazier without needing the Firemaking level. The items are: [[logs]], [[oak logs]], [[willow logs]], [[maple logs]], a [[candle]], and [[coal]]. Use the appropriate items on the braziers to light them.
"""

[[steps]]
index = 7
name = "=Blood="
links = ["Pentyn", "Mahjarrat", "bread", "pie", "cake", "pizza", "baked potato", "magic spell"]
text = """
Take the north-west corridor and talk to the old knight [[Pentyn]], frozen by a magical spell. He believes you are a shapeshifting [[Mahjarrat]] there to torture him again. He explains he is a Knight of Avarrocka and has been frozen, wounded and hungry for many years. Give him your [[bread]], [[pie]], [[cake]], [[pizza]], or [[baked potato]] with toppings. He will not accept half-eaten food. '''Make sure to right-click and use it on him, rather than left-click to eat'''. You may have to right-click again on Pentyn to make sure you are using the food on him and '''not''' on the [[magic spell]]. 

He will reminisce about one of his family members, with the specific one depending on what type of food was given to him, and thank you for the memory. He'll still be stuck, but will no longer be in hunger.

He will also offer advice on the other rooms. The frozen fountain did not yield to fire nor swords and is likely magical in nature. The furnace produces choking fumes and requires a good breeze to clear. The fires in the dark room will have gone out since he last saw them and require relighting.
"""

[[steps]]
index = 8
