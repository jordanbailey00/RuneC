quest = "Enakhra's Lament"
step_count = 10

[[steps]]
index = 0
name = "A sculptor in the sands"
links = ["pickaxe", "chisel", "Lazim", "Bandit Camp (Kharidian Desert)", "Ancient Pyramid", "Ruins of Unkah", "sandstone", "Bandit Camp Quarry", "Mining"]
text = """
{{Needed|A [[pickaxe]], [[chisel]].}}
{{Map|name=Lazim|x=3191|y=2926|r=4|mtype=square|width=250|height=250|align=right|caption=The quest's start point.}}
[[File:Lazim chathead.png|left]]
You can start this quest by speaking with [[Lazim]], who is located just south of the [[Bandit Camp (Kharidian Desert)|Bandit Camp]] and west of the [[Ancient Pyramid]]. The simplest way of getting there is to travel with the free ferry south-west of Al Kharid to the [[Ruins of Unkah]] and run north from there. Alternatively, if you have a Pharaoh's Sceptre you can teleport to Jaldraocht (the Ancient Pyramid) and run west. Have at least four free inventory spaces at the start of the quest. You need to buy a Shantay Pass (5 coins) from the guard to exit the [[Ruins of Unkah]] and may need more if you come back to buy water from him. 

Lazim introduces himself as a down-on-his-luck sculptor who once made statues for royalty but has been unable to hold a chisel since an unspecified accident. He wants your help building a statue to decorate the desolate area. Agree to help him. He will ask you to gather 32 kilograms' worth of [[sandstone]] from the nearby [[Bandit Camp Quarry|quarry]].

There are four sizes of sandstone: 1&nbsp;kg, 2&nbsp;kg, 5&nbsp;kg, and 10&nbsp;kg. You can use your [[chisel]] on big blocks to make them smaller, if necessary. At a higher [[Mining]] level, you'll get bigger blocks. Speak to Lazim and tell him you have the sandstone once you have finished. You will have to give the pieces to him one by one, eliciting some caustic remarks.
"""

[[steps]]
index = 1
name = "Shaky foundations"
links = ["sandstone (32kg)", "sandstone base", "sandstone (20kg)", "sandstone body", "The Giant Dwarf", "Stone head", "Zamorak", "Icthlarin", "granite", "Bandit Camp (Kharidian Desert)", "Drew", "Hard Desert Tasks"]
text = """
[[File:Building the statue.png|thumb|The statue needs a head.]]
After you've given Lazim exactly 32&nbsp;kg, he will attach them with magic to make a [[sandstone (32kg)|32kg sandstone block]]. Use your chisel on the block that he gives you to make a [[sandstone base]]. Talk to him again and then use it on the flat ground next to him.

You now need 20 kilograms of sandstone for the body. After you've given him the required amount and he gives you the [[sandstone (20kg)|20kg sandstone block]], use your chisel on it to make a [[sandstone body]] and then attach it to the base. Lazim will grow increasingly angrier with your performance. He seems to be still missing something and tells you to chisel the statue a bit more. Talk to him again; he seems impatient, expecting something to have happened. He decides the statue is only missing a head, to be made out of granite from the same quarry. He lets you decide whose head the statue should bear. (If you want, you can tell him about the events of [[The Giant Dwarf]] if you have completed that quest; he will not allow you to use the head of your chosen company director because you no longer remember how it looks.)
[[File:Completed statue.png|thumb|left|200px|The completed statue.]]
You now have to choose the [[Stone head|head]] of the statue. You may choose between either your own head (which he will not allow either), Lazim's head, a camel's head, or a god's head, with the choice of [[Zamorak]] or [[Icthlarin]]. Mine a 5 kg piece of [[granite]] (not sandstone!). Chisel it into a head (if you sculpt the wrong head, Lazim will insult you but allow you to change your choice at the cost of the granite) and keep the other in your inventory for later in the quest. In order to save time later, mine a second 5kg piece of granite and some clay as well. There is a general store at the [[Bandit Camp (Kharidian Desert)|Bandit Camp]] where you can buy a bucket of water to use on the clay to make it soft (The empty buckets can be given to [[Drew]]). Also mine a piece of coal if you don't have one already, as you will need it later.

'''Note:''' Mining granite is a [[Hard Desert Tasks|Hard Desert Diary task]].

Use the head on the statue. It will fall through the ground, creating a large hole. As you peer into it, Lazim pushes you inside. You hurt your duodenum and appear in an ancient temple below next to the sculptor and broken statue. Talk to Lazim, who says everything has gone according to plan. You deduce that he is not in fact a sculptor but promises you a share of whatever treasure you find in the temple if you help him. He explains you have fallen to the bottom floor and need to make your way to the top. The doors in the temple do not require keys but stone limbs instead; he suggests you mine or chisel them off the statue.
"""

[[steps]]
index = 2
name = "The Camel, the Witch, and the Prison"
links = ["stone left arm", "stone right arm", "stone left leg", "stone right leg", "stone head", "Enakhra", "Knight (Enakhra's Lament)", "Akthanakos", "Skeleton (Enakhra's Lament)", "Z sigil", "R sigil", "K sigil", "M sigil", "magic barrier", "clay", "general store", "camel mould (p)", "granite"]
text = """
[[File:Removing statue parts.png|thumb|Removing the statue parts.]]
Use your chisel or pickaxe on the statue to get a [[stone left arm]], [[stone right arm]], [[stone left leg]], and [[stone right leg]], which you'll use as keys to unlock the doors to the rooms. Lazim also returns the [[stone head]] to you, which had fallen off the statue. Should you need to exit the temple, the ladder next to the statue's remains leads to a pile of sand you can climb to the surface. This will unlock this entrance permanently.

Go around the outside track to each of the rooms through the doors, as the door in the western corridor is locked. Each door requires one of the limbs. Opening a door will give you a headache and trigger a cutscene. You should travel anticlockwise for the cut scenes to be in the correct order and collect the sigils from the pedestals as you go. The first shows a mysterious woman called [[Enakhra]] cheering at the completion of the temple for her lord. The second, four [[Knight (Enakhra's Lament)|Knights of Avarrocka]] come to destroy the sorceress and her temple, only to be slain effortlessly by Enakhra's magic. One knight is left alive, frozen in ice. In the third cutscene, a camel-headed man named [[Akthanakos]] apparently convinces Enakhra to defect from Zamorak, for whom the temple is but who would rather have a weapon, to 'their side'. She pretends to agree, upon which the man leaves. In the next cutscene, she is shown animating bones to a [[Skeleton (Enakhra's Lament)|weak skeleton]] in an attempt to create a weapon for Zamorak and is not satisfied.

As you pass the bigger rooms along the way, take the [[Z sigil]], [[R sigil]], and [[K sigil]], which together with the [[M sigil]] in the room in which you started, make up the consonants of 'Zamorak'. You may also want to climb the ladders and sandpiles to unlock all four secret entrances. After you've unlocked all of the outer doors with the four limbs, go towards the middle and use the sigil to unlock the door. You may also unlock the other three doors. (This will permanently remove the sigils.)

Go up the ladder. A [[magic barrier]] is blocking your progress and there is a curious pedestal next to the ladder. Go back to Lazim and ask him about it. He asks whether there is a recess in it, which you confirm. He suggests placing the statue head into it. Try doing so; it will fit, but not perfectly. If you return to Lazim for advice, he says you should make a mould of the recess somehow and use that as a template to make another head from granite. If you did not bring soft clay, regular [[clay]] can be mined in the quarry. Take the ladder next to Lazim up and climb up the sand pile to resurface. There is a [[general store]] to the north where you can purchase a bucket, bowl or jug with water and use it on the clay to make soft clay. When you return, climb down the secret entrance a few tiles east of the hole you fell down to get back into the temple.

Use soft clay on the pedestal to make a [[camel mould (p)|positive camel head mould]] and then use the chisel on a piece of medium-sized [[granite]] (5&nbsp;kg) to make a new [[stone head]]. Place this granite camel head into the pedestal to be greeted by another cutscene. It shows Akthanakos standing by the pedestal, confused. Enakhra reveals her betrayal and freezes him, expressing her loyalty to Zamorak. 

'''Optional:''' Use a second soft clay on the granite head on the pedestal to make a camel mask for yourself, but only after you've crafted and placed in the new stone head.
"""

