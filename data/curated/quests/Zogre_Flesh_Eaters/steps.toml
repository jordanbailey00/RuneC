quest = "Zogre Flesh Eaters"
step_count = 7

[[steps]]
index = 0
name = "The cave"
links = ["diseased", "Combat", "Zogre", "Skogre", "Super restore potion", "Broken Lecturn", "torn page", "zombie (Zogre Flesh Eaters)", "ruined backpack", "Dragon inn tankard", "rotten food", "knife", "Ogre Coffin (Zogre Flesh Eaters)", "black prism", "Nightmare Zone", "Ferox Enclave", "ring of dueling", "Minigame Teleport", "Pool of Refreshment"]
text = """
[[File:Zogre Flesh Eaters skeleton.png|thumb|220px|Fighting the zombie.]]
'''Note:''' You may now (or have already) become [[diseased]] if you are under 89 [[Combat]] and a [[Zogre]] or [[Skogre]] (level 44) attacks you. From now on, make sure you carry [[Super restore potion]]s with you, because the disease will temporarily reduce a random skill by up to 10 levels every minute or so.

*Proceed north-west to an area with a blackened floor. There will be a short cutscene.
*'''Search the [[Broken Lecturn]]'''. You will find a [[torn page]] that contained a spell.
*'''Search the skeleton''' that is adjacent to the lecturn; a [[zombie (Zogre Flesh Eaters)|zombie]] will appear and attack. Kill it to obtain a [[ruined backpack]].
*'''Open the backpack''' to obtain a [[Dragon inn tankard]], some [[rotten food]] and a [[knife]].
*Attempt to '''search the [[Ogre Coffin (Zogre Flesh Eaters)|coffin]] nearest to the skeleton''', and then use a knife on it. The lock should unlock. Try opening the coffin (it may take a couple of tries). When the coffin is open, '''search''' it to obtain a [[black prism]].
*Backtrack and exit the cave by running back to the barricade or simply teleporting out.
*'''Note:''' If you became diseased in the previous part, you can enter a dream in the [[Nightmare Zone]] in practice mode and leave to cure disease. Alternatively, you can teleport to [[Ferox Enclave]] with a [[ring of dueling]] (equivalently, [[Minigame Teleport]] to Clan Wars) and drink from the [[Pool of Refreshment]] to restore your stats and cure disease. Otherwise it will weaken and cure after 15 minutes. '''''Note: Being Diseased can prevent teleporting with minigame teleport. Keep trying until you get it, but it might take more than once.'''''

{{UIMnote|You may drop the rotten food immediately, and the knife after unlocking the coffin.}}
"""

[[steps]]
index = 1
name = "B. Vahn"
links = ["Black prism", "Dragon inn tankard", "Torn page", "Yanille", "Minigame teleport", "Watchtower teleport", "Watchtower", "Dragon Inn", "Brentle Vahn", "Zavistic Rarve", "Wizards' Guild", "Wizards' Tower", "torn page", "Sithik Ints"]
text = """
{{Needed|[[Black prism]], [[Dragon inn tankard]], [[Torn page]], and 5 free inventory spaces}}

*Proceed to [[Yanille]]. Using the [[Minigame teleport]] to the Nightmare Zone will place you next to Yanille. The [[Watchtower teleport]] can also be used to get to Yanille, assuming the [[Watchtower]] quest is completed. Fairy ring code {{Fairycode|ciq}} is also near Yanille.
*Go to the [[Dragon Inn]] in south-western Yanille, and use the [[Dragon inn tankard|tankard]] on the bartender. The bartender will explain that the tankard belonged to [[Brentle Vahn]], a not-so-moral customer who had been seen with a shady wizard.
*Talk to [[Zavistic Rarve]], found on the {{FloorNumber|uk=0}} of the [[Wizards' Guild]] (NOT the [[Wizards' Tower]]!). He'll be wearing white and baby blue robes, distinct from the other wizards. If you don't have the required level to enter the guild, ring the bell on the east side of the building, then Rarve will appear outside. After seeing the [[Black prism|prism]] and [[torn page]], Rarve will tell you to talk to [[Sithik Ints]] in the guest house north of the guild on the {{FloorNumber|uk=1}}. '''''Note: Unlike the bartender, using the items on Rarve does not work. You must specifically click 'talk-to' and speak to Rarve or Sithiks will never be mentioned.'''''
"""

[[steps]]
index = 2
name = "Incriminating Sithik"
links = ["Wizards' Guild", "Sithik", "Zogre", "drawers (Zogre Flesh Eaters)", "cupboard (Zogre Flesh Eaters)", "wardrobe (Zogre Flesh Eaters)", "Book of portraiture", "Necromancy book", "papyrus", "charcoal", "Book of 'h.a.m'", "Crafting", "Dragon inn tankard", "Brentle", "Zavistic Rarve", "signed portrait", "Strange potion", "cup of tea", "ogre", "Relicym's balm", "brutal arrows", "Black Prism", "Yanni Salika", "Shilo Village", "Crumble Undead", "sample bottle"]
text = """
Proceed to the guest house, which is directly north of the [[Wizards' Guild]], and then go to the top floor. [[Sithik]] is in the western-most room (in the bed, does not appear as a yellow dot on the minimap).

Talk to him, and he will deny any connection to [[Zogre]]s. When you raise allegations, Sithik will challenge you to prove he is guilty.

Search the [[drawers (Zogre Flesh Eaters)|drawers]], the [[cupboard (Zogre Flesh Eaters)|cupboard]], and the [[wardrobe (Zogre Flesh Eaters)|wardrobe]] in Sithik's room. You will find a [[Book of portraiture]], a [[Necromancy book]], [[papyrus]] and [[charcoal]], and a [[Book of 'h.a.m']]. Read all three books. Do not drop the tankard, as you will need it shortly after.

Use the Book of Portraiture on Sithik. He will recommend trying portraiture for yourself. Draw a portrait of Sithik by using the papyrus on him. He will admire either the 'truth' or the 'honesty' of your completed portrait:

If he likes the '''truth''' of the portrait, you will need to drop it and make a new one. You can grab another papyrus from the drawers. If he likes the '''honesty''' of the portrait, keep it. Having a higher [[Crafting]] level helps with making a successful sketch.

The two portraits won't appear the same in the inventory, and the correct one, when examined, will read {{mes|A classic realist charcoal portrait of Sithik.}}

[[File:Zogre Flesh Eaters interrogating Sithik.png|thumb|220px|Sithik is turned into an ogre.]]
Take the portrait and the [[Dragon inn tankard|tankard]] back to the bartender (First use the tankard on the bartender and then the portrait). The bartender will recognise Sithik as the wizard seen with [[Brentle]], and will sign the portrait as an affidavit. Go back to the Wizards' Guild and talk to [[Zavistic Rarve]] or ring the bell outside the door. Use the Necromancy book, the Book of 'h.a.m.', the tankard, and the [[signed portrait]] on him, which will be enough evidence to convince Rarve that Sithik may be responsible for the murder. Rarve will give you a [[Strange potion]], which he instructs you to use on Sithik. '''You need to talk to Zavistic Rarve and select the dialogue option to give him the evidence, otherwise he won't give you the potion.'''

Use the potion on the [[cup of tea]] on top of Sithik's dresser. Go down the ladder and back up to Sithik, and you will find that he has turned into an [[ogre]].

Talk to Sithik, and he will confess. Obtain answers to all three questions to make [[Relicym's balm]] and [[brutal arrows]].

At this point, you can sell the [[Black Prism]] to [[Zavistic Rarve]] for {{NoCoins|2000|c}} or to [[Yanni Salika]] in [[Shilo Village]] for {{NoCoins|5000|c}} after completing the quest.

You now have a choice: Make [[Relicym's balm]] and [[brutal arrows]], or skip ahead to [[#Grounds|Relocating the ceremonial grounds]] and use [[Crumble Undead]] against Slash Bash. 

{{UIMnote|Upon giving you the Strange potion, Zavistic Rarve will take the Necromancy book, Book of H.A.M., tankard, and portrait from you. After drawing the correct portrait, you no longer need the charcoal, and after poisoning the cup of tea, you can drop the [[sample bottle]].}}
"""

[[steps]]
index = 3
name = "Making or buying Relicym's balm"
links = ["Sithik Ints", "Relicym's balm", "rogue's purse", "vial of water", "snake weed", "Grand Exchange", "Uglug Nar", "achey logs", "bow string", "cooked chompy", "knives"]
text = """
After [[Sithik Ints]] has revealed the secret to making [[Relicym's balm]], having it on hand in the final fight will help tremendously. It is your choice to obtain this now; however, the quest can be done without it. The balm is also tradeable.

Relicym's balm(3) is made by using a [[rogue's purse]] on a [[vial of water]] and then adding [[snake weed]]; the herb order does not matter and will yield the same result. Due to both ingredients not being tradeable between players, it can be faster to purchase a Relicym's balm from the [[Grand Exchange]].

It is '''HIGHLY''' recommended to give a balm to [[Uglug Nar]], who is near the area at the start of the quest. This will give access to a store selling 100 Relicym's balm (3), and he will give you enough money ({{NoCoins|650|c}}) to buy three of them back. If you give him a 2-dose balm, he will only give you {{NoCoins|300|c}}, while if you give him a 4-dose balm, he will give you {{NoCoins|1000|c}}. The store also has 100 [[achey logs]], 10 [[bow string]]s, 10 [[cooked chompy]], and five [[knives]] in stock.
"""

[[steps]]
index = 4
name = "Making brutal arrows"
links = ["Brutal arrows", "Zogre", "composite ogre bow", "Grand Exchange", "Achey tree logs", "wolf bones", "bow string", "Fletching", "ogre arrow shaft", "feathers", "nails", "metal", "flighted ogre arrow", "hammer"]
text = """
[[Brutal arrows]] are the best way to kill [[Zogre]]s, and shooting them from a [[composite ogre bow]] is the best strategy in the final fight. It is your choice to obtain them; however, the quest can be done without it. The easiest way to obtain them will be from the [[Grand Exchange]], as both the brutal arrows and the composite ogre bow are tradeable.

To make the composite ogre bow, use a knife on [[Achey tree logs]] with some [[wolf bones]] in the inventory. Use a [[bow string]] on the unstrung bow to complete the bow (requires 30 [[Fletching]]).

To make the arrows, use a knife on Achey tree logs and fletch them into [[ogre arrow shaft]]s (each log will give 2-6 shafts). Add [[feathers]] to the shafts (each shaft needs 4 feathers). Finally, use [[nails]] (made of any [[metal]]) on the [[flighted ogre arrow]] while having a [[hammer]] in your inventory.
"""

[[steps]]
index = 5
name = "Relocating the ceremonial grounds{{Anchor|Grounds}}"
links = ["Relicym's balm", "composite ogre bow", "brutal arrows", "Crumble Undead", "Grish", "Sithik", "Ogre gate key", "stand (Zogre Flesh Eaters)", "Prayer", "disease"]
text = """
{{Needed|recommended=Food, armour (Ranged armour is preferred), [[Relicym's balm]], and a [[composite ogre bow]] and [[brutal arrows]]. [[Crumble Undead]] can also be used instead}}

Return to [[Grish]] and tell him what [[Sithik]] told you. Go through all available conversation options. '''(The bow CANNOT be equipped until this step has been completed!)''' After this he will give you a [[Ogre gate key|key]] which will give access to the ceremonial chamber to look for some 'old' items for him.

Return to the cave beyond the barricade and head west. There will be two successive locked doors, proceed through both of these and descend the stairs. Continue to the end of this long, wide room. Searching the [[stand (Zogre Flesh Eaters)|stand]] will spawn the boss.

Slash Bash is weak to brutal arrows and the [[Crumble Undead]] spell. Other attacks, such as melee, are not effective as they will only hit up to 25% of the normal max hit. He also drains [[Prayer]] rapidly. Prepare accordingly, and don't forget to bring at least three Relicym's balm(3) to remove [[disease]].
"""

[[steps]]
index = 6
name = "Slash Bash"
links = ["ourg", "Slash Bash", "safespot", "Protect from Missiles", "ogre artefact", "ourg bones", "Rag and Bone Man II", "zogre bone"]
text = """
[[File:Fighting Slash Bash.png|thumb|220px|Attacking Slash Bash from a distance.]]
A level 111 undead [[ourg]] named [[Slash Bash]] will attack you. The boss can be safespotted, however you can still be attacked by his range attacks. Use the [[safespot]] (pictured right) and kill the Zogre while having on [[Protect from Missiles]]. It is possible to use melee on the boss, however it will require using more resources and time since the damage is reduced against him.

It is possible to take too long to kill him, in which case he says something about growing weary of the fight and that he is awaiting a real challenge. You will have to start the fight over if this happens.

After Slash Bash is defeated, collect the bones and the [[ogre artefact]] that he drops. The three [[ourg bones]] that Slash Bash drops are worth about {{NoCoins|{{GEP|ourg bones}}|c}} each.

''Note: While you're here, if you've started [[Rag and Bone Man II]], it is recommended to take advantage of your supplies and kill Zogres until they drop the [[zogre bone]].''

Return to Grish with the ogre artefact for your reward.

'''Congratulations, quest complete!'''
"""
