quest = "Watchtower"
step_count = 11

[[steps]]
index = 0
name = "Getting started"
links = ["Armour", "weapon", "slashing weapon", "food", "rope", "dragon bones", "Watchtower (building)", "Yanille", "trellis", "Watchtower wizard", "ogres", "Crystal (Watchtower)", "Bush (Watchtower)", "fingernails", "old robe", "unusual armour", "damaged dagger", "tattered eye patch", "Fingernails", "Tattered eye patch", "Damaged dagger", "Unusual armour", "Old robe", "Skavid", "Ogre chieftain", "ogre relic"]
text = """
{{Needed|[[Armour]], [[weapon]] ([[slashing weapon]] recommended), [[food]], 2 [[rope]]s, and [[dragon bones]]|skills={{SCP|Agility|18}} to climb a trellis}}
[[File:Watchtower - Searching the bushes.png|thumb|220px|Searching the bushes near the Watchtower.]]

Make your way to the [[Watchtower (building)|Watchtower]] just  north of the north-west corner of [[Yanille]]. Climb the [[trellis]] ({{SCP|Agility|18}}) on the northern side of the tower. Then, climb up the ladder and talk to the [[Watchtower wizard]]. He will explain that the Watchtower is not working because the spell created does not keep out [[ogres]]. He tells you that the [[Crystal (Watchtower)|crystals]] that make the spell have been stolen! After starting, you will be asked to search the grounds of the Watchtower. You can now use the tower's main ladder, though the trellis is faster. Search the '''far north-west''' [[Bush (Watchtower)|bush]] for some [[fingernails]]. It is possible to find some other things in other bushes ([[old robe]], [[unusual armour]], [[damaged dagger]], [[tattered eye patch]]), but these items serve no purpose other than as a red herring.

{{Map|mtype=pin|caption=A map of all bushes that contain items.|zoom=3
|x:2545,y:3134,icon:greenPin,title:[[Fingernails]],desc:
|x:2547,y:3130,icon:redPin,title:[[Tattered eye patch]],desc:
|x:2550,y:3135,icon:redPin,title:[[Damaged dagger]],desc:
|x:2559,y:3132,icon:redPin,title:[[Unusual armour]],desc:
|x:2560,y:3123,icon:redPin,title:[[Old robe]],desc:
}}

Go back to the Watchtower wizard, and show him the fingernails. The wizard will tell you that the fingernails belong to [[Skavid]]s, the servants of the ogres, and that they have stolen the four [[Crystal (Watchtower)|power crystals]] that protect the city from ogres. Your job is to recover the crystals.

The first thing you need to do is gain access to the city. In order to enter, you'll need to help out three [[Ogre chieftain|ogre tribe chieftains]] to get pieces of an [[ogre relic]]. This can then be given to the gate guards to prove that you're a friend to the ogres.
[[File:Watchtower - Quest map.png|thumb|centre|500px|All the important locations throughout the quest.]]

[[File:Watchtower - Speaking to Og.png|thumb|220px|Speaking to Og.]]
"""

[[steps]]
index = 1
name = "Og"
links = ["Yanille", "agility shortcut", "armour", "food", "rope", "dragon bones", "mace", "non-aggressive", "Og", "Toban", "Toban's gold", "Toban's key"]
text = """
''Note: The Ogres near all three camps are non-aggressive.''
First, go through the city of [[Yanille]] using the [[agility shortcut]] or the west entrance. Stop at the bank to grab your [[armour]], [[food]], two [[rope]]s, and one set of [[dragon bones]] if you haven't already. Head out the west gate and turn north-west to find a tribe of ogres. Note that, as a rule of thumb, any ogre that wields a [[mace]] is [[non-aggressive]]. Talk to [[Og]] to learn that his nemesis, [[Toban]], stole a [[Toban's gold|bar of gold]] from him. Your job is to get it back. Og will give you a [[Toban's key|key]] to Toban's chest. Keep this key with you for later.
"""

[[steps]]
index = 2
name = "Grew"
links = ["Og", "jangerberries", "rope", "Grew", "Gorad", "Ogre tooth"]
text = """
[[File:Watchtower - Speaking to Grew.png|thumb|220px|Speaking to Grew.]]
Head south of [[Og]]'s tribe. You should see an island with an ogre tribe on it and some [[jangerberries]]. Find the long-branched tree on the west shore. Use one [[rope]] on the branch of the tree (not the tree itself) to swing to the island. Note that you will lose the rope. Take some jangerberries because you'll need them later in the quest. Talk to [[Grew]]. Grew will tell you to teach his enemy, [[Gorad]], a lesson by knocking one of his [[Ogre tooth|teeth]] out (make sure that you have room in your inventory for this tooth, or you will have to kill him again).
"""

[[steps]]
index = 3
name = "Toban, and Gorad's tooth"
links = ["Skavid caves", "Skavid map", "Gu'Tanoth", "death rune", "gnome glider", "Toban", "Gorad", "Ogre tooth", "safespotted", "Ranged", "Magic", "dragon bones", "Relic part 3", "Ogre relic", "Og", "Toban's gold", "rope", "Grew"]
text = """
The next stop is a third tribe of ogres. Leave Grew's island using the tree with the rope swing on the north side.

Either enter the [[Skavid caves]] south of Grew's island ''4'' times without the [[Skavid map]], or head south-east to go around [[Gu'Tanoth]].

You will see a broken bridge leading to a small island. The next tribe you will need to meet is on that island, but the bridge is out so you will need to find another way across. Keep going a little bit south of the bridge.

Then, turn west and continue along the southern edge of Gu'tanoth until you reach a hole surrounded by rocks. Pick up the [[death rune]] a ways south of this hole if you need it. ''The hole is west-north-west of the [[gnome glider|gnome glider]]. ''(See map above).
[[File:Watchtower - Fighting Gorad.png|thumb|220px|Fighting Gorad.]]
Enter the hole to reach an island with [[Toban]]'s tribe on it. South of the ladder, you should find a level 68 chieftain called [[Gorad]]. Talk to him and tell him that you have come to knock his teeth out. He will attack you. Kill him to get a [[Ogre tooth|tooth]]. Keep the tooth for later. Gorad can be [[safespotted]] in the centre of the island for [[Ranged]] or [[Magic]] users.

Next, speak to Toban. He will ask you to give him the bones of a dragon to chew on. Give him your [[dragon bones]] (baby dragon bones do NOT work). '''<u>Make sure not to bury them!</u>''' Toban will give you the [[Relic part 3|third piece]] of the [[Ogre relic|relic]] in return.

Open Toban's chest on the island, and you will find [[Og]]'s [[Toban's gold|stolen gold]].

A [[rope]] spawns on the island (next to the roots south-west of the ladder) if you don't already have one for travelling back to [[Grew]]'s island.
"""

[[steps]]
index = 4
name = "Completing the relic"
links = ["ogre city", "ring of dueling", "Minigame Teleport", "Castle Wars", "Grew", "jangerberries", "rope", "Gorad", "Ogre tooth", "Relic part 2", "Crystal (quest item)", "Og", "Toban's gold", "Relic part 1", "Watchtower wizard", "Yanille", "agility shortcut", "candle", "light source"]
text = """
[[File:Watchtower - Combining relic parts.gif|thumb|200px|The Watchtower Wizard combines the three relic parts.]]
Leave the island via the ladder. Walk around the west side of the [[ogre city]] or use a [[ring of dueling]] or [[Minigame Teleport]] to [[Castle Wars]], or use Fairy code '''CIQ''', and walk back to [[Grew]]'s island (with the [[jangerberries]]). Use your second [[rope]] on the tree. Talk to Grew to give him [[Gorad]]'s [[Ogre tooth|tooth]]. You will receive another [[Relic part 2|piece of the relic]] in return for your deed. He will also give you the first [[Crystal (quest item)|crystal]], the yellow crystal. Keep this for later. '''If you don't have jangerberries yet, pick some from the island <u>before you leave</u>.''' Then, leave the island using the rope swing and head north back to [[Og]]. Talk to him to give him his stolen [[Toban's gold|gold bar]]. You will receive the final [[Relic part 1|piece of the relic]].

Once you have all three parts of the relic, take them to the [[Watchtower wizard]] to get them assembled. Head through [[Yanille]], and use the [[agility shortcut]] if possible. While at the Watchtower, pick up a [[candle]] at the spawn on the ground level if you need a [[light source]].
"""

[[steps]]
index = 5
name = "Access to Gu'Tanoth"
links = ["coins", "pestle and mortar", "vial", "guam potion (unf)", "anti-dragon shield", "death rune", "Ogre relic", "gold bar", "tinderbox", "light source", "rock cake", "Yanille", "Unlit torch", "Aleck's Hunter Emporium.", "Gu'Tanoth", "Skavid caves", "Skavid Map", "Ogre guard", "Ogre trader", "Ogre merchant", "Herblore", "Counter (Gu'Tanoth)", "Gap (Gu'Tanoth)", "knife", "slash weapon", "Skavid map", "Skavid Caves"]
text = """
{{Needed|20 [[coins]] (27 coins if you want to buy a [[pestle and mortar]] and [[vial]] to create the [[guam potion (unf)]] later), [[anti-dragon shield]], a [[death rune]], and the [[Ogre relic]]|recommended=Bring your [[gold bar]], [[tinderbox]], and [[light source]] as well to save a bank trip.|skills={{SCP|Thieving|15}} {{Boostable|yes}} to steal a [[rock cake]], {{SCP|Agility|25}} {{Boostable|yes}} to cross a gap}}

After you have the full relic, head back through [[Yanille]] and either use the southern grapple shortcut or get out directly from the west gate. Grab a [[Unlit torch|Torch]] from [[Aleck's Hunter Emporium.|Aleck's]] shop on the way through Yanille, if you don't have a light source for the caves later on.

Head south-east until you see a path leading up into [[Gu'Tanoth]], then go south and follow the path up the hill. Alternatively, use the [[Skavid caves]] "transport system" ''2'' times without the [[Skavid Map]].

At the split, take the north-west trail to the [[Ogre guard]]s. Talk to them (with the [[Ogre relic]] in your inventory), and they will let you into the city (using your relic on them doesn't work, as "The ogre has not asked you for anything"). If you mistakenly bypass the gold bar gate instead, the Ogre guards will allow you through later on without requiring another gold bar. 

Once you're inside the city, go east and then south to the market. The ogres aren't aggressive, but watch out for the [[Ogre trader]]s, who will attack if spoken to. There is also a non-aggressive merchant named [[Ogre merchant|Grud]] (labelled Ogre merchant) who will sell you [[Herblore]] supplies. You can buy a [[pestle and mortar]] and [[vial]] (7 [[coins]] total) from him for later use if you do not already have them or the ''[[guam potion (unf)]]'' in your inventory. Find the [[Counter (Gu'Tanoth)|southern stall]] in the market with food (grey cylinders) on it, and then steal a [[rock cake]] ({{SCP|Thieving|15}}). Be careful with the cake as the left-click option eats it, dealing damage and forcing you to go steal another.

Go back on the main path to the west and follow it south. You'll find two more guards. Talk to one. '''Be careful of what you say, '''the guard will knock you out of the area if you mess up. Tell them you are a friend of the ogres (first option); they will then ask for some food from the market. '''Do not eat the rock cake!''' Use the rock cake on the guard to get by. Then, continue on until you find a broken bridge. Attempt to jump the [[Gap (Gu'Tanoth)|gap]] in the bridge ({{SCP|Agility|25}}). (Find the "Jump-Over" by clicking on your side of the gap for a red X option). The guards will ask for money, so pay them 20 coins to cross the gap. Grab the [[knife]] here if you need a [[slash weapon]]; you will need it later for webs.
[[File:Watchtower - Talking to city guards.png|thumb|220px|The guards who give you the [[Skavid map]].]]
Pass the aggressive ogre and you will find several city guards. If you talk to them, they'll give you a word puzzle. The answer to the puzzle is "''death rune''". Give the guard the death rune you grabbed earlier and he will give you a map of the [[Skavid Caves]].
"""

[[steps]]
index = 6
name = "Skavid caves"
links = ["Skavid map", "light source", "gold bar", "Skavid Caves", "Scared skavid", "Skavid", "Scared Skavid", "Gu'Tanoth", "Yanille", "Cave nightshade", "Ardougne Diary", "Mad skavid", "Ogre City", "Crystal (Watchtower)", "cave nightshade"]
text = """
{{Needed|[[Skavid map]], a [[light source]] and a [[gold bar]]}}
[[File:Skavid caves numbered.png|thumb|250px|Skavid map]]
[[File:Watchtower - Scared skavid is silenced.png|thumb|220px|A skavid is silenced while speaking to the player.]]
The [[Skavid Caves]] are a series of caves located beneath the ogre city. Their entrances are scattered around the north and east sides of the city. You need the [[Skavid map]] and a [[light source]] to get in.

You will need to first find the [[Scared skavid]] (he can be found in the cave labelled "1"), who will teach you some basic Skavid words if you promise not to hurt it. Then, go to the other four caves and talk to each (regular) [[Skavid]], and give them the correct response (see below). Once it says that they understood you, move on to the next cave with the next Skavid.

Their locations are:

*1) ([[Scared Skavid]]) East of [[Gu'Tanoth]] along the south-east branch of the entrance path to the city. It will teach you the Skavid language.
*2) North-east of Gu'Tanoth along the main entrance path to the city. It will say: "Bidith tanath.", the correct response is "Cur."
*3) North of Gu'Tanoth near the opening of the main entrance path to the city. It will say: "Gor cur...", the correct reponse is "Ar."
*4) North of Gu'Tanoth south of the west gate to [[Yanille]]. It will say: "Cur Bidith.", the correct response is "Ig." Take two [[Cave nightshade]] for a latter part of the quest - picking one is also a medium [[Ardougne Diary]] task.
*5) East of Gu'Tanoth outside the city around the east side of the mountain (5). It will say: "Tanath gor.", the correct reponse is "Nod."

You can also refer to the map above to find the cave entrances.

Return to the [[Scared skavid]]. It will tell you that you're ready to take on the [[Mad skavid]].

Go south of the [[Scared skavid]] cave along the south-east path of the entrance to the [[Ogre City]] and '''use the gold bar on one of the guards''' to gain access. Go south and west across the bridge and enter the cave (6). Talk to the mad skavid and respond with the language you just learned.

:If he says "''Ar cur''", the correct response is "''Gor''".
:If he says "''Bidith ig''", the correct response is "''Cur''".
:If he says "''Gor nod''", the correct response is "''Tanath''".
:If he says "''Cur tanath''", the correct response is "''Bidith''".
:If he says "''Bidith tanath''", the correct response is "''Cur''".
:If he says "''Tanath gor''", the correct response is "''Nod''".
:If he says "''Cur bidith''", the correct response is "''Ig''".
:If he says "''Gor cur''", the correct response is "''Ar''".

If you respond correctly, the Skavid will give you a magenta [[Crystal (Watchtower)|crystal]]. If you have not yet got two [[cave nightshade]]s, take two at the spawn inside. '''Do not''' eat the nightshade as it will cause damage to you. The hole in the corner will take you back to [[Yanille]]<ref>After entering the hole in Mad Skavid's cave that take you back to Yanille, the message in the chat box appears "So that's how the skavids are getting into Yanille!"</ref>. Take it if you need to access a bank for the next part of the quest.
"""

[[steps]]
index = 7
name = "The Ogre Enclave"
links = ["Anti-dragon shield", "food", "cave nightshade", "anti-dragon shield", "Gu'Tanoth", "rock cake", "nightshade", "Ogre Enclave", "Ogre shaman", "Blue dragon", "Hitpoints", "Crystal (Watchtower)", "Skavid caves", "Yanille"]
text = """
{{Needed|[[Anti-dragon shield]], [[food]] and 2 [[cave nightshade]]s.}}
[[File:Watchtower - Shaman kills dragon.gif|frame|The Ogre shaman deals a powerful hit to a Blue dragon.]]
Make sure you have your [[anti-dragon shield]] equipped. Go back to the [[Gu'Tanoth]] marketplace (just west of where you stole the [[rock cake]]). '''Be careful – for the next part the nightshades 'use' and 'eat' options are swapped around, do not eat a cave nightshade. Additionally, make sure you complete the dialogue, or else you will have to get another cave nightshade.''' Now use one of your [[nightshade]]s on an enclave guard, near a cave entrance on the west, to distract them (attempting to talk to the guards will prompt them to attack you regardless of dialogue options chosen). After continuing the dialogue, a warning alert regarding the danger of the enclave will appear, proceed forward if you are ready and you will automatically enter the [[Ogre Enclave]].

You'll see a short cutscene with an [[Ogre shaman]] and a [[Blue dragon]]. '''Do not talk-to or attack the shamans, or you will instantly lose 20 or 30 [[Hitpoints]], respectively.''' The last two [[Crystal (Watchtower)|crystals]] are here, but you can't get them without some help.

Run straight past the blue dragons and out the exit at the north end. You will appear outside one of the northern [[Skavid caves]] facing to [[Yanille]].
"""

[[steps]]
index = 8
name = "Magic ogre potion"
links = ["guam potion (unf)", "guam leaf", "vial", "jangerberries", "ground bat bones", "bat bones", "pestle and mortar", "Yanille", "Watchtower (building)", "slashing weapon", "knife", "giant bat", "Watchtower wizard", "ogre shaman", "vial of water", "Guam potion (unf)", "Grew", "rope", "Potion (Watchtower)", "magic ogre potion"]
text = """
{{Needed|Either a [[guam potion (unf)]] or both a [[guam leaf]] and a [[vial]] (empty or water-filled), [[jangerberries]], and either [[ground bat bones]] or both [[bat bones]] and a [[pestle and mortar]]|skills={{SCP|Herblore|14}} {{Boostable|yes}} to create a magic ogre potion}}

Head north into [[Yanille]]. Stop at the bank to get a vial (with or without water), a guam leaf, a pestle and mortar, jangerberries, and bat bones if you have them.

Head back toward the [[Watchtower (building)|Watchtower]]. If you need bat bones, a little east of the Watchtower, you'll find a house whose entrance is covered in webs. Take a [[slashing weapon]] or a [[knife]], cut through the web and enter the building. You will find several [[giant bat]]s. Kill one and take its bones.

Return to the Watchtower. If your vial is empty, fill it at the fountain outside.

Climb the ladders and talk to the [[Watchtower wizard]]. He will tell you that you can make a potion to destroy the [[ogre shaman]]s.

'''You must add the ingredients in this order:'''
#Add a [[guam leaf]] to a [[vial of water]] to make a [[Guam potion (unf)|''guam potion (unf)'']] if you didn't already have one.
#Add some [[jangerberries]] ({{SCP|Herblore|14}}). '''Be careful because the left-click option is to eat.''' If accidentally eaten, they respawn on [[Grew]]'s island - you'll need another [[rope]]. Alternatively, you can use telegrab if you do not have a rope.
#Use your [[pestle and mortar]] on the [[bat bones]] to grind them if you haven't yet.
#Add the [[ground bat bones]] to the vial mixture. The vial will turn into a [[Potion (Watchtower)|potion]] ({{SCP|Herblore|14}}).
#Give the potion to the [[Watchtower wizard]] to get it enchanted, turning it into [[magic ogre potion]].
"""

[[steps]]
index = 9
name = "Shaman slaying"
links = ["food", "anti-dragon shield", "pickaxe", "cave nightshade", "magic ogre potion", "Rock of Dalgroth", "Yanille", "blue dragon", "Gu'Tanoth", "ogre shaman", "Crystal (Watchtower)", "Shaman robe", "Ogre Enclave"]
text = """
{{Needed|Some [[food]], [[anti-dragon shield]], a [[pickaxe]], a dwarven stout if your mining isn't level 40,  [[cave nightshade]] and the [[magic ogre potion]]|skills={{SCP|Mining|40}} {{Boostable|yes}} to mine the [[Rock of Dalgroth]], {{SCP|Magic|14}} {{Boostable|yes}} to use the magic ogre potion}}
[[File:Watchtower - Killing ogre shaman.gif|right|frame|Using the magic ogre potion to kill the ogre shamans.]]
Return to the [[Yanille]] bank to prepare for the [[blue dragon]] and shaman enclave. Bring your pickaxe, an anti-dragonfire shield, cave nightshade and some food. Now, go back to the market place in [[Gu'Tanoth]]. Distract the cave guards using your second nightshade '''(remember 'use' and 'eat' are swapped around and the dialog must be completed)''', and enter the cave. Again, you must complete the dialogue by using the spacebar or pressing ''click here'' to continue, or else you will have to get another cave nightshade.

Run around the cave and use the [[magic ogre potion]] on each of the six [[ogre shaman]]s ({{SCP|Magic|14}}) while avoiding the blue dragons as much as possible. The potion will instantly kill the shamans and you won't take any damage. The last shaman you kill will drop the [[Crystal (Watchtower)|cyan crystal]], which is automatically put into your inventory.

[[File:Watchtower - Mining Rock of Dalgroth.png|thumb|left|220px|Mining the final crystal.]]
If you somehow lose the cyan crystal, there is a [[Shaman robe]] in the south-east corner, amongst some bones where you can pick it up and search it for the crystal.

To get the last [[Crystal (Watchtower)|crystal]], find the [[Rock of Dalgroth]] in the [[Ogre Enclave]] in the centre of the Enclave and mine it with your pickaxe ({{SCP|Mining|40}}). '''Note: It can only be mined after killing the shamans. This is in the cave with the blue dragons.''' Mine the rock before leaving the cave, otherwise you will need to get nightshades again. Make sure you actually mine the crystal, and don't just prospect.
"""

[[steps]]
index = 10
name = "Reviving the Watchtower"
links = ["Crystal (Watchtower)", "Ogre Enclave", "Nightmare Zone", "minigame teleport", "Watchtower (building)", "Watchtower wizard", "lever (Watchtower)"]
text = """
{{Needed|All 4 [[Crystal (Watchtower)|crystals]]}}
[[File:Watchtower - Correct crystal alignment.png|thumb|220px|The correct crystal positioning.]]
Leave the [[Ogre Enclave|enclave]] using the far north exit again (or use a [[Nightmare Zone]] [[minigame teleport]]). Grab the yellow crystal if you banked it earlier, and take all four crystals back to the [[Watchtower (building)|Watchtower]]. Talk to the [[Watchtower wizard]], and he will ask you to fix the machine for him.

The crystals must be placed in the following positions:
*'''Yellow''' crystal in the '''south-west''' pillar
*'''Grey''' crystal in the '''south-east''' pillar
*'''Cyan''' crystal in the '''north-west''' pillar
*'''Magenta''' crystal in the '''north-east''' pillar

Finally, pull the [[lever (Watchtower)|lever]] on the west side of the room to complete the quest. 

'''Note:''' Before pulling the lever to complete the quest, do not drop anything, as the items will be left behind in the instanced version of the Watchtower and lost permanently.

'''Congratulations, quest complete!'''
"""
