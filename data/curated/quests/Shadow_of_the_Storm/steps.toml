text = """
{{Needed|[[Silverlight]], 3 items of black clothing (see below), transport to [[Uzer]] (e.g. [[necklace of passage]]; or [[ring of dueling]], [[Shantay pass (item)|Shantay pass]] and 200 [[coins]])}}

Talk to [[Father Reen]], south of [[Al Kharid]] bank. If you do not have a regular [[Silverlight]], he will give you an uncoloured Silverlight free of charge. '''If you already have a dyed Silverlight, bank the extra Silverlight. If this dialogue is missed, Silverlight can still be obtained at other points in the quest by speaking to him.''' 

After you start, travel to [[Uzer]] (you can enter the desert via the [[Shantay Pass]] and use the [[magic carpet]], rub a [[necklace of passage]] to Eagles' Eyrie and run south-east or travel with [[fairy ring|fairy rings]] to {{Fairycode|DLQ}} and run north-east). Be sure to bring your Silverlight with you since you won't be able to continue without it. After arriving in Uzer, talk to [[Father Badden]] - be sure to talk to him about all your options. If you haven't already, pick a black mushroom. Afterwards, enter the dungeon.

When you try to enter the demon's lair, [[Evil Dave]] won't let you by because you aren't evil enough.
You need to wear at least three items of black clothing. There are several ways to achieve this, including:
[[File:Shadow of the Storm - black mushrooms.png|thumb|220px|A black mushroom near the entrance.]]

*Dyeing a [[desert shirt]] and a [[desert robe]] black by picking a [[black mushroom]] outside of the dungeon and crafting it into [[black dye]] with a [[vial]] and [[pestle and mortar]], for two of the three items (does not work on the [[desert boots]]).
*Wearing any three [[black armour]] items. The [[black gloves]] available from the [[Culinaromancer's Chest]] also function as a black armour item (although this quest must be completed in order to finish the [[Freeing Evil Dave|Evil Dave part]] of Recipe for Disaster) '''Note:''' Wearing heraldic or trimmed black armour items will not be accepted by Evil Dave.
*Wearing a black [[priest gown]] purchased from the [[Thessalia|clothing vendor]] in [[Varrock]].
*Wearing [[Mystic robes#Dark|dark mystic robes]].
*Wearing [[ghostly robes]] from the [[Curse of the Empty Lord]] miniquest.
*Wearing [[shade robes]].
*Wearing [[black dragonhide armour]].
*Wearing the [[Antisanta outfit]].
*Wearing a [[black cape]], [[black partyhat]], [[black santa hat]], [[black h'ween mask]], [[black dragon mask]], and/or a [[black unicorn mask]]
*Wearing black [[wizard robes]], including either trimmed varieties (blue varieties can be dyed with [[Black dye]]).
*Wearing a [[graceful outfit]] which has been recoloured using [[dark dye]].

