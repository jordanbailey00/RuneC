You also need to dye your Silverlight black using black dye from the same black mushrooms inside the dungeon (this doesn't count as an "evil" item).

:'''Note:''' You cannot proceed with the quest if you have a normal Silverlight alongside a dyed Silverlight.

Equip your three black items, then tell Evil Dave you want to join the group, and he will let you through the portal. Evil Dave will take you to the leader of the group, [[Denath]]. He will tell you that he needs your help to summon [[Agrith-Naar]], since [[Josef]] left. '''He will tell you the incantation to use, which is different for everyone, so you need to write it down.''' In case you forget the incantation, you can read the [[Demonic tome|tome]] you'll find later on and cite the phrase in it backwards.
"""

[[steps]]
index = 1
name = "The Ritual"
links = ["Silver bar", "strange implement", "ring of dueling", "coins", "Shantay pass (item)", "necklace of passage", "Sapphire", "Ruby", "Emerald", "The Golem", "Jennifer", "demonic sigil mould", "Matthew", "Josef", "clay golem", "Demonic Tome", "Lumbridge", "Al Kharid", "demonic sigil", "silver bar", "Evil Dave", "Eric", "Tanya", "Father Badden", "Father Reen", "Clay Golem"]
text = """
{{Needed|[[Silver bar]], [[strange implement]] (optional), [[ring of dueling]] or 200 [[coins]] (optional), [[Shantay pass (item)|Shantay pass]] and 200 [[coins]], or [[necklace of passage]] (optional), and 3 free inventory spaces}}

'''Optional''': Using a chisel and hammer on the demon's throne will give the player six cut gems: two [[Sapphire|sapphires]], two [[Ruby|rubies]] and two [[Emerald|emeralds]]. While this can be done during [[The Golem]] quest, it can alternatively be completed during this quest.[[File:Shadow of the Storm - Evil Dave introduces player.png|thumb|220px|Evil Dave introduces their newest dark wizard, you, to Denath.]]
Talk to [[Jennifer]] to get a [[demonic sigil mould]]. Then, talk to [[Matthew]] about Josef. He will tell you to find the book that [[Josef]] dropped in order to defeat the demon. Talk to the [[clay golem]] and ask if it knows what happened last night; it will explain that Denath killed Josef, but not before Josef hid the book in the kiln outside. '''You must talk to the golem before you can search the kiln!''' 

In Uzer, search the kilns that are outside until you find a [[Demonic Tome]]. There are two close by, and two further away. One is north of the magic carpet, and the other is east of the temple. There are '''4''' kilns in total.

Go to any furnace (such as the furnace in [[Lumbridge]] or in [[Al Kharid|Al Kharid.]] Fairy Ring {{fairycode|dkr}} to Edgeville furnace is fastest), and make a [[demonic sigil]] with your [[silver bar]]. With the sigil, you will be able to chant the incantation with the group.

'''You no longer need your black equipment to enter the portal. If you need to gear up for the fight, save a trip and bring what you need.''' '''You will need 3 free inventory slots.'''[[File:Shadow of the Storm - Matthew smells trouble.png|thumb|left|Matthew begins to suspect something evil is afoot.]]
Read the book and return through the portal, then hand Matthew the book. Strangely enough, the incantation for summoning the demon that's written in the book is backwards to the one that Denath told you to say. This is due to the fact that the incantation in the book is one to summon the demon (forward) while the one Denath told you was to return him back to the demon plane (backwards).[[File:Shadow of the Storm - Denath teleports away.png|thumb|220px|Denath walks into the centre of the circle, teleporting away!]]
When you have finished, Denath will call you over to stand next to him and lead the incantation. Using your sigil, chant it in the order that he told you (if you have forgotten, it's written in the book, but backwards). After the portal is opened, instead of the demon coming out of it, Denath will walk into it and disappear. It turns out Denath was Agrith-Naar all along, and you actually desummoned him by saying the incantation ''backwards'', as he intended.

This demon becomes much more powerful in his own dimension, so you need to resummon him and defeat him. Pick up the sigil that Denath dropped '''(if you don't, you will have to make another one)'''. Alternatively, it is possible to have Tanya drop two sigils by returning to demonic realm immediately after chasing her through the portal (see below). If done correctly, she will drop two sets of sigils and bones.

[[Evil Dave]], [[Eric]], and [[Tanya]] will have run away, so chase after them through the portal. Tanya is killed by ghosts, so take her sigil as well. Eric is killed by a falling stone. Convince Evil Dave to return to the lair, and he will give you Eric's sigil. Leave the dungeon and talk to [[Father Badden]] and [[Father Reen]]. Convince them to help with the ritual and give them both a sigil. You need one more individual to complete the incanctation, so talk to the [[Clay Golem]]. However, he was programmed to never help summon demons. Use the [[strange implement]] (can be found in the lair) on him to take out the scroll about demon rituals. Speak to the golem again and he will agree to help you.
[[File:Shadow of the Storm - Tanya is killed.png|thumb|220px|Tanya is killed by ghosts during her attempt to flee.]]
"""

[[steps]]
index = 2
name = "The Final Fight"
links = ["Silverlight", "demonic sigil", "Agrith Naar", "Dwarf multicannon", "Demons", "Melee", "Fire Blast", "Protection prayers", "Protect from Melee", "Protect from Magic", "Telekinetic Grab", "flinching", "Darklight"]
text = """
{{Needed|[[Silverlight]], [[demonic sigil]], equipment to defeat [[Agrith Naar|Agrith-Naar]] (level 100)}}
{{Instance}}

Return to the demon's lair, enter the portal and talk to Matthew to get everyone to stand in the circle. Chant the incantation with your sigil, this time in the order that you read in the book (the opposite order that you chanted it in last time). Agrith-Naar will immediately appear and turn to Matthew, killing him in the belief that he started the ritual. Your character will then say that you commenced it, prompting the demon to attack you.

'''Note:''' You cannot use a [[Dwarf multicannon]] during the bossfight, as you'll get a message saying "''Some kind of demonic magic prevents the cannon from functioning".''
[[File:Shadow of the Storm - Agrith-Naar resummoned.png|thumb|220px|Agrith-Naar is resummoned!]]

[[Agrith Naar|Agrith-Naar]] is a level 100 [[Demons|demon]] who remains in the same position throughout the fight. He uses both [[Melee]] and [[Fire Blast]] depending on where you are and what [[Protection prayers]] you have activated. He uses melee by default, but switches to Fire Blast if you activate [[Protect from Melee]] or walk out of range. If you walk out of melee range and activate [[Protect from Magic]], he will cast [[Telekinetic Grab]] to teleport you next to him. '''''Note:''' You can potentially have full protection by using Protect from Magic and [[flinching]] from two squares away, running out of melee range immediately after he casts Telekinetic Grab. However this method requires precise timing and is not simple to pull off.'' [[File:Fighting Agrith-Naar.png|thumb|240px|The player battles Agrith-Naar.]]
'''You must hit the final blow with Silverlight in order to win the fight.''' If Agrith-Naar is reduced to zero hit-points through any other method, a message will appear stating "''You can't kill Agrith-Naar except with Silverlight.''" and his health will be restored to 12. '''''Note:''' If timed well, it is however possible to deal the last blow with any other weapon than the Silverlight, as long as you stand next to the boss and swap back to the Silverlight right before the last hit is registered.''

'''{{Colour|red|Warning}}:''' If you are [[flinching]] the boss with the Silverlight and move behind a pillar or torch before the final blow is registered (between the XP drop and the damage being dealt), then it will '''not''' count, and Agrith-Naar will recover a small bit of health.

Once the demon is dead, your [[Silverlight]] will have been merged with the demon's blood into a stronger weapon, the [[Darklight]]. '''''Note:''' If your prayer runs out during the message or you cancel the chat, un-equipping Darklight will trigger the final dialogue to complete the quest.''

'''Congratulations, quest complete!'''
"""
