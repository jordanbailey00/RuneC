Even with [[Protect from Magic]], they will still hit hard and accurately, up to 20+. However, their magical defence is extremely weak and not a lot of accuracy is needed to hit on them consistently. Thus, it is recommended to wear [[dragonhide armour]], along with easily replaceable items, such as the [[Culinaromancer's gloves]], the [[book of darkness]] or a [[dragonhide shield]], and a [[god cape]].

At level 80 [[Magic]], casting [[Charge]] will increase the max hit of your god spells from 20 to 30. As Charge lasts for seven minutes, you may choose to cast it before gearing up to start the fight. Boosts such as the [[Ancient brew]] may be used to reach the level requirement. If you need a boost larger than 5, you may use a [[super magic potion]] within a practice dream at the [[Nightmare Zone]] and cast Charge there before heading to the [[Wilderness]].

If possible, use an [[occult necklace]] and [[tormented bracelet]] for their magic damage boost to increase max hits.

If players are assigned a [[black demon]] for their [[Slayer task]], wearing a [[Slayer helmet (i)]] is recommended when fighting [[Porazdir]], as the player's attacks would be more accurate.

Because of the high damage dealt by them, taking at least two [[rings of recoil]] gives 80 free damage over the course of the fight, which can be very helpful.

It is recommended to turn off [[Auto Retaliate]] for all the fights.
"""

