|87 xp per table
|-
|Wooden chair||2 planks and 2 nails
|58 xp
|-
|Waxwood bed||3 waxwood planks and 2 bolts of cloth
|207 xp
|}
"""

[[steps]]
index = 2
name = "Finishing up"
links = ["waxwood log", "Varrock sawmill", "sawmill operator", "waxwood plank", "Old Man Yarlo", "Construction", "Marlo"]
text = """
'''''Items required:''' 3 [[waxwood log]]s.''

Go to the [[Varrock sawmill]] and talk to the [[sawmill operator]] to receive 3 [[waxwood plank]]s. Since he knows of Old Man Yarlo, he'll provide them free of charge. 

Return to Old Man Yarlo's home and build the new furniture (chair, carpet, two tables, two stools, and the bed). Speak to [[Old Man Yarlo]] again, he'll thank you and offer the player the basics and benefits of [[Construction]]. 

Finally, return to [[Marlo]] to claim your reward.
"""
