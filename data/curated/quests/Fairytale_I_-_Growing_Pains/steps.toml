[[steps]]
index = 0
name = "Growing Pains"
links = ["Martin the Master Gardener", "Draynor Village"]
text = """
{{Map|3078,3258|align=right|width=220|height=220|r=5|mtype=square|zoom=2|caption=The start point.}}
[[File:Martin the Master Gardener chathead.png|left]]
:{{Color|red|Warning:}} Do not pickpocket [[Martin the Master Gardener]] during the quest, or you won't be able to talk to him for 10 minutes of consecutive in-game time.

Head to the [[Draynor Village]] marketplace and ask Martin the Master Gardener nearby if there is anything you can help with. He will mention that his roses haven't been doing as well as they used to. He suspects something's wrong, and wants you to ask several other members of the G.A.G. (Group of Advanced Gardeners) if they're having the same problems as him.
"""

[[steps]]
index = 1
name = "Gathering information"
links = ["Asgarnia", "Misthalin", "Group of Advanced Gardeners", "Farming", "Gielinor", "Ayesha", "Al Kharid", "Lammy Langle", "Woodcutting Guild", "Imiago", "Tai Bwo Wannai", "Marisi", "Hosidius", "Port Sarim", "Draynor Village", "Falador cabbage patch", "Falador Park", "tree patch", "Bush patch", "Champions' Guild", "Lumbridge Castle", "Varrock Palace", "Taverley", "Rimmington", "Ardougne Monastery", "Varrock", "Treznor", "Dreven", "Heskel", "Elstan", "Frizzy Skernip", "Martin the Master Gardener"]
text = """
{{Needed|recommended=Fast travel methods to farm patches around [[Asgarnia]] and [[Misthalin]].}}
{{Map|3060,3256|3053,3308|3001,3373|3181,3359|3227,3314|3193,3233|3229,3459|2937,3439|2941,3222|align=right|width=220|height=220|y=3405|mtype=pin|zoom=-1|caption=The locations of the Advanced Gardeners.}}
You will have to speak with any five members of the [[Group of Advanced Gardeners]]. These are the gardeners that tend [[Farming#Patches|farming patches]] around [[Gielinor]]. 

:'''Note:''' All farmers added since the launch of ''Old School RuneScape'' '''do not''' count, including: [[Ayesha]] in [[Al Kharid]], [[Lammy Langle]] north-east of the [[Woodcutting Guild]], [[Imiago]] in [[Tai Bwo Wannai]], and [[Marisi]] in [[Hosidius]]. You can ask them why the crops are failing, but they will only respond by saying they do not know anything about that.

Some of the easiest to reach are:
