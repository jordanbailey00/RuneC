An efficient method of speaking to five members of the [[Group of Advanced Gardeners]]:

* Teleport to [[Varrock]]:
*# Visit [[Treznor]], inside the [[Varrock Palace]] grounds
*# Visit [[Dreven]], at the bush patch near the [[Champions' Guild]]
* Teleport to Falador:
*# Visit [[Heskel]], at the tree patch in [[Falador Park]]
*# Visit [[Elstan]], one screen north of Frizzy
*# Visit [[Frizzy Skernip]], near the fence between [[Port Sarim]] and [[Draynor Village]]

Following this method should put you right next to Martin the [[Martin the Master Gardener|Master Gardener]] once you've spoken to [[Frizzy Skernip]].
:

All of them will say that since recently they have troubles with their crops. They all suspect a different reason (lack of rain, swarms of insects, adventurers digging up the patches, the seasons being off their usual times) for it, though. However, the last gardener will suggest that the fairies might have something to do with it. '''Speak to''' [[Martin the Master Gardener|'''Martin''']] '''again''' and the player will suggest the last gardener might have the most accurate reasoning.
"""

[[steps]]
index = 2
name = "Trouble in Zanaris"
links = ["Dramen staff", "Zanaris", "Lumbridge Swamp", "Fairy Queen", "Fairy Godfather", "Fairy Nuff", "symptoms list", "Zandar Horfyre", "Dark Wizards' Tower"]
text = """
{{Needed|[[Dramen staff]].|recommended=}}
[[File:Fairytale I - Growing Pains - Fairy Nuff's grotto.png|thumb|Fairy Nuff's room just north of the bank.]]
[[File:Fairy Godfather chathead.png|left]]
Travel to the fairy city of [[Zanaris]] via the shack in the middle of the [[Lumbridge Swamp]] with a [[Dramen staff]] equipped. Head to the [[Fairy Queen]]'s throne room, just south of where you enter the city. The "[[Fairy Godfather]]" has replaced the queen; ask where she is and he'll tell you that the queen has fallen to some sort of illness and is currently under the care of [[Fairy Nuff]]. Speak with this fairy in the north-west of the city. She'll give you details about the queen's illness and give you a [[symptoms list]] to take to a wizard named [[Zandar Horfyre]], in the [[Dark Wizards' Tower]].
"""

[[steps]]
index = 3
name = "Investigating the illness"
links = ["Spade", "symptoms list", "Falador teleport", "skills necklace", "Falador", "Dark Wizards' Tower", "Zandar", "Malignius Mortifer", "Draynor skull", "Draynor Manor", "spade"]
text = """
{{Needed|[[Spade]] and the [[symptoms list]]|recommended=[[Falador teleport]] and a [[skills necklace]]}}

Travel to [[Falador]] and head west to reach the [[Dark Wizards' Tower]]. Climb up to the top floor and talk to [[Zandar]], who will take the symptom list and then suggest talking to [[Malignius Mortifer]] about killing the Tanglefoot. This necromancer can be found on the crossroads south of Falador. You can fast travel to him with a [[skills necklace]] (to the Crafting Guild).

He'll tell you he could probably help, but wants something from you first. He wants a [[Draynor skull|skull]] from a grave in the [[Draynor Manor]] backyard. Head to the back of the manor and dig up the grave there. In case you have no [[spade]], there is one inside the manor. If you have dug up the skull previously, you will not find it, and your character will mention that they think they stored it in the bank.

{|style="text-align:center;"
|{{Map|2907,3335|width=220|height=220|mtype=square|r=5|zoom=2|caption=Zandar's location.}}
|{{Map|2990,3268|width=220|height=220|mtype=square|r=9|caption=Malignius' location.}}
|{{Map|3106,3384|width=220|height=220|mtype=rectangle|rectX=1|rectY=4|zoom=2|caption=Draynor Skull's location.}}
|[[File:Fairytale I - Growing Pains - Grave robbing.png|thumb|x220px|The grave where you will find the skull]]
|}
"""

