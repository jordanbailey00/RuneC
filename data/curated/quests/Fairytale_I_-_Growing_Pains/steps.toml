text = """
{{Needed|[[secateurs]] and the [[amulet of ghostspeak]]|recommended=[[Mort'ton teleport]]}}
Return to [[Malignius]] with the [[Draynor skull|skull]], who will mention that the queen's illness is the result of an evil creature called the [[Tanglefoot]], and the only way to defeat it is by creating a pair of enchanted [[secateurs]]. You will need to take a pair of secateurs and three randomised items to the [[Nature Grotto]] in order to bless them. Check your quest log to see what randomised items you need to bring. The list below details how to obtain your items; you may use any method. Once you have them, grab your [[Amulet of Ghostspeak|amulet of ghostspeak]] and [[secateurs]] and travel to the [[Filliman Tarlock|Nature Spirit]] in the [[Mort Myre Swamp]]. He'll bless your secateurs, which will then glow green and turn into the [[magic secateurs]].

:{{Colour|red|Warning:}} If travelling through the swamp to reach the Nature Grotto, the [[ghast]]s may rot the [[edible seaweed]], [[jangerberries]], [[king worm]] or [[lime]] from the list. If any of these are a required item, bring multiples or a filled [[druid pouch]] to avoid losing them.

