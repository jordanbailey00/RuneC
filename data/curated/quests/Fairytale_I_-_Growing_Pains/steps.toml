[[steps]]
index = 5
name = "Killing the Tanglefoot"
links = ["magic secateurs", "Zanaris", "Dramen staff", "agility shortcuts", "Cosmic Altar", "Gatekeeper", "baby tanglefoot", "Tanglefoot", "Strength", "Farming", "Flinching", "Protect from Melee", "Queen's secateurs", "Fairy Godfather"]
text = """
[[File:Fairytale I - Growing Pains - Fighting Tanglefoot.png|thumb|220px|Attacking the Tanglefoot.]]
{{Needed|[[magic secateurs]]|recommended=}}
{{Instance}}

Head back to [[Zanaris]] with your [[magic secateurs]]. It is '''highly recommended''' to bank your [[Dramen staff]] at the Zanaris bank before the following fight, as you will need to obtain another one to return if you die here.

From the entrance to the city, travel south-west, past the [[agility shortcuts]], to the mysterious ruins of the [[Cosmic Altar]]. Climb through the gap on the west side of the room, and the [[Gatekeeper]] there will allow you to pass. Inside the tunnel are a few [[baby tanglefoot|baby tanglefootii]] (level 45). Proceed to the end of the tunnel to stumble upon the level 111 [[Tanglefoot]].

The Tanglefoot may only be damaged with the magic secateurs, and your maximum hit will depend on both your [[Strength]] and [[Farming]] levels. The Tanglefoot may be [[Flinching|flinched]] to avoid taking damage by standing one tile east of the southern end of the corridor, attacking then returning to the eastern tile until his health bar disappears. [[Protect from Melee]] is highly recommended if not flinching.

:'''Tip:''' If a baby tanglefoot walks onto the player's safespot, those with RuneLite may consider using the Menu Entry Swapper plugin, swapping the Attack option for BOTH baby tanglefoot (there are two kinds) to prevent the player from accidentally attacking them.

Once defeated, the Tanglefoot will drop the [[Queen's secateurs]]. '''Pick up the secateurs''' and return them to the [[Fairy Godfather]].

'''Congratulations, quest complete!'''
"""
