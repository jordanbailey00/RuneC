quest = "Troll Romance"
step_count = 5

[[steps]]
index = 0
name = "Ug's woes"
links = ["Ug", "Troll Stronghold (location)", "Trollheim Teleport", "troll", "climbing boots", "Aga", "Arrg", "Trollweiss"]
text = """
[[File:Ug chathead.png|left]]
[[File:Troll Romance Ug.png|thumb|Ug, crying his heart out.]]

Speak to [[Ug]], a weeping troll  found inside the [[Troll Stronghold (location)|stronghold]]. To get to the stronghold in this manner, use the [[Trollheim Teleport]] '''or''' walk to the western entrance in the mountains. From the teleport location ('''1''' on the map), go to the south-west path. Walk past some [[troll]]s, and take a ramp on the north-western side of that area ('''5''' on the map). After entering the stronghold, use the stairs at the northern side of the corridor. Once down, take the southern corridor. At the end of the corridor, go through the door leading west. Ug is in the southern part of the room.

If using slayer rings ('''2''' on the map), or the fairy ring ('''3''' on the map) walk from the teleport location north-east to the shortcut ('''4''' on the map; requires [[climbing boots]] to use) and enter the stronghold. Follow the corridor north and use the stairs in the north-eastern corner. Once up the stairs travel south down the corridor, go through the door leading west. Ug is in the southern portion of the west room. 

'''Talk to [[Ug]]''' to learn that he is very much in love with [[Aga]], who, unfortunately, loves [[Arrg]], a much stronger troll than is Ug. Offer your help; Ug will gladly accept it, promising he maybe won't eat you. 

'''You should talk to [[Aga]]''', who is in the room north of Ug, accompanied by the fearsome Arrg.

If you want, compliment Aga about her being big and hairy, then enquire about her love life. She is a very romantic troll: whilst Arrg is big and strong, she does not know whether he loves her. He promised to bring her a rare and beautiful [[Trollweiss]] flower, but has not done so yet. She has never heard of Ug. 

'''Talk to an angry [[Arrg]]''' to discover that he does not seem to be very much in love with Aga ('she good cook and wash but talk too many') and has many girlfriends. He also has no knowledge of the Trollweiss location, only promising Aga the flower to shut her up. 

'''Go talk to [[Ug]] again''' to tell him Aga's desire for a Trollweiss flower. He concludes he stands no chance, for no such flower has been found for years, nor will you be able to find one. He says that one who has lived their whole life in the mountains would know where to find [[Trollweiss]], giving you an idea.
"""

[[steps]]
index = 1
name = "Mystery of the flower"
links = ["Maple logs", "yew logs", "iron bar", "rope", "cake tin", "swamp tar", "bucket of wax", "Tenzing", "Burthorpe", "Troll Stronghold (location)", "games necklace", "grouping", "Soldier (Death Plateau)", "Trollweiss", "ice troll", "sled", "Dunstan", "Burthorpe Castle", "Trollweiss Mountain", "Godric", "Lumbridge Swamp", "bees", "beehives", "Camelot", "insect repellent", "Catherby", "wax"]
text = """
{{Needed|[[Maple logs|maple]] or [[yew logs]], [[iron bar]], [[rope]], [[cake tin]], [[swamp tar]], [[bucket of wax]]}}
[[File:Troll Romance Tenzing.png|thumb|Tenzing describes the location of the flower.]]

A person that is knowledgeable about the mountains is [[Tenzing]] the sherpa. He lives on the path from [[Burthorpe]] to the [[Troll Stronghold (location)|stronghold]] ('''7''' on the map). Use the [[games necklace]] or [[grouping]] interface to teleport to Burthorpe. From the teleport location, go west and then north-west up the path. At the [[Soldier (Death Plateau)|wounded soldier]], go south-west on the winding mountain path to Tenzing's hut ('''7''' on the map).

[[Tenzing]] explains that [[Trollweiss]] used to grow everywhere but has been disappearing lately. It definitely remains in the [[ice troll]] area, but that is very dangerous and impossible to reach. You would have to reach a certain plateau at the bottom of a slope that has been snowed over. He mentions that a [[sled]] may be useful for getting to that plateau, although you would not be able to get back up. [[Dunstan]] knows more about making a sled, as he has often helped Tenzing with his boots.

[[Dunstan]] is the [[Burthorpe]] smith, whose house is north-east of the [[Burthorpe Castle]] ('''8''' on the map). Talk to him and ask for a sled. He says you are too old to be playing in the snow, but you explain that you need to reach a particular location on [[Trollweiss Mountain]]. He will agree to help you as you have often helped his family. After some thinking, he requests that you bring him the following materials: [[Maple logs|maple]] or [[yew logs]], an [[iron bar]] and a coil of [[rope]]. If you want, ask him about [[Godric|his son]], who has been training with the Imperial Guard and promoted to the rank of sergeant.

Bring him the materials. Dunstan fashions you a sled but it still has to be waxed in order to smoothen and protect the wood. He says you can mix some [[swamp tar]] with wax in a [[cake tin]] to achieve the desired effect. You can get tar from the [[Lumbridge Swamp]] and suggests the wax is found near [[bees]]. Get some swamp tar and a [[bucket of wax]]. The latter can be obtained from the [[beehives]] south of [[Camelot]]. (An empty bucket spawns nearby.) You require [[insect repellent]], found in the house north of [[Catherby]] bank, in order to do so.

With an empty [[cake tin]] in your inventory, use the [[swamp tar]] on the [[bucket of wax]] to get [[wax]] (in the cake tin). Note that it has to be done in that order. Use the wax on the sled to make a waxed sled, making it possible to ride it. The next task is to go up [[Trollweiss Mountain]], past the ice trolls' realm.
"""

[[steps]]
index = 2
name = "Fetching the flowers"
links = ["Sled", "Trollheim", "Trollheim Teleport", "Fairy rings", "Slayer ring", "troll child", "Ice troll", "melee", "Ice wolf", "rare flowers", "Ug", "climbing boots"]
text = """
{{Needed|[[Sled]] (waxed)|recommended=Food, energy potions, prayer potions.|skills={{SCP|Agility|28}} {{Boostable|yes}} to descend the slope}}

Return to [[Trollheim]] using the [[Trollheim Teleport]] spell, via [[Fairy rings]] (code {{Fairycode|ajr}}), the [[Slayer ring]], or make the long walk. Exit the Trollheim maze on the north-western side and take the narrow path leading north, then west, then north again to a dungeon entrance just past the ice gates and the [[troll child]].

The dungeon entrance is shown on the minimap as a red exclamation mark; it faces east and is labelled '''9''' on the map. Do '''not''' enter the ice gate east of the child.

It will be snowing around the area of the cave. '''Do not spend too much time standing in the snowing area as all your stats will slowly decrease by 1.'''

Enter this cave and walk through it to the north-western corner. Beware of the [[Ice troll|ice trolls]] which have a strong [[melee]] attack. In the north-western corner is the exit (marked red on the minimap): a narrow crevasse. It's hard to see. It's the little alcove just before the very end. There are no trolls near the crevasse inside the cave, so you can wait here to rest as needed.

[[File:Trollweiss mountain.png|thumb|An undisturbed patch of rare Trollweiss flowers.]]

When outside, walk south past the [[Ice wolf|ice wolves]] to an opening in the rocks at which point you can walk no longer. Click the slope once to ride the sled ({{SCP|Agility|28}}) due south to crash into a rock just east of the flower patch. You'll see the circular area with a red dot and a central rock; unequip the sled and walk in. (Be careful not to sled down the second slope further south, or else you will have to climb the entire mountain again.) 

'''If you teleport away while using the sled and you have full inventory, you will lose it and have to get a new one!'''

Pick the [[rare flowers]]. Teleport out to prepare for the final battle, or if you brought combat items, you can return to [[Ug]] by riding the sled down the rest of the mountain, going through the tunnel coming out on Rellekka's side and running back to the shortcut ('''4''' on the map). This requires [[climbing boots]].
"""

[[steps]]
index = 3
name = "Facing Arrg's wrath"
links = ["Trollweiss", "Ironman Mode", "Ug", "Arrg", "Aga", "Troll General", "Protect from Melee", "Troll arena"]
text = """
{{Needed|[[Trollweiss]], equipment and supplies for fighting Arrg}}

'''Note:''' The fight with Arrg is not a safe death for [[Ironman Mode#Hardcore|Hardcore Ironmen]].

Return to [[Ug]] and give him the Trollweiss. (You are not able to talk to him if you have the flower in your hand.) Ug will be very glad to receive the flowers, but he is afraid of [[Arrg]], so he cannot give [[Aga]] the Trollweiss directly. The only option is to battle Arrg.

[[File:Fighting Arrg.png|thumb|Duelling Arrg to the death!]]

Go to the room north of [[Ug]] where [[Arrg]] is still around. Prepare for battle before talking to him. Arrg has the same combat level and similar stats as [[Troll General]]s. He primarily uses a moderately inaccurate, but very strong melee attack with a max hit of 38. However, he also uses a slightly weaker but '''significantly''' more accurate Ranged attack that hits up to 30 damage. Both attacks can occasionally hit through protection prayers. If fighting him up close, it is recommended to use [[Protect from Melee]] as he does not change his attack styles based on protection prayers.

Talk to Arrg and defend Aga's honour. You will challenge him to a duel, but not in front of the lady. The two of you are transported into the [[Troll arena]] ('''10''' on the map).
"""

[[steps]]
index = 4
name = "Fighting Arrg"
links = ["melee", "protection prayers", "Protect from Melee"]
text = """
Arrg attacks immediately after the teleport, so be prepared. '''Note that you will automatically retaliate.''' Arrg has a strong [[melee]] attack and can hit through [[protection prayers]]. He can also throw rocks, so make sure to keep food on hand. He is level 113 and does not have very high defence or hitpoints.

[[File:Troll Romance - Arrg safespot.png|thumb|left|250px|The safespot for fighting Arrg.]]

There are multiple safespots for Arrg. For the first, run to the centre of the raised land at the north-west of the arena with [[Protect from Melee]] activated, waiting for Arrg to catch up. Once he is on the raised land, run to the west gate and he should get stuck against the mountain wall.

The second safespot is at the northern end of the arena, lure Arrg to the gate and then simply run onto the raised ground to the west and he will get stuck on the end.

Arrg should be killed as quickly as possible, as he will disappear after a few minutes, reappearing at the spot where Ug is.

:'''Note:''' The spectator trolls '''cannot''' be used as obstacles for safespotting as Arrg will walk through them.

If you die during the fight, you may return to the arena to fight him again. Note that he will follow the player around, but will not attack first, making safespotting easier. If you don't have a spare pair of climbing boots, don't forget to bring 12 coins to Tenzing to buy a new pair to allow you to return.

[[File:Second Arrg safespot.png|thumb|Second safespot for Arrg.]]

Defeat Arrg; he will dramatically shout his name and fall to the ground. Victorious, return to Ug. Head west out of the arena until you reach the secret entrance ('''4''' on the map). Otherwise, return via Trollheim. (Arrg will have lost his macho attitude and cringe before you.)

Tell Ug about the demise of Arrg. Since you are very strong and nice, he gives you some 'pretty rocks' in thanks. Rather unfortunately, he is still too scared to talk to Aga, upon which you call him useless and compare him to your toothless grandmother. This will convince him to finally win over the lady troll. She will eat the flower and become his girlfriend, making him weep tears of joy.

'''Congratulations, quest complete!'''
{{clear}}
"""
