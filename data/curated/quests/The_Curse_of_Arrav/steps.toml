quest = "The Curse of Arrav"
step_count = 5

[[steps]]
index = 0
name = "Starting off"
links = ["dwellberries", "ring of life", "Stamina potion", "Elias' message", "messenger", "Elias White", "Uzer Oasis", "Fairy rings", "Arrav", "Uzer Mastaba", "Mahjarrat", "Zemouregal"]
text = """
{{Needed|Combat equipment, 3 [[dwellberries]], a [[ring of life]]|recommended=[[Stamina potion]], 2 empty inventory spaces}}
[[File:Elias White chathead.png|left]]
The player may receive [[Elias' message]] from a [[messenger]] once eligible to start the quest, but this is not necessary to start the quest itself. Players may choose to wait and receive it if they wish to read the message for immersion, but it is removed upon completion of the quest.

Speak to [[Elias White]] at [[Uzer Oasis]] to begin the quest. The quickest way to get there is via [[Fairy rings|fairy ring]] code {{Fairycode|DLQ}}, then running eastward towards the coast. Elias will tell you that he has made progress towards [[Arrav]]'s predicament, having discovered information on an unusual form of necromancy that was once practised in the surrounding lands, matching what Arrav is currently suffering from. His research had led him to the [[Uzer Mastaba]], where a Pharaoh Queen, known for her work on saving the victims of a [[Mahjarrat]] necromancer, is buried. According to Elias, in order to free Arrav from [[Zemouregal]]'s hold, you will need a way to recover his heart while keeping it preserved and beating. As such, he tasks you with searching the mastaba for information on heart preservation, while he works on finding where Arrav's heart is being kept.
"""

[[steps]]
index = 1
name = "Tomb Raiding"
links = ["Uzer Mastaba", "Skeleton (Uzer Mastaba)", "mastaba key", "stone boat", "waterskin", "damaged armour", "Vase (Digsite)", "Dust (item)", "Odd markings (Uzer Mastaba)", "golem guard", "grave", "Menaphite Pantheon", "Canopic jar (oil)", "dwellberries", "ring of life"]
text = """
Enter the [[Uzer Mastaba]] atop the nearby hill. Inside, you will find various dead [[Skeleton (Uzer Mastaba)|skeletons]] littered around the area. Two of these will give the player a [[mastaba key]] when searched: the first is the southernmost skeleton in the cave beyond the first room, while the other is found north-west of the [[stone boat]] in the central chamber. Searching the rest of skeletons will only provide empty [[waterskin]]s, [[damaged armour]], [[Vase (Digsite)|vases]], and [[Dust (item)|dust]]. 
[[File:The Curse of Arrav - fighting golem guard.png|thumb|left|300px|Fighting the golem guard.]]
The keys are used automatically when operating the levers in the north-east and south-east corners of the area which are behind wall traps. Ensure you search the [[Odd markings (Uzer Mastaba)|odd markings]] on the walls preceding them to disable the traps and avoid damage, then attempt to pull the levers with the keys in your inventory. If you do not search the odd markings, you will be pierced for up to 19 damage when attempting to walk past them.

Once the two levers have been pulled, the door to the north will then be unlocked, but the way downstairs is guarded by the [[golem guard]]. It attacks with melee, cannot be safespotted, and has a prayer-piercing special attack. When the game screen shakes and he draws his arms close to his body, it will stand in place and attack three times every two ticks, dealing up to 30 damage per hit; simply move one tile away from the golem guard to avoid this. Dying to the guard will send a [[grave]] to just outside the entrance to the mastaba.
[[File:The Curse of Arrav - crossing tiles.png|thumb|300px|Crossing over the coloured tiles in the mastaba's lower level.]]
Upon descending the stairs, you will come across a chamber with multiple coloured tiles which raise and block the way, depending on which sets the player stands on. Walk on either the blue and green tiles or the yellow and red tiles on the south side to cross over to the burial chamber; if the wrong pair of tiles are stepped on after starting the crossing, the player will take moderate damage. After crossing to the burial chamber side, pull the lever to disable the coloured tiles.

The Pharaoh Queen's burial chamber contains multiple statues depicting the lesser gods of the [[Menaphite Pantheon]]. The shelves to the north can be searched to receive a [[Canopic jar (oil)|canopic jar]] filled with sacred oil. Head to the southern chamber where Tumeken's statue is found, and inspect the southern mural, which depicts the canopic jar being filled with three [[dwellberries]] and a [[ring of life]]; use the items in that order on the jar to fill it.

With the jar in tow, head back to Elias. You can save a bit of time by hopping worlds, which will teleport you back outside the mastaba.
"""

[[steps]]
index = 2
name = "Fort Invasion"
links = ["pickaxe", "Trollheim Teleport", "stony basalt", "Ghommal's hilt", "stamina potion", "Zemouregal", "Trollweiss Mountain", "Trollheim", "ice gate", "Trollweiss Dungeon", "Protect from Melee", "ice troll", "Stone tablet (The Curse of Arrav)", "Granite tablet", "Slate tablet", "shale tablet", "Mahjarrat notes (a-j)", "Zemouregal's Fort", "base key", "base plans", "Zemouregal's Base"]
text = """
{{Needed|A [[pickaxe]]|recommended=[[Trollheim Teleport]], [[stony basalt]], or [[Ghommal's hilt]]; [[stamina potion]], 2 free inventory spaces}}

Elias will tell you that one of his contacts spotted [[Zemouregal]] entering an old fort near [[Trollweiss Mountain]], and also found an entrance on the summit that appears to lead right into it. However, he suggests bringing a pickaxe as parts of the tunnels within have been caved in.

Make your way to [[Trollheim]]. Take the path just north-west of Trollheim (towards the [[ice gate]]), then enter the [[Trollweiss Dungeon]] directly west of the ice gate. Activating [[Protect from Melee]] is recommended for lower-levelled players as the [[ice troll]]s can hit up to 21. Follow the path north until you can enter a crevasse to get to the summit of Trollweiss Mountain. Once you've exited the crevasse, run directly east and enter the tunnels.
[[File:The Curse of Arrav - mining rubble.png|thumb|300px|Mining through the tunnels beneath Trollweiss Mountain.]]
Mine the rubble within the caves to clear the path; certain piles of rubble may need to be mined multiple times to be cleared, while some can only be mined once from each side before they're cleared, so you may have to run around the tunnels to mine the same rubble from different directions in order to clear it. Along the way, you can pick up the [[Stone tablet (The Curse of Arrav)|stone]], [[Granite tablet|granite]], [[Slate tablet|slate]], and [[shale tablet]]s, which depict a Mahjarrat attempting to avoid being chosen as a sacrifice in their ritual.

Mine your way to the eastern end of the tunnels to reach the fort's basement. Players can optionally search the bookcases on the eastern wall to receive [[Mahjarrat notes (a-j)]], which are written by Zemouregal and list various living and recently-sacrificed Mahjarrat, as well as his opinions of them.

Head upstairs to find that Arrav is standing before you, warning you to leave before Zemouregal returns. You will ask him about his heart, but he will tell you it is not present in the fort as Zemouregal did not want it too close to his fellow Mahjarrat. However, he will tell you to look behind the flame tapestry in the north-eastern room for something helpful. He is then summoned by Zemouregal, thanking you before he is teleported away.

The rest of [[Zemouregal's Fort]] is not accessible, so enter the door to the east and search the tapestry. You will receive a [[base key]] and [[base plans]], which depict [[Zemouregal's Base]].
"""

[[steps]]
index = 3
name = "Hearty Heist"
links = ["Crossbow (weapon)", "mith grapple", "insulated boots", "Canopic jar (The Curse of Arrav)", "Base key", "base plans", "Digsite teleport", "Lumberyard teleport", "Balloon Transport System", "Stamina potion", "anti-venom", "Insulated boots", "Zemouregal's Base", "base key", "venom", "Antidote++", "Odd Old Man", "decoder strips", "code key", "Mahjarrat notes (k-z)", "Lamistard"]
text = """
{{Needed|A [[Crossbow (weapon)|crossbow]], [[mith grapple]], [[insulated boots]], [[Canopic jar (The Curse of Arrav)|the filled canopic jar]], [[Base key]], [[base plans]], combat equipment (enemy is weak to Crush.)|recommended=[[Digsite teleport]], [[Lumberyard teleport]], or [[Balloon Transport System]] to Varrock for quick access to Zemouregal's base, [[Stamina potion]], [[anti-venom]], emergency teleport}}

Return to Elias, who you show the base plans to. He confirms that the base has a chamber marked as containing Arrav's heart, but it is found in the inner section of the base with state of the art security:
<gallery captionalign="center" widths="200">
The Curse of Arrav - heist cutscene 1.png|Human detection spells...
The Curse of Arrav - heist cutscene 2.png|A sewage system accessed via the kitchen...
The Curse of Arrav - heist cutscene 3.png|... whose floor is secured by periodic energy surges.
The Curse of Arrav - heist cutscene 4.png|A guarded vault door, made of five-inch thick runite-enforced steel, with a four digit access code to boot...
The Curse of Arrav - heist cutscene 5.png|Special fire ray enchantments, courtesy of Zemouregal...
The Curse of Arrav - heist cutscene 6.png|... leading to a pedestal holding Arrav's heart hostage.
</gallery>

While seemingly daunting, Elias will suggest various measures to bypass the traps: a [[Insulated boots|form of insulation]] from the energy surges, having him distract the zombies guarding the vault door, and a [[Crossbow (weapon)|crossbow]] and [[mith grapple]] to climb over the fire traps.

Before heading to [[Zemouregal's Base]], bring the required items for the heist, as well as the [[base key]]. Furthermore, players will be forced to enter a fight in which teleportation is the only way of escape. During the fight, players can be inflicted with [[venom]]. As such, take a sip of [[Antidote++]] or similar proactively beforehand or after you are afflicted by venom.


'''NOTE: If you're doing this all in one go, bring the [[Canopic jar (The Curse of Arrav)|filled canopic jar]].'''

Make your way to Zemouregal's Base, just west of where the [[Odd Old Man]] is, by your preferred method. Talk to Elias outside the entrance, then enter the base and run through the dungeon until you reach the kitchen (marked by the [[File:Cooking range icon.png|link=]] icon). Enter the kitchen, wear your [[insulated boots]], and then enter the sewer system via the southern wall using the pipe.

Head all the way around the path to the other end of the pipe exit to find yourself at the vault doors, ignore them for now. You can now safely remove/change your insulated boots. Make your way south to the room with three tables. Search the western table for [[decoder strips]], and the chest for the [[code key]]. Optionally, you can search the eastern table for [[Mahjarrat notes (k-z)]], the other half of Zemouregal's writings; this reveals the Mahjarrat who dug the tunnels to his fort was [[Lamistard]]. He was discovered and promptly sacrificed for the ritual.
[[File:The Curse of Arrav - vault door code input.png|thumb|300px|The code access interface at the vault doors.]]
Read the code key and take note of the four-letter code. Return north to the vault doors. Attempt to open them. An interface will appear; enter your key code in order on the decoder strips in the interface that pops up (right side of interface). Each strip will be associated with a number, 0-9, and will have an order, 1-4 on the left hand side of the strip. Use the up and down arrows to input the number and the right arrow to enter each number once picked.

For example, a code key with the code "DAFE" would have the player put strip 1 on D, 2 on A, 3 on F, and 4 on E, which reveals the access code to be 9449.

Upon entering the vault, equip your crossbow and mithril grapple, then click on the metal bars above the fire traps to climb over them. Do not attempt to walk across the room as you will take ~14 damage and wake up far away. There are no further traps here. Attempt to take the heart from the pedestal to initiate a cutscene.
"""

[[steps]]
index = 4
name = "The Hero of Avarrocka"
links = ["Stamina potion", "anti-venom", "Serpentine helm", "salve amulet", "Zemouregal", "Sharathteerk", "Arrav", "Protect from Melee", "Armoured zombie (The Curse of Arrav)", "venom", "tick", "Crumble Undead", "dragon darts", "Uzer Oasis"]
text = """
{{Needed|Bring combat equipment, the enemy is weak to Crush.|recommended=[[Stamina potion]], [[anti-venom]] ([[Serpentine helm]] can instead be used to protect against venom) or ranged/magic gear, emergency teleport, [[salve amulet]], combat potions to fit your attack style}}

Upon attempting to take the heart, your character turns around to find out that [[Zemouregal]] and [[Sharathteerk]] have discovered your presence and send [[Arrav]] to kill you. Players cannot leave the vault physically as Zemouregal blocks your path, and as such bringing a means to teleport out is recommended in case of an emergency. If you leave, you will need to bring insulated boots to return, but you do not need a mith grapple or crossbow, as the rematch with Arrav starts immediately after entering the doors to the grapple room. If you die during the fight with Arrav, your gravestone will be in the caves past the zombies and you can grab your boots before trying again. If you die at the same time you kill Arrav, you don't have to fight him again. 
[[File:The Curse of Arrav - catching Arrav's axe.mp4|thumb|400px|Players can unequip their weapon and attack Arrav to catch his axe, dealing extra damage to him.]]
Arrav uses a standard melee attack whose damage can be reduced with [[Protect from Melee]]. Every three attacks, Arrav will swing his axe in the direction he's facing, which will rebound back to him, dealing up to 26 damage in both directions. The thrown axe attack has a wind up time, allowing you to move adjacent or behind him and resume attacking; alternatively, you can quickly unequip your weapon and position yourself between Arrav and the axe, allowing you to catch it and strike his chest with a lightning animation for additional damage. When successful, a game message in the chatbox will state {{mes|You catch the flying axe and embed it in Arrav's chest!|colour=#229628}} Off-hand equipment does not need to be unequipped for this counterattack to be successful.

Additionally, [[Armoured zombie (The Curse of Arrav)|armoured zombies]] will also spawn with 10 Hitpoints each. They will not attack, even if attacked, and instead wander around the area, leaving behind venom pools wherever they walk. Stepping on these will inflict [[venom]] and deal up to 4 damage every [[tick]] if not moving; this stacks up to a maximum of 20 damage per tick if the player does not move. It is advised to target the armoured zombies with ranged, magic, or manually casting [[Crumble Undead]], as melee will often lead to you walking into their venom. The player is healed and cured of venom when Arrav is defeated and the subsequent cutscene finishes. Faster attack speed ranged weapons like [[dragon darts]] are ideal for dealing with these enemies - later in the fight two at a time will spawn so it's best to deal with them as soon as they spawn with a fast hitting weapon. Due to the armoured zombies significantly negative ranged defenses, ranged attacks hit very accurately, and having a ranged max hit of at least 10 often allows one-hit kills.

Upon defeating Arrav, Zemouregal will order Sharathteerk to teleport Arrav away. However, the spell is blocked courtesy of Elias, who teleports in and asks you to grab the heart promptly. He will then cast a powerful spell that binds both Zemouregal and Sharathteerk in chains. You quickly take Arrav's heart from its pedestal, causing it to glow red, and Elias will teleport you and himself back to the [[Uzer Oasis]].

<gallery captionalign="center" widths="200">
The Curse of Arrav - Zemouregal arrives.png|The player is discovered right before the heart is recovered.
The Curse of Arrav - fighting Arrav.png|Arrav fights the player against their will.
The Curse of Arrav - Elias rescue.png|Elias comes to the rescue, casting a powerful binding spell.
</gallery>

You will be surprised at Elias' apparent capabilities of directly teleporting into a heavily secured location and binding a Mahjarrat in chains, however briefly. He will remain reluctant to share his history with the Mahjarrat, insisting it is a complicated one, and quickly switches the topic to Arrav's heart; while he has it, it is not enough to break Arrav free from control, and he commits to researching this further. He will lastly note that you will not hear from him for some time, but will contact you when the time comes.

'''Congratulations, quest complete!'''
"""
