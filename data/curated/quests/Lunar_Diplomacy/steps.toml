[[steps]]
index = 10
name = "= '''5. The race is on!''' ''([[platform (Lunar Diplomacy)#Expert|yellow-green eastern platform]])'' ="
links = ["Agility", "Ethereal Expert", "Hurdle (Lunar Diplomacy)", "Agility potion", "Summer pie", "Hitpoints"]
text = """
[[File:Lunar Diplomacy race.png|thumb|220px|Jumping the hurdles.]]
A simple [[Agility]] test. Beat the [[Ethereal Expert]] to the end of the passage by jumping four [[Hurdle (Lunar Diplomacy)|hurdles]] whilst he walks a straight path. This is fairly easy, though an [[Agility potion]] (or [[Summer pie]]) and some food might help because failing a hurdle will cost you 8 [[Hitpoints]].
"""

[[steps]]
index = 11
name = "= '''6. Anything you can do...''' ''([[platform (Lunar Diplomacy)#Mimic|teal south-eastern platform]])'' ="
links = ["Mime (Random Event)", "random event", "Ethereal Mimic"]
text = """
[[File:Anything you can do....png|thumb|right|220px|Mimicking the Mimic.]]
A mime-copying game, very similar to the [[Mime (Random Event)|mime]] [[random event]]. Simply copy the emotes the [[Ethereal Mimic]] uses. After each emote, the mime will teleport to a different location. Talk to them again for the next.
"""

[[steps]]
index = 12
name = "=The fight="
links = ["Me", "Dream World", "Oneiromancer", "Ourania Teleport", "Baba Yaga"]
text = """
[[File:Fighting Me.png|thumb|220px|Fighting [[Me]].]]
:'''Note:''' If the fight doesn't start after the white screen, you will need to try again for a few times, it will eventually let you in. Also, try dropping your axe and then talking to the guide, or dropping your axe and picking it up again before talking to the guide.

Once you've completed all the challenges, talk to the guide in the centre, and they will ask if you are ready to face the ultimate challenge. Say that you are, and you get to face "[[Me]]", a level 79 opponent who attacks with melee and is easily defeated. You will occasionally be teleported around this arena, but this is more annoying than dangerous. The chats are quite amusing from "Me", so listen out!

Once you have defeated "Me", talk to the guide at the centre of the [[Dream World]], then exit via the lectern, and go and talk to the [[Oneiromancer]] again.

'''Congratulations, quest complete!'''

'''Tip:''' Before leaving Lunar Isle you can unlock the [[Ourania Teleport]] spell. If you intend on doing this, switch spellbooks to the Lunar spellbook at the altar next to the Oneiromancer before going to [[Baba Yaga]].
"""
