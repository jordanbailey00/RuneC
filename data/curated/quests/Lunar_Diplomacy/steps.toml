"""

[[steps]]
index = 8
name = "= '''3. Chop, Chop, Chop away!''' ''([[platform (Lunar Diplomacy)#Perceptive|blue north-eastern platform]])'' ="
links = ["Woodcutting", "logs", "Ethereal Perceptive", "Log pile (Lunar Diplomacy)", "bronze axe"]
text = """
[[File:Chopping dream tree.png|thumb|220px|Chopping dream trees.]]
This is a simple [[Woodcutting]] game, wherein all you must do is chop more [[logs]] than the [[Ethereal Perceptive]]. The goal is to be the first one to stack 20 logs in the centre on the "Deposit [[Log pile (Lunar Diplomacy)|Log pile]]". If you're limited on inventory spaces, simply chop a few at a time and then stack them and continue cutting, but note that once you have deposited 20 logs, you'll be '''unable to pick up your items.''' The Ethereal Perceptive supplies a [[bronze axe]] if you don't have an axe of your own. This is one of the easier challenges.
"""

[[steps]]
