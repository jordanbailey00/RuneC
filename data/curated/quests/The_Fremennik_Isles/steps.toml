quest = "The Fremennik Isles"
step_count = 11

[[steps]]
index = 0
name = "Area overview"
links = ["Neitiznot", "Jatizso", "Rellekka", "King Gjuki Sorvott IV", "Mawnis Burowgar", "Ice Troll Caves", "food", "raw tuna", "tin ore", "Mining", "coal", "mithril ore"]
text = """
The Fremennik Isles are a collection of islands interconnected by bridges. The map below shows the islands and their interconnections. There are two major villages on the islands: [[Neitiznot]] and [[Jatizso]].

The teleport locations show the landing docks that can be reached from the most northern dock in [[Rellekka]] using the appropriate ferry operator.

The numbers on the map represent the following locations relevant during the quest:
[[File:The Fremennik Isles quest map.png|frame|centre|Quest map]]
#The court of [[King Gjuki Sorvott IV]].
#The court of [[Mawnis Burowgar|King Mawnis Burowgar]].
#A bridge that needs repairs.
#Another bridge that needs repairs.
#Entrance to the [[Ice Troll Caves]] for the final battle.
Do not go to the northern islands without [[food]], or you may die.

Both villages have a bank that can be used.

At any time during the quest, it is possible to travel around all islands.
:'''Note:''' If you are simply starting this quest for access to Neitiznot bring a [[raw tuna]] and 8 [[tin ore]]s if [[Mining]] level 1, 7 pieces of [[coal]] if mining level 2-54, 6 [[mithril ore]]s if 55+ and speak to King Gjuki Sorvott IV.
"""

[[steps]]
index = 1
name = "King Gjuki Sorvott IV"
links = ["raw tuna", "catspeak amulet", "Mord Gunnars", "Rellekka", "Jatizso", "King Gjuki Sorvott IV", "HRH Hrafn", "Flosi Dalksson", "ores", "Tin ore", "coal", "Mithril ore", "Jatizso mine", "Hring Hring", "coins", "Silly jester costume", "Neitiznot", "Maria"]
text = """
{{Needed|[[raw tuna]], ores as above, [[catspeak amulet]] if you wish to hear what the cat is saying.}}
[[File:The Fremennik Isles - Jatizso court.png|thumb|220px|King Sorvott's court]]
To start the quest, talk to [[Mord Gunnars]] at the most northern dock in [[Rellekka]] to be taken to [[Jatizso]].

Talk to [[King Gjuki Sorvott IV]] in the checkered floor room. His [[HRH Hrafn|cat]] will intervene. The king asks you to get the cat a [[raw tuna]].
:'''Note:''' You can either fish the raw tuna on the south pier or buy it from [[Flosi Dalksson]] in the north-eastern house.

Give the tuna to the king's cat, and talk to the king.

Give the king the [[ores]] you are assigned (8 [[Tin ore|tin]] if 1, 7 pieces of [[coal]] if 2-54, 6 [[Mithril ore|mithril]] if 55+). If needed, these ores can be mined at [[Jatizso mine|the cave]] below the village. It is accessible by exiting the west gate and going north-east. Enter the dungeon, and mine the ores. Coal can also be bought from [[Hring Hring]]. The king's reward for the ores consists of some [[coins]].

'''Take all 4 pieces of [[Silly jester costume|Jester]] clothes from the chest behind the king's throne.'''

Travel back to Rellekka by talking to Mord Gunners on the dock to the south, and then travel to [[Neitiznot]] by talking to Mord's wife, [[Maria]], who stands next to where you land.
"""

[[steps]]
index = 2
name = "Burgher Mawnis Burowgar"
links = ["Silly jester costume", "Slug Hemligssen", "Mawnis Burowgar"]
text = """
{{Needed|[[Silly jester costume]]}}
[[File:FI jester controls.png|thumb|300px|The player entertaining the Burgher.]]

Put on all four pieces of the jester costume, unequip anything in your weapon and shield slots and talk to [[Slug Hemligssen]], behind the bank, and say, ''"Free stuff please."''

*If you have a follower out while attempting to do the Jester's Performance, you will be prompted to put your cat away regardless of the pet you have out 

Talk to [[Mawnis Burowgar]] in the building just south of the bank while wearing the jester costume and entertain him—do everything he says using the jester control panel shown in the picture. Keep an eye on the guards exchange:

<blockquote style="margin: 0 2em; font-style: italic">
When do we assault the caves?<br/>
In '''two days'''.<br/>
Good. How many recruits are ready?<br/>
'''Seventeen''' so far.<br/>
More shields are completed by noon.<br/>
And the armour?<br/>
I will finish their armour by tomorrow.<br/>
And the '''two bridges''' we need repaired.<br/>
I will fix them as soon as I can.
</blockquote>

Back to Slug, and answer his questions. The answers are:
#'''2 days'''
#'''17 militia'''
#'''2 bridges'''
Head back to Mawnis Burowgar, without the jester costume this time.
"""

[[steps]]
index = 3
name = "Bridge repairs"
links = ["rope", "axe", "arctic pine logs", "split log", "knife", "armour", "food", "Mawnis Burowgar", "yak", "hair", "spinning wheel", "coins", "woodcutting stump", "Thakkrad Sigmundson", "NPC", "bank", "Ranged", "Protect from Missiles", "Prayer", "Ice Troll Caves", "King Gjuki Sorvott IV"]
text = """
{{Needed|8 [[rope]]s (can be obtained during this part), an [[axe]], 8 [[arctic pine logs]] or 8 [[split log]]s (can be obtained during this part), a [[knife]].
|recommended=[[armour]] and [[food]].}}

Bring [[Mawnis Burowgar]] eight [[rope]]s. If you are missing ropes, go kill some [[yak]]s and take the [[hair]] drop to the [[spinning wheel]] in the village. You will keep the ropes and receive 1,000 [[coins]].

He will then ask you to get eight [[split log]]s. If you have 56 Woodcutting, go and cut eight [[arctic pine logs]] and split them on the [[woodcutting stump]] in the middle of the village. (If you do not have the Woodcutting level, you may buy the split logs from other players and still continue with the quest.) Bring them to Mawnis and receive another 1,500 coins.

Speak to the guard [[Thakkrad Sigmundson]], and you will be able to repair the bridges.
:Be warned; you may be attacked by high-level, hard-hitting trolls in the next step. Bring [[food]]/[[armour]] if necessary.
[[File:The Fremennik Isles reparing bridge.png|thumb|220px|Repairing the bridge.]]
Get a [[knife]], eight [[split log]]s, and eight ropes from the bank (or buy the knife from the general supply [[NPC]] in the [[bank]]). Travel over the first set of bridges to get to the broken ones further north to repair the bridges (right-click). You will have to travel past trolls to get there, some of which can use [[Ranged]]. Each bridge only needs one repair, and level 20 Construction.

'''Note''': If you wish to be safe, turn on [[Protect from Missiles]] ''before'' repairing the eastern bridge. [[Prayer]]s cannot be activated during the repair, but will last throughout if activated beforehand. If you didn't use Protect from Missiles, all damage dealt to you will be applied at once after repairing the bridge, and can easily kill you at lower levels.

Go back to talk to the king ([[Mawnis Burowgar]]) again; he'll pay another 1,500 coins for repairing the bridges. Now, the request is to investigate the [[Ice Troll Caves|troll caves]], but first, you need to make sure that the other [[King Gjuki Sorvott IV|king]] does not take the raid on the trolls in the wrong way.
"""

[[steps]]
index = 4
name = "Tax collector"
links = ["coins", "Rellekka", "Mord", "King Gjuki Sorvott IV", "Jatizso", "Hring Hring", "Raum Urda-Stein", "Skuli Myrka", "Flosi Dalksson", "Keepa Kettilon", "general store", "Vanligga Gastfrihet", "Eric (Jatizso)", "cabbage", "Slug Hemligssen", "Neitiznot", "Neitiznot shield", "bronze nail", "Copper ore", "tin ore", "bronze bar", "Superheat Item"]
text = """
{{Needed|5,000 [[coins]] (recommended)}}

Use the boat to go back to [[Rellekka]], and use [[Mord]]'s ferry service to return to [[King Gjuki Sorvott IV]] on [[Jatizso]].

King Gjuki Sorvott IV requires a tax collector for his new window tax, which needs to pay for the expenses of the army.

Collect taxes from the following people:
#[[Hring Hring]] or [[Raum Urda-Stein]] at the armourer's hut (8,000 [[coins]])
#[[Skuli Myrka]] at the weaponsmith hut (6,000 [[coins]])
#[[Flosi Dalksson]] or [[Keepa Kettilon]] at the fish shop/[[general store]] (5,000 [[coins]])
#[[Vanligga Gastfrihet]] at the eating hall (5,000 [[coins]]) ''(Offer to pay her taxes for her; this provides the capability to trade in black market yak goods after the quest.)''
'''Note:'''  You can speak to Magnus Gram (banker) about taxes, in which he'll politely make you change your mind about taxing him. 

Go back to King Sorvott, who now requires a tax collector for the newly invented "facial hair tax."

Now, collect from:
#[[Raum Urda-Stein]] (armour trader)
#Hring Hring (ore trader, in the same building as [[Raum Urda-Stein|Raum]])
#Skuli Myrka (weapon trader at the anvil north of [[Raum Urda-Stein|Raum]])
#Flosi Dalksson (raw fish seller in the general store)
#[[Keepa Kettilon]] (cooked fish seller in the general store)
'''Note:''' You can speak to [[Eric (Jatizso)|Eric]], who has no money and will throw a [[cabbage]] at you.

The tax bag now contains 29,000 coins. The same taxpayer options apply as in the previous tax collection round. Return to the king.

The taxes are finally enough. Now, the king requires more spying assistance. So, it's time to return to [[Slug Hemligssen|Slug]] the spymaster in [[Neitiznot]].

'''Note:''' If you do not have a [[Neitiznot shield]] already and don't have a [[bronze nail]] in your bank, buy one [[Copper ore|copper]] and one [[tin ore]] from Hring Hring to make a [[bronze bar]] at the clay forge in Neitiznot (or use [[Superheat Item]]). When returning to Jatizso later in quest, use the anvil to make some bronze nails.
"""

[[steps]]
index = 5
name = "The jester part 2"
links = ["Silly jester costume", "Slug Hemligssen", "King Gjuki Sorvott IV"]
text = """
{{Needed|[[Silly jester costume]]}}

Return to [[Slug Hemligssen|Slug]] once more, only to get an assignment as jester again.

A rough capture of the guards exchange:
<blockquote style="margin: 0 2em; font-style: italic">
What do you think of the new Burgher's Champion?<br/>
[He/She/They] seem[s] honourable and courageous to me.<br/>
What about their collaboration with King Sorvott?<br/>
Well, I trust Mord Gunnars and he works for the King.<br/>
And the '''Champion was helping''' you to repair the bridges.<br/>
Well yes. So are your militia ready?<br/>
I have them anchored near '''Etceteria'''.<br/>
Then I shall sail our '''potions''' to them tonight.<br/>
So are we ready to sail at dawn?<br/>
Absolutely, long live Burgher Burowgar.<br/>
And may the Troll general be short lived.<br/>
</blockquote>

Now, return to Slug and bring out a report. The answers are:
#'''Etceteria'''
#'''Some potions'''
#'''I have been helping'''
Slug is pleased with the answers and pays another 2,500 coins. Then, he suggests to visit [[King Gjuki Sorvott IV]] and give an update on the spying progress.
"""

[[steps]]
index = 6
name = "Traditional Fremennik rites"
links = ["yak-hide armour", "yak-hide", "Neitiznot", "coins", "needle", "thread", "Costume needle", "Neitiznot shield", "arctic pine logs", "bronze nail", "hammer", "rope", "The Fremennik Kings", "King Gjuki Sorvott IV", "Mawnis Burowgar", "Thakkrad Sigmundson", "cured yak-hide", "yak-hide body", "yak-hide chaps", "Ice troll", "Woodcutting", "Ice Troll King"]
text = """
{{Needed|A set of [[yak-hide armour]] '''OR''' 3 [[yak-hide]]s (can be obtained on [[Neitiznot]]), 15 [[coins]], a [[needle]] and two [[thread]] (or [[Costume needle]]). You will also need a [[Neitiznot shield]] '''OR''' 2 [[arctic pine logs]], one [[bronze nail]], a [[hammer]], and a [[rope]].}}
{{Listen
|title = [[The Fremennik Kings]]
|desc = The music which plays when the player berates King Gjuki Sorvott IV.
|filename = The Fremennik Kings.ogg
}}
[[King Gjuki Sorvott IV]] gets an update that he is not prepared for, but he won't listen to sound advice.

'''Note:''' You will need 1 free slot to receive the decree, in order to continue the quest, in this next dialogue with the king.

He will give you a Royal decree that you need to deliver to [[Mawnis Burowgar]].
:'''Note:''' You will need to remove the Jester outfit to get the correct quest dialogue from Mawnis Burowgar.

Hop islands again to talk to Mawnis, who is obviously disappointed in learning the decree from King Sorvott. As leader of his troops, go through the ancient [[Neitiznot]] warrior rites.
:'''Note:''' You can skip the making of the shield and armour by having all three items in your inventory and continuing to speak to the king.

First, [[Thakkrad Sigmundson]] will tell you to make [[yak-hide armour]]. Get three [[yak-hide]]s, and have them cured by [[Thakkrad Sigmundson]] for a fee of 5 coins per hide. Take a [[needle]] and [[thread]] from bank or the nearby shop, and craft the [[cured yak-hide]]s into a [[yak-hide body]] (2 hides) and into [[yak-hide chaps]] (1 hide). Thakkrad states that the armour is ideal for protection from the [[Ice troll|trolls]]' granite clubs, however the armour does '''not''' have any such effect.

Talk to King Burowgar again to learn how to make a large Fremennik round shield, the [[Neitiznot shield]]. This shield '''is''' ideal for protection from stones that are thrown by the trolls, reducing their max hit from 6 to 2.

Making the shield requires two [[arctic pine logs]], one [[bronze nail]], a [[hammer]], and a [[rope]]. Make the shield on the [[Woodcutting]] stump located east of bank. Make sure to have a hammer in the inventory.
:'''Note:''' The shield is called '''Neitiznot shield''' on the woodcutting stump. This will complete a hard task in the Fremennik area.
:'''Note:''' If you do not have 56 Woodcutting to make this shield, you may buy the shield off other players, and it will still allow you to continue the quest.

Return to King Burowgar one more time, and he will make you the champion of Neitiznot and give you the assignment to kill the [[Ice Troll King]] and deliver his head.
"""

[[steps]]
index = 7
name = "Killing the trolls"
links = ["Neitiznot shield", "food", "armour", "Troll King", "Melee", "Ranged", "Magic"]
text = """
{{Needed|A [[Neitiznot shield]], [[food]], and [[armour]].
|recommended=A means to teleport out of the cave after killing the Troll King.}}

:'''Note:''' When preparing your setup note that the [[Troll King]] can only be killed effectively with [[Melee]]; '''do not use''' [[Ranged]] or [[Magic]] and you should not use Protect from Melee as you will take heavy damage if you do
{{Instance}}
"""

[[steps]]
index = 8
name = "= Getting to the fight ="
links = ["Neitiznot shield", "ring of life", "Ice Troll Caves", "King of the Trolls"]
text = """
Go to the bank to stock up for battle. Take a melee weapon and armour, the [[Neitiznot shield]], and plenty of good food. Prayer potions should not be required as you will be able to obtain some for free in the cave. An emergency teleport and a [[ring of life]] are also useful.

When ready, equip the Neitiznot shield and cross the eastern rope bridge, run north-east and cross the next rope bridge, then due north until you reach the sea, then straight east to the north-eastern [[Ice Troll Caves|cave]]. There is an unmarked dead-end entrance half way, do not try to go in, keep going.) 

There are no trolls in the area directly outside the cave, so you can use this opportunity to rest and heal up.{{Listen
|title = [[King of the Trolls]]
|desc = The music which plays upon entering the Ice Troll Caves.
|filename = King of the Trolls.ogg
}}
"""

[[steps]]
index = 9
name = "= Ten trolls to progress ="
links = ["multicombat area", "Honour guard", "Ice Troll King", "frenzied ice troll female", "Frenzied ice troll male", "Frenzied ice troll grunt", "Frenzied ice troll runt", "Bork Sigmundson", "tuna", "strength potion", "Protect from Melee"]
text = """
After entering the cave, a cutscene follows. You will have to kill 10 frenzied ice trolls (of any kind) in a somewhat chaotic [[multicombat area]], with help from the Fremennik [[Honour guard|Honour guards]], before you can cross the bridge to the south to assault the [[Ice Troll King]], which you fight one-on-one. The [[frenzied ice troll female]]s (the ones with blonde hair) use ranged attacks that hit fast and accurately, but the Neitiznot shield reduces their max hit to only 2. The [[Frenzied ice troll male|troll males]], [[Frenzied ice troll grunt|grunts]] and [[Frenzied ice troll runt|runts]] use Melee and have max hits of 17, 21 and 15 respectively.[[File:The Fremennik Isles honour guard and trolls.png|thumb|220px|Fighting the ice trolls alongside the honour guard.]]
First, talk to [[Bork Sigmundson]] near the cave entrance - he will give you eight to ten [[tuna]]s, two to four 4-dose [[strength potion]]s, and two to four 3-dose prayer potions a single time each upon request. If there is not enough inventory space, then the player gets enough to fill their inventory and does not get any more. Players can make only one request for each supply. A good strategy would be to fight trolls until you've mostly used up your own food, then talk to Bork to resupply with tuna.

[[File:The Fremennik Isles boss fight.png|thumb|220px|Fighting the Ice Troll King.]]
It is '''strongly''' recommended to position yourself at the edges of the battle, since going into the densest concentration of trolls can result in the player being attacked by 5 or more trolls at once and becoming overwhelmed. The safest strategy would be to use [[Protect from Melee]] whenever attacked by melee trolls as these do the greatest damage, and pick off trolls one by one. You can also target trolls that have been reduced to low health by the Fremenniks. If you don't have access to Protect from Melee, try to exclusively fight female trolls and avoid the males. Keep an eye on the trolls around you at all times so you don't get surrounded.

Your progress towards killing 10 '''will''' be saved if you leave the cave/teleport out.
"""

[[steps]]
index = 10
name = "= Showdown with the Troll King ="
links = ["Ice Troll King", "Protect from Magic", "Protect from Melee", "Combat level", "Magic", "Neitiznot shield", "Decapitated head (The Fremennik Isles)", "Ice Troll King (Corpse)", "knife", "Ice Troll King Lair", "Neitiznot", "helm of neitiznot", "Troll King's head", "Attack", "Strength", "Defence", "Hitpoints"]
text = """
Once 10 trolls have been killed a message will appear in the chatbox stating that the bridge to the [[Ice Troll King]] can be used. Leaving the cave will not revoke your access to the Ice Troll King, so restock on supplies if you need to.

When crossing the bridge, a short cut scene shows the Troll King moving towards you. He will land the first strike, so turn on the [[Protect from Magic]] prayer ('''not''' [[Protect from Melee]]) before crossing bridge or while the cut scene is playing, and top up prayer if needed.

The Troll King has a [[Combat level]] of 122 and uses a powerful mix of attacks (Melee, Ranged, [[Magic]] and teleport); turn on Protect from Magic and you won't get hit much. Using a [[Neitiznot shield]] as well will leave melee as his only effective attack, decreasing damage significantly. '''Do not use Protect from Melee against the troll king for he will use a strong knockback attack for as long as you have it activated or if you run out of prayer, making you unable to attack him.''' Bring high healing food and a few doses of prayer potion. It is possible to kill him with Ranged or Magic, however it will be slow, only do this if you cannot use Melee effectively.
[[File:The Fremennik Isles boss defeated.png|thumb|220px|Neitiznot's champion claims the troll's head as proof of victory.]]
After killing the Troll King, decapitate the [[Decapitated head (The Fremennik Isles)|head]] from [[Ice Troll King (Corpse)|the body]]. The head is removed by hand, so no particular weapon or [[knife]] is required. If the head is lost after being obtained, it can be recovered from the Troll King's corpse by returning to the [[Ice Troll King Lair|Ice Troll King's Lair]]. The 10 ice trolls and Ice Troll King do not need to be defeated again; returning to the lair will transport the player directly to the Troll King's corpse.

Do not take the east bridge after defeating the Troll King if you are low level. It is full of powerful trolls with no Fremennik NPCs to soak up hits.

Teleport away, or return the way you came. Return to [[Neitiznot]] to talk to Burowgar. He will give his [[helm of neitiznot]] in return for the [[Troll King's head]]. After taking two choices for a 10,000 experience reward to any one of [[Attack]], [[Strength]], [[Defence]], or [[Hitpoints]] (you may choose the same skill twice), the quest is complete.

'''Congratulations, quest complete!'''
"""
