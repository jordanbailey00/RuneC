links = ["Jaltevas Pyramid", "Necropolis", "Akila's journal", "Apmeken", "Crondis", "Het", "Scabaras", "Tombs of Amascut", "Tombs of Amascut/Strategies", "Ancient key (Tombs of Amascut)", "big banana", "Eldritch ashes", "Fang (Tombs of Amascut)", "scarab dung", "Elidinis' Warden", "Tumeken's Warden", "Osmumten", "Menaphos", "Antique lamp (Into the Tombs)"]
text = """
The miniquest begins by talking to Maisa at the [[Jaltevas Pyramid]] at the [[Necropolis]].

After entering the pyramid, a small cutscene will ensue, with Maisa giving the player a [[Akila's journal|journal]] and then tasking the player on freeing the lesser gods, [[Apmeken]], [[Crondis]], [[Het]], and [[Scabaras]] in the [[Tombs of Amascut]]. Players need to complete a full run of the Tombs of Amascut in order to proceed with the miniquest. A strategy guide can be found [[Tombs of Amascut/Strategies|here]]. Players wanting to obtain the [[Ancient key (Tombs of Amascut)|ancient key]] after the miniquest should loot the [[big banana]], [[Eldritch ashes]], [[Fang (Tombs of Amascut)|fang]], and [[scarab dung]] dropped by each demi-boss respectively.

After players defeat the demi-bosses within the tombs to release Amascut's hold on the lesser gods, players must proceed to the lower levels of the tombs, where Amascut is found to have activated [[Elidinis' Warden|Elidinis']] and [[Tumeken's Warden]]. After both Wardens have been defeated, players will find themselves in [[Osmumten]]'s burial chamber, where his spirit can also be found. Osmumten will commend players on their victory over Amascut after defeating the Wardens, but also warns that Amascut's forces will be back again and that the player's help within the tombs is still needed.

[[File:Into the Tombs - Rendezvous with the Avatars.png|thumb|The lesser gods in the tombs' lobby]]
Players can teleport to the tombs' lobby after claiming their rewards, where the lesser gods can be found and talked to to learn some of their backstory. Players should then talk to Maisa in the lobby, speculating whether Amascut has gone to [[Menaphos]] and is now reconsidering her plans. She will then reward players with an [[Antique lamp (Into the Tombs)|antique lamp]] and walk away to help the lesser gods.
"""
