[[steps]]
index = 6
name = "The Final Preparations"
links = ["blisterwood logs", "knife", "chisel", "ruby", "Ivandis flail", "fire rune", "cosmic rune", "Enchant ruby or topaz", "Silver sickle (b)", "Ruby sickle (b)", "Blisterwood Sickle", "Enchanted ruby sickle (b)", "Blisterwood logs", "Blisterwood flail", "Enchanted emerald sickle (b)", "ruby sickle (b)", "Lvl-3 Enchant", "enchant ruby or topaz", "tablet", "Blisterwood sickle"]
text = """
{{Needed|8 [[blisterwood logs]], [[knife]], [[chisel]], [[ruby]], [[Ivandis flail]] and either 5 [[fire rune]]s, and a [[cosmic rune]] or an [[Enchant ruby or topaz|enchant ruby tablet]].}}
Speak to Vanescula, who tells you that she had Sarius keep an eye on you, and that her intervening with Vanstrom saved you. She then tells you that she's given Vertida the required information to craft the weapons.

Head to the Myreque Hideout under Old Man Ral's house and speak to Vertida. He will tell you how to make a ruby sickle. Search the nearby crate for a [[Silver sickle (b)|silver sickle]], then combine the silver sickle and [[ruby]] (requires a chisel). Enchant the [[Ruby sickle (b)|ruby sickle]]. Craft the [[Blisterwood Sickle]] with an [[Enchanted ruby sickle (b)|enchanted ruby sickle]], [[Blisterwood logs|Blisterwood log]], and a [[knife]] in your inventory. Use the [[Blisterwood Sickle]] on the [[Ivandis flail|Ivandis Flail]] to get a [[Blisterwood flail]], as well as getting back the [[Enchanted emerald sickle (b)|enchanted emerald sickle]] that was previously attached.

#Search the nearby crate for a [[Silver sickle (b)|silver sickle]]
#Attach a ruby to the sickle to create a [[ruby sickle (b)]].
#Cast [[Lvl-3 Enchant]] on the ruby sickle, or use an [[enchant ruby or topaz]] [[tablet]] on it.
#Use the Blisterwood logs on the [[Enchanted ruby sickle (b)|enchanted ruby sickle]] to create a [[Blisterwood sickle]].
#Lastly, use the Blisterwood sickle on the [[Ivandis flail]] to create the [[Blisterwood flail]].

Return to the Icyene Graveyard. Talk to Veliaf, who will tell you that Safalaan has gone for a walk north of the Icyene Graveyard, and will send you after him. He can be found just north of the graveyard, staring out over the water to the east. Talk to him; both he and you will share your regrets before you both return to the Graveyard.
"""

[[steps]]
index = 7
name = "A Bloody Show"
links = ["Blisterwood flail", "Piety", "Vanstrom Klause", "Castle Drakan", "Lowerniel Drakan", "Polmafi", "Kael", "Vertida", "Radigad"]
text = """
{{Needed|[[Blisterwood flail]], combat equipment.|recommended=High magic defence gear, equipment with crush attack bonuses, a fast ranged weapon, 43 prayer to use protection prayers (70+ recommended for [[Piety]]), high healing food, prayer potions, super combat potions and an emergency teleport.}}
{{Instance|irs=Veliaf|cost=50000}}
'''{{Colour|Red|Warning}}:''' You will have to battle [[Vanstrom Klause]], who can hit through prayers and has a fairly high Defence level of 180. It is recommended to bring an emergency teleport during your first attempt.

Speak to Vanescula at the Icyene Graveyard once you are combat-ready. Vanescula will teleport the Myreque and take you all to [[Castle Drakan]] as her prisoners. Vanstrom will ask her how she managed to capture all the Myreque, with her telling him that she convinced them that she was on their side, then tricked them into coming to Castle Drakan. Before she enters the Castle, [[Lowerniel Drakan]] exits, already knowing Vanescula's true intentions of overthrowing him, and demands she tell him why she made that decision.

Enraged, Lowerniel proceeds to kill her vyre servants and instantly subdues his sister. Forced to take action, [[Polmafi]], [[Kael]], [[Vertida]] and [[Radigad]] attack, but are instantly incinerated by Lowerniel. Lowerniel then orders Vanstrom to kill the rest of you. Safalaan tries to reason with Vanstrom, knowing that he was once his father prior to the vampyrification process. Vanstrom disregards him, and knocks Safalaan out. You must now fight Vanstrom Klause.

<gallery captionalign="center" widths="200">
Sins of the Father - Vanescula talks to Vanstrom.png|Vanescula takes the Myreque to Castle Drakan as her "prisoners".
Sins of the Father - Lord Drakan appears.gif|His-Dark-Self the Lord of Vampyrium, Lowerniel Vergidiyad Drakan, appears at last.
Sins of the Father - Lord Drakan.png|Lowerniel Drakan is already aware of his sister's betrayal.
Sins of the Father - Drakan chokes Vanescula.png|Lowerniel Drakan subdues his sister.
Sins of the Father - Drakan kills Myreque.png|Polmafi, Kael, Vertida and Radigad are immediately incinerated.
Sins of the Father - Vanstrom fights.png|Vanstrom is left to kill the remaining Myreque members.
</gallery>
"""

[[steps]]
index = 8
name = "=Battling Vanstrom Klause="
links = ["Vanstrom Klause", "thrall", "Auto Retaliate"]
text = """
[[File:Fighting Vanstrom Klause.png|thumb|right|The player battles against Vanstrom Klause.]]
[[Vanstrom Klause]] is level 459, and is a very difficult fight, far beyond the normal master level difficulty. The ring of recoil '''does not''' work during this fight, nor does vengeance. The player is also unable to summon [[thrall]]s.

Should you die during the fight, lost items can be retrieved from Veliaf at the Icyene Graveyard for 50,000 coins (you are not required to have the coins in your inventory). Veliaf can also be used to send you back to the final fight - if going back, activate potions before speaking to Veliaf.

:'''Note: Turn off [[Auto Retaliate|auto-retaliate]] before the fight!'''
"""

[[steps]]
index = 9
name = "==Mechanics=="
links = ["blisterwood flail"]
text = """
Vanstrom should be fought with melee, as you will need to use the [[blisterwood flail]] to damage him.

The fight with Vanstrom is split into two phases. After reducing his hitpoints to zero, he will briefly disappear and reappear with 200 hitpoints, indicating the start of the second phase.
"""

[[steps]]
index = 10
name = "===Phase 1==="
links = ["Protect from Magic", "acidic bloodveld", "rune pouch", "Wind Strike"]
text = """
During the first stage Vanstrom  primarily uses a magic-based attack, which will also heal him for a portion of the damage dealt. [[Protect from Magic]] reduces the damage from this attack by 50%, and is recommended to be used for the duration of this first phase. He can use an attack that lowers your Attack level, similar to Shadow Spells.

Vanstrom will also perform 1 of 3 special attacks. When the fight is first initiated he may use a special attack at any time, and after 9-12 regular attacks thereafter. The special attack is chosen at random, but he will never repeat the same one in succession. Avoiding these special attacks is key to succeeding in the fight.

#{{overhead|My pets will feast on your corpse!}} - Vanstrom will summon an [[acidic bloodveld]] that walks towards you. You must kill the bloodveld from a distance or it will explode when it reaches you and hit you for 35-50 damage. After killing the bloodveld it will leave an acid pool on the ground which you should avoid. The creature will always appear on the far north or south side of the arena (whichever one is furthest away from you) so it is recommended to keep some distance to either side of the room to give yourself more time to deal with them. Bring a range switch to kill them, ideally fast attacking 1-slot equipment such as knives/darts on the '''longrange''' style, as you have perfect accuracy against it and only need to hit it once. Runes in a [[rune pouch]] (e.g. for [[Wind Strike]], which can also one-shot the bloodvelds) also work and, whilst slower to use, do not require a change of weapon and have a longer range.
#{{overhead|Stare into darkness!}} - Vanstrom will turn your screen dark and you will be hit upwards of 40+ damage. You must immediately step 1 tile away once the text appears to avoid this attack, but the timing for this is '''extremely unforgiving''', especially on high ping. To make avoiding this attack easier, you may choose to step away after each of his regular attacks in anticipation of an eventual special attack.
#{{overhead|Blood will be my strength!}} - Vanstrom will summon a blood orb that is visually 1x1 tile in size, but is actually 3x3. This orb increases the damage of Vanstrom's magic attacks, even with [[Protect from Magic]]. By running in a wide arc around the orb, you can lure Vanstrom inside to destroy it, hitting him for 20+ damage and ending the buff. Higher levelled players may also choose to simply tank the additional damage and wait for the orb to disappear.

<gallery captionalign="center" widths="200">
Sins of the Father - My pets will feast on your corpse!.png|Vanstrom summons an acidic bloodveld.
Sins of the Father - Stare into darkness!.png|Darkness emanates from Vanstrom, heavily damaging you.
Sins of the Father - Vanstrom's blood orb.png|Vanstrom summons a blood orb, strengthening his magicks.
</gallery>
"""

[[steps]]
index = 11
name = "=== Phase 2 ==="
links = ["RuneLite", "Piety", "Redemption"]
text = """
[[File:Sins of the Father - Vanstrom lightning.png|thumb|right|Vanstrom summons a barrage of lightning down on you.]]

In the second phase of the fight, Vanstrom will stop using the special attacks from the first phase, and his regular attack will now be '''unaffected''' by protection prayers, hitting with 100% accuracy.

Additionally, every 2 seconds or so 10-15 randomly placed shadows will appear on the ground to indicate a delayed lightning attack which will strike for up to 40 damage.

:'''Note:''' These shadows may be difficult to see on the [[RuneLite#117 HD plugin|117 HD plugin]] on the [[RuneLite]] client; consider disabling the plugin for this encounter.

In this phase you may deactivate Protect From Magic, keeping any useful non-overhead prayers between phases (such as [[Piety]]). [[Redemption]] may also be wise to keep on as a last resort here, as it's easy to focus so much on dodging his lightning attacks that his regular attacks end up whittling you down.

You'll want to constantly be attacking Vanstrom while avoiding the lightning bolts, so it's best to simply step one tile around him clockwise or counter-clockwise each time the tile you're on gets targeted. Keep an eye on both the tile you're on and the tile you're planning to walk to see if they are covered by a shadow. 

Be sure to save some one-tick food (such as karambwans) for this phase as the lightning bolts strike quickly and it's very easy to die in the space of a few seconds should you fail to get out of the way quick enough. 

:'''Note:''' If you successfully kill him but die at the same time, the kill will count and you will not have to kill him again.''  
{{Clear}}
"""

[[steps]]
index = 12
name = "==Gear=="
links = ["Efaritay's aid", "berserker ring (i)", "Black mask", "Slayer helmet", "Vampyre", "Piety", "Chivalry", "Eclipse moon armour", "Karil the Tainted's equipment", "Black dragonhide armour", "Blessed dragonhide armour", "mixed hide armour", "Void Knight equipment", "super combat potion", "divine super combat potion", "Super attack", "food", "combo food", "karambwan", "shark", "throwing knife", "dart", "Acidic Bloodveld", "Arkan blade", "burn", "Successful hit", "Ironman Mode", "Mixed hide armour", "dragonhide armour", "barrows gloves", "super strength", "Shark", "Prayer potion", "Attack", "Strength", "super defence"]
text = """
{{Equipment
|align = right
|head = Helm of neitiznot
|cape = Fire cape
|neck = Amulet of fury
|ammo = Rada's blessing 2
|weapon = Blisterwood flail
|torso = Karil's leathertop
|legs = Karil's leatherskirt
|shield = Dragon defender
|gloves = Barrows gloves
|boots = Dragon boots
|ring = Efaritay's aid
|caption = Suggested gear
}}
[[Efaritay's aid]] is highly recommended, providing a 15% accuracy bonus and 10% damage bonus when worn compared to wearing a [[berserker ring (i)]]. The bonus from the [[Black mask]] or [[Slayer helmet]] will also work when on a [[Vampyre]] task. {{CiteTwitter|author=Mod Ash|url=https://twitter.com/JagexAsh/status/1366010324730736640|date=28 February 2021|archiveurl=https://reldo.runescape.wiki/i/99905|archivedate=10 June 2021|quote=I think that's true for him, Damian and Kroy, as well as juvinates.|notes=In response to the question: "Is it true that Vanstrom Klause and others from SotF can be killed as part of a Vampyre task?"}}  

[[Piety]] (or, less ideally, [[Chivalry]]) is also highly recommended. Bring at least one form of Attack-raising potion with you to negate his attack debuff. [[Eclipse moon armour]], [[Karil the Tainted's equipment|Karil's armour]], [[Black dragonhide armour|black]] or [[Blessed dragonhide armour|blessed d'hide]], [[mixed hide armour]], or [[Void Knight equipment]] are all suitable for this fight due to their magic defence. You should bring a [[super combat potion]] '''or''' a [[divine super combat potion]] '''and''' a [[Super attack]] potion, 2-3 prayer potions, and the highest level [[food]] possible or 1-tick [[combo food]]s such as [[karambwan]]s, paired with [[shark]]s or better. Bring a few of any quality of [[throwing knife]] or [[dart]] as a range switch for the [[Acidic Bloodveld]] special attack; these will one-shot the bloodveld regardless of quality.

:'''Note:''' The [[Arkan blade|Arkan Blade]] cannot damage vampyres with normal attacks, but its special attack can apply [[burn]] status if you [[Successful hit|hit a 0 (not miss)]]. (This may apply to other weapons capable of inflicting Burn status.)

For [[Ironman Mode|Ironmen]], you may have to make compromises on gear - bring your best Magic defence armour, such as [[Mixed hide armour|mixed hide]] or your best [[dragonhide armour]]. Bring [[barrows gloves]], [[Super attack]], [[super strength]], high-healing food, (such as [[Shark|sharks]]), 2-3 [[Prayer potion|prayer potions]], and [[Efaritay's aid]] ring to increase your accuracy and damage. Vanstrom can be defeated at lower combat levels, but at least 70 in [[Attack]] and [[Strength]] is recommended. If you don't have access to [[super combat potion]]s yet, you can pre-pot a [[super strength]] and [[super defence]] potion at the Burgh de Rott bank so you can bring 2 additional pieces of food. Take the [[Super attack]] potion with you so you can deal with Vanstrom's Attack drain during the fight.
"""

[[steps]]
index = 13
name = "Shattered"
links = ["Vyrewatch Sentinel"]
text = """
Upon defeat, Safalaan will beg Vanstrom to stop, and remember who he once was. Vanstrom reveals that he remembers his past life, and knowingly killed Larina. Enraged, Safalaan unleashes his icyene powers, and Vanstrom seemingly perishes in the resulting blast as he explodes. Now in shock, Safalaan is unable to move; Veliaf orders Ivan to teleport him out, but he is too far away. As [[Vyrewatch Sentinel]]s approach the Myreque, Veliaf makes the tough decision to leave Safalaan behind, and Ivan teleports you, himself and Veliaf out.

In shock at the sheer power of Lord Drakan, abandoning Safalaan and the loss of Polmafi, Kael, Vertida and Radigad, Veliaf declares the Myreque's death and leaves the hideout, leaving you and Ivan behind. Ivan asks you for some time alone, and decides to stay in the hideout.

<gallery captionalign="center" widths="200">
Sins of the Father - Safalaan kills Vanstrom.png|Enraged at Vanstrom, Safalaan fully unleashes his icyene powers.
Sins of the Father - Ivan teleports.png|Unable to reach Safalaan, Ivan teleports you, himself and Veliaf out in the nick of time.
Sins of the Father - Safalaan abandoned.png|Safalaan is abandoned and left behind.
Sins of the Father - the Myreque shattered.png|Veliaf declares the Myreque dead, leaving you and Ivan.
</gallery>

'''Congratulations, quest complete!'''
"""
