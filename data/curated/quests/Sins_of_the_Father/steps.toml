quest = "Sins of the Father"
step_count = 14

[[steps]]
index = 0
name = "Slepe's Sleeper Plague"
links = ["Drakan's medallion", "Ectophial", "coins", "Slepe", "Ver Sinhaza", "Kael", "Old Man Ral", "Ectofuntus", "Andras", "Veliaf Hurtz", "vampyre", "Crombwick Manor", "Hameln the Jester", "Hanchen the Hound", "Rat & Bat"]
text = """
{{Needed|None|recommended=[[Drakan's medallion]] or an [[Ectophial]] alongside 10,000 [[coins]]. Combat equipment for the next section.}}
Make your way to [[Slepe]] by either:
*Teleporting to [[Ver Sinhaza]] via [[Drakan's medallion]], then heading north. Once you pass the small dock, run east to arrive at Slepe. (If you've lost your [[Drakan's medallion|medallion]], you can reclaim it for free by speaking to [[Kael]] underneath [[Old Man Ral]]'s.)
*Using the [[Ectophial]] to teleport to the [[Ectofuntus]], then heading north to the small dock and paying [[Andras]] 10,000 coins to row to Slepe. You will arrive at a dock just south-west of Slepe.
[[File:Veliaf Hurtz chathead.png|left]]
Once in Slepe, speak to [[Veliaf Hurtz]] outside the church. He explains that the town has recently been exposed to an illness known as the Sleeper Plague, in which the afflicted fall into a deep sleep. Through his investigation, he suspects the [[vampyre]]s are responsible for causing the plague, and asks if you could try and find the source of the illness while he continues his investigation at the [[Crombwick Manor]]. Agree to help him.

Enter the church and speak to [[Hameln the Jester]], whose travelling companion, [[Hanchen the Hound]], has succumbed to the Sleeper Plague. Ask him how he fell ill, and he will say that they both visited the local pub, The [[Rat & Bat]], for a few drinks. Shortly afterward, Hanchen began to fall ill and collapse.
"""

[[steps]]
index = 1
name = "Plague's End"
links = ["prayer potion", "Carl", "bloody bracer", "Barrel (Sins of the Father)", "Kroy", "Damien Leucurte", "Vanstrom Klause", "Elixir of Everlasting", "Otrava", "The Sisterhood", "Bloody bracer", "Protect from Magic", "Ivandis flail", "ranged", "lab table"]
text = """
{{Needed|Combat equipment|recommended=Food and [[prayer potion]]s}}
{{Instance}}
[[File:Sins of the Father - Carl path.png|thumb|250px|The path you can take, and where to stand on to prevent being spotted.]]
[[File:Sins of the Father - following Carl around Slepe.png|thumb|250px|Following Carl around Slepe.]]
Visit The Rat & Bat just south-east of the church, and talk to [[Carl]] the barkeep. Ask him where he gets his [[bloody bracer]]s from, and he will act suspicious in response to your questions. Inspect the [[Barrel (Sins of the Father)|barrel]] behind the pub, you'll find out that Carl is just about out of Bloody Bracers, and decide to follow him.

Carl will walk around Slepe and periodically turn around, where you will need to hide behind a piece of landscape or building in order to not be caught. If you are caught, you will start from the beginning again.
# Go through the church and hide at the north doors, wait there until he passes the doors.
# Proceed to the hollow tree just north of the graves, and hide on the eastern side.
# When he reaches the centre square of the town, hide at the northern side of the hollow tree directly next to the gallows.
# Once he enters the graveyard, hide at the western side of the hollow tree west of the graveyard.
[[File:Carl chathead.png|left]]
Once Carl reaches the dungeon without you being caught, a cutscene will play in which Carl tells [[Kroy]], a vampyre herbalist, about you and your suspicions. After leaving, [[Damien Leucurte]] and [[Vanstrom Klause]] visit Kroy, and tell him about his discovery of the [[Elixir of Everlasting]], a formula created by [[Otrava]] of [[The Sisterhood]] which extends their lives, but with the side effect of sleeping for longer and longer periods until they never wake again.

Damien and Kroy then admit that they were behind the re-emergence of the Sleeper Plague by mixing the Elixir with [[Bloody bracer]]s, so that they may perform larger blood tithes on the victims, who only require a fraction of the blood a normal human needs. Vanstrom is not happy with this, as he is in charge of Morytania's blood tithes and Damien has not obtained his permission to do this, risking unwanted attention. Vanstrom further warns him that you and The Myreque have already arrived in Slepe, and leaves for Darkmeyer.

<gallery captionalign="center" widths="200">
Sins of the Father - Vanstrom and Damien.png|Damien introduces Vanstrom to Kroy.
Sins of the Father - confronting Kroy.png|Having both left, you proceed to confront Kroy.
Fighting Kroy.png|Fighting Kroy.
</gallery>

Upon both of them leaving, you will enter Kroy's lab. Knowing everything now, Kroy will attack you, using both melee and magic attacks.

During the fight, pray [[Protect from Magic]] as his melee damage is lower than magic. Kroy can be harmed by weapons other than the [[Ivandis flail]], so it's recommended to take advantage of this by using [[ranged]] and safe-spotting from behind the northern tables.

Kroy will occasionally throw a vial that weakens you if you don't move out of the way. The animation is different from his regular attack; watch for a vial appearing in his hands. It's also visible in the air, meaning that safe-spotting will allow you to see it and move out of the way. After the vial is thrown, provided it does not hit you, a puddle will appear on the floor that will also weaken you if you walk over it. The fight is fairly easy once the mechanics are learned, but bring several pieces of food to be safe.

Upon killing Kroy, destroy the two [[lab table]]s and return to Veliaf.
"""

[[steps]]
index = 2
name = "An Unwelcome Surprise"
links = ["Knife", "axe", "hammer", "Vampyre (attribute)", "Ivandis flail", "Salve graveyard teleport (tablet)", "Fenkenstrain's castle teleport (tablet)", "Drezel", "Ivan Strom", "Paterdomus", "Haunted Woods", "Ivandis Seergaze", "Seven Priestly Warriors", "River Salve", "Fenkenstrain's Castle", "Vanescula Drakan", "Lowerniel Drakan", "Icyene Graveyard", "Myreque Hideout", "Burgh de Rott", "Safalaan", "Meiyerditch", "Canifis", "Temple Trekking", "long vine", "nail beast", "purple sweets", "bronze axe"]
text = """
{{Needed|[[Knife]] (obtainable by searching knapsack), [[axe]] (obtainable by killing zombie), [[hammer]], a few inventory spaces, combat equipment, and a weapon to harm [[Vampyre (attribute)#Tier 2 Vampyres|tier 2 vampyres]] (such as the [[Ivandis flail]]).|recommended=Two [[Salve graveyard teleport (tablet)|Salve Graveyard Teleports]], one [[Fenkenstrain's castle teleport (tablet)|Fenkenstrain's Castle Teleport]], and food to heal yourself and Ivan Strom.}}

'''Note:''' Ensure that your pet is banked as it will prevent you from starting your trek with Ivan Strom

Upon returning to Veliaf, you report that the vampyres are indeed the cause of the Sleeper Plague, and the conversation between Damien and Vanstrom. Veliaf comments about rumours he heard about the growing demand for blood since the vampyre population has been increasing, and also heard a small part of a conversation between the two at the Crombwick Manor, with Vanstrom accusing Damien of demanding too much blood tithes from the werewolves.

Veliaf concludes that the werewolves are worth investigating, and that the increased demand of blood in Darkmeyer may cause unrest that the Myreque might be able to take advantage of. Before continuing the investigation, Veliaf wishes to check in with [[Drezel]] and [[Ivan Strom]] at [[Paterdomus]].
[[File:Sins of the Father - werewolf meeting.png|thumb|left|250px|The werewolves deliver a family of three to Damien.]]
Head to [[Drezel]] at the [[Paterdomus]]. He tells you and Veliaf that the kidnappings by the werewolves have escalated, and that Ivan has learned of a meeting in the [[Haunted Woods]], which he has gone to spy on. Veliaf is angered, asking Drezel why he'd let him go without any support, and that he must be kept safe. You then ask why Ivan is so important, and Drezel reveals he is the last living descendant of [[Ivandis Seergaze]], one of the [[Seven Priestly Warriors]], who originally blessed the [[River Salve]].

[[File:Sins of the Father - Vanescula arrives.png|thumb|right|Vanescula Drakan ambushes you, Veliaf and Ivan.]]
After a continuing argument about Ivan's fate, you suggest Veliaf and yourself head to the meeting spot and find Ivan. Ivan can be found directly south of [[Fenkenstrain's Castle]], and the meeting starts shortly. The meeting is between three werewolves and Damien Leucurte, who have delivered a family of three to Damien, confirming the suspicion that werewolves were behind the kidnappings. Ivan proposes that they follow the werewolves, but then [[Vanescula Drakan]], the sister of Lord [[Lowerniel Drakan]], knocks Veliaf back and snares him, you and Ivan.

[[File:Sins of the Father - Vanescula proposes alliance.png|thumb|right|Vanescula Drakan offers her help to kill her brother.]]
Vanescula comes to talk with you and the group, offering the chance to kill her last remaining brother, Lord Drakan himself. Veliaf, suspicious of her intentions, asks her why she'd want her brother killed, but she refuses to share them where they are. Rather, she will explain herself at the [[Icyene Graveyard]], providing that all the Myreque members are there. Veliaf believes this to be a trap to lure them all out, but Vanescula reveals that she already knows where the [[Myreque Hideout]] is and that if they do not attend, she will kill the entire resistance group.

Left with no choice, Veliaf travels to the [[Burgh de Rott]] hideout to inform the rest of the group, and also inform [[Safalaan]]'s group in [[Meiyerditch]], while you escort Ivan down to Burgh de Rott. But first, Ivan needs to update Drezel on the situation and collect some things from Paterdomus. He tells you to meet him outside the temple once you're ready.

Head west of [[Canifis]] (towards Paterdomus, near fairy ring, "CKS") and talk to Ivan Strom to begin your trek. This escort is similar to [[Temple Trekking]], but there are four set obstacles you and Ivan will face:

#'''River crossing''' - Use a knife to cut 3 vines from the smaller trees, then wind the vines together to make a [[long vine]]. Throw the long vine to the larger tree's branch and swing over the river. If you forgot to bring a knife, search the nearby backpack to find one.
#'''Nail beasts''' - Kill the three [[nail beast]]s, who range from level 69 to 141. If Ivan's health is low, use your food on him to heal him. '''Warning: If you use [[purple sweets]], Ivan will eat the whole stack!'''
#'''Broken bridge''' - Chop down the trees and use the logs to fill the gaps in the bridge. You must either have a hammer in your inventory or be wielding an axe to repair the bridge. If you forgot to bring an axe, kill the nearby zombie for a [[bronze axe]].
#'''Vampyre Juvinates''' - Kill the two Vampyre Juvinates. You will need a weapon to harm [[Vampyre (attribute)#Tier 2 Vampyres|tier 2 vampyres]]; the [[Ivandis flail]] works best. Immediately attack the vampyre in front of Ivan and then do the same to the other one to avoid Ivan's death. If it fails and Ivan's health is low, use your food on him to heal him.

Once at [[Burgh de Rott]], speak with Ivan Strom, who will head to the dock. After, head to the dock on the southern coast and speak with Veliaf or Ivan Strom. '''If you do not speak to either Ivan Strom or Veliaf Hurtz prior to boarding the boat, you will not have the option to sail to the Icyene Graveyard.'''
"""

[[steps]]
index = 3
name = "A Nice and Simple Plan"
links = ["Mutated Bloodveld", "Pickaxe", "Drakan's medallion", "Morytania legs 3", "Mort'ton teleport", "Icyene Graveyard", "Safalaan", "Vanescula Drakan", "Zarosian Empire", "Second Age", "Queen Efaritay", "King Ascertes", "Morytania", "Mausoleum Door (Icyene Graveyard)", "icyene", "Vanstrom Klause", "Ivan Strom", "Vertida Sefalatis", "Kael Forshaw", "Radigad Ponfit", "Polmafi Ferdygris", "Veliaf Hurtz", "Meiyerditch", "Ver Sinhaza", "Vyrewatch", "daeyalt ore", "Darkness of Hallowvale", "Haemalchemy volume 2"]
text = """
{{Needed|Combat equipment to kill a [[Mutated Bloodveld]] (level 123) (only for laboratory section, can access a bank before) and some free inventory space.|recommended=[[Pickaxe]], [[Drakan's medallion]], [[Morytania legs 3]] or [[Mort'ton teleport]]}}
[[File:Sins of the Father - Vanescula meets Myreque.png|thumb|right|The entirety of the Myreque meet with Vanescula Drakan.]]
'''Note:''' ''There is no combat required during the Icyene Graveyard section.'' 

Head to [[Icyene Graveyard]]. [[Safalaan]] will greet you and Veliaf, and promote you to lieutenant. [[Vanescula Drakan]] appears, and explains her plans. As the human population decreases, the vampyres' has continued to grow, and there is no longer enough blood to go around. And, despite this crisis, their leader, Lowerniel Drakan, has remained absent, spending months in his chambers and refusing to see anyone. She wishes to overthrow her brother, and rule with humans and vampyres coexisting peacefully, as they once did in the [[Zarosian Empire]] during the [[Second Age]]. She proposes helping the Myreque kill Lowerniel, with the Myreque taking credit for his death so that Vanescula can easily take his place without angering those loyal to Lowerniel. She adds that if the Myreque refuse her proposal, she will kill them if they remain in Morytania, as she can't afford any loose ends.

While Vanescula lets the group think over her proposal, she asks to chat with Safalaan privately. Veliaf, remaining suspicious of her intentions, asks you to join them. Vanescula will reveal that she knows of Safalaan's hidden powers, and that the truth behind his heritage and powers will be found inside the large mausoleum, which was built for [[Queen Efaritay]] and [[King Ascertes]], the previous rulers of [[Morytania]] (then known as Hallowvale). However, the [[Mausoleum Door (Icyene Graveyard)|door]] is locked, and you must solve a puzzle to open it.

[[File:Sins of the Father - Puzzle (2).png|thumb|A nearly-complete version of the puzzle that must be solved to unlock the mausoleum door.]]
Complete the puzzle, which is similar to the popular game Kakurasu. The objective of the puzzle is to have the active numbers (different for each player), which are marked with the blue and yellow squares in each row/column, to add up to the number shown on that row/column. The red flags are not needed to solve the puzzle, but can help you mark off squares that they think they will not need. An easy place to start is by checking for any numbers in a row or column that are below 5, as you can use that to eliminate some of the possibilities. Additionally, some numbers can only be solved by a certain combination (e.g. 11 can be solved by using the numbers 5,3,2,1 or 5,4,2). To save yourself the trouble of the process of elimination, [https://oldschool.tools/calculators/sins-of-the-father-puzzle-solver this external website] will solve the puzzle for you.

[[File:Sins of the Father - Safalaan's heritage.png|thumb|left|Safalaan discovers his half-icyene heritage.]]
After the puzzle is complete, a cutscene plays in which you and Safalaan discover that he is the half-icyene and half-human son of Efaritay and Ascertes, and that he once had a sister, Larina Hallow, and that his powers were those of an [[icyene]]. Safalaan then asks where his parents' tombs are, since the mausoleum was built for them, but only his sister was found. He agrees to Vanescula's plan to overthrow Lowerniel, on the condition she reveals the whereabouts of his parents and that he be the one who deals the killing blow on her brother. Vanescula reveals that only Lowerniel knows of Efaritay's fate, and that Ascertes underwent the vampyrification process, becoming [[Vanstrom Klause]].

Needing some time alone, Safalaan asks you to speak to [[Ivan Strom]], [[Vertida Sefalatis]], [[Kael Forshaw]], [[Radigad Ponfit]], [[Polmafi Ferdygris]], and lastly [[Veliaf Hurtz]]. '''Note:''' You must speak with the other members before speaking to Veliaf or he will not agree.

After getting everyone to agree, Vanescula believes that the laboratory beneath [[Meiyerditch]] may have more secrets to discover, some of which can potentially upgrade the Ivandis flail to give the Myreque a better fighting chance. You and Safalaan will search the laboratory together.

Prepare for combat and make your way to the laboratory. A quick way to reach it is to teleport to [[Ver Sinhaza]] using your [[Drakan's medallion|Drakan's Medallion]] and speak to the [[Vyrewatch]] next to the bank and request to be sent to the mines; withdraw food and combat equipment before being sent to the mines. Mine 15 [[daeyalt ore]], place ore into empty cart, then talk to a Vyrewatch to get out (if you forgot a pickaxe, you can ask one of the miners for a bronze pickaxe). You will be transported out of the mines. Look around the houses for a staircase that goes <u>down</u> (Laboratory from [[Darkness of Hallowvale]]). The building is against the eastern wall. Go towards the house you had to enter before going up the stairs to make the jump and enter the secret carpet room. From here continue going north-east staying near the eastern wall. You will find the house with a clearly visible large tapestry in one of the rooms, coloured red and yellow. Walk through the slashed tapestry, and go down the stairs.

[[File:Sins of the Father - Mutated Bloodveld.png|thumb|right|Safalaan unintentionally unleashes his icyene powers to kill a mutated bloodveld.]]
Talk to [[Safalaan]] and you both will explore the laboratory. However, a [[Mutated Bloodveld]] will appear, and Safalaan unintentionally unleashes his icyene powers to kill it, knocking him out. Another will appear, and you must kill it. The fight is very simple and straightforward, and the bloodveld can be very easily safespotted. Once you've killed it, speak to Safalaan again, and he will question the usefulness of his powers since he has no control over how and when he could use them.

After speaking to him, head west to the next room and search the bookshelf against the western wall (behind two cages) to obtain a book titled [[Haemalchemy volume 2]]. Return to Safalaan and give him the book. He will then ask you to return to the Icyene Graveyard. Teleport or walk back to Burgh de Rott, run south-east and use the boat back to the Icyene Graveyard.
"""

[[steps]]
index = 4
name = "A Vyre-ry Noble Disguise"
links = ["Ivandis flail", "Vyrewatch outfit", "Drakan's medallion", "Morytania legs 3", "Mort'ton teleport", "food", "antipoison", "prayer potion", "super combat potion", "Blisterwood tree", "Polmafi Ferdygris", "Old Man Ral", "Trader Sven's Black-market Goods", "Damien Leucurte", "poison", "Protect from Magic", "Cracked wall"]
text = """
{{Needed|[[Ivandis flail]], armour, [[Vyrewatch outfit]] or 1,950 coins|recommended=[[Drakan's medallion]], [[Morytania legs 3]] or [[Mort'ton teleport]], some [[food]], an [[antipoison]], 1-2 [[prayer potion]]s, and 1 [[super combat potion]].}}
{{Instance}}
Speak to either Veliaf, Safalaan or Vanescula, who tells you of the [[Blisterwood tree]], a tree created by Efaritay whose wood is lethal to vampyres. She suggests using Blisterwood to enhance the Myreque's weapons. However, the only known Blisterwood tree is found in Efaritay's old Arboretum, in the middle of Darkmeyer. Vanescula suggests modifying a vyrewatch outfit to one of a vampyre noble to blend in better, and Safalaan suggests you take the disguise to [[Polmafi Ferdygris]] at the Myreque Hideout under [[Old Man Ral]]'s house.

If you don't already have a vyrewatch outfit, you can purchase a set for 1,950 coins from [[Trader Sven's Black-market Goods]] directly south of Old Man Ral's house. Head to the Myreque Hideout (down the Trap Door in Old Man Ral's house) and have Polmafi modify your outfit, turning them into a vyre noble outfit, albeit unscented. Return to the Icyene Graveyard and speak to Vanescula.

As the vampyres have a very keen sense of smell, the outfit must be scented with blood, but it must be the blood of a noble, as Darkmeyer's nobility won't go interacting with lesser vampyres. Vanescula suggests killing two birds with one stone by killing [[Damien Leucurte]], who is an obscure, lesser noble and has become a problem that needs to be resolved.

Head to a bank and gear up for the fight, where you'll be taking on Damien (level 204), who can only be harmed with the Ivandis flail. The fight is relatively simple. You'll want to bring some food (especially for lower levels), 1-2 prayer potions, combat potions and a way to cure [[poison]]. Once you are ready, head to Slepe where you first spoke to Veliaf. You can either teleport using Drakan's Medallion and run or take the boat from Icyene Graveyard.

<gallery captionalign="center" widths="200">
Sins of the Father - confronting Damien.png|You and Veliaf confront Damien Leucurte.
Fighting Damien Leucurte.png|You and Veliaf battle against Damien Leucurte.
</gallery>

[[Damien Leucurte]] can be found in Crombwick Manor, (the large manor in the northern part of Slepe), to fight him, you must speak with Veliaf where you first start the quest. Damien uses a combination of ranged and magic attacks, periodically spreading magical fire around the room during the fight. '''You must stamp out the fires or he will become increasingly resistant to your attacks.''' He can also poison you during the fight. By using [[Protect from Magic]] and stamping out the fires he produces, you shouldn't take much damage. Veliaf will help you in the fight, but do not expect him to do much damage.

Once you are victorious and have spoken to Veliaf, return to Icyene Graveyard and speak with Vanescula Drakan, who tells you of a small [[Cracked wall|crack in the southern wall]] that you can use to enter Darkmeyer.

''Note: If you teleport out of the Damien encounter immediately as he hits zero health, your quest guide will update properly but your Vyre Outfit will continue to be the Unscented version. If this happens, it will vanish after you speak with Vanescula and will need to be reclaimed from the Myreque base under Old Man Ral's house. The stairs in Kroy's lab lead back to the manor if the player misses the dialogue with Veliaf.''
"""

[[steps]]
index = 5
name = "The Branches of Darkmeyer"
links = ["Vyre noble disguise", "axe", "Desmodus Lasiurus", "Mordan Nikazsi", "Maria Gadderanks", "Ron Gadderanks", "Lord Alexei Jovkai", "Sarius Guile", "Shelves (Sins of the Father)", "Old note (Sins of the Father)", "Blisterwood tree", "Blisterwood logs"]
text = """
{{Needed|[[Vyre noble disguise]], an [[axe]], eight free inventory spaces|recommended=Weight reducing gear, stamina potion, ways to restore run energy.}}
Wear your vyre noble disguise and ask any vyrewatch to send you to the mines. As they perceive you to be a noble, you need not mine any daeyalt ore to leave; you will simply be escorted out. Once you exit the mine, head north to the crack and enter it to arrive in Darkmeyer. You will arrive at the lower tier of the city; prior to the quest's completion, you will not be able to access any of the features, which includes the bank. You can however use the altar south of the bank.

Make your way to the Arboretum in the middle of the city, and attempt to enter; a guard named [[Desmodus Lasiurus]] will stop you, telling you that the Drakans have ordered that no one can enter the Arboretum. You will ask him if there is anything you can do for him to give you access, and he will say a juvinate named [[Mordan Nikazsi]] was supposed to deliver some slaves ([[Maria Gadderanks|Maria]] and [[Ron Gadderanks]]) to him, but he has not shown up.

Mordan Nikazsi can be found in the lower tier of the city in a house near the eastern outer wall in a building with a water source icon ([[File:Water source icon.png]]), two houses north of the furnace. He tells you that he sold Desmodus' slaves to [[Lord Alexei Jovkai]], the head of House Jovkai, and that the slaves are in his prison directly south of the food shop ([[File:Food shop icon.png]] icon).

At the prison, speak to [[Maria Gadderanks]], who tells you they arrived here a short while ago, and are already well treated. Another prisoner interrupts, telling you Lord Jovkai keeps them well looked after, with a nice bed, good food and clean clothes on the condition that they give him a bit of blood from time to time. The vyrewatch then asks you to leave as Lord Jovkai enters, asking you what you are doing here. You will tell him that the prisoners were promised to Desmodus, but Lord Jovkai tells you he's already paid for them and you'll have to find some different slaves.

[[File:Sins of the Father - Sarius saves you.png|thumb|right|Sarius stops Vanstrom from recognising you and breaking your cover.]]
Vanstrom Klause then enters the prison, and argues with Lord Jovkai that the Gadderanks belong to Desmodus, and orders Lord Jovkai to return them to him. Vanstrom then realises your voice sounds familiar, and asks that you turn and face him. As he does, [[Sarius Guile]], Vanescula's servant, asks Vanstrom to see Vanescula as she has urgent need of him, stopping him from recognising you and breaking your cover.

Return to Desmodus, who will now let you enter the Arboretum. Upon entering, search the toppled [[Shelves (Sins of the Father)|shelves]] for an [[Old note (Sins of the Father)|old note]]. Before you can cut the [[Blisterwood tree]], you will need to hydrate the tree by regulating the flow of water. Read the old note to find out how many gallons are needed to hydrate the tree (this is different for each player). The valves are found by the entrance; the northern valve sends seven gallons of water per interval, while the southern valve sends four gallons per interval.

